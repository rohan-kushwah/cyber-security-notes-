var NOTES = [{"name": "BACKUP OF WEBSITE AND FTP SERVER", "content": "ADD FEATURE BACKUP\nTHEN search windows backup in search bar \nthen backup sechdule se kab kiska backup lena hai wo bata do \nthen backup once se ek bar backup\nek extra volume add kar lo usme backup place kar do\nab jaise adds ka backup ntds me ata hai usko backup kar lo\nsyslol me group policy ka\nrecover se jo data gya hai use lee lp\n"}, {"name": "BASIC OF WEBSITE MAKING", "content": "what is website - collection of interconnected  webpages in a particular location \n# key components of website  -\ndomain name  - the uniques address used to  access the website like example.com\nwebserver - the server which hosts the website files and deleiver them to users\nweb pages - document written in html java css that form content of the side \ncontent - content video images which are presented on web -pages\nnavigation- menu and links that allow users to move between different pages on the site \n# types of website-\nstatic - jiska content change nhi kar sakte same content rehta  or jo website jo front end se bani ho or wo one way ho sirf info deti\ndynamic - jo website two way ho usse dynamic website hogi jisse hum user se bhi data de pai jo front end aur back end dono se bani ho\n# front END or backEnd-\nfront end -rander - pixel by pixel se arrange hona\njab hum kisi website me jate toh usme graphics options navigation rehte hai wo fronthand se bnata\nlanguage use for developing of front hand=\n    HTML; = [HYPERTEXT MARKUP LANGUAGE ]\n- structure or content of web pages\n- defines element like headings paragraph links and images etc \nCSS ;= [CASCADING STYLE SHEETS ] \n- styling and layout of webpages \n- control colours fonts spaaving etc\nJAVASCRIPT;=\n- adds interactive to web pages \n- handless dynamic content , form validation ,animations and more\nFLASH;=\nJQUERY;=\ncombination of all three -\n#typescript -a superset of java script that adds static typing helps in managing larger codebases with better error checking \n\n#framework = \nREACT- library for building user interface \nangular - framework for developing dynamic web apps\nvue.js= lightweight fraework for building ui's and single pages application {spas]\n\n\n#bACKEND = jaise kisi bhi website pe hum login kar sakte hai enroll kar sakte hai\njisse hum user se interaction kar pai wo backhand se hota hai\nbackend languages are used to manage the server ,application ,andd database they handle the logic database interaction ,authentication and server configuration \n# language use for backend -\n- python \n- java\n- ruby\n- php\n- c\nmicro services- har bar tukdo tukdo me website puri banani hai jab multiple languages use hogi\n# dbms -database management system-\nbackend me database store karne ke liye use karte \n#types of dbms -\n 1. relational database management systems \n - uses a structural format to store data \n - supports sql for database interaction \n - ex- my sql \n - microsoft sql\n 2. no sql database = unstructured store of data \n  - ex - mango dB\n  - cassandra \n  - ibm db "}, {"name": "BINDING", "content": "FOUR TYPES OF WEBSITE BINDING-\n1. by ip\n2. by port\n3. by type\n4. by name \n#basic- sabse pehle template ko extract karo the unhe place karo inetpub me root me\nab hum kisi ko sirf admin hi panel dikhan cahte toh ip ke sath folder location hi de do\n127.0.0.1 local pc se hi wo website tak ja sakti hai\n# by ip- \ngo in  iis option\n    give multiple ip to server or client toh ab ek hi website alg alg website se call hogi \n     multiple ip - ncpa.cpl-properties-ip4-advanced-add\n       #unstandard binding-extract template folder ko inentpub me dal do toh ab ip ke aage folder name de do toh wo website laiga\n    for privacy in website only company wale khol payega \n    \n     #standard binding - \n    in iis sites- add website\n     then site name and site location inetpub se\n\n     * * hai toh sabhi ip se whi website chalegi \n     * http se \n     * port 80\n     then us ip se ab ek particular website chalegi\n# by ports-\n     single ip se alg alg port pe alg alg website chalani ho toh ports alg alg de do\n    we have 65536 ports use them\n     http 80\n      and https 443\n    then give ip:portno\n# by type-\n       2 type\n    1. http\n     2. https\n    first iis me jake server certificate le lo then - create self signed certificate\n      then ab binding me https me new binding kar lo with ssl certificate\n    combination bana lo port type aur ip ko\n    https://thenip\n     then ab ek hi website ko dono type pe chalana ho toh jo website hai uspe click   binding me add kar lo\n   doubt- multiple website ek ip se = alg alg port se bind kar do\n     ek ip se multiple website - port se\n# by name=\n     by name ke liye dns jarruri hai  \n     pehle zone banao  \n    unke a records banao  \n    then sab ke c name   \n    ab nslookup karke zone check kar lo  \n    then ab iis me jake add karo us ip se karna hai jisse humne us zone name ko bind kiya hai  \n     then jab bana lo site toh binding me jake alias aa kar sakte hai  \n    https se bhi bind kar lo  \n\n    same ip se alg alg website - by name bhi hogi but alg alg ip ek zone me rahenge toh wo 'jo binding ki ip hai uspe rich nhi karega' toh dikkat aayegi wo website alg alg ip pe jayegi isliye unho hata do jab alg alg website same ip se by name call hogi  \n    ab kisi pc se wo website call karni hai toh hume server ka dns dena padega  \n    bina dns diye krna hai toh client  se dns hatao 8.8.8.8 do  \n    aur phir host file me entry kar do client ki with website ip and zone name\n    host file-C:\\Windows\\System32\\drivers\\etc"}, {"name": "CLOUD HOSTING", "content": "badal hum jinhe pakad nhi sakte\ninse jab request resolve hogi toh pata nhi lagega kisne rresolve kari\n![[Pasted image 20250124182429.png]]\n[ek hi physical server ko sub  virtual parts me divide karna   website ko host karne ke liye jab bhi koi dikkat aai ek me toh dusre toh chal rhe ho sab me powers equally divided hoti hai]\nCloud hosting is ==a service that allows users to access websites and applications on the internet using a network of virtual and physical servers==. It's a type of web hosting that uses cloud technology to provide computing resources on-demand.\n- A cloud provider hosts a user's website or application on a network of virtual and physical servers \n\n- The user pays the cloud provider for the resources they use \n\n- The user can scale up or down the resources they use based on demand \n\nBenefits of cloud hosting\n\n- **Flexibility**: Users can quickly add or remove resources like storage, CPU, or RAM \n\n- **Reliability**: Users are less likely to experience downtime because the website is spread across multiple servers \n\n- **Scalability**: Users can quickly scale up or down resources to meet their website's needs \n\n- **Cost-effectiveness**: Users only pay for what they use\n#- sab types ki hosting ke sath use ho jayegi cloud hosti\n# self hosted cloud software=\n- nextcloud\n- owncloud\n- openstack.org\n![[Pasted image 20250127163335.png]]\n      Website binding in the context of web development is not a standard term with a single definition, but it often refers to linking various parts of a website together to function cohesively. This could mean a variety of things depending on the specific context or technology being discussed. Here are a few interpretations of \"website binding\":\n\n1. Binding URL to Specific Content/Pages\nIn this case, binding refers to associating specific URLs with certain content, views, or pages on the website. For example, setting up routing in a framework (like React, Angular, or Vue) so that a particular URL shows a particular view or component.\n\nURL Routing: A way to bind a URL (like example.com/home) to a specific page or component that should be displayed when that URL is accessed.\nDynamic URLs: Binding parameters in URLs to dynamic content (e.g., example.com/product/123 where 123 could be the ID of a product).\n2. Data Binding\nThis type of binding refers to connecting the website's data (from a backend server or API) with the content displayed on the page. Changes in the data automatically reflect on the UI without needing to manually update the page.\n\nOne-way Binding: Data flows in one direction (e.g., from a model to the view).\nTwo-way Binding: Data is updated in both directions between the view and model (e.g., Angular's ngModel).\n3. Binding Event Handlers\nThis refers to associating specific user actions, like clicks or form submissions, with functions that perform tasks when those actions occur.\n\nFor example, when a user clicks a button, the button can be \"bound\" to a specific function that runs some code.\n4. Server Binding (Hosting)\nThis could also refer to the process of binding the website or web application to a specific server or hosting environment.\n\nBinding to a Port: When a website is deployed on a server, it's often bound to specific ports (such as port 80 for HTTP or port 443 for HTTPS).\nDomain Binding: Binding a custom domain (like www.example.com) to the website so users can access it via that URL.\n5. API Binding\nBinding a website to external APIs or services, so the website can fetch or send data. This could be through RESTful or GraphQL API calls, which are used to update the website dynamically with data. \n\n     API stands for Application Programming Interface.\n\n\nAn API is a set of defined rules, protocols, and tools for building software applications. It enables different systems, services, or applications to communicate with each other, exchange data, and perform specific tasks.\n\n\nThink of an API as a messenger between systems:\n\n      1. You request data or action (e.g., \"Get user data\")\n      2. The API receives your request\n     3. The API processes the request (e.g., retrieves user data)\n     4. The API sends the response back to you (e.g., user data\n\n6.  Binding Data to UI Components\nThis involves linking data to specific elements or components in the UI. For example, using a JavaScript framework to bind a value to an input field so that the value updates in real-time as the user interacts with it.\n\n7. Client-Side Binding\nClient-side binding can refer to the process of linking user interface components (like buttons, text fields, etc.) to the corresponding data or functionality using JavaScript. Frameworks like React, Angular, and Vue.js are commonly used for client-side binding.\n\nConclusion\nIn summary, website binding can refer to the connection between different parts of a website "}, {"name": "FTP SERVER OPTIONS", "content": "koi site jo chla rhi hai uspe bhi hum ftp server bind kar sakte hai called dual binding\nyadi site se connected hai toh data wweroot ke andar wo site me dalega\n#authentication me kis user ko allow karnaa hai\nanonymous- sabkoo\nbasic - pc ke\n#authorization- wo authenticate user kya kya karr sakte hai\n#ftp current sessions - kisne connection banay aur kya changes kiye wo log me dikhege\n#ftp directory browsing- cmd me dikhega unix like kiya toh files me changes dikhenge\n#virtual directory-ab koi data humne ftproot me nhi dala toh bhi use hume samne wale ko dikhana hai toh virtual directory banaiinge\n#ip and domain restriction- kis ip ya domain ftp acess kar na pai\n#log- kon kya kya kar ke gaya dikhega\n#ftp messages- cmd me dikhega ftp connection bane ke bad kya messages end me kya etc\n#ftp request fiktering - kya kya request approve karni hai matlab jaise .png block ki ab client ftp server me .png nhi dal sakta\n#ssl -kisi certificate https me chale\n#ftp user isolation- jabhi ek particular user login ho wo apni home directory pe jaye\nphysical direcctory do site ke andar\n"}, {"name": "FTP SERVER", "content": " #concept --yadi koi server hamara dusri country me place hai hume us tak file  bhejni hai toh hum pendrive se toh nhi le jayengee toh yaha file transfer protocol work karega\nab koi website hamari dusri jagah place hai ab hume koi file us server tak phuchani hai toh by ftp bhejenge\n![[Pasted image 20250205120245.png]]\n# practical portion-\nadd ftp server on server hand in webserver section both options\niis ke andar ftp server aayega\n# anonnomos site build-\nab ek server pe humne files rakh di ab sab use download karpai through ftp=\nsite pe right click add ftp site\nphysical path- c -inetpub-ftproot\ndefault code server side 21\nno ssl \nftp- work to transfer file outside the lan\nsamba- in the lan file trrasfer (cifs)\nab koi bhi content jo kisi ko dena hai toh wo content ftproot me rakh denge \naur by file explorer jisko bhi chiaye data access karenge\nftp://ip\nby file browser aur by filezila use kar sakte hai\nfilezila ka cllient le lo\nif anonymous give ip and username me enter password bhi nhi port bhi nhi\nread ki permission hai toh server se data client me la sakte hai client ka server me nhi iske liye write ki permission deni padegi\n# basic site build-\nab kisi company user ko hi access dena hai toh basic de do ab wo id password mangega \nread write dono ki permission de do\nab ftp se write ki permission toh de di company user ko but folder me ntfs nhi di \nab un company user ko permission de do un folder me write ki permission ki\nby filezila ip dena paddega username aur password bhi\n# by cmd access-\n#anonymous - ftp ip\nanonymous user se unki gmail mangi jati hai\nin anonymous three usernaame take- anonymous/ftp\npassword jo chahe wo do'\n? marks se commands dekh lp\nget se server se data lenge aagee file name\nput se server me rakhenge aage filename"}, {"name": "HOSTING AND TYPES OF HOSTING", "content": "n8hosting is a server  which provide space and resources to run the website\ntypes of hosting = \n# self-hosting** = \n![[self-hosted-software.jpg]]\n\n[like apna ghar pura control apne pass ye badi ecoommerce company ke liye use hiota hai jiske multiple client aate ho ek di me]efers to the practice of hosting your website, application, or service on your own hardware, rather than using a third-party hosting provider. This means you manage and maintain the server infrastructure yourself, either from your own premises or in a dedicated data center.\n\n### Key aspects of self-hosting:\n\n1. **Own Hardware**: \n2. complete control\n    \n3. **No Shared Resources**\n    \n4. **Management**: \n    \n5. **Cost**: \n    \n6. **Security and Privacy**: \n7. network\n8. domain  name\n9. software\n\n### Pros of Self-Hosting:\n\n- **Full control**: You can configure the server exactly as you need, including custom software installations.\n- **Privacy**: You control all data and have fewer concerns about third-party access.\n- **Cost savings**: Over time, hosting your own server may be cheaper than paying for a hosting provider, especially for larger-scale operations.\n# dedicated hosting-\n[matlab kisi ghar me room rent pe lena ]**Dedicated Hosting** is a type of web hosting where you rent an entire physical server exclusively for your website or application. This means that the server's resources (CPU, RAM, storage) are not shared with any other websites, providing you with full control, high performance, and better security. Dedicated hosting is ideal for high-traffic websites or applications that require significant resources.\n\n### Types of Dedicated Hosting:\n\n1. **Managed Dedicated Hosting**:\n    \n    - **Description**: In this type of hosting, the hosting provider handles the management of the server, including updates, security, backups, and software configurations..\n    - **Pros**: Expert management, hassle-free operation, enhanced security, automated backups, and maintenance.\n    - **Cons**: More expensive due to the managed services.\n2. **Unmanaged Dedicated Hosting**:\n    \n    - **Description**: With unmanaged hosting, you rent the server, but you're responsible for configuring, maintaining, and managing the server yourself\n# virtual private server -\n[ek server me virtual machines se alg alg os se website run karna] **Virtual Private Server (VPS)** is a type of web hosting where a physical server is divided into multiple virtual servers, each acting as an independent machine with its own operating system, resources, and configurations\n### Types of VPS Hosting:\n\n1. **Managed VPS Hosting**:\n    \n    - **Description**: The hosting provider takes care of the server management, including setup, security, software updates, backups, and performance and optimization\n2. **Unmanaged VPS Hosting**:\n    \n    - **Description**: In this type of hosting, you rent a VPS but are responsible for managing and configuring the server, including software installation, security patches, and performance tuning.\n3. **Cloud VPS Hosting**:\n    \n    - **Description**: This is a VPS hosted in a cloud environment rather than on a physical machine. Cloud VPS hosting uses a network of virtual servers that can scale resources dynamically based on your website's needs.\n    - **Best For**: Websites that require scalability, high availability, and flexibility.\n# shared hosting -\n[ghar ko dharamshala banana ] ek hi server se multiple websites run karna ye jo chote e commerce wale rehte hai unke use me aati \n\nshared hosting** is a type of web hosting where multiple websites are hosted on the same physical server, sharing its resources (such as CPU, RAM, disk space, and bandwidth). Each website on the server is allocated a portion of these resources, but the server's overall resources are shared among many users.\n\n![[Pasted image 20250122192801.png]]\n"}, {"name": "HTTP and HTTPS working", "content": "### **1️⃣ Host Header: HTTP vs HTTPS**\n\n- **The Host header exists in both HTTP and HTTPS.**\n\n- **In HTTP, it's a standard request header.**\n\n- **In HTTPS, it's sent during the TLS handshake via SNI (Server Name Indication).**\n\n---\n\n### **2️⃣ HTTP Request/Response Headers (Plain HTTP - Port 80)**\n\nIf you open **`http://site1.local`**, the **actual HTTP headers** are exchanged as follows:\n\n#### **🔹 Request (Client → Server)**\n\n```\n\nGET /index.html HTTP/1.1\n\nHost: site1.local\n\nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)\n\nAccept: text/html,application/xhtml+xml,application/xml;q=0.9\n\nConnection: keep-alive\n\n```\n\n**Explanation:**\n\n- `GET /index.html` → Requesting `/index.html` from the server.\n\n- `Host: site1.local` → This is the **Host Header**, indicating **which site** is being accessed.\n\n- `User-Agent` → Name and version of the browser.\n\n- `Accept` → Client states it wants HTML/XML content.\n\n- `Connection: keep-alive` → Indicates the connection should be kept open.\n\n#### **🔹 Response (Server → Client)**\n\n```\n\nHTTP/1.1 200 OK\n\nDate: Wed, 07 Feb 2025 12:00:00 GMT\n\nServer: Microsoft-IIS/10.0\n\nContent-Type: text/html\n\nContent-Length: 345\n\nConnection: keep-alive\n\n<html>\n\n  <body>\n\n    <h1>Welcome to Site1</h1>\n\n  </body>\n\n</html>\n\n```\n\n**Explanation:**\n\n- `HTTP/1.1 200 OK` → Request was successful.\n\n- `Server: Microsoft-IIS/10.0` → Server identifies itself as IIS.\n\n- `Content-Type: text/html` → Sending HTML content.\n\n- `Content-Length: 345` → Size of the response content.\n\n---\n\n### **3️⃣ HTTPS Request/Response Headers (Port 443)**\n\nIf you open **`https://site1.local`**, a **TLS handshake along with HTTP headers** is exchanged.\n\n#### **🔹 Step 1: TLS Handshake (Client Hello)**\n\nIn the first request, the client performs a **TLS handshake** and sends **SNI**.\n\n```\n\nClient Hello\n\n  - Protocol Version: TLS 1.2\n\n  - Cipher Suites: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256, ...\n\n  - Extensions:\n\n      - Server Name Indication (SNI): site1.local\n\n```\n\n**Explanation:**\n\n- `Client Hello` → The client initiates the TLS handshake.\n\n- `Server Name Indication (SNI): site1.local` → This is the HTTPS equivalent of the **Host Header**.\n\n- `Cipher Suites` → Sends supported encryption methods for a secure connection.\n\n#### **🔹 Step 2: TLS Server Hello**\n\nThe server accepts the handshake and sends an SSL certificate.\n\n```\n\nServer Hello\n\n  - Protocol Version: TLS 1.2\n\n  - Cipher Suite: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256\n\n  - Certificate: site1.local SSL Certificate\n\n  - Session ID: 12345\n\n```\n\n**Explanation:**\n\n- `Server Hello` → The server accepts the TLS handshake.\n\n- `Certificate: site1.local` → The server sends the SSL certificate for `site1.local`.\n\n- `Session ID` → A session is established for future requests.\n\n---\n\n### **4️⃣ HTTP Request Headers within HTTPS (After TLS Handshake)**\n\nAfter the handshake is complete, an **encrypted HTTP request is sent**.\n\n#### **🔹 Request (Client → Server)**\n\n```\n\nGET /index.html HTTP/1.1\n\nHost: site1.local\n\nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)\n\nAccept: text/html,application/xhtml+xml,application/xml;q=0.9\n\nConnection: keep-alive\n\n```\n\n(Same as HTTP, but **encrypted**.)\n\n#### **🔹 Response (Server → Client)**\n\n```\n\nHTTP/1.1 200 OK\n\nDate: Wed, 07 Feb 2025 12:00:00 GMT\n\nServer: Microsoft-IIS/10.0\n\nContent-Type: text/html\n\nContent-Length: 345\n\nConnection: keep-alive\n\n```\n\n(Same as HTTP, but **encrypted**.)\n\n---\n\n### **5️⃣ Key Differences Between HTTP and HTTPS**\n\n| Feature          | HTTP (Port 80) | HTTPS (Port 443)       |\n\n|------------------|----------------|------------------------|\n\n| Encryption       | ❌ No           | ✅ Yes (TLS/SSL)        |\n\n| Security         | 🔴 Not Secure   | 🟢 Secure               |\n\n| SNI Support      | ❌ No           | ✅ Yes (TLS Handshake)  |\n\n| Data Visibility  | ✅ Plaintext    | ❌ Encrypted            |\n\n| Certificate      | ❌ Not Required | ✅ Required             |\n\n---\n\n### **6️⃣ Summary**\n\n✔ **Host Header** is present in both HTTP and HTTPS requests. In HTTPS, its equivalent during the TLS handshake is **SNI (Server Name Indication)**.\n\n✔ **HTTP headers are visible in plaintext**, whereas in HTTPS, **a TLS handshake occurs first, and then the headers are sent encrypted**.\n\n✔ **In a client's HTTPS request, SNI is sent first**, which allows IIS to serve the correct website.\n\n✔ **DNS only converts the domain to an IP address**; without proper IIS binding, the request may fail."}, {"name": "IIS PANEL OPTION2", "content": "#COMPRESION- WEBSITE KE ANDAR KA DATA COMPRESS KAREGA LIKE HTML CSS KI SPACE WAGERA ETC'\n#DEFAULT DOCUMENT-WEBSITE BANTI HAI BHUT SARE PAGES SE AB UNME SE KONSA PAGE CLIENT KO DELEIVER KARNA HAI WO BATIGA \njaise abhi index lod ho ra but ab usse disable kar dia toh website nhi chalegi\nab mene directory browsing ki permission de thi wo uski files dekh sakta hai\nadd karke jo page dikhana hai wo bhidikha sakte hai page site me aayega\n#DIRECTORY BROWSING - ME HUM SERVER PE AVAILABLE SITE KE LIYE TOH DIRECTORY BROWSING ON KAROGE TOH SITE PAR DIKHEGI\nab hume koi parrticularr file dalni hai site pe toh wo site me jao add karo aur directory browsing enable kar do toh wo page sabko dikhega ab sabko nhi dikhe toh windows ya basic authuntication laga do ek particular page hi dekhna hai toh uspe directory browsing chalu karenge\n#ERROR PAGEES-JAB KOI ERROR AAYEGI TOH KONSA PAGE KHOLNA HAI KONSI LOCATION PAR BHEJNA HAI AUR KONSI WEBSITE PAR REDIRECT KARWANA HAI YE BATA DEGA HAME\nEXECUTE URL SE KIS PAGE ME LE JANA HAI SITE KI DIRECTORY SE JAB WO ERROR CODE AAI / ke sath location dena hai\nRESPOND WITH REDIRECT WEBSITE SE JAB YE ERROR AI TOH US WEBSITE PE PHEK DO\n"}, {"name": "IIS PANEL OPTION3", "content": "#failed request traccing rule- rule banao trace karo status code do website me wo aaya toh trace karegs\n#handler maping -particular extension kis way me call hoga jaisee koi website php me bani hai uska extension . php hai toh ab konsi library use deal karegi hame wo dekhna hai\n #http redirect - kisi dusre website me redirect karna jab site kam na kar rhi ho ya maintenaance me ho\n 1. have option \n 2. tempory kiya toh status code 307 aayega insect me webite ke netwrok me\n 3. permanent kiya  are).\n2. Authorization: Once inside, you're only allowed to access certain areas or perform specific actions based on your role or permissions.\n\nIn summary:\n\n\n- Authentication confirms identity\n- Authorization defines permissions and access levels\n# OPTIONS-\nSERVER PE CLICK KARKE LAGAOGE TOH WO SABKE LIYE LAGEGI\nek particular site par lagaoge toh uspe lagegi\naur kisi site ke kisi panel me lagana hai toh bhi lag jayegi\n#ab kisi bhi site pe karke dekh lo\n\n#AUTHENTICATION- KON US WEBSITE KO VISIT KAR SAKTA HAI\n1. #anonymous matlab sab us website ko visit kar saakte hai\n2. #basic authentication- only server users with or without ad users use  give username and password in base64 method for encryption it is easy toh encoded so it is not safe \n3. ex-[Basic aGFjazE6MTIz]\n4. #digest authentication- only server users can acees website through it give username and password in  md5 encryption method so it is say to be safe from this password is not given to website so it is secure\n5. ex-Digest username=[\"hack1\", realm=\"Digest\", nonce=\"+Upgraded+v13fd218168705f43cef613048d2963862316b341d4373db0186d1a55f76f723b8fd1bcf392f4687ebf1a3791c62582d427b32969206b86d1c\", uri=\"/\", algorithm=MD5-sess, response=\"55f48a4ecbdf044a685ffd0d1a9d56b7\", qop=auth, nc=00000002, cnonce=\"520d87bf7d338287\"]\n6. #windows authentication- uses ntlm and kerbos protocol in this kerbos protocol is used it is only use with adds\nin kerbos ticket provided so ab id password aur username nhi jayega\nex- \n\n#AUTHORIZATION- WO USER KYA KYA ACCES KAR SKTA HAI \n1.  anonymous ke sath authorization lagaane ki dikkat nhi baki teen ke sath lagana padega\n2. ab add rules me dekh lo\n3. all users acces kar sakte hai add ke\n4. ab hata diye toh authentication hone ke baujud nhi kar sakta acces\n5. ab authentication se hata do aur authorization me anonymous kar do toh bina id password ke visit karne dega\n6. ab kisi specific user hi visit kar pai toh wha defined kar do\n7. deny role se kisi bhi user ko visit karne se rok sakte hai\n8. \n9.   \n"}, {"name": "RAID  Redundant Array of Independent Disks", "content": "A **tape drive** is a data storage device that reads and writes data to a tape, typically magnetic tape. It’s commonly used for **backup** and **archiving** purposes because of its high capacity and relatively low cost. Unlike hard drives or SSDs, tape drives use sequential access, meaning data is stored in a linear fashion, and to access a particular piece of data, the tape has to be fast-forwarded or rewound.\n\n### Types of Tape Drives:\n\n1. **Linear Tape-Open (LTO)**\n    \n    - **LTO** is one of the most popular and widely used tape formats. It offers high capacity and data transfer rates and comes in multiple generations (LTO-1, LTO-2, LTO-3, etc.), with each generation improving on the previous one in terms of capacity, speed, and technology.\n    - **LTO-8** can hold up to 12 TB of uncompressed data, and the newer generations support advanced features like encryption and data compression.\n    - Used primarily in enterprise environments for data backup and archiving.\n2. **Digital Linear Tape (DLT)**\n    \n    - **DLT** was developed by Quantum and is another older but widely used tape format. It has a reputation for high reliability and performance.\n    - It has mostly been replaced by LTO in modern systems but can still be found in legacy environments.\n3. **Travan**\n    \n    - **Travan** is a smaller, more cost-effective format used for personal backup solutions, typically seen in small businesses and home environments.\n    - Travan tape drives are slower and offer lower capacity than LTO or DLT but provide an affordable solution for basic data backup.\n4. **Exabyte (8mm Tape)**\n    \n    - Exabyte used to be a popular tape format, especially in mid-range and enterprise environments. However, it has been largely replaced by LTO. It was an 8mm magnetic tape format with different versions (e.g., Exabyte 8200, 8500).\n    - Its high capacity and reliability made it suitable for data-intensive applications at the time.\n5. **QIC (Quarter-Inch Cartridge)**\n    \n    - **QIC** is an older tape format, originally used for smaller, personal backup systems. It has a very limited storage capacity compared to modern formats and is now considered obsolete.\n    - It was more common in the late 1980s and early 1990s but has been phased out.\n\n### Key Features of Tape Drives:\n\n- **Sequential Access:** Data is written and read sequentially, making it slower to access specific files compared to hard drives, which use random access.\n- **High Capacity:** Modern tape drives offer large storage capacities (multiple terabytes), making them ideal for archiving large datasets.\n- **Cost-Effective:** Tape storage is relatively inexpensive per gigabyte, making it a cost-effective option for long-term data storage and backup.\n- **Durability:** Tape cartridges are durable and can last for decades if stored properly, which makes them excellent for archiving data over long periods.\n# what is raid-\n**RAID** stands for **Redundant Array of Independent Disks**. It’s a technology used to combine multiple physical hard drives (or SSDs) into a single logical unit for improved performance, redundancy (data protection), or both. RAID allows for the use of multiple disks in various configurations, and each configuration offers a different set of benefits, like faster data access, data redundancy, or a combination of the two.\n\nThere are several RAID **levels**, each with its own benefits and trade-offs. Here’s an overview of the most commonly used RAID levels:\n\n### Common RAID Levels:\n\n1. **RAID 0 (Striping)**:\n    \n    - **Purpose:** Increases performance by splitting data across two or more drives.\n    - **How it works:** Data is divided into chunks, which are then written across all drives in the array.\n    - **Pros:** High speed because of simultaneous data access.\n    - **Cons:** No redundancy. If one drive fails, all data is lost.\n    - **Best for:** Applications that require high speed and don't need data redundancy (e.g., gaming, video editing).\n2. **RAID 1 (Mirroring)**:\n    \n    - **Purpose:** Provides redundancy by duplicating the same data on two or more drives.\n    - **How it works:** Data is written identically to two or more drives, so if one drive fails, the data is still available on the other drive.\n    - **Pros:** High data redundancy and fault tolerance.\n    - **Cons:** Storage capacity is halved because data is mirrored on all drives.\n    - **Best for:** Systems that need data protection and reliability, such as personal files or small business servers.\n3. **RAID 5 (Striping with Parity)**:\n    \n    - **Purpose:** Provides a balance between performance, redundancy, and storage efficiency.\n    - **How it works:** Data is striped across multiple drives (like RAID 0), but it also includes parity data (error checking) distributed across all drives. This allows for the recovery of data if one drive fails.\n    - **Pros:** Efficient storage utilization (compared to RAID 1) and redundancy (can withstand one drive failure).\n    - **Cons:** Slower write speeds due to the overhead of calculating parity data.\n    - **Best for:** High-availability applications such as databases or file servers.\n4. **RAID 10 (RAID 1+0, Mirroring + Striping)**:\n    \n    - **Purpose:** Combines the redundancy of RAID 1 and the performance of RAID 0.\n    - **How it works:** Data is mirrored (RAID 1) and then striped across multiple drives (RAID 0).\n    - **Pros:** High performance and redundancy. Can withstand multiple drive failures (if they are not in the same mirrored pair).\n    - **Cons:** Requires at least four drives and sacrifices 50% of storage capacity for redundancy.\n    - **Best for:** Applications that need both high performance and redundancy, like high-end databases or web servers.\n5. **RAID 6 (Striping with Double Parity)**:\n    \n    - **Purpose:** Similar to RAID 5 but with extra redundancy.\n    - **How it works:** Data is striped across multiple drives, but RAID 6 uses two sets of parity data instead of one. This allows the array to tolerate two drive failures.\n    - **Pros:** High redundancy (can withstand two drives failing).\n    - **Cons:** Even slower write speeds than RAID 5 because of the extra parity calculations and requires a minimum of four drives.\n    - **Best for:** Environments where data integrity and fault tolerance are critical, such as large-scale enterprise servers.\n### Other Considerations:\n\n- **RAID 2, 3, and 4**: These are less commonly used today and are mostly obsolete. They involved techniques like bit-level striping or dedicated parity drives, which have been replaced by more efficient levels like RAID 5 and RAID 6."}, {"name": "SOFTWARE DEPLOYMENAT & SECURE SOFTWARE DEPLOYMENT LIFE CYCLE", "content": "![[6-Stages-of-Software-Development-Life-Cycle.jpg]]\n![[6_phases_of_software_development_life_cycle_ce25a52c62.png]]\nsecure software development life cycle=  isme wo jab requirement karega ki aisa aisa application ya website chaiye jab hi developre bata dega aisi aisi ma chud sakti hai ise bachane ke liye pehle hi jyada paisa do toh me ise hone se rokne ke liye bhi kuch karu=\n![[SDLC-Process-VS-SSDLC-Process-(1).webp]]\nglassdor website se jo website making me jinka role rehta hai unki salary bata dega\n\n# Penetration testers, also known as ethical hackers, need a combination of technical and soft skills. \n\nTechnical skills\n\n- **Coding**\n    \n    Penetration testers use coding skills in multiple languages to penetrate networks and systems. \n    \n- **Networking**\n    \n    Penetration testers need to understand network components, such as firewalls, virtual local area networks (VLANs), and network switches. \n    \n- **Security**\n    \n    Penetration testers need to understand how to protect computer systems and networks, and how to implement security measures. \n    \n- **Cybersecurity**\n    \n    Penetration testers need to understand cybersecurity and how to identify and fix vulnerabilities in a system. \n    \n- **Computer forensics**\n    \n    Penetration testers need to understand how to analyze systems and recover information. \n    \n\nSoft skills\n\n- **Communication**: Penetration testers need to be able to communicate their findings to system owners and administrators. \n- **Teamwork**: Penetration testers need to be able to work well with others. \n- **Report writing**: Penetration testers need to be able to write reports that clearly communicate their findings. \n\nEducation and certifications\n\n- Penetration testers typically have a degree in computer science, IT, or cybersecurity. \n- They may also earn professional certifications to demonstrate their skills\n# Security engineers need a variety of skills to protect an organization's systems, networks, and data from security threats. These skills include: \n\n- **Incident response**: The ability to identify, manage, and mitigate security breaches and cyber attacks \n- **Penetration testing**: The ability to simulate cyberattacks to identify security weaknesses \n- **Vulnerability assessment**: The ability to identify and mitigate security risks using vulnerability assessment tools \n- **Network security**: The ability to design, implement, and maintain security systems to protect an organization's IT infrastructure \n\n- **Problem-solving**: The ability to think on your feet and find and implement solutions to security threats \n\n- **Risk assessment**: The ability to assess and manage the risk of security threats \n\n- **Cryptography**: The ability to understand encryption techniques and other cryptographic methods \n\n- **Firewall configuration**: The ability to understand firewall configurations and intrusion detection systems \n\n- **Threat modeling**: The ability to model threats and assess the risk they pose \n\n- **Communication**: The ability to communicate effectively with other team members \n\nOther skills that security engineers may need include: \n\n- Computer networking\n\n- Operating systems\n\n- IT support\n\n- Computer hardware and software\n\n- Computer programming\n\n- Virus protection software\n\n- Data management\n\n- Security standards\n\n- Project management"}, {"name": "WEBSERVER INSTALLATION", "content": "configure webser on client side-\nMICROSOFT PROVIDE - IIS WEBSERVER\nlimited iteraction ke liye website chaiye toh client pe karo\nworlwide access ke liye use hone  wali website chaiye toh server pe karo\nIIS - is a webserver work with http https smtp ftp ftps protocol\n\n|**Port Number**|**Protocol**|**Service**|\n|---|---|---|\n|20|TCP|FTP (File Transfer Protocol - Data Transfer)|\n|21|TCP|FTP (File Transfer Protocol - Command Control)|\n|22|TCP/UDP|SSH (Secure Shell)|\n|23|TCP|Telnet (Unsecured Remote Login)|\n|25|TCP|SMTP (Simple Mail Transfer Protocol)|\n|53|TCP/UDP|DNS (Domain Name System)|\n|67|UDP|DHCP (Dynamic Host Configuration Protocol - Server)|\n|68|UDP|DHCP (Client)|\n|69|UDP|TFTP (Trivial File Transfer Protocol)|\n|80|TCP|HTTP (Hypertext Transfer Protocol - Web Browsing)|\n|110|TCP|POP3 (Post Office Protocol v3 - Email Retrieval)|\n|119|TCP|NNTP (Network News Transfer Protocol)|\n|123|UDP|NTP (Network Time Protocol)|\n|143|TCP|IMAP (Internet Message Access Protocol)|\n|161|UDP|SNMP (Simple Network Management Protocol)|\n|194|TCP|IRC (Internet Relay Chat)|\n|443|TCP|HTTPS (Secure Web Browsing)|\n|465|TCP|SMTPS (Secure SMTP)|\n|587|TCP|SMTP (Mail Submission)|\n|989|TCP|FTPS (FTP Secure - Data)|\n|990|TCP|FTPS (FTP Secure - Control)|\n|993|TCP|IMAPS (Secure IMAP)|\n|995|TCP|POP3S (Secure POP3)|\n|1433|TCP|MS SQL Server|\n|1521|TCP|Oracle Database|\n|3306|TCP|MySQL Database|\n|3389|TCP|RDP (Remote Desktop Protocol)|\n|5060|UDP/TCP|SIP (Session Initiation Protocol - VoIP)|\n|5061|TCP|SIP (Secure SIP - VoIP)|\n\n\n# in client-\nin control panel in program and feature turn off windows feature on and off - then application or ftp server ko chod ke sab le lo baki jo hai rhi rehn do \nthen start\nthen ip se call karo front hand  dikhega\n# then in server hand-\nadd role and fetaure add webserver then jo hai wesa rehn do\nthen in iss application or ftp ko chod ke sab le lo\nab template download kar lo kyunki hum khud ki toh website nhi bana sakte front hand hoti\nfrom templatemo.com\ntemplate download karlo aur jo file aai hai use unzip kar lo\nsubfolder ka nam change kar lo aur bhar le aao\nthen jo subfolder ke andar jo data hai unko apne pc me inetpub me wweroot  me place kar do purana data copy kar lo kahi aur hata do wha se\nclient me bhi karke dekh lo ye sab\nh.w - 5 template download "}];

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Fenced code block toggle
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true;
        codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }

    if (inCode) {
      codeBuffer += (codeBuffer ? '\n' : '') + line;
      continue;
    }

    var e = escHtml(line);

    // Headings
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }

    // HR
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }

    // Blockquote
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFormat(e.slice(5)) + '</blockquote>'; continue; }

    // List item
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var itemText = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\. /,'');
      out += '<li>' + inlineFormat(itemText) + '</li>';
      continue;
    }

    // Empty line
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }

    // Normal paragraph line
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFormat(e) + '</p>';
  }

  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFormat(t) {
  // Inline code
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  // Bold+italic
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'IIS/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// RUN ON PAGE LOAD
window.onload = function() {
  buildSidebar();
  if (NOTES.length > 0) openNote(0);
};
</script>
