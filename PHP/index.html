<script>
var NOTES = [{"name": "PHP Basic 3", "content": "# Loop in Programming\n\n  \n\nA **loop** is a programming structure that repeats a block of code as long as a specified condition is true. It helps automate repetitive tasks without having to write the same code multiple times.\n\n  \n\n---\n\n  \n\n## 🔄 **Types of Loops (Common in Most Languages)**\n\n  \n\n### 1. **`for` loop**\n\nUsed when you know in advance how many times you want to run a block of code.\n\n  \n\n```python\n\nfor i in range(5):\n\n    print(\"Hello\")  # Runs 5 times\n\n```\n\n  \n\n### 2. **`while` loop**\n\nRuns as long as a condition is true.\n\n  \n\n```python\n\ncount = 0\n\nwhile count < 5:\n\n    print(\"Hi\")\n\n    count += 1\n\n```\n\n  \n\n### 3. **`do...while` loop** *(in some languages like C, JavaScript)*\n\nRuns the code **at least once**, then checks the condition.\n\n  \n\n```javascript\n\nlet i = 0;\n\ndo {\n\n    console.log(\"Hey\");\n\n    i++;\n\n} while (i < 5);\n\n```\n\n  \n\n---\n\n  \n\n## 🧠 Why Use Loops?\n\n  \n\n- Automate repeated tasks\n\n- Iterate over items in a list or array\n\n- Perform actions until a condition is met\n\n  \n\n---\n\n  \n\n# Loop Examples\n\n  \n\n## 🔁 **FOR Loop Examples**\n\n  \n\n### ✅ Python\n\n```python\n\n# Print numbers from 1 to 5\n\nfor i in range(1, 6):\n\n    print(i)\n\n  \n\n# Print each item in a list\n\nfruits = [\"apple\", \"banana\", \"cherry\"]\n\nfor fruit in fruits:\n\n    print(fruit)\n\n```\n\n  \n\n### ✅ JavaScript\n\n```javascript\n\n// Print numbers from 0 to 4\n\nfor (let i = 0; i < 5; i++) {\n\n    console.log(i);\n\n}\n\n  \n\n// Loop through an array\n\nlet colors = [\"red\", \"blue\", \"green\"];\n\nfor (let color of colors) {\n\n    console.log(color);\n\n}\n\n```\n\n  \n\n### ✅ C\n\n```c\n\n// Print numbers from 1 to 5\n\nfor (int i = 1; i <= 5; i++) {\n\n    printf(\"%d\\n\", i);\n\n}\n\n  \n\n// Sum of first 5 numbers\n\nint sum = 0;\n\nfor (int i = 1; i <= 5; i++) {\n\n    sum += i;\n\n}\n\nprintf(\"Sum: %d\\n\", sum);\n\n```\n\n  \n\n## 🔁 **WHILE Loop Examples**\n\n  \n\n### ✅ Python\n\n```python\n\n# Print numbers 1 to 5\n\ni = 1\n\nwhile i <= 5:\n\n    print(i)\n\n    i += 1\n\n  \n\n# Print even numbers less than 10\n\ni = 2\n\nwhile i < 10:\n\n    print(i)\n\n    i += 2\n\n```\n\n  \n\n### ✅ JavaScript\n\n```javascript\n\n// Countdown from 5 to 1\n\nlet i = 5;\n\nwhile (i > 0) {\n\n    console.log(i);\n\n    i--;\n\n}\n\n  \n\n// Print numbers < 10 that are divisible by 3\n\nlet j = 0;\n\nwhile (j < 10) {\n\n    if (j % 3 === 0) {\n\n        console.log(j);\n\n    }\n\n    j++;\n\n}\n\n```\n\n  \n\n### ✅ C\n\n```c\n\n// Print numbers from 1 to 3\n\nint i = 1;\n\nwhile (i <= 3) {\n\n    printf(\"%d\\n\", i);\n\n    i++;\n\n}\n\n  \n\n// Double value until it reaches 100\n\nint val = 2;\n\nwhile (val < 100) {\n\n    printf(\"%d\\n\", val);\n\n    val *= 2;\n\n}\n\n```\n\n  \n\n## 🔁 **DO...WHILE Loop Examples**\n\n  \n\n### ✅ JavaScript\n\n```javascript\n\n// Print \"Hello\" at least once\n\nlet i = 0;\n\ndo {\n\n    console.log(\"Hello\");\n\n    i++;\n\n} while (i < 3);\n\n  \n\n// Run a loop until a random number is 5\n\nlet num;\n\ndo {\n\n    num = Math.floor(Math.random() * 10);\n\n    console.log(num);\n\n} while (num !== 5);\n\n```\n\n  \n\n### ✅ C\n\n```c\n\n// Print 1 to 3 using do...while\n\nint i = 1;\n\ndo {\n\n    printf(\"%d\\n\", i);\n\n    i++;\n\n} while (i <= 3);\n\n  \n\n// Ensure at least one execution\n\nint num = 0;\n\ndo {\n\n    printf(\"Executed\\n\");\n\n} while (num != 0);  // Will still run once\n\n```\n\n  \n\n---\n\n  \n\n# Difference Between All Loops\n\n  \n\n| Loop Type   | Condition Checked | Runs At Least Once? | Best Used When...                                |\n\n|-------------|-------------------|----------------------|---------------------------------------------------|\n\n| `for`       | Before each loop  | No                   | You know how many times to run                   |\n\n| `while`     | Before each loop  | No                   | You don't know how many times in advance         |\n\n| `do...while`| After each loop   | **Yes**              | You want to **guarantee** at least one execution |\n\n| `foreach`   | Implicit (collection) | Yes (if not empty) | You want to loop over items in a collection      |\n\n  \n\n---\n\n  \n\n# Break and Continue\n\n  \n\n## 🔹 `break` Statement\n\nStops the loop entirely.\n\n  \n\n```python\n\nfor i in range(5):\n\n    if i == 3:\n\n        break\n\n    print(i)\n\n```\n\n  \n\n## 🔹 `continue` Statement\n\nSkips the current iteration.\n\n  \n\n```python\n\nfor i in range(5):\n\n    if i == 3:\n\n        continue\n\n    print(i)\n\n```\n\n  \n\n---\n\n  \n\n# PHP Array Pointers\n\n  \n\n```php\n\n$colors = [\"red\", \"green\", \"blue\", \"yellow\"];\n\n  \n\necho current($colors);  // red\n\nnext($colors);\n\necho current($colors);  // green\n\nnext($colors);\n\necho key($colors);      // 2\n\necho current($colors);  // blue\n\nprev($colors);\n\necho current($colors);  // green\n\nend($colors);\n\necho current($colors);  // yellow\n\nreset($colors);\n\necho current($colors);  // red\n\n```\n\n  \n\n---\n\n  \n\n# What is a Function?\n\n  \n\n```php\n\nfunction greet($name) {\n\n    echo \"Hello, $name!\";\n\n}\n\ngreet(\"Alice\");  // Output: Hello, Alice!\n\n```\n\n  \n\n## With Return Value\n\n  \n\n```php\n\nfunction add($a, $b) {\n\n    return $a + $b;\n\n}\n\n$result = add(5, 3);\n\necho $result;  // Output: 8\n\n```\n\n\nA **`foreach` loop** is a type of loop designed specifically to iterate over **all elements** in a collection like an array, list, or dictionary — without needing to use an index or counter. It makes looping over items simpler and cleaner.\n\n---\n\n## What is a `foreach` Loop?\n\n- It automatically goes through **each element** in the collection.\n    \n- You don’t have to manage the loop counter or worry about the collection length.\n    \n- Commonly used when you just want to **process every item** in a collection.\n    \n\n---\n\n## Examples of `foreach` Loop in Different Languages\n\n### ✅ PHP\n\nphp\n\nCopyEdit\n\n`$fruits = [\"apple\", \"banana\", \"cherry\"];  foreach ($fruits as $fruit) {     echo $fruit . \"\\\\n\"; }`\n\n### ✅ Python (using `for` which works like `foreach`)\n\npython\n\nCopyEdit\n\n`fruits = [\"apple\", \"banana\", \"cherry\"]  for fruit in fruits:     print(fruit)`\n\n### ✅ JavaScript (`for...of` is like `foreach`)\n\njavascript\n\nCopyEdit\n\n`const fruits = [\"apple\", \"banana\", \"cherry\"];  for (const fruit of fruits) {     console.log(fruit); }`\n\n### ✅ C#\n\ncsharp\n\nCopyEdit\n\n`string[] fruits = { \"apple\", \"banana\", \"cherry\" };  foreach (string fruit in fruits) {     Console.WriteLine(fruit); }`\n"}, {"name": "PHP basic", "content": "  \n\n# 📘 PHP Study Guide: Variables, Datatypes, Reserved Keywords & String Functions\n\n  \n\n---\n\n  \n\n## ❓ What is a variable? Give me a program that holds all data types and define it.\n\n  \n\nA **variable** in PHP is a container used to store data values. Variables start with a `$` sign followed by the name.\n\n  \n\n### ✅ PHP Example with All Data Types:\n\n```php\n\n<?php\n\n// Integer\n\n$age = 25; // Whole number\n\n  \n\n// Float\n\n$price = 99.99; // Decimal number\n\n  \n\n// String\n\n$name = \"Amit Kumar\"; // Sequence of characters\n\n  \n\n// Boolean\n\n$isLoggedIn = true; // true or false\n\n  \n\n// NULL\n\n$emptyValue = NULL; // No value\n\n  \n\n// Array\n\n$colors = array(\"Red\", \"Green\", \"Blue\"); // List of values\n\n  \n\n// Object\n\nclass Car {\n\n    public $brand = \"Toyota\";\n\n    function showBrand() {\n\n        return $this->brand;\n\n    }\n\n}\n\n$myCar = new Car(); // Object instance\n\n  \n\n// Resource\n\n$file = fopen(\"test.txt\", \"w\"); // External file resource\n\n  \n\n// Output data types\n\necho \"Integer: \" . gettype($age) . \"<br>\";\n\necho \"Float: \" . gettype($price) . \"<br>\";\n\necho \"String: \" . gettype($name) . \"<br>\";\n\necho \"Boolean: \" . gettype($isLoggedIn) . \"<br>\";\n\necho \"NULL: \" . gettype($emptyValue) . \"<br>\";\n\necho \"Array: \" . gettype($colors) . \"<br>\";\n\necho \"Object: \" . gettype($myCar) . \"<br>\";\n\necho \"Resource: \" . gettype($file) . \"<br>\";\n\n  \n\nfclose($file);\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n## ❓ What is a datatype?\n\n  \n\nA **datatype** tells the type of data a variable holds. PHP is a loosely typed language, so variable types are determined at runtime.\n\n  \n\n### 📋 PHP Data Types:\n\n| Datatype   | Example          | Description                          |\n\n|------------|------------------|--------------------------------------|\n\n| Integer    | `$x = 10;`       | Whole number                         |\n\n| Float      | `$x = 3.14;`     | Decimal number                       |\n\n| String     | `$x = \"Hello\";`  | Text                                 |\n\n| Boolean    | `$x = true;`     | True or False                        |\n\n| NULL       | `$x = NULL;`     | No value                             |\n\n| Array      | `array(1,2,3)`   | List of values                       |\n\n| Object     | `new Class()`    | Object from a class                  |\n\n| Resource   | `fopen()`        | External resource like file/db conn  |\n\n  \n\n---\n\n  \n\n## ❓ List of reserved keywords of PHP\n\n  \n\nReserved keywords are special words in PHP that **cannot be used** as names for variables, classes, or functions.\n\n  \n\n### 🔒 Reserved Keywords in PHP\n\n  \n\n**Control Structures:**\n\n```\n\nif, else, elseif, endif, while, endwhile, do, for, foreach, endforeach, switch, endswitch, case, default, break, continue, return, goto\n\n```\n\n  \n\n**Functions and Classes:**\n\n```\n\nfunction, const, class, interface, trait, extends, implements, abstract, final, public, protected, private, static, global, var\n\n```\n\n  \n\n**Others:**\n\n```\n\nnamespace, use, new, clone, throw, try, catch, finally, echo, print, isset, empty, die, exit, list, array, match, yield, include, require\n\n```\n\n  \n\n---\n\n  \n\n## ❓ What is PHP String Function with Examples?\n\n  \n\nPHP string functions are used to perform operations on strings like changing case, finding length, replacing text, etc.\n\n  \n\n### ✅ Complete PHP Program for String Functions\n\n```php\n\n<?php\n\necho \"<h2>PHP String Functions Demo</h2>\";\n\n  \n\n$text = \"Hello PHP\";\n\n  \n\n// 1. strlen() - Get length of string\n\necho \"1. Length of '$text': \" . strlen($text) . \"<br>\";\n\n  \n\n// 2. strtoupper() - Convert to uppercase\n\necho \"2. Uppercase: \" . strtoupper($text) . \"<br>\";\n\n  \n\n// 3. strtolower() - Convert to lowercase\n\necho \"3. Lowercase: \" . strtolower($text) . \"<br>\";\n\n  \n\n// 4. strrev() - Reverse the string\n\necho \"4. Reversed: \" . strrev($text) . \"<br>\";\n\n  \n\n// 5. strpos() - Find position of substring\n\necho \"5. Position of 'PHP' in '$text': \" . strpos($text, \"PHP\") . \"<br>\";\n\n  \n\n// 6. str_replace() - Replace text in string\n\necho \"6. Replace 'PHP' with 'Java': \" . str_replace(\"PHP\", \"Java\", $text) . \"<br>\";\n\n  \n\n// 7. trim() - Remove spaces\n\n$raw = \"   Hello World!   \";\n\necho \"7. Trimmed: '\" . trim($raw) . \"'<br>\";\n\n  \n\n// 8. explode() - Split string into array\n\n$csv = \"apple,banana,grape\";\n\n$fruits = explode(\",\", $csv);\n\necho \"8. explode(): \";\n\nprint_r($fruits);\n\necho \"<br>\";\n\n  \n\n// 9. implode() - Join array into string\n\n$joined = implode(\" - \", $fruits);\n\necho \"9. implode(): $joined<br>\";\n\n  \n\n// 10. substr() - Get part of a string\n\necho \"10. Substring: \" . substr($text, 0, 5) . \"<br>\";\n\n?>\n\n```\n\n  \n\n### 🔎 Summary Table\n\n  \n\n| Function        | Purpose                   | Example Output           |\n\n|-----------------|---------------------------|---------------------------|\n\n| `strlen()`      | Length of string          | `strlen(\"Hi\") → 2`        |\n\n| `strtoupper()`  | Convert to uppercase      | `\"hi\" → \"HI\"`             |\n\n| `strtolower()`  | Convert to lowercase      | `\"HI\" → \"hi\"`             |\n\n| `strrev()`      | Reverse string            | `\"abc\" → \"cba\"`           |\n\n| `strpos()`      | Find position             | `\"Hello PHP\" → 6`         |\n\n| `str_replace()` | Replace text              | `\"PHP\" → \"Java\"`          |\n\n| `trim()`        | Remove whitespace         | `\"  hi  \" → \"hi\"`         |\n\n| `explode()`     | Split string into array   | `\"a,b\" → [\"a\", \"b\"]`      |\n\n| `implode()`     | Join array into string    | `[\"a\",\"b\"] → \"a-b\"`       |\n\n| `substr()`      | Get part of string        | `\"Hello\",0,3 → \"Hel\"`     |\n\n  \n\n---\n\n  # others--\n  ### 🧠 **What is PHP?**\n\n**PHP** (Hypertext Preprocessor) is an open-source server-side scripting language primarily used for web development. It allows developers to create dynamic content that interacts with databases. PHP is embedded within HTML and can be used in combination with various web frameworks, databases, and other technologies.\n\n---\n\n### 📌 **Basic PHP Syntax**\n\nPHP syntax is simple and easy to learn. Every PHP file must begin with `<?php` and can optionally end with `?>`. Code statements within PHP files must end with a semicolon (`;`).\n\nphp\n\nCopyEdit\n\n`<?php echo \"Hello, World!\";  // Outputs \"Hello, World!\" ?>`\n\n- PHP code starts with `<?php` and ends with `?>`.\n    \n- Statements end with a semicolon `;`.\n    \n- `echo` is used to output data.\n    \n\n---\n\n### 💬 **PHP Comments**\n\nPHP supports both single-line and multi-line comments:\n\n- **Single-line Comments:**\n    \n    php\n    \n    CopyEdit\n    \n    `// This is a single-line comment # This is another single-line comment`\n    \n- **Multi-line Comments:**\n    \n    php\n    \n    CopyEdit\n    \n    `/* This is a    multi-line comment */`\n    \n\n---\n\n### 🔢 **PHP Variables and Datatypes**\n\n- **Variables** in PHP are prefixed with a dollar sign `$` followed by a name.\n    \n- PHP is **loosely typed**, meaning that variable types are determined at runtime based on the value assigned.\n    \n\n### Example:\n\nphp\n\nCopyEdit\n\n`<?php $age = 25;           // Integer $name = \"Amit\";      // String $price = 99.99;      // Float $isOnline = true;    // Boolean $colors = array(\"Red\", \"Green\"); // Array ?>`\n\n---\n\n### 🔍 **PHP Datatypes**\n\nPHP supports several data types for different types of data:\n\n|**Datatype**|**Description**|\n|---|---|\n|Integer|Whole numbers (e.g., `5`, `-23`)|\n|Float|Decimal numbers (e.g., `3.14`, `-0.75`)|\n|String|Sequence of characters (e.g., `\"Hello\"`)|\n|Boolean|`true` or `false`|\n|NULL|Empty value|\n|Array|Collection of values (e.g., `array(1, 2, 3)`)|\n|Object|Instances of classes (e.g., `new Class()`)|\n|Resource|External resources like file/db connections|\n\n---\n\n### 🔑 **PHP Reserved Keywords**\n\nReserved keywords are predefined words in PHP that have special meaning and cannot be used as variable, function, or class names.\n\n#### List of Reserved Keywords:\n\n- **Control Structures**: `if`, `else`, `elseif`, `endif`, `while`, `do`, `for`, `foreach`, `switch`, `case`, `default`, `break`, `continue`, `return`, `goto`\n    \n- **Functions and Classes**: `function`, `const`, `class`, `interface`, `trait`, `extends`, `implements`, `abstract`, `final`, `public`, `protected`, `private`, `static`, `global`, `var`\n    \n- **Other**: `namespace`, `use`, `new`, `clone`, `throw`, `try`, `catch`, `finally`, `echo`, `print`, `isset`, `empty`, `die`, `exit`, `list`, `array`, `match`, `yield`, `include`, `require`\n    \n\n---\n\n### 🔣 **PHP Operators**\n\nOperators are used to perform operations on variables and values. They can be categorized into the following types:\n\n#### Arithmetic Operators:\n\nphp\n\nCopyEdit\n\n`+   // Addition -   // Subtraction *   // Multiplication /   // Division %   // Modulus`\n\n#### Comparison Operators:\n\nphp\n\nCopyEdit\n\n`==  // Equal to !=  // Not equal to === // Identical (equal and same type) !== // Not identical <   // Less than >   // Greater than <=  // Less than or equal to >=  // Greater than or equal to`\n\n#### Logical Operators:\n\nphp\n\nCopyEdit\n\n`&&  // AND ||  // OR !   // NOT`\n\n---\n\n### 🔁 **PHP Control Structures**\n\n#### **If-Else**\n\nConditional statements that execute blocks of code based on conditions.\n\nphp\n\nCopyEdit\n\n`if ($x > 10) {     echo \"Greater\"; } else {     echo \"Smaller\"; }`\n\n#### **Switch**\n\nSwitch-case is used to execute one out of many blocks of code based on a variable's value.\n\nphp\n\nCopyEdit\n\n`switch ($day) {     case \"Mon\":         echo \"Start\";         break;     default:         echo \"Other day\"; }`\n\n#### **Loops**\n\n- **While Loop:**\n    \n    php\n    \n    CopyEdit\n    \n    `$i = 1; while ($i <= 5) {     echo $i;     $i++; }`\n    \n- **For Loop:**\n    \n    php\n    \n    CopyEdit\n    \n    `for ($i = 0; $i < 5; $i++) {     echo $i; }`\n    \n- **Foreach (For Arrays):**\n    \n    php\n    \n    CopyEdit\n    \n    `$colors = [\"Red\", \"Green\", \"Blue\"]; foreach ($colors as $color) {     echo $color; }`\n    \n\n---\n\n### 🧰 **PHP String Functions**\n\nPHP provides many built-in string functions for operations like length, case conversion, replacing text, and more.\n\n#### Examples:\n\nphp\n\nCopyEdit\n\n`$str = \" Hello PHP \"; echo strlen($str);        // Get the length of the string (11) echo strtoupper($str);    // Convert string to uppercase (\"HELLO PHP\") echo strtolower($str);    // Convert string to lowercase (\"hello php\") echo trim($str);          // Remove spaces (\"Hello PHP\") echo str_replace(\"PHP\", \"World\", $str);  // Replace \"PHP\" with \"World\"`\n\n#### **Common String Functions**:\n\n- `strlen($str)` – Returns the length of the string.\n    \n- `strtoupper($str)` – Converts string to uppercase.\n    \n- `strtolower($str)` – Converts string to lowercase.\n    \n- `trim($str)` – Removes whitespace from both ends of the string.\n    \n- `str_replace($search, $replace, $subject)` – Replaces occurrences of `$search` with `$replace` in the string.\n    \n\n---\n\n### 🧮 **PHP Functions**\n\nFunctions are reusable blocks of code that can accept parameters and return values.\n\nphp\n\nCopyEdit\n\n`function greet($name) {     return \"Hello, $name!\"; } echo greet(\"Amit\");  // Outputs: \"Hello, Amit!\"`\n\n---\n\n### 🗃️ **PHP Arrays**\n\nArrays are used to store multiple values in a single variable. PHP supports both indexed and associative arrays.\n\n- **Indexed Array:**\n    \n    php\n    \n    CopyEdit\n    \n    `$colors = [\"Red\", \"Green\", \"Blue\"]; echo $colors[0];  // Outputs: Red`\n    \n- **Associative Array:**\n    \n    php\n    \n    CopyEdit\n    \n    `$age = [\"Amit\" => 20, \"Rahul\" => 25]; echo $age[\"Amit\"];  // Outputs: 20`\n    \n- **Multidimensional Array:**\n    \n    php\n    \n    CopyEdit\n    \n    `$matrix = [     [1, 2],     [3, 4] ]; echo $matrix[1][0];  // Outputs: 3`\n    \n\n---\n\n### ✅ **Final Practice File (All-in-One Example)**\n\nphp\n\nCopyEdit\n\n`<?php $name = \"Amit\"; $age = 25; $price = 99.99; $isAdmin = true;  echo \"<h1>User Info</h1>\"; echo \"Name: $name<br>\"; echo \"Age: $age<br>\"; echo \"Price: $price<br>\"; echo \"Is Admin: \" . ($isAdmin ? \"Yes\" : \"No\") . \"<br>\";  // Array Example $colors = [\"Red\", \"Green\", \"Blue\"]; foreach ($colors as $c) {     echo \"Color: $c<br>\"; }  // Function Example function add($a, $b) {     return $a + $b; } echo \"Sum: \" . add(5, 10); ?>`\n\n\n\n# Basics of Programming: Data Types, Variables, and Strings\n\n## What is a Data Type?\nA **data type** defines the type of data a variable can hold. It tells the computer how to interpret and store the data.\n\n### Common Data Types:\n- **Integer (`int`)**: Whole numbers (e.g., 1, -5, 42)\n- **Float (`float`)**: Decimal numbers (e.g., 3.14, -0.01)\n- **String (`str`)**: A sequence of characters (e.g., \"Hello\", \"123\")\n- **Boolean (`bool`)**: True or False values\n- **List / Array**: Collection of values (e.g., [1, 2, 3])\n- **Dictionary / Map**: Key-value pairs (e.g., {\"name\": \"Alice\"})\n\n---\n\n## What is a Variable?\nA **variable** is a named container used to store data in a program. It allows data to be reused and manipulated.\n\n### Example (in Python):\n```python\nage = 25       # 'age' is a variable storing an integer\nname = \"Alex\"  # 'name' is a variable storing a string\nKey Points:\nVariables can change value.\n\nVariables must follow naming rules (e.g., can't start with a number, no spaces).\n\nWhat is a String?\nA string is a data type used to store text. It is a sequence of characters enclosed in quotes.\n\nExample:\npython\nCopy\nEdit\nmessage = \"Hello, world!\"\nString Functions (Methods):\nStrings have built-in functions to manipulate text.\n\nFunction\tDescription\tExample\nlen()\tReturns length of the string\tlen(\"hello\") → 5\n.lower()\tConverts to lowercase\t\"Hello\".lower() → \"hello\"\n.upper()\tConverts to uppercase\t\"hello\".upper() → \"HELLO\"\n.replace(old, new)\tReplaces substring\t\"hi there\".replace(\"hi\", \"hello\") → \"hello there\"\n.find(sub)\tFinds index of substring\t\"apple\".find(\"p\") → 1\n.strip()\tRemoves whitespace from ends\t\" hi \".strip() → \"hi\"\n.split(delimiter)\tSplits string into a list\t\"a,b,c\".split(\",\") → [\"a\", \"b\", \"c\"]\n\nvbnet\nCopy\nEdit\n"}, {"name": "first day", "content": "---\n\n## 🧠 Web Security & HTTP Headers Overview\n\nThese topics focus on **how browsers, servers, and web applications exchange and protect data**, mainly through **HTTP headers**, **security policies**, and **JavaScript/browser behavior controls**.\n\n---\n\n### 1. 🧩 Session Variable\n\n- **Definition:** A session variable stores data about a user across multiple pages during their visit.\n    \n- **Example:** When a user logs in, their username or ID can be stored in a PHP session (`$_SESSION['user']`), so they remain logged in while browsing the site.\n    \n- **Security Concern:** If session IDs are stolen (via XSS or sniffing), attackers can **hijack user sessions**.\n    \n- **Protection:** Use HTTPS, HttpOnly cookies, regenerate session IDs, and set short session lifetimes.\n    \n\n---\n\n### 2. 🌍 Global Variable\n\n- **Definition:** A variable accessible from anywhere in the program. In PHP, variables like `$GLOBALS`, `$_SERVER`, `$_GET`, `$_POST`, etc., are global.\n    \n- **Security Concern:** Directly using user input from global arrays can cause **injection attacks** (e.g., SQL Injection, XSS).\n    \n- **Protection:** Always sanitize and validate all global input before use.\n    \n\n---\n\n### 3. 🛡️ Security Response Variable\n\n- **Definition:** Variables or headers returned by the server that define **security behavior** (e.g., CSP, X-Frame-Options, etc.).\n    \n- **Example:** Sending `header(\"X-Content-Type-Options: nosniff\");` prevents browsers from guessing file types, stopping MIME-type attacks.\n    \n\n---\n\n### 4. 📬 HTTP Headers – Types & Working\n\n- **Definition:** HTTP headers are metadata sent between browser and server.\n    \n- **Types:**\n    \n    - **Request Headers:** Sent by client (e.g., `User-Agent`, `Authorization`).\n        \n    - **Response Headers:** Sent by server (e.g., `Content-Type`, `Set-Cookie`, `Cache-Control`).\n        \n- **Security Headers:** Add extra protection (e.g., CSP, XSS Protection, etc.).\n    \n- **Example:**\n    \n    `header(\"Content-Security-Policy: default-src 'self'\"); header(\"X-Frame-Options: DENY\");`\n    \n\n---\n\n### 5. 🔒 HTTPS (HyperText Transfer Protocol Secure)\n\n- **Definition:** Encrypted version of HTTP using SSL/TLS.\n    \n- **Why Important:** Prevents data theft or tampering during transmission.\n    \n- **Security Benefit:** Protects credentials, sessions, and privacy.\n    \n\n---\n\n### 6. 🧱 X-Frame-Options / `<iframe>`\n\n- **Purpose:** Prevents your site from being embedded in an iframe (defending against **clickjacking attacks**).\n    \n- **Header Example:**\n    \n    `header(\"X-Frame-Options: DENY\");  // Completely block iframes header(\"X-Frame-Options: SAMEORIGIN\"); // Allow only same-domain iframes`\n    \n\n---\n\n### 7. 🧰 Content Security Policy (CSP)\n\n- **Definition:** A powerful header that controls what content (scripts, images, CSS, etc.) can load on your site.\n    \n- **Prevents:** XSS, data injection, malicious script execution.\n    \n- **Example:**\n    \n    `header(\"Content-Security-Policy: default-src 'self'; script-src 'self' https://trusted.cdn.com\");`\n    \n\n---\n\n### 8. 💉 XSS (Cross-Site Scripting)\n\n- **Definition:** When attackers inject malicious scripts into web pages viewed by other users.\n    \n- **Example:** Injecting `[script]` into a comment box.\n    \n- **Protection:**\n    \n    - Use CSP\n        \n    - Escape user inputs (`htmlspecialchars()`)\n        \n    - Sanitize inputs and outputs\n        \n\n---\n\n### 9. ❓ What is Cross-Site Scripting (XSS)\n\nIt’s a **client-side code injection attack** where an attacker tricks a web app into delivering malicious JavaScript to other users’ browsers.\n\n- **Goal:** Steal cookies, session tokens, or redirect users to phishing sites.\n    \n\n---\n\n### 10. 🌐 Cross-Origin vs Same-Origin\n\n- **Same-Origin:** Two URLs share the **same protocol, domain, and port**.  \n    Example:\n    \n    - ✅ `https://example.com/page` → `https://example.com/data`\n        \n- **Cross-Origin:** Different domain/protocol/port.\n    \n    - ❌ `https://example.com` → `https://api.othersite.com`\n        \n\n---\n\n### 11. 🕵️‍♂️ Referrer Policy\n\n- **Definition:** Controls what information (like the full URL) is sent in the `Referer` header when navigating to another page.\n    \n- **Example:**\n    \n    `header(\"Referrer-Policy: no-referrer\");`\n    \n- **Options:**\n    \n    - `no-referrer` – send nothing\n        \n    - `same-origin` – send only if same origin\n        \n    - `strict-origin` – send origin only over HTTPS\n        \n\n---\n\n### 12. 🏠 Same-Origin Policy (SOP)\n\n- **Definition:** A fundamental browser rule that **prevents scripts from one origin** from accessing data from another origin.\n    \n- **Purpose:** Prevents malicious sites from reading sensitive data (like cookies or local storage).\n    \n\n---\n\n### 13. 🌍 Cross-Origin Policy (CORS)\n\n- **Definition:** A relaxation of the Same-Origin Policy, controlled by the server through headers.\n    \n- **Header Example:**\n    \n    `header(\"Access-Control-Allow-Origin: https://trusted.com\"); header(\"Access-Control-Allow-Methods: GET, POST\");`\n    \n- **Purpose:** Allows safe sharing of resources between different domains.\n    \n\n---\n\n### 14. ⚙️ Permissions Policy Header\n\n- **Definition:** Restricts access to browser features like camera, microphone, geolocation, etc.\n    \n- **Example:**\n    \n    `header(\"Permissions-Policy: camera=(), geolocation=()\");`\n    \n- **Purpose:** Prevents misuse of device APIs by untrusted code.\n    \n\n---\n\n### 15. 🧾 X-Content-Type-Options\n\n- **Definition:** Prevents browsers from “guessing” file types (called **MIME sniffing**).\n    \n- **Example:**\n    \n    `header(\"X-Content-Type-Options: nosniff\");`\n    \n- **Benefit:** Stops malicious scripts disguised as images or CSS from executing.\n    \n\n---\n\n### ✅ Summary Table\n\n|Topic|Purpose|Security Benefit|\n|---|---|---|\n|Session Variable|Stores user data|Manage authentication|\n|Global Variable|Holds data accessible anywhere|Needs input sanitization|\n|Security Response Variable|Adds security through headers|Controls browser behavior|\n|HTTP Headers|Metadata exchange|Core communication & protection|\n|HTTPS|Encryption layer|Prevents interception|\n|X-Frame-Options|Frame control|Prevents clickjacking|\n|CSP|Content control|Prevents XSS|\n|XSS|Attack type|Steals data or hijacks user|\n|Same-Origin Policy|Restrict data sharing|Stops unauthorized access|\n|CORS|Controlled data sharing|Safe cross-domain requests|\n|Referrer Policy|Limit referral info|Protects privacy|\n|Permission Policy|Control feature access|Prevents API abuse|\n|X-Content-Type-Options|MIME type enforcement|Stops code execution from wrong types|\n\n---\n\nWould you like me to format this as a **GitHub README.md** file (with Markdown styling and emojis) ready for upload to your cybersecurity repository?"}, {"name": "http security response header", "content": "# HTTP Security Response Headers Cheat Sheet[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#http-security-response-headers-cheat-sheet \"Permanent link\")\n\n## Introduction[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#introduction \"Permanent link\")\n\nHTTP Headers are a great booster for web security with easy implementation. Proper HTTP response headers can help prevent security vulnerabilities like Cross-Site Scripting, Clickjacking, Information disclosure and more.\n\nIn this cheat sheet, we will review all security-related HTTP headers, recommended configurations, and reference other sources for complicated headers.\n\n## Security Headers[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#security-headers \"Permanent link\")\n\n### X-Frame-Options[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-frame-options \"Permanent link\")\n\nThe `X-Frame-Options` HTTP response header can be used to indicate whether or not a browser should be allowed to render a page in a `<frame>`, `<iframe>`, `<embed>` or `<object>`. Sites can use this to avoid [clickjacking](https://owasp.org/www-community/attacks/Clickjacking) attacks, by ensuring that their content is not embedded into other sites.\n\nContent Security Policy (CSP) frame-ancestors directive obsoletes X-Frame-Options for supporting browsers ([source](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Frame-Options)).\n\nX-Frame-Options header is only useful when the HTTP response where it is included has something to interact with (e.g. links, buttons). If the HTTP response is a redirect or an API returning JSON data, X-Frame-Options does not provide any security.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation \"Permanent link\")\n\nUse Content Security Policy (CSP) frame-ancestors directive if possible.\n\nDo not allow displaying of the page in a frame.\n\n> `X-Frame-Options: DENY`\n\n### X-XSS-Protection[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-xss-protection \"Permanent link\")\n\nThe HTTP `X-XSS-Protection` response header is a feature of Internet Explorer, Chrome, and Safari that stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.\n\nWARNING: Even though this header can protect users of older web browsers that don't yet support CSP, in some cases, this header can create XSS vulnerabilities in otherwise safe websites [source](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection).\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_1 \"Permanent link\")\n\nUse a Content Security Policy (CSP) that disables the use of inline JavaScript.\n\nDo not set this header or explicitly turn it off.\n\n> `X-XSS-Protection: 0`\n\nPlease see [Mozilla X-XSS-Protection](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection) for details.\n\n### X-Content-Type-Options[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-content-type-options \"Permanent link\")\n\nThe `X-Content-Type-Options` response HTTP header is used by the server to indicate to the browsers that the MIME types advertised in the Content-Type headers should be followed and not guessed.\n\nThis header is used to block browsers' [MIME type sniffing](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types#mime_sniffing), which can transform non-executable MIME types into executable MIME types ([MIME Confusion Attacks](https://blog.mozilla.org/security/2016/08/26/mitigating-mime-confusion-attacks-in-firefox/)).\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_2 \"Permanent link\")\n\nSet the Content-Type header correctly throughout the site.\n\n> `X-Content-Type-Options: nosniff`\n\n### Referrer-Policy[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#referrer-policy \"Permanent link\")\n\nThe `Referrer-Policy` HTTP header controls how much referrer information (sent via the Referer header) should be included with requests.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_3 \"Permanent link\")\n\nReferrer policy has been supported by browsers since 2014. Today, the default behavior in modern browsers is to no longer send all referrer information (origin, path, and query string) to the same site but to only send the origin to other sites. However, since not all users may be using the latest browsers we suggest forcing this behavior by sending this header on all responses.\n\n> `Referrer-Policy: strict-origin-when-cross-origin`\n\n- _NOTE:_ For more information on configuring this header please see [Mozilla Referrer-Policy](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy).\n\n### Content-Type[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#content-type \"Permanent link\")\n\nThe `Content-Type` representation header is used to indicate the original media type of the resource (before any content encoding is applied for sending). If not set correctly, the resource (e.g. an image) may be interpreted as HTML, making XSS vulnerabilities possible.\n\nAlthough it is recommended to always set the `Content-Type` header correctly, it would constitute a vulnerability only if the content is intended to be rendered by the client and the resource is untrusted (provided or modified by a user).\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_4 \"Permanent link\")\n\n> `Content-Type: text/html; charset=UTF-8`\n\n- _NOTE:_ the `charset` attribute is necessary to prevent XSS in **HTML** pages\n- _NOTE_: the `text/html` can be any of the possible [MIME types](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types)\n\n### Set-Cookie[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#set-cookie \"Permanent link\")\n\nThe `Set-Cookie` HTTP response header is used to send a cookie from the server to the user agent, so the user agent can send it back to the server later. To send multiple cookies, multiple Set-Cookie headers should be sent in the same response.\n\nThis is not a security header per se, but its security attributes are crucial.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_5 \"Permanent link\")\n\n- Please read [Session Management Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html#cookies) for a detailed explanation on cookie configuration options.\n\n### Strict-Transport-Security (HSTS)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#strict-transport-security-hsts \"Permanent link\")\n\nThe HTTP `Strict-Transport-Security` response header (often abbreviated as HSTS) lets a website tell browsers that it should only be accessed using HTTPS, instead of using HTTP.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_6 \"Permanent link\")\n\n> `Strict-Transport-Security: max-age=63072000; includeSubDomains; preload`\n\n- _NOTE_: Read carefully how this header works before using it. If the HSTS header is misconfigured or if there is a problem with the SSL/TLS certificate being used, legitimate users might be unable to access the website. For example, if the HSTS header is set to a very long duration and the SSL/TLS certificate expires or is revoked, legitimate users might be unable to access the website until the HSTS header duration has expired.\n\nPlease check out [HTTP Strict Transport Security Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Strict_Transport_Security_Cheat_Sheet.html) for more information.\n\n### Expect-CT ❌[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#expect-ct \"Permanent link\")\n\nThe `Expect-CT` header lets sites opt-in to reporting of Certificate Transparency (CT) requirements. Given that mainstream clients now require CT qualification, the only remaining value is reporting such occurrences to the nominated report-uri value in the header. The header is now less about enforcement and more about detection/reporting.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_7 \"Permanent link\")\n\nDo not use it. Mozilla [recommends](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Expect-CT) avoiding it, and removing it from existing code if possible.\n\n### Content-Security-Policy (CSP)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#content-security-policy-csp \"Permanent link\")\n\nContent Security Policy (CSP) is a security feature that is used to specify the origin of content that is allowed to be loaded on a website or in a web application. It is an added layer of security that helps to detect and mitigate certain types of attacks, including Cross-Site Scripting (XSS) and data injection attacks. These attacks are used for everything from data theft to site defacement to distribution of malware.\n\n- _NOTE_: This header is relevant to be applied in pages which can load and interpret scripts and code, but might be meaningless in the response of a REST API that returns content that is not going to be rendered.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_8 \"Permanent link\")\n\nContent Security Policy is complex to configure and maintain. For an explanation on customization options, please read [Content Security Policy Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Content_Security_Policy_Cheat_Sheet.html)\n\n### Access-Control-Allow-Origin[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#access-control-allow-origin \"Permanent link\")\n\nIf you don't use this header, your site is protected by default by the Same Origin Policy (SOP). What this header does is relax this control in specified circumstances.\n\nThe `Access-Control-Allow-Origin` is a CORS (cross-origin resource sharing) header. This header indicates whether the response it is related to can be shared with requesting code from the given origin. In other words, if siteA requests a resource from siteB, siteB should indicate in its `Access-Control-Allow-Origin` header that siteA is allowed to fetch that resource, if not, the access is blocked due to Same Origin Policy (SOP).\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_9 \"Permanent link\")\n\nIf you use it, set specific [origins](https://developer.mozilla.org/en-US/docs/Glossary/Origin) instead of `*`. Check out [Access-Control-Allow-Origin](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Access-Control-Allow-Origin) for details.\n\n> `Access-Control-Allow-Origin: https://yoursite.com`\n\n- _NOTE_: The use of '*' might be necessary depending on your needs. For example, for a public API that should be accessible from any origin, it might be necessary to allow '*'.\n\n### Cross-Origin-Opener-Policy (COOP)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#cross-origin-opener-policy-coop \"Permanent link\")\n\nThe HTTP `Cross-Origin-Opener-Policy` (COOP) response header allows you to ensure a top-level document does not share a browsing context group with cross-origin documents.\n\nThis header works together with Cross-Origin-Embedder-Policy (COEP) and Cross-Origin-Resource-Policy (CORP) explained below.\n\nThis mechanism protects against attacks like Spectre which can cross the security boundary established by Same Origin Policy (SOP) for resources in the same browsing context group.\n\nAs these headers are very related to browsers, it may not make sense to be applied to REST APIs or clients that are not browsers.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_10 \"Permanent link\")\n\nIsolates the browsing context exclusively to same-origin documents.\n\n> `Cross-Origin-Opener-Policy: same-origin`\n\n### Cross-Origin-Embedder-Policy (COEP)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#cross-origin-embedder-policy-coep \"Permanent link\")\n\nThe HTTP `Cross-Origin-Embedder-Policy` (COEP) response header prevents a document from loading any cross-origin resources that don't explicitly grant the document permission (using [CORP](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#cross-origin-resource-policy-corp) or CORS).\n\n- _NOTE_: Enabling this will block cross-origin resources not configured correctly from loading.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_11 \"Permanent link\")\n\nA document can only load resources from the same origin, or resources explicitly marked as loadable from another origin.\n\n> `Cross-Origin-Embedder-Policy: require-corp`\n\n- _NOTE_: you can bypass it for specific resources by adding the `crossorigin` attribute:\n- `<img src=\"https://thirdparty.com/img.png\" crossorigin>`\n\n### Cross-Origin-Resource-Policy (CORP)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#cross-origin-resource-policy-corp \"Permanent link\")\n\nThe `Cross-Origin-Resource-Policy` (CORP) header allows you to control the set of origins that are empowered to include a resource. It is a robust defense against attacks like [Spectre](https://meltdownattack.com/), as it allows browsers to block a given response before it enters an attacker's process.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_12 \"Permanent link\")\n\nLimit current resource loading to the site and sub-domains only.\n\n> `Cross-Origin-Resource-Policy: same-site`\n\n### Permissions-Policy (formerly Feature-Policy)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#permissions-policy-formerly-feature-policy \"Permanent link\")\n\nPermissions-Policy allows you to control which origins can use which browser features, both in the top-level page and in embedded frames. For every feature controlled by Feature Policy, the feature is only enabled in the current document or frame if its origin matches the allowed list of origins. This means that you can configure your site to never allow the camera or microphone to be activated. This prevents that an injection, for example an XSS, enables the camera, the microphone, or other browser feature.\n\nMore information: [Permissions-Policy](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy)\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_13 \"Permanent link\")\n\nSet it and disable all the features that your site does not need or allow them only to the authorized domains:\n\n> `Permissions-Policy: geolocation=(), camera=(), microphone=()`\n\n- _NOTE_: This example is disabling geolocation, camera, and microphone for all domains.\n\n### FLoC (Federated Learning of Cohorts)[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#floc-federated-learning-of-cohorts \"Permanent link\")\n\nFLoC is a method proposed by Google in 2021 to deliver interest-based advertisements to groups of users (\"cohorts\"). The [Electronic Frontier Foundation](https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea), [Mozilla](https://blog.mozilla.org/en/privacy-security/privacy-analysis-of-floc/), and others believe FLoC does not do enough to protect users' privacy.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_14 \"Permanent link\")\n\nA site can declare that it does not want to be included in the user's list of sites for cohort calculation by sending this HTTP header.\n\n> Permissions-Policy: interest-cohort=()\n\n### Server[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#server \"Permanent link\")\n\nThe `Server` header describes the software used by the origin server that handled the request — that is, the server that generated the response.\n\nThis is not a security header, but how it is used is relevant for security.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_15 \"Permanent link\")\n\nRemove this header or set non-informative values.\n\n> `Server: webserver`\n\n- _NOTE_: Remember that attackers have other means of fingerprinting the server technology.\n\n### X-Powered-By[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-powered-by \"Permanent link\")\n\nThe `X-Powered-By` header describes the technologies used by the webserver. This information exposes the server to attackers. Using the information in this header, attackers can find vulnerabilities easier.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_16 \"Permanent link\")\n\nRemove all `X-Powered-By` headers.\n\n- _NOTE_: Remember that attackers have other means of fingerprinting your tech stack.\n\n### X-AspNet-Version[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-aspnet-version \"Permanent link\")\n\nProvides information about the .NET version.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_17 \"Permanent link\")\n\nDisable sending this header. Add the following line in your `web.config` in the `<system.web>` section to remove it.\n\n`<httpRuntime enableVersionHeader=\"false\" />`\n\n- _NOTE_: Remember that attackers have other means of fingerprinting your tech stack.\n\n### X-AspNetMvc-Version[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-aspnetmvc-version \"Permanent link\")\n\nProvides information about the .NET version.\n\n#### Recommendation[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#recommendation_18 \"Permanent link\")\n\nDisable sending this header. To remove the `X-AspNetMvc-Version` header, add the below line in `Global.asax` file.\n\n`MvcHandler.DisableMvcResponseHeader = true;`\n\n- _NOTE_: Remember that attackers have other means of fingerprinting your tech stack.\n\n### X-Robots-Tag[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#x-robots-tag \"Permanent link\")\n\nThe HTTP `X-Robots-Tag` response header controls how search engines and other automated crawlers index and display resources such as PDFs, images, and other non-HTML content.  \nIt functions similarly to the `<meta name=\"robots\">` tag, but is applied via the HTTP response header, allowing greater flexibility (e.g., for non-HTML files or server-wide rules).\n\n``X-Robots-Tag: noindex, nofollow ````  - **Note:** Only compliant crawlers respect these directives, and they must still make an HTTP request to read the headers before deciding how to handle the content.  #### Recommendation  Use the `X-Robots-Tag` header to control crawler behavior:  - For **private or sensitive content** you don’t want indexed:    > `X-Robots-Tag: noindex, nofollow`   > This prevents compliant search engines from indexing the resource or following links on it.  - For **public content** you want indexed and discoverable (e.g., documentation, datasets):    > `X-Robots-Tag: index, follow`   > This allows search engines to index the resource and follow its links.  You can also use other directives such as `noarchive`, `nosnippet`, or `noimageindex` depending on your needs. Server configuration can apply this header selectively — for example, only on specific file types (like PDFs or images).  ### X-DNS-Prefetch-Control  The `X-DNS-Prefetch-Control` HTTP response header controls DNS prefetching, a feature by which browsers proactively perform domain name resolution on both links that the user may choose to follow as well as URLs for items referenced by the document, including images, CSS, JavaScript, and so forth.  #### Recommendation  The default behavior of browsers is to perform DNS caching which is good for most websites. If you do not control links on your website, you might want to set `off` as a value to disable DNS prefetch to avoid leaking information to those domains.  > `X-DNS-Prefetch-Control: off`  - *NOTE*: Do not rely on this functionality for anything production sensitive: it is not standard or fully supported and implementation may vary among browsers.  ### Public-Key-Pins (HPKP)  The HTTP `Public-Key-Pins` response header is used to associate a specific cryptographic public key with a certain web server to decrease the risk of MITM attacks with forged certificates.  #### Recommendation  This header is deprecated and should not be used anymore.  ## Adding HTTP Headers in Different Technologies  ### PHP  The sample code below sets the `X-Frame-Options` header in PHP.  ```php header(\"X-Frame-Options: DENY\");``\n\n### Apache[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#apache \"Permanent link\")\n\nBelow is an `.htaccess` sample configuration which sets the `X-Frame-Options` header in Apache. Note that without the `always` option, the header will only be sent for certain status codes, as described in [the Apache documentation](https://httpd.apache.org/docs/2.4/mod/mod_headers.html#header).\n\n`<IfModule mod_headers.c> Header always set X-Frame-Options \"DENY\" </IfModule>`\n\n### IIS[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#iis \"Permanent link\")\n\nAdd configurations below to your `Web.config` in IIS to send the `X-Frame-Options` header.\n\n`<system.webServer> ...  <httpProtocol>    <customHeaders>      <add name=\"X-Frame-Options\" value=\"DENY\" />    </customHeaders>  </httpProtocol> ... </system.webServer>`\n\n### HAProxy[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#haproxy \"Permanent link\")\n\nAdd the line below to your front-end, listen, or backend configurations to send the `X-Frame-Options` header.\n\n`http-response set-header X-Frame-Options DENY`\n\n### Nginx[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#nginx \"Permanent link\")\n\nBelow is a sample configuration, it sets the `X-Frame-Options` header in Nginx. Note that without the `always` option, the header will only be sent for certain status codes, as described in [the nginx documentation](https://nginx.org/en/docs/http/ngx_http_headers_module.html#add_header).\n\n`add_header \"X-Frame-Options\" \"DENY\" always;`\n\n### Express[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#express \"Permanent link\")\n\nYou can use [helmet](https://www.npmjs.com/package/helmet) to setup HTTP headers in Express. The code below is a sample for adding the `X-Frame-Options` header.\n\n`const helmet = require('helmet'); const app = express(); // Sets \"X-Frame-Options: SAMEORIGIN\" app.use(  helmet.frameguard({    action: \"sameorigin\",  }) );`\n\n## Testing Proper Implementation of Security Headers[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#testing-proper-implementation-of-security-headers \"Permanent link\")\n\n### Mozilla Observatory[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#mozilla-observatory \"Permanent link\")\n\nThe [Mozilla Observatory](https://observatory.mozilla.org/) is an online tool which helps you to check your website's header status.\n\n### SmartScanner[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#smartscanner \"Permanent link\")\n\n[SmartScanner](https://www.thesmartscanner.com/) has a dedicated [test profile](https://www.thesmartscanner.com/docs/configuring-security-tests) for testing security of HTTP headers. Online tools usually test the homepage of the given address. But SmartScanner scans the whole website. So, you can make sure all of your web pages have the right HTTP Headers in place.\n\n## References[¶](https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html#references \"Permanent link\")\n\n- [Mozilla: X-Frame-Options](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Frame-Options)\n- [Mozilla: X-XSS-Protection](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection)\n- [hstspreload.org](https://hstspreload.org/)\n- [Mozilla: Strict-Transport-Security](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security)\n- [Mozilla: Content-Type](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Type)\n- [Mozilla: Expect-CT](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Expect-CT)\n- [Mozilla: Set-Cookie](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Set-Cookie)\n- [content-security-policy.com](https://content-security-policy.com/)\n- [Mozilla: Cross-Origin-Opener-Policy](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Opener-Policy)\n- [resourcepolicy.fyi](https://resourcepolicy.fyi/)\n- [Mozilla: Cross-Origin-Resource-Policy](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Resource-Policy)\n- [Mozilla: Cross-Origin-Embedder-Policy](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cross-Origin-Embedder-Policy)\n- [Mozilla: Server Header](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Server)\n- [Linked OWASP project: Secure Headers Project](https://owasp.org/www-project-secure-headers/)"}, {"name": "main sever se remote server pe files through vs code", "content": "sftp se bhej do /var/www/html me file bana da php uski location de do program me ab service restart karo ho jayegi'\n## ✅ **Step-by-Step: Transfer Files via SFTP in VS Code**\n\n### 🔧 1. **Install VS Code Extension**\n\nInstall the **“SFTP”** extension (by liximomo):\n\n- Open VS Code\n    \n- Go to **Extensions** (`Ctrl+Shift+X`)\n    \n- Search for: `SFTP` (Author: liximomo)\n    \n- Click **Install**\n    \n\n> ⚠️ Note: There are other extensions like \"Remote - SSH\", but `SFTP` is used for direct file transfer, not live remote editing.\n\n---\n\n### 📁 2. **Create an `sftp.json` Configuration File**\n\nIn your project folder:\n\n- Press `F1` or `Ctrl+Shift+P`\n    \n- Type: `SFTP: config`\n    \n- Press `Enter` to generate a file called `.vscode/sftp.json`\n    \n\n### 📝 Sample `sftp.json` Configuration\n\njson\n\n\n`{   \"host\": \"your.server.ip.or.hostname\",   \"username\": \"your-ssh-user\",   \"password\": \"your-password\",  // OR use \"privateKeyPath\" if using SSH key   \"remotePath\": \"/home/your-ssh-user/app\",  // Remote folder   \"protocol\": \"sftp\",   \"uploadOnSave\": true }`\n\n> 🔐 **Security Tip:** If you're using SSH key authentication (recommended), use this instead of `password`:\n\njson\n\n\n\n`\"privateKeyPath\": \"~/.ssh/id_rsa\"`\n\n---\n\n### 🚀 3. **Upload Files**\n\nYou now have several options:\n\n- **Auto Upload on Save:** If `\"uploadOnSave\": true`, every file you save will automatically upload.\n    \n- **Manual Upload:**\n    \n    - Right-click a file or folder\n        \n    - Choose `SFTP: Upload`\n        \n- **Download from Server:**\n    \n    - Right-click → `SFTP: Download`\n        \n\n---\n\n### 🔁 4. **Sync Local and Remote**\n\nThe extension also allows syncing:\n\n- `SFTP: Sync Local → Remote`\n    \n- `SFTP: Sync Remote → Local`\n    \n\nYou can select these from the command palette (`Ctrl+Shift+P`).\n\n---\n\n### 🛑 Common Troubleshooting\n\n- **Permission denied:** Check that your user has write permissions to the `remotePath`\n    \n- **Connection refused:** Make sure SSH is running on the server:\n    \n    \n    \n    `sudo systemctl status sshd`\n    \n- **Timeouts or delays:** Check firewall rules or if the port (usually `22`) is open.\n\n\n\n# basic program of html=\n<!DOCTYPE html>\n\n\n<html>\n<head>\n\n\n<title>My First HTML Page</title>\n\n</head>\n<body>\n    <h1>Welcome to HTML</h1>\n    <p>This is a paragraph.</p>\n    <a href=\"https://www.example.com\">Visit Example.com</a>\n</body>\n</html>\n## 🧠 **Explanation of the Program**\n\n|Line|Code|Purpose|\n|---|---|---|\n|`<!DOCTYPE html>`|Declares the document type|Tells the browser this is an HTML5 document.|\n|`<html>`|Opening HTML tag|Marks the start of the HTML document.|\n|`<head>`|Metadata section|Contains data about the document (not visible on the page).|\n|`<title>My First HTML Page</title>`|Page title|Displays in the browser tab.|\n|`</head>`|End of head|Marks the end of the metadata section.|\n|`<body>`|Start of visible content|Everything between `<body>` and `</body>` is shown on the webpage.|\n|`<h1>Welcome to HTML</h1>`|Main heading|Displays a large heading (level 1).|\n|`<p>This is a paragraph.</p>`|Paragraph text|Displays a block of text.|\n|`<a href=\"https://www.example.com\">Visit Example.com</a>`|Hyperlink|Clicking this takes you to \"example.com\".|\n|`</body>`|End of visible content|Closes the body section.|\n|`</html>`|End of HTML document|Marks the end of the file.|"}, {"name": "php basic 2", "content": "# PHP Basics: Typecasting, Constants, Control Structures, Operators\n\n  \n\n---\n\n  \n\n## 1. PHP Typecasting\n\n  \n\n**Typecasting** is explicitly converting a variable from one data type to another.\n\n  \n\n### Syntax:\n\n  \n\n```php\n\n$var = (int) \"42\";\n\n$var = (float) \"3.14\";\n\n$var = (string) 100;\n\n$var = (bool) 1;\n\n$var = (array) \"text\";\n\n$var = (object) $array;\n\n```\n\n  \n\n### Why use typecasting?\n\n  \n\n- To control data types explicitly\n\n- For data validation and sanitization\n\n- To avoid type juggling errors\n\n- To ensure strict comparison works correctly\n\n  \n\n### Example:\n\n  \n\n```php\n\n$price = \"99.99\";\n\n$total = (float)$price * 2;\n\necho $total; // 199.98\n\n```\n\n  \n\n---\n\n  \n\n## 2. Types of Typecasting in PHP\n\n  \n\n| Typecast      | Description                 | Example                |\n\n|---------------|-----------------------------|------------------------|\n\n| `(int)`       | Convert to integer           | `(int) \"123.45\" => 123`|\n\n| `(float)`     | Convert to float/double      | `(float) \"123\" => 123.0`|\n\n| `(string)`    | Convert to string            | `(string) 100 => \"100\"`|\n\n| `(bool)`      | Convert to boolean           | `(bool) 0 => false`    |\n\n| `(array)`     | Convert to array             | `(array) \"hello\" => [\"hello\"]` |\n\n| `(object)`    | Convert to object            | `(object) [\"name\"=>\"John\"]`|\n\n  \n\n---\n\n  \n\n## 3. PHP Constants\n\n  \n\nA **constant** holds a fixed value that cannot change during script execution.\n\n  \n\n### Define constants:\n\n  \n\n```php\n\ndefine(\"SITE_NAME\", \"MyWebsite\");\n\nconst PI = 3.14159;\n\n```\n\n  \n\n### Characteristics:\n\n  \n\n- No `$` prefix\n\n- Global scope\n\n- Value cannot be changed once set\n\n  \n\n### Example:\n\n  \n\n```php\n\ndefine(\"DB_HOST\", \"localhost\");\n\necho DB_HOST; // localhost\n\n```\n\n  \n\n---\n\n  \n\n## 4. PHP Control Structures\n\n  \n\nControl structures control the flow of execution.\n\n  \n\n### Conditional statements:\n\n  \n\n```php\n\nif ($age >= 18) {\n\n    echo \"Adult\";\n\n} else {\n\n    echo \"Minor\";\n\n}\n\n  \n\nswitch ($day) {\n\n    case \"Monday\":\n\n        echo \"Start of week\";\n\n        break;\n\n    default:\n\n        echo \"Other day\";\n\n}\n\n```\n\n  \n\n### Loops:\n\n  \n\n```php\n\nfor ($i = 1; $i <= 5; $i++) {\n\n    echo $i;\n\n}\n\n  \n\nwhile ($i <= 5) {\n\n    echo $i++;\n\n}\n\n  \n\nforeach ($arr as $value) {\n\n    echo $value;\n\n}\n\n```\n\n  \n\n### Flow keywords:\n\n  \n\n- `break` — exit loop or switch\n\n- `continue` — skip to next loop iteration\n\n- `return` — exit from function\n\n  \n\n---\n\n  \n\n## 5. PHP Comparison Operators\n\n  \n\n| Operator | Meaning          | Example        | Result         |\n\n|----------|------------------|----------------|----------------|\n\n| `==`     | Equal            | `5 == \"5\"`     | `true`         |\n\n| `===`    | Identical (value + type) | `5 === \"5\"` | `false`       |\n\n| `!=`     | Not equal        | `5 != 4`       | `true`         |\n\n| `<>`     | Not equal        | `5 <> 4`       | `true`         |\n\n| `!==`    | Not identical    | `5 !== \"5\"`    | `true`         |\n\n| `>`      | Greater than     | `7 > 5`        | `true`         |\n\n| `<`      | Less than        | `7 < 5`        | `false`        |\n\n| `>=`     | Greater or equal | `5 >= 5`       | `true`         |\n\n| `<=`     | Less or equal    | `4 <= 5`       | `true`         |\n\n  \n\n---\n\n  \n\n## 6. PHP Logical Operators\n\n  \n\n| Operator | Meaning               | Example                   | Result       |\n\n|----------|-----------------------|---------------------------|--------------|\n\n| `&&`     | AND                   | `$x > 5 && $x < 10`       | true if both |\n\n| `||`     | OR                    | `$x < 5 || $x > 10`       | true if one  |\n\n| `!`      | NOT                   | `!($x == 5)`              | reverses     |\n\n| `and`    | AND (low precedence)  | `true and false`          | false        |\n\n| `or`     | OR (low precedence)   | `true or false`           | true         |\n\n| `xor`    | Exclusive OR          | `true xor false`          | true if only one true |\n\n  \n\n---\n\n  \n\n## 7. `if...else` Statement in PHP\n\n  \n\n### Syntax:\n\n  \n\n```php\n\nif (condition) {\n\n    // code if true\n\n} else {\n\n    // code if false\n\n}\n\n```\n\n  \n\n### Example:\n\n  \n\n```php\n\n$age = 20;\n\n  \n\nif ($age >= 18) {\n\n    echo \"You can vote.\";\n\n} else {\n\n    echo \"You cannot vote.\";\n\n}\n\n```\n\n  \n\n### Extended version:\n\n  \n\n```php\n\nif ($score >= 90) {\n\n    echo \"A\";\n\n} elseif ($score >= 75) {\n\n    echo \"B\";\n\n} else {\n\n    echo \"C\";\n\n}\n\n```\n\n  \n\n---\n\n  \n\n## 8. PHP `switch` Statement\n\n  \n\nUsed to select one of many blocks of code to be executed.\n\n  \n\n### Syntax:\n\n  \n\n```php\n\nswitch ($variable) {\n\n    case value1:\n\n        // code\n\n        break;\n\n    case value2:\n\n        // code\n\n        break;\n\n    default:\n\n        // code if no cases match\n\n}\n\n```\n\n  \n\n### Example:\n\n  \n\n```php\n\n$day = \"Tuesday\";\n\n  \n\nswitch ($day) {\n\n    case \"Monday\":\n\n        echo \"Start of week\";\n\n        break;\n\n    case \"Tuesday\":\n\n        echo \"Second day\";\n\n        break;\n\n    default:\n\n        echo \"Other day\";\n\n}\n\n```\n\n  \n\n---\n\n  \n\nIf you want, I can also save this as a `.md` file and provide it for you! Just let me know."}, {"name": "php basic 4", "content": "# PHP Basics: Scope, User Input, and Superglobals\n\n## 1. What is Scope in PHP?\n\n**Scope** refers to where a variable can be accessed or seen in your PHP code.\n\n### Types of Scope:\n\n### 1. Local Scope\nVariables declared inside a function are only accessible inside that function.\n\n```php\nfunction test() {\n    $x = 10; // local scope\n    echo $x;\n}\ntest();\n// echo $x; // Error: $x is undefined here\n2. Global Scope\nVariables declared outside any function are global but not accessible inside functions unless declared as global.\n\nphp\nCopy\nEdit\n$x = 5;\n\nfunction myFunc() {\n    global $x;\n    echo $x;\n}\nmyFunc(); // Outputs: 5\n3. Static Scope\nStatic variables retain their value between function calls.\n\nphp\nCopy\nEdit\nfunction counter() {\n    static $count = 0;\n    $count++;\n    echo $count;\n}\ncounter(); // 1\ncounter(); // 2\n4. Function Parameters (Argument Scope)\nParameters passed to functions act like local variables inside those functions.\n\nphp\nCopy\nEdit\nfunction greet($name) {\n    echo \"Hello, $name\";\n}\ngreet(\"Alice\"); // Outputs: Hello, Alice\n5. Superglobals\nBuilt-in PHP variables accessible everywhere (inside or outside functions) without global.\n\n6. Scope in Easy Words\nLocal Scope: Variables exist only inside a function (like a person in a locked room).\n\nGlobal Scope: Variables exist outside functions and everywhere else, but need global keyword inside functions.\n\nStatic Scope: Variables inside functions that remember their value between calls.\n\nFunction Parameters: Values given to functions to use inside only.\n\nSuperglobals: Special variables always accessible anywhere.\n\n3. Ways to Get Data from Users on the Web\n4. HTML Forms\nCollect user input using forms.\n\nhtml\nCopy\nEdit\n<form action=\"submit.php\" method=\"POST\">\n  <input type=\"text\" name=\"username\">\n  <input type=\"submit\" value=\"Submit\">\n</form>\n2. URL Parameters (GET)\nSend data through URL query strings.\n\nbash\nCopy\nEdit\nexample.com/search.php?query=apple\n3. POST Requests\nSend data invisibly (not in URL).\n\nAccessed in PHP with $_POST.\n\n4. File Uploads\nhtml\nCopy\nEdit\n<form action=\"upload.php\" method=\"POST\" enctype=\"multipart/form-data\">\n  <input type=\"file\" name=\"myfile\">\n  <input type=\"submit\">\n</form>\n5. AJAX (JavaScript + PHP)\nSend/receive data without reloading the page.\n\n6. Cookies\nStore small data pieces in user browser.\n\n7. Sessions\nStore data on the server across multiple pages.\n\n8. JavaScript Prompts\nSimple popup input box.\n\n9. What is a Superglobal Variable?\nSuperglobals are PHP built-in variables accessible anywhere without declaration.\n\nVariable\tDescription\n$_GET\tData from URL query parameters\n$_POST\tData from form submissions (POST method)\n$_REQUEST\tData from both GET and POST (and COOKIE)\n$_SESSION\tStore data across user sessions\n$_COOKIE\tAccess cookies\n$_FILES\tHandle file uploads\n$_SERVER\tServer and environment info\n$_ENV\tEnvironment variables\n$GLOBALS\tAccess all global variables in the script\n\n5. Practical Examples for Superglobals\n6. $_GET - Get data from URL\nphp\nCopy\nEdit\n// URL: example.com/page.php?name=Alice\necho \"Hello, \" . $_GET['name'];  // Output: Hello, Alice\n7. $_POST - Get data from form submission\nhtml\nCopy\nEdit\n<form action=\"submit.php\" method=\"POST\">\n  <input type=\"text\" name=\"email\">\n  <input type=\"submit\" value=\"Send\">\n</form>\nphp\nCopy\nEdit\n// submit.php\necho \"Email received: \" . $_POST['email'];\n8. $_REQUEST - Works with both GET and POST\nphp\nCopy\nEdit\n$name = $_REQUEST['name'];\necho \"Hi, \" . $name;\n9. $_SERVER - Server and request info\nphp\nCopy\nEdit\necho $_SERVER['SERVER_NAME'];    // e.g., localhost or example.com\necho $_SERVER['REQUEST_METHOD']; // GET or POST\necho $_SERVER['PHP_SELF'];       // Current script name\n10. $_FILES - Handling file uploads\nhtml\nCopy\nEdit\n<form action=\"upload.php\" method=\"POST\" enctype=\"multipart/form-data\">\n  <input type=\"file\" name=\"myfile\">\n  <input type=\"submit\" value=\"Upload\">\n</form>\nphp\nCopy\nEdit\n// upload.php\n$filename = $_FILES['myfile']['name'];\n$tmp = $_FILES['myfile']['tmp_name'];\nmove_uploaded_file($tmp, \"uploads/\" . $filename);\necho \"Uploaded: \" . $filename;\n11. $_COOKIE - Access cookies\nphp\nCopy\nEdit\n// Set cookie\nsetcookie(\"user\", \"John\", time() + 3600); // Expires in 1 hour\n\n// Read cookie\necho \"Welcome \" . $_COOKIE[\"user\"];\n7. $_SESSION - Store session data\nphp\nCopy\nEdit\nsession_start();\n$_SESSION[\"username\"] = \"Alice\";\n\n// On another page\nsession_start();\necho \"Hello, \" . $_SESSION[\"username\"];\n8. $GLOBALS - Access global variables inside functions\nphp\nCopy\nEdit\n$x = 10;\n$y = 20;\n\nfunction add() {\n  $GLOBALS['z'] = $GLOBALS['x'] + $GLOBALS['y'];\n}\n\nadd();\necho $z; // Output: 30\n"}, {"name": "post variable", "content": "**# PHP Superglobal: `$_POST`, Form Methods, and More\n\n  \n\n## `$_POST` Superglobal Variable\n\n  \n\nThe `$_POST` superglobal is an associative array in PHP that holds data sent to the server using the HTTP **POST** method. It is commonly used to collect form data after submitting an HTML form with `method=\"post\"`.\n\n  \n\n### Example:\n\n  \n\n```html\n\n<form method=\"post\" action=\"submit.php\">\n\n  <input type=\"text\" name=\"username\">\n\n  <input type=\"submit\" value=\"Submit\">\n\n</form>\n\n```\n\n  \n\n```php\n\n// submit.php\n\n<?php\n\necho \"Hello, \" . $_POST['username'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n## Difference Between `POST` and `GET` Methods\n\n  \n\n| Feature              | `POST`                                      | `GET`                                      |\n\n|----------------------|----------------------------------------------|---------------------------------------------|\n\n| **Visibility**       | Data is sent in the HTTP **body**, not visible in URL | Data is appended to the **URL** (visible in address bar) |\n\n| **Data Length**      | Can send large amounts of data               | Limited data size (depends on browser/server) |\n\n| **Security**         | More secure for sensitive data (not in URL) | Less secure (data is exposed in URL)        |\n\n| **Use Case**         | For actions like login, signup, form submission | For data retrieval, search queries          |\n\n| **Bookmarking**      | Cannot be bookmarked with form data          | Can be bookmarked (URL contains query)      |\n\n| **Caching**          | Not cached by browsers                      | Can be cached                              |\n\n| **Idempotency**      | Not idempotent (can change server state)     | Usually idempotent (should not change server state) |\n\n  \n\n---\n\n  \n\n## PHP Ternary Operator\n\n  \n\nThe **ternary operator** in PHP is a shorthand for an `if-else` condition. It uses the syntax:\n\n  \n\n```php\n\ncondition ? value_if_true : value_if_false;\n\n```\n\n  \n\n### Example:\n\n  \n\n```php\n\n$age = 18;\n\necho ($age >= 18) ? \"Adult\" : \"Minor\";\n\n```\n\n  \n\nThis will output: `Adult`\n\n  \n\n---\n\n  \n\n## Detecting Form Submission in PHP\n\n  \n\nTo check whether a form has been submitted, you can check if the `$_POST` array contains a specific key, usually from the submit button or an input field.\n\n  \n\n### Example:\n\n  \n\n```php\n\n<?php\n\nif ($_SERVER[\"REQUEST_METHOD\"] == \"POST\") {\n\n    echo \"Form was submitted!\";\n\n}\n\n?>\n\n```\n\n  \n\nYou can also use:\n\n  \n\n```php\n\nif (isset($_POST['submit'])) {\n\n    // form submitted\n\n}\n\n```\n\n  \n\n---\n\n  \n\n## Summary\n\n  \n\n- Use `$_POST` for securely handling form data.\n\n- `POST` and `GET` differ in visibility, size, and use case.\n\n- The ternary operator provides a compact way to write conditional expressions.\n\n- Form submission can be detected using `$_SERVER[\"REQUEST_METHOD\"]` or `isset($_POST['submit'])`.**"}, {"name": "request and response header", "content": "# 🔍 Burp Suite - HTTP Request & Response Header Summary with Real-Life Examples\n\nThis document summarizes HTTP headers observed using **Burp Suite**, with real examples from real-world web applications. Understanding headers is essential for identifying vulnerabilities, session handling, and authentication mechanisms.\n\n---\n\n## 📤 Request Headers (Client → Server)\n\n### ✅ Example\n\n```http\nGET /dashboard HTTP/1.1\nHost: example.com\nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)\nAccept: text/html,application/xhtml+xml\nAccept-Language: en-US,en;q=0.9\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\nCookie: PHPSESSID=8c13cf31fa1f...\nUpgrade-Insecure-Requests: 1\n🔎 Explanation\nHeader\tPurpose\nHost\tTarget domain (example.com).\nUser-Agent\tIdentifies the client (e.g., browser).\nAccept\tDeclares supported content types.\nAccept-Encoding\tEnables compressed responses.\nConnection\tControls connection behavior (keep-alive).\nCookie\tSends session data to server.\nUpgrade-Insecure-Requests\tTells server to prefer HTTPS content.\n\n📥 Response Headers (Server → Client)\n✅ Example\nhttp\nCopy\nEdit\nHTTP/1.1 200 OK\nServer: Apache/2.4.41 (Ubuntu)\nContent-Type: text/html; charset=UTF-8\nContent-Length: 2143\nSet-Cookie: PHPSESSID=8c13cf31fa1f...; path=/; HttpOnly\nX-Frame-Options: SAMEORIGIN\nX-Content-Type-Options: nosniff\nStrict-Transport-Security: max-age=31536000; includeSubDomains\n🔎 Explanation\nHeader\tPurpose\nServer\tReveals backend software (can aid fingerprinting).\nContent-Type\tIndicates response format.\nContent-Length\tSize of the response body.\nSet-Cookie\tSends a session cookie to the browser.\nX-Frame-Options\tPrevents clickjacking attacks.\nX-Content-Type-Options\tBlocks MIME-type sniffing (security).\nStrict-Transport-Security\tForces HTTPS via browser policy.\n\n🔐 Security Observations\nSession tokens (PHPSESSID) are often exposed in Cookie and Set-Cookie.\n\nSecurity headers like X-Frame-Options, Strict-Transport-Security are signs of secure configuration.\n\nMissing Content-Security-Policy or X-XSS-Protection might indicate weak frontend security.\n\n🛠️ Using Burp Suite\nTool\tPurpose\nProxy\tIntercept real-time HTTP traffic.\nRepeater\tModify & resend requests for testing input handling.\nIntruder\tAutomate payload injection (e.g., brute-force login).\nLogger++\tTrack and analyze complete header flow.\n\n📌 Reminder\n🛡️ Always test responsibly. Ensure you have written permission to test any application with Burp Suite or similar tools.\n\njavascript\nCopy\nEdit\n\nWould you like this exported as a downloadable `.md` file or inserted into a specific repo file like `README.md`?\n\n\n\n\n\n\n\n"}, {"name": "second day", "content": "# 🧠 PHP Concepts for Cybersecurity Students (Simplified Guide)\n\nThese are **important PHP concepts** that help cybersecurity students understand **data handling, validation, encoding, encryption, and secure coding**.\n\n---\n\n## 🔹 1. Regular Expressions (RegEx)\n\nUsed to **match patterns** in strings (for validation and filtering).\n\n`<?php $username = \"Cyber_123\"; if (preg_match(\"/^[a-zA-Z0-9_]+$/\", $username)) {     echo \"✅ Valid username<br>\"; } else {     echo \"❌ Invalid username<br>\"; } ?>`\n\n---\n\n## 🔹 2. `preg_replace()` & `preg_split()`\n\nUsed to **replace or split** text using regex.\n\n`<?php $text = \"Hackers love exploiting vulnerabilities!\"; $clean = preg_replace(\"/hackers/i\", \"Security Experts\", $text); echo $clean . \"<br>\";  $words = preg_split(\"/\\s+/\", $text); print_r($words); ?>`\n\n---\n\n## 🔹 3. Encoding & Decoding\n\nUsed to **hide data format**, not for encryption.\n\n`<?php $text = \"CyberSecurity@2025\"; $encoded = urlencode($text); $decoded = urldecode($encoded);  echo \"Encoded: $encoded <br>\"; echo \"Decoded: $decoded <br>\"; ?>`\n\n---\n\n## 🔹 4. HTML Entities / Special Characters\n\nPrevents **XSS attacks** by escaping HTML.\n\n`<?php $input = \"[script]\"; echo htmlspecialchars($input) . \"<br>\";  echo htmlentities($input) . \"<br>\"; echo html_entity_decode(\"&lt;b&gt;Secure&lt;/b&gt;\") . \"<br>\"; ?>`\n\n---\n\n## 🔹 5. Base64 Encoding & Decoding\n\nUsed to store data safely in text form (not secure encryption).\n\n`<?php $data = \"Sensitive Data\"; $encoded = base64_encode($data); $decoded = base64_decode($encoded);  echo \"Encoded: $encoded <br>\"; echo \"Decoded: $decoded <br>\"; ?>`\n\n---\n\n## 🔹 6. Hashing (MD5, SHA1, SHA256, SHA512)\n\nConverts data into **fixed-length secure strings**.\n\n`<?php $password = \"MySecret123\"; echo \"MD5: \" . md5($password) . \"<br>\"; echo \"SHA1: \" . sha1($password) . \"<br>\"; echo \"SHA256: \" . hash('sha256', $password) . \"<br>\"; echo \"SHA512: \" . hash('sha512', $password) . \"<br>\"; ?>`\n\n---\n\n## 🔹 7. Reversible vs Non-Reversible Hash\n\n- **Reversible** – base64_encode(), you can decode it.\n    \n- **Non-Reversible** – md5(), sha256(), cannot be reversed.  \n    ✅ Always use **non-reversible hashes** for passwords.\n    \n\n---\n\n## 🔹 8. `password_hash()` & 9. `password_verify()`\n\nModern, secure way to **store and verify passwords**.\n\n`<?php $pass = \"Secure@123\"; $hash = password_hash($pass, PASSWORD_DEFAULT); echo \"Password Hash: $hash <br>\";  if (password_verify($pass, $hash)) {     echo \"✅ Password matched!<br>\"; } else {     echo \"❌ Invalid password!<br>\"; } ?>`\n\n---\n\n## 🔹 10. Include & Require\n\nUsed to **add external PHP files**.\n\n`<?php include 'header.php';       // Includes even if missing require 'config.php';       // Fatal error if missing include_once 'menu.php';    // Includes only once require_once 'footer.php';  // Includes only once ?>`\n\n⚠️ Avoid user-controlled paths — prevents **LFI (Local File Inclusion)** attacks.\n\n---\n\n## 🔹 11. OS Functionality\n\nRuns system commands from PHP.\n\n`<?php $cmd = \"whoami\"; // Shows current user echo shell_exec($cmd); ?>`\n\n⚠️ Dangerous if user input is unsanitized — may lead to **Command Injection**.\n\n---\n\n## 🔹 12. File System Functionality\n\nUsed to read/write files. Be careful with **file uploads**.\n\n`<?php $file = \"log.txt\"; if (file_exi
