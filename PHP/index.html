sts($file)) {     echo \"File size: \" . filesize($file) . \" bytes<br>\";     echo \"Content: \" . file_get_contents($file); } else {     echo \"File not found!\"; } ?>`\n\n---\n\n## 🔹 13. PHP Error Display\n\nShows all PHP errors (useful for debugging).\n\n`<?php error_reporting(E_ALL); ini_set('display_errors', 1); echo \"Error display enabled.<br>\"; ?>`\n\n⚠️ Disable in production — hides system info from attackers.\n\n---\n\n## 🔹 14. OS Command Execution Example (Practical)\n\nRun a real system command securely (never take input directly!).\n\n`<?php $command = escapeshellcmd(\"ls -l\"); // Sanitized $output = shell_exec($command); echo \"<pre>$output</pre>\"; ?>`\n\n---\n\n## 🔹 15. Learn More\n\n👉 Visit **W3Schools PHP Tutorial** for examples, syntax, and safe coding practices.\n\n---\n\n# 🧩 Combined Example – Everything Together\n\nHere’s a **big code sample** showing many of the concepts working together:\n\n`<?php error_reporting(E_ALL); ini_set('display_errors', 1);  // --- 1. Input validation --- $user = \"Cyber_Student01\"; if (preg_match(\"/^[a-zA-Z0-9_]+$/\", $user)) {     echo \"✅ Valid username<br>\"; } else {     echo \"❌ Invalid username<br>\"; }  // --- 2. Encoding & decoding --- $data = \"Cyber@2025\"; $encoded = base64_encode($data); echo \"Encoded data: $encoded<br>\"; echo \"Decoded data: \" . base64_decode($encoded) . \"<br>\";  // --- 3. Hashing and password security --- $plain = \"MySecurePassword!\"; $hash = password_hash($plain, PASSWORD_DEFAULT); echo \"Hash: $hash<br>\";  if (password_verify($plain, $hash)) {     echo \"✅ Password verified<br>\"; } else {     echo \"❌ Wrong password<br>\"; }  // --- 4. HTML entity encoding (prevent XSS) --- $input = \"[script]\"; echo \"Safe output: \" . htmlspecialchars($input) . \"<br>\";  // --- 5. File and OS functions --- $file = \"test.txt\"; file_put_contents($file, \"This is a test log entry.\\n\"); echo \"File created.<br>\";  if (file_exists($file)) {     echo \"File size: \" . filesize($file) . \" bytes<br>\"; }  // --- 6. OS Command (safe example) --- $cmd = escapeshellcmd(\"whoami\"); echo \"Running as: \" . shell_exec($cmd) . \"<br>\"; ?>`\n\n---\n\n# ✅ Quick Summary\n\n|Concept|Purpose|Security Relevance|\n|---|---|---|\n|RegEx|Validate inputs|Prevent injection attacks|\n|HTML Entities|Escape HTML|Prevent XSS|\n|Base64|Encode data|Not secure encryption|\n|Hashing|Data integrity|Non-reversible|\n|password_hash()|Secure password storage|Recommended|\n|include/require|Modular code|Avoid LFI/RFI|\n|File functions|Read/write|Prevent file upload abuse|\n|OS commands|System interaction|Avoid injection|\n|Error reporting|Debugging|Hide in production|"}, {"name": "super global variables", "content": "# PHP Superglobals, URL Encoding, and GET Request Form – Reference\n\n  \n\n## 🧩 PHP Superglobals\n\n  \n\n### 1. `$_GET`\n\nCollects data sent via URL query string.\n\n  \n\n**Example URL:**\n\n```\n\nhttp://example.com/get-example.php?name=John\n\n```\n\n  \n\n**get-example.php**\n\n```php\n\n<?php\n\necho \"Hello, \" . $_GET['name'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 2. `$_POST`\n\nCollects data from an HTML form using POST method.\n\n  \n\n**form-post.html**\n\n```html\n\n<form action=\"post-example.php\" method=\"post\">\n\n  <input type=\"text\" name=\"email\">\n\n  <input type=\"submit\" value=\"Submit\">\n\n</form>\n\n```\n\n  \n\n**post-example.php**\n\n```php\n\n<?php\n\necho \"Email: \" . $_POST['email'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 3. `$_REQUEST`\n\nContains combined data from `$_GET`, `$_POST`, and `$_COOKIE`.\n\n  \n\n**form-request.html**\n\n```html\n\n<form action=\"request-example.php\" method=\"post\">\n\n  <input type=\"text\" name=\"username\">\n\n  <input type=\"submit\" value=\"Submit\">\n\n</form>\n\n```\n\n  \n\n**request-example.php**\n\n```php\n\n<?php\n\necho \"Username: \" . $_REQUEST['username'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 4. `$_SERVER`\n\nProvides server and execution environment info.\n\n  \n\n**server-example.php**\n\n```php\n\n<?php\n\necho \"Server Name: \" . $_SERVER['SERVER_NAME'] . \"<br>\";\n\necho \"Request Method: \" . $_SERVER['REQUEST_METHOD'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 5. `$_FILES`\n\nHandles file uploads.\n\n  \n\n**form-file.html**\n\n```html\n\n<form action=\"file-upload.php\" method=\"post\" enctype=\"multipart/form-data\">\n\n  <input type=\"file\" name=\"myfile\">\n\n  <input type=\"submit\" value=\"Upload\">\n\n</form>\n\n```\n\n  \n\n**file-upload.php**\n\n```php\n\n<?php\n\necho \"File name: \" . $_FILES['myfile']['name'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 6. `$_SESSION`\n\nStores session variables.\n\n  \n\n**session-example.php**\n\n```php\n\n<?php\n\nsession_start();\n\n$_SESSION['user'] = \"Alice\";\n\necho \"User: \" . $_SESSION['user'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 7. `$_COOKIE`\n\nStores cookie data.\n\n  \n\n**cookie-set.php**\n\n```php\n\n<?php\n\nsetcookie(\"favColor\", \"blue\", time() + 3600);\n\necho \"Cookie set!\";\n\n?>\n\n```\n\n  \n\n**cookie-get.php**\n\n```php\n\n<?php\n\necho \"Favorite Color: \" . $_COOKIE['favColor'];\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 8. `$_ENV`\n\nEnvironment variables.\n\n  \n\n**env-example.php**\n\n```php\n\n<?php\n\necho getenv('PATH');\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### 9. `$GLOBALS`\n\nAccess global variables inside functions.\n\n  \n\n**globals-example.php**\n\n```php\n\n<?php\n\n$x = 5;\n\n$y = 10;\n\n  \n\nfunction add() {\n\n  $GLOBALS['z'] = $GLOBALS['x'] + $GLOBALS['y'];\n\n}\n\n  \n\nadd();\n\necho \"Sum: \" . $z;\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n## 🔐 URL Encoding\n\n  \n\n### `urlencode()`\n\n  \n\n```php\n\n<?php\n\necho urlencode(\"Hello World!\"); // Output: Hello+World%21\n\n?>\n\n```\n\n  \n\n### `rawurlencode()`\n\n  \n\n```php\n\n<?php\n\necho rawurlencode(\"Hello World!\"); // Output: Hello%20World%21\n\n?>\n\n```\n\n  \n\n### Comparison\n\n  \n\n| Function         | Space becomes | Best For          |\n\n|------------------|---------------|-------------------|\n\n| `urlencode()`     | `+`           | Query strings     |\n\n| `rawurlencode()`  | `%20`         | URL paths         |\n\n  \n\n---\n\n  \n\n## 🌐 HTML GET Request Form Example\n\n  \n\n**form-get.html**\n\n```html\n\n<form action=\"process-get.php\" method=\"get\">\n\n  <label for=\"name\">Enter your name:</label>\n\n  <input type=\"text\" id=\"name\" name=\"name\">\n\n  <br>\n\n  <label for=\"age\">Enter your age:</label>\n\n  <input type=\"number\" id=\"age\" name=\"age\">\n\n  <br>\n\n  <input type=\"submit\" value=\"Submit\">\n\n</form>\n\n```\n\n  \n\n**process-get.php**\n\n```php\n\n<?php\n\n$name = $_GET['name'];\n\n$age = $_GET['age'];\n\necho \"Hello, $name. You are $age years old.\";\n\n?>\n\n```\n\n  \n\n---\n\n  \n\nLet me know if you'd like a version with POST handling or file download examples."}, {"name": "third day", "content": "## 1. Type Casting and Type Juggling\n\n### 🧠 Explanation:\n\n- **Type Casting** = Manually changing a variable’s data type.\n    \n- **Type Juggling** = Automatic type conversion done by PHP during operations.\n    \n\nPHP is a _loosely typed_ language — it automatically converts between types when needed.\n\n### 💻 Example:\n\n`<?php // Type Casting $number = \"10\";        // string $intNumber = (int)$number; // cast to integer  echo $intNumber + 5;  // Output: 15  // Type Juggling $val = \"5\" + 10;       // PHP automatically converts \"5\" (string) to int echo $val;             // Output: 15 ?>`\n\n### 🌍 Real-life Example:\n\nWhen you collect user input from a form (like \"25\" as text) and need to do arithmetic:\n\n`$age = (int)$_POST['age'];  // Ensure it’s treated as a number`\n\n---\n\n## 🚨 2. False Positive\n\n### 🧠 Explanation:\n\nA **false positive** means PHP interprets a value as _true_ even though it shouldn’t logically be true.  \nIn PHP, certain values are considered _false_ in Boolean context — everything else is _true_.\n\n### 💻 Example:\n\n`<?php if (\"0\") {      echo \"True\";  } else {      echo \"False\";  } ?>`\n\n👉 Output: **False**, because `\"0\"` is the _only_ string considered false.\n\n### 🌍 Real-life Example:\n\nForm validation – `\"0\"` may represent “No”, but PHP could misinterpret it if you don’t check correctly:\n\n`if ($input == false) echo \"Invalid\"; // Might wrongly mark \"0\" as invalid`\n\n---\n\n## ⚖️ 3. Double Equal (==) vs Triple Equal (===)\n\n### 🧠 Explanation:\n\n- `==` → Compares **values only**, after type juggling (loose comparison).\n    \n- `===` → Compares **values and data types** (strict comparison).\n    \n\n### 💻 Example:\n\n`<?php $a = 0; $b = \"0\"; $c = false;  var_dump($a == $b);   // true (same value) var_dump($a === $b);  // false (different types) var_dump($a == $c);   // true (type juggled) var_dump($a === $c);  // false ?>`\n\n### 🌍 Real-life Example:\n\nWhen checking login input:\n\n`if ($userInput === $storedValue) {     echo \"Valid User\"; } else {     echo \"Invalid User\"; }`\n\nUsing `===` prevents `\"0\"` and `false` from being treated as equal accidentally.\n\n---\n\n## 🧰 4. Common Problems and Their Solutions\n\n|Problem|Cause|Solution|\n|---|---|---|\n|**Undefined Index**|Accessing array key that doesn’t exist|Use `isset()` before accessing|\n|**Division by Zero**|Denominator is 0|Check before dividing|\n|**File Not Found**|Wrong file path in `include`/`require`|Use `file_exists()`|\n|**SQL Injection**|Unsafe user input in SQL|Use prepared statements (PDO/MySQLi)|\n|**Cross-Site Scripting (XSS)**|Outputting user input directly|Use `htmlspecialchars()`|\n\n### 💻 Example:\n\n`<?php if (isset($_GET['name'])) {     echo htmlspecialchars($_GET['name']); // prevent XSS } else {     echo \"Name not provided.\"; } ?>`\n\n### 🌍 Real-life Example:\n\nLogin forms or search boxes — always validate and sanitize user inputs to prevent security issues.\n\n---\n\n## 🌐 5. HTTP Overview\n\n### 🧠 Explanation:\n\n**HTTP (HyperText Transfer Protocol)** is the foundation of web communication between **client (browser)** and **server**.\n\n- It uses **request-response** model.\n    \n- Common methods:\n    \n    - `GET` → Retrieve data\n        \n    - `POST` → Send data\n        \n    - `PUT` → Update data\n        \n    - `DELETE` → Remove data\n        \n\n### 💻 Example:\n\n`<?php if ($_SERVER['REQUEST_METHOD'] == 'POST') {     $username = $_POST['username'];     echo \"Hello, $username!\"; } ?>`\n\nHTML form:\n\n`<form method=\"POST\">     <input type=\"text\" name=\"username\" />     <button type=\"submit\">Submit</button> </form>`\n\n### 🌍 Real-life Example:\n\nWhen you log into Facebook:\n\n- Your browser sends a `POST` request with your credentials.\n    \n- The server checks and sends back a `200 OK` or `403 Forbidden` response.\n    \n\n---\n\n✅ **Summary Table**\n\n|Topic|Meaning|Example|\n|---|---|---|\n|Type Casting|Manual type change|`(int)\"10\"` → 10|\n|Type Juggling|Auto conversion by PHP|`\"5\" + 10` → 15|\n|False Positive|Misleading truthy/falsey value|`\"0\"` = false|\n|== vs ===|Loose vs strict comparison|`\"5\" == 5` ✅, `\"5\" === 5` ❌|\n|Common Problems|Typical PHP issues|Use `isset()`, `htmlspecialchars()`|\n|HTTP Overview|Web communication protocol|GET/POST between client & server|"}];

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Fenced code block toggle
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true;
        codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }

    if (inCode) {
      codeBuffer += (codeBuffer ? '\n' : '') + line;
      continue;
    }

    var e = escHtml(line);

    // Headings
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }

    // HR
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }

    // Blockquote
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFormat(e.slice(5)) + '</blockquote>'; continue; }

    // List item
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var itemText = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\. /,'');
      out += '<li>' + inlineFormat(itemText) + '</li>';
      continue;
    }

    // Empty line
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }

    // Normal paragraph line
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFormat(e) + '</p>';
  }

  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFormat(t) {
  // Inline code
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  // Bold+italic
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'PHP/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// RUN ON PAGE LOAD
window.onload = function() {
  buildSidebar();
  if (NOTES.length > 0) openNote(0);
};
</script>
