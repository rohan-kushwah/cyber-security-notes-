<script>
// ALL NOTES DATA
const NOTES = [{"name": "Basic of ethical hacking", "content": "# Information Security vs Cybersecurity\n\n## What is Information Security?\n**Information Security (InfoSec)** is the practice of protecting all forms of information—whether digital or physical—from unauthorized access, disclosure, alteration, or destruction.\n\n### Key Focus Areas:\n- Confidentiality, Integrity, and Availability (CIA Triad)\n- Protection of paper records, intellectual property, and verbal communications\n- Broader than just digital assets\n\n---\n\n## What is Cybersecurity?\n**Cybersecurity** is a subset of information security that specifically focuses on protecting digital systems, networks, and data from cyber threats.\n\n### Key Focus Areas:\n- Internet-connected systems\n- Malware, ransomware, phishing, and hacking prevention\n- Network security, application security, endpoint protection\n\n---\n\n## Difference Between Information Security and Cybersecurity\n\n| Aspect              | Information Security                  | Cybersecurity                        |\n|---------------------|----------------------------------------|--------------------------------------|\n| Scope               | Broad – includes physical & digital   | Narrower – focused on digital assets |\n| Focus               | Information in any form               | Protection of digital systems        |\n| Examples            | Locking file cabinets, access control | Firewalls, antivirus, intrusion detection |\n| Dependency          | Includes cybersecurity as a subset    | Part of the larger InfoSec umbrella  |\n\n---\n\n# What is Hacking?\n**Hacking** is the act of gaining unauthorized access to data in a system or network, often exploiting vulnerabilities.\n\n### Types of Hacking:\n- System hacking\n- Network hacking\n- Social engineering\n\n---\n\n# What is Ethical Hacking?\n**Ethical Hacking** involves legally breaking into systems and networks to test their security. Ethical hackers help organizations find and fix vulnerabilities.\n\n### Purpose:\n- Improve security\n- Prevent real attacks\n- Compliance testing\n\n---\n\n## Difference Between Hacking and Ethical Hacking\n\n| Aspect        | Hacking                                | Ethical Hacking                      |\n|---------------|----------------------------------------|--------------------------------------|\n| Legality      | Illegal (unauthorized access)          | Legal (authorized testing)           |\n| Intent        | Harmful (data theft, damage)           | Helpful (identify and fix flaws)     |\n| Tools         | Same tools, different usage            | Used with permission and reporting   |\n\n---\n\n# Types of Hackers\n\n## White Hat Hacker\n- Ethical hacker\n- Works with organizations\n- Goal: Protect and secure systems\n\n## Black Hat Hacker\n- Malicious hacker\n- Works independently or for crime groups\n- Goal: Exploit systems for personal gain\n\n---\n\n## Difference Between White Hat and Black Hat Hackers\n\n| Aspect           | White Hat Hacker                      | Black Hat Hacker                      |\n|------------------|----------------------------------------|----------------------------------------|\n| Intent           | Defensive – protect systems           | Offensive – exploit systems            |\n| Legality         | Legal                                 | Illegal                                |\n| Employment       | Security firms, government, companies | Underground networks                   |\n| Methods Used     | Same techniques, with authorization   | Same techniques, without authorization |\n\n---\n"}, {"name": "CIA", "content": "# 🛡️ CIA Triad in Cybersecurity\n\nThe **CIA Triad** is a fundamental model in cybersecurity that guides how organizations protect data and systems.  \nIt stands for **Confidentiality**, **Integrity**, and **Availability**.\n\n---\n\n## 🔒 Confidentiality\n**Definition:**  \nEnsuring that information is accessible **only to authorized people** and not disclosed to unauthorized individuals.\n\n**Digital Example:**  \n- Using **encryption** (like HTTPS or AES) to protect sensitive data such as passwords or credit card information.\n\n**Real-Life Example:**  \n- Locking confidential paper documents in a **safe** so only authorized personnel can access them.\n\n---\n\n## 🧾 Integrity\n**Definition:**  \nMaintaining the **accuracy and trustworthiness** of data — ensuring it is **not altered or tampered with**, intentionally or accidentally.\n\n**Digital Example:**  \n- Using **checksums** or **digital signatures** to verify that a file hasn’t been modified during transfer.\n\n**Real-Life Example:**  \n- A **bank ledger** being kept accurate so no one can change the numbers without authorization.\n\n---\n\n## ⚙️ Availability\n**Definition:**  \nEnsuring that information and systems are **accessible when needed** by authorized users.\n\n**Digital Example:**  \n- Using **redundant servers** or **DDoS protection** to keep a website online even during an attack.\n\n**Real-Life Example:**  \n- Keeping **backup generators** to ensure an office’s computers stay powered during a blackout.\n\n---\n\n## 🧠 Summary Table\n\n| CIA Principle       | Meaning                | Digital Example              | Real-Life Example         |\n|---------------------|------------------------|-------------------------------|----------------------------|\n| **Confidentiality** | Keep data private      | Data encryption               | Locking a safe             |\n| **Integrity**       | Keep data accurate     | Checksums, hashing            | Accurate bank ledger       |\n| **Availability**    | Keep data accessible   | Backup servers, DDoS defense  | Backup generators          |\n\n---\n\nThe **CIA Triad** helps balance these three principles to ensure a system’s security, reliability, and trustworthiness.\n\n# common vulneriblity scoring system-\n# 🔐 CVSS Example\n\n## Example 1: SQL Injection Vulnerability (Web Application)\n\n**Description:**  \nA SQL injection vulnerability in a web application's login form allows attackers to extract all user data.\n\n**CVSS v3.1 Vector String:**  \nCVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:L\n\n\n### 🧩 Metric Breakdown\n\n| **Metric** | **Meaning** | **Value** |\n|-------------|-------------|-----------|\n| **AV (Attack Vector)** | Can be exploited remotely over a network | **N (Network)** |\n| **AC (Attack Complexity)** | Easy to exploit | **L (Low)** |\n| **PR (Privileges Required)** | No authentication needed | **N (None)** |\n| **UI (User Interaction)** | No user interaction required | **N (None)** |\n| **S (Scope)** | Impacts only the vulnerable component | **U (Unchanged)** |\n| **C (Confidentiality)** | High data exposure (e.g., all user data) | **H (High)** |\n| **I (Integrity)** | Attackers can modify database content | **H (High)** |\n| **A (Availability)** | System remains available but slightly impacted | **L (Low)** |\n\n**CVSS Base Score:** **9.1 (Critical)**\n\n---\n\n## Example 2: Local Privilege Escalation Vulnerability\n\n**Description:**  \nA local user can exploit a kernel flaw to gain administrative privileges.\n\n**CVSS v3.1 Vector String:**  \nCVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H\n\n\n### 🧩 Metric Breakdown\n\n| **Metric** | **Meaning** | **Value** |\n|-------------|-------------|-----------|\n| **AV (Attack Vector)** | Requires local access | **L (Local)** |\n| **AC (Attack Complexity)** | Requires specific conditions | **H (High)** |\n| **PR (Privileges Required)** | Requires low privileges | **L (Low)** |\n| **UI (User Interaction)** | No user interaction required | **N (None)** |\n| **S (Scope)** | Impacts only the vulnerable component | **U (Unchanged)** |\n| **C (Confidentiality)** | Full read access to sensitive data | **H (High)** |\n| **I (Integrity)** | Attackers can modify system components | **H (High)** |\n| **A (Availability)** | Full system compromise possible | **H (High)** |\n\n**CVSS Base Score:** **7.8 (High)**\n\n---\n\n✅ **Summary:**\n- Example 1 (SQL Injection): **9.1 – Critical**\n- Example 2 (Privilege Escalation): **7.8 – High**\n"}, {"name": "Defence in depth and Ciso", "content": "# Defense in Depth (DiD) – Cybersecurity Layers\n\n**Defense in Depth (DiD)** is a multi-layered cybersecurity strategy that applies multiple controls across different areas of an organization’s IT environment.  \nThe idea: if one layer fails, others still protect the system.\n\n---\n\n## 1. Physical Security\n**Purpose:** Prevent unauthorized physical access to facilities and hardware.\n\n**Examples:**\n- Security guards and visitor logs  \n- CCTV cameras and motion sensors  \n- Biometric access or RFID badges  \n- Locked server racks and restricted data center access  \n\n**Use Case:**  \nA data center uses biometric scanners and CCTV to prevent intruders from physically accessing servers containing sensitive data.\n\n---\n\n## 2. Network Security\n**Purpose:** Protect network traffic and prevent unauthorized access or attacks.\n\n**Examples:**\n- Firewalls and Intrusion Detection/Prevention Systems (IDS/IPS)  \n- Virtual Private Networks (VPNs)  \n- Network segmentation (DMZ, VLANs)  \n- Secure network protocols (HTTPS, SSH)\n\n**Use Case:**  \nA company segments its internal network into separate VLANs so that if malware infects one department, it can’t easily spread to others.\n\n---\n\n## 3. Endpoint Security\n**Purpose:** Protect individual devices (laptops, desktops, mobile devices).\n\n**Examples:**\n- Antivirus and EDR (Endpoint Detection and Response) tools  \n- Device encryption (BitLocker, FileVault)  \n- Patch management systems  \n- Mobile Device Management (MDM)\n\n**Use Case:**  \nAn organization installs EDR software on all laptops to detect ransomware behavior and isolate infected endpoints automatically.\n\n---\n\n## 4. Application Security\n**Purpose:** Secure software applications from vulnerabilities and exploitation.\n\n**Examples:**\n- Secure coding practices (OWASP Top 10)  \n- Web Application Firewalls (WAF)  \n- Regular vulnerability scanning and penetration testing  \n- Code reviews and automated security testing (SAST/DAST)\n\n**Use Case:**  \nA financial firm uses a WAF to block SQL injection attempts targeting its online banking portal.\n\n---\n\n## 5. Data Security\n**Purpose:** Protect data at rest, in transit, and in use.\n\n**Examples:**\n- Data encryption (AES-256, TLS)  \n- Data Loss Prevention (DLP) systems  \n- Backup and secure storage  \n- Data classification and retention policies  \n\n**Use Case:**  \nA healthcare provider encrypts patient records in transit and at rest to comply with HIPAA regulations.\n\n---\n\n## 6. Identity and Access Management (IAM)\n**Purpose:** Control user identities and manage access to resources.\n\n**Examples:**\n- Multi-Factor Authentication (MFA)  \n- Role-Based Access Control (RBAC)  \n- Single Sign-On (SSO)  \n- Privileged Access Management (PAM)\n\n**Use Case:**  \nAn enterprise enforces MFA for all remote employees to prevent unauthorized logins even if passwords are compromised.\n\n---\n\n## 7. Security Awareness and Training\n**Purpose:** Educate users to recognize and respond to threats.\n\n**Examples:**\n- Phishing simulations  \n- Regular cybersecurity training sessions  \n- Posters, newsletters, and awareness campaigns  \n- Policy acknowledgment programs  \n\n**Use Case:**  \nEmployees undergo quarterly phishing training to reduce successful social engineering attacks.\n\n---\n\n## 8. Monitoring and Incident Response\n**Purpose:** Detect, analyze, and respond to security incidents quickly.\n\n**Examples:**\n- Security Information and Event Management (SIEM) systems  \n- SOC (Security Operations Center) teams  \n- Incident response playbooks  \n- Threat intelligence and continuous monitoring  \n\n**Use Case:**  \nA SIEM alerts the SOC team of unusual login patterns, leading to a quick response and containment of a potential breach.\n\n---\n\n## 9. Redundancy and Recovery\n**Purpose:** Ensure business continuity and data recovery after incidents.\n\n**Examples:**\n- Disaster Recovery Plans (DRP)  \n- Data backups and replication  \n- High-availability systems and failover clusters  \n- Cloud redundancy and geographic distribution  \n\n**Use Case:**  \nAfter a ransomware attack, the company restores clean backups from an offsite location, minimizing downtime.\n\n---\n\n# Chief Information Security Officer (CISO)\n\n## Overview\nA **Chief Information Security Officer (CISO)** is a senior executive responsible for developing and implementing an organization's **information security strategy**.  \nThe CISO ensures that the company’s data, infrastructure, and digital assets are protected from internal and external threats.\n\n---\n\n## Primary Role of a CISO\nThe CISO leads the organization’s cybersecurity initiatives and aligns them with business goals.\n\n### Key Objectives:\n- Protect the organization's data and IT systems.\n- Ensure compliance with security regulations and standards.\n- Manage cybersecurity risks and incidents.\n- Promote a strong security culture across the organization.\n\n---\n\n## Key Responsibilities\n\n| Area | Description | Examples |\n|------|--------------|-----------|\n| **Security Strategy & Governance** | Develop and implement enterprise-wide security policies and frameworks. | Creating ISO 27001-aligned security policies. |\n| **Risk Management** | Identify, evaluate, and mitigate security risks. | Conducting regular risk assessments and audits. |\n| **Incident Response** | Lead response to security breaches and incidents. | Coordinating breach containment and forensic analysis. |\n| **Compliance & Legal** | Ensure adherence to regulations (GDPR, HIPAA, PCI-DSS, etc.). | Reporting compliance status to executive board. |\n| **Security Architecture** | Oversee implementation of secure systems and networks. | Reviewing network designs for vulnerabilities. |\n| **Team Leadership** | Manage security teams and foster a culture of security awareness. | Supervising SOC analysts, engineers, and compliance officers. |\n| **Business Continuity** | Ensure resilience and recovery plans are in place. | Maintaining disaster recovery and backup strategies. |\n\n---\n\n## Qualifications Required\n\n### **Education**\n- Bachelor’s degree in **Computer Science**, **Information Technology**, **Cybersecurity**, or related field.  \n- Master’s degree (e.g., **MBA**, **Cybersecurity Management**) preferred.\n\n### **Experience**\n- 8–15+ years of experience in **IT security**, **risk management**, or **governance**.  \n- Proven track record in **leadership** and **strategic security planning**.\n\n### **Certifications (Highly Recommended)**\n| Certification | Full Name | Focus Area |\n|---------------|------------|-------------|\n| **CISSP** | Certified Information Systems Security Professional | Broad cybersecurity and management knowledge |\n| **CISM** | Certified Information Security Manager | Risk and governance |\n| **CEH** | Certified Ethical Hacker | Offensive security and penetration testing |\n| **CCISO** | Certified Chief Information Security Officer | Executive-level cybersecurity management |\n| **ISO 27001 Lead Implementer/Auditor** | Information Security Management Systems | Compliance and standards |\n\n---\n\n## Example Use Case\n\nA CISO at a financial institution:\n- Develops a risk management framework.  \n- Implements MFA and zero-trust architecture.  \n- Leads the response to a phishing-based data breach.  \n- Reports security metrics to the board.  \n- Ensures compliance with ISO 27001 and PCI-DSS standards.\n\n---\n\n## Summary Diagram (Conceptual)\n\n```mermaid\ngraph TD\nA[CISO] --> B[Security Strategy & Governance]\nA --> C[Risk Management]\nA --> D[Incident Response]\nA --> E[Compliance & Legal]\nA --> F[Team Leadership]\nA --> G[Business Continuity]\n"}, {"name": "Penetration Testing Concepts and Types", "content": "# 🔐 Penetration Testing Concepts and Types\n\n  \n\n---\n\n  \n\n## 🧠 Internal Network Penetration Test\n\n  \n\n**What it is:**  \n\nA simulation of an attack from within the organization’s network (e.g., a malicious insider or attacker who gained VPN access).\n\n  \n\n**Goal:**  \n\nTo identify what an attacker could do once inside the network — lateral movement, privilege escalation, data access, etc.\n\n  \n\n**Typical Scenarios:**\n\n- Malicious employee or contractor\n\n- Attacker plugged into internal network\n\n- Compromised workstation\n\n- Leaked VPN credentials\n\n  \n\n**Key Test Areas:**\n\n- Network enumeration and segmentation\n\n- Password cracking\n\n- Privilege escalation\n\n- Lateral movement (pivoting)\n\n- Data access and exfiltration\n\n- Exploiting internal services (SMB, RDP, AD)\n\n- Domain controller attacks (e.g., Kerberoasting, Pass-the-Hash)\n\n  \n\n**Common Tools:**\n\n- Nmap, BloodHound, CrackMapExec\n\n- Mimikatz, Responder, PowerSploit\n\n- Metasploit, Cobalt Strike\n\n  \n\n---\n\n  \n\n## 🌐 External Network Penetration Test\n\n  \n\n**What it is:**  \n\nA simulation of an attack from the internet — like a black-hat hacker attempting unauthorized access.\n\n  \n\n**Goal:**  \n\nIdentify and exploit vulnerabilities in public-facing systems.\n\n  \n\n**Typical Scenarios:**\n\n- Internet-wide scanning by attackers\n\n- Targeted attack on company domains\n\n- Testing cloud or SaaS services\n\n  \n\n**Key Test Areas:**\n\n- Recon and OSINT\n\n- Port scanning and banner grabbing\n\n- Web app attacks (XSS, SQLi)\n\n- Exploiting misconfigurations\n\n- Brute-force/credential stuffing\n\n- SSL/TLS configuration checks\n\n  \n\n**Common Tools:**\n\n- Nmap, Nikto, Gobuster\n\n- Burp Suite, OWASP ZAP\n\n- Metasploit, Hydra\n\n- Shodan, Censys\n\n  \n\n---\n\n  \n\n## 🔄 Comparison Table\n\n  \n\n| Feature              | Internal Pentest                     | External Pentest                        |\n\n|----------------------|--------------------------------------|------------------------------------------|\n\n| **Attacker's Location** | Inside the network                  | Outside (Internet)                      |\n\n| **Threat Simulation**   | Insider threat, compromised host   | Black-hat hacker                        |\n\n| **Access Level**        | Partial/local access               | No prior access                         |\n\n| **Focus Areas**         | Lateral movement, privilege escalation | Perimeter defenses, open ports     |\n\n| **Impact Tested**       | AD, file shares, internal apps     | Web servers, VPNs, APIs, DMZ            |\n\n  \n\n---\n\n  \n\n## 🛡️ What is a Jumpbox?\n\n  \n\nA **Jumpbox** (aka Jump Server, Bastion Host) is a hardened server that acts as a secure entry point to internal systems.\n\n  \n\n**Purpose:**\n\n- Secure gateway to internal servers\n\n- Reduces exposure of sensitive systems\n\n- Central point for access auditing\n\n  \n\n**How It Works:**\n\n1. User connects to the Jumpbox via SSH or RDP.\n\n2. From there, connects to internal servers.\n\n3. Internal servers block all external access except from the Jumpbox.\n\n  \n\n**Security Features:**\n\n- Placed in DMZ or public subnet\n\n- Enforces SSH key/MFA\n\n- Logs all sessions\n\n- Runs minimal services\n\n- No direct internet access\n\n  \n\n**Example Scenario:**\n\nIn AWS or a private datacenter:\n\n- Internal servers only accept traffic from the Jumpbox\n\n- Developers access production via the Jumpbox only\n\n  \n\n**Benefits:**\n\n  \n\n| Benefit              | Explanation |\n\n|----------------------|-------------|\n\n| **Centralized Access** | One gateway to all systems |\n\n| **Improved Security** | Limits public exposure |\n\n| **Auditing**          | Logs access from one point |\n\n| **Reduced Attack Surface** | Only Jumpbox is internet-facing |\n\n  \n\n---\n\n  \n\n## 📋 Types of Penetration Testing (Summary)\n\n  \n\n| **Type**               | **Brief Description** |\n\n|------------------------|------------------------|\n\n| **Network**            | Tests internal and external infrastructure (firewalls, routers, servers). |\n\n| **Web Application**    | Looks for OWASP Top 10 vulnerabilities (e.g., XSS, SQLi). |\n\n| **API**                | Evaluates REST/SOAP APIs for auth issues, data leaks, etc. |\n\n| **Mobile Application** | Analyzes Android/iOS apps for poor security practices. |\n\n| **Desktop Applications** | Tests local endpoint software for flaws. |\n\n| **Wireless**           | Tests Wi-Fi networks for weak encryption and rogue devices. |\n\n| **IoT**                | Examines smart devices for firmware flaws, open ports. |\n\n| **Red Teaming**        | Full-scale simulated attack including social engineering. |\n\n| **Cloud**              | Evaluates AWS, Azure, GCP for misconfigurations. |\n\n| **Social Engineering** | Tests humans via phishing, impersonation, baiting. |\n\n| **Physical Security**  | Attempts to breach physical access controls. |\n\n  \n\n---"}, {"name": "Spidering and Crawling in Penetration Testing", "content": "# Spidering and Crawling in Penetration Testing\n\nSpidering and crawling are essential techniques in penetration testing, particularly for web applications. These techniques help security testers map the structure of a website, uncover hidden resources, and identify potential attack surfaces.\n\n## Spidering\n\nSpidering is an automated process that traverses a website by following hyperlinks. It aims to build a comprehensive map of the site's structure and identify all accessible endpoints.\n\n### Key Features of Spidering\n\n- **Purpose:** Gather as much information as possible about the website, such as URLs, parameters, and resources.\n    \n- **Tools:** Tools like Burp Suite, OWASP ZAP, and Arachni are commonly used for spidering.\n    \n- **Use Case:** Identify pages that may not be directly linked from the main site, such as admin panels, hidden forms, or backup files.\n    \n\n### Spidering Process\n\n- **Starting Point:** Begin with a seed URL.\n    \n- **Traversal:** Follow all hyperlinks on each page (internal and external).\n    \n- **Data Logging:** Record discovered URLs, query parameters, and any dynamic endpoints for further analysis.\n    \n- **Scope Control:** Configure scope to avoid unnecessary pages (e.g., third-party links or irrelevant domains).\n    \n\n### Common Challenges\n\n- **Dynamic Content:** JavaScript-heavy websites may require specialized tools or headless browsers.\n    \n- **Access Restrictions:** Some areas may be protected by authentication or IP restrictions.\n    \n\n## Crawling\n\nCrawling is a broader process of systematically browsing and indexing content across the internet or within a specific website. In the context of penetration testing, crawling helps identify publicly accessible resources and gain a complete view of the attack surface.\n\n### Key Features of Crawling\n\n- **Purpose:** Build an index of the website's content for analysis and testing.\n    \n- **Tools:** Tools like Burp Suite's crawler, OWASP ZAP, and custom scripts can perform deep crawling.\n    \n- **Use Case:** Primarily used in SEO and digital marketing, but in security testing, it helps identify overlooked files and directories.\n    \n\n### Crawling Process\n\n- **Discovery:** Systematically fetch pages, parse content, and extract links.\n    \n- **Depth and Breadth:** Configure to crawl deep (many levels of links) and broad (across all discovered paths).\n    \n- **Data Collection:** Identify accessible resources, including static and dynamic content.\n    \n\n## Benefits of Spidering and Crawling in Penetration Testing\n\n- **Discovery of Hidden Pages:** Find directories, admin panels, development files, and test environments.\n    \n- **Parameter Enumeration:** Identify query parameters and inputs that could be vulnerable to injection or manipulation.\n    \n- **Content Discovery:** Locate sensitive files (e.g., backups, configuration files, logs) that could reveal valuable information.\n    \n- **Improved Reconnaissance:** Obtain a complete understanding of the application's structure, including entry points for further testing.\n    \n- **Enhanced Attack Surface Mapping:** Map all resources to identify potential security misconfigurations.\n    \n\n## Common Tools for Spidering and Crawling\n\n|Tool|Purpose|Features|\n|---|---|---|\n|Burp Suite|Comprehensive web security testing suite|Integrated spider, active/passive scanning|\n|OWASP ZAP|Open-source web application security scanner|Spidering, scanning, and automated attack options|\n|Arachni|High-performance web application security scanner|Distributed crawling and scanning capabilities|\n|Dirbuster / Dirb / Gobuster|Directory and file brute-forcing tools|Useful for discovering hidden resources|\n\n## Best Practices\n\n- **Set Proper Scope:** Define the target scope to avoid unnecessary or potentially disruptive crawling.\n    \n- **Respect Robots.txt (or Not):** Decide whether to obey robots.txt based on testing needs and ethical considerations.\n    \n- **Use Throttling:** Avoid overloading the target server by setting request rates and delays.\n    \n- **Combine with Manual Testing:** Automated spidering and crawling are powerful but should be complemented with manual exploration to find edge cases.\n\n---\n---"}, {"name": "VULNERABLITY RESEARCH AND PUBLITION", "content": "# Vulnerability Research and Disclosure\n\n## Overview\n**Vulnerability Research** is the process of **discovering, analyzing, and understanding security flaws** in software, hardware, or protocols.  \nResearchers aim to find **new or unknown vulnerabilities** (often called *zero-days*) before malicious actors exploit them.\n\n---\n\n## What is Vulnerability Research?\n\n| Aspect | Description |\n|---------|--------------|\n| **Goal** | Identify and study security flaws at a deep technical level. |\n| **Focus** | New or undocumented vulnerabilities in software, firmware, or hardware. |\n| **Output** | Detailed analysis, proof-of-concept (PoC) exploit, and responsible disclosure report. |\n| **Performed By** | Security researchers, ethical hackers, or cybersecurity teams. |\n\n### **Example:**\nA researcher reverse-engineers a web application and discovers a **zero-day SQL injection vulnerability** that was not previously documented.\n\n---\n\n## Difference Between Vulnerability Research, Vulnerability Assessment, and Penetration Testing\n\n| Category | Purpose | Approach | Output | Example |\n|-----------|----------|-----------|---------|----------|\n| **Vulnerability Research** | Discover *new* unknown vulnerabilities through deep technical analysis. | Reverse engineering, fuzzing, debugging, code analysis. | Research paper, PoC exploit, CVE submission. | Finding a zero-day in Windows kernel. |\n| **Vulnerability Assessment** | Identify *known* vulnerabilities using automated scanning tools. | Automated tools and databases (CVEs, NVD). | Risk report and list of vulnerabilities. | Using Nessus to find outdated Apache version. |\n| **Penetration Testing (Pentesting)** | Simulate real-world attacks to exploit *existing* vulnerabilities. | Manual exploitation, social engineering, red teaming. | Exploitation report, impact analysis, recommendations. | Exploiting a weak password to gain admin access. |\n\n---\n\n## Common Methods Used in Vulnerability Research\n\n| Method | Description | Tools/Techniques |\n|---------|--------------|------------------|\n| **Static Analysis** | Review source code or binaries without executing them. | IDA Pro, Ghidra, Binwalk, Source code audits |\n| **Dynamic Analysis** | Analyze behavior while the software is running. | Debuggers (x64dbg, OllyDbg), Sandboxing |\n| **Fuzzing** | Automatically send malformed or random inputs to find crashes or unexpected behavior. | AFL, Peach Fuzzer, Burp Intruder |\n| **Reverse Engineering** | Decompile or disassemble binaries to understand logic and identify flaws. | Ghidra, IDA Pro, Radare2 |\n| **Protocol Analysis** | Inspect communication between clients and servers for weaknesses. | Wireshark, Scapy |\n| **Exploit Development** | Create a PoC to verify exploitability and measure impact. | Metasploit, custom scripts |\n\n---\n\n## Steps to Publish or Disclose a Vulnerability\n\n### **1. Validate the Vulnerability**\n- Confirm it is reproducible and not a configuration error.  \n- Gather detailed technical evidence (logs, screenshots, PoC).  \n\n### **2. Document the Findings**\nInclude:\n- Vulnerable software version and environment.  \n- Detailed description of the issue.  \n- Steps to reproduce.  \n- Potential impact and mitigation advice.  \n\n### **3. Responsible Disclosure**\n- **Contact the Vendor or Maintainer** directly (email, security contact, or bug bounty portal).  \n- Allow them **90 days (standard)** to fix the issue before public disclosure.  \n- Use **coordinated disclosure** policies (e.g., ISO/IEC 29147).  \n\n**Examples:**\n- Report via vendor’s security page (e.g., `security@company.com`).  \n- Submit via bug bounty platforms like [HackerOne](https://www.hackerone.com/) or [Bugcrowd](https://www.bugcrowd.com/).  \n\n### **4. CVE Submission (Optional)**\nIf accepted and verified, submit the vulnerability for a **CVE (Common Vulnerabilities and Exposures)** ID.\n\n- Visit: [https://cve.mitre.org/cve/request_id.html](https://cve.mitre.org/cve/request_id.html)  \n- Provide:\n  - Vendor and product name  \n  - Affected version  \n  - Vulnerability description  \n  - Impact and PoC (if safe to disclose)\n\n### **5. Public Disclosure**\nOnce patched:\n- Publish details on your blog, GitHub, or security advisory platform.  \n- Include remediation steps and vendor acknowledgment.  \n\n---\n\n## Example Disclosure Workflow\n\n```mermaid\ngraph TD\nA[Identify Vulnerability] --> B[Validate and Document]\nB --> C[Contact Vendor (Responsible Disclosure)]\nC --> D[Vendor Fix or Patch Released]\nD --> E[Public Disclosure / CVE Assignment]\nE --> F[Community Awareness & Research Sharing]\n"}, {"name": "VULNERBLITY MANAGEMENT  AND VULNERIBLITY WEBSITE", "content": "# Vulnerability Management\n\n## Overview\n**Vulnerability Management (VM)** is the **continuous process of identifying, evaluating, prioritizing, and mitigating security vulnerabilities** in systems, networks, and applications.  \nIt helps organizations reduce risk exposure by addressing weaknesses **before attackers can exploit them**.\n\n---\n\n## Objectives\n- **Identify** security weaknesses across assets.  \n- **Assess** the severity and impact of vulnerabilities.  \n- **Remediate** or mitigate issues before exploitation.  \n- **Report** on risk posture and progress over time.  \n- **Continuously monitor** for new threats and exposures.\n\n---\n\n## Vulnerability Management Lifecycle\n\n| Phase | Description | Example |\n|--------|--------------|---------|\n| **1. Discovery / Asset Identification** | Identify all devices, applications, and systems in the environment. | Scanning IP ranges to find active hosts. |\n| **2. Vulnerability Scanning** | Use automated tools to detect known vulnerabilities. | Running Nessus or Qualys to scan servers. |\n| **3. Assessment & Prioritization** | Evaluate risks based on severity (CVSS score), asset criticality, and exploitability. | Prioritizing CVSS 9.8 vulnerabilities on production servers. |\n| **4. Remediation / Mitigation** | Apply patches, configuration fixes, or compensating controls. | Installing OS patches or disabling unused services. |\n| **5. Verification & Reporting** | Re-scan to confirm remediation and document progress. | Generating compliance reports for ISO 27001 or SOC 2. |\n| **6. Continuous Monitoring** | Schedule regular scans and track emerging vulnerabilities. | Weekly scans and real-time threat alerts. |\n\n---\n\n## Common Vulnerability Management Tools\n\n### 1. **Nessus (by Tenable)**\n- **Purpose:** Industry-standard vulnerability scanner.  \n- **Features:** Detects misconfigurations, missing patches, and outdated software.  \n- **Use Case:** Regular server and network scans to identify critical vulnerabilities.  \n- **Website:** [https://www.tenable.com/products/nessus](https://www.tenable.com/products/nessus)\n\n---\n\n### 2. **Qualys Vulnerability Management**\n- **Purpose:** Cloud-based platform for large-scale vulnerability scanning.  \n- **Features:** Continuous monitoring, asset inventory, compliance checks.  \n- **Use Case:** Enterprise-grade scanning across hybrid cloud and on-prem environments.  \n- **Website:** [https://www.qualys.com/solutions/vulnerability-management/](https://www.qualys.com/solutions/vulnerability-management/)\n\n---\n\n### 3. **Rapid7 InsightVM (formerly Nexpose)**\n- **Purpose:** Real-time vulnerability management and analytics.  \n- **Features:** Risk scoring, dashboards, automated remediation tracking.  \n- **Use Case:** Integrates with CI/CD pipelines for DevSecOps environments.  \n- **Website:** [https://www.rapid7.com/products/insightvm/](https://www.rapid7.com/products/insightvm/)\n\n---\n\n### 4. **OpenVAS (Greenbone Vulnerability Manager)**\n- **Purpose:** Open-source vulnerability scanning tool.  \n- **Features:** Regular updates to detection databases, customizable scanning profiles.  \n- **Use Case:** Cost-effective scanning for small to medium organizations.  \n- **Website:** [https://www.greenbone.net/en/](https://www.greenbone.net/en/)\n\n---\n\n### 5. **Microsoft Defender Vulnerability Management**\n- **Purpose:** Integrated solution for Windows and Microsoft 365 environments.  \n- **Features:** Endpoint security, threat analytics, real-time risk assessments.  \n- **Use Case:** Monitoring Windows systems for unpatched software and configuration issues.  \n- **Website:** [https://www.microsoft.com/en-us/security/business/threat-protection/defender-vulnerability-management](https://www.microsoft.com/en-us/security/business/threat-protection/defender-vulnerability-management)\n\n---\n\n## Popular Websites for Tracking Daily Vulnerabilities\n\n| Website | Description | URL |\n|----------|--------------|-----|\n| **NIST NVD** | National Vulnerability Database – official U.S. government repository for CVEs and CVSS scores. | [https://nvd.nist.gov/](https://nvd.nist.gov/) |\n| **CVE Details** | Aggregated view of CVE records with vendor/product filters. | [https://www.cvedetails.com/](https://www.cvedetails.com/) |\n| **MITRE CVE** | The official CVE (Common Vulnerabilities and Exposures) list. | [https://cve.mitre.org/](https://cve.mitre.org/) |\n| **Exploit Database (Offensive Security)** | Repository of public exploits and proof-of-concept codes. | [https://www.exploit-db.com/](https://www.exploit-db.com/) |\n| **SecurityFocus (Bugtraq)** | Historical vulnerability database and mailing list. | [https://www.securityfocus.com/vulnerabilities](https://www.securityfocus.com/vulnerabilities) |\n| **CERT/CC (Carnegie Mellon)** | Alerts and advisories for software and network vulnerabilities. | [https://www.kb.cert.org/vuls/](https://www.kb.cert.org/vuls/) |\n| **Rapid7 Vulnerability Database** | Up-to-date list of emerging threats and security flaws. | [https://www.rapid7.com/db/](https://www.rapid7.com/db/) |\n\n---\n\n## Example Workflow\n\n1. **Scan** the environment using Nessus weekly.  \n2. **Identify** CVEs and cross-check with the NVD database.  \n3. **Prioritize** based on CVSS > 7 and asset importance.  \n4. **Patch or mitigate** vulnerabilities using ITSM tickets.  \n5. **Re-scan** to verify successful remediation.  \n6. **Report** metrics to management for compliance tracking.\n\n---\n\n## Summary Diagram (Conceptual)\n\n```mermaid\ngraph TD\nA[Asset Discovery] --> B[Vulnerability Scanning]\nB --> C[Risk Assessment]\nC --> D[Remediation / Patching]\nD --> E[Verification & Reporting]\nE --> F[Continuous Monitoring]\n"}, {"name": "Waybackcurls", "content": "\n\n**Waybackurls** is a powerful tool by **Tomnomnom** for retrieving archived URLs from the Wayback Machine. It is particularly useful for security assessments, as it helps uncover endpoints that may no longer be accessible on the live site but are still archived.\n\n- Pulls **historical URLs** from the **Wayback Machine (archive.org)**.\n- Gets URLs that were **publicly accessible in the past**, even if deleted now.\n- No live crawling — works purely from archived data.\n- Cannot detect dynamic or JavaScript-generated URLs.\n- Might give **dead or outdated URLs**.\n- Useful for **OSINT**, bug bounty, and discovering forgotten endpoints.    \n- Very fast and low-resource.\n\n---\n## Installation\n\n1. **Ensure Go is installed:**\n\n```bash\napt install golang\n```\n\n2. **Install Waybackurls using Go:**\n\n```bash\ngo install github.com/tomnomnom/waybackurls@latest\n```\n\n3. **Move the binary to a location in your system's PATH:**\n\n```bash\ncp -v /root/go/bin/waybackurls /usr/local/bin/\n```\n\n---\n## Basic Usage\n\nCheck available options:\n\n```bash\nwaybackurls -h\n```\n\n---\n## Retrieve URLs for a Single Domain\n\n```bash\nwaybackurls armourinfosec.com\n```\n\nOr using the full URL:\n\n```bash\nwaybackurls https://www.armourinfosec.com\n```\n\n---\n## Using a File with Multiple Domains\n\nCreate a file, e.g. `domains.txt`:\n\n```bash\nvim domains.txt\n```\n\nContents:\n\n```\narmourinfosec.com\nthehackersworld.com\n```\n\nThen run:\n\n```bash\ncat domains.txt | waybackurls\n```\n\n---\n## Output to a File\n\n```bash\nwaybackurls https://www.tesla.com > /tmp/tesla-urls.txt\n```\n\n---"}, {"name": "Web Crawling & AI Modern Search Engine Optimization Guide", "content": "# Web Crawling & AI: Modern Search Engine Optimization Guide\n\n## 1. Understanding Search Engine Files\n\n### What Are These Files?\nSearch engines and AI crawlers need special files to understand your website. These files act as a communication bridge between your site and automated systems. Unlike your HTML/CSS/JS files that create the visual website, these files provide metadata and instructions for machines.\n\n### Core Files Overview\n1. **robots.txt** - The gatekeeper file\n2. **sitemap.xml** - The map for crawlers\n3. **sitemap.html** - The human-readable map\n4. **ai.txt** (New) - AI-specific instructions\n\n---\n\n## 2. The Robot.txt File: Your Site's Gatekeeper\n\n### Purpose\nThink of robots.txt as a security guard at your website's entrance. It tells crawlers (both traditional and AI) which areas they can and cannot access.\n\n### How It Works\nWhen any crawler visits your site, it first checks `/robots.txt`. This is a universal standard - every legitimate crawler respects this file.\n\n### Basic Syntax\n```txt\nUser-agent: *\nDisallow: /private/\nAllow: /public/\n\n# AI-specific rules (emerging standard)\nUser-agent: GPTBot\nDisallow: /confidential/\nCrawl-delay: 2\n```\n\n### AI Era Changes\n- **AI Training Control**: New directives like `AI-Training-Disallow` are emerging\n- **Token Limits**: AI crawlers may respect token consumption limits\n- **Purpose Declaration**: AI bots now declare their intent (training, indexing, or real-time access)\n\n---\n\n## 3. Sitemap.xml: The Crawler's Map\n\n### Purpose\nSitemap.xml is like giving search engines a detailed floor plan of your building. It lists all important pages and helps crawlers discover content efficiently.\n\n### Structure & Logic\n- **Hierarchical Organization**: Pages listed by importance\n- **Update Frequency**: Tells crawlers how often to revisit\n- **Priority Scoring**: Indicates relative importance (0.0-1.0)\n\n### Basic Format\n```xml\n<url>\n  <loc>https://example.com/page</loc>\n  <lastmod>2024-01-15</lastmod>\n  <changefreq>weekly</changefreq>\n  <priority>0.8</priority>\n</url>\n```\n\n### AI Enhancements\nModern sitemaps are evolving to include:\n- **Semantic Tags**: Topic and category information for AI understanding\n- **Content Summaries**: Brief descriptions for AI context\n- **Embedding Hints**: Optimal chunk sizes for AI processing\n\n---\n\n## 4. How Search Engines Process These Files\n\n### Traditional Workflow\n1. **Discovery**: Find new websites through links\n2. **Permission Check**: Read robots.txt\n3. **Map Reading**: Process sitemap.xml\n4. **Crawling**: Download allowed pages\n5. **Indexing**: Analyze and store content\n6. **Ranking**: Determine search result positions\n\n### AI-Enhanced Workflow\n1. **Intelligent Discovery**: AI predicts valuable content before crawling\n2. **Semantic Understanding**: AI comprehends context, not just keywords\n3. **Real-time Processing**: Content analyzed as it's crawled\n4. **Knowledge Graph Building**: Relationships between concepts mapped\n5. **Conversational Indexing**: Content prepared for Q&A, not just search\n\n---\n\n## 5. Why These Files Don't Appear in Your Code\n\n### Dynamic Generation\nThese files are often:\n- Generated during build/deployment\n- Created by CMS plugins\n- Produced by frameworks automatically\n- Updated based on database content\n\n### Environment Specific\n- Development versions differ from production\n- URLs change between environments\n- Security rules vary by deployment\n\n---\n\n## 6. AI-Specific Considerations\n\n### New File Types Emerging\n\n#### ai.txt or .well-known/ai.txt\nControls AI crawler behavior:\n- Training permissions\n- Usage restrictions\n- Attribution requirements\n- Rate limiting for AI\n\n#### Semantic Markers in Content\n```html\n<!-- Help AI understand context -->\n<article data-ai-context=\"tutorial\" \n         data-ai-topic=\"web-crawling\">\n```\n\n### Conversational Optimization\nContent now needs to work for:\n- Traditional keyword searches\n- Conversational AI queries\n- Voice assistants\n- ChatGPT-style interfaces\n\n---\n\n## 7. Practical Implementation Strategy\n\n### Step 1: Audit Current Setup\n- Check if robots.txt exists and is accessible\n- Verify sitemap.xml is updated and valid\n- Monitor crawler traffic in server logs\n\n### Step 2: Optimize for Traditional Search\n- Clean URL structure\n- Proper meta descriptions\n- Structured data markup\n- Mobile responsiveness\n\n### Step 3: Prepare for AI\n- Add semantic HTML5 tags\n- Include comprehensive alt text\n- Structure content in logical chunks\n- Implement schema.org markup\n\n### Step 4: Monitor and Adapt\n- Track both traditional and AI crawler activity\n- Analyze which content AI systems reference\n- Update permissions based on your goals\n\n---\n\n## 8. Key Differences: Traditional vs AI Crawling\n\n### Traditional Crawlers\n- Follow links mechanically\n- Index based on keywords\n- Respect simple rules\n- Process pages individually\n\n### AI Crawlers\n- Understand context and meaning\n- Build knowledge relationships\n- Learn from patterns\n- Process entire site context\n- May generate summaries or answers\n\n---\n\n## 9. Best Practices for Modern Web\n\n### Universal Principles\n1. **Be Clear**: Use descriptive URLs and titles\n2. **Be Structured**: Logical content hierarchy\n3. **Be Honest**: Accurate metadata and descriptions\n4. **Be Accessible**: Works for humans and machines\n\n### AI-Specific Guidelines\n1. **Provide Context**: Each page should standalone\n2. **Use Natural Language**: Write for understanding, not keywords\n3. **Include Examples**: AI learns from concrete instances\n4. **Maintain Accuracy**: AI amplifies misinformation\n\n---\n\n## 10. Future Considerations\n\n### Emerging Standards\n- **Verifiable Content**: Cryptographic proof of authenticity\n- **AI Interaction Protocols**: Standardized AI-to-website communication\n- **Dynamic Permissions**: Real-time negotiation of access rights\n- **Semantic Indices**: Beyond keywords to meaning\n\n### Preparing Your Site\n1. Implement current standards properly\n2. Monitor emerging specifications\n3. Test with various AI tools\n4. Stay informed about changes\n\n---\n\n## Quick Reference\n\n### Essential Files Checklist\n- [ ] `/robots.txt` - Exists and properly formatted\n- [ ] `/sitemap.xml` - Complete and current\n- [ ] Meta tags on all pages\n- [ ] Structured data where appropriate\n- [ ] AI considerations implemented\n\n### Testing Tools\n- Google Search Console (traditional)\n- Bing Webmaster Tools\n- AI crawler simulators\n- Schema validators\n- robots.txt testers\n\n### Remember\nThese files are your website's way of communicating with the automated web. As AI becomes more prevalent, this communication becomes richer and more nuanced. The goal isn't just to be found anymore - it's to be understood.\n\n---\n----"}, {"name": "basic 2", "content": "# 🛡️ Cybersecurity Essentials – Student Guide\n\n  \n\nThis guide offers a concise but detailed overview of fundamental cybersecurity concepts for students and practitioners. It covers vulnerabilities, exploits, payloads, mitigation strategies, real-world examples, penetration testing, and assessments.\n\n  \n\n---\n\n  \n\n## 🔍 Vulnerability\n\nA **vulnerability** is a flaw or weakness in a system, application, or network that can be exploited by an attacker to gain unauthorized access, disrupt services, or steal data.\n\n  \n\n- **Example**: An outdated web server with a known remote code execution flaw.\n\n  \n\n---\n\n  \n\n## 🎯 Exploit\n\nAn **exploit** is a tool, code, or technique used to take advantage of a vulnerability.\n\n  \n\n- **Example**: Exploit code that leverages an SQL injection vulnerability to access a database.\n\n  \n\n---\n\n  \n\n## 🧪 Vulnerability Assessment\n\nA **vulnerability assessment** identifies, classifies, and prioritizes vulnerabilities in systems or applications using automated tools.\n\n  \n\n- **Goal**: Detect potential security risks before attackers do.\n\n- **Tools**: Nessus, OpenVAS, Qualys\n\n- **Output**: A report listing all detected vulnerabilities and their severity.\n\n  \n\n---\n\n  \n\n## 💣 Common Types of Vulnerabilities\n\n- **SQL Injection**: Malicious SQL queries manipulate databases.\n\n- **Cross-Site Scripting (XSS)**: Malicious scripts injected into webpages.\n\n- **Buffer Overflow**: Excess data causes memory corruption.\n\n- **Broken Authentication**: Weak login mechanisms.\n\n- **Unpatched Software**: Outdated versions with known vulnerabilities.\n\n  \n\n---\n\n  \n\n## 💾 Payload\n\nA **payload** is the part of an exploit that performs a malicious action, like opening a reverse shell or exfiltrating data.\n\n  \n\n- **Types**: Reverse shell, ransomware, keylogger, rootkit\n\n  \n\n---\n\n  \n\n## 🛡️ Mitigation Measures\n\nStrategies to prevent or reduce the impact of vulnerabilities and attacks.\n\n  \n\n- Regular patching & updates\n\n- Input validation\n\n- Web Application Firewall (WAF)\n\n- Multi-factor authentication (MFA)\n\n- Principle of Least Privilege (PoLP)\n\n  \n\n---\n\n  \n\n## 🧠 Real-Life Example: Equifax Breach (2017)\n\n- **Vulnerability**: Unpatched Apache Struts framework\n\n- **Exploit**: Remote code execution\n\n- **Payload**: Stole personal data of ~147 million people\n\n- **Lesson**: Importance of timely patching and vulnerability assessments\n\n  \n\n---\n\n  \n\n## 🧪 Penetration Testing (Brief)\n\n**Penetration Testing** is an ethical hacking process to simulate real-world attacks and exploit vulnerabilities.\n\n  \n\n- **Goal**: Identify exploitable flaws and test system resilience.\n\n- **Phases**:\n\n  1. Planning & Recon\n\n  2. Scanning\n\n  3. Exploitation\n\n  4. Post-Exploitation\n\n  5. Reporting\n\n- **Tools**: Metasploit, Burp Suite, Nmap\n\n  \n\n---\n\n  \n\n## 📊 Vulnerability Assessment vs Penetration Testing\n\n  \n\n| Feature                  | Vulnerability Assessment          | Penetration Testing             |\n\n|--------------------------|-----------------------------------|----------------------------------|\n\n| **Purpose**              | Identify known issues             | Simulate real attacks            |\n\n| **Tools Used**           | Automated scanners                | Manual + automated tools         |\n\n| **Skill Level**          | Basic to Intermediate             | Advanced (ethical hacking)       |\n\n| **Depth**                | Broad, surface-level              | Deep, exploit-based              |\n\n| **Frequency**            | Regularly (e.g., monthly)         | Occasionally (e.g., yearly)      |\n\n| **Outcome**              | Risk identification report        | Proof-of-concept + risk validation |\n\n  \n\n---\n\n  \n\n> ⚠️ **Tip for Students**: Learn both processes — assessment tools give you coverage, while penetration testing builds deep expertise.\n\n  \n\n---\n\n  \n\n## 📚 Recommended Learning Resources\n\n- OWASP Top 10: [https://owasp.org/Top10/](https://owasp.org/Top10/)\n\n- TryHackMe / Hack The Box (practical labs)\n\n- CVE Details: [https://www.cvedetails.com](https://www.cvedetails.com)\n\n  \n\n---\n\n  \n\n## 📌 License\n\nThis guide is open for educational use."}, {"name": "bug bounty", "content": "# 🐞 What is a bug-bounty platform?\n\nA **bug-bounty platform** is a marketplace where organizations publish programs that pay security researchers for finding valid vulnerabilities in their systems. Platforms manage rules of engagement, triage, communication, and payments between the company and hunters.\n\n**Popular platforms (examples):**\n\n- HackerOne\n    \n- Bugcrowd\n    \n- Synack (invite-only / vetted)\n    \n- Intigriti\n    \n- Open Bug Bounty (open disclosure)\n    \n- GitHub Security Lab / private programs run by companies\n    \n\n---\n\n# 🧭 How bug-bounty works — step by step\n\n1. **Find a program**\n    \n    - Choose a platform or company list. Read the program page carefully (scope, exclusions, rewards, disclosure policy).\n        \n2. **Understand scope & rules**\n    \n    - Allowed targets (domains, subdomains, apps), disallowed targets (employee accounts, physical attacks), test windows, and safe-testing rules (no DoS).\n        \n3. **Recon (enumeration)**\n    \n    - Subdomain discovery, directory brute, port scan (if allowed), third-party services, open S3 buckets, JavaScript analysis.\n        \n4. **Vulnerability discovery**\n    \n    - Manual testing + automated tools: scanner, Burp, ffuf, sqlmap when permitted, etc. Focus on high-impact classes: RCE, auth bypass, IDOR, SSRF, SQLi, broken access control.\n        \n5. **Proof of concept (PoC)**\n    \n    - Create a minimal reproducible PoC demonstrating impact. Include request/response, screenshots, curl commands, or exploit steps.\n        \n6. **Write the report**\n    \n    - Clear title, severity, affected host(s), steps to reproduce, PoC, impact, and recommended mitigation. Keep it concise and evidence-based.\n        \n7. **Submit via platform**\n    \n    - Use the platform’s submission form; answer triage questions. Respond quickly to requests for more info.\n        \n8. **Triage, fix, and reward**\n    \n    - Vendor triages; if valid, they assign severity and pay per program policy. You may be asked to verify fixes for bounty release.\n        \n\n---\n\n# 🛠️ Example bounty workflow (quick)\n\n- Program: `https://example.com` (web)\n    \n- Recon: found `payments.example.com` and `debug.example.com`\n    \n- Finding: `payments.example.com/api/transfer` has IDOR — you can transfer money between accounts by changing `account_id` parameter\n    \n- PoC: show two requests (victim and attacker) and responses proving unauthorized transfer\n    \n- Submit: title “IDOR in payments API allows funds transfer between accounts”; severity: High; include curl commands and remediation (authorize server-side check; validate owner of account_id)\n    \n\n---\n\n# 📝 Example minimal report (copy/paste)\n\n**Title:** IDOR in `/api/v1/transfer` allows transfer between accounts  \n**Target:** `https://payments.example.com/api/v1/transfer`  \n**Severity:** High (unauthorized funds transfer)  \n**Description:** Changing `account_id` parameter in the POST body allows an authenticated attacker to move funds from arbitrary accounts to their own. No server-side ownership checks present.  \n**Steps to reproduce (PoC):**\n\n`# Attacker logged in (token: ATTACKER_TOKEN) curl -s -X POST \"https://payments.example.com/api/v1/transfer\" \\   -H \"Authorization: Bearer ATTACKER_TOKEN\" \\   -H \"Content-Type: application/json\" \\   -d '{\"from_account\": \"VICTIM_ACCOUNT_ID\", \"to_account\": \"ATTACKER_ACCOUNT_ID\", \"amount\": 100}'`\n\n**Response:**\n\n`HTTP/1.1 200 OK {\"status\":\"success\",\"transaction_id\":\"tx12345\"}`\n\n**Impact:** Attacker can transfer funds from any account they know the ID of — funds loss, fraud.  \n**Suggested fix:** Enforce server-side ownership check: ensure `from_account` belongs to the authenticated user and reject otherwise. Log and rate-limit transfers.  \n**Attachments:** request/response screenshots, transaction id `tx12345`.\n\n---\n\n# 🧾 Common reward ranges (approximate)\n\nRewards vary hugely by program and company policy — small startups pay less, large tech firms pay more, and private programs pay the most. These are rough, common ranges in **USD**:\n\n- **Critical (RCE, auth bypass, mass data leak):** $5,000 → $50,000+\n    \n- **High (account takeover, large data exposure, privilege escalation):** $1,000 → $10,000\n    \n- **Medium (SQLi limited, stored XSS with medium impact, IDOR limited):** $200 → $1,000\n    \n- **Low (reflected XSS, info disclosure non-sensitive):** $50 → $200\n    \n- **Minimal / Triaged (duplicate, out-of-scope, low impact):** $0 → $50 (or recognition only)\n    \n- **Hall of Fame / Recognition only:** no cash, but public kudos\n    \n\nNotes:\n\n- Enterprise & financial companies often pay higher.\n    \n- Fixed-pay programs: some companies have fixed tiers (e.g., $500 for RCE).\n    \n- VDP (vulnerability disclosure programs) sometimes only offer recognition, not cash.\n    \n\n---\n\n# ✅ Tips to increase your chances of paid bounties\n\n- Read program rules and scope carefully — being out-of-scope kills bounties.\n    \n- Focus on high-impact classes (auth, access control, injection, SSRF).\n    \n- Produce clean, reproducible PoCs — triage loves clear evidence.\n    \n- Communicate respectfully and promptly with triage.\n    \n- Target new or poorly tested endpoints (APIs, admin panels, upload endpoints).\n    \n- Keep logs: curl commands, Burp history, screenshots, timestamps.\n    \n- Learn secure coding fixes so you can recommend realistic remediation.\n    \n\n---\n\n# ⚖️ Legal & ethical notes (very important)\n\n- Only test **in-scope** targets and follow the program’s rules.\n    \n- Never exfiltrate or publish sensitive user data; do not perform DoS unless explicitly allowed.\n    \n- If unsure, ask program contacts or keep testing to non-production / staging targets.\n    \n- Use VPNs/proxies as allowed; be mindful of local laws — unauthorized hacking is illegal.\n    \n\n---\n\n# 📚 Tools commonly used\n\n- Burp Suite (proxy + scanner)\n    \n- Nmap, ffuf, dirb/dirbuster, masscan\n    \n- sqlmap (only if allowed)\n    \n- HTTPie / curl for PoC requests\n    \n- ZAP, GHunt, Sublist3r, Amass for recon\n    \n- GitHub search for leaked keys"}, {"name": "built with", "content": "# Websites Built With: Technologies, Detection Tools, and Security Considerations\n\n---\n\n## 1. Common Website Files and Their Purposes\n\nWebsites often expose certain informational files that can provide insights into their setup:\n\n| File Name | Purpose |\n| :--- | :--- |\n| `readme.html` | Project or website information, version details, credits, and descriptions |\n| `readme.txt` | Similar to `readme.html`, often plain text documentation about the site or software |\n| `readme.md` | Markdown-formatted project details and instructions |\n| `license.txt` | Contains licensing terms and conditions for the website or software |\n| `feed` / `feed.xml` | RSS or Atom feed files used for syndicating website updates |\n\n- Check for all these files under themes, plugins, and all places.\n\n### Security Implications of Exposing These Files\n\n-   **Information Disclosure:** Reveals sensitive details such as software versions, frameworks, CMS types, or server configurations that could aid attackers.\n-   **Fingerprinting:** Attackers and security professionals use these files to identify underlying technologies and potential vulnerabilities.\n-   **Automated Scanners:** Tools like WhatWeb, BuiltWith, and Wappalyzer rely on such files to perform technology detection and profiling.\n\n---\n## 2. Website Technology Detection Tools\n\n### 2.1 BuiltWith\n\n-   **Website:** https://builtwith.com/\n-   **Browser Extensions:**\n    -   Firefox: [BuiltWith Add-on](https://addons.mozilla.org/en-US/firefox/addon/builtwith/)\n    -   Chrome: [BuiltWith Extension](https://chrome.google.com/webstore/detail/builtwith-technology-prof/dapjbgnjinbpoindlpdmhochffioedbn)\n\n**How BuiltWith Works:**\n-   Crawls website URLs analyzing HTTP headers, HTML markup, JavaScript libraries, meta tags, and linked resources.\n-   Detects technologies such as CMS, frameworks, hosting providers, analytics tools, widgets, and more.\n-   Provides categorized, detailed reports of a website's technology stack.\n\n##### **Use Cases**\n\n-   **Competitor Analysis**\n    Discover the technologies your competitors are using to gain market insights and identify opportunities.\n-   **Lead Generation**\n    Identify potential clients or businesses using specific technologies to tailor your sales or marketing efforts.\n-   **Market Research**\n    Study industry trends and track adoption rates of various technologies to stay ahead in the market.\n\n##### **Common Tech Stacks**\n\n**Content Management Systems (CMS)**\n-   **WordPress**\n    Popular for blogs, business websites, and media outlets like BBC and TechCrunch.\n-   **Drupal**\n    Preferred by government and enterprise sites, including The White House.\n-   **Joomla**\n    Used by community-driven websites and small to medium businesses.\n\n**E-commerce Platforms**\n-   **Shopify**\n    Powers online stores such as Gymshark and Allbirds.\n-   **Magento**\n    Chosen by large retailers like Coca-Cola and Ford.\n-   **WooCommerce**\n    Common among small and medium-sized e-commerce sites built on WordPress.\n\n**Web Frameworks**\n-   **React.js**\n    Drives social platforms like Facebook and Instagram.\n-   **Angular**\n    Used in enterprise web applications like Google Cloud Console.\n-   **Vue.js**\n    Popular among startups and tech companies like Xiaomi.\n\n**Hosting Providers & CDNs**\n-   **Amazon Web Services (AWS)**\n    Hosts enterprise services including Netflix and Twitch.\n-   **Microsoft Azure**\n    Powers Microsoft services like Office.com.\n-   **Cloudflare**\n    Provides security and CDN services for millions of websites worldwide.\n\n**Analytics & Advertising Tools**\n-   **Google Analytics**\n    Nearly ubiquitous on commercial websites for traffic analysis.\n-   **Facebook Pixel**\n    Widely used for marketing and tracking conversions on e-commerce sites.\n\n**Custom-Built Websites**\n-   Large corporations such as Apple, Amazon, and Microsoft often build custom websites with proprietary technologies tailored to their needs.\n\n---\n### 2.2 Wappalyzer\n\n-   **Website:** https://www.wappalyzer.com/\n-   **Browser Extensions:**\n    -   Firefox: [Wappalyzer Add-on](https://addons.mozilla.org/en-US/firefox/addon/wappalyzer/)\n    -   Chrome: [Wappalyzer Extension](https://chrome.google.com/webstore/detail/wappalyzer-technology-pro/gppongmhjkpfnbhagpmjfkannfbllamg)\n\n**Features:**\n-   Detects hundreds of technologies including CMS, e-commerce platforms, JavaScript frameworks, server software, analytics, and marketing tools.\n-   Real-time detection from the browser toolbar.\n-   Provides detailed insights into website infrastructure.\n\n> NOTE: Browser extension of this works in LAN websites too.\n\n---\n### 2.3 WhatRuns\n\n-   **Browser Extensions:**\n    -   Firefox: [WhatRuns Add-on](https://addons.mozilla.org/en-US/firefox/addon/whatruns/)\n    -   Chrome: [WhatRuns Extension](https://chrome.google.com/webstore/detail/whatruns/cmkdbmfndkfgebldhnkbfhlneefdaaip)\n\n**Highlights:**\n\n-   Identifies web technologies including fonts, WordPress plugins, themes, analytics, and more.\n-   Lightweight and simple to use.\n\n---\n### 2.4 WhatWeb (CLI Tool)\n\n-   **GitHub:** https://github.com/urbanadventurer/WhatWeb\n\n**Basic Usage:**\n\n```bash\nwhatweb https://www.example.com\n```\n\n**Key Features:**\n\n-   Command-line utility suited for penetration testing and reconnaissance.\n-   Detects web servers, CMSs, frameworks, and other components.\n-   Supports plugin architecture for custom fingerprinting.\n\n---\n## 3. Popular Website Technologies and Examples\n\n| Category | Technologies | Examples / Users |\n| :--- | :--- | :--- |\n| **Content Management Systems (CMS)** | WordPress, Drupal, Joomla | BBC, The White House, Small Businesses |\n| **E-commerce Platforms** | Shopify, Magento, WooCommerce | Gymshark, Coca-Cola, Many online retailers |\n| **JavaScript Frameworks** | React.js, Angular, Vue.js | Facebook, Google Cloud Console, Xiaomi |\n| **Hosting Providers / CDNs** | AWS, Azure, Cloudflare | Netflix, Office.com, Millions of websites |\n| **Analytics & Marketing Tools** | Google Analytics, Facebook Pixel | Almost every commercial website |\n| **Custom-Built Sites** | Proprietary technologies | Apple, Amazon, Microsoft |\n\n---\n\n## 4. Security Best Practices Regarding Technology Exposure\n\n-   **Limit Access:** Restrict public access to files like `readme`, `license`, or sensitive config files.\n-   **Obfuscate Version Info:** Avoid exposing explicit software versions in headers or files.\n-   **Regularly Update Software:** Keep CMS, plugins, and frameworks updated to mitigate known vulnerabilities.\n-   **Use Security Headers:** Implement HTTP security headers to prevent information leakage.\n-   **Monitor Technology Fingerprinting:** Use tools to check what your site exposes publicly and adjust accordingly.\n\n---\n\n## 5. Summary: Why and How Technology Detection Matters\n\n-   **For Security Professionals:**\n    Helps in vulnerability assessment and penetration testing by revealing technologies and possible weak points.\n-   **For Businesses:**\n    Understand competitor technologies, trends, and find opportunities for growth or differentiation.\n-   **For Developers & Site Owners:**\n    Identify your own technology footprint and minimize unwanted exposure.\n\n---\n---"}, {"name": "classification of security threats", "content": "# Classification of Security Threats\n\nSecurity threats can be classified based on their origin and target level. They include **Network-level**, **Host (Node)-level**, **Application-level**, **Physical**, **Human**, and **Natural** threats.\n\n---\n\n## 1. Network-Level Threats\n\nThese attacks target communication channels, data transmission, and network infrastructure.\n\n**Examples:**\n- **Denial of Service (DoS) / DDoS:** Overloading the network with fake traffic to make it unavailable.  \n- **Sniffing / Eavesdropping:** Intercepting data packets to steal confidential information.  \n- **Spoofing:** Pretending to be another device or user (e.g., IP spoofing, ARP spoofing).  \n- **Man-in-the-Middle (MitM):** Intercepting and modifying data between two communicating parties.  \n- **Routing Attacks:** Tampering with routing tables or network protocols.\n\n---\n\n## 2. Host (Node)-Level Threats\n\nThese target individual devices such as computers, servers, or IoT nodes.\n\n**Examples:**\n- **Malware:** Viruses, worms, trojans, ransomware, spyware.  \n- **Unauthorized Access:** Exploiting weak passwords or vulnerabilities.  \n- **Privilege Escalation:** Gaining higher-level permissions than authorized.  \n- **Data Theft or Alteration:** Stealing or tampering with sensitive data.  \n- **Backdoors:** Hidden access points left by attackers or insiders.\n\n---\n\n## 3. Application-Level Threats\n\nThese exploit vulnerabilities in software or web applications.\n\n**Examples:**\n- **SQL Injection:** Injecting malicious database queries.  \n- **Cross-Site Scripting (XSS):** Running malicious scripts in users’ browsers.  \n- **Cross-Site Request Forgery (CSRF):** Forcing users to execute unwanted actions.  \n- **Buffer Overflow:** Overwriting memory to execute arbitrary code.  \n- **Session Hijacking:** Stealing user session cookies or tokens.\n\n---\n\n## 4. Physical Threats\n\nThese involve damage or loss of physical infrastructure or hardware.\n\n**Examples:**\n- **Hardware Theft:** Stealing computers, servers, or storage devices.  \n- **Device Damage:** Intentional destruction or vandalism.  \n- **Power Failure:** Interrupting power supply to systems.  \n- **Fire or Water Damage:** Physical destruction of assets.\n\n---\n\n## 5. Human Threats\n\nThese arise from human actions—either intentional (malicious) or accidental.\n\n**Examples:**\n- **Social Engineering:** Manipulating people to reveal confidential information.  \n- **Insider Threats:** Employees or trusted users misusing access.  \n- **Negligence:** Unintentional errors, such as mishandling data or weak passwords.  \n- **Phishing:** Deceptive emails or messages tricking users into sharing credentials.\n\n---\n\n## 6. Natural Threats\n\nThese result from environmental or natural events beyond human control.\n\n**Examples:**\n- **Earthquakes**  \n- **Floods**  \n- **Fires**  \n- **Storms / Lightning**  \n- **Pandemics or Biological Hazards**\n\n---\n\n## Summary Table\n\n| **Category** | **Focus / Source** | **Example Threats** |\n|---------------|--------------------|---------------------|\n| **Network-Level** | Communication and data transmission | DoS, Sniffing, Spoofing |\n| **Host-Level** | Individual devices and systems | Malware, Unauthorized Access |\n| **Application-Level** | Software and web applications | SQL Injection, XSS |\n| **Physical Threats** | Hardware and facilities | Theft, Fire, Power Failure |\n| **Human Threats** | People (intentional or accidental) | Social Engineering, Insider Attacks |\n| **Natural Threats** | Environmental factors | Floods, Earthquakes, Storms |\n"}, {"name": "katana", "content": "# Katana\n\nKatana is a modern web crawler and spidering tool developed by ProjectDiscovery. It is designed for security researchers and penetration testers, offering speed, modularity, and the ability to handle modern web applications effectively.\n- Crawls the **live website** to discover URLs in real-time.\n- Extracts links from:\n    - HTML\n    - JavaScript files (`-js`)\n    - JavaScript-executed DOM content (`-jc`)\n- Can reveal **hidden, dynamic, or client-side URLs**.\n- Useful for **modern recon**, especially SPAs and JS-heavy sites.\n- Requires more time/resources than passive tools.    \n\t- Finds only currently reachable URLs — not old ones.\n\n----\n## Key Features of Katana\n\n- **High Performance:** Built for speed and efficiency, leveraging modern concurrency techniques. It can handle large-scale web applications quickly.\n    \n- **Modularity:** Supports multiple modules to extend functionality, including file discovery, parameter enumeration, and subdomain discovery. Users can create custom modules to meet specific requirements.\n    \n- **JavaScript-Aware Crawling:** Handles single-page applications (SPA) by parsing JavaScript and dynamically loaded content. It can identify endpoints and parameters hidden within JavaScript.\n    \n- **Integration with Other Tools:** Works seamlessly with tools like Nuclei, HTTPX, and Naabu for vulnerability detection, HTTP probing, and port scanning. Output can be piped directly into these tools for streamlined workflows.\n    \n- **Customizable and Scriptable:** Provides options to filter and customize the scope of crawling. Supports various output formats for easy parsing and reporting.\n\n----\n## Installation\n\nInstall Katana using Go:\n\n```\ngo install github.com/projectdiscovery/katana/cmd/katana@latest\n```\n\n----\n## Basic Usage\n\nCheck the available options:\n\n```\nkatana -h\n```\n\n----\n## Simple Crawl\n\nTo perform a basic crawl:\n\n```\nkatana -u https://www.armourinfosec.com\n```\n\nSave the output to a file:\n\n```\nkatana -u https://www.armourinfosec.com -o armourinfosec.com-katana-output.txt\n```\n\n----\n## JavaScript Crawling\n\nEnable JavaScript-aware crawling:\n\n```\nkatana -u https://www.armourinfosec.com -jc\n```\n\n----\n## Depth Limitation\n\nControl the crawling depth using the `-d` flag:\n\n```\nkatana -u https://www.armourinfosec.com -d 3\n```\n\n----\n## Post-Processing Output\n\nRemove entries containing `www.armourinfosec.com`:\n\n```\ncat armourinfosec.com-katana-output.txt | grep -v www\\.armourinfosec\\.com\n```\n\nList unique JavaScript files (remove query parameters, sort, and deduplicate):\n\n```\ncat armourinfosec.com-katana-output.txt | grep '\\.js' | cut -d '?' -f 1 | sort | uniq\n```\n\n\n---\n---"}, {"name": "pen testing metholodigies", "content": "\n**Penetration testing methodologies** are structured approaches or step-by-step processes that guide security professionals (penetration testers or ethical hackers) in identifying and exploiting vulnerabilities in systems, networks, or applications. These methodologies help ensure that tests are comprehensive, repeatable, and aligned with real-world attack scenarios.\n\n### 🕶️ **Black Box Testing**\n\n- **Tester Knowledge:** No prior knowledge of the system.\n    \n- **Approach:** Simulates an external attacker.\n    \n- **Focus:** Finding vulnerabilities from an outsider's perspective (e.g., websites, public servers).\n    \n- **Pros:**\n    \n    - Realistic attack simulation.\n        \n    - Good for identifying exposure to the public.\n        \n- **Cons:**\n    \n    - Limited depth.\n        \n    - May miss internal issues.\n        \n\n---\n\n### ⚙️ **White Box Testing**\n\n- **Tester Knowledge:** Full knowledge of system architecture, source code, and internal logic.\n    \n- **Approach:** Simulates an internal employee or developer.\n    \n- **Focus:** Comprehensive analysis of code, infrastructure, configurations.\n    \n- **Pros:**\n    \n    - Deep analysis, including logic flaws and backdoors.\n        \n    - Efficient and thorough.\n        \n- **Cons:**\n    \n    - Time-consuming.\n        \n    - May not reflect real-world attack scenarios.\n        \n\n---\n\n### ⚫⚪ **Grey Box Testing**\n\n- **Tester Knowledge:** Partial knowledge of the system (e.g., user credentials, architecture diagrams).\n    \n- **Approach:** Simulates an insider threat or a compromised user.\n    \n- **Focus:** Targeted attacks with some context (e.g., privilege escalation, internal attacks).\n    \n- **Pros:**\n    \n    - Balanced and realistic.\n        \n    - More efficient than black box.\n        \n- **Cons:**\n    \n    - Still may miss deep internal flaws if access is limited.\n        \n\n---\n\n### 📊 Summary Table\n\n|Methodology|Tester Knowledge|Simulates|Strength|\n|---|---|---|---|\n|**Black Box**|No internal knowledge|External attacker|Realistic from outsider view|\n|**White Box**|Full internal access|Developer/admin insider|Deep and thorough analysis|\n|**Grey Box**|Partial knowledge|Insider/user threat|Balanced, efficient testing|"}, {"name": "penetration testing", "content": "# 🛡️ Penetration Testing Types (Easy Guide)\n\nPenetration testing (or \"pen testing\") means testing your systems like a hacker would — to find and fix weak points before real hackers can exploit them.\n\n---\n\n## 🔌 1. Network Penetration Testing\n**What it tests:** Computers, servers, and devices connected in a network.  \n**Goal:** Find open doors (called \"ports\") or weak settings that hackers could use.  \n**Risks:** Weak passwords, old software, unsafe services.  \n**Common Tools:** Nmap, Nessus, Metasploit.\n\n🧠 **Definitions:**\n- **Port:** A virtual door on a computer where data comes in or out.\n- **Service:** A program running in the background like email or file sharing.\n\n---\n\n## 🌐 2. Web Application Penetration Testing\n**What it tests:** Websites or apps you access through a browser.  \n**Goal:** Find bugs in login pages, forms, and how data is handled.  \n**Risks:** Hackers stealing data or logging in without permission.  \n**Common Tools:** Burp Suite, OWASP ZAP.\n\n🧠 **Definitions:**\n- **SQL Injection (SQLi):** Trick that lets hackers mess with a database.\n- **XSS (Cross-Site Scripting):** Lets hackers run bad scripts on websites.\n- **CSRF:** Tricks a user into doing something they didn’t mean to.\n\n---\n\n## 📶 3. Wireless Penetration Testing\n**What it tests:** Wi-Fi networks.  \n**Goal:** Check how easy it is to break into the wireless network.  \n**Risks:** Hackers spying on traffic or pretending to be your Wi-Fi.  \n**Common Tools:** Aircrack-ng, Kismet, Wireshark.\n\n🧠 **Definitions:**\n- **Access Point (AP):** The device that gives you Wi-Fi.\n- **MITM (Man-in-the-Middle):** When a hacker secretly watches or changes data between two people.\n\n---\n\n## 🤖 4. IoT (Internet of Things) Penetration Testing\n**What it tests:** Smart devices like cameras, doorbells, and sensors.  \n**Goal:** Check for weak passwords or poor coding.  \n**Risks:** Hackers controlling your devices.  \n**Common Tools:** Shodan, Binwalk.\n\n🧠 **Definitions:**\n- **Firmware:** Software inside smart devices.\n- **Default credentials:** Factory-set username and password (like \"admin/admin\").\n\n---\n\n## 🔗 5. API Penetration Testing\n**What it tests:** APIs — the bridges that connect different software together.  \n**Goal:** Make sure users can only access their own data.  \n**Risks:** Stealing private info or breaking the app.  \n**Common Tools:** Postman, Burp Suite.\n\n🧠 **Definitions:**\n- **API (Application Programming Interface):** Lets two programs talk to each other.\n- **IDOR (Insecure Direct Object Reference):** When a user can access another user's info just by changing a number in the link.\n\n---\n\n## 🏢 6. Physical Security Testing\n**What it tests:** Your building or office's physical security.  \n**Goal:** See if someone can get inside without permission.  \n**Risks:** A person stealing devices or plugging in bad USBs.  \n**Common Tools:** RFID cloners, USB drop devices.\n\n🧠 **Definitions:**\n- **Tailgating:** When someone follows you into a secure area without a badge.\n- **USB drop:** A hacker leaves a USB stick hoping someone plugs it in.\n\n---\n\n## 📱 7. Mobile Application Testing\n**What it tests:** Apps on phones and tablets.  \n**Goal:** Make sure data is safe and not stored in the wrong place.  \n**Risks:** Hackers stealing data or spying on users.  \n**Common Tools:** MobSF, Frida.\n\n🧠 **Definitions:**\n- **APK:** The installable file for Android apps.\n- **Hardcoded secrets:** Passwords or keys written into the app code.\n\n---\n\n## 💻 8. Desktop Application Testing\n**What it tests:** Programs you install on computers.  \n**Goal:** Find bugs that let hackers change files or break the app.  \n**Risks:** Hackers taking over your computer or stealing local data.  \n**Common Tools:** IDA Pro, x64dbg.\n\n🧠 **Definitions:**\n- **Buffer overflow:** A bug that lets hackers mess with memory.\n- **DLL Injection:** A way to make a program do something it shouldn’t.\n\n---\n\n## 📊 Summary Table\n\n| Type                  | What it Tests            | Risks                               |\n|-----------------------|---------------------------|--------------------------------------|\n| Network               | Devices and servers       | Weak passwords, open ports          |\n| Web App               | Websites and forms        | Data leaks, login bypass            |\n| Wireless              | Wi-Fi networks            | Hacked Wi-Fi, spying                |\n| IoT                   | Smart gadgets             | Hijacked devices                    |\n| API                   | Software connectors       | Data theft, broken permissions      |\n| Physical Security     | Offices and doors         | Unauthorized entry, USB traps       |\n| Mobile App            | Phone apps                | Insecure storage, leaked info       |\n| Desktop App           | PC software               | Local attacks, memory bugs          |\n"}, {"name": "phase of pen testing", "content": "# Penetration Testing Summary Flow\n\n## ✅ 1. Planning\n\n**Objective:**  \nDefine the scope, goals, and legal boundaries of the penetration test.\n\n**Activities Include:**\n\n- Getting client approvals\n    \n- Defining target systems/IP ranges\n    \n- Setting up timelines and deliverables\n    \n- Identifying rules of engagement (ROE)\n    \n\n---\n\n## 🕵️‍♂️ 2. Reconnaissance\n\n**Objective:**  \nGather information about the target without direct interaction (passive) or with limited probing (active).\n\n**Tools Used:**  \ntheHarvester, Maltego, Shodan, FOCA\n\n**Installation (Kali Linux):**\n\n- `sudo apt install theharvester`\n    \n- `sudo apt install maltego`\n    \n- `pip install shodan` (then `shodan init <API_KEY>`)\n    \n- FOCA is Windows-based; run via Wine or VM\n    \n\n**Activities Include:**\n\n- Identifying domain names, emails, IPs\n    \n- Social media research\n    \n- WHOIS, DNS info collection\n    \n\n---\n\n## 🔎 3. Vulnerability Analysis (Scanning & Analysis)\n\n**Objective:**  \nIdentify potential vulnerabilities in the target system.\n\n**Tools Used:**  \nNmap, Nessus, OpenVAS, Nikto\n\n**Installation (Kali Linux):**\n\n- `sudo apt install nmap`\n    \n- Download Nessus from tenable.com\n    \n- `sudo dpkg -i Nessus-*.deb && sudo systemctl start nessusd`\n    \n- `sudo gvm-setup && sudo gvm-start` (for OpenVAS)\n    \n- `sudo apt install nikto`\n    \n\n**Activities Include:**\n\n- Port and service scanning\n    \n- OS and version detection\n    \n- Vulnerability scans and misconfiguration checks\n    \n\n---\n\n## 💥 4. Exploitation\n\n**Objective:**  \nUse discovered vulnerabilities to gain unauthorized access.\n\n**Tools Used:**  \nMetasploit, SQLMap, Burp Suite, custom scripts\n\n**Installation (Kali Linux):**\n\n- `sudo apt install metasploit-fr
