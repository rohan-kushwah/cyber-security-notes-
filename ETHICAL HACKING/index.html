amework`\n    \n- `sudo apt install sqlmap`\n    \n- `sudo apt install burpsuite`\n    \n\n**Activities Include:**\n\n- Gaining access to systems or networks\n    \n- Escalating privileges\n    \n- Pivoting to other systems\n    \n\n---\n\n## 🔐 5. Post-Exploitation\n\n**Objective:**  \nAssess the value of the compromised system and maintain access.\n\n**Tools Used:**  \nMimikatz, BloodHound, PowerView\n\n**Installation (Kali Linux):**\n\n- BloodHound: `sudo apt install bloodhound`\n    \n- Neo4j DB (for BloodHound): `neo4j console`\n    \n- Mimikatz and PowerView are used on Windows targets (via payloads or remote shells)\n    \n\n**Activities Include:**\n\n- Extracting credentials\n    \n- Mapping internal network (Active Directory)\n    \n- Installing persistence mechanisms\n    \n\n---\n\n## 📝 6. Reporting\n\n**Objective:**  \nDocument findings, risks, and recommendations in a formal report.\n\n**Tools Used:**  \nDradis, Serpico, Markdown/PDF tools, Screenshot tools\n\n**Installation (Kali Linux):**\n\n- `sudo apt install dradis`\n    \n- Serpico:\n    \n    ```\n    git clone https://github.com/SerpicoProject/Serpico.git\n    cd Serpico\n    ./scripts/kali_install.sh\n    ./start_serpico.sh\n    ```\n    \n- Markdown & PDF: `sudo apt install pandoc libreoffice`\n    \n- Screenshots: `sudo apt install shutter flameshot`\n    \n\n**Activities Include:**\n\n- Compiling vulnerability data and evidence\n    \n- Assigning severity scores (e.g., CVSS)\n    \n- Creating an executive summary and technical details\n    \n\n---\n\n## 🔁 7. Retesting (Optional)\n\n**Objective:**  \nEnsure that identified vulnerabilities have been resolved effectively.\n\n**Activities Include:**\n\n- Repeating exploitation tests on patched systems\n    \n- Verifying if mitigations were successful\n    \n- Confirming no new vulnerabilities were introduced"}, {"name": "scope of pentesting", "content": "# 🛡️ Penetration Testing — Scope & Client Request Examples\n\n## 🔍 What is Pentesting?\n**Penetration Testing (Pentesting)** is a simulated cyberattack conducted to find and fix vulnerabilities before real attackers exploit them.\n\n### 🎯 **Purpose**\n- Identify security weaknesses in systems, applications, or networks.  \n- Demonstrate real impact through controlled exploitation.  \n- Recommend prioritized, actionable fixes.\n\n### 📦 **Typical Deliverables**\n- Executive summary (management view)  \n- Detailed technical findings with evidence  \n- Risk ratings (High / Medium / Low)  \n- Step-by-step remediation guidance  \n- Optional retest after fixes  \n\n---\n\n## 🌐 Common Pentest Scopes\n\n| Area | Target Example | Purpose |\n|------|----------------|----------|\n| **External** | Public IPs, Domains | Test Internet-facing services |\n| **Internal** | LAN, AD, Internal Apps | Simulate insider or breached host |\n| **Web App** | Websites, Portals | Find OWASP Top 10 vulnerabilities |\n| **API** | REST, GraphQL | Test authorization, logic, and data exposure |\n| **Mobile** | Android/iOS | Analyze app logic and local storage |\n| **Cloud** | AWS / Azure / GCP | Identify misconfigurations and privilege escalation |\n| **Containers/K8s** | Docker, Pods | Check RBAC, container escapes |\n| **Active Directory** | Domains | Assess Kerberos, LAPS, GPO issues |\n| **Wireless** | Wi-Fi Networks | Detect weak encryption, rogue APs |\n| **Social Engineering** | Employees | Test human factor (phishing) |\n| **IoT / SCADA** | Embedded devices | Firmware and communication flaws |\n| **SSL/TLS / Crypto** | HTTPS Servers | Analyze TLS configs and ciphers |\n| **Red Team** | Full attack simulation | End-to-end test of detection & response |\n| **Code Review** | Source code | Find logic or injection flaws |\n\n---\n\n## 🧾 How Clients Request Pentests — Real Examples\n\nBelow are realistic **email/request templates** for each type of pentest 👇\n\n---\n\n### 1️⃣ External Network Pentest\n> **Subject:** External Network Penetration Test Request  \n> Scope: `203.0.113.10`, `203.0.113.11`, `app.example.com`  \n> Include service discovery, auth bypass, misconfig, exploitation (no DoS).  \n> Window: 2025-11-20 → 2025-11-21 (09:00–18:00 IST)  \n> Deliverables: executive + technical report + remediation list.\n\n---\n\n### 2️⃣ Internal Network Pentest\n> **Subject:** Internal Network Security Assessment  \n> Scope: VLAN `10.10.0.0/16` (lab environment).  \n> Include privilege escalation, AD testing, lateral movement.  \n> No destructive actions.  \n> Provide fix list and report.\n\n---\n\n### 3️⃣ Web Application Pentest\n> **Subject:** Web Application Pentest — `https://myapp.example.com`  \n> Test for OWASP Top 10, session issues, input validation, logic flaws.  \n> Credentials: user@example.com / P@ssw0rd  \n> Exclude production data deletion.  \n\n---\n\n### 4️⃣ API Security Test\n> **Subject:** API Pentest — `https://api.example.com/v1/`  \n> Include auth checks, IDOR, rate-limit bypass, mass assignment.  \n> API key and OpenAPI spec provided.  \n\n---\n\n### 5️⃣ Mobile App Pentest\n> **Subject:** Mobile Application Pentest — ExampleApp v3.2  \n> Platform: Android (APK attached).  \n> Test SSL/TLS, local data storage, and backend API security.  \n> Provide test credentials and results.\n\n---\n\n### 6️⃣ Cloud Infrastructure Assessment\n> **Subject:** Cloud Security Test — AWS Account 123456789012  \n> Scope: IAM roles, S3, EC2, EKS.  \n> Test least-privilege, misconfigurations, secrets exposure.  \n> Read-only IAM role provided.\n\n---\n\n### 7️⃣ Container / Kubernetes Test\n> **Subject:** Kubernetes Security Review  \n> Scope: cluster.example.com  \n> Include RBAC, PSP, image vulnerability, pod privilege checks.  \n\n---\n\n### 8️⃣ Active Directory Pentest\n> **Subject:** AD Pentest — Domain armour.local  \n> Include Kerberoasting, LLMNR poisoning, GPO review.  \n> Jump host provided.  \n\n---\n\n### 9️⃣ Wireless Security Test\n> **Subject:** Wi-Fi Security Test — Office SSIDs  \n> Scope: Corp-WiFi, Guest-WiFi  \n> Test WPA2/3 strength, rogue AP detection.  \n> Schedule: after hours (21:00–02:00).  \n\n---\n\n### 🔟 Social Engineering Test\n> **Subject:** Phishing Simulation (Consent Provided)  \n> 200 employees targeted, credential capture simulation only.  \n> Legal and HR approvals attached.  \n\n---\n\n### 1️⃣1️⃣ IoT / Embedded Device Test\n> **Subject:** IoT Device Security Review — Model X  \n> Include firmware analysis, default credentials, communication security.  \n> Test unit and firmware image supplied.  \n\n---\n\n### 1️⃣2️⃣ SSL/TLS & Crypto Assessment\n> **Subject:** TLS Configuration Review — `https://secure.example.com`  \n> Validate certificates, supported protocols, ciphers, and HSTS.  \n> Check for Heartbleed, POODLE, renegotiation issues.  \n> Provide final A–F grade and fixes.\n\n---\n\n### 1️⃣3️⃣ Red Team Engagement\n> **Subject:** Red Team Exercise — Simulated Attack  \n> Combine external, internal, phishing, and persistence testing.  \n> Duration: 2 weeks.  \n> Deliver: detection logs, incident response evaluation, and full report.\n\n---\n\n### 1️⃣4️⃣ Code Review (SAST)\n> **Subject:** Secure Code Review — Git Repo `myapp`  \n> Check SQLi, XSS, deserialization, secret leakage.  \n> Deliver annotated findings and recommendations.\n\n---\n\n## 🧠 Common Info to Include in Any Request\n- **Scope:** IPs, hostnames, or URLs.  \n- **Schedule:** start/end dates and time window.  \n- **Allowed actions:** exploitation limits, DoS exclusions.  \n- **Credentials:** test users or admin access.  \n- **Contacts:** technical & legal escalation.  \n- **NDA:** attached for authorization.  \n- **Deliverables:** report type, retest policy.  \n- **Incident plan:** emergency rollback contact.\n\n---\n\n## 🔒 SSL/TLS Pentest — Key Checks\n| Test | Description |\n|------|-------------|\n| **Certificate Validity** | Expiry, issuer, chain trust |\n| **Protocol Support** | Detect TLS 1.0/1.1, recommend TLS 1.2+ |\n| **Cipher Suites** | Remove RC4, 3DES, weak DH |\n| **Key Strength** | Ensure RSA ≥2048 bits |\n| **Vulnerability Tests** | Heartbleed, POODLE, renegotiation |\n| **Security Headers** | HSTS, OCSP stapling, certificate pinning |\n\n---\n\n## 🧩 Summary\n> Penetration testing helps organizations **see themselves through an attacker’s eyes** — before real damage occurs.  \n> Proper scoping and clear communication between **client** and **tester** ensure safe, authorized, and valuable results.\n\n---\n\n✅ **Use this file as a base for:**\n- Project documentation  \n- Client proposal templates  \n- Training notes for junior pentesters  \n- Compliance appendices (ISO 27001, PCI DSS, SOC 2)\n\n---\n\n> **Author:** Rohan  \n> **Category:** Cybersecurity / Pentesting Documentation  \n> **Format:** Markdown (.md)\n"}, {"name": "security threats and threat modelling", "content": "## **Security Threats and Threat Modeling in Cybersecurity**\n\n---\n\n### ⚠️ **1. What is a Security Threat?**\n\nA **security threat** is any **potential danger or risk** that can harm a system, network, or data by exploiting vulnerabilities.  \nThese threats can cause **data loss, unauthorized access, or system damage**.\n\n🧠 **In short:**\n\n> A threat is anything that can **break the security** of your system.\n\n---\n\n### 💣 **2. Types of Security Threats**\n\n#### 🔹 **a. Malware**\n\nMalicious software like **viruses, worms, trojans, ransomware**, or **spyware** that can damage or steal data.\n\n#### 🔹 **b. Phishing**\n\nFake emails or messages that **trick users** into revealing sensitive information.\n\n#### 🔹 **c. Denial of Service (DoS/DDoS)**\n\nAttackers **overload** a system or website, making it unavailable to real users.\n\n#### 🔹 **d. Man-in-the-Middle (MitM)**\n\nAttackers **intercept** communication between two parties to steal or alter data.\n\n#### 🔹 **e. Insider Threat**\n\nAn **employee or trusted person** misuses access to harm the organization.\n\n#### 🔹 **f. SQL Injection**\n\nHackers inject **malicious SQL commands** to access or manipulate databases.\n\n#### 🔹 **g. Zero-Day Attack**\n\nExploits a **software vulnerability** before the vendor can fix it.\n\n---\n\n### 🧩 **3. What is Threat Modeling?**\n\n**Threat Modeling** is a process used to **identify, analyze, and prioritize potential threats** to a system.  \nIt helps security teams understand **where and how attacks can happen**, and plan defenses in advance.\n\n🧠 **In short:**\n\n> Threat Modeling = **Thinking like a hacker** to protect the system better.\n\n---\n\n### 🧠 **4. Common Threat Modeling Approaches**\n\n#### 🔹 **a. STRIDE Model (by Microsoft)**\n\nFocuses on six types of threats:  \n**S**poofing, **T**ampering, **R**epudiation, **I**nformation disclosure, **D**enial of service, **E**levation of privilege.\n\n#### 🔹 **b. PASTA (Process for Attack Simulation and Threat Analysis)**\n\nA 7-step, risk-based model focused on **business impact**.\n\n#### 🔹 **c. DREAD**\n\nRates threats based on **Damage, Reproducibility, Exploitability, Affected users, and Discoverability**.\n\n---\n\n### 👨‍💻 **5. Types of Cybersecurity Teams**\n\n#### 🔹 **a. Red Team (Attackers)**\n\n- Act like **hackers** to test the system’s defense.\n    \n- Perform **penetration testing** and **ethical hacking**.\n    \n\n#### 🔹 **b. Blue Team (Defenders)**\n\n- Protect and **defend** the organization’s network.\n    \n- Monitor systems, detect, and respond to attacks.\n    \n\n#### 🔹 **c. Purple Team (Collaborators)**\n\n- **Bridge** between Red and Blue teams.\n    \n- Share insights to **improve both attack and defense strategies**.\n    \n\n---\n\n### 🧾 **Summary Table**\n\n|Concept|Meaning|Example|\n|---|---|---|\n|**Security Threat**|Possible danger to a system|Malware, phishing|\n|**Threat Modeling**|Identifying & analyzing threats|STRIDE, PASTA|\n|**Red Team**|Simulates attacks|Ethical hackers|\n|**Blue Team**|Defends against attacks|Security analysts|\n|**Purple Team**|Coordinates Red & Blue|Combined operations|"}];

// Build sidebar
function buildSidebar(filter) {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  let count = 0;
  NOTES.forEach((note, i) => {
    if (filter && !note.name.toLowerCase().includes(filter.toLowerCase())) return;
    const div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    div.innerHTML = '<span class="fi-icon">▸</span>';
    const span = document.createElement('span');
    span.className = 'fi-name';
    span.textContent = note.name; // textContent = safe, no XSS
    div.appendChild(span);
    div.onclick = () => openNote(i);
    list.appendChild(div);
    count++;
  });
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

// SAFE note renderer - uses DOM API, never raw innerHTML for user content
function openNote(idx) {
  document.querySelectorAll('.file-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'ETHICAL HACKING/' + NOTES[idx].name;
  
  // SAFE render: parse markdown to safe HTML
  const html = renderMd(NOTES[idx].content);
  
  // Use DOMParser to safely parse - strips all scripts
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div>' + html + '</div>', 'text/html');
  
  // Remove ALL script, iframe, object, embed tags for safety
  ['script','iframe','object','embed','form'].forEach(tag => {
    doc.querySelectorAll(tag).forEach(el => el.remove());
  });
  
  // Remove on* event attributes
  doc.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(attr => {
      if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
    });
  });
  
  const viewer = document.getElementById('viewerContent');
  viewer.innerHTML = '';
  viewer.appendChild(doc.body.firstChild);
  viewer.scrollTop = 0;
}

function renderMd(md) {
  // Escape HTML entities FIRST - this is the key security step
  let h = md
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  // Code blocks (must be before inline code)
  h = h.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
  // Inline code
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Headers
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold + Italic
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // HR
  h = h.replace(/^---+$/gm, '<hr>');
  // Blockquote
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Table
  h = h.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (m, header, rows) => {
    const ths = header.split('|').filter(s => s.trim()).map(s => `<th>${s.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(s => s.trim()).map(s => `<td>${s.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  // Lists
  h = h.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]+?<\/li>)/g, m => `<ul>${m}</ul>`);
  h = h.replace(/<\/ul>\s*<ul>/g, '');
  // Links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // Obsidian links
  h = h.replace(/\[\[([^\]]+)\]\]/g, '<span style="color:var(--yellow)">⟦$1⟧</span>');
  // Paragraphs
  h = h.replace(/\n\n+/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  return '<p>' + h + '</p>';
}
