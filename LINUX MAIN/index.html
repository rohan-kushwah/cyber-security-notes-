<script>
var NOTES = [{"name": "ACCESS CONTROL LIST", "content": "give permission to individual user of that data binary etc \npermissions like read write execute etc \nin other special permissions we give permissions to all  group all other user etc\nbut in acl we give permission of data to individual use\nto use acl ensure your filesystem your file system supports them eg - ext4 ext3 xfs \ncommand for file system \ndf -h for file systems \nblkid for type of file system \n [rpm -qa | grep acl]\n for detail of acl\n if not install so command for installation \n [yum install acl]\n# get -\ngetfacl --help\ngetfacl then file directory name-\nse us file pe kisko kisko permissions hai wo aa jayegi\n# to set acl on data=\nacl file ki permission panel ke ankhiri me show hota hai\n[+] symbol\n# setfacl-\nsetfacl --help\nsetfacl -m u:username:permissions filename\n[-m] for modify \nif done toh wo file ki permissions ke end me {+} aa jayega\nsetfacl -m g:grouoname:permissions filename\n# to remove acl-\nsetfacl -x u:username:permissions filename\nsetfacl -x g:groupname:permissions filename\n#kisi bhi data se pure acl permissions hi hatani ho toh\n[-b] \nsetfacl -b  filename\n ab directory me acl lagaya aur ye karna hai ab jo bhi nai directory bane uspe bhi whi permissions lage jo parent folder pe hai toh\n setfacl -d -m u:username:permissions foldername\n setfacl -d -m g:groupname:permissions foldername\n {-R} se directory ke andaar directory hai usme bhi same permissions lagegi jo parent folder pe hai\n but ab usme naya folder banainge usme nhi lagegi\n Access Control List (ACL): \n\n    An Access Control List (ACL) in Linux is a mechanism that allows for more granular permissions on f es and directories than the\n    traditional user-group-other permission model. ACLs enable you to specify permissions for individual users or groups beyond the file's\n    owner, group, and others.\n\n      Key Concepts of ACLs:\n\n      Standard Permissions: Linux files and directories have three standard permission sets: user (owner), group, and others.\n\n      Extended Permissions: ACLS allow you to assign specific read, write, and execute permissions to additional users or groups.\n\nManaging ALs: To use ACLs, ensure your filesystem supports them (e.g. ext3,ext4, XFS).\n\nEnabling ACLs:\n    Mount the filesystem with the act option\n    # mount To make this\n/dev/sdX -o act /dev/sdX /mountpoint\n  change permanent, add it to /etc/fstab:\n/mountpoint ext4 defaults, acl 2\n\n\nCHECK ACL-\n\n  rpm -qa I grep acl\n  rpm -qi act\n  yum install acl\n  rpm -ql acl\n\nGETFACL-\n\n    getfacl --help\n    getfacl /data2\n    getfacl /etc/hostname /etc/os- release\n\n    - -help\n    /data2\n    /etc/passwd\n    /etc/hostname\n    /etc/hostname /etc/os- release\n\n    getfacl -R data2\n\n    getfacl -R folder-name\n\n\nSET ACL-\n\nTo set ACL for a user-\n\n      # setfacl --help\n\n      # set fact -m u: username: permissions filename\n\n      # set fact -m u: armour:rwx /data2\n      \n      # setfacl -m u:armour:rw /etc/os-release\n\n      # set fact -m g:IT:rwx /data\n\nREMOVE ACL-\n\n      # setfacl -x u:armour /data2\n\n      # setfacl -x g:IT /data2\n\nREMOVE ALL ACL-\n\n      # setfacl -b /data2\n\n      # setfacl -b folder-name\n\n      # setfacl -R -d folder-name\n\nDefault ACLs:\n\n      Set default ACLs for directories (applies to new files and subdirectories):\n        \n        # setfact -d -m u:username:permissions dirname\n        \n        # set fact -d I-m u:armour:rwx /data2\n\n      use the setfacl for the normal file to do all the changes\n      setfacl -l  se permission us folder pe dikh jayegi"}, {"name": "ADDDITIONAL GREP", "content": "additional commands of grep commmand\n### Basic `grep` Command Usage:\n\n1. **Search for a pattern in a file:**\n    \n    bash\n    \n    Copy code\n    \n    `grep \"pattern\" filename`\n    \n2. **Search for a pattern in multiple files:**\n    \n    bash\n    \n    Copy code\n    \n    `grep \"pattern\" file1 file2 file3`\n    \n3. **Search for a pattern recursively in all files in a directory:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -r \"pattern\" /path/to/directory`\n    \n4. **Search for a pattern ignoring case (case-insensitive search):**\n    \n    bash\n    \n    Copy code\n    \n    `grep -i \"pattern\" filename`\n    \n5. **Display line numbers along with matching lines:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -n \"pattern\" filename`\n    \n6. **Show only the count of matching lines:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -c \"pattern\" filename`\n    \n7. **Show lines that do not match the pattern:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -v \"pattern\" filename`\n    \n8. **Show only the matched part of the line:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -o \"pattern\" filename`\n    \n9. **Display the matching line and the lines around it:**\n    \n    - **Before matching line (e.g., 3 lines before):**\n        \n        bash\n        \n        Copy code\n        \n        `grep -B 3 \"pattern\" filename`\n        \n    - **After matching line (e.g., 3 lines after):**\n        \n        bash\n        \n        Copy code\n        \n        `grep -A 3 \"pattern\" filename`\n        \n    - **Both before and after matching lines (e.g., 3 lines before and after):**\n        \n        bash\n        \n        Copy code\n        \n        `grep -C 3 \"pattern\" filename`\n        \n\n### Advanced Options:\n\n1. **Search for whole words only:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -w \"word\" filename`\n    \n2. **Search for patterns that match the regular expression (regex):**\n    \n    bash\n    \n    Copy code\n    \n    `grep -E \"pattern\" filename`\n    \n3. **Search for the exact match of a pattern:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -x \"pattern\" filename`\n    \n4. **Invert match to show lines that do not match the pattern:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -v \"pattern\" filename`\n    \n5. **Search using regular expressions (extended):**\n    \n    bash\n    \n    Copy code\n    \n    `grep -P \"pattern\" filename`\n    \n6. **Show matching file names only (useful for recursive searches):**\n    \n    bash\n    \n    Copy code\n    \n    `grep -l \"pattern\" *`\n    \n7. **Show matching lines along with file names:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -H \"pattern\" *`\n    \n8. **Show all lines, including the ones without a match:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -h \"pattern\" *`\n    \n9. **Search for multiple patterns at once:**\n    \n    bash\n    \n    Copy code\n    \n    `grep -e \"pattern1\" -e \"pattern2\" filename`\n    \n\n### Grep Examples with File Output:\n\n- **Search for a pattern in a file and output to a new file:**\n    \n    bash\n    \n    Copy code\n    \n    `grep \"pattern\" filename > output.txt`\n    \n- **Append the output to an existing file:**\n    \n    bash\n    \n    Copy code\n    \n    `grep \"pattern\" filename >> output.txt`\n    \n\n### Combining `grep` with Other Commands:\n\n1. **Search through the output of a command using a pipe:**\n    \n    bash\n    \n    Copy code\n    \n    `command | grep \"pattern\"`\n    \n2. **Example: Find running processes related to \"ssh\":**\n    \n    bash\n    \n    Copy code\n    \n    `ps aux | grep \"ssh\"`\n    \n3. **Search for a pattern in the output of `dmesg` (system logs):**\n    \n    bash\n    \n    Copy code\n    \n    `dmesg | grep \"error\"`\n    \n\n### Conclusion\n\n`grep` is a powerful and flexible tool for searching text in files. By using various options, you can customize searches and integrate `grep` with other commands to enhance its functionality.\n\n  \n\nChatGPT can mak"}, {"name": "ALIAS IN SUDO", "content": "user     ALL(ALL:ALL)  ALL\nek user all hosts me all groups and user ki power se all command chala sakta hai\nHost_ Alias - SE KIS KIS HOST SE USER COMMAND CHALA SAKTA HAI [visudo] me entry karenge \nUser_Alias - KIS KIS USER PE PE US COMMAND KO RUN KARSAKTE ho kis kis ki power se\nRunas_ALIAS - SE KISKI PERMISSION SE RUN HOGI USERNAME KI POWER WALA\nRunas_Alias - se kis group ki permission se run hogi group ko define karo toh % likho\n[:] ke age groupname aayenge\nCommand_Alias - me konsi konsi command kis user aur group ki power se aur kis host se aur ki user se run hogi\nalias se hum password aur no password bhi define kar sakte hai\n:PASSWD for commands FULL LOCATION\n:NOPASSWD FOR COMMANDS FULL LOCATION\nCHANGES ON SUDEORS FILE\n![[Pasted image 20250122002733.png]]\n#jab tak user jispe hum group ki power se command chala rhe jab wo us group me add na ho tab tak nhi chalegi\nya jab hum useraliase banate hai usme wo user add karna padega jisse sudo chalani ho and run as me group name\n![[Pasted image 20250122011515.png]]\nab jaise rohan particular user hai usko hum permission de re ki groupuser alias ke groups se usese hum run kar sakte hai but jabhi run hoga tab hum un group me is user ko add karenge \n\n\n#DOUBT- JAISE KUSHWAH USER HSI USKO HUMNE JO GROUPUSER NAM KA ALIAS HAI USSE HUMNE CMD RUN KARNE KI PERMISSION DE DI BUT AB WO USER KO ADD KARNA PADEGA UN GROUP ME TOH JAB ALL DETE HAI GROUPPOWER ME WO PHIR KAISA CHALTA HAI - anwer [wo jab alias banainge tb group name ke sath percentage nhi dena hai]"}, {"name": "ARCHEIVE OR AKAY COMMAND", "content": "archive or akay \nwhy we archieve files -\n1. for make a backup for particular file \n#command - tar -cvf  [file name after archive file]   original file name for archieve\ndecribe- tar = archieve   c for create  v for vervus and f for forcefully\n\nex - tar -cvf messages1.tar messages1 \nuse wildcards \nalso uses in directory for archive \nex = tar -cvf log.tar log\n  tar make bakcup   not compression of file\n   #command = tar -xvf  file name jisko extract karna ho\n   x for extract in this following command\n   ex = tar -xcf log.tar\n   #files ko delete  kar de uske  bad tar ko extract kar ke wapas la skate hai  \n   ek extension ke andar maximum files ka tar rakh sakte hai\n   #tar supports only bzip2 aur zip switch\n    for both switches following commands are-\n    1. for bzip=tar -cjvf messages.tbz messages\n    2. for gzip = tar -czvf messages.tzg messages\n in tar 7z or zip not working\n- hum kisi bhi extract kari hui file ko \n #command = tar -xvf aur extract file se waps layenge\n yadi koi file ko compress kiya ho toh use by process se bhi  hata sakte hai \n like bzip se kiya ho toh = pehle bunzip karo then tar se extracct\n #gzip tar file pe direct laga sakte hai \n #du se kisi bhi files aur directory ke andar ka data dekh sakte hai \n ex= du -h log\n #file kar ke hum uske andaar ki files details dekh sakte hai jaise humko kisne compressed ki hai wo dekhna hai to file command use karenge\n "}, {"name": "AWK ADVANCED", "content": "awk advancesd\nbegin print akeli chal jati hai end aur main nhi chalti without use of command\n#special characters- \necho 1 2 3 | awk '{print $0}'\necho 123 | awk '{print $1,$2}'\nab  $1 aur $2 ke bich me special kuch chaiye toh \necho 1 3 | awk '{print $1 \"-\" $3}'\ntoh - ha jayega \nspace dekh le relatable word s dekh le character dekh lo etc\n d limitor ya file separator ap nhi de rhe hai toh wo space count hoga\n then ye passwd file me karke dekh le\n #change the value\n ex - echo \"armour infosec\" | awk '{print $0}'\n ye pura layega \n ab ek field print karenge toh\n toh field 1 , 2 kar do\n ab value update karni hotoh\n echo \"armour infosec\" | awk '{$1=\"Armour\" ;print $0}'\n then ab armour ki jagah ARMOUR aayeega \n file me bhi changes kar sakte hai aur multiples column par bhi \nthen ifconfig karke inet ko apni way se grep karo\nifconfig | awk '/inet/{print $2}' \nor aise bhi kar sakte hai rasta bata ke\nifconfig | awk '$1==\"inet\"{print $2}' \ncondition field line 2 lao jiski field line 1 = inet ho\nmtu netmask ether karke dekh lo\nthen passwd file ke andar root ko grep karke dekh lo \nawk -F: '$1= \" root\"{print $0}' /etc/passwd\naisa line print karo jiski pehli fied root aa rhi ho\nthen rohan wali line find kar lo\n6th field pe home location and 3rd pe uid\njis user ki uid 0 wo root baki other\nawk -F: '$3=0 {print $0}' /etc/passwd ek aur = aayega\nnot equal zero karwa lo greater karwa lo less karwa lo\n#kisi file se bhi pattern de sakte hai\npattern de do file me\nthen -f laga ke jis file me pattern diya hai wo \nex =awk -f file.txt -F: /etc/passwd course aur ka dhyan rakhna\n #mathematics calculations bhi kar sakte hai\n ex -echo 2 4 | awk '{print $1+ $2 }' \n multiply plus minus karke dekh lo\n #end \n\n\n"}, {"name": "AWK COMMAND", "content": "awk command\nhorizontal aur vertical word ko dhund sakte hai\nadvanced form of grep command \nawk pattern se word ko dhundta line by line\naur phir line me word match hogaya toh kya operations karna hai\nparticular line pe bhi action perfortm kar sakte hai bhalai usme pattern na match ho\nkhud ka syntax hai awk ka\n normal use casses\n awk '{print    $jis coloumn ko print karna hai wo number}'  file jiski lines field karni hai\n line o denge toh puri lines print kar dega [coloumn wise] \n then define field seperator\n ex - awk  -F:  '{print $0}' /etc/passwd  \n then column ki valaue change karke dekh lo\n range nhi aati isme\n multiple files bhi de sakte hai\n then pattern match kara ke dekh lo \nawk -f: ' /root/{print $0}' /etc/passwd \nthen jaha match hua uski field no 1 2 3\nthen ifconfig me karke dekh lo \nprint wagera inet ko match karwa lo\nmtu print karwa lo\n# structure of awk command\n\tawk 'begin {code in begin section } {code in main body section } {code in end section} input file.txt\n\tbegin part aur end part output ko decorate karne ke liye use karte hau\n\tmain body ke bina awk command nhi chalegi\n\texample of awk structure - ifconfig | awk 'begin{print \" ==ip==\"} /inet/{print $0} end{print \"-ip-\"}' \n\techo 1234 in words\n\tthen echo123 | awk 'begin{print demo}{print demo1} end{print demo2}' \n\tab echo wali command hata ke\n\tthe ab output nhi ayega input file deni padegi\n\tetc/passwd\n\tjitti line utti bar print karegaa\n\tbeing part akelaa chalta hai end bhi\n\tsath me bhi chalte hai\n\tthen tino part passwd ,e bhi karke dekh lo\n\t# print jabhi karega tab proper syntax ho double course\n"}, {"name": "AWK PATTERNS", "content": "# awk patterns=\nawk last \n! used for not\nex - awk '/root/{print $0}'\ntoh ye root layeega\nex - awk '!/root/{print $0}' \n\nab root ke alawa wala layega \nbash aur passwd me bhi first last dekh lo \nbin bash me slash structure dhyan rakhan\nab aisa line aur field or para chaiye jiska pehla word root ho toh \n^ upper case use karenge\nex - awk '/^root/{print $0}' \nab aisa line aur field or para chaiye jiska last word root ho toh \nex - awk '/root$/{print $0}' \nye sab ps -aux me karke dekh lo \nstarted session me\nifconfig me jitti way me grep ka sakte ho karke dekh lo aur awk ki help se  bhi\n# number of field-[NF] \nfield dekhegea\nex -echo \" one two three four \" | awk '{print NF}'\ntoh jitti fields hai lake dega\nex -echo \" one two three four \" | awk '{print \"NF-1\"}'\nthird lake dega \naise me kabhi$NF kar ra toh wo last field layega\nex -echo \" one two three four \" | awk '{print \"NF-2\"}'\n2 lake dega\nex -echo \" one two three four \" | awk '{print \"NF-1\"}' \nfirst lake dega\nex - echo \"one two three four \" | awk '{print $1, $NF, $(NF-1)}' \nHOW to use in file\nex - awk '{print NF}' /etc/passwd\nfile seperator de dena\nps -aux me dekh lo\n then ifconfig me bhi karke dekh lo\n # number of records - line number\n [NR] \n dono ko sath me chala ke dekh lo\n # [FS] - FIELD SEPERATOR\n EX - ECHO \"one two three four\" | awk 'BEGIN{FS=\"two\"} {print $1}' \n two ab field 1 one and field 2 two\n record seperator jo bhi do uske age nayya line aa Jayega\n EX - awk 'BEGIN{RS=\":\"} {print $0}'  /etc/passwd\n THEN LINE CHECK KAR LO\n  [NR] - LINES DEGA\n  [RS] - CHARACTER AND SPACE COUNT KARKE ANSWER DEGA\n  most of the time rs and fs same"}, {"name": "BASIC COMMANDS 2", "content": "basic commands of linux and sub commands\n## command 1 [kisi bhi command ke sath h denge toh wo human redable ban jayegi]\nex-ls-lh\n\n#command2 =kisi bhi command me hame hidden folders dekhne ho to [a] ka use karo\nhidden file ke aage[.] aayega\n #command3 =content ke andar ka content dekhna ho to we have recursive[R] command\n ex-ls  -R  space/var/log\n #command4 =reversible spot[r] data ko ulta karne ke liye\n#command5=time[t]use for particular date and time\n#command6=-1 for only file name without and data\n#command7= space ke bad* called worldcald use for find particular file or data\nex-we want to find file name start with a we give command a*\nor in last file have particular configuration like .com give command shift 8*com\nsub command =cd [jaise] hum kisi ho directory ke aandar hain aur  wha se pwd me aana ho toh\n\n\n\n"}, {"name": "BASIC COMMANDS", "content": "# [hardia@localhost~]$\n# [root@localhost~]hej#\n# [username hostname  current location]user/root\n # command 1[host name = pc ka name]\n command 2[pwd present working directory = jis location pe aap ho]\n command 3[ls = jis directory pe aap abhi ho uski files]\n command 4[cd jis location pe jana ho ]\n command 5[ls-l=all directory]\n command6[cd bin/=binaries file jise user run kar sakr]\n command7 [cd ..= file se bhar ane  ki command]\n comand 8 [cd.=like pwd commandd]\n command 9 [h denge kiske sath nhi wo human readable ho jayegi]"}, {"name": "BASIC SYSTEEM INFO COMMANDS", "content": "last basic commands \n#command1=less command to small the page sixe easy to read\nex =less /var/log/messages\nerrow keys for direction \nenter for line change \nspace for page change\nhome starting of the content \nend ending of the content\n#command2 =more command me bhut si chije nhi chalti \n#command3 =id user id group ids \n#command4 =tty terminal type actual terminal pts humne jo banai\ncentos ke terminal me command de ke dekh lena cui me\n#command5 =whoami like id command\n#command6=who jitte connection bane hai\n#command7=who -a details of other two\n#command8=w more details like other three\n#command9= hostname pc ka name\n#command10 =hostname -a detail me bataiga \n#command11=hostname -i ip btaiga \n#command12=hostname -I ip local interfeace ka\n#command13=uname-a kernal information\n#command14=uname -r sirf kernel ki info chaiye toh\n#command15=uname -mrs kernel or bit dono\n#command16=cat /etc/os -release os ki i nfo\n#command18=lscpu hardware details\n#commandd19=lsusb usb details\n#command20=lspci info of pci slot\n#command21=lsblk kitti disk attach hai uski info\n#command22=free -h ram ki info\n#command23=date for current date and time\n#command24=cal for calendar aur particular year ka bi dekh sakte hai\n#command25=ifconfig or ifconfig-a\n#command26=route -n for gateway\n#command27=cat /etc/resolv.conf for dns check\n#command28=history for kiiti command chalai\n#command29=echo value aur variable ko print karta hai variable bade me\n#shell user interface of any pc\nevery shell hai different places to maintain history\npc ko rebot karenge toh abhi chalai command shell li place par save ho jayegi\n#rm-rf .bash_history delete history\n#puri history file hi delete karni ho toh rm -f .bash_history \n#cat karke hum /dev/null me data dalenge toh black hole hai usme nhi dikhega\n#then soft link bana lo ex=ln -s /dev/null .bash_history\ntoh history nhi banegi\n then hata do link rm -rf command deke denge history\n #up arrow key se last command\n #! command ka number pata ho toh ex=!3\n #! iske aage thoda sa koi bbhi dal do bhej dega\n #uptime jab se pc chalu kiya ho\n #power offs command\n 1.1 shutdown -p smay deta hai shutdown se pehel\n1.2 poweroff cancel karna ho toh shoutdown -c\n1.3shoutdown -h usi waqt band\n1.4 shotdown -r restart\n1.5init0 band \n1.6 init6 restart\n\n"}, {"name": "CHMOD COMMAND", "content": "# permission allocating-\n#symbolic method - \nr -read\nw-write'\nx-execute\nsynatx-\nuser class = operation=permission\nuser class -\n1. u -user owner\n2. g- group\n3. o-others\n4. a -all other user groups etc \noperation (=,-,+)\n[+]adding permissions\n[-] removing of permissions\n[=] do permission add karna ho toh \npermissions - r , w, x\nexample - chmod u+r file.txt\nchmod o-w file1.txt\nchmod g=rw file2.txt\n#numeric method  \nread = 4\nwrite=2\nexecute =1\nuser class \n1. owner [u] ke liye \n2. group ke liye\n3. others ke liye\n  then jaise r+w+x ki permissions kisi user ko deni hai toh \nchmod  644 file.txt\nab owner ke pass r=w ki permission hai\ngroup ke pass read ki\naur other user ke pass bhi read ki\n11th permission\n[.] hai toh no acl\n[+] hai toh acl hai\n{=} ka use karoge toh jo permissions de rhe ho whi lagegi baki jo hogi hat jayegi"}, {"name": "COMPRESS AND ARRCHEIVE COMMAND", "content": " compress and archeive -\ndata compress kyu karte hai - 1. to make transfer speed fast and for space or storage\ncompression ka use karke backup bhi banate hai\n1. install compression tool -yum install bzip2 then you have bzip2 tool for compression \n2. ab kisi bhi file ko compress karni  ho toh bzip2 ka use karenge \nex= file copy messages make messaages version like cp  messages messages1 messages2 messages3 messages4\nuse of bzip2 tool-  \n1. bzip2 karenge aur file name denge wo jo main file hai usee replace kar degi compress file se\n2. bzip2 me wildcard use hota hai\n3. bunzip2 se hum file wapas la sakte hai main file me\n4. bunzip2 aur compression file ka nam\n5. directory compression nhi hoti\n6. log ke andar bhi hum compression kar sakte hai wildcard laga ke\n#gzip \n1. install gzip command = yum install gzip\n2. gzip bhi bzip sa hai gzip file name to compress\n3. the gunzip to unzip the file name you compress\n4. then use wildcards in message to compress the  wildcard extension file\n5.  isse hum direct directory ko compress nhi kar saakte but hamare pass yaha  recursive switch hota hai jise folser ke andaar ka data compress kar sakte hai\n\n#zip \n1.if not install install by command yum install zip\n2.ye file ko replace nhi karta new file bana deta hai\nhow to command= zip file name jo compression hoke banegi  aur last me jo file jisko compress karni ho\n3.unzip se file ko waps la sakte hai\n4 . yadi  file ko delete bhi karde toh hum waps whi format me la denge\n5  . zip me pura folder compress kar sakte hai  like zip -r  log.zip  log/\n6 . compression of maximum file in onee file also supports in this\n\n#7za \n1. install by command yum install epel-release.noarch\n2. then after yes givee command yum install p7zip\n3.  the help chaiye toh 7za--help\n4. for compression 7za a  compression file name after compression  original file for compression\n5. also compress directory\n6. uncompres ke liye 7za e jo file jo compression ke bad bani\n7.  . compression of maximum file in onee file also supports in this\n8. unzip karne se pehle hum uske andar ka data dekh sakte hai by command = 7za  l file name jiske andar dekhna hai\n9. also use in log ke andar sabko \n10. isse puri directory complete ho jati hai same command = 7za a  jo file ka nam banana ho   jo   directory ko compress karna ho\n11. problem wo directory ko unzip karenge ko toh wo current location pe kar dega\n12. kisi particular location pe karna ho toh command hogi = 7za e  jo directory ka data place karna ho -0    se directory ka nam jaha place karna ho\n13. 7za t aur compressed file name usse hume headers wagera ki details milegi\n"}, {"name": "COPY COMMAND", "content": "#copy command  and wildcard\n  1.*          any number or character including zero\n  ex = ca*\n  cat car carpanter etc.\n   2.?       single character \n   ex= hel?\n   help hell  \n   3.[]        single character from range  file[0-2]\n   ex= file1 file2 file3\n   4.[!]    single character file not listed in bracket \n   ex= file[!1]\n   file 2 file 3\n5. { }  comma seperated terms \n   ex={*.log , *.txt}\n   hello.txt  comma.log\n   follows particular pattern of all\n   group of pattern\n# COPY COMMAND \nIMP.POINT = SOURCE MULTIPLE HO SAKTE HAI DESTINATION EK HOGI\nEX      ==CP   JHA PE KARNI HO FILE COPY    AUR FILE NAME JISKO COPY KARNI HO\n\nJO ANKHIRI ME AYEGA WO DESTINATION BAKI SHURU KE SHARE SOURCE HONGE\nEX=cp -v rohan rohan hardia  kushwah  d5/\n # multiple files sirf ek folder or directories me hi copy hoga\n#  single file ko copy karna ho toh hum kisi file ,me karr sakte hain bhalai wo file exists na karre\n in case of multiple file destination must be directory\n # current location pe ho aur wha copy karna ho toh direct . dot de do\n  in case of copy of files **\n  in case of copy of directories give r  recursive\n  dd"}, {"name": "CUT COMMAND WITH GREP", "content": "#character classes- use within bracket[]\n1. [:upper:] bracket ke andar braket me - capital latter\n2. [:lower:]bracket ke andar  bracket me - small letters\n3. [:alpha:] bracket ke andar bracket me - dono letters\n4. [:digit:] numebers\n5. [:alnum:] alpha number dono\n6. [:space:] special chracter like tab space new line\n#ab wo user-number.txt file me use karo\nwith their main commands-\nlike-[A-Z] [a-z]  a-z 0-9  teeno saath me then space\n/t for new tab\n#ps -aux ke andar bhi commandds check kar lo\n#make file of domain name text place domain name\n#make url file placee url in it\ndomain and url ar related to each other\nthen hume domain find karni hai url file me \nmeans us domain ka url\nex- grep domian name url file name\nab sabhi domain match karni hi toh \nex - grep -f domain.txt url.txt\n-f for pattern of file\njha match nhi hua wo particular domain chaiye toh -v\n# cut command\nfilter row wise\n1. csv file banao \n   2. ex -cut  f1 csv.txt\n   3. but syntax nhi lega then set dlimitor \n   4. ex -cut -d '.' -f1 csv.txt first colomn\n   5. ex -cut -d ',' -f2,4 csv.txt\n   6. ex -cut -d ',' -f3-4 csv.txt\n   7. jo output aa ra use save karna ho toh particular file me redirect akr do\n   8. same passwd file mee nkar do \n   9. syntax ':'\n   10. then in ifconfig\n   11. pehele horizontal inet ko grep kar lo through grep command\n   12. then ab vertical through cut command \n   13. ex -ifconfig | grep inet | cut -d '  ' -f10\n   14. ab interface name chaiye toh\n   16. ifconfig | grep -v '(^$)' | cut -d ' ' -f1\n   17. "}, {"name": "DEBIAN INSTALLATION", "content": "family of linux -\n1 . redhat - enterprise level ke liye use hota hai communication and configuration ke liye, client os,attacking\n1. fedora\n2. centos [packages install .rpm] package manager dnf\n3. red hat stable linux\n4 debian - kali [apt package aata hai ,and dpkg and .deb package manager]\n5 arch linux\n# debian installation -\nis a light weight os\ngo to debian offical website install offical iso\nhttps://www.debian.org/\nthen make a machine and and boot from hardisk ,cd,floppy\nplace iso then start\nnetwork - nat\nthen install with graphics\nthen language\nlocation india\nkeyboard -american english\nthen root password\nthen user name dusre tab me\nguided partition me - entire disk me se khud partion baniaga \nthen logical volume manager lvm ke sath\nthen encrypted lvm ke sath\nthen manuallly  - khud se banainge\npartation disk me yes\nthen partition me jake create new partation\nthen  primary partation - from the begning\n1. /boot - boot karte hai jab ye memory use hoti hai 2 gb\n2. swap - virtual ram jab physical ram  bad jati hai toh  2 gb ye kam aati hai\n3. / - partation of root \n4. type of root  -\n5. / = root\n6. /root = root ki home directory\n7. root=super user / admin user of particular user\n8.  home directory of all user - /home me banti hai\n9. then  package manager yes the .deg me karna hai\n10. configuring popularity - no\n11. software selection -  jo settings hai use rehn do then continue\n12. then grub is a boot loader of linux\n13. install boot loader \n14. then ip addr commandd\n15. "}, {"name": "DELETE DIIRECTORY OR FILE", "content": "# delete commands\n#shell os ko interact karna \n#command1 rmdir to delete empty directories\n#dir=#ls\n#directory ke andar sub directories ho toh use  -p laga ke delete karenge\n#rm se file delete hoti hai  sabhi with or without content\n#rm -r  [folder name /] se directory jiske andar data ho use bhi delete kar de\n#vervus  v confirmation dega ki wo delete kar ra\n#forcefully f command for forcefully delete without any confirmation\n#cp -vr /var/log/* d1/\n#[* ]called worldcard\n#* sari files \n#kisi starting world ki filee delete karni hai toh file or directory word *\n#kisi ki ending me jo configuration ho uski particular file delete karni ho toh* . configuration \n#rm -rf hel? single character wale delete honge kyu ki  ek ? hai \nex=help hell delete ho jayenge but\nex=help2 help3 nhi honge\n"}, {"name": "DISK MANAGEMENT IN LINUX", "content": "# theory portion-\ntwo types of hardrive or disks in linux-\nsata- serial advanced technology attachment\nide-integrated drive electronics\ntwo parts of ide-\nata-advanced technoloogy attachment\npata-parallel advanced technology attachment\n![[Pasted image 20250127200401.png]]\nide has less storage capacity and there speed is very slow\nsata ke pass jyada speed hoti\nthen ab ssd hdd aa gai\nide has 39 to 40 pins\n![[Pasted image 20250127201013.png]]\nhd detect hua toh wo ide disk hogi \nthen master ke andar partition and slaave ke andar bhi partation\n![[Pasted image 20250127201306.png]]\nsd aa ra toh wo sata  disk hogi\nhas no primary secondry disk\nsda-  port1\nsdb -port2\nsdc-port3\nsdd-port4\nthen unke phir partation\n#types of partition-\n1.  primary-directly accessible partation of hardrive that can store os \n     1.1  - you can make 4 primary partition on mbr and 128 on gpt\n2. extended-container of logical partation created when more that four partation is needed after the use of four primary partation\n\n    2.0 - only one extended  partation is make\n    2.1 logical-commonly use for organizing data or installing multiple os in single disk \n# practical portion-\nin centos nine add 5 sata disk with diff storage vdi add\nthen start\nhardrive jo lagate hai wo dev me dikhti\nhardrives block device me aati\njo hardrives lagai hai unhe use karni hai toh-\n1. partation banana padenge\n2. partation ko format karna padenge\n3. then partation ko mount karna padega\n4. then ready to use\nlsblk for list of block devices\nharddrive lake dega aur uske partation bhi\nblkid - jo partation hai unki info lake dega with unique id and partation id\nfdisk-l- partation ki info dega\nek disk ka sata dekhan hai toh fdisk -l location de do\nh.w - difference between mbr and gpt\n\nThe primary difference between MBR (Master Boot Record) and GPT (GUID Partition Table) is how they manage disk partitions and booting.\n\n  1. **Partition Limits:**\n    \n    - **MBR:** Can support up to 4 primary partitions (or 3 primary partitions + 1 extended partition which can then have multiple logical partitions).\n    - **GPT:** Supports up to 128 partitions by default on Windows (more on other systems), without needing extended partitions.\n   2.  **Disk Size:**\n    \n    - **MBR:** Can only handle disks up to 2TB in size.\n    - **GPT:** Can handle disks larger than 2TB (up to 9.4 zettabytes, which is far beyond current hardware capabilities).\n  3. **Booting:**\n    \n    - **MBR:** Uses a bootloader in the first sector of the disk to start the operating system. It's tied to BIOS-based systems.\n    - **GPT:** Uses a more modern boot method that works with UEFI (Unified Extensible Firmware Interface) systems. UEFI can provide better security features like Secure Boot.\n 4.  **Reliability:**\n    \n    - **MBR:** Stores the partition information in one place, which can be a risk for data loss if the MBR becomes corrupted.\n    - **GPT:** Stores multiple copies of the partition table across the disk, making it more resilient to corruption.\n  5. **Compatibility:**\n    \n    - **MBR:** Older and supported by most systems, including legacy BIOS-based systems.\n    - **GPT:** Newer and requires UEFI firmware, so it might not be compatible with very old systems or BIOS-only setups.\n"}, {"name": "FILE FINDING", "content": "to install give command yum install tree\ntree command direct give tree stucture of all files\nsyntax ' tree then jiski files dekhni ho' \nex - tree /home/\nhome ki sari le aayega\nex - tree /home/d1/\ntoh d1 ke andar ki sari files la dega\nwe have -a -for hidden files\n-v foe vervus\n-r for reverse\n-t for time\ndrawback sabhi files nhi la ra\n## find command-\nyum install findutils\nsyntax  find [then jha pe content hai wo file] then -name [then jo file chaiye] \nex - find / -name  .conf toh .conf wali files aa jayegi\nwe have multiple switch in this command\n-type f ya d \nf-file \nd - directory\n-readable jo sirf pad sakte ho\n-executable[x] jo run kar sakte ho\n-writable jisme changes kar sakte ho\nuser jo nam denge wo user jisko permission chaiye \nparticular file dhudna hai jiska owner   rohan ho\nfind / -name .conf user rohan\n ex - find / -iname  root\n i for both capital and small\n yaha wildcard use ke pehle slash ka use karna hoga\n ex find / -name pass/* \n aisi line lagaiga jo pass se start hogi'\n tenno switch ko sath me bhi use kar skte hai readable writable executable\n aisi file find karni hai jisk permission ki id 1000 ho\n find / -perm=1000 -o=rwx \n aur jo readable writeable aue executable ho\n find /etc/passwd -exec date [\\];  back slash]\n id chala ke dekh lo\n # locate command-\n yum install mlocate\n update db data base index banaiga files ka \n locate -S data base file ka data bataiga\n syntax locate  [yaha jha se dhundni hai  wo file bhi de sakte hai filename jo dhundna ho ]\n data base se dhund lega\n -i for small and capital\n then extensions dekh lo locate karke ke\n # which and whereis command-\n binaries or command jo run karte hai wo bin aur sbin me rakhi hoti hai\n [echo $Path se binary ki location or path pata lag jayeega ]\n which command in locations pe jake binaries ko pick karta hai\n ex - which ls\n which vim \n # compare command-\n do file ko compare karna hai toh -\n comm file.1txt file.2txt\n # difference command-\n diff -c file1.txt file2.txt or -y se bhi kar sakte hai\n vimdiff 1.txt 2.txt best to compare\n \n \n\n"}, {"name": "FILE MAKING AND SEEING", "content": "file making and seeing\n#command1=file making ke liye hum touch  command denge\nex=touch f1\n#command2=hume file ka type dekhna ho toh file command denge\nex=file fi\n#command3=ek sath bhi file bana sakte hai\nex=touch fi f2 f3\n yadi files space ke sath hai toh wo do alg file baniga\n ex-rohan hardia \n toh wo do file banaiga \n ek file bANANA HO toh hum\n ex=rohan-hardia\n ex=rohan_hardia\n aur space dena ho toh \n ex=\"rohan hardia\"\n ex='rohan hardia'\n ya space ke pehle/ laga do \n ex=rohan/ hardia\n #command4 =cat karke hum kisi bhi file ka data dekh sakte hai\n ex=cat rohan-hardia\n # hum pwd pe kha pe bhi ho hume kahi bhi file bananai ho toh bana sakte hai \n ex=touch /root/dekstop\n bhalai hum / pe ho\n #command5=kisi bhi file me kuch bharna ho toh cat >file ka nam jisme bharana hai\n control c se bhar aayenge\n #command6=directory banana hai toh command denge mkdir  aur nam directory ka\n   #command7=directory ke andar directory uske andar bhi directory toh wo mkdir -p s1/s2/s3/s4"}, {"name": "FILE SYSTEM , SELINUX,AUTORELABEL FILE", "content": "#Linux supports various file system types, such as **ext4, XFS, Btrfs, and ZFS**, each offering different features like journaling, scalability, and snapshot capabilities. The most commonly used file system on Linux is ext4, known for its balance between performance and reliability.24 Oct 2024\n#### A Realistic View of Files\n\nFiles have names, metadata (such as permissions and an owner), and data. All of the elements associated with files are not stored in one place on a disk. The filename is stored as part of the directory, the metadata is stored in an inode, and the file data is stored across multiple logical blocks on the disk. The hardware driver further abstracts the physical disk locations of all of the data associated with that file. For the sake of usability, the operating systems will hide these details when you interact with files through a terminal or some type of graphical user interface (GUI).\n\n# file Inodes\n\nEvery file is assigned one inode when it is created. The purpose of an inode is to maintain information about the file (e.g., permissions) as well as which blocks on the file system make up the data portion of the file (see Figure 2.1).\n\n![](https://ars.els-cdn.com/content/image/3-s2.0-B9781597490184500095-f02-01-9781597490184.jpg)\n# DISCRETIONARY ACCESS CONTROL\nDAC, also known as file permissions, is the access control in Unix and [Linux systems](https://www.sciencedirect.com/topics/computer-science/linux-system \"Learn more about Linux systems from ScienceDirect's AI-generated Topic Pages\"). Whenever you have seen the syntax drwxr-xs-x, it is the ugo abbreviation for owner, group, and other permissions in the directory listing. Ugo is the abbreviation for user access, group access, and other system user's access, respectively. These file permissions are set to allow or deny access to members of their own group, or any other groups. Modification of file, directory, and devices are achieved using the chmod command. Tables 77.1 and 77.2 illustrate the syntax to assign or remove permissions. Permissions can be assigned using the character format:\n\n # Mandatory access control (MAC)\n  is ==a security system that restricts access to resources based on a user's clearance level and the sensitivity of the resource==. MAC is enforced by the operating system or application, and cannot be overridden by users. \n\nHow it works\n\n- **User clearance**\n    \n    Users are assigned a clearance level based on their authorization to access information \n    \n\n- **Resource sensitivity**\n    \n    Resources are assigned a sensitivity level based on the confidentiality of the information they contain \n    \n\n- **Access control lists**\n    \n    Access control lists (ACLs) specify user permissions and check clearance levels \n    \n\n- **Security labels**\n    \n    Security labels tag data and users with classification levels \n    \n\n- **Reference monitors**\n    \n    Reference monitors evaluate access requests against ACLs and security labels\n    ![[Pasted image 20250123181128.png]]\n    Linux provides various access control mechanisms to manage file and system access for users, groups, and processes. Here are the key ones:\n\n1. Traditional File Permissions\n\nOwner, Group, and Others: Each file or directory in Linux has three access levels (owner, group, others) and three types of permissions (read, write, execute).\n\nPermission Representation:\nNumeric: chmod 755 filename\nSymbolic: chmod u+rwx,g+rx,o+rx filename\nCommand: ls -l to view permissions.\n\n---\n\n2. Access Control Lists (ACLs)\n\nACLs provide finer-grained control than traditional file permissions, allowing you to set permissions for specific users or groups beyond the default owner, group, and others.\n\nCommands:\n\ngetfacl: View ACLs\nsetfacl: Set ACLs.\nExample: setfacl -m u:username:rwx file.txt\n\n---\n\n3. Special File Permissions\n\nSetuid: Allows a program to run with the permissions of its owner.\n\nExample: chmod u+s file\nSetgid: Files inherit the group ID of their parent directory\nExample: chmod g+s directory\nSticky Bit: Restricts file deletion in shared directories to the owner.\nExample: chmod +t /tmp\n\n---\n\n4. Role-Based Access Control (RBAC)\n\nIn some Linux distributions (e.g., Red Hat), RBAC is used to assign roles to users with specific privileges.\n\nExample: Assign roles via the semanage command (used in SELinux).\n\n---\n\n5. Mandatory Access Control (MAC)\n\nEnforces policies defined by the system, rather than by individual users.\n\nExamples:\n\nSELinux (Security-Enhanced Linux): Defines policies to control what processes can access.\nTools: getenforce, setenforce, semanage.\nAppArmor: Profile-based access control for applications.\n#Security-Enhanced Linux (SELinux) is ==a mandatory access control (MAC) system that protects Linux operating systems==. It's a part of the Linux kernel that restricts programs from accessing files, data, and other resources without administrator approval.\n\nTools: aa-status, aa-complain, aa-enforce.\n\n---\n\n6. Capabilities\n\nLinux capabilities divide root privileges into smaller, more specific capabilities that can be independently assigned to processes.\n\nCommands:\n\ngetcap: View capabilities.\nsetcap: Assign capabilities.\nExample: setcap cap_net_bind_service=+ep /usr/bin/program\n\n---\n\n7. Namespace Isolation\n\nUsed in containerization (e.g., Docker) to isolate processes in separate namespaces, such as PID, user, network, or filesystem namespaces.\n\nCommand: unshare to create a new namespace.\n\n---\n\n8. User and Group Management\n\nControl user and group access to resources.\n\nCommands:\n\nuseradd, usermod, passwd for users.\ngroupadd, gpasswd, groupmod for groups.\n\n---\n\n9. Pluggable Authentication Modules (PAM)\n\nFlexible authentication framework.\n\nFiles: /etc/pam.d/*\n\nCommon modules:\npam_unix.so: Standard password authentication.\npam_tally2.so: Lock accounts after failed login attempts.\n\n---\n\n10. Chroot\n\nIsolates a process and its filesystem by changing its root directory.\n\nCommand: chroot /new/root\n\n---\n\n11. File System Quotas\n\nRestrict disk space usage per user or group.\n\nCommands:\n\nquota: Display quotas.\nedquota: Edit quotas.\nrepquota: Report quotas.\n\n---\n\n12. Firewall (Network Access Control)\n\nControls network traffic to/from the system.\nTools:\niptables, nftables for packet filtering.\nfirewalld for managing firewall rules.\n\n# The `./autorelabel` = \nfile in SELinux ==triggers a relabeling operation when the system boots==. This operation is useful when SELinux policies or file contexts have been modified. \n\nHow it works \n\n- The `./autorelabel` file is created to trigger the relabeling process.\n- The system automatically removes the `./autorelabel` file after the relabeling is complete.\n- The relabeling operation ensures that all files and directories have the correct security context."}, {"name": "GREP AND CUT ADVANCED", "content": "GREP AND CUT ADVACED\nIFCONFIG ME INTERFAACE GREP KARNA HAI TOH JO INTERFACE LINE ME COMMAN WORD HAI GREP KAR LO\nEX- IFCONFIG | GREP FLAG | CUT -d ' ' -f1  \nthen netmask grep kar ke dekh lo \nex- ifconfig | grep 'net'  | cut -d ' ' -f13\nthen make a file  with find command find / and redirect its output in\nfileindex.db\ncat fileindex.db \nab hume is file ke andar se kisi file ka data dekhna ho to \nhum grep cut sort commands use karenge \nex  -var ke andar ka log ke andar ki files dekni ho\nex-cat file.index.db | grep \\/var\\/log\nslash aara toh usko ulta slash deke katenge\nab slash ki files dekhni ho to tph\ncut -d '/' -f1-3 fileindex.db | sot -h | uniq\ncat fileindex.db | grep'^\\/' | cut -d '/' -f1-3 | sort | uniq\nab home ke andar user dekna ho toh\ncat fileindex.db | grep '\\/ home' | cut -d '/' -f1-3 | sort | uniq\nyaha f range se folder ke andar folder khol sakte hai\nthen check same in var /log\nthen particular extension wali file chaiye toh wo direct grep se ho jaayega\ngrep '/.txt' fileindex.db\nend me match karwa ke dekh lo\nconf dhund l0 exe dhund lo html\njs dekh lo\nthen ps -aux ke andar dekh lo root ke sessions wagera\nroot wale nhi chiye toh -v\nthe ab root ke alwa jo aa re unko grep karna ho toh\nps -aux | cut  -f1 -d ' ' | sort | uniq -c se konse user se kitti process chal ri bataiga\nab user nahi chaiye toh use grep karke hata do\nthen we have paste command   \n   1. do file banao haave namee and surname\n   2. ab dono ko series wise jodna hai toh paste\n   3. paste file name file name\n   4. the use delimitor for space underscore - etc\n   5. ex  - paste d ' ' fil1 fil2\n   6. #end "}, {"name": "GREP COMMAND", "content": "#grep  command- particular word dhundna hai \nhorizontal dhundega\n ex -grep word/line dhundna ho wo  konsi filee me dhundna hai\n #command ke output ko direct grape nhi kar sakte pipee karna padega\n ex- grep root  /var/log/etc \n ex - grep root  /etc/shadow\n multiple files support-\n ex - grep root  /etc/shadow /etc/group /etc/gshadow\n ex- grep Root /etc/shadow /etc/group /etc/gshadow\n word dekh lo wc command se\n #[-i] se capital aur small dono dekh sakte hai \n\t\t ex= grep -i root /etc/shadow\n\t\t or\n#cat /var/log/messages | grep -i root\n#running command me se grep nhi kar sakte hai\nlike- grep root ipconfig\n#started session grep karna ho toh-\n1. grep started session /var/log/messages\n2. sirf wo started ko grep karega aur session ko file ki tarah treat karega toh error aayeegi\n3. error ko hum output ko /dev/null me redirect kar ke dekh sakte hai\n4. toh hum usee \" started session\" use karo toh koi dikkat  nhi aayegi\n5. space ko cover hum / se kar sakte hai like-grep armour/ infosec\n#alg alg words ko dhundna ho toh-\n1. format grep -[E] \" (armour|infosec)\" /var/log/messaages\n2. session bhi lana ho dono user ke toh -grep -[E] \"(armour|infosec)\" /var/log/messages | grep session\n3. grep root /var/log/messages | grep session\n4. root ke alawa kisi ka session dekhna ho toh \n5. grep root /var/log/messages | grep -v root\n6. grep -E \" (started session | starting session)\" /var/log/messages | grep -v root\n7. grep -E \" (started session|starting session)\" /var/log/messages | grep -vE \"(root|rohan)\"\n#single character \n1. grep root. /etc/shadow\nab ye root ke badd single charcter ko dhundega\n2. do lagaoge toh double character ko dhundega \n3. ab ek particular charcter hi chaiye toh \n4. / ka use karenge ex- grep root/. /etc/gshadow\n5. toh . wala hi milega'\n6. aur bhi nhi kam bana toh double course me likhenge\n7. like \"root/ .\"\n8. ab last me wo word match karna ho toh $ ka use karenge \n9. ex- grep \"root/ .$\" /var/log/messages\n10. bich me dekhna ho toh - grep -v \"rroot/.&\" /var/log/messages | grep successfully\n#starting me bhi match karwa sakte hai \ngrep \"^dec 4\" /var/log/messages | grep session\nupper case line ke starting me dhundta hai\n1. grep \"^dec 4\" /var/log/messages | grep root\n2. root ke session aa jayenge\n"}, {"name": "GREP SECOND", "content": "grep second\n1. sabse pehel word dhund lo \n2. first me dhundna ho toh \"(^)\"\n3. last me toh \"( $)\"\n4. bich me toh \"(&)\"\n#empty lines lani ho toh-\n1. vim kara os release ko empty lines banai humne  \n2. the command grep \"^$\" then file name\n3. nhi lana ho toh -v\n4. # for commented line\n5. commented line lani  h  toh grep '#' /etc/ssh/sshd_config\n6. -v se commented line nhi aayegi \n7. ab khali empty lani ho toh grep '^$' file name\n8. sath me empty lines bhi hatani ho toh grep \"^$\" file name | grep -v \"#\"\n9. or grep -E -v \"(^#|^$)\" /etc/ssh/sshd_config\nthen make a file \nuser and number do\n1. word dhundo\n2. single character\n3. double  character\n4. / \n5. case insensitive -i\n6. then give number\n7. then give range of numbers\n8. digit wala main [0-9] single digit\n9. [0-9] [0-9] 0-9 double digit   \n10. 4 ke bad single digit chaiye toh [0-9]\n11. alphabet chaiye toh [A-Z] \n12. -I FOR CAPITAL SMALL\n13. user ke bad three digit user 3 times [0-9] \n14. then passwd flle me jake dekh lo 1000 ke upar chaiye toh\n15. grep 1 [0-9] [0-9] [0-9] [0-9] [0-9] \n16. -o value or pattern jo match hota hai wo lake deta hai\n17. current location pe match karna hai toh command \n18. grep root *\n19. pure etc me root dhund ke dekh lo\n\t1. grep root /etc/* \n\t2. error aai toh /dev/null me redirect kar do\n\t3. then -R recursive directories me bhi dhundega\n\t4. -n for   line numbers\n\t5. -i for capital small \n\t6. -r like recursive but  ye symbolic links nhi dhundta\n\t7.  -l list of file name jha match ho ra\n\t8. then if config\n\t9. init dhundo\n\t10. ip6 nhi chaiye toh space de diya 'init '\n\t11. -v 6 ke alawa\n\t12. ps -aux running processes bataiga\n\t13. yaha root grep karo\n\t14. session dekh lo"}, {"name": "GROUP ADD ,DELGROUP,GROUPMOD , GPASSWD", "content": "sabke pass help switch hai dekh lo=\n![[useradd 1.png]]\ngroup add se group add karenge \njab user banate hai toh uske sath sath group bhi bante hai wo group primary group hote hai baki secondry\npehele it,sells,emp,hr group bana lo unme user add kar lo then hr ko un sabme addd kar do aise user add karna jinpe password ho\nthen [-g] se gid change kar sakte hai \npehle se group hai aur uski group id dusre ko deni ho toh [-o] ka use karenge\nthen jo group banaye hai uspe password set kardo \nopenssl passwd then password\nthen [-p] for password set in group \ngshadow me passwords dikhenge\n[-r] se system groups banenge\n# group mod -\n[-g]\n[-n] for rename the group\n[-p]\ngroupdel se  group delete ho jayega'\n# adding of users in group=\nusermod -G then secondry group name primary group name BUT ISME WHI GROUP ADD HONGE JO PRIMARY YA USER BANATE HAI USKE SATH HO\nthen gpasswd -a  username group name\ntoh wo user is group me add ho jayega\n-[a] se ek user add hoga [-M] se multiple users add honge\ngroups then username toh username kis group se join hai pata lag jayega\naur kisi particular user pe direct groups command dege toh pata lagega wo user kis group ka member hai\ngroup ki entry gshadow me dikhegi\n[-A] se administrator bana sakte hai kisi user ka \ngshadow me dikhega\n[-d] se user delete ho jayenge group se\ngpasswd -d username groupname\nab admin bana ke user ko hataoge toh wo admin raahega\n[-r] remove the passwd of group\n[-R] ME wo user ko restrict kar dega add karne se\nin id command gid me jo output milta hai primary group baki secondry\n"}, {"name": "GRUB PE PASSWORD", "content": "grub pe password isliye lagate hai kyunki koi bhi aayega aur root ka password change kar jayega\nby process -\nnetstat -nltup se malum pad jata  hai konse konse ports aur packages install hai\n# first way-\nboot loader linux me -/boot/grub2/grub.cfg me rehta \npehel backup bana lo nhi toh lag jayenge\npassword generate for grub\ngrub2-mkpasswd-pbkdf2\nse password generate kar lega\nab wo password ko hum main file /boot/grub/grub.cfg me daldo ya fir configuration file /etc/grub/grub.d/10_linux me  \nconfiguration file me dal rhe ho toh last me dalo\n[cat << EOF]\n[set superusers=\"rohan\"]\n[password_pbkdf2 rohan space generted password] \n[EOF]\n#  second way-\nab nhi ho ra toh main file me place kar do\n10_linux complete ho ra uske bad \n[set superusers=\"rohan\"]\n[password_pbkdf2 rohan space generted password] \nthen robot ab password milega boot loadder pe\nboat loader ka password bhul gaye toh battery nikal do\njo line lagai hai unhe hata do password hat jayeega\n# third way-\ngrub ki main file me username aur password ka block hai usme dekh lo username aur passsword wo kaha place kar ra\nby command to set grub passsword-\n#grub2-setpassword\ntoh ye password laga dega grub pe\nthen reboot password change \nab gurb ka passwd bhul gai root ka bhi toh ab like boot karke jha username aur password change ho ra wo file hata do\n/boot/grub2/ me user.cfg wali\nchroot /mnt/sysroot milega after liveboot\n"}, {"name": "H.W", "content": "BASIC JAVA \nCSS\nHTML"}, {"name": "HELP MAN INFO COMMAND", "content": "#sub commands or switches\n1. help\n2. --help\n3. -h\n#use for commands to get their sub  commands and their uses\n#if these three not workk we have manual mode to get sub comm and their uses\n#1. man commannd[then command name jiski sub commandd chaiye ho]\n2.man ls\n3.man pwd\n# if it does not work in last we have info command\n## info [of commannd\n### first use \n1.help \n2.man\n3.info\n#info give maximum no of info about sub commandds\n##jo command ka verrsion nikalna ho uske liye version command\n## like [ls --version]\nor [ls -v]\nlinux universal rule== [- toh lette]\n[-- toh pura word]"}, {"name": "HISTSIZE", "content": "kisi bhi shell ka history file badani ho toh\nunki rc me chnages kar do\nHISTSIZE=-1\nHISTFILESIZE=-1\n-1=INFINITE\nENV SE CHECK KAR LO\n"}, {"name": "INPUT REDIRECTS", "content": "#input redirect\nkoi command chala re uska output kisi command ke liye input ho wo standard input kaaheenge\nex=cat /log/var/messages | wc -l\nstandard input \ninput redirect by minima sign [<]\nmethod of input redirect [standard input]\n1. redirect frrom file - like wc < user.txt is file me output save ho wha se redirect\nex= wc ek command hai jisme hum user.txt ka output wc me input ki tarah denge\n2.  interactive mode  or piping -aur humne command di aur usko usi bhagat ki command me use kar liya ho\nex =id | wc -l or cat ipconfig |wc -l\n3. interactive or piping - command ke andar direct switch ho jaise \nex = wc -l user.txt  \n4.  redirect from file -sort < unsorteed .txt\nex - sort no.txt\n2.sort -n no.txt\n3.sort -n < no.txt\n4.cat no .txt \n5. using stdin through binary script \nex-program se input\nex -program ke andar se input lena hai\n6. interactive tools reading from stdin\nbc =basic calculator\n7. sdin file se redirect by reflleccting like a mirror\n ex= /dev/stdin se\n ex -cat /dev/stdin\n  ex -echo \"test\"\n  ex-echo 'test' > /dev/stdin"}, {"name": "INTRO AND INSTALLATION OF LINUX", "content": "## CentOS logo preview:\n\n ![CentOS vector logo](https://logotyp.us/file/centos.svg)\ninstallation of centos -9 \n1. download iso from centos offical website dvd wali iso chaiye\n2. then virtual box me 3 gb space 40 gb harddisk\n3. then iso place\n4. then start \n5. select languages \n6. then you have a installation panel of centos\n7. change time acc to country \n8. select keyboard type english india\n9. then go with gui\n10. in hardisk wale panel  me hardisk click\n11. then make partition\n12. select stamdard parttion\n13. /boot 1 gib\n14. swap 4 gib\n15. / last spaces \n16. then give ip from dhcp\n17. root me user banao aur ssh enable\n18. user banao password do\n19. then go with policy\n20. then install\n21. make connection through ip \n22. then  in main control panel make ssh connection \n23. command ssh root@ip\n24. #end"}, {"name": "LVM   LOGICAL VOLUME MANAGER", "content": "Logical Volume Manager (LVM)\n\nLogical Volume Manager (LVM) is a storage management solution in Linux that provides flexibility and advanced features for managing disk space. It allows dynamic resizing of partitions, snapshot creation, and easier storage expansion.\n![[Pasted image 20250202021105.png]]\n\n# 1. Key Components of LVM\n\n- **Physical Volume (PV)** - The actual storage device (e.g., /dev/sdb, /dev/sdc).\n- **Volume Group (VG)** - A pool of storage created from one or more PVs.\n- **Logical Volume (LV)** - A partition-like structure inside a VG, where file systems are created.\n\n# 2. Setting Up LVM\n\nStep 1: Install LVM (If Not Installed)\n\nCode\n\n```\n# apt install lvm2 -y  # Debian/Ubuntu# yum install lvm2 -y  # RHEL/CentOS\n```\n\nStep 2: Create Physical Volumes (PV)\n\n- Identify available disks:\n\nCode\n\n```\n# lsblk \n```\n\n- Initialize the disk as an LVM physical volume:\n\nCode\n\n```\n# pvcreate /dev/sdb /dev/sdc /dev/sdd /dev/sde /dev/sdf \n```\nVerify:\n\nCode\n\n```\n# pvs # pvdisplay \n```\n\nStep 3: Create a Volume Group (VG)  \nCreate a volume group named vg_data:\n\nCode\n\n```\n# vgcreate vg_data /dev/sdb /dev/sdc /dev/sdd /dev/sde \n```\n\nCheck VG details:\n\nCode\n\n```\n# vgs # vgdisplay \n```\n\nStep 4: Create a Logical Volume (LV)  \nCreate a 60GB logical volume named lv_storage:\n\nCode\n\n```\n# lvcreate -L 60G -n lv_storage vg_data \n```\n-L for storage and -n for name \nOr use 100% of the free space:\n\nCode\n\n```\n# lvcreate -l 100%FREE -n lv_storage2 vg_data \n```\nhere -l to display\nVerify:\n\nCode\n\n```\n# lvs \n```\n  . Formatting and Mounting the LVM Partition\n\nFormat the logical volume:\n\nCode\n\n```\n# mkfs.ext4 /dev/vg_data/lv_storage# mkfs.xfs /dev/vg_data/lv_storage2 \n```\n\nCreate a mount point and mount it:\n\nCode\n\n```\n# mkdir /mnt/storage # mount /dev/vg_data/lv_storage /mnt/storage \n```\n\n# 3. Resizing Logical Volumes\n\nExtend an LV (Increase Size)\n\nCode\n\n```\n# vgextend vg_data /dev/sdf \n```\n\n4. Increase the size by 10GB:\n\nCode\n\n```\n# lvextend -L +10G /dev/vg_data/lv_storage \n```\n\n5. Resize the filesystem:\n\nCode\n\n```\n# resize2fs /dev/vg_data/lv_storage \n```\n only for ext4 file system\n6. Verify new size:\n\nCode\n\n```\n# df -h /mnt/storage \n```\n # Shrink an LV (Reduce Size)\n\n1. Unmount the volume:\n\nCode\n\n```\n   # umount /mnt/storage\n```\n\n2. Check and reduce filesystem:\n\nCode\n\n```\n   # e2fsck -f /dev/vg_data/lv_storage   # resize2fs /dev/vg_data/lv_storage 15G\n```\ne3fsck for ext4 and resize bhi ext4\n1. Reduce LV size:\n\nCode\n\n```\n   # lvreduce -L 15G /dev/vg_data/lv_storage\n```\n\n2. Remount the volume:\n\nCode\n\n```\n   # mount /dev/vg_data/lv_storage /mnt/storage\n```\n\nfor creating backup through snapshot-\n\n# 4. **Create a snapshot of lv_storage:**\n\nCode\n\n```\n    # lvcreate -L 5G -s -n lv_snapshot /dev/vg_data/lv_storage\n```\nsnapshot /dev/vg_data/ ke andar snapshot namse aayega unknown language me \nlike copy of partation data\njitti storage doge utti khayega ye pvs lvs aur vgs se dekh lo\njiska snapshot banaya hai usi ka file system snapshot ko diya jayeega\n-s for snapshot create\n\n1. **Mount the snapshot:**\n\nCode\n\n```\n   # mount /dev/vg_data/lv_snapshot /mnt/snapshot \n```\n\n2. **Remove snapshot after use:**\n\nCode\n\n```\n   # umount /dev/vg_data/lv_snapshot    # lvremove /dev/vg_data/lv_snapshot \n```\n\n# 5.Removing LVM Components\n\n- Remove a Logical Volume\n\nCode\n\n```\n# umount /mnt/storage# lvremove /dev/vg_data/lv_storage# lvdisplay\n```\n\nRemove a Volume Group\n\nCode\n\n```\n# vgremove vg_data# vgdisplay\n```\n\nRemove a Physical Volume\n\nCode\n\n```\n# pvremove /dev/sdb /dev/sdc /dev/sdd /dev/sde /dev/sdf # pvdisplay\n```\n\nChecking LVM Status\n\nCode\n\n```\nShow all LVM partitions:# lvs Show volume groups:# vgs Show physical volumes:# pvs \n```\n# some other commands-\n\npvdisplay\n pvdisplay  \n pvcreate /dev/sde1 \nvgdisplay  \nvgextend vg1 /dev/sde1  \nlvdisplay  \nlvextend /dev/vg1/lv2 --size 50G --resizefs  \nlvextend /dev/vg1/lv2 --size 75G  \nlvextend /dev/vg1/lv2 -L 50G  \nlvreduce /dev/vg1/lv2 --size 25G --resizefs  \nlvreduce /dev/vg1/lv1 --size 110G  \nlvreduce /dev/vg1/lv2 -L 15G  \nlvresize /dev/vg1/lv2 --size 90G --resizefs  \nlvresize /dev/vg1/lv2 --size 40G --resizefs  \nlvresize /dev/vg1/lv2 --size 75G  \nlvresize /dev/vg1/lv2 --size 25G  \nlvresize /dev/vg1/lv1 -L 50G  \nlvresize /dev/vg1/lv1 -L 100G\n#df -h  \nxfs_growfs -n /dev/vgl/lv1  \nxfs_growfs /dev/vgl/lv1  \nxfs_info /dev/vgl/lv1  \n umount /d1 /d2  \n lvdisplay  \nlvremove /dev/vg1/lv1  \nlvremove /dev/vg1/lv2  \nvgdisplay  \nvgremove vg1  \n pvremove /dev/sdb1  \npvremove /dev/sdc1  \npvremove /dev/sdd1\n# raid-\n  mdadm --create /dev/md0 --level=0 --raid-devices=2 /dev/sdb1 /dev/sdc1\n mdadm --create /dev/md0 --level=striping --raid-devices=2 /dev/sdb1 /dev/sdc1\nmdadm --create /dev/md1 --level=1 --raid-devices=2 /dev/sdd1 /dev/sde1 \nmdadm --create /dev/md1 --level=mirror --raid-devices=2 /dev/sdd1 /dev/sde1"}, {"name": "MODIFICATION AND DELETION OF USERS", "content": "commmand - #usermod same switches as useradd\n[-d] kha karna hai home directory create \n[-m] home directory create karna hai\n[-M] directory nhi banegi\n[-c] for comment \" likhna hai comment\"  in passwd file\n[-N] se user toh baneega par uska group nhi banega\n[-s] shell change then shell name from shell file and username\n[-u] se uid change kar sakte hai\nab same uid kisi user ko dena ho toh [-o] ka use karenge\n[-g] se gib nai nhi de skte hai but new user me purani gid de sakte hai [ change kar sakte hai but pehle sse wo group ki id exist karni chaiye ]\nthen [-p] for password set  ke liye new  user me\nab wo password set toh ho gaya but uska encrypted way chaiye toh ab uska \nkyuki wo passwd file me without encrypted password dega\nencyrpted version dekhenge\nopenssl passwd 123\ntoh 123 ka encrypted version de dega\nthen use place kardo adduser -p \"encrypted password\" username\nthen wo passwd file me # adha hi ayega\ntoh jha bhu doller dikhe uske aage \\ laga do\nthen ab usse user jo banaya  hai wo login hi kar sakta hai\nthen -[l]for lock the user after locking the account in passwd file there is a ! mark before the password of user\nmeans it is lock\n[-U] for unlock the account\n[-f] for in inactive status of user\n[-G] se secondry group me add kar sakte hai\nlike usermod -G 'g1,g2,g3' g \ntoh wo sabme add hoga\nab aur koi group add karna ho toh [-a] \nroot se kisi user ka password chnage kar sakte hai\ncommand [passwd username] \nnormal user khud ka password change kar skta hai but required complexity\n# user delete-\nuserdel username\nthen user delete hoga directory nhi\ntoh directory hatana hai toh [-r]\nuser toh delete ho jayega but us user ke group ke member nhi\nkai bar user bhi nhi hoga kyunki wo kisi group ka member hai\n[-d] se password hata sakte hai \n[-S] check password  has or not\npasswd -S username\n[-e] for expiry of user \nshadow file me entry karke bhi dekh lo\n"}, {"name": "MV AND LN COMMAND", "content": "#link and cut paste commands \n#pehle ek jagah se particular file ko copy kare ek particular extension ke sath\n*.log \n#aur ek pure extension wali like=* * .*\nexample command \nex= cp -v /var/log/* .\ntoh isme pura folder layega \nex=cp -v /var/log/* ~/desktop/ d4/\nisme sirf files layega \n#double .. ek directory piche past\n# mv cut paste command\nlike move from one place to another\nsame place pe mv karenge toh wo rename ho jayega\nby dfalault recursive\nthen use acc to your use\nuse wildcard and other things\n# ln link command\n# hard link\njha do file links ho same number of files\n\t\tno of files check=ls l wc -l \n\t\tlink banate hai shortcut ke liye\n\t\t#how to make links aur shortcuts\n\t\t1.ex ln /var/log/messages my_hard_links yadi current pe ho toh nhi toh pura nam\n\t\n\t\tln command source and types of links\n\t\t#hard links always stay when the original file deleted\n\t\thard links take same sp[a]ce like original file\n# soft link\nex=ln  -s /var/log/messages my_soft_links\nwhen original folder delete it also deleted\n"}, {"name": "NTFS PERMISSIONS IN LINUX", "content": "10 types of permission in linux \n1 additional hoti hai\nls -lh me right side jo dikhegi corner pe wo\n![[Pasted image 20250107185414.png]]\n# first  position me -                                                                            6.1 - wo subject \nnormal file hai toh [-]\ndirectory ho toh [-d]\nlink ho toh [-l] \nprocess file ho toh [-p]\nblock device ho toh [-b]\ncharacter device ho toh [-c] \n\n#process file - me jab linux run hota hai tab wo execute hogi\n/proc me jayegi\n\n#block file -Block device files in Linux are **special files that represent devices with block-level access**, such as hard drives, solid-state drives (SSDs), and other storage devices.\nls -l /dev | grep '^b'\n\n#character file- Character device files are **associated with character or raw device access**. They are used for unbuffered data transfers to and from a device. Rather than transferring data in blocks the data is transfered character by character. One transfer can consist of multiple characters\nls -l /dev | grep '^c'\n# 2 to 4 position - owner ke dwara banai jati hai\n2 . me read \n3 . me write \n4 . me execute\nyadi [-] aa ra toh no permission of read write execute \n• Read (r):\n\t\t○ Files: Allows viewing the contents of the file.\n\t\t○ Directories: Allows listing the contents of the directory.\n\t• Write (w):\n\t\t○ Files: Allows modifying the contents of the file.\n\t\t○ Directories: Allows adding, deleting, or modifying files within the directory.\n\t• Execute (x):\n\t\t○ Files: Allows running the file as a program/script.\n\t\t○ Directories: Allows accessing files and subdirectories within, and entering the directory.\n\t\tHere are the meanings of Read, Write, and Execute permissions for different types of files and devices:\n\nFiles\n\n- Read (r): Allows viewing the contents of the file.\n- Write (w): Allows modifying the contents of the file.\n- Execute (x): Allows running the file as a program or script.\n\nDirectories\n\n- Read (r): Allows listing the contents of the directory.\n- Write (w): Allows adding, deleting, or modifying files within the directory.\n- Execute (x): Allows accessing files and subdirectories within, and entering the directory.\n\nBinaries\n\n- Read (r): Allows reading the binary file.\n- Write (w): Allows modifying the binary file.\n- Execute (x): Allows running the binary file as a program.\n\nLinks\n\n- Read (r): Allows reading the link.\n- Write (w): Allows modifying the link.\n- Execute (x): Allows following the link.\n\nBlock Devices\n\n- Read (r): Allows reading data from the block device.\n- Write (w): Allows writing data to the block device.\n- Execute (x): Not applicable, as block devices are not executable.\n\nCharacter Devices\n\n- Read (r): Allows reading data from the character device.\n- Write (w): Allows writing data to the character device.\n- Execute (x): Not applicable, as character devices are not executable.\n# 5 to 7 associated group ki permission\nye ls-lh me dikhega user ke bad uska primary associated group koi bhi user ko us group me jod doge toh same permission ho jayegi uske pass bhi\n# 8 to 10 other user jo na group hai na owner hai\n  1 . me read \n2 . me write \n3 . me execute\nyadi [-] aa ra toh no permission of read write execute\n\n# ls -lh info\nfirst filed permissions\n![[ls -lh.png]]\nsecond field uske andar kha kha ja sakte hai directory not include files \nthen owner of file\nowner ka associated group\nthen space\nthen last modified\nthen file name\npehele se kisi bhi system directory me 2 folder aate hai[.] means current location and[..] current location se ek piche\n# permission allocating-\n#symbolic method - \nr -read\nw-write'\nx-execute\nsynatx-\nuser class = operation=permission\nuser class -\n1. u -user owner\n2. g- group\n3. o-others\n4. a -all other user groups etc \noperation (=,-,+)\n[+]adding permissions\n[-] removing of permissions\n[=] do permission add karna ho toh \npermissions - r , w, x\nexample - chmod u+r file.txt\nchmod o-w file1.txt\nchmod g=rw file2.txt\n#numeric method  \nread = 4\nwrite=2\nexecute =1\nuser class \n1. owner [u] ke liye \n2. group ke liye\n3. others ke liye\n  then jaise r+w+x ki permissions kisi user ko deni hai toh \nchmod  644 file.txt\nab owner ke pass r=w ki permission hai\ngroup ke pass read ki\naur other user ke pass bhi read ki\n11th permission\n[.] hai toh no acl\n[+] hai toh acl hai\n"}, {"name": "PARTATION  CREATE  MOUNTING FORMAT", "content": "sda a ko mat chedna nhi toh linux gaya\nthen jha partation create karne hai usko\n#fdisk location of disk toh wo disk ke andar le jayega\n #concept-ek disk hai usko pehle hame gpt lagana hai ya mbr boot ke liye\nthen ab jab partation bante hai toh usme fille type dete ki linux hai swap hai or others ab jaise linux hai toh jabbhi boot hoga bios kernel ko linux file me dhundega then ab jab hu un partation ko format karte hai mkfs se uska matlab un partation me jo data rakhenge unke liye konsa file system hoga \n![[WhatsApp Image 2025-01-29 at 19.27.06_16b03bad.jpg]]\n# creating partation- switches\n\n    m- for help\n     #directly partation toh mbr me hi banega but gpt karna hai toh gdisk gdisk or use fdisk me g\n    n- new partation\n    p- primary partation\n    e-for extended partation\n    then partation number dega mbr hai toh 4 gpt hai toh 128 \n    extended ek hi bana sakte ho\n    logical kitte bhi bana sakte ho 5  se chalu honge\n    then storage sector\n     max size - me jo apko dena ho like +25G\n    p- partation table print\n    d-delete the partation\n    by default last hataiga\n    space remaining ho toh bhi 4 se jyada primary nhi bana sakte mbr me\n    yadi mene extended hataya toh bakki logical bhi hataiga \n    q- se bhar without changes \n    w- se save and exit\n    t- file system aur partation id change karni ho toh \n    l- se list aaigi file systems ki\n    ek ntfs ek fat do linux le lo\n# format of partation-\n     file system dalna hai partation pe-\n     mkfs - konse konse file system se format kar sakte hai\n     like- mkfs.ext location of partation\n     partation format ho jaye tab uuid aajti blkid me\n     ntfs chiye toh yum install ntfs*\n# mounting of partation-\n     df -h se dikh jayega kon mount hai kon nhi\n     mnt ke andar mount kar do \n     mount -t file system type partation location\n     umount se unmount kar do\n     umount location of partation\n     ye temporary mnt hai reboot karte hi hat jayeg \n     PARTATION ID CHANGGE HO JAYEGA AFTER REBOOT\n     PARTPROBE SE WO MNT KO REFRESH KAR DETA HAI\n# READY FOR USE-\n![[WhatsApp Image 2025-01-28 at 18.02.00_fabae649.jpg]]\n![[WhatsApp Image 2025-01-28 at 18.02.00_475f7606.jpg]]\n![[WhatsApp Image 2025-01-28 at 18.01.54_f66491c1 1.jpg]]\n"}, {"name": "PASSWD GROUP SHADOW GSHADOW", "content": "/etc/passwd  info about - uid gid username , home location ,shell                                                                                              ![[rohan.png]]                                                                                     \nx aa ra toh uska password shadow me save hai\ncomment me uska display name\nuid = o root\nuid >0 system user\nuid > 999 normal user\nGID -same as uid \nhave seven field                                                                         \n# /etc/shadow -contains user settings\n![[rohan3 3.png]]yadi $ [#] aa ra toh wo user enable hai aur password set hai\n[ * ]  matlab password save nhi hai\n[ !] aara matllab user disable hai\nlast password  change means - kitte din se password change nhi hua count kar ra 1 jan 1970 se\nmin pass age =  o hai means aaj badla toh aaj wapas badal sakte hai\nmax password age = kab tak valid hai 1970 se count karega\nwarning period - expire hone se pehle warning dega\ninactive period -matlab kabse active hai\nexp date - band kitte din se hai\nunused - kitte din se use me nhi aaya \n\n#encryption of password type -\n![[pass.png]]\n# /etc/group - gid group name group members \n![[kush.png]] \n x hai matlab gshadow me password save hai\n gid group id\n then member of group\n # /etc/gshadow - contain group passwords etc \n ![[har.png]]\n yadi g shadow file delete ho jai toh password group file me jayennge'\n yadi group ke aage space hai toh password encrypted hai\n yadi ! hai toh group disable hai\n then name of group administrator  \n then member of group\n jab user banainge toh charo files sath me update hogi \n "}, {"name": "PASSWORD CHANGE OF ROOT IN LINUX", "content": "password bhul jate hai root ka bina kisi setuid lgai kisi binary pe ya bina acl add kare ya bina wheel group ma member banai \njab hum different ways use karte password change karne ke lie- \nReset root user password in linux\n\nMethod 1: Using a Live Boot\nROOT PASSWD CRACK \n\n\ninstall ubuntu 20.04.06 https://releases.ubuntu.com/20.04/\n\ntry ubuntu in the menu \n\nfiles > other locations \n\nsee if it is mounted or not \n\nif mounted \n\n\tthen \n\n\tsudo su - \n\n\tmount /dev/ount-name /mnt \n\n\tcd /mnt/etc \n\n\tapt install vim \n\n\tvim /mnt/etc/shadow \n\n\tchange the root passwd by openssl passwd -1 (give the desired passwd)\n\n\tsave and exit \n\n\tcheck through fg if any current job is running or not \n\n\thome location ~ \n\n\ttouch /mnt/.autorelabel\n\n\tumount /mnt \n\n\texit  \n\n\treboot \n\n\tchange the boot order\n\n\tlogin to centOS\n\nMethod 2: Using Recovery Mode\n\n1. Reboot the system: Reboot the system.\n2. Select recovery mode: Select the recovery mode option from the GRUB boot menu.\n3. Select the root option: Select the \"root\" option from the recovery menu.\n4. Mount the filesystem: Mount the filesystem in read-write mode.\n\nmount -o remount,rw /\n\n1. Reset the root password: Reset the root password using the passwd command.\n\npasswd root\n\n1. Reboot: Reboot the system and login with the new root password.\n\nMethod 3: Using GRUB Boot Loader in centos-\n1. f2  ya f12 sese grub looder pe\n     Reboot the system: Reboot the system.\n2. Select the GRUB boot menu: Select the GRUB boot menu.\n3. Press 'e' to edit: Press 'e' to edit the boot options.\n4. Find the 'ro' line: Find the line that starts with \"ro\" and replace it with \"rw init=/sysroot/sbin/sh\".\n5. Press 'Ctrl+X' to boot: Press 'Ctrl+X' to boot with the modified options.\n6. Chroot into the system: Chroot into the system.\n\nchroot /sysroot\n\n1. Reset the root password: Reset the root password using the passwd command.\n\npasswd root\n\n1. Check SELinux status: Check the SELinux status.\n\nsestatus\n\nIf SELinux is enabled, create a file .autorelabel and reboot.\n\ntouch /.autorelabel\nreboot\n\n1. Reboot: Reboot the system and login with the new root password.\n\nMethod 4: Using Debian Recovery Mode - for kali and debian like-\n\n1. Reboot the system: Reboot the system.\n2. f2 se andar jayenge \n3. Select the GRUB boot menu: Select the GRUB boot menu.\n4. Press 'e' to edit: Press 'e' to edit the boot options.\n5. Find the 'ro quiet' line: Find the line that starts with \"ro splash\" and replace it with \"rw singel init=/sbin/sh\".\n6. Press 'Ctrl+X' to boot: Press 'Ctrl+X' to boot with the modified options.\n7. Reset the root password: Reset the root password using the passwd command.\n\npasswd root\n\n1. Reboot: Reboot the system and login with the new root password."}, {"name": "PERMANENT MOUNTING AND SWAP EXTENSION", "content": "iso jab dalte hai toh wo by default ide me lega \nsata karna hai toh ide controller hata do\n#error - jab hum mnt karte hai kisi folder me then data place karte hai toh after reboot and again mnt data usme nhi rehta kyunki usi id change ho jati hai iske liye use sahi se lne by line format kare\nsda1 to sbb1 like that\nex- jaise device lgaya ab wo sata 1 pe hai\nthen ab unplug kiya aur waps lagay toh wo sata 2 pe lagega\ntoh ab wo mnt to dusri jagah ho jayega isliye data chala jata\n# permanent mnt-\nentry in /etc/fstab - jab bhi pc boot hota hai toh iske andar jo bhi rehta use mount kar deta hai\n1. by uuid\n2. by id ex - sdb1 sdb2\n3. by label  ' \n![[Pasted image 20250129200529.png]]\nfirst uuid -\nthen location jha mount karna hai\nthenkonse file system me format karna hai\nthen permission\nown boot- jab pc chaalu hoga toh partation ko check karna hai ki nhi 0 nhi 1 ha\nab konsi pehli check hogi uuska no\n xfs_admin -L data /dev/sde1\n# by id-\n\t/dev/sda1/   /      xfs     default  0 0\n\tab ye sda1 / ke andar permanent mount ho jayega  \ndf-h  se dekh lo mnt hue ki nhi\n\n# by label-\n#problem= jab hum disk ko idhar udhar karenge toh partation id bhi idhar udhar hogi toh jo mnt kiya hai partation ko fstab me wo toh change ho jayega use wo data us partation me milega hi nhi\n\n#solution=by label mnt karenge toh ab partation id change bhi ho jaye toh dikkat nhi \nlabel matlab jaise hum kai bar c drive  a nam game rakh dete like that-\nab ext4 file system hai toh label ke liye command e2label\nab xfs ko label denaa ho toh xfs_admin -l then name location of partation\nblkid se label dikh jayene\nLABEL=NAME THEN same as id \nxfs_admin -L data /dev/sde1\nmount -a se kuch galti ho fstab ki entry me toh bata detaa\n# by uuid-\n     uuid=of partation   location  file system    permissions 0 0\n# extend of swap file system-\nswap - virtual ram used after main memory full\njaise shuru me jo swap banaya tha usse badana ho toh use karte\nfree-h se swap dikh ajyega\nthen swapon command\nthen ab do swap banao kisi disk me\nthen mkswap se usnhe format kar lo\nthen ab swapon then partation name toh swap bad jayega\nab ye temporary hai permanent  rakhna hai toh fstab me entry kar do\nby uuid of swap partation or file system swap rakhna location none\nswap hatana ho toh swaooff location of partation\nab konsa partation pehle us karna ho toh \nswapon -p partation\n\n"}, {"name": "PIPE AND REDIRECTS", "content": "#pipe and redirect\n#ek bar me sari command run kar sakte hai series wise\n\n1.1 use colon; space\n1.2 use && space\n1.3 space hatane se koi dikkat nhi hogi\n1.4 use & single and se bhi run hojayegi command but wo command ko background me put kar degi\nfor free of mouse\n1.5redirect command ko kar denge> /dev/null/ to wo command redirect  hoke bacckground me chali jayegi\nredirect hone ke bad jo id ayegi wo processs id hogi\n1.6 jo command bacckground me jayegi use hum jobs command deke dekh sakte hai\n1.7 wapas commandd ko front pe lane ke liye fg command dena padega reverse pattern me\n1.8 pehli command chalegi jab dusri chaleegi\n\n# double & and colon; me pehli command jab tak run hogi useke badd hi dusri hogi but single & me usse wo terminate kar dega or dusri chala dega\n  #2 pie|  command \n  2.1 pattern same like redirect but pie give output of last command\n  2.2 work in the pattern of standard output iskA OUTPut iske sar\n  ex =like cat /var/log/messages | wc -l\n  ex = cat /var/log/messages | less\n  2.3 standard 1 for output redirects standard 2 for error redirects and standard 0 for inputs redirects\n  2.4 koi bhi command ke bunch ko sath me chalinge toh do  case bante hai=\n  2.4.1=output\n  2.4.2=error\n  2.4.3=dono\n  ex= cat /etc/shadow /etc/os-release dono  aayenge output or error\n  2.5 jo command chalate hai uska jo output aata hai  use bad hum  check karenge exit status yadi wo 0 aya toh use standard output bolte hai\n  iska exit status hota hai har  command ke chalne ke bad ek variable aat hai o aaya toh command succesfully done aur kuch aay toh wo command sahi se nhi run hui\n  exit status check karne ke liye echo $?\n  2.6 output redirect jiska output samne nhi dikhega \n  ex= id > user_id.txt\n  toh command ka output is file me dikhega\n  2.7 error redirect \n  ex= cat /etc/shadow 1> 1.txt\n  one dala isl
