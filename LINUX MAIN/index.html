iye output  redirect ho jayega\n  ex=cat /etc/shadow 2> 2.txt\n  2 dala  isliye error  redirect ho jayega\n  2.8 bunch of command di usme ek error and output aa ra toh hum usme dono ko redirect kar sakte hai \n  ex =cat /etc/shadow /etc/os -release > output.txt output redirect\\\n  ex=cat /etc/shadoew /etc/os -release >output.txt 2> error.txt  dono redirect ho jayenge\n  dono chije ek file me toh = & laga denge\n ex =cat /etc/shadow /etc/os -release &> output-error.txt\n dono ko same  jagh ka bhi ek hi fanda ex =cat /etc/shadow /etc/os -release 1> output-error.atxt 2>&1\n"}, {"name": "QUOTA MANAGEMENT", "content": "Quota management in Linux refers to the mechanism for setting limits on disk space usage and the number of files (inodes) a user or group can use on a filesystem. This is useful for preventing any single user or group from consuming all available disk space or inodes, which can affect system performance and availability.\n\n yum install quata for install package\n rpm -qa | grep quota\n rpm -qi  then version of quota \n then rpm -ql version kitti file pe quota hai\n\nTo manage quotas, you'll typically follow these steps:\n1. Enable Quotas on Filesystem\n2. First, ensure that the filesystem supports quotas. You can enable it by adding usrquota (for user quotas) and/or grpquota (for group quotas) options to the filesystem mount options in /etc/fstab. For example:\n\n        bash\n       Copy code\n       /dev/sda1   /   ext4   defaults,usrquota,grpquota   0   1 \n       After modifying /etc/fstab, remount the filesystem:\n usrqouata- enable user based quotab\n groupqouta = enable grop based qouta\n\n     \n       bash     \n       Copy code\n        mount -o remount /dev/sda1\n\n3. Enable Quotas\nAfter\nchecking and creating the quota database files, enable the quota system:\n\n     bash\n    Copy code\n    quotaon /mountpoint\n4. Set Quotas\nTo set quotas for users or groups, use the edquota command. For example, to edit a user’s quota:\n\n     bash   \n    Copy code\n    edquota username   \n    This will open a text editor where you can set soft and hard limits for both the number of inodes (files) and the amount of disk space. Soft limits are the threshold where users are warned, and hard limits are the maximum allowed usage.\n\n     Soft limit: The user will be warned when approaching this limit but can exceed it for a period.\n    Hard limit: The user cannot exceed this limit.\n    Example file format:\n\nyaml\n         \n         Copy code\n         Filesystem  blocks   soft   hard  inodes   soft   hard\n            /dev/sda1   100000   50000  100000  1000    500    1000\n         block - size inode - no of file\n5. Monitor Quotas\nTo check usage and limits for a user:\n \n    bash \n    Copy code\n      quota username\n    This will show the current disk usage and limits for the user.\n\n6. Disable Quotas\nIf you want to disable quotas on a filesystem, you can do so with:\n\nbash\n     \n     Copy code\n       quotaoff /mountpoint\nAnd then remove quota files:\n\nbash\n       \n       Copy code\n     rm /mountpoint/quota.user\n     rm /mountpoint/quota.group\nThese steps provide basic quota management. There are many advanced configurations for managing quotas depending on system requirements, like setting grace periods for soft limits or enabling automatic notifications.\n\n"}, {"name": "SED COMMAND ADVANCEDD", "content": "sed command advanced-\n  [a-append]  switch use for adding text aage ya niche of text as a line\n  ex =[sed '/pattern/a then jo add karna ho' input file]  \n  [d] you know for delete the line\n  [i-prepend]  switch use for adding text piche ya upar of pattern\n  ex =[sed '/pattern/i then jo add karna ho' input file]    \n[p] you known for [print]\n[q] exit code pattern match me hata dega \nsed '6q' file.txt [stop processing after 5th line]\nexit status check karne ke liye echo $?\n[s] replacememt \nsed 'S/pattern/PATTERN/' file.txt\n[c] change the word \nex- sed '/root/c  rohan' file.txt\n[g] sabpe changes apply karne ke liyer\n[i] also use for decoration aur insensitive [-i-------]\n[e] command chalane ke liye\nex-[sed '1e date' user.txt]\n[e] se do chije ek sath shund sakte hai\nex - sed -ne '/root/p' -e '/armour/p' file.txt\nthen use particular examples according to their use'\n#end\n\n"}, {"name": "SED COMMANDS", "content": "sed  {stream editor} command \nused for - text replacing and finding of text mainly\nparticular line pe jump karna ho kar sakte hai {main motive}  \n#syntax-\noptions = switches\nscript = main body\ninput file\nex = print particular line \nsed -n  '1,5p' /etc/passwd\nab ye passwd ki1- 5 line print karega\ncomma yaha range ke liye use hota hai\n-n used as switch\np for print in main body\nafter lines we have single letters command like {a,p,d,s,q,i} \nfor deleting the line\nsed -n  '1,5d' /etc/passwd\nbackup bana ke use karna'\\\n[-n auto print ko rokhne ke liye]\nab empty line banao kisi file me aur hume empty line print karwana ho toh -\nsed -n '/^$/p' passwd\nab empty nhi chaiye toh -\nsed -n '/^$/!p' passwd \nthen empty lines ko hata do\nbich me se bhi line ko print karwa sakte hai\nab kisi particular line se last tak print karwana ho toh\nsed -n  '1,$p' /etc/passwd\n#then for condition pattern-\n  sed -n '/bash/p' passwd\n  jis line me bash ho wo print karo\n  jha condition match hoti ho uske age ki do aur piche ki do line print karo\n   sed -n '/bash/,+2p' passwd\n  sed -n '/bash/,-2p' passwd \n  jha bash ho use delete karna ho toh \n   sed -n '/bash/d' passwd\n  #replacemet of text=\n  sed -n 's/bash/BASH/P' passwd\n  BASH KI JAGH base aa jayega ab wo line me first bar aa ra use hi replace kar ra sab jagah karna ho toh [g] \n  sed -n 's/bash/BASH/Pg' passwd\n   sed -n 's/bash/BASH/1P' passwd\n  1 diya jab pehli bar bash ayega toh replace karega\n  #particular line me changes karne ho toh--\n  sed -n '4 s/sbin/SBIN/pg' passwd\n  then range me bhi replace karke dekh lo\nsed G file.txt \nspace de dega har line ke bad\nsed G;G file.txt \ndo space dega\n\n  \n  "}, {"name": "SETGID , STICKYBIT", "content": "rwx dekh lo user aur group pe\nFiles\n\n- Read (r): Allows viewing the contents of the file.\n- Write (w): Allows modifying the contents of the file. [doubt permission dene ke bad bhi likh nhi pa ra  ]\n- Execute (x): Allows running the file as a program or script.\n\nDirectories\n\n- Read (r): Allows listing the contents of the directory.\n- Write (w): Allows adding, deleting, or modifying files within the directory.\n- Execute (x): Allows accessing files and subdirectories within, and entering the directory.\n\nBinaries\n\n- Read (r): Allows reading the binary file.\n- Write (w): Allows modifying the binary file.\n- Execute (x): Allows running the binary file as a program.\n\nLinks\n\n- Read (r): Allows reading the link.\n- Write (w): Allows modifying the link.\n- Execute (x): Allows following the link.\n\nBlock Devices\n\n- Read (r): Allows reading data from the block device.\n- Write (w): Allows writing data to the block device.\n- Execute (x): Not applicable, as block devices are not executable.\n\nCharacter Devices\n\n- Read (r): Allows reading data from the character device.\n- Write (w): Allows writing data to the character device.\n- Execute (x): Not applicable, as character devices are not executable.\n# for files and binary-\nsetgid- group pe dete hai execute ke section me\nkoi bhi banda us binary ko run karega toh aisa lagega wo us binary ke group ka member hai jabki wo nhi hai  auur wo group ki power se run hogi\nyadi koi uske group ka member hai toh wo by default uske pass power rahegi\npermission wo file pe hogi group section me whi uske user ke pass jayegi toh wo uske hisab se changes kar payega\nbinary script pe karke dekh lo nano se dekh lo\n# for directory-\nthen ab hr emp sells directory pe-\nthen ab group ko mene permission de di rwx\naur us directory ko mene uske nam ke group ko add kar diya\nab uske user changes kar skte hai hai us directory me dusre nhi \nab jo me changes kar rha hu  toh jo file aur directory uske andar ban rhi hai usme group jo user bana raa uska aa ra ab muje us directory ka group hi uske andar ke data me chaiye toh]\naur jo permission wo directory pe ho wo  un group user se banai file pe bhi ho toh [ write ki nhi de ra ]\nthen hum [group pe special permission denge ]\n[chmod g+s directory]\ntoh ab group user se banai gai directory pe bhi wo permission aur group apply hoga\n![[Pasted image 20250114005210.png]]\nnumeric me permmisson dena ho toh 2775\n2 lagega group ko special permission deni ho toh\n# sticky bit -\nab ek folder me other users ko read write permissions hai \ntoh wo usme changes kar ke file rakh saakta hai\nbut ab koi bhi user ake usko delete kar dega toh ye dikkat hai\niske liye sticky bit permission use hogi x ke section me t\nab jisne wo file us directory me banai hai whi use delete kar sakta hai\nchmod o+t directory name\nnumeric 1777\n1 se hogi sticky bit\n![[Pasted image 20250114010823.png]]\n"}, {"name": "SPECIAL PERMISSIONS IN LINUX", "content": "yadi koi binary [command] root se run hogi toh ab dusre user bhi use run kar pai  toh kya kare use root bana de isse acha toh wo binary ko special permission de do ki wo jis bhi user se run hogi but wo root ki power se run hogi\ncalled setuid - special permission for linux\nchmod u+s  then binary name\ntoh ab jha bhi binary run hogi wo run as root hogi \nlike fdisk command ko which karke location nikal do\nthe ab local user se login karwake binary run karke dekho toh wo nhi hogi\nbut usko special permission dene ke bad wo run kar payega\nvim ko special permission de toh wo jha bhi run hoga run as root hoga toh wo dusre user jha uske pass permission  nhi thi particular file  ko dekhne ki ab usko edit kar sakte hai\nls ko deke dekh lo ab jaise kisi bhi file ko dekhne ki permission\nuser ek dusre ki home directory nhi ja sakte but ls se dekh toh sakte hai na\nthi ls ko special permission de do\nnumber se permissionn de do=\nchmod 4755 file\n4 for special permission\n7 for rwx\n5 for rx\n5 for rx\nthen opt  me jao\nyum install gcc  called complier\nthen vim rootshell.c - call shell of linux\nisme google se script dalo then run karke dekho./ ke sath\n#include <stdio.h>\nint main(void)\n{\nsetuid(0);\nsetgid(0);\nseteuid(0);\nseteguid(0);\nexecvp(\"/bin/sh\",NULL,NULL);\n}\ndono user me\nthen compile c to binary\ngcc rootshell .c -o rootshell\nthen id command\nthen dusre user me shell run karke dekho\nthen id toh us user ki gid uid aayeegi\nab use binary ko special permission de denge toh wo run as root hogi jaha bhi chalao\nthen  vim karke script ke andar zero ko jagah 1000 toh wo rohan se chalegi\nthen compile gcc rootshell.c  -o rootshell\nthen ab uska user rooot se rohan kar do toh wo root se bhi run hoga toh bhi uid user ki dega\nab ushell kar owner hi usko special permission de aur hata sakta hai\nthen permission on passwd , shadow, gshadow , group\ngroup and passwd have given read permission to other user \ngshadow and shadow have nlo permission given to any user \nbut  only run on root\nso jab bhi hum isme direct password dalenge toh wo sabko dikhega\nshadow and gshadow jab bhi user ke sath changes hoga toh wo bhi update hogi\npasswd command pehel se setuid se encrypted aati hai \npasswd by default root se chalegi kyunki use update karna rehta hai data ko in shadow and gshadow file special permission hatai toh koi change nhi karega in files me\nthen root ka alias bana do with same uid gid etc and password\nbut wo login as a root hi hoga'\n![[WhatsApp Image 2025-01-10 at 18.32.53_096e6a1a.jpg]]\nread"}, {"name": "SSH CONNECTION IN DEBIAN", "content": "normal user se login'\nterminal me su root\nsudo apt update\nsudo apt install openssh-server\nnano /etc/ssh/sshd_config\n![[WhatsApp Image 2025-01-08 at 21.14.01_43248f3e.jpg]]\ndusri line me entry karni hai upar wali line ki\nthen ab connection ban jayega\nphysical login of root in debian\n2)nd thing to enable root physical login\n\n/etc/pam.d/gdm-password\n3rd line me# ! WALI\nSAVE AND EXIT\nthen google ai open jo bolo screen share karo sab batayega\nthen scp protocol secure copy protocol -\nscp fromuser<ip>:\"pathfrom\"  userto@<ip>:\"pathtodestination\" \nscp fromuser<ip>:\"pathfrom\"  userto@<ip>:\"pathtodestination\"\n> scp Downloads/LibreOffice_25.2.0_Linux_x86-64_rpm.tar.gz root@192.168.173.110:/root/ jha se file bhejna ho wh se chalao\n> jis pc se bhej e uska ip nhi dena hai"}, {"name": "STANDARD INPUT REDIRECCTS 2", "content": "staandard input part 2 and examples\n#echo $shell se shell dekh sakte hai konsaa hai\\\n#error dekhna hai toh output redirect kar do \n#output dekhna ho toh error redirect kar do\n# command find / -name aur jo files chaIYE USKA NAM\n\n\t# LS THEN LS -L THEN USKA PURA OUTPUT HUME EK FILE ME BHEJNA HO TOH OUTPUT USS  FILE ME REDIRECT KAR DENGE\n\t#LS -L /ETC/ > USI FILE ME TOH\n\t1.PEHLE WALA DATA HAT JAYEGA\n\t2.DUSRE WAALA KA RAAHEGA JO ABHI DALA HAI\n\t3.DONO Rahe is LIYE HUM DOUBLE REDIRECT KA USE KARENGE LIKE =[>>]\n\t4.CALLED APPEND BAD ME ADD KARANA LAST ME AAUR PREPEND PEHLE ADD KARNA\n\t5.SUITABLE EXAMPLE = ECHO ' ROHAN HARDIA ' > ROHAN.TXT ME AB JAN BHI CHIYE BY LINE TOH JAN KE SATH DOUBLE REDIRECT DENA PADEGA \n\t6.AUR ECHO KIYA 'JAN' >> ROHAN.TXT ME TOH PEHLA DATA HATA DEGA AUR JAN WALA DAL DEGA\n\t7.TOH DONO DALNE KE LIYE HUM DOUBLE REIRECT USE KARENGE \n\t8.COMMAND IMP\nLS -LH | LESS |CAT > ROHAN .TXT | ID\n #THREADING ME SARI COMMANDS EK SATH CHALA SAKTE HAI\n "}, {"name": "STING PROCESSING", "content": "# STING PROCESSING \nPARTICULAR OUTPUT KO APNE MARZI SE FILTERR KARNA \nex- lines dekhni hai shuru ki last ki  jo process hoti hai last ki jo last me write hoti hai usko bhi write karna\n#head-\n1. command hume shuru ki 10 line la ke  deta hai \n2. ex-head /var/log/messages\n3. maximum file bhi support karta hai \n4. ex= head /etc/shadow /etc/gshadow /etc/passwd \n5. switches - head -n line kitti dekhni hai wo /file name jiski dekhni hai \n6. ex- head -n 4 /etc/shadow\n7. character dekhna ho toh [-c] \n8. ex-head -c 50 /file name jiski dekhni hai\n9. multiple files me header dikh jate hai\n10. single files me headers nhi dikhate hai isliye hum [-v] ka use karte hai \n11. ex - head -v -n 5 /etc/passwd\n#tail command-\n1. last lines dikhata hain \n2. use for bhut si commands data ko lasts se save karti hai toh use read karne ke liye  tail use karte hai\n3. supported maximum files\n4. . ex= tail /etc/shadow /etc/gshadow /etc/passwd \n5. switches - tail -n line kitti dekhni hai wo /file name jiski dekhni hai \n6. ex- tail -n 4 /etc/shadow\n7. character dekhna ho toh [-c] \n8. ex-tail -c 50 /file name jiski dekhni hai\n9. multiple files me header dikh jate hai\n10. single files me headers nhi dikhate hai isliye hum [-v] ka use karte hai \n11. ex - tail -v -n 5 /etc/passwd\n12. we have [-f] switch for single file updation in data bataya karta hai\n13. ex -tail -f  /var/log/messaages\n14. connection break or login karenge toh hume changes milega data me\n#wc-word count-\n1. word counting karna hai  toh use karege jaise\n2. ex -wc /etc/passwd\n3. maximum files supported \n4. ex -wc /etc/passwd /etc/groups /etc/shadow /etc/gshadow\n5. orde -line word character\n6. wc -l line\n7. wc -w word\n8. wc -c character\n# sort full switches and pattern\ndefine-- for manage data in particular way \n vim use kana hai\n1.command sort file name \n2.place data in it \n3.give sort command\n#switches of sort command-\n1.sort karenge toh first letter ke behalf pe sort karnege\n2.[-h] for human readable \n3.ex -sort -h file name\n4.[-d] for dictionary ke acc\n5.[-n] numeric sort number pehle character bad me\n6.numeric aur human sort same hai\n7.[-r] reverse short ulta dikhaiga\n8.[-u] uniques sort ex - sort -u -n file.txt\n9.toh wo number ko chodkar sabhi ko sting bana dega\n10.[--uniques] same as unique sort\n11.[-R] random sort kahi bhi rakh dega no pattern apllied\n12. alg file li age aur name ke sath me data place kiya to hume kisi particular user ke basis me data ko jamana hai toh\n13. ex - sort -h -[k] 2 file name jiska data karna ho\n14. ex - sort -h -[k] 3 file name jiska data karna ho\n14 . for comma seperated value[csa]  like  = name ,age ,work\n15 . ab isme age ko [-k]se sort nhi karega because of gap\n16 .then hume [-t] aur ',' use karenge like\n17 .sort -h -k 3 -t ',' file name\n18 .then again make file  month-name.txt\n19 . month sort karna hai we have [-M] \n20 . then for duplicates file \n21. [-u] uniques karega\n22. [uniq] duplicates to sort karegaa nhi isko humko \n23. sort karne wala data dena padega\n24. ex = sort g.txxt  | uniq\n25. [-c] for character kiti bar aaya hai wo bataiga\n#watcg commandd-\ndefine - particular time me command ko run karna\nex - watch -n 5 command name\nw karke dekh lo \nthen band karo chalu karo connection ko changes dikheneg\n\n"}, {"name": "SU AND SG COMMAND", "content": "SG - SWITCH GROUP \n\n    The sg command is used to switch the user's group temporarily and execute commands as that group.\n\n      sg groupname [-c command]\n\n      sg developers -c \"touch file.txt\"\n\n\nSU - SWITCH USER\n\n    The su command is used to switch to another user account, optionally starting a new shell with their environment.\n\n      su [options] [username]\n\n      su username \n\n  Run a command as another user:\n\n      su username -c 'command'\n# switch user-\nfrom root su username\nkoi password nhi mangega\n  ab su username se hum home directory pe uski nhi ja skate ls aur id se dekh lenge\n  but\n  [-] or [-l] or [--login] se hum proper login honge us user pe id ls bhi chalegi wha\n  aur log me entry bhi hogi\n  [- c] se command chala sakte hai\n  su username -c 'command'\n  dusre user se switch user karoge toh password mangegaa\n  jha bhi user define nhi karoge toh by default root se chalaiga\n  shell bhi define kar sakte hai\n  su - rohan -s /usr/bin/zsh\n  toh wo rohan user zsh shell se login hoga'\n# switch group=\ntemporary member of the certain group\nroot kar sakta hai direct \nsg --help\nroot se sg groupname jispe switch karna hai\nid me dikh jayega primary group change ho jayega\nexit command se purane group me wapas aa jayenge\nyadi normal user us group me switch hona chahta hai toh us group me password set hona jaruri hai gpasswd se karo\nchange karwane ke bad id chalata jao\nchange hone par primary me dikhega ab us user ke pass us group ki power aa gai\n[-] lagane se primary group add kar rha hai\nbaki me secondry\nyaha bhi -c hai\naur ex sg hr 'id'\nab wo id command chala ke bhar ho jayega group se\nsu se bhi group switch ho sakta hai\n[su - armour -g hr ]\n[su - armour -g hr -G it2]\nab it2 secondry group me jayega\nye sirf root hi kar skta hai\n   \n      "}, {"name": "SUDO SUPERUSER DO", "content": "jaise hum kisi bhi binary ko setuid ki  permission dete hai toh ab wo jha bhi run hogi root i ya owner ki permissions se run hogi\nex- humne id command pe setuid laga di ab wo jha bhi run hogi root ki power se hogi\nab hum ye chate hai ki wo binary root ke alawa kisi particular usr  ya group ki power se temporary   run ho toh usme hum sudo ka use karenge \nex - sudo -u rohan -g emp id ab ye id command temporary is permissions ke sath run hogi\nyadi permanent kisi user pe wo binary ko run karna hai toh Vim /etc/sudeors me entry kar do\n#kisi user ko sudo  chalani ho toh pehele us user ki entry sudeors file me karni padeagi \nlike kushwah ALL=(rohan:rohan) /usr/bin/id ab kushwah user me sirf id command aisi hai jo rohan user and group se chal sakti hai baki koi se bhi user se  nhi by sudo \nsudo -u rohan id only'\n# basic=\nsudo --help\nse switches dekh lo [-u] se user ki permission se run hogi [-g] se group ki permission se\nroot  ALL(ALL:ALL)  ALL\nroot hostname (username:groupname) commands \nhostname - means kisi bhi pc pe wo user us command ko run kar sakta hai\nroot - ek user hai\nusername - kisi bhi user ki power se chalani ho \ngroupname - kisi bhi group ki power se chalani ho\ncommands - konsi command chalani hai \nsudo -l se dekh lo us user ko kya kya powers hai aur konse group aur user ki power se\nVim /etc/sudeors\nisme changes karne padenge\n[-i] se direct us shell pe le jata jis shell se use power di hai run hone ki command dene ki jarurat nhi \n[-b]  se background me place karega\n[-s] for shell defiend\n# echo $path=\npath variable define for = jo bhi binary run ho rhi hai wo apke system me kha place hai\nwo whi se utha ke deti jab hum kisi binary ko run karte hai\nwhich se check kar lo\nhum Vim /etc/sudeors file me jab changes karte toh puri location dalni padti hai command ki\nsudeors me last lines dekhenge jo uncomment hai\n# % wheel -\nse yadi hum is group me kisi bhi user ko add karde toh uske pass sab permissions aa jayegi har commands ko chalane ki passwd me dekh lo \nthen group me\nadd karna ho user ko toh gpasswd \nwheel group me password set kar do toh jisko password pata hoga whi us group me add ho sakta hai by [switch group command]\n# for root=\nrpm -qa | grep sudo\ninstall hai ki nhi\nthen nhi hai toh yum install sudo \nlist of file of sudo = rpm -qa sudo\njaise hum kisi user se login hai aur hume dusre ki home directory me file banani hai but ab jab file banegi uski permission me user aur group jo user login hai uske hisab se aayegaa hum chahte hai ki jiski home direcctory ho uski permissions se aai to hum hum jab bhi mkdir chlainge us user per toh wo group aur user me jo set hai uski hi dega\nsudo -u rohan -g emp mkdir toh wo iske way me hi group and user dega us directory ko\nsirf ek bar karega ye sab har bar sudo karna padega\nab ye root ke liye tha \nimp - wo directory or file me hum another file bana re sudo se toh wo file ka owner wo hi hona chaiye jis user ki permission hume us user pe chaiye\n# for other user -\nhume   Vim /etc/sudeors pe changes karne paddenge ki ye user is binary ko falani group aue user ki power se run kar pai\nparticular user ko kisi particular  command ki permission se run karna ho toh wo bhi kar sakte hai\nimp - wo directory or file me hum another file bana re sudo se toh wo file ka owner wo hi hona chaiye jis user ki permission hume us user pe chaiye\njaise hum root se login hai but hume kisi user ki home diretory me uske behalf pe file banani ho toh hum sudo ka usse karenge\nsudo -u rohan mkdir d1 \ntoh ab wo rohan ki behalf pe root banaiga\n"}, {"name": "TEXT EDITORS", "content": "koi command likhege aur tab dabainge do bar to uski files aur relatable commands hai wo dikhaiga\nex -cat /et toh hum double tab dabainge toh wo hume puri command likh ke dega [called tab compression]  \n\nvim text editor - latest version of vi\nhow to command -\n1.  jo bhi file ka text edit karna ho vim file name\n2. file nhi bhi hogi toh bana dega\n#vim basic -\n1. vim open karte hi command mode pe le jati hai\n2. i or insert karke hum insert mode me ja sakte hai wha : ke sath text likh ke [w] se save [q] se quit aur[!] forefully bhar aayega\n3. : last line mode pe ja sakte hai  \n4. r se replace mode kisi word ya character pe cursor rakho word replace ho jata hai\n5. v se visual mode puri line copy delete wagera kar sakte hai  \n6. esc se jis mode pe bhi ho wha se waps command mode par aa jate hai\n#insert mode basic -\n1. :s/word jo dhundhna ho\n2. :%s/word/replace word/g \n3. replace word or word dono me shuru me slash ho toh slash se slash ko kato  \n4. ex -%s/\\/log/bin /\\/etc/var/g\n5. :! command jo command doge uska answer mil jayega but wo command file me save nhi hogi q se command mode se bhar aainge \n6. changes hatana ho toh command mode me u for undo\n7. :set number = lines ke aage number save ho jayenge  \n8. : set nonumber = number hat jayaenge\n9. highlight word hatane ke liye [nohl]\n#switches of command mode-\nhjkl - h for left j for down k for up l for left\n1. #character delete- \n1.1 jha curor hai wo word delete karna ho toh [x] wha se teen karna ho toh 3x \nformula = kitte character then x\n1.2  capital X jha cursor hai usse piche ke character delete honge\n2. #word delete-\n2.1 jha cursor hai wha ka word delete karna ho toh [dw]\n2.2 bad ke char word hatane ho [4dw] \n3. #line delete-\n3.1 wha cursor hai wo line [dd] se delete hogi\n3.2 jha cursor hai uske niche ke char line [4dd] \n3.3 jis word me cursor hai uske aage ki particular line delete karni ho toh [D]\n3.4 [r] se word replace aur 4 character replace karne ho toh [4r]\n3.5 [cw] change word word hata ke insert me le jayega\n3.6 [C] capital c utti line hata ke insert me le jayega\n3.7 cursor hai uske niche empty line chaiye toh[o]\n3.8 cursor ke upar chaiye toh capital [O] \n3.9 join two line jha cursor hai toh [J] lobe  3 karna hai toh[3J] \n3.10 line ko copy karna hai toh [yy] cursor hai wha se char karni hai toh 4[yy]\n3.11 paste karna ho toh [p] \n4. #vimtutor se vim sikh sakte hai\n5. visual-\n5.1 select kari line \n[p] se paste [y] se copy [d] se delete\n"}, {"name": "UMASK VALUE , CHGRP,CHOWN", "content": "# umask value-\nused for security in linux\nwhen linux make file they give permission of 666 to files\nand 777 to directory\nbut in this case user have full permissions to change folder \nthatswhy umask value is used for enhance security \n default permission - umask value= permission to linux folder\n umask  command se pata lag jayega  umask value\n change karke dekh lo \n then make folder and file permissions me chnages milega\n ab kisi file ka owner root hai toh root use modify kar sakta hai but dusre user nhi karsakta jab tak uske pass write ki permissiom na ho\n change owner karke bhi dusra user us folder ya directory me chnages kar sakta hai\n command - chown ownername file\\folder name\n ab root user hi permission change kar saakta hai \n bhalai dusre user ka wo khud owner kyu na ho wo ownership chnage nhi kar saakta\n ab jaise ek folder hai r1 nam ka uska owner root hai aur uske andar d1 and fil1 nam ki directory aur file hai aur unka owner rohan hai tab bhi rohan unko delete kar nhi sakta kyunki wo r1 ke andar hai aur r1 ki ownership root ke pass hai\n infact parent folder ki permission sab par lagu hogi\nyadi root r1 ko delete karna chahe toh nhi kar saakta because of d1 and f1 ki ownership rohan ke pass hai\nempty dierectory aur file hata sakta hai root\nAB jaise r1 ke andar d1 hai aur d1 ke andar bhi koi file hai toh use sirf d1 hata sakta hai r1 bhi nhi kyunki wo data ka parent folder d1 hai \nchown - change owner \n[-R] se  directory ke andar ki bhi files ka owner change ho jayega\n-[f] chupke se hata dega\n-[v] bata ke pura\nwildacards chalte hai isme\n:groupname se group change \n[-R] group me toh wo group ke jo bhi member hai unki bhi ownership change\n  ![[Pasted image 20250108185358.png]]\n  change group command -\n  ![[Pasted image 20250108190010.png]]\n  same switches like change owner\n  "}, {"name": "UNTAR OR TAR COMMAND", "content": "first untar after bzip and gzip ek sath nhi ho ra  -command chaala ke dekhni hai\n1.text editor command-\n1. we use cat for text editor like read or write \n2. cat file.txt for read \n3. cat file.txt > file.txt for write \n4. isme ek dikkat hai shuru me hame kisi command ke output me changes karna  hai wo nhi hoga \n5. ex - cat /var/log/messages \n6. hum cat se control c se bhar aa sakte hai\n7. control d se shara data background pe place \n8. ek particular linee pe control d karoge toh connection close kar dega\n9. jha control d kara tha us line pe wapas hume command panel dega us file ko read kar ke dekh sakte hai\n10. control z process kill karta hai like control  c\n11. dono command ke output ko ek single file me redirect kiya aur phir cat karenge aur use bhar aane ke liye switches ka use karenge uske karan  process bhi kill ho jayegi isliye hum us par particular extension laga deta hai =\n12. cat /etc/shadow /etc/hostname > rohan.txt\n13. ab hume particular jagah pe cat ko khatam karna hai toh matlab kisi word ke ate hi process band to hum-\n14. end of file [eof] word define karenge \n15. ex -cat << kushwah>> file.txt\n16. toh jab kushwah aayega toh ye process band kar dega\n17. for the drawback of changes in first lines-\n#we use nano command as text editor-\n1. yum install nano\n2. isme hum changes kar sakte hai \n3. control o se save control x se bhar\n4. command aisi denge nano jis file me changes karne ho\n5. sirf nano command di toh wo buffer memory me run kareng\n6. isme bhi control x se bhar ayega\n7. text karke file name deke  particular file me save kar sakte hai\n8. control q kha pe jana hai wor dedo \n9. control r se ussi file ke andar dusra content bhi aa jayega\n10. control k se cut u se uncut\n11. control t se command chala sakte hai\n12. isko bhi hum use nhi karte jyada settings ke karan\n#end  "}, {"name": "USER MANAGEMENT AND FILES LEARNING", "content": "system account me wo root ko bhi ginta hai isliye service system has minor difference\ncat /etc/login.defs \nisme uid and gid ka proper configuration mil jayega\ngrep -v '^#' /etc/login.defs | grep -v \"^$\"\nthen file summary-\nuser ka mail pehli line me ek user dusre user ke liye mail pass kare toh wo location se kar sakta hai \nA umask value is ==a three-digit octal number that specifies which file permissions are not to be given to newly created files and directories==: \n\n- **First digit**: Permissions for the user\n- **Second digit**: Permissions for the group\n- **Third digit**: Permissions for others (users who are not the owner or in the group)\n\nThe umask value is used in conjunction with the access mode 666 for files or 777 for directories to determine the access mode for new files and directories. The umask value is XORed with the access mode, which results in the opposite of what is represented by the mask. \n\nHere are some examples of umask values and their effect: \n\n- **0000**: Permits created files to have read, write, and execute access\n- **022**: Results in permissions of 644\n- **027**: More restrictive than 022\n- **077**: Denies all permissions for the group and others\nthen home directory pe permission lagu ho ro wo wha se pata lag jayegi\nthen age of password wo 1970 se count hoga\nminimum age matlab abhi password change kiya toh aur kar sakte hai\nwarning dega 7 din pehle ki password expire hora\nthen aata hai \nencrypt method -password set karenge ya use karenge user ka wo safe or encrypted hai by sha512\nPassword encryption is ==a process that scrambles a password into an unreadable and unusable form to protect it from hackers==.\nthen kitte rounds me encrypt karga\n# imp - \ndo user and group ki same uid andd gid ho sakti hai wo login alg alg ho skate hai but wo ek hi group ya user count honge'\ntwo types of group -\nsystem group -jo pehle se bane hue aate hai\nuser group - jo hum banate hai\n"}, {"name": "USER MANAGEMENT IN LINUX", "content": "linux = [file based operating  system]\nwhat is user  account ?\n[user  account represents  user] employee] in company every daily user of the computer have their own user account\nuser account fact -\nevery user have unique[UID] user id\nuser info such as uid username , home directory,shell, stored in /etc/passwd file\nab mujhe koi user acc create karna ho toh /etc/passwd file me entry karni hogi toh wo create ho jayega\nthree types of user used in linux =\n#root user - used as administrator user , perform administrator task jab linux install karte hai tab banta hai , delete nhi kar sakte hai , disable kar sakte hai means- password disable kar sakte hai \nhar chij ki permission hoti hai \nroot user [UID] = 0 always\n#regular user - normal user jab linux install karte hai jab ek banta hai uske bad me bhut sare ban jate hai  iske pass kuch hi chijo ki permission hoti hai routine work ke liye use karte hai isko delete aur disabled bhi kar sakte hai\nuser id range\nmin -1000\nmax - 60000\nrange modify kar skte hai \n#service or system account - jab hum kuch install karte hai packages ko tab service account create hote hai us package ko run karne ke hi liye service acccount use hota hai domestic use ke liye use nhi kar sakte \nuser id range\nmin- 1\nmax -999\nuser ki security setting - /etc/shadow\n# home directory -\nRoot = /root\nnormal user = /home/user name\n# what is group -\ngroup is a collection of user that make easy for\nadministrator to perform administrator task , ek group pe policies lagao sab user pe lagane ki jarurat nhi\ngroup facts - jab user banta hai toh uske pass do group hote hai primary and secondry \nprimary group hoga hi \nonly one primary group has asssign to user\nprimary group ka apna [GID] hota hai \nhar group ka unique [GID ] Hota hai \ngroup info such as gid groupname and member of group stored in /etc/group\nsecurity setting group ki /etc/gshadow"}, {"name": "USERMAKING IN LINUX ANDD ITS SWITCHES", "content": "history ek shell ki dusri me dalna ho toh cat ~/.bash_history >> ~/.zsh_history\njab bhi user add karenge toh passwd /group/ shadow / gshadow charo saath me update hogi\ntail karke last ki five line dekh lo\n# user add and its switches -\nadduser username\nuseradd username\ndono se add kar sakte gai users \nthen user add karenge toh sari files ek sath update hogi\nadduser --help se sare switches dekh sakte hai\nhome location pe user banai uske bad entries dekh lo aai ki nhi\nhome location ko customize kar sakte hai -\nby - cat  /etc/default/useradd \nchanges karna ho toh jo line ko change karna hai uske aage # then new line me entry kar do save and exit\nthen ab jo bhi user banainge jo changes kiye hai uske sarh banega\nthen phir change ho jayega jab dusra user banainge toh\nhome location create karna hai user ki toh - [ --create-home then username] \n[-d] kha karna hai home directory create \n[-m] home directory create karna hai\n[-M] directory nhi banegi\n[-c] for comment \" likhna hai comment\"  in passwd file\n[-N] se user toh baneega par uska group nhi banega\n[-s] shell change then shell name from shell file and username\n[-u] se uid change kar sakte hai\nab same uid kisi user ko dena ho toh [-o] ka use karenge\n[-g] se gib nai nhi de skte hai but new user me purani gid de sakte hai\nthen [-p] for password set  ke liye new  user me\nab wo password set toh ho gaya but uska encrypted way chaiye toh ab uska \nkyuki wo passwd file me without encrypted password dega\nencyrpted version dekhenge\nopenssl passwd 123\ntoh 123 ka encrypted version de dega\nthen use place kardo adduser -p \"encrypted password\" username\nthen wo passwd file me # adha hi ayega\ntoh jha bhu doller dikhe uske aage \\ laga do\nthen ab usse user jo banaya  hai wo login hi kar sakta hai\n# password genertor $6 $ SHA512\nopenssl passwd -6 then password\ntoh sha512 me encrypted password dega\nab wo wese hi daldo \nadduser -p \"encryted pass\" username\njaha $ ho uske aage \\ \nthen isse bhi login kar paoge\n# tool for password genrator- \nyum install expect \nthen yum install mkpasswd\n[mkpasswd -m sha-512]\nthen password\ntoh uska incryption aa jayega\nthen \n[mkpasswd -m md5] \npasswd \ntoh uska md5 version aayega\njo bhi user banao aur password set kare toh use login karke dekh lo'\nthen sari command ek user pe ek sath chala ke dekhlo\n[-G] se secondry group add hota hai \nuseradd -m -d /home/armour1 -s /bin/bash -G secondry group name then username toh \n/etc/group  me jake  us user ka secondry group bhi dekh sakte hai\n#system user bana ho toj =useradd -r sys_u1\n[-e] se us user ki expiry set kar sakte hai\n"}, {"name": "WHAT IS SHELL AND HOW IT CHANGES", "content": "a shell is a command line interpreter allow user to interacts with os by typing and executing command \nshell also works as intermediate between user and kernel\n1. sh bourne shell                                                                                                   - focused on executing commands and writing basic scripts                             -supports variable , loops ,conditionals , and redirections \n2. bash bourne shell                                                                                               - same features like [sh]                                                                                    -supports scripting, command history , tab completion                                   \n3. korn shell [ksh]                                                                                                    -also called c shell combining feature of sh use in programing enviroment\n4. tcsh [tenex c shell]                                                                                              - a enhance version of c shell  , adding editing of command line\n5. fish shell                                                                                                              -colouring ke liye use hota hai  , user friendly hota hai aur easy to use hota hai\n6. zsh shell                                                                                                              - powerfull and most used shell  advanced fetaures like  shared history , spell checking and themes.                                                                               \n7. dash shell                                                                                                             -lightweight and fast shell                                                                                  - used as the default /bin/sh in some systems for scripting  due to its efficency\n# shell installation and shell changing \naddons  - alg se add karna chijo ko \nsame as plugins \ncat /etc/shells se jo shell install  hai wo wo dekh sakte hai \necho $SHELL se shell  pata laga sakte hai the shell de do toh wo shell pe phuch jayengee\nbase version of bash ko update karna hai toh -\nyum install bash*\nthen yum search bash se jo addons install hue hai use dekh sakte hai \nthen yum install bash - completion .noarch ko  instal karo toh taab completion ka option chalu ho jayeega\nthen colour prompt ko install karke dekho\nthen command chalao \nbut wo har bar karna padega toh usko centralized karna hai \nthen puri file bhi clour me nhi aa ri toh hum grc ka use karenge \nlink se jao [https://github.com/garabik/grc/releases/tag/v1.13]\nrelease pe jake particular file download kar lo\nsource code tar wali\nthen downloads me jake wget command ke sath  link bhi de do\nwget nhi hai toh yum install wget \ntar file ko untar karo then tar file delete\nthen mv -v untar file name  /opt/\nthen opt ke andar folder mil jayega \ninstall.sh\nthen install.sh file ko run karna hai toh\n./install.sh\ncorresponding files ko apni locations pe pahucha denge\nthen run commands aage grc laga ke toh colour ayega\nthen whi link pe jake jo command support karegi grc toh wo grc.sh me aa jayegi\nhttps://github.com/garabik/grc/releases/tag/v1.13.tar.gz\nthen ye har bar na karna padde iise acha \nvim /root/.bashrc\nuser login karta hai toh ye script run hoti hai\n alias me command se ma bhen kar sakte hai\n then ab sari command se ke allias set karna ho toh\n opt me jao \n cat  grc.sh\n then copy kar lo ise /etc/ ke andar\n ls -lh se checck kar lo file aai ki nhi \n then profile.d ke andr grc.sh file hai use check kar lo\n then ~/.bashrc\n export ke ek line chodkarr\n GRC_ALIASES=true\n [ -s \"/etc/profile.d/grc.sh\" ] brackets ke andar && source /etc/grc.sh \n then save and exit ab login logout ke bad bhi colour aayeega\n # yum install zsh* =\n then yum search zsh \n then shell ke andar entry aajayegi\n  echo $SHELL\n  zsh\n  ab wo configure nhi hogi toh use hume configure karna padega\n  nano /root/.zshrc\n  ab khali hogi use bharni padegi\n  then kali ki zsh waha place kar denge\n  fi ke bad GRC_ALIASES=true\n [ -s \"/etc/profile.d/grc.sh\" ] brackets ke andar && source /etc/grc.sh \n  kali ke home location pe show hidden files .zshrc\n  copy karo paste karo .zshrc me then save and exit\n  then connection close karke waps banao then zsh shell\n  then command doge toh kali ki tarah chalega\n  then ab shell login ke doran hi chaiye toh \n  which zsh\n  then chsh -s $(which zsh ) \n  then passwd me root ka shelll change dikhega\n  # simplw way of this -\n  SHELL\n\nBASH (GRC) \n \t \n \twget https://github.com/garabik/grc/archive/refs/tags/v1.13.tar.gz\n\n \ttar -xvf grc-1.13\n\n \tcp -vr grc-1.13 /opt/  (from ~ location)\ns\n\n \t./install.sh (in /opt/grc-1.13/)\n\n \tcp -v /opt/grc-1.13/grc.sh /etc/\n\n \tvim ~/.bashrc \n\n \tGRC_ALIASES=true\n\t [[ -s \"/etc/profile.d/grc.sh\" ]] && source /etc/grc.sh \ndo brackets hai aage\n\n\tsource .bashrc \n\n\t(bash shell will be colorful)\n\n\t------------------------------------------\nZSH SHELL\n\n\tyum install zsh*\n\n\tkali ki zsh copy karna heee\n\n\tvim .zshrc (copy the content of kali zsh) \n\n\tGRC_ALIASES=true\n\t[[ -s \"/etc/profile.d/grc.sh\" ]] && source /etc/grc.sh \n\n\tsource .zshrc \n\n\tchsh -s $(which zsh) or vim /etc/passwd /usr/bin/bash-zsh\n\n\tping 8.8.8.8 / ifconfig"}, {"name": "WHAT IS SHELL AND ITS TYPE", "content": "## What is a Linux Shell and Why is it Important?\n\nA **shell** is a command-line interpreter program that parses and sends commands to the [operating system](https://phoenixnap.com/glossary/operating-system). This program represents an operating system's interactive interface and the kernel's outermost layer (or shell). It allows users and programs to send signals and expose an operating system's low-level utilities.\n\n![OS layers communication](https://phoenixnap.com/kb/wp-content/uploads/2022/10/os-layers-communication.png)\n\nThe terminal program (or terminal emulator) enables interaction with the system's utilities. When we run any command in the terminal, such as [ls](https://phoenixnap.com/kb/linux-ls-commands) or [cat](https://phoenixnap.com/kb/linux-cat-command), the shell parses, evaluates, searches for, and executes the corresponding program, if found.\n\n## Types of Linux Shells\n\nLinux offers different shell types for addressing various problems through unique features. The shells developed alongside Unix often borrowed features from one another as development progressed.\n\nBelow is a brief **overview of different shell types and their features**.\n\n### 1. Bourne Shell (sh)\n\nThe **Bourne shell** was the first default shell on Unix systems, released in 1979. The shell program name is **sh**, and the traditional location is _/bin/sh_. The prompt switches to **$**, while the root prompt is **#**.\n\n![Bourne shell sh example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/bourne-shell-sh-example-commands.png)\n\nThe Bourne shell quickly became popular because it is **compact** and **fast**. However, **sh** lacks some standard features, such as:\n\n- Logical and arithmetic expansion.\n- Command history.\n- Other comprehensive features, such as autocomplete.\n\nModern Unix-like systems have the _/bin/sh_ executable file. The program does not start the Bourne shell but acts as an executable file pointing to the **default system shell**.\n\n![/bin/sh link Ubuntu dash CentOS bash](https://phoenixnap.com/kb/wp-content/uploads/2022/10/bin-sh-link-ubuntu-dash-centos-bash.png)\n\nFor most systems, the hard or [symbolic link](https://phoenixnap.com/kb/symbolic-link-linux) points to _bash_, while on Ubuntu and Debian, the link is to _dash_. In both cases, the link mimics the Bourne shell as much as possible.\n\n### 2. C Shell (csh)\n\nThe **C shell** (**csh**) is a Linux shell from the late 1970s whose main objective was to improve interactive use and mimic the C language. Since the Linux kernel is predominantly written in C, the shell aims to provide stylistic consistency across the system.\n\nThe path to the C shell executable is _/bin/csh_. The prompt uses **`%`** for regular users and **`#`** for the root user.\n\n![C shell csh example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/c-shell-csh-example-commands.png)\n\nNew interactive features included:\n\n- History of the previous command.\n- User-defined aliases for programs.\n- Relative home directory (_~_).\n- Built-in expression grammar.\n\nThe main drawbacks of the C shell are:\n\n- Syntax inconsistencies.\n- No support for standard input/output (stdio) file handles or functions.\n- Not fully recursive, which limits complex command handling.\n\nThe C shell improved readability and performance compared to the Bourne shell. The interactive features and innovations in csh influenced all subsequent Unix shells.\n\n### 3. TENEX C Shell (tcsh)\n\nThe **TENEX C shell** (**tcsh**) is an extension of the C shell (**csh**) merged in the early 1980s. The shell is backward compatible with csh, with additional features and concepts borrowed from the TENEX OS.\n\nThe TENEX C shell executable path is in _/bin/tcsh_. The user prompt is **`hostname:directory>`** while the root prompt is **`hostname:directory#`**. Early versions of Mac OS and the default root shell of FreeBSD use tcsh.\n\n![TENEX C shell tcsh example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/tenex-c-shell-tcsh-example-commands.png)\n\nAdditional features of the shell include:\n\n- Advanced command history.\n- Programmable autocomplete.\n- Wildcard matching.\n- Job control.\n- Built-in where command.\n\nSince tcsh is an extension of the C shell, many drawbacks persist in the extended version.\n\n### 4. KornShell (ksh)\n\nThe **KornShell** (**ksh**) is a Unix shell and language based on the Bourne shell (sh) developed in the early 1980s. The location is in _/bin/ksh_ or _/bin/ksh93_, while the prompt is the same as the Bourne shell (**`$`** for a user and **`#`** for root).\n\n![Korn shell ksh example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/korn-shell-ksh-example-commands.png)\n\nThe shell implements features from the C shell and Bourne shell, aiming to focus on both interactive commands and programming features. The KornShell adds new features of its own, such as:\n\n- Built-in mathematical functions and floating-point arithmetic.\n- Object-oriented programming.\n- Extensibility of built-in commands.\n- Compatible with the Bourne shell.\n\nThe shell is faster than both the C shell and the Bourne shell.\n\n### 5. Debian Almquist Shell (dash)\n\nThe **Debian Almquist Shell** (**dash**) is a Unix shell developed in the late 1990s from the Almquist shell (ash), which was ported to Debian and renamed.\n\nDash is famous for being the default shell for Ubuntu and Debian. The shell is minimal and [POSIX](https://phoenixnap.com/glossary/posix) compliant, making it convenient for OS startup scripts.\n\nThe executable path is _/bin/dash_, in addition to _/bin/sh_ pointing to _/bin/dash_ on Ubuntu and Debian. The default and root user prompt is the same as in the Bourne shell.\n\n![Debian Almquist shell dash example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/debian-almquist-shell-dash-example-commands.png)\n\nDash features include:\n\n- Execution speeds up to 4x faster than bash and other shells.\n- Requires minimal disk space, CPU, and RAM compared to alternatives.\n\nThe main drawback is that dash is not bash-compatible. The features not included in dash are known as \"bashisms.\" Therefore, [bash scripts](https://phoenixnap.com/kb/write-bash-script) require additional reworkings of bashisms to run succesfully.\n\n### 6. Bourne Again Shell (bash)\n\nThe [Bourne Again Shell](https://phoenixnap.com/kb/what-is-bash) is a Unix shell and command language created as an extension of the Bourne shell (**sh**) in 1989. The shell program is the default login shell for many Linux distributions and earlier versions of macOS.\n\nThe shell name shortens to **bash**, and the location is _/bin/bash_. Like the Bourne shell, the bash prompt is **`$`** for a regular user and **`#`** for root.\n\n![Bourne again shell bash example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/bourne-again-shell-bash-example-commands.png)\n\nBash introduces features not found in the Bourne shell, some of which include:\n\n- Brace expansion.\n- Command completion.\n- Basic debugging and signal handling.\n- Command history.\n- Conditional commands, such as the [bash if](https://phoenixnap.com/kb/bash-if-statement) and [bash case](https://phoenixnap.com/kb/bash-case-statement) statements.\n- [Heredoc](https://phoenixnap.com/kb/bash-heredoc) support.\n\n**Note:** Some features are not unique to Bash, but rather borrowed from other shells.\n\nSince bash is a superset of the Bourne shell, most sh scripts execute in bash without any additional changes.\n\n### 7. Z Shell (zsh)\n\nThe **Z shell** (**zsh**) is a Unix shell created as an extension for the Bourne shell in the early 1990s. The feature-rich shell borrows ideas from ksh and tcsh to create a well-built and usable alternative.\n\nThe executable location is in _/bin/zsh_. The prompt is **`user@hostname location %`** for regular users and **`hostname#`** for the root user. The Z shell is the default shell of Kali Linux and Mac OS.\n\n![Z shell zsh example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/z-shell-zsh-example-commands.png)\n\nSome new features added to the zsh include:\n\n- Shared history among all running shell sessions.\n- Improved array and variable handling.\n- Spelling corrections and command name autofill.\n- Various compatibility modes.\n- Extensibility through plugins.\n\nThe shell is highly configurable and customizable due to the community-driven support through the [Oh My Zsh](https://ohmyz.sh/) framework.\n\n**Note:** Learn how to [install Zsh in Ubuntu](https://phoenixnap.com/kb/install-zsh-ubuntu), how to [set environmental variables in ZSH](https://phoenixnap.com/kb/zsh-environment-variables) or how to [switch from Zsh to Bash on Mac](https://phoenixnap.com/kb/change-zsh-to-bash-mac).\n\n### 8. Friendly Interactive Shell (fish)\n\nThe **Friendly Interactive Shell** (**fish**) is a Unix shell released in the mid-2000s with a focus on usability. The feature-rich shell does not require additional configuration, which makes it user-friendly from the start.\n\nThe default executable path is _/usr/bin/fish_. The user prompt is **`user@hostname location>`**, while the root prompt is **`root@hostname location#`**.\n\n![Friendly interactive shell fish example commands](https://phoenixnap.com/kb/wp-content/uploads/2022/10/friendly-interactive-shell-fish-example-commands.png)\n\nFeatures in the shell include:\n\n- Advanced suggestions/tab completion based on the current directory history.\n- [Helpful syntax highlighting](https://phoenixnap.com/glossary/syntax-highlighting) and descriptive error messages.\n- Web-based configuration.\n- Command history with search options.\n\nThe main drawback of fish is non-POSIX compliance. However, the developers aim to improve flawed designs from POSIX."}, {"name": "WILDCARDS IN GREP COMMANDS", "content": "### **Asterisk (`*`)**\n\n- The asterisk matches **zero or more** occurrences of the preceding character or group.\n- Example: `grep 'ab*' file.txt`\n    - This matches lines that contain \"a\" followed by zero or more \"b\"s (e.g., \"a\", \"ab\", \"abb\", \"abbb\", etc.).\n\n### 2. **Period (`.`)**\n\n- The period matches **any single character** except a newline.\n- Example: `grep 'a.b' file.txt`\n    - This matches lines that contain \"a\" followed by any single character and then \"b\" (e.g., \"aab\", \"acb\", etc.).\n\n### 3. **Caret (`^`)**\n\n- The caret matches the **beginning** of a line.\n- Example: `grep '^start' file.txt`\n    - This matches lines that begin with the word \"start\".\n\n### 4. **Dollar Sign (`$`)**\n\n- The dollar sign matches the **end** of a line.\n- Example: `grep 'end$' file.txt`\n    - This matches lines that end with the word \"end\".\n\n### 5. **Square Brackets (`[]`)**\n\n- Square brackets are used to match **any single character** from the set or range inside the brackets.\n- Example: `grep '[aeiou]' file.txt`\n    - This matches lines that contain any vowel (a, e, i, o, or u).\n- You can also specify a range: `grep '[a-z]' file.txt`\n    - This matches lines containing any lowercase letter.\n\n### 6. **Caret inside square brackets (`[^]`)**\n\n- A caret inside square brackets negates the character set, matching **any character that is not** in the set.\n- Example: `grep '[^0-9]' file.txt`\n    - This matches lines that contain any character that is not a digit.\n\n### 7. **Pipe (`|`)**\n\n- The pipe symbol is used to represent **alternation** (OR), matching either one pattern or another.\n- Example: `grep 'cat|dog' file.txt`\n    - This matches lines that contain either \"cat\" or \"dog\".\n\n### 8. **Parentheses (`()`) and Backslashes (`\\`) for Grouping**\n\n- Parentheses are used to group patterns together, but since parentheses are special characters in regular expressions, they must be escaped with a backslash (`\\`).\n- Example: `grep '\\(cat\\|dog\\)' file.txt`\n    - This matches lines containing either \"cat\" or \"dog\".\n\n### 9. **Question Mark (`?`)**\n\n- The question mark matches **zero or one** occurrence of the preceding character or group.\n- Example: `grep 'colou?r' file.txt`\n    - This matches both \"color\" and \"colour\" (where the \"u\" is optional).\n\n### 10. **Plus (`+`)**\n\n- The plus symbol matches **one or more** occurrences of the preceding character or group.\n- Example: `grep 'a+b+' file.txt`\n    - This matches lines with one or more \"a\"s followed by one or more \"b\"s (e.g., \"ab\", \"aab\", \"aaab\", etc.).\n\n### Usage Example with Wildcards:\n\nbash\n\n`grep 'ab*' file.txt     # Matches \"a\" followed by zero or more \"b\"s grep 'a.b' file.txt     # Matches \"a\", any single character, then \"b\" grep 'cat|dog' file.txt # Matches \"cat\" or \"dog\" grep '^[A-Za-z]' file.txt # Matches lines starting with a letter grep '.*end$' file.txt   # Matches lines ending with \"end\"`\n\n### Notes:\n\n- If you're using extended regular expressions (with the `-E` flag), some characters like `+`, `?`, `|`, `()` will not need to be escaped (e.g., `grep -E 'a+b+'`).\n- If you're using basic regular expressions (default mode without `-E`), you must escape certain characters like `+`, `?`, `|`, `()`.\n\nThese wildcards provide flexibility and allow you to search for complex patterns in text files with ease.\n\n  \n"}, {"name": "ip change by command", "content": "nmcli connection modify enp0s3 ipv4.addresses 192.168.1.26/24\nnmcli connection modify enp0s3 ipv4.gateway 192.168.1.1\nnmcli connection modify enp0s3 ipv4.dns 8.8.8.8\nnmcli connection modify enp0s3 ipv4.method manual\n\n\nnmcli connection modify enp0s3 ipv6.method \"disabled\"\n\nnmcli connection up enp0s3 \nalso nmtui\n"}];

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Fenced code block toggle
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true;
        codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }

    if (inCode) {
      codeBuffer += (codeBuffer ? '\n' : '') + line;
      continue;
    }

    var e = escHtml(line);

    // Headings
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }

    // HR
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }

    // Blockquote
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFormat(e.slice(5)) + '</blockquote>'; continue; }

    // List item
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var itemText = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\. /,'');
      out += '<li>' + inlineFormat(itemText) + '</li>';
      continue;
    }

    // Empty line
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }

    // Normal paragraph line
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFormat(e) + '</p>';
  }

  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFormat(t) {
  // Inline code
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  // Bold+italic
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'LINUX MAIN/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// RUN ON PAGE LOAD
window.onload = function() {
  buildSidebar();
  if (NOTES.length > 0) openNote(0);
};
</script>
