<script>
var NOTES = [{"name": "ARCH LINUX", "content": "arch Linux is a lightweight and flexible Linux distribution that aims to provide the latest software and a minimal base system. It's popular among users who want to build a custom operating system from the ground up and prefer a \"keep it simple\" philosophy. Here are some key aspects of Arch Linux:   \n\n### 1. **Rolling Release**\n\nArch uses a rolling release model, meaning it doesn't have fixed versions like many other distributions (e.g., Ubuntu or Fedora). Instead, it continually updates software to the latest stable releases, so users always have access to the newest features and improvements.\n\n### 2. **Minimalism**\n\nArch comes with a minimal installation, giving users control over which components to install and configure. It doesn’t come with unnecessary software or a default desktop environment, allowing users to create a system tailored to their needs.\n\n### 3. **Pacman Package Manager**\n\nArch uses the `pacman` package manager to install, remove, and update software. It also has the Arch User Repository (AUR), which is a community-driven repository that offers even more software not available in the official Arch repositories.\n\n### 4. **Arch Wiki**\n\nThe Arch Wiki is a comprehensive resource that serves as a guide to install and maintain Arch Linux. It's widely considered one of the best documentation sources in the Linux world and helps users troubleshoot or configure any aspect of the system.\n\n### 5. **KISS (Keep It Simple, Stupid) Philosophy**\n\nThe guiding principle of Arch is simplicity. Arch is designed to be as straightforward as possible, with no additional tools or scripts that might complicate things. This simplicity means that users have full control but may need to spend more time configuring their system.\n\n### 6. **Arch User Community**\n\nThe Arch community is highly active and is known for being helpful, although Arch's advanced nature means that it can be challenging for beginners. However, the community’s commitment to documentation and detailed guides makes it easier for users to solve issues.\n\n### 7. **System Customization**\n\nArch allows deep customization, enabling users to pick exactly the packages, libraries, and configurations they want for their system. This level of control makes it a popular choice for users who enjoy tinkering or building their own systems from scratch.\n\n### 8. **Installation Process**\n\nArch does not have a graphical installer. Instead, users must follow a manual, step-by-step installation guide that involves using the terminal. While this can be daunting, it offers a learning experience and a deeper understanding of how the system works.\n\n### 9. **Target Audience**\n\nArch is aimed at more experienced Linux users or those who want to learn in-depth about Linux. It's not considered beginner-friendly, but it's a great way to learn about the inner workings of Linux.\n\nOverall, Arch is a great choice if you want a lightweight, customizable, and up-to-date Linux experience. However, it requires a bit more time and effort compared to other distributions, especially when it comes to installation and maintenance.\n\n\n\n\n# package manager in arch linux-\nIn Arch Linux, the package manager is called **Pacman**. Pacman is a powerful tool that handles the installation, removal, and updating of software packages. It is designed to be simple, efficient, and flexible, and it plays a central role in managing software on an Arch system.\n\n### Key Features of Pacman:\n\n1. **Easy Installation & Removal of Packages**  \n    Pacman simplifies package management by handling both the installation and removal of software packages. It automatically resolves dependencies, so you don’t need to worry about missing libraries or packages.\n    \n    - **Install a package**:\n        \n        go\n        \n        Copy\n        \n        `sudo pacman -S package-name`\n        \n    - **Remove a package**:\n        \n        go\n        \n        Copy\n        \n        `sudo pacman -R package-name`\n        \n2. **Updating System**  \n    Pacman is used to keep your system up-to-date. Since Arch Linux is a rolling release distribution, you can update the entire system to the latest packages with a single command:\n    \n    - **Update all packages**:\n        \n        nginx\n        \n        Copy\n        \n        `sudo pacman -Syu`\n        \n        This command updates the package database and all installed packages on your system.\n3. **Searching for Packages**  \n    If you're unsure about the name of a package or want to check if it's available in the repository, you can search for it with Pacman.\n    \n    - **Search for a package**:\n        \n        sql\n        \n        Copy\n        \n        `pacman -Ss search-term`\n        \n        This will search the official repositories for packages related to the term you provide.\n4. **Package Information**  \n    Pacman can show detailed information about a package, such as its description, size, version, and dependencies.\n    \n    - **Show information about a package**:\n        \n        go\n        \n        Copy\n        \n        `pacman -Qi package-name`\n        \n5. **Cleaning the Package Cache**  \n    Pacman keeps a cache of downloaded packages in case you need to downgrade or reinstall them later. Over time, this cache can take up significant disk space. You can clean it up to free space.\n    \n    - **Remove unneeded cached packages**:\n        \n        nginx\n        \n        Copy\n        \n        `sudo pacman -Sc`\n        \n    - **Completely clean the package cache** (removes all cached versions of packages):\n        \n        nginx\n        \n        Copy\n        \n        `sudo pacman -Scc`\n        \n6. **Installing Packages from the Arch User Repository (AUR)**  \n    While Pacman manages official Arch repositories, you can also install packages from the Arch User Repository (AUR), which contains community-driven packages. However, Pacman doesn't directly manage the AUR. For AUR packages, you typically use an AUR helper like **yay**, **paru**, or **trizen**.\n    \n    - **Install an AUR package with yay**:\n        \n        go\n        \n        Copy\n        \n        `yay -S package-name`\n        \n7. **Syncing the Package Database**  \n    If you need to refresh your package database (e.g., if your system was out of sync with the repository), you can manually update the database using:\n    \n    - **Sync the database**:\n        \n        nginx\n        \n        Copy\n        \n        `sudo pacman -Sy`\n        \n8. **Handling Dependencies**  \n    Pacman automatically resolves dependencies when installing, removing, or updating packages, so you don’t need to worry about manually managing library or package requirements.\n    \n\n### Example Commands:\n\n- **Update a single package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pacman -S package-name`\n    \n- **Remove a package and its dependencies**:\n    \n    go\n    \n    Copy\n    \n    `sudo pacman -Rns package-name`\n    \n- **List all installed packages**:\n    \n    css\n    \n    Copy\n    \n    `pacman -Q`\n    \n- **List all files installed by a package**:\n    \n    go\n    \n    Copy\n    \n    `pacman -Ql package-name`\n    \n\n### Pacman Config File\n\nPacman uses a configuration file located at `/etc/pacman.conf`. You can modify this file to change repository settings, enable or disable certain options, or tweak the way Pacman behaves.\n\n### Summary\n\nPacman is the backbone of package management in Arch Linux. It's known for being fast, reliable, and powerful. Understanding Pacman is crucial for effectively managing software and keeping your Arch system up-to-date."}, {"name": "BSD LINUX", "content": "BSD** (Berkeley Software Distribution) and **Linux** are two different types of Unix-like operating systems, but they're often confused due to their similarities. However, BSD is not a type of Linux. Here's a breakdown to clarify the difference:\n\n### **What is BSD?**\n\nBSD refers to the family of operating systems that originated from the **Berkeley Software Distribution** project at the University of California, Berkeley. BSD was developed in the late 1970s and early 1980s, and it is based on the original Unix operating system.\n\nKey BSD-based operating systems include:\n\n1. **FreeBSD**  \n    Known for its performance, stability, and advanced networking features, FreeBSD is one of the most popular BSD operating systems. It is used in servers, desktops, and embedded systems.\n    \n2. **OpenBSD**  \n    OpenBSD focuses heavily on security and correctness. It's known for its security features and rigorous auditing of code.\n    \n3. **NetBSD**  \n    NetBSD is known for being highly portable. It's capable of running on a wide variety of hardware platforms, making it useful for embedded systems and unusual hardware.\n    \n4. **DragonFly BSD**  \n    DragonFly is a fork of FreeBSD, aiming to improve scalability and performance, especially on multi-core processors.\n    \n\n### **Key Characteristics of BSD:**\n\n- **Licensing**: BSD operating systems use the **BSD license**, which is a permissive open-source license. It allows anyone to modify and distribute the software, even for commercial purposes, without many restrictions. This is different from the **GPL** (General Public License) used by Linux.\n    \n- **Kernel**: BSD operating systems use their own **BSD kernel** (called the **FreeBSD kernel**, for example), which is different from the **Linux kernel**. While they are both Unix-like, their kernels are developed separately.\n    \n- **Userland**: The \"userland\" (user applications and libraries) of BSD is also different from Linux. BSD systems have their own set of tools and utilities, which are based on older versions of Unix tools but have their own implementations and specific features.\n    \n- **System Integration**: In a typical BSD system, both the kernel and userland are tightly integrated and maintained by the same project, whereas in the Linux ecosystem, the kernel is separate from the userland (which is typically provided by distributions like Ubuntu, Fedora, Arch, etc.).\n    \n\n### **What is Linux?**\n\nLinux, on the other hand, is an **open-source operating system kernel** created by Linus Torvalds in 1991. It is not a full operating system by itself but provides the core functionality (the kernel) that allows software to interact with the hardware. Different Linux distributions (like Ubuntu, Fedora, Arch, and Debian) combine the Linux kernel with various userland tools, libraries, and applications.\n\n### **Comparison: BSD vs Linux**\n\n- **License**: BSD is more permissive, allowing proprietary modifications and redistribution, while Linux uses the GPL, which requires derivatives to remain open-source.\n    \n- **Kernel**: BSD has its own kernel, while Linux uses the Linux kernel.\n    \n- **System Approach**: BSD systems tend to provide a more unified system, where the kernel and userland are developed and maintained together, while Linux systems often use a variety of software from different sources.\n    \n- **Performance & Stability**: Both BSD and Linux are known for being stable and reliable. However, BSD systems are often preferred for tasks requiring strong networking performance and security (e.g., FreeBSD is popular for servers).\n    \n- **Software Compatibility**: Linux generally has better hardware support and a larger selection of applications due to its larger user base. BSD, on the other hand, can have more limited support for some hardware and software, though it offers excellent compatibility with Unix-based applications.\n    \n\n### **BSD/Linux Hybrid Systems**\n\nSome people might refer to \"BSD Linux\" or **BSD-based Linux distributions**, but this is not technically accurate. In some cases, Linux distributions might use BSD-like utilities or components (such as the **BSD userland tools** in some Linux distributions), but the kernel remains the Linux kernel.\n\n### **Why Choose BSD?**\n\nPeople might choose BSD over Linux for specific reasons such as:\n\n- **Security** (OpenBSD is particularly famous for its security features).\n- **Performance and scalability** (FreeBSD is widely used in server environments).\n- **Unified System**: With BSD, the kernel and userland are tightly integrated and maintained together, providing a more consistent environment.\n\n### Conclusion\n\n**BSD** is a distinct family of operating systems with its own kernel, userland, and licensing. It is not a type of Linux. While both share similar Unix roots, BSD systems and Linux distributions are separate and have differences in licensing, kernel architecture, and system design.\n\n\n# PACKAGEE MANAGER IN BSD -\nEach BSD operating system (such as **FreeBSD**, **OpenBSD**, **NetBSD**, etc.) uses its own package management system for installing, upgrading, and managing software. Here's a look at the package managers used in the most popular BSD systems:\n\n### 1. **FreeBSD**: **pkg**\n\n- **pkg** is the package manager for FreeBSD, and it is designed to be simple and efficient.\n- It allows you to easily install, upgrade, and manage packages from the FreeBSD ports tree or binary repositories.\n\n**Common pkg commands:**\n\n- **Install a package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pkg install package-name`\n    \n- **Remove a package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pkg delete package-name`\n    \n- **Update the package database**:\n    \n    sql\n    \n    Copy\n    \n    `sudo pkg update`\n    \n- **Upgrade all packages**:\n    \n    nginx\n    \n    Copy\n    \n    `sudo pkg upgrade`\n    \n- **Search for a package**:\n    \n    sql\n    \n    Copy\n    \n    `pkg search search-term`\n    \n- **List installed packages**:\n    \n    nginx\n    \n    Copy\n    \n    `pkg info`\n    \n\n**Additional info**:  \nThe **pkg** system on FreeBSD was introduced to replace the older `portupgrade` and `pkg_add` tools. It provides a faster way to manage software and is commonly used in modern FreeBSD installations.\n\n### 2. **OpenBSD**: **pkg_add, pkg_info, pkg_delete**\n\nOpenBSD uses a more traditional approach with several separate commands for package management.\n\n**Common package management commands:**\n\n- **Install a package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pkg_add package-name`\n    \n- **Remove a package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pkg_delete package-name`\n    \n- **List installed packages**:\n    \n    nginx\n    \n    Copy\n    \n    `pkg_info`\n    \n- **Search for available packages**:\n    \n    sql\n    \n    Copy\n    \n    `pkg_add -v search-term`\n    \n\n**Additional info**:  \nOpenBSD also has a ports collection, but its use of **pkg_add** and **pkg_delete** makes package management straightforward.\n\n### 3. **NetBSD**: **pkgin**\n\nNetBSD uses **pkgin**, which is a front-end to the **pkgsrc** system, a cross-platform package management system that works on various operating systems, including NetBSD. **pkgin** simplifies managing packages on NetBSD.\n\n**Common pkgin commands:**\n\n- **Install a package**:\n    \n    go\n    \n    Copy\n    \n    `sudo pkgin install package-name`\n    \n- **Remove a package**:\n    \n    lua\n    \n    Copy\n    \n    `sudo pkgin remove package-name`\n    \n- **Update package list**:\n    \n    sql\n    \n    Copy\n    \n    `sudo pkgin update`\n    \n- **Upgrade all packages**:\n    \n    nginx\n    \n    Copy\n    \n    `sudo pkgin upgrade`\n    \n- **Search for a package**:\n    \n    sql\n    \n    Copy\n    \n    `pkgin search search-term`\n    \n\n**Additional info**:  \n**pkgin** is an easy-to-use tool that simplifies using the **pkgsrc** repository for installing and maintaining packages.\n\n### Summary of BSD Package Managers:\n\n- **FreeBSD** uses **pkg**, which is a fast and modern package manager for installing, upgrading, and removing software.\n- **OpenBSD** uses **pkg_add**, **pkg_info**, and **pkg_delete**, which are more traditional tools for package management.\n- **NetBSD** uses **pkgin**, which is a front-end for the **pkgsrc** system that works on various platforms.\n\nEach of these package managers has its strengths, but all aim to provide a simple, efficient way of managing software on BSD systems."}];

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Fenced code block toggle
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true;
        codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }

    if (inCode) {
      codeBuffer += (codeBuffer ? '\n' : '') + line;
      continue;
    }

    var e = escHtml(line);

    // Headings
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }

    // HR
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }

    // Blockquote
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFormat(e.slice(5)) + '</blockquote>'; continue; }

    // List item
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var itemText = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\. /,'');
      out += '<li>' + inlineFormat(itemText) + '</li>';
      continue;
    }

    // Empty line
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }

    // Normal paragraph line
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFormat(e) + '</p>';
  }

  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFormat(t) {
  // Inline code
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  // Bold+italic
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'OTHER LINUX/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// RUN ON PAGE LOAD
window.onload = function() {
  buildSidebar();
  if (NOTES.length > 0) openNote(0);
};
</script>
