const NOTES = [{"name": "1.10 Disable Default GPU and use NVDIA", "content": "# NVIDIA-Driver-on-Optimus-Laptop(Kali-Linux)\n## Installing Official NVIDIA Driver on Optimus Laptop (Kali Linux)\n***\n### 1. Check System Info\n```bash\nuname -a\n```\n\n```bash\nlspci | grep -E \"VGA|3D\"\n```\n\n*   Confirm that you have **hybrid graphics** (Intel + NVIDIA).\n\n### 2. Disable Nouveau (Open Source NVIDIA Driver)\n```bash\necho -e \"blacklist nouveau\\noptions nouveau modeset=0\\nalias nouveau off\" > /etc/modprobe.d/blacklist-nouveau.conf\n```\n\n```bash\ncat /etc/modprobe.d/blacklist-nouveau.conf\n```\n\n```bash\nupdate-initramfs -u && reboot\n```\n\nAfter reboot, verify that Nouveau is disabled:\n\n```bash\nlsmod | grep -i nouveau\n```\n*   If the command returns nothing, Nouveau is disabled.\n\n### 3. Install NVIDIA Driver\n```bash\napt install nvidia-driver nvidia-xconfig\n```\n\n### 4. Find NVIDIA BusID\n```bash\nnvidia-xconfig --query-gpu-info | grep 'BusID : ' | cut -d ' ' -f6\n```\nExample output:\n```\nPCI:1:0:0\n```\n\n### 5. Configure Xorg\n***\nEdit `/etc/X11/xorg.conf`:\n```bash\nvim /etc/X11/xorg.conf\n```\nPaste the following:\n```\nSection \"ServerLayout\"\n    Identifier \"layout\"\n    Screen 0 \"nvidia\"\n    Inactive \"intel\"\nEndSection\n\nSection \"Device\"\n    Identifier \"nvidia\"\n    Driver \"nvidia\"\n    BusID \"PCI:1:0:0\"\nEndSection\n\nSection \"Screen\"\n    Identifier \"nvidia\"\n    Device \"nvidia\"\n    Option \"AllowEmptyInitialConfiguration\"\nEndSection\n\nSection \"Device\"\n    Identifier \"intel\"\n    Driver \"modesetting\"\nEndSection\n\nSection \"Screen\"\n    Identifier \"intel\"\n    Device \"intel\"\nEndSection\n```\n> ⚡️ Make sure to replace `BusID` with your actual value if different.\n\n### 6. Configure Display Manager Startup (GDM)\n***\nCreate a new autostart entry:\n```bash\nvim /usr/share/gdm/greeter/autostart/optimus.desktop\n```\nPaste the following:\n```ini\n[Desktop Entry]\nType=Application\nName=Optimus\nExec=sh -c \"xrandr --setprovideroutputsource modesetting NVIDIA-0; xrandr --auto\"\nNoDisplay=true\nX-GNOME-Autostart-Phase=DisplayServer\n```\nThen copy it:\n```bash\ncp -v /usr/share/gdm/greeter/autostart/optimus.desktop /etc/xdg/autostart/optimus.desktop\n```\n\n### 7. Reboot and Verify\n***\nReboot your machine, then verify:\n```bash\nglxinfo | grep -i \"direct rendering\"\n```\n*   If output is `direct rendering: Yes`, everything works\n\n---\n---\n"}, {"name": "1.3 Kali Linux Repository Setup", "content": "# Kali Linux Repository Setup\n---\nBefore installing packages or performing upgrades, it's important to update the package list and install basic utilities.\n\n## Update the package index\n---\n```bash\napt update\n```\n\n## Install transport protocols and editors\n---\n```bash\napt install apt-transport-https vim curl\n```\n\nadd the key\n```bash\ncurl -fsSL 'https://archive.kali.org/archive-key.asc' | sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg\n```\n\n## Configure Kali Repository Mirror\n---\nKali Linux repositories ensure you're getting the latest updates and tools.\n\n### Official mirror list reference\n---\nCheck the available mirrors here:\n```\nhttps://http.kali.org/README.mirrorlist\n```\n\n## Edit the sources list to add/modify Kali mirrors\n---\n```bash\nvim /etc/apt/sources.list\n```\n\nExample `sources.list` for Kali:\n```\ndeb http://http.kali.org/kali kali-rolling main contrib non-free\n```\n\n## Clean and refresh the repository cache\n---\n```bash\napt-get clean\nrm -rf /var/lib/apt/lists/*\napt update\n```\n\n## Upgrade installed packages\n---\n```bash\napt upgrade\n```\n\n## Full System Upgrade\n---\nYou can perform advanced system upgrades to bring all packages to their latest versions.\n\n### Perform a full upgrade\n```bash\napt full-upgrade\n```\n\n### Perform a dist-upgrade (older terminology, still functional)\n```bash\napt dist-upgrade\n```\n\n### Reboot if required after upgrade\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Screen Utility Setup\n---\n`screen` is a terminal multiplexer useful for managing long-running sessions.\n\n### Install screen\n```bash\napt install screen\n```\n\n### Check screen help menu\n```bash\nscreen --help\n```\n\n### Start a new screen session\n```bash\nscreen\n```\n\n## Install Kali Metapackages\n---\nKali offers different metapackages depending on your needs.\n\n### Install everything (all tools and environments)\n```bash\napt install kali-linux-everything\n```\n\n### Install the large set of tools\n```bash\napt install kali-linux-large\n```\n\n### Install GNOME desktop environment\n```bash\napt install kali-desktop-gnome\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Install Kernel Headers\n---\nKernel headers are necessary for compiling some tools or drivers.\n```bash\napt install linux-headers-$(uname -r)\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n---\n---\n"}, {"name": "1.4 Wireless Adapter Setup Realtek RTL8812AU", "content": "# Realtek RTL8812AU Wireless Adapter Setup\n---\nThe `Realtek RTL8812AU` is a popular wireless adapter used for Wi-Fi penetration testing and packet injection. Installing drivers is essential for compatibility with Kali Linux.\n\n## Update the package list\n---\n```bash\napt update\n```\n\n## Install required dependencies\n---\nThis installs development tools and kernel headers needed to build and install the driver properly.\n```bash\napt install dkms git build-essential libelf-dev linux-headers-$(uname -r)\n```\n\n## Install the RTL88xxAU DKMS Driver\n---\nKali includes a maintained driver package for Realtek chipsets (including RTL8812AU).\n```bash\napt install realtek-rtl88xxau-dkms\n```\n> Note: This will compile and install the driver automatically using DKMS, which ensures it stays installed across kernel updates.\n\n## Reboot the system\n---\nA reboot ensures the new driver is loaded and working.\n```bash\nreboot\n```\n\n---\n---\n"}, {"name": "1.6 Install  Tools, System Setup for Linux", "content": "## Useful Tools and System Setup for Linux\n***\n\n### Install System Utilities\n```bash\napt install build-essential cmake ninja-build libgtkmm-3.0-dev libgtksourceviewmm-3.0-dev libxml++2.6-dev libsqlite3-dev gettext libgspell-1-dev libcurl4-openssl-dev libuchardet-dev libfribidi-dev libvte-2.91-dev libfmt-dev libspdlog-dev rclone vim fonts-lato fonts-open-sans fonts-roboto fonts-mononoki fonts-indic grc python3 python-is-python3 gcc-multilib g++-multilib libtesseract-dev jq python3-pip openvpn network-manager-openvpn network-manager-openvpn-gnome testssl.sh dirsearch virtualbox virtualbox-ext-pack virtualbox-guest-additions-iso golang remmina remmina-plugin-rdp remmina-plugin-secret flameshot ruby whois git curl libpcap-dev wget zip python3-dev pv dnsutils libssl-dev libffi-dev libxml2-dev libxslt1-dev zlib1g-dev nmap apt-transport-https lynx tor medusa xvfb libxml2-utils procps bsdmainutils libdata-hexdump-perl wget curl tmux git nmap masscan unzip chromium rsync coreutils net-tools htop prips xmlstarlet gnome-power-manager jython mesa-utils wmctrl libgl1-mesa-dev xorg-dev espeak libespeak1 python3-full tesseract-ocr gimagereader gnome-tweaks gnome-shell-extensions sshuttle chisel network-manager-l2tp network-manager-l2tp-gnome firmware-linux thunderbird obs-studio build-essential pkg-config checkinstall git autoconf automake libtool-bin libreadline-dev libusb-1.0-0-dev libplist-dev libimobiledevice-dev libimobiledevice-glue-dev libtatsu-dev libcurl4-openssl-dev libssl-dev libzip-dev zlib1g-dev libimobiledevice-utils mediainfo alacarte\n```\n\n### Google Chrome\n***\n```bash\nwget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb\n```\n\n```bash\napt install ./google-chrome-stable_current_amd64.deb\n```\n\n```bash\napt update\n```\n\n```bash\napt install google-chrome-beta google-chrome-unstable google-chrome-stable\n```\n\n```bash\nrm -vf /etc/apt/sources.list.d/google-chrome-beta.list\n```\n\n```bash\nrm -vf /etc/apt/sources.list.d/google-chrome-unstable.list\n```\n\n```bash\napt update\n```\n---\n### Sublime Text\n***\n```bash\nwget -qO - https://download.sublimetext.com/sublimehq-pub.gpg | gpg --dearmor | tee /etc/apt/trusted.gpg.d/sublimehq-archive.gpg > /dev/null\n```\n```bash\necho \"deb https://download.sublimetext.com/ apt/stable/\" | tee /etc/apt/sources.list.d/sublime-text.list\n```\n```bash\napt update\n```\n```bash\napt install sublime-text\n```\n```bash\ncp -v /etc/apt/trusted.gpg /etc/apt/trusted.gpg.d\n```\n```bash\napt update\n```\n\n### Slack\n***\n```bash\nwget https://downloads.slack-edge.com/linux_releases/slack-desktop-*.deb\n```\n```bash\napt install ./slack*.deb\n```\n```bash\nwget http://ftp.us.debian.org/debian/pool/main/libi/libindicator/libindicator3-7_0.5.0-4_amd64.deb\n```\n```bash\nwget http://ftp.us.debian.org/debian/pool/main/liba/libappindicator/libappindicator3-1_0.4.92-7_amd64.deb\n```\n```bash\ndpkg -i libindicator3-7_0.5.0-4_amd64.deb\n```\n```bash\ndpkg -i libappindicator3-1_0.4.92-7_amd64.deb\n```\n```bash\ndpkg -i libindicator3-7_0.5.0-4_amd64.deb\n```\n```bash\ndpkg -i libappindicator3-1_0.4.92-7_amd64.deb\n```\n```bash\napt install ./slack*.deb\n```\n\n### VirtualBox\n***\n```bash\napt install virtualbox virtualbox-ext-pack virtualbox-guest-additions-iso\n```\n\n### OpenVPN\n***\n```bash\napt install openvpn network-manager-openvpn network-manager-openvpn-gnome\n```\n\n### Flameshot\n***\n```bash\napt install flameshot\n```\n```bash\n/usr/bin/flameshot gui\n```\n1.  Open Settings → Devices → Keyboard → Shortcuts.\n2.  Search for `print`, and unbind the screen capture function by selecting it, and clicking backspace.\n3.  Scroll down and click on the `+`.\n4.  On 'Name', name it 'Flameshot' or 'PrintScreen'.\n5.  Define the command as `/usr/bin/flameshot gui`.\n6.  Select 'Define shortcut...' and click your keyboard Prnt Scr key.\n\n```bash\ncat ~/.config/flameshot/flameshot.ini\n```\n```ini\n[General]\n```\n\n## Mirror & Control Android Phone\n***\n```bash\napt install scrcpy\n```\n```shell\nscrcpy\n```\n\n---\n---\n"}, {"name": "1.7  Installing Go and Go Tools", "content": "# Installing Go (Golang) on Linux\n\nThis guide outlines the steps to install a specific version of Golang (Go) on a Linux system. It also includes instructions for setting up Go tools for offensive security purposes.\n\n### 1. Check Existing Go Installation\n***\nBefore installing a new version, check if Go is already installed:\n```bash\ngo version\n```\nIf Go is installed, it will return the version number. If not, you'll get an error.\n\n### 2. Download Go\n***\nVisit the official Go download page:\n*   https://go.dev/dl/\n\nDirect link to the Go tarball (update as needed):\n*   https://go.dev/dl/go1.24.5.linux-amd64.tar.gz\n\nTo download using `wget`:\n```bash\nwget https://go.dev/dl/go1.24.5.linux-amd64.tar.gz\n```\n\n### 3. Remove Existing Go Installation\n***\nRemove the existing Go installation (if any) to avoid conflicts:\n```bash\napt remove golang-go\n```\n\n### 4. Remove Old Go Directory (if exists)\nCheck if the default installation directory exists:\n```bash\nls /usr/local/go\n```\nIf it does, remove it before extracting the new version:\n```bash\nrm -rf /usr/local/go \n```\n\n```bash\ntar -C /usr/local -xzf go1.24.5.linux-amd64.tar.gz \n```\n\nAfter extraction, verify the contents:\n```bash\nls /usr/local/go\n```\n\n### 5. Confirm Go Installation\n***\nCheck the Go version to verify the new installation:\n```bash\n/usr/local/go/bin/go version\n```\n\n### 6. Set Up Environment Variables\n***\nCheck your current `PATH`:\n```bash\necho $PATH\n```\nCheck your shell type:\n```bash\necho $SHELL\n```\nThen, export the Go paths to your shell configuration file:\n```bash\necho \"export PATH=\\$PATH:/usr/local/go/bin:\\$HOME/go/bin\" >> ~/.bashrc\necho \"export PATH=\\$PATH:/usr/local/go/bin:\\$HOME/go/bin\" >> ~/.zshrc\necho \"export GOROOT=/usr/local/go\" >> ~/.bashrc\necho \"export GOROOT=/usr/local/go\" >> ~/.zshrc\n```\n> ℹ️ After adding these lines, reload your shell or run `source ~/.bashrc` or `source ~/.zshrc` depending on your shell.\n\n### 7. Verify Go is Working\n***\n```bash\ngo version\n```\nYou should see the version you installed.\n\n## Installing Go Tools for Offensive Security\n***\nA helpful Go tools installation script is available here:\n*   https://github.com/InfoSecWarrior/Offensive-Pentesting-Scripts/tree/main/Gotools-Install\n\n### 1. Become Root\n***\nSwitch to the root user:\n```bash\nsu - root\n```\n\n### 2. Download the Script\n***\nNavigate to the `/opt` directory:\n```bash\ncd /opt\n```\nDownload the install script:\n```bash\nwget https://raw.githubusercontent.com/InfoSecWarrior/Offensive-Pentesting-Scripts/main/Gotools-Install/gotools-install.sh\n```\nMake it executable:\n```bash\nchmod +x /opt/gotools-install.sh\n```\n\n### 3. Run the Installer\n***\nExecute the script:\n```bash\n./gotools-install.sh\n```\nThis script installs a collection of commonly used Go-based offensive security tools.\n\n---\n---\n"}, {"name": "1.8 Python Install and Env Setup", "content": "## Python Installation and Environment Setup\n\nThis guide covers how to install Python (both Python 2.7 and Python 3), set up `pip` for both versions, install `beautifulsoup4`, and create an isolated Python environment using `venv`.\n\n---\n### Checking Existing Python & Pip Versions\n\nCheck the installed Python and pip versions on your system.\n\n```bash\npython -V\n```\n```bash\npython2.7 -V\n```\n```bash\npip -V\n```\n```bash\npip2.7 -V\n```\n\n---\n### Installing BeautifulSoup4\n\nInstall `beautifulsoup4` using both Python 2.7 and the default Python environment.\n\n```bash\npip install beautifulsoup4\n```\n```bash\npip2.7 install beautifulsoup4\n```\n\n---\n### Installing Pip for Python 2.7\n\nIf `pip2.7` is not available, you can manually install it using the `get-pip.py` script for Python 2.7.\nDownload the installer:\n\n```bash\nwget https://bootstrap.pypa.io/pip/2.7/get-pip.py -O get-pip.py\n```\nRun the installer with Python 2.7:\n\n```bash\npython2.7 get-pip.py\n```\nVerify pip2.7 installation:\n\n```bash\npip2.7 -V\n```\nReinstall `beautifulsoup4` just to confirm pip works:\n\n```bash\npip2.7 install beautifulsoup4\n```\n\n---\n### Installing Pip for Default Python (Python 3+)\n\nUse this if `pip` isn't already available for your main Python version:\n\n```bash\nwget https://bootstrap.pypa.io/get-pip.py -O get-pip.py\n```\nRun with the default Python:\n\n```bash\npython get-pip.py\n```\n\n---\n### Installing Full Python 3 Support & venv Module\n\nInstall Python 3's full package and the virtual environment module:\n\n```bash\napt install python3.13-venv\n```\n```bash\napt install python3-full python-is-python3\n```\n\n---\n### Creating a Virtual Environment\n\nCreate a dedicated environment for your Python projects.\n\n```bash\nmkdir /opt/python-environment\n```\n```bash\npython3 -m venv /opt/python-environment\n```\n\n---\n### Installing Pip in the Virtual Environment\n\nIf pip is not already in the environment, download and install it:\n\n```bash\nwget https://bootstrap.pypa.io/pip/get-pip.py -O get-pip.py\n```\nUse the virtual environment's Python interpreter to run the installer:\n\n```bash\n/opt/python-environment/bin/python get-pip.py\n```\nVerify the pip version inside the virtual environment:\n\n```bash\n/opt/python-environment/bin/pip -V\n```\n\n---\n### Setting System-wide `pip` to the Virtual Environment Version\n\nCheck the current pip binary path:\n\n```bash\nwhich pip\n```\nRemove the current symlink (if needed):\n\n```bash\nls -lh /usr/local/bin/pip\n```\n```bash\nrm -f /usr/local/bin/pip\n```\nRecreate the symlink to point to the virtual environment pip:\n\n```bash\nln -s /opt/python-environment/bin/pip /usr/local/bin/pip\n```\nConfirm pip is working:\n\n```bash\npip -V\n```\nInstall `beautifulsoup4` globally via the virtual environment pip:\n\n```bash\npip install beautifulsoup4\n```\n\n---\n### Making the Virtual Environment Available in Your Shell\n\nAdd the virtual environment's `bin` directory to your shell PATH so its tools are accessible globally.\nFor Zsh users:\n\n```bash\necho \"export PATH=\\$PATH:/opt/python-environment/bin\" >> ~/.zshrc\necho \"export PATH=\\$PATH:/opt/python-environment/bin\" >> ~/.bashrc\n```\n\nAfter adding the export line, restart your shell or source the file:\n\n```bash\nsource ~/.zshrc\n```\n\nor\n\n```bash\nsource ~/.bashrc\n```\n\n---\n---\n"}, {"name": "6. Auto Load VirtualBox Kernel Modules at Boot (Linux) (1)", "content": "# Auto-Load VirtualBox Kernel Modules at Boot (Linux)\n***\n## Install Required Packages\nReinstall or install the `virtualbox-dkms`, `linux-headers`, and `build-essential` packages.\n```bash\napt update\n```\n\n```bash\napt install --reinstall virtualbox-dkms virtualbox build-essential linux-headers-$(uname -r)\n```\n\n## Check if modules are loaded:\n```bash\nlsmod | grep vbox\n```\nTo ensure VirtualBox works correctly after reboot, you must auto-load its kernel modules:\n* `vboxdrv`\n* `vboxnetflt`\n* `vboxnetadp`\n\n## Step 1: Edit the /etc/modules file\n```bash\nvim /etc/modules\n```\n\n## Step 2: Add the following lines to the end of the file:\n```\nvboxdrv\nvboxnetflt\nvboxnetadp\n```\nThis ensures these modules are auto-loaded at boot by the init system.\n\n## Reboot and Verify\n```bash\nreboot\n```\n* Check if modules are loaded\n```bash\nlsmod | grep vbox\n```\nExpected output:\n```\nvboxdrv\nvboxnetflt\nvboxnetadp\n```\n\n## Troubleshooting\n* Run `sudo systemctl status systemd-modules-load.service` to check for errors.\n* Review `dmesg | grep vbox` or `/var/log/syslog` for module-related issues.\n* Ensure that the `virtualbox-dkms` and `linux-headers-$(uname -r)` packages are installed and up to date.\n\n---\n"}, {"name": "NVIDIA GPU Drivers and CUDA Toolkit on Kali Linux", "content": "\n## Install NVIDIA GPU Drivers and CUDA Toolkit on Kali Linux\n***\n```bash\nsystemctl start ssh\n```\n\n```bash\nsystemctl enable ssh\n```\n\nInstalling NVIDIA drivers and the CUDA Toolkit enables GPU-accelerated tasks such as cracking passwords with Hashcat or video processing with FFmpeg.\n\n### Download the CUDA keyring package\n***\nVisit the official CUDA download site for additional details:\n\nhttps://developer.nvidia.com/cuda-downloads\n\nDownload the CUDA keyring .deb package:\n```bash\nwget https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb\n```\n\n### Install the keyring package\n***\nThis allows apt to trust the NVIDIA repository.\n```bash\napt install ./cuda-keyring_1.1-1_all.deb\n```\n\n### Comment the kali linux repo `/etc/apt/sources.list`\n***\nEnsure the new NVIDIA repository was added correctly. If needed, manually verify and comment the kali linux repo:\n\n```bash\nvim /etc/apt/sources.list\n```\n\n```bash\n# See https://www.kali.org/docs/general-use/kali-linux-sources-list-repositories/\n#deb https://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware\n\n# Additional line for source packages\n# deb-src http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware\n```\n\n> Note: If you have dedicated ( additional ) GPU then disable the integrated GPU . See steps in 1.6 then continue below.\n### Update package index\n***\n```bash\napt update\n```\n### Install the NVIDIA GPU driver\n***\nThis installs the latest driver compatible with your GPU.\n\n```bash\napt install nvidia-driver\n```\n\n- IF any dependency error comes, the un-comment the lines source list and install the dependency needed. Then  again comment the lines in the source list and install nvdia-driver again.\n### Reboot to load the driver\n***\n```bash\nreboot\n```\n\n### Install the CUDA Toolkit\n***\nThis installs version 12.9 of the CUDA development environment.\n```bash\napt install cuda-toolkit-12-9\n```\n\n### Install kernel modules and driver interface (optional but recommended)\n***\n**Note:**  If this command install another  cuda driver ( `nvdia-open-dksm` )  then do not install it .\n\n```bash\napt install cuda-drivers nvidia-kernel-dkms\n```\n\n### Reboot again\n***\n```bash\nreboot\n```\n\n### Verify driver installation\n***\nCheck if NVIDIA driver is loaded and GPU is recognized:\n```bash\nnvidia-smi\n```\n- Check the G card name there, if found means success.\n\nList loaded kernel modules related to NVIDIA:\n```bash\nlsmod | grep -i nvidia\n```\n- check if nvdia kernal modules are loaded or not. If not load try reboot then again run this command.\n\nIf everything appears correct, reboot one more time (optional, for good measure):\n```bash\nreboot\n```\n\n---\n### Install FFmpeg with NVENC support\n***\nThis enables hardware-accelerated video encoding using NVIDIA GPUs.\n\n#### Install FFmpeg\n```bash\napt install ffmpeg\n```\n- ffmpeg is the encoder for media files.\n#### Check for NVENC encoders\n```bash\nffmpeg -encoders 2>/dev/null | grep nenc\n```\n- check that is nvdia is showing in the encoder or not.\n#### Benchmark GPU with Hashcat\nCheck performance and CUDA support:\n```bash\nhashcat -b\n```\n- checking that hashcat is using it or not, it show the G card there. \n\nIf all things are fine means graphic card is successfully configured.\n\n----\n### Install NVIDIA Video Codec SDK on Kali Linux\n***\nThe NVIDIA Video Codec SDK allows developers to access NVENC (hardware-accelerated encoding) and NVDEC (decoding) on supported NVIDIA GPUs. It's also required for advanced FFmpeg and media-based applications.\n\n#### Step 1: Download the SDK\nVisit the official download page:\nhttps://developer.nvidia.com/nvidia-video-codec-sdk/download\n\n> ⚠️ Note: You need an NVIDIA Developer account to download the SDK.\n\n#### Step 2: Extract the SDK archive\nAfter downloading the `Video_Codec_Interface_13.0.19.zip` file:\n```bash\nunzip Video_Codec_Interface_13.0.19.zip\n```\nMove it to a standard location for easier management:\n```bash\nmv -v Video_Codec_Interface_13.0.19 /opt/Video_Codec_Interface_13.0.19\n```\n\n#### Step 3: Check CUDA include path\nMake sure CUDA headers are available in the standard include path:\n```bash\nls /usr/local/cuda/include\n```\n\n#### Step 4: Copy SDK headers into CUDA path\nNavigate to the interface directory:\n```bash\ncd /opt/Video_Codec_Interface_13.0.19/Interface\n```\nCopy the interface headers to CUDA's include path:\n```bash\ncp -v * /usr/local/cuda/include/\n```\n> ✅ This makes the headers available for compilation with applications that use NVENC/NVDEC.\n\n---\n---\n\n### NOTE:\n### AFTER NVDIA DRIVER INSTALLATION, DOES NOT UPGRADE (apt upgrade), ELSE NVDIA DRIVER WILL BE REPLACED AND GOT MISCONFIGURED.\n\n---\n---"}, {"name": "basic", "content": "## Kali Linux Fundamentals\n***\n#### 🧑‍💻 Kali Linux History and Introduction\n***\n##### 🔎 What is Kali Linux?\nKal Linux is a Debian-based Linux distribution developed and maintained by [Offensive Security](https://www.offensive-security.com/), designed for:\n*   Penetration Testing\n*   Ethical Hacking\n*   Digital Forensics\n*   Security Research\n\nIt comes pre-installed with hundreds of specialized tools covering various domains such as reconnaissance, exploitation, forensics, wireless attacks, and post-exploitation.\n\n#### 🧪 BackTrack Linux (2006–2013)\n***\nBefore Kali, there was **BackTrack Linux**, a powerful penetration testing platform created by merging:\n*   WHAX (Whoppix/WHAX) – Wireless auditing distro\n*   Auditor Security Collection – Focused on security tools\n\nInitially based on [Slackware](http://www.slackware.com/), and later [Ubuntu](https://ubuntu.com/), BackTrack laid the foundation for modern offensive security Linux distributions.\n\n#### 📦 BackTrack v1 (Released: 2006)\n***\nThe first official release of BackTrack introduced a portable and unified toolset for security professionals.\n\n**Key Features:**\n*   Combined WHAX and Auditor tools\n*   Bootable Live CD\n*   Focused on wireless, network scanning, and vulnerability assessment\n*   Included tools like [Aircrack-ng](https://www.aircrack-ng.org/), [Kismet](https://www.kismetwireless.net/), [Nmap](https://nmap.org/), [Metasploit](https://www.metasploit.com/)\n\n**Limitations:**\n*   No proper package management\n*   Limited persistence and customization\n*   Not compliant with the [Filesystem Hierarchy Standard (FHS)](https://en.wikipedia.org/wiki/Filesystem_Hierarchy_Standard)\n\n#### 🔁 Evolution of BackTrack Versions\n***\n\n| Version      | Release Year | Base System | Key Notes                               |\n| :----------- | :----------- | :---------- | :-------------------------------------- |\n| BackTrack v1 | 2006         | Slackware   | First version, Live CD, merged toolsets |\n| BackTrack v2 | 2007         | Slackware   | Improved hardware detection             |\n| BackTrack v3 | 2008         | Slackware   | KDE GUI improvements, more tools        |\n| BackTrack v4 | 2009         | Ubuntu      | Shifted to Ubuntu; added persistence    |\n| BackTrack 5  | 2011         | Ubuntu      | \"Revolution\", GNOME/KDE desktop options |\n\n#### 👶 Birth of Kali Linux (2013)\nIn **March 2013**, Kali Linux was introduced as the successor to BackTrack.\n\n##### 🔧 Why the Shift?\n*   BackTrack's lack of package management made updates difficult\n*   Custom scripts were inconsistent and hard to maintain\n*   Need for a clean, modular, and standards-compliant system\n\n##### ✅ Key Improvements in Kali:\n*   Built on **Debian**\n*   Uses **APT** for updates and package installation\n*   Fully **FHS-compliant**\n*   ISO customization via **live-build**\n*   Designed for **rolling updates**\n*   Originally intended for **root user by default**\n\n##### 🛠️ Maintainers and Community\n*   **Developer:** Offensive Security\n*   **Website:** [https://www.kali.org](https://www.kali.org)\n*   **Tools Repository:** [https://tools.kali.org](https://tools.kali.org)\n*   Strong and active community with frequent updates and documentation\n\n---\n\n### Overview of Kali Linux\nKali Linux is a comprehensive security platform for professionals involved in:\n*   Penetration Testing\n*   Digital Forensics\n*   Security Auditing\n\nIt bundles an extensive collection of tools including:\n*   Nmap\n*   Metasploit\n*   Burp Suite\n*   Aircrack-ng\n*   John the Ripper, and more.\n\n#### 🧰 Essential Tools in Kali Linux\n| Tool             | Purpose                   |\n| :--------------- | :------------------------ |\n| Nmap             | Network scanning          |\n| Metasploit       | Exploitation framework    |\n| Burp Suite       | Web application testing   |\n| Wireshark        | Packet capture and analysis |\n| Aircrack-ng      | Wireless cracking suite   |\n| Hydra            | Login brute-forcing       |\n| John the Ripper  | Password cracking         |\n| Nikto            | Web server vulnerability scan |\n\n### 💻 Basic Linux Commands\n*   Show current directory\n```bash\npwd\n```\n*   List files in a directory\n```bash\nls -l\n```\n*   Change directory\n```bash\ncd /path/to/directory\n```\n*   View contents of a file\n```bash\ncat filename.txt\n```\n*   Copy a file\n```bash\ncp file1.txt /destination/\n```\n*   Move or rename a file\n```bash\nmv oldname.txt newname.txt\n```\n*   Remove a file or directory\n```bash\nrm file.txt\nrm -r folder/\n```\n*   Search for a string in files\n```bash\ngrep \"search_string\" filename\n```\n*   Find files by name\n```bash\nfind / -name \"file.txt\"\n```\n\n### 🛠️ System Management\n***\n*   View current users\n```bash\nwho\n```\n*   Show logged-in user\n```bash\nwhoami\n```\n*   Check IP address\n```bash\nip a\n```\n*   Display running processes\n```bash\nps aux\n```\n*   Kill a process\n```bash\nkill -9 <PID>\n```\n\n### 🔒 User and Permission Basics\n***\n*   Create a new user\n```bash\nsudo adduser hacker\n```\n*   Change file permissions\n```bash\nchmod 755 script.sh\n```\n*   Change ownership\n```bash\nchown user:user file.txt\n```\n\n### 📦 Package Management (APT)\n***\n*   Update repositories\n```bash\napt update\n```\n*   Upgrade packages\n```bash\napt upgrade\n```\n*   Install a tool\n```bash\napt install nmap\n```\n*   Remove a tool\n```bash\napt remove hydra\n```\n### 🧪 Service Management\n*   Start a service\n```bash\nsystemctl start apache2\n```\n*   Enable service at boot\n```bash\nsystemctl enable apache2\n```\n*   Check status\n```bash\nsystemctl status ssh\n```\n\n### 🌐 Networking Basics\n*   Ping a host\n```bash\nping google.com\n```\n*   Scan open ports with Nmap\n```bash\nnmap -sS 192.168.1.1\n```\n*   Display routing table\n```bash\nroute -n\n```\n\n### 📁 File Compression\n*   Create a tar.gz archive\n```bash\ntar -czvf archive.tar.gz folder/\n```\n*   Extract a tar.gz archive\n```bash\ntar -xzvf archive.tar.gz\n```\n\n### 🧑‍🎓 Kali-Specific Commands\n*   Launch Metasploit\n```bash\nmsfconsole\n```\n*   Run Social Engineering Toolkit (SET)\n```bash\nsetoolkit\n```\n*   Start Burp Suite\n```bash\nburpsuite\n```\n*   Start airmon-ng for wireless monitoring\n```bash\nairmon-ng start wlan0\n```\n\n### Privilege Escalation Tips\n*   Check for SUID binaries\n```bash\nfind / -perm -4000 2>/dev/null\n```\n*   Look for world-writable files\n```bash\nfind / -type f -perm -o+w 2>/dev/null\n```\n*   Enumerate OS and kernel version\n```bash\nuname -a\ncat /etc/os-release\n```\n\n### 📌 Pro Tips\n*   Run tools as **root** when needed:\n```bash\nsudo su\n```\n*   Use **VirtualBox Snapshots** before testing exploits.\n*   Maintain a **notes file** to record findings during pentests.\n\n---\n---\n\n\n## 💿 Choosing Your Kali Linux Version\n***\nKali Linux offers a wide variety of installation images, each tailored for a specific use case. Choosing the right one depends on your hardware, your goal, and your level of expertise.\n\n---\n### 📀 Installer Images\n***\nThis is the traditional method for a full bare-metal installation of Kali Linux onto a computer's hard drive. This gives you a permanent, persistent operating system.\n\n*   **Installer:** This is the standard, recommended download for most users. It contains a complete image that can be installed without needing an internet connection during the process. It includes the default set of Kali tools.\n*   **Weekly:** This is a \"bleeding-edge\" version of the installer image, updated weekly with the latest packages and fixes. It's great for users who need the newest software but may be slightly less stable than the main release.\n*   **NetInstaller:** A very small image that contains only the components needed to start the installation. It downloads all the required packages from the internet during the setup process. This ensures you get the most up-to-date version of everything but requires a stable internet connection.\n*   **Everything:** A massive, comprehensive image that includes every single tool available in the Kali repositories. This is designed for completely offline installations where you need access to the full suite of tools without an internet connection.\n\n---\n### 🖥️ Virtual Machines\n***\nThese are pre-built, pre-configured images designed to run inside virtualization software. This is often the easiest and safest way to get started with Kali, as it runs in an isolated environment on top of your existing operating system.\n\n*   **VMware:** Pre-configured virtual machine files (.vmx) optimized for VMware Workstation, VMware Player, and VMware Fusion. These images come with VMware Tools pre-installed for better performance and seamless integration.\n*   **VirtualBox:** Ready-to-use OVA (Open Virtual Appliance) files specifically configured for Oracle VirtualBox. These include Guest Additions for enhanced graphics, shared folders, and clipboard functionality.\n*   **Hyper-V:** Native images for Microsoft's Hyper-V virtualization platform, available on Windows Pro and Enterprise editions. These are optimized for Windows integration and enhanced session mode.\n*   **QEMU:** Raw disk images suitable for QEMU/KVM virtualization on Linux hosts. These provide excellent performance for Linux-based virtualization environments.\n\n### 🍓 ARM\n***\nThese images are specifically compiled for ARM-based single-board computers and devices. Each image is tailored for specific hardware to ensure optimal performance and compatibility.\n\n*   **Raspberry Pi:** Multiple versions supporting Pi 1, Pi 2/3/4, Pi Zero/Zero W, and Pi 400. These include both 32-bit and 64-bit versions where applicable, with full hardware acceleration support.\n*   **Pinebook/Pinebook Pro:** Optimized images for Pine64's laptop offerings, including proper power management and hardware driver support.\n*   **BeagleBone Black:** Customized for this popular development board with full GPIO and hardware interface support.\n*   **ODROID:** Various images supporting ODROID-C2, XU4, and other models in the ODROID family.\n*   **Generic ARM:** A more universal image that can work on various ARM devices but may require manual configuration.\n\n### 📱 Mobile\n***\nThis refers to **Kali NetHunter**, a version of Kali designed for mobile penetration testing on Android devices. Different versions cater to various installation methods and device capabilities.\n\n*   **NetHunter Rootless:** Can be installed on any Android device without root access. Provides limited functionality but works on unmodified phones.\n*   **NetHunter Lite:** For rooted devices that don't support custom kernels. Offers more features than Rootless but less than the full version.\n*   **NetHunter Full:** The complete NetHunter experience requiring a custom kernel. Includes wireless injection, HID attacks, and BadUSB capabilities.\n*   **NetHunter Pro:** Premium version for specific devices like OnePlus, Nexus, and Pixel phones with dedicated kernel patches.\n\n### ☁️ Cloud\n***\nThese are pre-built images optimized for major cloud service providers. They're configured to work seamlessly with cloud-specific features and billing models.\n\n*   **AWS AMI:** Amazon Machine Images available in the AWS Marketplace. Pre-configured with cloud-init for automatic setup and AWS CLI tools.\n*   **Azure:** Available through Azure Marketplace with Azure Linux Agent pre-installed for proper integration with Azure services.\n*   **Google Cloud:** GCP-optimized images with Google Cloud SDK and proper network configuration for Google's infrastructure.\n*   **Digital Ocean:** Available as a one-click droplet with optimized kernels and automatic security updates enabled.\n*   **Linode:** Stackscripts and images configured for Linode's infrastructure with proper networking and storage drivers.\n\n### 📦 Containers\n***\nLightweight Kali Linux images designed for containerization. These provide isolated environments for specific tools without the overhead of a full operating system.\n\n*   **Docker Official:** The official Kali Docker image maintained by Offensive Security. Minimal base system with apt repositories configured.\n*   **Docker Full:** A larger Docker image that includes the default metapackage of tools, ready for immediate use.\n*   **Docker Core:** An ultra-minimal image containing only essential components for building custom containers.\n*   **LXC/LXD:** Linux container images optimized for LXC/LXD with proper permissions and device access configurations.\n*   **Podman:** OCI-compliant images that work with Podman for rootless container deployments.\n\n### ⚡ Live Boot\n***\nThese images allow you to run Kali Linux directly from removable media without installation. Perfect for forensics, temporary use, or testing on different hardware.\n\n*   **Live Standard:** The default live image with the XFCE desktop environment and standard tool selection. Supports both BIOS and UEFI boot.\n*   **Live Everything:** A comprehensive live image containing all available Kali tools. Requires larger USB drives but provides offline access to the entire toolkit.\n*   **Live Encrypted Persistence:** Configured to support encrypted persistent storage on USB drives, allowing you to save files and settings between boots.\n*   **Live Forensics Mode:** Special live image that doesn't auto-mount drives and includes forensic tools, designed to preserve evidence integrity.\n\n### 🪟 WSL (Windows Subsystem for Linux)\n***\nKali Linux integrated into Windows through Microsoft's Windows Subsystem for Linux. Different versions cater to various WSL implementations and use cases.\n\n*   **WSL 2:** The recommended version using a real Linux kernel for better compatibility and performance. Available through the Microsoft Store.\n*   **WSL 1:** Legacy version using translation layer. Still available for older Windows versions or specific compatibility needs.\n*   **Win-KeX:** Kali's desktop experience for WSL, providing a full GUI environment within Windows using VNC or RDP.\n*   **WSL Enterprise:** Custom WSL images for corporate environments with pre-configured security policies and tool restrictions.\n\n### 📜 Build Scripts\n***\nFor advanced users who want complete control over their Kali installation. These tools allow you to create custom images tailored to specific needs.\n\n*   **live-build:** The official Debian live-build system customized for Kali. Create custom ISOs with your choice of desktop environments and tools.\n*   **kali-arm-build-scripts:** Scripts for building custom ARM images for unsupported or new ARM devices.\n*   **kali-docker:** Dockerfile and build scripts for creating custom Docker containers with specific tool combinations.\n*   **kali-cloud-build:** Templates and scripts for building cloud-optimized images with custom configurations.\n*   **kali-nethunter-build:** Build system for creating custom NetHunter images for Android devices.\n\n---\n---"}, {"name": "kali genome", "content": "# **Complete HiDPI Scaling Guide for Kali Linux (125% Scale)**\n\n## **Introduction: Understanding Display Scaling Methods**\n\nWhen dealing with high-resolution displays on small screens (like a 14\" laptop with 1920x1200 resolution), text and UI elements can appear too small. There are several ways to handle this scaling issue:\n\n1. **xrandr scaling** (e.g., `xrandr --output eDP --scale 1.25x1.25`) - This method stretches the rendered image, resulting in blurry text and poor quality. NOT recommended.\n\n2. **Lowering resolution** - You could change from 1920x1200 to 1600x1000, but this wastes your display's capabilities and reduces sharpness.\n\n3. **Desktop Environment scaling** - Some DEs offer built-in scaling (especially on Wayland), but support varies and may not work for all applications.\n\n4. **DPI-based scaling** - This method tells applications to render at higher resolution from the start, maintaining sharpness and quality. **This is what this guide focuses on.**\n\n**This document provides a comprehensive guide for implementing proper DPI-based scaling** that will:\n- Keep text and images sharp and clear\n- Work across different application frameworks (GTK, Qt, X11)\n- Persist across reboots\n- Scale everything consistently to 125% (or your preferred size)\n\nThe DPI method is the most reliable and provides the best quality, which is why we're using it as our primary approach in this guide.\n\n---\n\n## **Table of Contents**\n1. [System Requirements Check](#system-requirements-check)\n2. [Pre-Configuration Checklist](#pre-configuration-checklist)\n3. [Step-by-Step Scaling Setup](#step-by-step-scaling-setup)\n4. [Post-Configuration Verification](#post-configuration-verification)\n5. [Troubleshooting](#troubleshooting)\n6. [Rollback Instructions](#rollback-instructions)\n\n---\n\n## **System Requirements Check**\n\n### **1. Check Your Hardware**\n\n**What this does:** Identifies your laptop model and display specifications  \n```bash\nsudo dmidecode -t system | grep -A5 \"System Information\"\n```\n**Why:** Different hardware may need different scaling approaches\n\n**What this does:** Shows your display resolution and size  \n```bash\nxrandr --current | grep -A5 \"connected\"\n```\n**Why:** Helps calculate if you need scaling (14\" with 1920x1200 = needs scaling)\n\n### **2. Check Your Desktop Environment**\n\n**What this does:** Identifies which desktop environment you're using  \n```bash\necho $XDG_CURRENT_DESKTOP\n```\n**Why:** Different DEs have different scaling methods\n\n**Common outputs:**\n- `GNOME` → Follow GNOME instructions\n- `XFCE` → Follow XFCE instructions  \n- `KDE` → Follow KDE instructions\n- `MATE` → Follow MATE instructions\n\n### **3. Check Display Server**\n\n**What this does:** Shows if you're using X11 or Wayland  \n```bash\necho $XDG_SESSION_TYPE\n```\n**Why:** Wayland has better scaling support than X11\n\n### **4. Check Current Scaling Status**\n\n**What this does:** Shows current DPI settings  \n```bash\nxdpyinfo | grep -B2 resolution\n```\n**Why:** Default is usually 96 DPI; we'll change to 120 for 125% scaling\n\n**What this does:** Shows GNOME scaling settings (if using GNOME)  \n```bash\ngsettings get org.gnome.desktop.interface text-scaling-factor\n```\n**Why:** Should be 1.0 by default; we'll change to 1.25\n\n---\n\n## **Pre-Configuration Checklist**\n\n### **Backup Current Settings**\n\n**What this does:** Creates backup of current configurations  \n```bash\nmkdir -p ~/scaling-backup\n```\n**Why:** Safety first - can restore if something goes wrong\n\n**What this does:** Backs up existing X resources  \n```bash\n[[ -f ~/.Xresources ]] && cp ~/.Xresources ~/scaling-backup/\n```\n**Why:** Preserves any existing custom settings\n\n**What this does:** Backs up shell configurations  \n```bash\ncp ~/.bashrc ~/scaling-backup/bashrc.backup\ncp ~/.zshrc ~/scaling-backup/zshrc.backup 2>/dev/null || true\n```\n**Why:** We'll be modifying these files\n\n---\n\n## **Step-by-Step Scaling Setup**\n\n### **For GNOME on X11 (Most Common Kali Setup)**\n\n#### **Step 1: Set Base DPI**\n\n**What this does:** Creates X resources file with 120 DPI (125% of 96)  \n```bash\necho \"Xft.dpi: 120\" > ~/.Xresources\n```\n**Why:** Tells X11 applications to render at 125% scale\n\n**What this does:** Applies the DPI setting immediately  \n```bash\nxrdb -merge ~/.Xresources\n```\n**Why:** Without this, changes only apply after restart\n\n#### **Step 2: Set GNOME Text Scaling**\n\n**What this does:** Sets GNOME text to 125% size  \n```bash\ngsettings set org.gnome.desktop.interface text-scaling-factor 1.25\n```\n**Why:** Ensures GTK applications scale consistently with X11 apps\n\n**What this does:** Sets appropriate cursor size for scaled display  \n```bash\ngsettings set org.gnome.desktop.interface cursor-size 30\n```\n**Why:** Default 24px cursor looks tiny at 125% scale\n\n#### **Step 3: Configure Environment Variables**\n\n**For Bash users:**\n\n**What this does:** Opens bash configuration file  \n```bash\nnano ~/.bashrc\n```\n**Why:** Need to add scaling variables for Qt/GTK applications\n\nAdd these lines at the end:\n```bash\n# HiDPI Support (1.25x scaling)\nexport GDK_SCALE=1\nexport GDK_DPI_SCALE=1.25\nexport QT_AUTO_SCREEN_SCALE_FACTOR=0\nexport QT_SCALE_FACTOR=1.25\nexport QT_FONT_DPI=120\n```\n\n**For Zsh users (if you have it):**\n\n**What this does:** Opens zsh configuration file  \n```bash\nnano ~/.zshrc\n```\n**Why:** Zsh doesn't read .bashrc, needs its own configuration\n\nAdd the same lines as above.\n\n#### **Step 4: Auto-load Settings on Login**\n\n**What this does:** Creates X profile to load settings automatically  \n```bash\nnano ~/.xprofile\n```\n**Why:** Ensures DPI settings apply every time you log in\n\nAdd these lines:\n```bash\n# Load DPI settings\n[[ -f ~/.Xresources ]] && xrdb -merge ~/.Xresources\n\n# Load Xmodmap if it exists\n[[ -f ~/.Xmodmap ]] && xmodmap ~/.Xmodmap\n```\n\n#### **Step 5: Optimize Font Rendering**\n\n**What this does:** Enables subpixel font rendering  \n```bash\ngsettings set org.gnome.desktop.interface font-antialiasing 'rgba'\n```\n**Why:** Makes text sharper on LCD displays\n\n**What this does:** Sets slight font hinting  \n```bash\ngsettings set org.gnome.desktop.interface font-hinting 'slight'\n```\n**Why:** Improves readability at fractional scaling\n\n---\n\n### **For XFCE**\n\nIf using XFCE instead of GNOME:\n\n**What this does:** Opens XFCE appearance settings  \n```bash\nxfce4-appearance-settings\n```\n**Why:** XFCE has different scaling controls\n\n1. Go to \"Fonts\" tab\n2. Set \"Custom DPI\" to 120\n3. Click Apply\n\n**What this does:** Sets XFCE window scaling  \n```bash\nxfconf-query -c xsettings -p /Gdk/WindowScalingFactor -s 1\n```\n**Why:** Prevents double-scaling issues\n\n---\n\n### **For KDE Plasma**\n\nIf using KDE:\n\n**What this does:** Opens KDE system settings  \n```bash\nsystemsettings5\n```\n**Why:** KDE has built-in scaling options\n\n1. Go to \"Display and Monitor\" → \"Display Configuration\"\n2. Set \"Global Scale\" to 125%\n3. Click Apply\n\n---\n\n### **For GNOME on Wayland**\n\nIf using Wayland (better scaling support):\n\n**What this does:** Enables fractional scaling in GNOME  \n```bash\ngsettings set org.gnome.mutter experimental-features \"['scale-monitor-framebuffer']\"\n```\n**Why:** Allows 125%, 150%, 175% options in display settings\n\n**What this does:** Opens display settings  \n```bash\ngnome-control-center display\n```\n**Why:** Can now select 125% from dropdown\n\n---\n\n## **Post-Configuration Verification**\n\n### **Required: Log Out and Log In**\n\n**IMPORTANT:** Changes only fully apply after logout/login\n\n### **Verify Settings Applied**\n\n**What this does:** Checks if DPI was applied  \n```bash\nxrdb -query | grep dpi\n```\n**Expected output:** `Xft.dpi: 120`\n\n**What this does:** Verifies environment variables  \n```bash\nenv | grep -E \"(GDK|QT).*SCALE\"\n```\n**Expected output:** Should show all scaling variables\n\n**What this does:** Tests with a GTK application  \n```bash\ngtk3-demo\n```\n**Why:** Should appear 25% larger than before\n\n---\n\n## **Troubleshooting**\n\n### **If Text is Too Large/Small**\n\nFor 150% scaling instead:\n```bash\necho \"Xft.dpi: 144\" > ~/.Xresources\nxrdb -merge ~/.Xresources\ngsettings set org.gnome.desktop.interface text-scaling-factor 1.5\n```\n\nFor 100% scaling (default):\n```bash\necho \"Xft.dpi: 96\" > ~/.Xresources\nxrdb -merge ~/.Xresources\ngsettings set org.gnome.desktop.interface text-scaling-factor 1.0\n```\n\n### **If Some Apps Don't Scale**\n\n**For Firefox:**\n1. Type `about:config` in address bar\n2. Search for `layout.css.devPixelsPerPx`\n3. Set to `1.25`\n\n**For Chrome/Chromium:**\n```bash\ngoogle-chrome --force-device-scale-factor=1.25\n```\n\n### **If Blurry Text**\n\n**What this does:** Forces full hinting  \n```bash\ngsettings set org.gnome.desktop.interface font-hinting 'full'\n```\n**Why:** Some displays need stronger hinting\n\n---\n\n## **Rollback Instructions**\n\nIf something goes wrong:\n\n**What this does:** Restores original files  \n```bash\ncp ~/scaling-backup/bashrc.backup ~/.bashrc\ncp ~/scaling-backup/zshrc.backup ~/.zshrc 2>/dev/null || true\nrm ~/.Xresources ~/.xprofile\n```\n\n**What this does:** Resets GNOME settings  \n```bash\ngsettings reset org.gnome.desktop.interface text-scaling-factor\ngsettings reset org.gnome.desktop.interface cursor-size\ngsettings reset org.gnome.desktop.interface font-antialiasing\ngsettings reset org.gnome.desktop.interface font-hinting\n```\n\nLog out and log in to complete rollback.\n\n---\n\n## **Quick Reference Card**\n\n### **For Fresh Kali Install with GNOME:**\n\n1. Check your setup: `echo $XDG_SESSION_TYPE` and `echo $XDG_CURRENT_DESKTOP`\n2. If X11 + GNOME, run these commands:\n\n```bash\n# Set DPI\necho \"Xft.dpi: 120\" > ~/.Xresources\nxrdb -merge ~/.Xresources\n\n# Set GNOME scaling\ngsettings set org.gnome.desktop.interface text-scaling-factor 1.25\n\n# Add to .bashrc\ncat >> ~/.bashrc << 'EOF'\n# HiDPI Support\nexport GDK_SCALE=1\nexport GDK_DPI_SCALE=1.25\nexport QT_AUTO_SCREEN_SCALE_FACTOR=0\nexport QT_SCALE_FACTOR=1.25\nexport QT_FONT_DPI=120\nEOF   \n# Create .xprofile\necho '[[ -f ~/.Xresources ]] && xrdb -merge ~/.Xresources' > ~/.xprofile\n```\n\n3. Log out and log in\n\n### **Scaling Formula Reference**\n\n- **100% (default)**: 96 DPI, text-scaling-factor 1.0\n- **125%**: 120 DPI, text-scaling-factor 1.25\n- **150%**: 144 DPI, text-scaling-factor 1.5\n- **175%**: 168 DPI, text-scaling-factor 1.75\n- **200%**: 192 DPI, text-scaling-factor 2.0\n\n### **Compatible Applications**\n\nThis DPI scaling method works with:\n- ✅ GTK3/GTK4 applications (most GNOME apps)\n- ✅ Qt5/Qt6 applications (with environment variables)\n- ✅ X11 applications (via Xft.dpi)\n- ✅ Electron apps (VS Code, Discord, etc.)\n- ✅ Java applications (with proper flags)\n- ⚠️ Some older GTK2 apps may need individual configuration\n- ⚠️ Wine applications may need separate scaling\n\n---\n\n**Applies to:** Kali Linux 2024.x with GNOME desktop environment\n\n---\n---"}, {"name": "kali linux fundamentals", "content": "## Kali Linux Fundamentals\n***\n#### 🧑‍💻 Kali Linux History and Introduction\n***\n##### 🔎 What is Kali Linux?\nKal Linux is a Debian-based Linux distribution developed and maintained by [Offensive Security](https://www.offensive-security.com/), designed for:\n*   Penetration Testing\n*   Ethical Hacking\n*   Digital Forensics\n*   Security Research\n\nIt comes pre-installed with hundreds of specialized tools covering various domains such as reconnaissance, exploitation, forensics, wireless attacks, and post-exploitation.\n\n#### 🧪 BackTrack Linux (2006–2013)\n***\nBefore Kali, there was **BackTrack Linux**, a powerful penetration testing platform created by merging:\n*   WHAX (Whoppix/WHAX) – Wireless auditing distro\n*   Auditor Security Collection – Focused on security tools\n\nInitially based on [Slackware](http://www.slackware.com/), and later [Ubuntu](https://ubuntu.com/), BackTrack laid the foundation for modern offensive security Linux distributions.\n\n#### 📦 BackTrack v1 (Released: 2006)\n***\nThe first official release of BackTrack introduced a portable and unified toolset for security professionals.\n\n**Key Features:**\n*   Combined WHAX and Auditor tools\n*   Bootable Live CD\n*   Focused on wireless, network scanning, and vulnerability assessment\n*   Included tools like [Aircrack-ng](https://www.aircrack-ng.org/), [Kismet](https://www.kismetwireless.net/), [Nmap](https://nmap.org/), [Metasploit](https://www.metasploit.com/)\n\n**Limitations:**\n*   No proper package management\n*   Limited persistence and customization\n*   Not compliant with the [Filesystem Hierarchy Standard (FHS)](https://en.wikipedia.org/wiki/Filesystem_Hierarchy_Standard)\n\n#### 🔁 Evolution of BackTrack Versions\n***\n\n| Version      | Release Year | Base System | Key Notes                               |\n| :----------- | :----------- | :---------- | :-------------------------------------- |\n| BackTrack v1 | 2006         | Slackware   | First version, Live CD, merged toolsets |\n| BackTrack v2 | 2007         | Slackware   | Improved hardware detection             |\n| BackTrack v3 | 2008         | Slackware   | KDE GUI improvements, more tools        |\n| BackTrack v4 | 2009         | Ubuntu      | Shifted to Ubuntu; added persistence    |\n| BackTrack 5  | 2011         | Ubuntu      | \"Revolution\", GNOME/KDE desktop options |\n\n#### 👶 Birth of Kali Linux (2013)\nIn **March 2013**, Kali Linux was introduced as the successor to BackTrack.\n\n##### 🔧 Why the Shift?\n*   BackTrack's lack of package management made updates difficult\n*   Custom scripts were inconsistent and hard to maintain\n*   Need for a clean, modular, and standards-compliant system\n\n##### ✅ Key Improvements in Kali:\n*   Built on **Debian**\n*   Uses **APT** for updates and package installation\n*   Fully **FHS-compliant**\n*   ISO customization via **live-build**\n*   Designed for **rolling updates**\n*   Originally intended for **root user by default**\n\n##### 🛠️ Maintainers and Community\n*   **Developer:** Offensive Security\n*   **Website:** [https://www.kali.org](https://www.kali.org)\n*   **Tools Repository:** [https://tools.kali.org](https://tools.kali.org)\n*   Strong and active community with frequent updates and documentation\n\n---\n\n### Overview of Kali Linux\nKali Linux is a comprehensive security platform for professionals involved in:\n*   Penetration Testing\n*   Digital Forensics\n*   Security Auditing\n\nIt bundles an extensive collection of tools including:\n*   Nmap\n*   Metasploit\n*   Burp Suite\n*   Aircrack-ng\n*   John the Ripper, and more.\n\n#### 🧰 Essential Tools in Kali Linux\n| Tool             | Purpose                   |\n| :--------------- | :------------------------ |\n| Nmap             | Network scanning          |\n| Metasploit       | Exploitation framework    |\n| Burp Suite       | Web application testing   |\n| Wireshark        | Packet capture and analysis |\n| Aircrack-ng      | Wireless cracking suite   |\n| Hydra            | Login brute-forcing       |\n| John the Ripper  | Password cracking         |\n| Nikto            | Web server vulnerability scan |\n\n### 💻 Basic Linux Commands\n*   Show current directory\n```bash\npwd\n```\n*   List files in a directory\n```bash\nls -l\n```\n*   Change directory\n```bash\ncd /path/to/directory\n```\n*   View contents of a file\n```bash\ncat filename.txt\n```\n*   Copy a file\n```bash\ncp file1.txt /destination/\n```\n*   Move or rename a file\n```bash\nmv oldname.txt newname.txt\n```\n*   Remove a file or directory\n```bash\nrm file.txt\nrm -r folder/\n```\n*   Search for a string in files\n```bash\ngrep \"search_string\" filename\n```\n*   Find files by name\n```bash\nfind / -name \"file.txt\"\n```\n\n### 🛠️ System Management\n***\n*   View current users\n```bash\nwho\n```\n*   Show logged-in user\n```bash\nwhoami\n```\n*   Check IP address\n```bash\nip a\n```\n*   Display running processes\n```bash\nps aux\n```\n*   Kill a process\n```bash\nkill -9 <PID>\n```\n\n### 🔒 User and Permission Basics\n***\n*   Create a new user\n```bash\nsudo adduser hacker\n```\n*   Change file permissions\n```bash\nchmod 755 script.sh\n```\n*   Change ownership\n```bash\nchown user:user file.txt\n```\n\n### 📦 Package Management (APT)\n***\n*   Update repositories\n```bash\napt update\n```\n*   Upgrade packages\n```bash\napt upgrade\n```\n*   Install a tool\n```bash\napt install nmap\n```\n*   Remove a tool\n```bash\napt remove hydra\n```\n### 🧪 Service Management\n*   Start a service\n```bash\nsystemctl start apache2\n```\n*   Enable service at boot\n```bash\nsystemctl enable apache2\n```\n*   Check status\n```bash\nsystemctl status ssh\n```\n\n### 🌐 Networking Basics\n*   Ping a host\n```bash\nping google.com\n```\n*   Scan open ports with Nmap\n```bash\nnmap -sS 192.168.1.1\n```\n*   Display routing table\n```bash\nroute -n\n```\n\n### 📁 File Compression\n*   Create a tar.gz archive\n```bash\ntar -czvf archive.tar.gz folder/\n```\n*   Extract a tar.gz archive\n```bash\ntar -xzvf archive.tar.gz\n```\n\n### 🧑‍🎓 Kali-Specific Commands\n*   Launch Metasploit\n```bash\nmsfconsole\n```\n*   Run Social Engineering Toolkit (SET)\n```bash\nsetoolkit\n```\n*   Start Burp Suite\n```bash\nburpsuite\n```\n*   Start airmon-ng for wireless monitoring\n```bash\nairmon-ng start wlan0\n```\n\n### Privilege Escalation Tips\n*   Check for SUID binaries\n```bash\nfind / -perm -4000 2>/dev/null\n```\n*   Look for world-writable files\n```bash\nfind / -type f -perm -o+w 2>/dev/null\n```\n*   Enumerate OS and kernel version\n```bash\nuname -a\ncat /etc/os-release\n```\n\n### 📌 Pro Tips\n*   Run tools as **root** when needed:\n```bash\nsudo su\n```\n*   Use **VirtualBox Snapshots** before testing exploits.\n*   Maintain a **notes file** to record findings during pentests.\n\n---\n---"}, {"name": "kali linux repostory", "content": "# Kali Linux Repository Setup\n---\nBefore installing packages or performing upgrades, it's important to update the package list and install basic utilities.\n\n## Update the package index\n---\n```bash\napt update\n```\n\n## Install transport protocols and editors\n---\n```bash\napt install apt-transport-https vim curl\n```\n\nadd the key\n```bash\ncurl -fsSL 'https://archive.kali.org/archive-key.asc' | sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg\n```\n\n## Configure Kali Repository Mirror\n---\nKali Linux repositories ensure you're getting the latest updates and tools.\n\n### Official mirror list reference\n---\nCheck the available mirrors here:\n```\nhttps://http.kali.org/README.mirrorlist\n```\n\n## Edit the sources list to add/modify Kali mirrors\n---\n```bash\nvim /etc/apt/sources.list\n```\n\nExample `sources.list` for Kali:\n```\ndeb http://http.kali.org/kali kali-rolling main contrib non-free\n```\n\n## Clean and refresh the repository cache\n---\n```bash\napt-get clean\nrm -rf /var/lib/apt/lists/*\napt update\n```\n\n## Upgrade installed packages\n---\n```bash\napt upgrade\n```\n\n## Full System Upgrade\n---\nYou can perform advanced system upgrades to bring all packages to their latest versions.\n\n### Perform a full upgrade\n```bash\napt full-upgrade\n```\n\n### Perform a dist-upgrade (older terminology, still functional)\n```bash\napt dist-upgrade\n```\n\n### Reboot if required after upgrade\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Screen Utility Setup\n---\n`screen` is a terminal multiplexer useful for managing long-running sessions.\n\n### Install screen\n```bash\napt install screen\n```\n\n### Check screen help menu\n```bash\nscreen --help\n```\n\n### Start a new screen session\n```bash\nscreen\n```\n\n## Install Kali Metapackages\n---\nKali offers different metapackages depending on your needs.\n\n### Install everything (all tools and environments)\n```bash\napt install kali-linux-everything\n```\n\n### Install the large set of tools\n```bash\napt install kali-linux-large\n```\n\n### Install GNOME desktop environment\n```bash\napt install kali-desktop-gnome\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Install Kernel Headers\n---\nKernel headers are necessary for compiling some tools or drivers.\n```bash\napt install linux-headers-$(uname -r)\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n---\n---"}, {"name": "kali nvdia drivers", "content": "# NVIDIA-GPU-Drivers-and-CUDA-Toolkit-on-Kali-Linux\n## Install NVIDIA GPU Drivers and CUDA Toolkit on Kali Linux\n***\n```bash\nsystemctl start ssh\n```\n\n```bash\nsystemctl enable ssh\n```\n\nInstalling NVIDIA drivers and the CUDA Toolkit enables GPU-accelerated tasks such as cracking passwords with Hashcat or video processing with FFmpeg.\n\n### Download the CUDA keyring package\n***\nVisit the official CUDA download site for additional details:\n\nhttps://developer.nvidia.com/cuda-downloads\n\nDownload the CUDA keyring .deb package:\n```bash\nwget https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb\n```\n\n### Install the keyring package\n***\nThis allows apt to trust the NVIDIA repository.\n```bash\napt install ./cuda-keyring_1.1-1_all.deb\n```\n\n### Comment the kali linux repo `/etc/apt/sources.list`\n***\nEnsure the new NVIDIA repository was added correctly. If needed, manually verify and comment the kali linux repo:\n\n```bash\nvim /etc/apt/sources.list\n```\n\n```bash\n# See https://www.kali.org/docs/general-use/kali-linux-sources-list-repositories/\n#deb https://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware\n\n# Additional line for source packages\n# deb-src http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware\n```\n\n> Note: If you have dedicated ( additional ) GPU then disable the integrated GPU . See steps in 1.6 then continue below.\n### Update package index\n***\n```bash\napt update\n```\n### Install the NVIDIA GPU driver\n***\nThis installs the latest driver compatible with your GPU.\n\n```bash\napt install nvidia-driver\n```\n\n- IF any dependency error comes, the un-comment the lines source list and install the dependency needed. Then  again comment the lines in the source list and install nvdia-driver again.\n### Reboot to load the driver\n***\n```bash\nreboot\n```\n\n### Install the CUDA Toolkit\n***\nThis installs version 12.9 of the CUDA development environment.\n```bash\napt install cuda-toolkit-12-9\n```\n\n### Install kernel modules and driver interface (optional but recommended)\n***\n**Note:**  If this command install another  cuda driver ( `nvdia-open-dksm` )  then do not install it .\n\n```bash\napt install cuda-drivers nvidia-kernel-dkms\n```\n\n### Reboot again\n***\n```bash\nreboot\n```\n\n### Verify driver installation\n***\nCheck if NVIDIA driver is loaded and GPU is recognized:\n```bash\nnvidia-smi\n```\n- Check the G card name there, if found means success.\n\nList loaded kernel modules related to NVIDIA:\n```bash\nlsmod | grep -i nvidia\n```\n- check if nvdia kernal modules are loaded or not. If not load try reboot then again run this command.\n\nIf everything appears correct, reboot one more time (optional, for good measure):\n```bash\nreboot\n```\n\n---\n### Install FFmpeg with NVENC support\n***\nThis enables hardware-accelerated video encoding using NVIDIA GPUs.\n\n#### Install FFmpeg\n```bash\napt install ffmpeg\n```\n- ffmpeg is the encoder for media files.\n#### Check for NVENC encoders\n```bash\nffmpeg -encoders 2>/dev/null | grep nenc\n```\n- check that is nvdia is showing in the encoder or not.\n#### Benchmark GPU with Hashcat\nCheck performance and CUDA support:\n```bash\nhashcat -b\n```\n- checking that hashcat is using it or not, it show the G card there. \n\nIf all things are fine means graphic card is successfully configured.\n\n----\n### Install NVIDIA Video Codec SDK on Kali Linux\n***\nThe NVIDIA Video Codec SDK allows developers to access NVENC (hardware-accelerated encoding) and NVDEC (decoding) on supported NVIDIA GPUs. It's also required for advanced FFmpeg and media-based applications.\n\n#### Step 1: Download the SDK\nVisit the official download page:\nhttps://developer.nvidia.com/nvidia-video-codec-sdk/download\n\n> ⚠️ Note: You need an NVIDIA Developer account to download the SDK.\n\n#### Step 2: Extract the SDK archive\nAfter downloading the `Video_Codec_Interface_13.0.19.zip` file:\n```bash\nunzip Video_Codec_Interface_13.0.19.zip\n```\nMove it to a standard location for easier management:\n```bash\nmv -v Video_Codec_Interface_13.0.19 /opt/Video_Codec_Interface_13.0.19\n```\n\n#### Step 3: Check CUDA include path\nMake sure CUDA headers are available in the standard include path:\n```bash\nls /usr/local/cuda/include\n```\n\n#### Step 4: Copy SDK headers into CUDA path\nNavigate to the interface directory:\n```bash\ncd /opt/Video_Codec_Interface_13.0.19/Interface\n```\nCopy the interface headers to CUDA's include path:\n```bash\ncp -v * /usr/local/cuda/include/\n```\n> ✅ This makes the headers available for compilation with applications that use NVENC/NVDEC.\n\n---\n---\n\n### NOTE:\n### AFTER NVDIA DRIVER INSTALLATION, DOES NOT UPGRADE (apt upgrade), ELSE NVDIA DRIVER WILL BE REPLACED AND GOT MISCONFIGURED.\n\n---\n---"}, {"name": "kali repostory setup", "content": "# Kali Linux Repository Setup\n---\nBefore installing packages or performing upgrades, it's important to update the package list and install basic utilities.\n\n## Update the package index\n---\n```bash\napt update\n```\n\n## Install transport protocols and editors\n---\n```bash\napt install apt-transport-https vim curl\n```\n\nadd the key\n```bash\ncurl -fsSL 'https://archive.kali.org/archive-key.asc' | sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg\n```\n\n## Configure Kali Repository Mirror\n---\nKali Linux repositories ensure you're getting the latest updates and tools.\n\n### Official mirror list reference\n---\nCheck the available mirrors here:\n```\nhttps://http.kali.org/README.mirrorlist\n```\n\n## Edit the sources list to add/modify Kali mirrors\n---\n```bash\nvim /etc/apt/sources.list\n```\n\nExample `sources.list` for Kali:\n```\ndeb http://http.kali.org/kali kali-rolling main contrib non-free\n```\n\n## Clean and refresh the repository cache\n---\n```bash\napt-get clean\nrm -rf /var/lib/apt/lists/*\napt update\n```\n\n## Upgrade installed packages\n---\n```bash\napt upgrade\n```\n\n## Full System Upgrade\n---\nYou can perform advanced system upgrades to bring all packages to their latest versions.\n\n### Perform a full upgrade\n```bash\napt full-upgrade\n```\n\n### Perform a dist-upgrade (older terminology, still functional)\n```bash\napt dist-upgrade\n```\n\n### Reboot if required after upgrade\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Screen Utility Setup\n---\n`screen` is a terminal multiplexer useful for managing long-running sessions.\n\n### Install screen\n```bash\napt install screen\n```\n\n### Check screen help menu\n```bash\nscreen --help\n```\n\n### Start a new screen session\n```bash\nscreen\n```\n\n## Install Kali Metapackages\n---\nKali offers different metapackages depending on your needs.\n\n### Install everything (all tools and environments)\n```bash\napt install kali-linux-everything\n```\n\n### Install the large set of tools\n```bash\napt install kali-linux-large\n```\n\n### Install GNOME desktop environment\n```bash\napt install kali-desktop-gnome\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n## Install Kernel Headers\n---\nKernel headers are necessary for compiling some tools or drivers.\n```bash\napt install linux-headers-$(uname -r)\n```\n\n### Reboot if required\n```bash\n[ -f /var/run/reboot-required ] && reboot\n```\n\n---\n---"}, {"name": "kali version", "content": "## 💿 Choosing Your Kali Linux Version\n***\nKali Linux offers a wide variety of installation images, each tailored for a specific use case. Choosing the right one depends on your hardware, your goal, and your level of expertise.\n\n---\n### 📀 Installer Images\n***\nThis is the traditional method for a full bare-metal installation of Kali Linux onto a computer's hard drive. This gives you a permanent, persistent operating system.\n\n*   **Installer:** This is the standard, recommended download for most users. It contains a complete image that can be installed without needing an internet connection during the process. It includes the default set of Kali tools.\n*   **Weekly:** This is a \"bleeding-edge\" version of the installer image, updated weekly with the latest packages and fixes. It's great for users who need the newest software but may be slightly less stable than the main release.\n*   **NetInstaller:** A very small image that contains only the components needed to start the installation. It downloads all the required packages from the internet during the setup process. This ensures you get the most up-to-date version of everything but requires a stable internet connection.\n*   **Everything:** A massive, comprehensive image that includes every single tool available in the Kali repositories. This is designed for completely offline installations where you need access to the full suite of tools without an internet connection.\n\n---\n### 🖥️ Virtual Machines\n***\nThese are pre-built, pre-configured images designed to run inside virtualization software. This is often the easiest and safest way to get started with Kali, as it runs in an isolated environment on top of your existing operating system.\n\n*   **VMware:** Pre-configured virtual machine files (.vmx) optimized for VMware Workstation, VMware Player, and VMware Fusion. These images come with VMware Tools pre-installed for better performance and seamless integration.\n*   **VirtualBox:** Ready-to-use OVA (Open Virtual Appliance) files specifically configured for Oracle VirtualBox. These include Guest Additions for enhanced graphics, shared folders, and clipboard functionality.\n*   **Hyper-V:** Native images for Microsoft's Hyper-V virtualization platform, available on Windows Pro and Enterprise editions. These are optimized for Windows integration and enhanced session mode.\n*   **QEMU:** Raw disk images suitable for QEMU/KVM virtualization on Linux hosts. These provide excellent performance for Linux-based virtualization environments.\n\n### 🍓 ARM\n***\nThese images are specifically compiled for ARM-based single-board computers and devices. Each image is tailored for specific hardware to ensure optimal performance and compatibility.\n\n*   **Raspberry Pi:** Multiple versions supporting Pi 1, Pi 2/3/4, Pi Zero/Zero W, and Pi 400. These include both 32-bit and 64-bit versions where applicable, with full hardware acceleration support.\n*   **Pinebook/Pinebook Pro:** Optimized images for Pine64's laptop offerings, including proper power management and hardware driver support.\n*   **BeagleBone Black:** Customized for this popular development board with full GPIO and hardware interface support.\n*   **ODROID:** Various images supporting ODROID-C2, XU4, and other models in the ODROID family.\n*   **Generic ARM:** A more universal image that can work on various ARM devices but may require manual configuration.\n\n### 📱 Mobile\n***\nThis refers to **Kali NetHunter**, a version of Kali designed for mobile penetration testing on Android devices. Different versions cater to various installation methods and device capabilities.\n\n*   **NetHunter Rootless:** Can be installed on any Android device without root access. Provides limited functionality but works on unmodified phones.\n*   **NetHunter Lite:** For rooted devices that don't support custom kernels. Offers more features than Rootless but less than the full version.\n*   **NetHunter Full:** The complete NetHunter experience requiring a custom kernel. Includes wireless injection, HID attacks, and BadUSB capabilities.\n*   **NetHunter Pro:** Premium version for specific devices like OnePlus, Nexus, and Pixel phones with dedicated kernel patches.\n\n### ☁️ Cloud\n***\nThese are pre-built images optimized for major cloud service providers. They're configured to work seamlessly with cloud-specific features and billing models.\n\n*   **AWS AMI:** Amazon Machine Images available in the AWS Marketplace. Pre-configured with cloud-init for automatic setup and AWS CLI tools.\n*   **Azure:** Available through Azure Marketplace with Azure Linux Agent pre-installed for proper integration with Azure services.\n*   **Google Cloud:** GCP-optimized images with Google Cloud SDK and proper network configuration for Google's infrastructure.\n*   **Digital Ocean:** Available as a one-click droplet with optimized kernels and automatic security updates enabled.\n*   **Linode:** Stackscripts and images configured for Linode's infrastructure with proper networking and storage drivers.\n\n### 📦 Containers\n***\nLightweight Kali Linux images designed for containerization. These provide isolated environments for specific tools without the overhead of a full operating system.\n\n*   **Docker Official:** The official Kali Docker image maintained by Offensive Security. Minimal base system with apt repositories configured.\n*   **Docker Full:** A larger Docker image that includes the default metapackage of tools, ready for immediate use.\n*   **Docker Core:** An ultra-minimal image containing only essential components for building custom containers.\n*   **LXC/LXD:** Linux container images optimized for LXC/LXD with proper permissions and device access configurations.\n*   **Podman:** OCI-compliant images that work with Podman for rootless container deployments.\n\n### ⚡ Live Boot\n***\nThese images allow you to run Kali Linux directly from removable media without installation. Perfect for forensics, temporary use, or testing on different hardware.\n\n*   **Live Standard:** The default live image with the XFCE desktop environment and standard tool selection. Supports both BIOS and UEFI boot.\n*   **Live Everything:** A comprehensive live image containing all available Kali tools. Requires larger USB drives but provides offline access to the entire toolkit.\n*   **Live Encrypted Persistence:** Configured to support encrypted persistent storage on USB drives, allowing you to save files and settings between boots.\n*   **Live Forensics Mode:** Special live image that doesn't auto-mount drives and includes forensic tools, designed to preserve evidence integrity.\n\n### 🪟 WSL (Windows Subsystem for Linux)\n***\nKali Linux integrated into Windows through Microsoft's Windows Subsystem for Linux. Different versions cater to various WSL implementations and use cases.\n\n*   **WSL 2:** The recommended version using a real Linux kernel for better compatibility and performance. Available through the Microsoft Store.\n*   **WSL 1:** Legacy version using translation layer. Still available for older Windows versions or specific compatibility needs.\n*   **Win-KeX:** Kali's desktop experience for WSL, providing a full GUI environment within Windows using VNC or RDP.\n*   **WSL Enterprise:** Custom WSL images for corporate environments with pre-configured security policies and tool restrictions.\n\n### 📜 Build Scripts\n***\nFor advanced users who want complete control over their Kali installation. These tools allow you to create custom images tailored to specific needs.\n\n*   **live-build:** The official Debian live-build system customized for Kali. Create custom ISOs with your choice of desktop environments and tools.\n*   **kali-arm-build-scripts:** Scripts for building custom ARM images for unsupported or new ARM devices.\n*   **kali-docker:** Dockerfile and build scripts for creating custom Docker containers with specific tool combinations.\n*   **kali-cloud-build:** Templates and scripts for building cloud-optimized images with custom configurations.\n*   **kali-nethunter-build:** Build system for creating custom NetHunter images for Android devices.\n\n---\n---"}];

// Build sidebar
function buildSidebar(filter) {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  let count = 0;
  NOTES.forEach((note, i) => {
    if (filter && !note.name.toLowerCase().includes(filter.toLowerCase())) return;
    const div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    div.innerHTML = '<span class="fi-icon">▸</span>';
    const span = document.createElement('span');
    span.className = 'fi-name';
    span.textContent = note.name; // textContent = safe, no XSS
    div.appendChild(span);
    div.onclick = () => openNote(i);
    list.appendChild(div);
    count++;
  });
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

// SAFE note renderer - uses DOM API, never raw innerHTML for user content
function openNote(idx) {
  document.querySelectorAll('.file-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'kali configuration/' + NOTES[idx].name;
  
  // SAFE render: parse markdown to safe HTML
  const html = renderMd(NOTES[idx].content);
  
  // Use DOMParser to safely parse - strips all scripts
  const parser = new DOMParser();
  const doc = parser.parseFromString('<div>' + html + '</div>', 'text/html');
  
  // Remove ALL script, iframe, object, embed tags for safety
  ['script','iframe','object','embed','form'].forEach(tag => {
    doc.querySelectorAll(tag).forEach(el => el.remove());
  });
  
  // Remove on* event attributes
  doc.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(attr => {
      if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
    });
  });
  
  const viewer = document.getElementById('viewerContent');
  viewer.innerHTML = '';
  viewer.appendChild(doc.body.firstChild);
  viewer.scrollTop = 0;
}

function renderMd(md) {
  // Escape HTML entities FIRST - this is the key security step
  let h = md
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  // Code blocks (must be before inline code)
  h = h.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
  // Inline code
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Headers
  h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold + Italic
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // HR
  h = h.replace(/^---+$/gm, '<hr>');
  // Blockquote
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Table
  h = h.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (m, header, rows) => {
    const ths = header.split('|').filter(s => s.trim()).map(s => `<th>${s.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(s => s.trim()).map(s => `<td>${s.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  // Lists
  h = h.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]+?<\/li>)/g, m => `<ul>${m}</ul>`);
  h = h.replace(/<\/ul>\s*<ul>/g, '');
  // Links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // Obsidian links
  h = h.replace(/\[\[([^\]]+)\]\]/g, '<span style="color:var(--yellow)">⟦$1⟧</span>');
  // Paragraphs
  h = h.replace(/\n\n+/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  return '<p>' + h + '</p>';
}

// Init
buildSidebar();
if (NOTES.length > 0) openNote(0);
</script>
