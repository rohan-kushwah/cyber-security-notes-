<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c10;--surface:#0d1117;--border:#1e2d3d;--accent:#00d9ff;--accent2:#ff3e6c;--accent3:#39ff14;--text:#c9d1d9;--dim:#586069;--yellow:#ffd700;--orange:#ffa500}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,217,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scanline{position:fixed;top:-100%;left:0;width:100%;height:2px;background:linear-gradient(transparent,rgba(0,217,255,0.1),transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:1}
@keyframes scan{to{top:110%}}

/* TOPBAR */
.topbar{position:relative;z-index:2;background:#0a0e15;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.back-btn{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;text-decoration:none;border:1px solid rgba(0,217,255,0.3);padding:5px 12px;letter-spacing:1px;white-space:nowrap}
.breadcrumb{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.breadcrumb em{color:var(--accent);font-style:normal}

/* HEADER */
.page-header{position:relative;z-index:2;padding:20px 16px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0a0e15,#0d1117)}
.folder-icon{font-size:2rem;display:block;margin-bottom:6px}
.folder-title{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,5vw,1.8rem);color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.folder-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}
.folder-meta em{color:var(--accent3);font-style:normal}
.search-row{margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);padding:8px 12px}
.search-row::before{content:'⌕';color:var(--accent);font-size:1rem}
.s-input{background:none;border:none;outline:none;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:12px;width:100%;caret-color:var(--accent)}
.s-input::placeholder{color:var(--dim)}

/* DESKTOP: side by side */
.layout{position:relative;z-index:2;display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 160px)}

/* MOBILE: stack vertically */
@media(max-width:768px){
  .layout{display:flex;flex-direction:column}
  .sidebar{
    max-height:none !important;
    height:auto;
    position:relative !important;
    border-right:none;
    border-bottom:1px solid var(--border);
  }
  .sidebar.hidden{display:none}
  .viewer{display:flex;flex-direction:column}
  .viewer.hidden{display:none}
  .mobile-back-btn{display:flex}
  .viewer-content{padding:16px;word-wrap:break-word;overflow-wrap:break-word}
  pre{overflow-x:auto;max-width:100%}
  table{display:block;overflow-x:auto;max-width:100%}
}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:#0a0e15;overflow-y:auto;position:sticky;top:0;max-height:calc(100vh - 110px)}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#1e2d3d}
.sidebar-head{padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:3px;background:#080c10;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-head span{color:var(--accent3)}
.file-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:flex-start;gap:8px;transition:all .15s;color:var(--dim)}
.file-item:hover{background:rgba(0,217,255,0.05);color:var(--text)}
.file-item.active{background:rgba(0,217,255,0.08);color:var(--accent);border-left:2px solid var(--accent)}
.fi-icon{font-size:10px;margin-top:3px;flex-shrink:0;color:var(--accent2)}
.fi-name{font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.5;text-transform:capitalize;word-break:break-word}

/* MOBILE BACK BUTTON (inside viewer) */
.mobile-back-btn{display:none;align-items:center;gap:8px;padding:10px 14px;background:#080c10;border-bottom:1px solid var(--border);cursor:pointer;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px}
.mobile-back-btn:hover{background:rgba(0,217,255,0.05)}

/* VIEWER */
.viewer{display:flex;flex-direction:column;min-height:300px}
.viewer-bar{background:#080c10;border-bottom:1px solid var(--border);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.v-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.vd-r{background:#ff5f56}.vd-y{background:#ffbd2e}.vd-g{background:#27c93f}
.v-path{color:var(--text);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 60px)}
.viewer-content{padding:24px 28px;line-height:1.85;font-size:15px;overflow-y:auto;flex:1;overflow-x:hidden;word-wrap:break-word}
@media(max-width:768px){.viewer-content{padding:14px 16px}}
.placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;text-align:center;padding:20px}

/* MARKDOWN STYLES */
.viewer-content h1{font-family:'Share Tech Mono',monospace;font-size:clamp(1rem,4vw,1.3rem);color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px;margin:24px 0 12px;letter-spacing:2px;word-break:break-word}
.viewer-content h2{font-family:'Share Tech Mono',monospace;font-size:clamp(.9rem,3.5vw,1rem);color:var(--accent3);margin:20px 0 10px;letter-spacing:1px}
.viewer-content h3{font-size:clamp(.85rem,3vw,.95rem);color:var(--yellow);margin:16px 0 8px;font-weight:700}
.viewer-content h4{font-size:.9rem;color:var(--orange);margin:12px 0 6px}
.viewer-content p{margin-bottom:10px;color:var(--text);font-size:clamp(13px,3.5vw,15px);word-wrap:break-word}
.viewer-content code{background:rgba(0,217,255,0.07);color:var(--accent3);padding:2px 6px;border:1px solid rgba(0,217,255,0.15);font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:2px;word-break:break-all}
.viewer-content pre{background:#020509;border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 14px;margin:12px 0;overflow-x:auto;border-radius:2px;max-width:100%}
.viewer-content pre code{background:none;border:none;padding:0;color:var(--accent3);font-size:11px;display:block;white-space:pre;word-break:normal}
.viewer-content ul,.viewer-content ol{padding-left:18px;margin-bottom:10px}
.viewer-content li{margin-bottom:4px;color:var(--text);font-size:clamp(13px,3.5vw,15px)}
.viewer-content li::marker{color:var(--accent)}
.viewer-content strong{color:var(--accent);font-weight:700}
.viewer-content em{color:var(--yellow);font-style:normal}
.viewer-content blockquote{border-left:3px solid var(--accent2);padding:8px 14px;margin:12px 0;color:#aaa;background:rgba(255,62,108,0.04)}
.viewer-content hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.viewer-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;display:block;overflow-x:auto}
.viewer-content th{background:rgba(0,217,255,0.08);color:var(--accent);padding:6px 10px;border:1px solid var(--border);text-align:left;font-family:'Share Tech Mono',monospace;font-size:10px;white-space:nowrap}
.viewer-content td{padding:6px 10px;border:1px solid var(--border);color:var(--text);font-size:12px}
.viewer-content tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.viewer-content a{color:var(--accent);text-decoration:none;border-bottom:1px dashed rgba(0,217,255,0.4);word-break:break-all}
footer{position:relative;z-index:2;border-top:1px solid var(--border);padding:12px 16px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
footer span{color:var(--accent2)}
</style>

<script>
var NOTES = [{"name": "APT BASIC", "content": "# Advanced Package Tool (APT)\n\nThe Advanced Package Tool (APT) is a high-level package management system used in Debian-based Linux distributions, including Ubuntu, Kali Linux, and Raspberry Pi OS. It provides an easy interface to interact with the dpkg package manager and handles dependency resolution automatically.\n\n## Common apt Commands\n\n### 1. Update the Package List\nBefore installing or upgrading packages, always update the package list:\nsh\napt update\n\nThis fetches the latest package information from the repositories.\n\n### 2. Upgrade Installed Packages\nTo upgrade all installed packages to their latest versions:\nsh\napt list --upgradable\napt upgrade -y\n\nTo perform a full upgrade (includes removing obsolete packages if necessary):\nsh\napt full-upgrade -y\n\nTo upgrade the entire system, similar to apt upgrade, but with the added ability to handle dependency changes and remove obsolete packages:\nsh\napt dist-upgrade -y\n\n\n### 3. Install a Package\nonly install for local users\n\nTo install a package:\nsh\napt install package_name -y\n\nExample:\nsh\napt install nginx\nif packaage not install first chalao=\napt-get -f install\n\n\n### 4. Remove a Package\nTo remove a package but keep its configuration files:\nsh\napt remove package_name -y half package nam\n\n\nExample:\nsh\napt remove nginx\n\nTo remove a package along with its configuration files:\nsh\napt remove --purge package_name -y\n\n\n### 5. Remove Unused Packages\nTo remove packages that were automatically installed as dependencies but are no longer needed:\nsh\napt autoremove -y\n\n\n### 6. Show Package Information\nTo display detailed information about a package:\nsh\napt show package_name\n\nExample:\nsh\napt show nginx\n\n\n### 7. List Installed Packages\nTo list all installed packages:\nsh\napt list\napt list --installed\napt list --installed | wc -l\n\n\n### 8. Find Dependencies of a Package\nsh\napt depends package_name\n\nExample:\nsh\napt depends nginx\n\n\n### 9. Clean the Cache (/var/cache/apt/archives/)\nsh\napt autoclean\n\n\n### 10. Reinstall a Package\nTo reinstall a package without removing its dependencies. This is useful when a package is corrupted or misconfigured:\nsh\napt reinstall package_name\n\n# 11. download a package-\nto download a package direct by apt command\napt download packagename\n\n# 12. for recursive dependencies-\ndependencies ke andar dependencies\napt rdepends package_name\n# 13.for show source of package-\n  . package kha se aaya usko dekhna hai\n  apt showsrc\n# 14. for source download-\napt source\n# 15. for check detail about all version of package-\napt changelog\n\n\n#apt-file updatee- for file update\n#apt-file search - for file search\n#apt-get clean - for clean cache\n\n# other for languages--\n to install python packagee==\n#pip install package name\nto install java package==\n#npm install package\nto install ruby packages==\n#gem install package\n\n## Fixing Common APT Errors\n\n### 1. Fix Broken Dependencies\nsh\napt --fix-broken install\n\n\n### 2. Force Reconfiguration of Packages\nsh\ndpkg --configure -a\n\n\n### 3. Unlock APT When Another Process is Using It\nsh\nrm /var/lib/dpkg/lock\nrm /var/lib/dpkg/lock-frontend\n\n\n## Managing APT Repositories (/etc/apt/sources.list)\nThe /etc/apt/sources.list file contains a list of software repositories from which APT fetches packages. You can edit this file to add or modify repositories.\n\n### Useful Sources List Generators\n- [SimplyLinux Debian Generator](https://debgen.simplylinux.ch/)\n- [Debian Sources Generator (GitHub)](https://debgen.github.io/)\n- [Debian Wiki on Sources List](https://wiki.debian.org/SourcesList)\n\n### Editing the sources.list File\nTo edit the sources list:\nsh\nvim /etc/apt/sources.list\n\nExample:\n*Default Debian 12 (Bookworm) Sources List:*\nsh\ndeb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware\ndeb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware\ndeb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware\n\n\n### Fixing Issues with sources.list\nEnsure you have the correct Debian version in /etc/os-release:\nsh\ncat /etc/os-release\n\nReplace bookworm with your version (e.g., bullseye, buster) in sources.list.\n\nIf GPG signature errors appear, add missing keys:\n```sh\napt-key adv --keyserver keyserver.ubuntu.com --recv-keys KEY_ID\n"}, {"name": "CONFIGURATION OF YUM", "content": "YUM, or Yellowdog Updater Modified, is ==a free, open-source tool for managing packages on Linux systems==. It's a command-line utility that uses the RPM package manager to install, update, and remove software packages. \n\nHow it works\n\n- YUM uses software repositories, or repos, to search for packages. Repos are directories that contain collections of software packages. \n- YUM automatically resolves dependencies when installing, updating, or removing packages. \n\n- YUM works with online repositories, but users can also store their own packages in a local repository. \n\nWhy it's useful YUM simplifies package management, YUM makes it easy to manage dependencies, and YUM automatically updates package\n# practical portion- offline yum configuration or offline repo\nfor use of offline yum in intranet network \ninsert iso\nmount in location location from sr0\ndf -h\nlocation location pe jake appstrem ke andar packages rehnge wo package dependencies resolve karte hai\nab unki dependencies puch lo aur unka ek databasse bana lo \npehle mnt ki andar mount karo then usko jo folder banaya uske andar copy \nthen ab umount karwa do mnt  ko\nab folder ke andar jake database bana do\ncreate repo help karega data base banane me \ncreaterepo -v --database ab location kha banana hai\ncreaterepo packages ke pass jake unki dependencies puchta hai\nab /etc/yum.repos.d me jake packages hata do wo jab online yum chalate hai jab use hota hai\nab wha pe jake ek new repo bana do aur file url me jha database banaya hai uski location de do\nyum repollist all se bata dega koi repo aur toh nhi\nyum clean all se pehli sari repos ka data clear\nyum repolist all se changes repo ke enable kar deta'\nyum list available se kitte packages all\n jo repo banate hai hum usme \n 1. repo id\n 2. repo name\n 3. bash url jha hamne repo rakhi hai\n 4. gpgcheck -0 isliye diya ki wo package ki itegrity ko check na karw\nab chalao yum install package name toh ye offline database se answer dega'\nyum install vim , nmap , bind, firemox  offline me package hoga wha se answer dega\npackage ka nam nhi mile toh grep kar lo"}, {"name": "DNF COMMANDS", "content": "# DNF Configuration on CentOS 9\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#dnf-configuration-on-centos-9)\n\nDNF (Dandified YUM) is the modern package manager for RPM-based systems, replacing YUM with improved performance, enhanced dependency management, and modular support. Below is a quick-reference guide for basic and advanced DNF usage on CentOS 9.\n\n---\n\n# Using DNF\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#using-dnf)\n\nDNF improves upon YUM with better performance, enhanced dependency resolution, and support for modular content. Below are DNF commands organized by category.\n\n---\n\n## DNF Configuration Files\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#dnf-configuration-files)\n\n\"DNF configuration (both online and offline) follows the same approach as YUM. For more details, please refer to [YUM-Configure-Offline.md](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/YUM-Configure-Offline.md) and [YUM-Configure-Online.md](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/YUM-Configure-Online.md).\"\n\nDNF uses two primary types of configuration files:\n\n1. Global Configuration ( /etc/dnf/dnf.conf )\n    \n    - Defines overall DNF settings such as GPG signature checks, kernel package retention limits, and whether to remove unused dependencies automatically.\n2. Repository Configuration ( /etc/yum.repos.d/*.repo )\n    \n    - Each .repo file describes one or more software repositories, including their base URL, GPG settings, and whether they are enabled.\n\n---\n\n## Basic DNF Commands\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#basic-dnf-commands)\n\n• Install a Package:\n\n```\ndnf install package-name\n```\n\nInstalls the specified package (plus any required dependencies).\n\n• Remove a Package:\n\n```\ndnf remove package-name\n```\n\nUninstalls the specified package from your system.\n\n• Update Packages:\n\n```\ndnf update\n```\n\nChecks for available updates and installs them for packages currently installed.\n\n• Search for Packages:\n\n```\ndnf search keyword\n```\n\nFinds packages whose names or descriptions match the specified keyword.\n\n• List Installed Packages:\n\n```\ndnf list installed\n```\n\nDisplays all packages currently installed on the system.\n\n• Get Package Information:\n\n```\ndnf info package-name\n```\n\nShows detailed metadata (version, repository, size) about a specified package.\n\n---\n\n## Advanced DNF Commands\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#advanced-dnf-commands)\n\n• List Package Dependencies:\n\n```\ndnf deplist package-name\n```\n\nShows all dependencies required by the package.\n\n• Download a Package without Installing:\n\n```\ndnf download package-name\n```\n\nRetrieves the RPM file locally without installing it.\n\n• Reinstall a Package:\n\n```\ndnf reinstall package-name\n```\n\nReinstalls a package to restore missing or corrupted files.\n\n• Clean DNF Cache:\n\n```\ndnf clean all\n```\n\nRemoves cached package data and metadata.\n\n• Distribution Synchronization:\n\n```\ndnf distro-sync\n```\n\nEnsures installed packages match versions in the repositories; can upgrade, downgrade, or reinstall as needed.\n\n• Automatic Removal of Unused Dependencies:\n\n```\ndnf autoremove\n```\n\nRemoves previously installed packages no longer required by any installed software.\n\n---\n\n## DNF Groups\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#dnf-groups)\n\nDNF can install groups of packages categorized under a common purpose.\n\n• List Available Groups:\n\n```\ndnf group list\n```\n\nDisplays all package groups available for installation.\n\n• Install a Group:\n\n```\ndnf groupinstall \"Group Name\"\n```\n\nInstalls all packages in a specified group.\n\n• Remove a Group:\n\n```\ndnf groupremove \"Group Name\"\n```\n\nRemoves packages associated with that group.\n\n---\n\n## Modular Content Management\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#modular-content-management)\n\nDNF supports module streams, allowing multiple versions of the same software to coexist.\n\n• List Available Modules:\n\n```\ndnf module list\n```\n\nDisplays modules and their available streams.\n\n• Enable a Module Stream:\n\n```\ndnf module enable module-name:stream\n```\n\nActivates a particular stream version for a module.\n\n• Install a Module:\n\n```\ndnf module install module-name\n```\n\nInstalls module content from the chosen stream.\n\n• Disable a Module:\n\n```\ndnf module disable module-name\n```\n\nDeactivates the currently enabled stream for a module.\n\n• Reset a Module:\n\n```\ndnf module reset module-name\n```\n\nClears any enable/disable state, returning the module to its default settings.\n\n---\n\n## DNF Plugins\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#dnf-plugins)\n\nPlugins extend DNF’s functionality.\n\n• List Installed Plugins:\n\n```\ndnf debuginfo-status\n```\n\n(Actual output may vary based on installed packages.)\n\n• Install a Plugin:\n\n```\ndnf install dnf-plugins-core\n```\n\nInstalls a collection of core plugins for DNF.\n\nSome useful plugins include:\n\n- dnf-automatic: Automate updates.\n- dnf-versionlock: Lock specific package versions.\n- dnf-download: Download packages without installing.\n\n---\n\n## Transaction History and Rollback\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#transaction-history-and-rollback)\n\nDNF maintains a history of transactions, allowing you to view past actions and undo them if needed.\n\n• View Transaction History:\n\n```\ndnf history\n```\n\nDisplays a chronological list of installs, updates, and removals.\n\n• View Details of a Transaction:\n\n```\ndnf history info transaction-id\n```\n\nShows the actions taken in a specific transaction.\n\n• Undo a Transaction:\n\n```\ndnf history undo transaction-id\n```\n\nAttempts to revert changes from a specific transaction (limited by dependency complexities).\n\n---\n\n## Troubleshooting DNF\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#troubleshooting-dnf)\n\n### Clearing Cache and Metadata\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#clearing-cache-and-metadata)\n\n• Clean Cache:\n\n```\ndnf clean all\n```\n\nRemoves cached package and metadata files.\n\n• Rebuild Metadata Cache:\n\n```\ndnf makecache\n```\n\nDownloads fresh metadata from enabled repositories.\n\n### Resolving Dependency Issues\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#resolving-dependency-issues)\n\n• Check for Broken Dependencies:\n\n```\ndnf check\n```\n\nVerifies installed packages for unsatisfied dependencies.\n\n• Attempt to List Unsatisfied Dependencies:\n\n```\ndnf repoquery --unsatisfied\n```\n\nShows packages that have missing dependencies.\n\n### Verifying Package Integrity\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#verifying-package-integrity)\n\n• Verify Installed Packages:\n\n```\nrpm -Va\n```\n\nChecks installed files for discrepancies like size, MD5 sums, and permissions.\n\n• Reinstall Corrupted Packages:\n\n```\ndnf reinstall package-name\n```\n\nRestores missing or altered package files.\n\n### Network and Repository Connectivity\n\n[](https://github.com/InfoSecWarrior/Linux-Essentials/blob/main/DNF-Configuration-and-Commands.md#network-and-repository-connectivity)\n\n• Temporarily Disable a Slow or Unresponsive Repository:\n\n```\ndnf --disablerepo=repo-id ...\n```\n\nSkips specified repository(ies) for the current command.\n\n• Importing GPG Keys:\n\n```\nrpm --import /path/to/RPM-GPG-KEY\n```\n\nAdds a GPG public key to verify package signatures."}, {"name": "DPKG BASIC", "content": "Dpkg\" stands for \"Debian Package\" and is ==the core package manager used in the Debian Linux distribution and its derivatives like Ubuntu==, essentially allowing users to install, remove, build, and manage software packages on their system through the command line, primarily working with files in the \".deb\" format; it's considered a low-level tool, meaning other programs like \"apt\" often sit on top of it to provide a more user-friendly interface for package management.  \n\n\nuse in debian based operating system\nused as package manager in debian like operating system\n.deb file system used in debian like operating system\nos -relaease file check kzr lo\n# commands-\n     #dpkg --help\n     \n     #dpkg -l = all packages list use wc -l\n     \n    #dpkg -s package name == query package ki     \n    \n    #dpkg -L package name== list of ffile of packages\n    \n    #dpkg --contents package name  ===  for non install packages query\n         or \n         dpkg-deb -c then package name  same output\n         \n     # first apt-get -f install for fix broken\n     \n    #dpkg -i package name == installation of package  u\n   \n     only install for local users \n      \n      aur koi dikkat aai toh fixed dependecies\n       apt-get -f install\n          apt --fix-broken install\n          \n    #dpkg -r package  name adaha hi  == remove of package \n    \n    #dpkg --verify package name == install package ko verify karega\n    \n    #dpkg -p then package name == sabhi files hataiga , configuration file bhi hata dega\nfiles gayab ho gai kisi package ki toh ab unhee wapas lana ho toh\n\n    #dpkg-deb -xv then package name then jha rakhna hai wha ki location  \n    \n    #dpkg -S then file name - toh wo file kis package ke sath aai hai wo bafaigi\nlink hogi toh  dikkat aayegi toh link ke lasst tak jao phir dekho\n\n    #dpkg --query package name - for query of packagees\n    \n    #dpkg -reconfigure packagenamee == reconfigur of installed packagees\n    \n    #dpkg --configure -a == package is an  bad consistent state\n    \n# isme dependencies ki dikkat aayegi toh hum apt use karenge\n\n"}, {"name": "LIBRA OFFICE AND APACHE OPEN OFFICE", "content": "# libraoffice-\n\t practical in GUI\n     libra office = ms officee of windows  \n     wget  practical in GUI\n     libra office = ms officee of windows  \n    wget  practical in GUI\n     libra office = ms officee of windows  \n    wget  practical in GUI\n     libra office = ms officee of windows  \\\n         wget -https://download.documentfoundation.org/libreoffice/stable/25.2.0/rpm/x86_64/LibreOffice_25.2.0_Linux_x86-64_rpm_helppack_en-US.tar.gz.torrent\n     rpm -ql then package name se jo files aai hai wo dekh lo\n    sari fils rpms me milengi\n     ab sari ki sari files ko install karna hai aur sari .rpm me hai toh\n    rpm -ivh *.rpm\n     then libra office install\n     ab graphic me libra office dikhega\n    then unistall =\n     ab ek ek hataoge toh dependencies ki dikkat aayegi\n    isliye libobasic ko rpm -qa | grep libobasis\n     aur libroffice then tr karke \" \\n \" \" \" \n    rpm -qa | grep -E \"libreoffice|libobasis\" | tr \"\\n\" \" \" then ab puri line by line packages milega\n    then rpm -evh then pure package\n# apache open office-\napache server install karna hai wget se\nwget https://sourceforge.net/projects/openofficeorg.mirror/files/4.1.15/binaries/en-US/Apache_OpenOffice_4.1.15_Linux_x86-64_install-rpm_en-US.tar.gz/download\ntar -xvf then file name\nthen ab en-us ke nam ka folder banega\nRPMS KE andar files milegi\nab inka packaage .rpm me hai toh ab\nrpm -ivh * .rpm\n thn ab menu me nhi dikhega gui me\n ab lana ho toh desktop integration me noarch file ko install karo\n rpm -ivh openoffice4.1.15-redhat-menus wali file install kar lo\n ab wo gui me dikhega\n display se hatana ho toh rm -rf en-us delete kar do \n ab whi process se hata do \n rpm -qa | grep openoffice | tr \"\\n\" \" \"\n then rpm -evh then pure package name \n# kisi package se ek aadi file delete ho jaye toh-\nrpm  -qlp package name\nrpm2cpio then package name\nrpm2cpio packagename  | cpio -idmv\nrp to cpio phir us cpio ko dump karwa liya\nab wo package jha jha file place karna chahta tha wo files un folder ke sath le ayega\n# ab kisi iso file ko mnt karwana hai toh-\nwget se iso download kar lo\nfile then package name deke toh uska filetype aayega\nthen mount - mount -t then filetype thn file name /location jha mount karna hpo\nthen ab umount kar do jha mnt kiya hai\n"}, {"name": "PACKAGE MANAGMENT BASIC", "content": "Package management: \n\nPackage Managers are used to handle software installation, removal, and updates.  \n\nHere are the two most widely used package managers: \n\n- RPM \n    \n    - YUM , DNF \n        \n- DPKG \n    \n    - APT \n        \n\n1. Red Hat Package Manager (RPM) \n\n- RPM is the default package manager for Red Hat-based distributions, such as RHEL (Red Hat Enterprise Linux), CentOS, Fedora, and others. \n    \n\n- It is an open packaging format that can be used on multiple Linux and UNIX systems, not just Red Hat-based ones. \n    \n\n- File Extension: RPM packages end with the . rpm extension. \n    \n\n- Usage: \n    \n    - RPM is used for installing, uninstalling, upgrading, querying, listing, and checking RPM packages on Linux systems. \n        \n    - It can handle software packages, documentation, and source code. \n        \n\n- Two Types of RPM Files: \n    \n\n- RPM (Binary RPM): Contains the compiled version of the application or libraries. \n    \n- SRPM (Source RPM): Contains the source code for the application. These are typically used for compiling the application from source on your system. \n    \n\n- Common commands : \n    \n\n|   |   |\n|---|---|\n|Install a package:|#rpm -i package. Rpm|\n|Remove a package:|#rpm -e package-name|\n|Query package:|#rpm -q package-name|\n|Verify installed package:|#rpm -V package-name|\n|List all installed packages:|#rpm -qa|\n\n- Architecture Types: \n    \n    i386: For 32-bit systems. \n    \n    x86_64: For 64-bit systems. \n    \n    noarch: For platform-independent software, i.e. , it can run on any architecture. \n    \n\n- Contents of RPM Packages: \n    \n    - The application or libraries to be installed. \n        \n    - Documentation, such as man pages and other manuals. \n        \n    - Configuration files associated with the application. \n        \n    - SPEC File: A file with a . spec extension, which provides the instructions for creating the RPM package. It contains metadata about the package, such as its version, dependencies, and installation scripts. \n        \n\n- RPM Database: \n    \n    - The installation status of RPM packages is tracked in the RPM database, which is stored in the directory /var/lib/rpm  \n        \n    - This database contains information about the packages installed on the system, their version, and other metadata. \n        \n\n- Packages name format : \n    \n    - Filenames include the package name, version, release, architecture, and sometimes the distribution version. \n        \n    - Example: \n        \n        nginx-1.20.O-1.et7.ngx.x86_64. rpm (for Nginx in CentOS) \n        \n        httpd-2.4.6-93.et7.centos.x86 64. rpm (for the Apache web server in CentOS) \n        \n        - httpd: \n            \n             This is the name of the package. In this case, it refers to Apache HTTP Server, a popular web server software. \n            \n        - 2.4.6: \n            \n             This represents the version of the package. Here, it indicates that this is version 2.4.6 of the Apache HTTP Server. \n            \n        - 93:  \n            \n            This is the release number of the package. The release number indicates how many times the package has been repackaged or modified for the given version. In this case, it is the 93rd build or release for version 2.4.6. \n            \n        - et7: \n            \n             This part indicates the distribution and version for which the package is built. et stands for Enterprise Linux,which refers to RHEL (Red Hat Enterprise Linux) and its derivatives (tike CentOS, Oracle Linux, etc.). 7 indicates the version of the operating system. So, e17 refers to a package built for RHEL/CentOS 7. \n            \n        - centos: \n            \n            This part indicates that the package is specifically built for the CentOS distribution, which is a community-driven project based on RHEL. \n            \n        - x86_64: \n            \n             This indicates the architecture of the package. x86_64 means the package is built for a 64-bit architecture. This is the standard architecture for modern systems. \n            \n        - . rpm:  \n            \n            This is the file extension that indicates the file is an RPM package. The . rpm format is used by RPM-based Linux distributions for packaging software .1 \n            \n        \n\n- YUM/DNF: These are front-end toots built on top of RPM for easier package management, especially for resolving dependencies . \n    \n\n- Install a package: sudo yum install package-name or dnf install package-name \n    \n- Update all packages: sudo yum update or sudo dnf update \n    \n\n2. Debian Package Manager (dbkd) \n\n- dpkg is the default package manager for Debian-based distributions, such as Debian itself, Ubuntu, and others. \n    \n\n- Fite format: \" . deb\" \n    \n\nCommon commands: \n\n|   |   |\n|---|---|\n|Install a package:|#dpkgl -i package.deb|\n|Remove a package:|#dpkg -r package-name|\n|List installed packages:|#dpkg -l|\n|Query package:|#dpkg -s package-name|\n|Fix broken dependencies:|#apt-get install -f|\n\n|   |   |\n|---|---|\n|Debian based OS : which has dpkg|blackbox , arch , parot , kali, debian , ubuntu, etc|\n\n- APT :  APT (Advanced Package Toot) is a higher-level package management tool for Debian-based systems, simplifying the installation, upgrading, and removal of packages. \n    \n\n- Install a package: sudo apt install package-name \n    \n- Update package list: sudo apt update \n    \n- Upgrade installed packages: sudo apt upgrade"}, {"name": "PACKAGE MANGEMNT QUERY", "content": "debian me bhi rpm chala saakte aur rhel me dpkg chala sakte hai jab jiski jarurat ho\ncat /etc/os-release me jake os info le sakte hai\nuname -a sse bhi le sakte hai\n/var/lib/rpm me jake dekh sakte hai konse konse package installl ha \n# rpm commands=\n[rpm --version] for version\n[rpm --help] for help\n#query - \n1.  [rpm -q] then package name - ki ye package install hai ki nhi                                 ab isme dikkat hai ki har packagee ka pura nam dena padega isliye hum\n2. [rpm -qa ] - har package jo install hai usme dhundega\n3. total package kitne install hai  [rpm -qa | wc -l]\n4. [rpm -qa --last] abhi kuch install kara hai wo aayega\n5. [rpm -qa | grep jo packet chaiye wo]\n6. [rpm -qi ] for information\n7. openssh vim googlechrome packageme dekh lo\n8. install package me .rpm nhi likha aata\n9. [rpm -ql package name] uske sath konse konse paccklages aai aur kha place karne ke bad sare packages update ho jaenge\n# yum group-\n#um groups\" refers to ==a feature within the \"yum\" package manager (Yellowdog Updater Modified) on Linux systems, where a collection of related software packages are grouped together, allowing users to install or manage a set of packages as a single unit instead of individually installing each package== \n# commands-\nyum groups - kitne group hai\nyum group list - kon konse hai'\nyum group install \" then group name\" - particular group install karna ho toh\njaise ab minimal ko gui banana hai toh genome desktop enviroment install kar lo\nuske bad\n#systemctl get-default\n#systemctl set-default graphical target \n#systemctl isloate  graphical.target\nyum group info group name= info dega'\nyum group remove \" group name\"= remove kr dega\nsystem tool aur development tools install'\nagli  bar waps gui chaiye toh start + x command\nvim .zsh.bash install kar lo'\n# in the case of exe files run in linux-\nwe use wine\nwine - windows ka enviroment bana deta hai phir hum exe ko run kar pai\nwo exe run kar sakte ho jinpe dependencies na ho\nyum install wine\nthen yum install wine --skip-broken\nnhi ho toh by dnf try kar lo\ndnf  config-manager --set -enabled crb = conflict manager on kiya iise\ndnf install wine \nab gui me dikhega \nyum install firefox\ngui me jake firefox me tab bhi koi package install na ho toh wo wine se nhi hoga\n\n\n"}, {"name": "Yum online  repo and commands", "content": "yum repolist se kon si repo hai aur usme kya hai bata dega\n yum.repos.d me jakee vim centos.repo or centos -addons.repo yaha sare repos dikh jayenge\n  mirror - jha se packages download karte hai\n  ye sab offical repos hai yum repolist se dekh lo\n  ab unoffical add karenge\n#ISLIYE KAR RE KI PACKAGE DOWNLOAD hum intranet network me bhi kar pai= \n# EPEL  --\n  EXTRA PACKAGE FOR ENTERPRISE LINUX \n  ye packages ka database deta\n  https://dl.fedoraproject.org/pub/epel/\n  yaha se databasee file utha lo\n   rpm -ivh [epel- che bana dega\ncache cd /var/cache/dnf me banega\nyum history -- se history\n\n\n\n\n"}];
var isMobile = window.innerWidth <= 768;

window.addEventListener('resize', function() { isMobile = window.innerWidth <= 768; });

function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('viewer').classList.add('hidden');
}

function showViewer() {
  if (isMobile) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('viewer').classList.remove('hidden');
  }
}

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'PACKAGE MANAGEMENT/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
  showViewer();
}

window.onload = function() {
  buildSidebar();
  if (!isMobile && NOTES.length > 0) openNote(0);
};
</script>
