<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c10;--surface:#0d1117;--border:#1e2d3d;--accent:#00d9ff;--accent2:#ff3e6c;--accent3:#39ff14;--text:#c9d1d9;--dim:#586069;--yellow:#ffd700;--orange:#ffa500}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,217,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scanline{position:fixed;top:-100%;left:0;width:100%;height:2px;background:linear-gradient(transparent,rgba(0,217,255,0.1),transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:1}
@keyframes scan{to{top:110%}}

/* TOPBAR */
.topbar{position:relative;z-index:2;background:#0a0e15;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.back-btn{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;text-decoration:none;border:1px solid rgba(0,217,255,0.3);padding:5px 12px;letter-spacing:1px;white-space:nowrap}
.breadcrumb{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.breadcrumb em{color:var(--accent);font-style:normal}

/* HEADER */
.page-header{position:relative;z-index:2;padding:20px 16px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0a0e15,#0d1117)}
.folder-icon{font-size:2rem;display:block;margin-bottom:6px}
.folder-title{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,5vw,1.8rem);color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.folder-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}
.folder-meta em{color:var(--accent3);font-style:normal}
.search-row{margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);padding:8px 12px}
.search-row::before{content:'⌕';color:var(--accent);font-size:1rem}
.s-input{background:none;border:none;outline:none;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:12px;width:100%;caret-color:var(--accent)}
.s-input::placeholder{color:var(--dim)}

/* DESKTOP: side by side */
.layout{position:relative;z-index:2;display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 160px)}

/* MOBILE: stack vertically */
@media(max-width:768px){
  .layout{display:flex;flex-direction:column}
  .sidebar{
    max-height:none !important;
    height:auto;
    position:relative !important;
    border-right:none;
    border-bottom:1px solid var(--border);
  }
  .sidebar.hidden{display:none}
  .viewer{display:flex;flex-direction:column}
  .viewer.hidden{display:none}
  .mobile-back-btn{display:flex}
  .viewer-content{padding:16px;word-wrap:break-word;overflow-wrap:break-word}
  pre{overflow-x:auto;max-width:100%}
  table{display:block;overflow-x:auto;max-width:100%}
}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:#0a0e15;overflow-y:auto;position:sticky;top:0;max-height:calc(100vh - 110px)}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#1e2d3d}
.sidebar-head{padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:3px;background:#080c10;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-head span{color:var(--accent3)}
.file-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:flex-start;gap:8px;transition:all .15s;color:var(--dim)}
.file-item:hover{background:rgba(0,217,255,0.05);color:var(--text)}
.file-item.active{background:rgba(0,217,255,0.08);color:var(--accent);border-left:2px solid var(--accent)}
.fi-icon{font-size:10px;margin-top:3px;flex-shrink:0;color:var(--accent2)}
.fi-name{font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.5;text-transform:capitalize;word-break:break-word}

/* MOBILE BACK BUTTON (inside viewer) */
.mobile-back-btn{display:none;align-items:center;gap:8px;padding:10px 14px;background:#080c10;border-bottom:1px solid var(--border);cursor:pointer;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px}
.mobile-back-btn:hover{background:rgba(0,217,255,0.05)}

/* VIEWER */
.viewer{display:flex;flex-direction:column;min-height:300px}
.viewer-bar{background:#080c10;border-bottom:1px solid var(--border);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.v-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.vd-r{background:#ff5f56}.vd-y{background:#ffbd2e}.vd-g{background:#27c93f}
.v-path{color:var(--text);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 60px)}
.viewer-content{padding:24px 28px;line-height:1.85;font-size:15px;overflow-y:auto;flex:1;overflow-x:hidden;word-wrap:break-word}
@media(max-width:768px){.viewer-content{padding:14px 16px}}
.placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;text-align:center;padding:20px}

/* MARKDOWN STYLES */
.viewer-content h1{font-family:'Share Tech Mono',monospace;font-size:clamp(1rem,4vw,1.3rem);color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px;margin:24px 0 12px;letter-spacing:2px;word-break:break-word}
.viewer-content h2{font-family:'Share Tech Mono',monospace;font-size:clamp(.9rem,3.5vw,1rem);color:var(--accent3);margin:20px 0 10px;letter-spacing:1px}
.viewer-content h3{font-size:clamp(.85rem,3vw,.95rem);color:var(--yellow);margin:16px 0 8px;font-weight:700}
.viewer-content h4{font-size:.9rem;color:var(--orange);margin:12px 0 6px}
.viewer-content p{margin-bottom:10px;color:var(--text);font-size:clamp(13px,3.5vw,15px);word-wrap:break-word}
.viewer-content code{background:rgba(0,217,255,0.07);color:var(--accent3);padding:2px 6px;border:1px solid rgba(0,217,255,0.15);font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:2px;word-break:break-all}
.viewer-content pre{background:#020509;border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 14px;margin:12px 0;overflow-x:auto;border-radius:2px;max-width:100%}
.viewer-content pre code{background:none;border:none;padding:0;color:var(--accent3);font-size:11px;display:block;white-space:pre;word-break:normal}
.viewer-content ul,.viewer-content ol{padding-left:18px;margin-bottom:10px}
.viewer-content li{margin-bottom:4px;color:var(--text);font-size:clamp(13px,3.5vw,15px)}
.viewer-content li::marker{color:var(--accent)}
.viewer-content strong{color:var(--accent);font-weight:700}
.viewer-content em{color:var(--yellow);font-style:normal}
.viewer-content blockquote{border-left:3px solid var(--accent2);padding:8px 14px;margin:12px 0;color:#aaa;background:rgba(255,62,108,0.04)}
.viewer-content hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.viewer-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;display:block;overflow-x:auto}
.viewer-content th{background:rgba(0,217,255,0.08);color:var(--accent);padding:6px 10px;border:1px solid var(--border);text-align:left;font-family:'Share Tech Mono',monospace;font-size:10px;white-space:nowrap}
.viewer-content td{padding:6px 10px;border:1px solid var(--border);color:var(--text);font-size:12px}
.viewer-content tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.viewer-content a{color:var(--accent);text-decoration:none;border-bottom:1px dashed rgba(0,217,255,0.4);word-break:break-all}
footer{position:relative;z-index:2;border-top:1px solid var(--border);padding:12px 16px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
footer span{color:var(--accent2)}
</style>
</head>

o group and manage objects. It can be used to delegate administrative rights, assign Group Policy settings, and organize objects for easier management.\n- **Key Features:**\n    - OUs are used to organize users, groups, and computers within a domain.\n    - adds give single point access\n    - single sign on bhi deta\n    - group policy bhi deta\n\n\n 1. ### 4. **Domain**\n\n- A **domain** is a logical group of network objects, such as users, computers, and devices, that share the same AD database. It is a core unit in the AD hierarchy.\n- **Key Features:**\n    - Each domain has its own security policies, such as user authentication and authorization.\n    - A domain has a unique DNS name, such as `example.com`.\n    - Domains have Domain Controllers (DCs) that store a copy of the AD database.\n\n\n    - #physical componennts of adds=\n    - domain controller [dc] \n    - server that store add data and provide authentication and authorization services\n    - every  dcc holds a writeable copy of ad data base \n    - kisi server me ek se jyada dc ho sakte hai\n    - #global catalog - database hota hai contain karta hai searchable objects ka index aur usse forest me rakhta hai\n    - #read only domain controller- \n    - a domain controller jiske pass  read only copy ho add databse ki\n    - #site - represent physical structure of network\n    - #replication - sycronize database of add\n    - #data store- adds ka data ntds.dit me save hota hai\n    - #end "}, {"name": "ADDS PANEL OPTIONS", "content": "user ko click karte hai jab -\nscope me jo policy us user me add hai wo dikhegi\ndetails me jake computer configuration ki and user configuration ki policy ko us user par lagne se enable disabled kar sakte hai\nsettings me jake policy dekh sakte hai konsi lagi hai konsi nhi\ndelegation me -  kis user ko edit karne ki permission deni hai kisko nhi \nstatus se kha ise link kiya hai wo bataiga\n# then right click on user-\nedit - se policy edit kar sakte hai\ngpu status - s e iso dalte hai wha se space allocated karo then computer management me jake disk management me jake partition banao dono ntfs aur fat ka\n\n2. NTFS-new technology file system \nTFS (New Technology File System) permissions ==control access to files and folders on Windows drives==. NTFS permissions are applied to all files and folders on a volume formatted with the NTFS file system. They are effective whether a file or folder is accessed locally or remotel\n2.1 has quata\n2.2 has security settings\n2.3 supports 16tb aur 16 eb single file in their storage \nlatest os me jake  pehle use iso dalte hai wha se space allocated karo then computer management me jake disk management me jake partition banao dono ntfs \nthen usme file dal ke dekh sakte ho through share  folder  \n#kisi bhi file ko permission allocate kari ho toh right click properties  then security advanced\n1. has acl [access control list] kon kon us folder ko access kar saakta hai\n2. has ownership jisne wo folder banaya administrator ownership change  kar sakta hai aur khud ko member bana ke hata bhi sakta hai \n3. owner us file me data rakhega toh sabko dikhega\n4. then hum use permissions allocate karenge ki owner hi dekh pai koi aur nhi whi se  add aur enable inheritance karke\n5. baki ko hata denge\nHere are some basic NTFS permission levels:\n\n- **Full Control**\n    \n    Users can add, change, move, and delete files and directories, and change permissions for them\n    \n\n- **Modify**\n    \n    Users can view and change files and their properties, but can't grant permissions to other users\n    \n\n- **Read and Execute**\n    \n    Users can read files and run executables, but can't change files and their properties\n    \n\n- **Read**\n    \n    Users can read files, their properties, and directories, but can't do anything else\n    \n\n- **Write**\n    \n    Users can write to a file, add files to a directory, and read files, but can't do anything else \n    \n\nNTFS permissions can be set to \"Allow\" or \"Deny\". There are also advanced NTFS permissions, which are more granular than the basic levels. \n\nNTFS permissions differ from share permissions, which only apply to shared folders when accessed across a network. \n\nTo see what permissions you're extending when sharing a file or folder, you can:\n\n- Right click on the file or folder\n\n- Go to Properties\n\n- Click on the Security tab"}, {"name": "FOLDER REDIRECTION AND SOFTWARE DEPLOYMENT POLICY", "content": "client ka data server pe dekhna ho toh is policy ka use karte hai\nserver pe jao folder banao uske share karo everyone ko with read and write permission the\njis client ka data centralized karna hai us pr folder redirecction policy lagao user configuration - policies-windows setting - folder redirection policy \nwha se jo bhi folders dikh rhe hai unko basic kar do  \nthen jo folder share kiya hai uski network location cmd me jake \\\\ip of server folder jo share kiya hai uski location root path me dal do\nthen gpudate /force\nthen ab jaise hi user login hoga uski profile server me banne lag jayegi pehle jo sirf client me banti thi wo  \nab us pc me local hardrive pe bhi prevention laga do\nab jo bhi data wo save karega wo network pe hoga  \njha jha wo device login hoga use milega\naur server ke pass bhi rahega\njisme data rakh ra wo user usko local admin se login karke permission full control  ki server ko de do toh wo bhi dekh payega\nuser use delete bhi kar sakta hai\nab then local admin ban karenge toh data koi nhi le ja sakta kyu ki wo network par  hai \n# software deployment policy -\nab admin chahta hai ki koi particular ap uske user ke pass ho toh wo is policy ka use karta hai\npehle toh koi bhi app user ke control panel ke network me nhi milega \nbut ab hum server pe msi [microsoft installer wale app] download karenge aur share folder me dalenge\nshare folder ki network location nikalne ke bad app ka nam ki location\nuser configuration - policies - software setting - software installation \nright click file name me network address  de denge  \nassign kar do ya publish\nthen gpupdate /force\nab application aa jayegi control panel ke program and feature ke network me\nab use install karenge toh run as admin hoga \noriginal locations pe install honge\nab w o use unistall nhi kar sakta jab tak server ne nhi hataya ho toh jha se policy  lagai thi wha jake apps ko right click karke remove kar do"}, {"name": "GROUP POLICY MANAGEMENT", "content": "defination - allow administrator to manage and configure os, application and settings across the active directory enviroment\n\n1. administrator se policy or settings lagaoge toh wo sab me enable hogi \n2. jaise mene control panel enabled kar diya wo admin me toh  band hoga but sare user me bhi hoga\n3. command [gpedit.msc]  for activate group policy \n4. administrator template  pe jake enabled disables kar sakte hai\n5. kisi particular setting ki ek setting bhi ban kar sakte hai\n6. ex - control panels me programme etc.\n7. differnce between user and computer configuration-\n7.1 yadi user oar lgainge  to wo user kisi dusri machine  par bhi log in hoga toh  uske  sare user me wo policies lag jaigi\n7.2 pure computer pe apply hogi new user login hoga uspe bhi\n#end"}, {"name": "GROUPS IN ADDS", "content": "#remote desktop group allows user to remotely connected to the host server command[mstsc]\nhow to add in remote desktop in user placed in remote desktop user\nek time pe ek se connection bana sakte hai   \ngive static ip to both windows  \nulta karna hai dusre windows se hamare users wale windows ka connection banana hai\nuser band karne pe connection break ho jata hai\n#event log =allow user to see in event files jaha se hum user banate hai\n#bacckup group =allow user to backup and restore file in today wo microsoft login mangega\n#guest -one time login ke liye hota hai isme bhi hum chije install kar sakte hai\nguest user settings pe nhi ja sakta normal user ja sakta hai\ncustamize background setting - guest \nIF YOU HAVE DNS INSTALLED THEN REMOVE\nTHEN ADD ADDS FEATURE ON SERVERS HAND\nAFTER ADD ENABLE PROMOTE THEN ADD FOREST GIVE SERVER 2016 FOR LATEST OS\nTHEN GIVE DOMAIN NAME \nGIVE DSRM PASSWORD\nNETBIOSNAME- WORK IN THE ABSENCE OF DNS TO COMMUNICATE HOSTS WITH NAME\nADDS AUTOMATICALLY INSTALL DNS WITH DYNAMIC DNS FEATURE\nADDS MADE  A FILE NTDS.DIT IN WINDOWS\nAFTER SUCCESSFULY INSTALL OF ADDS RESTART PC THEN NEW PROFILE SET OF ADINISTRATOR IN USER PROFILE\n SAM (SECURITY ACCESS MANAGER) =FILE ALSO WORKS IN THE CASE OF DECENTRALIZED WAY FOR ADDS LOCATION-CDRIVE -WINDOWS-SYSTEM32-CONFIGy\nCHECK DNS IF RECORDS ARE NOT COME\nTHEN REMOVE ADDS THEY WNAT TO DEMOTE S0 ENABLE \nTHEY WANT TO NEW ADMINISTRATOR PASSWORD\nAFTER AD REMOVE THEY REMOVE ADMNISTRATOR PROFILE ALSO \nAFTER ADDS REMOVE REMOVE DNS AND THEIR FIE ALSO\n#END\n"}, {"name": "OU AND THEIR USER HAVING POLICIES", "content": "forest - ek admi ki char company hai aur wo charo ke employee ko interconnected rehna ho toh unko forest me rakhenge\nab ek company ke 2 alg branches hai unke user ko interconnected rehna hai toh unhe domian tree me rakhenge\ndomain - core of ad contains group user computer etc\nbranch ke departments ou me jaynege\nab adds hatana ho toh hata do then jha join kara tha domain ko aur server ke admin ka password diya tha wha server ke kisi user ka bhi de sakte hai\nab me ou banunga server me jake domain  pe right click ou then usme user\nunko login karke dekh lo profile me jakee dekh lo \nthen server hand pe jake windows accesoris me group policy  then group policy  pe right click new then make policies aur us policy ko us ou pe move  karde then particular ou ke users pe multiple group policies lagainge aur check karenge \nthen jo policy banai hai uspe right click aur edit  policy laga do  alg alg \nserver me command de do gpupdate /force \n#end "}, {"name": "PERMISSIONS TO GROUP IN FILE SYSTEM", "content": "#jha se user ko permission dete hai wha se groups ko bhi de sakte hai-\n1. jis folder ko deni hai right click -properties- security  -advanced\nHere are some basic NTFS permission levels:\n\n- **Full Control**\n    \n    Users can add, change, move, and delete files and directories, and change permissions for them\n    \n\n- **Modify**\n    \n    Users can view and change files and their properties, but can't grant permissions to other users\n    \n\n- **Read and Execute**\n    \n    Users can read files and run executables, but can't change files and their properties\n    \n\n- **Read**\n    \n    Users can read files, their properties, and directories, but can't do anything else\n    \n\n- **Write**\n    \n    Users can write to a file, add files to a directory, and read files, but can't do anything else \n    \n\nNTFS permissions can be set to \"Allow\" or \"Deny\". There are also advanced NTFS permissions, which are more granular than the basic levels. \n\n#jha se allow karte hai wha se kisi parrticular group ke member ko access nhi dena hai toh deny kar do toh wo acess mhi kar sakta"}, {"name": "POLICY ON DOMAIN CONTROLLER AND DEFAULT DOMAIN", "content": "user experience inversely proportional to security \ngroup policy me jake \ndefault domain and domain controller policy hoga \n default domain  pe jake settings me policies dekh lo\nthen samjh \npassword policy=\npassword complexitiy account password age\njyada time doge toh hacker ko brute force attack karne me time lagega \nkam doge toh yad rakhna padega\npassword history means jo password dala hai use 15 din bad hi use kar sakte hai\nstore password during reversible encryption enable karoge toh jo password diya tha whi milega disable karoge toh encrypted  milega\naccount lockout policy = kitee attempts ke bad acc lock karna hai \naccount lockout duration kitte smay tak lock  rakhna hai \nadministrator account blocked kiya toh laude lage \ndomain admin hi ya local admin hi unlock kar sakta hai\nthen jis user pe lagai hai uspe right click account me jake enable kar do  toh wo unlock ho jayenge\nkerbos policy - uses kebros protocol uses ticket [service ki power]  ki kab tak valid rahega\n# then default domain controller  policy me -\nthen wha pe jake dekh lo padh lo policy \nex - kisko login karwai kisko nhi\n\n\n"}, {"name": "POWERUSER AND ADMININSTRATOR RESULT IN XP", "content": " 1. administrator - after the lost of main user password the  administrator allow to log in through administrator option\n2. in win11 do bar control alt del to login admin nhi de ra administrator ka option\n3. then power user=\n4. admin user se login then make user\n5. then admin se login kareneg\n6. then make user aur usko power user me dal do\n7. power user khud user bana sakta hai aur usko manage kar sakta hai but dusre ke banai user ko manage nhi kar sakta  \n8. power  user apne user ki profiles mee ja sakta hai\n#end \n\nno user created no password changes of others khud ka horas\ndusre ki directory me bhi nhi jara \n\n\n"}, {"name": "POWERUSERS AND ADMINISTRATOR IN WIN XP", "content": "1.power user - much more power than normal user but less than administrator only enable in windows xp\n2 . administrator -jab  kabhi  administrator user apna password bhul jaye toh wo administrator se login kar sakta hai \n3.power user work in the absence of account holder \n4.they only make users and operate only those users they make\n5.they donot operate the user or change password of another user and donot make yourself as the administrator group member\n6.after the windows xp no one have this feature \n7 . there are two parts of groups after domain joining before domain joining\nA Windows user group is a collection of user accounts that share similar privileges, permissions, and access rights to resources on a Windows operating system. User groups simplify management and administration by:\n\n1. Grouping users with similar needs and access requirements\n2. Assigning permissions and rights to the group rather than individual users\n3. Streamlining access control and security management\n\nCommon built-in Windows user groups include:\n\n1. Administrators: [captian]Full access and control over the system user delete move create the file  \n2. Users: Limited access, suitable for everyday users\n3. Guests: Restricted access, often used for temporary or limited access after logon and after logout they automatically delete the profile\n4. Power Users: [vicecaptain]Similar to administrators, but with some restrictions allows only enable windows xp \n5. Backup Operators: Ability to backup and restore files and folders regardless of their permission of files\n6. Network Configuration Operators: Ability to manage network settings \n7. remote desktop user: allows user and group to remotely connected to each other and host server they log on and log out the computers\n\nUser groups can be:\n\n1. Built-in: Pre-defined groups that come with Windows\n2. Custom: Created by administrators to meet specific needs\n3. Domain Local: Groups in a Windows domain environment\n4. Global: Groups that can be used across multiple domains\n5. Universal: Groups that can be used across multiple domains and forests\n\nBenefits of using Windows user groups include:\n\n1. Simplified administration\n2. Improved security\n3. Enhanced organization\n4. Increased productivity\n5. Better scalability\n\nBest practices for managing Windows user groups include:\n\n1. Use built-in groups whenever possible\n2. Create custom groups with specific purposes\n3. Assign appropriate permissions and rights\n4. Regularly review and update group membership\n5. Use group nesting to simplify management.\n"}, {"name": "SOME POLICY APPLY ON GROUP AND OU", "content": "gpupdate /force se policies forefully apply hogi\nwallpaper dalna ho toh uski files ko everyone karo aur ip ke sath policy me address do\n . wallpaper centralized karna hai pure netwok me toh wallpaper prevent policy lagainge\n1. gpedit-administrative template-desktop-wallpaper\n2. ab usko dusre user change nhi kar painge nai user login honge unme bhi yahi wallpaper aayenge \n3. location deni paddegi wallpaper ki\n#drives hatani hai =\n1. ex - cd /dvd/pendrive/floffy\n2. do case bante hai read and write\n3. read se toh computer data dekh sakta hai\n4. write se data dal sakta hai\n5. location - administrator - system-removale storage access\n6. all removable kar denge toh sab hat jayegi pandrive wagera\n#tape - caset used mostly for backup bIG companies used\n#gpupdate /force se group policies update hoti hai\n#ab hume c/d/a/b - hatani ho toh=\n1. administrator-components-file explorer-hide those specific drivess\n2. whi se prevent bhi kar sakte hai drives ko \n3. ab use cmd ki help se hi khol sakte hai \n#hum direct policy ko dekh sakte hai=\n1. view me jao filter lagao policies pao\n2. setting me jake hum upper case ke logo ko click karke enabled policies dekh sakte hai\n#cmd ban karna ho toh=\n1. administration settings -system-prevent access to the command prompt\n#regedit same as gpedit -\n1. administrative template - system-registry edit\n#end "}, {"name": "TOP 10 GROUP POLICIES USER IN CORPORATEE", "content": "In the corporate field, **Group Policies** are critical for managing IT environments, especially in large organizations with many employees and devices. Here are 10 commonly used **Group Policies** to enhance security, productivity, and IT administration:\n\n### 1. **Password Policy**\n\n- **Purpose**: Enforces rules for password complexity, expiration, and history.\n- **Common settings**: Minimum password length, password complexity requirements (e.g., uppercase, lowercase, numbers, special characters), maximum password age, and minimum password age.\n- [Navigate to Computer Configuration > Policies > Windows Settings > Security Settings > Account Policies > Password Policy]\n\n## 2. **User Account Control (UAC)**\n\n- **Purpose**: Controls when users are prompted for administrative credentials or permission.\n- **Common settings**: Configure the UAC level to manage the balance between user experience and security, e.g., Always notify or never notify on changes.\nThe policy settings are located under Computer Configuration\\Windows Settings\\Security Settings\\Local Policies\\Security Options\n### 3. **Windows Update Policy**\n\n- **Purpose**: Ensures devices are kept up-to-date with the latest patches and updates.\n- **Common settings**: Schedule automatic updates, specify update servers (WSUS), and delay updates (e.g., Windows Insider Preview).\n- - **PolicyName**: > Computer Configuration > Policies > Administrative Templates > Windows Components > Windows Update\n\n### 4. **Software Restriction Policies**\n\n- **Purpose**: Controls which applications can or cannot run on corporate devices.\n- **Common settings**: Prevent unauthorized executable files or scripts from running, or allow only trusted applications (whitelisting).\n**“Computer Configuration” > “Windows Settings” > “Security Settings” > “Software Restriction Policies”**.22 Feb 2023\n### 5. **Folder Redirection**\n\n- **Purpose**: Redirects user folders (e.g., Documents, Desktop) to network locations for centralized management and backup.\n- **Common settings**: Redirect folders like the Desktop, Documents, or AppData to a network drive.\nUser Configuration > Policies > Windows Settings > Folder Redirection.\n### 6. **Audit Policy**\n\n- **Purpose**: Enables detailed logging of security-related events for auditing purposes.\n- **Common settings**: Track login attempts, object access, privilege use, and changes to critical settings.\n**Computer Configuration → Policies → Windows Settings → Security Settings → Advanced Audit Policy Configuration → Audit Policies**.\n### 7. **Remote Desktop and Remote Assistance**\n\n- **Purpose**: Configures access to remote desktop and assistance tools for troubleshooting.\n- **Common settings**: Enable or disable Remote Desktop, specify who can connect via RDP, and configure Remote Assistance settings.\n- **Computer Configuration**\n- **Policies**\n- **Administrative Templates**\n- **Windows Components**\n- **Remote Desktop Services**\n- **Remote Desktop Session Host**\n- **Connections**\n### 8. **Time Zone Configuration**\n\n- **Purpose**: Ensures uniform time settings across the network.\n- **Common settings**: Set time zone preferences, configure time synchronization with a time server, and disable changes to the system clock.\n- **Computer Configuration**\n- **Administrative Templates**\n- **Windows Components**\n- **Remote Desktop Services**\n- **Remote Desktop Session Host**\n- **Device and Resource Redirection**\n- **Allow time zone redirection**\n### 9. **Security Settings for Windows Defender**\n\n- **Purpose**: Configures anti-virus and anti-malware protections.\n- **Common settings**: Enable or disable Windows Defender, configure scanning schedules, specify exclusions, and ensure real-time protection.\n\n### 10. **Network Access Protection (NAP)**\n\n- **Purpose**: Ensures that computers comply with health policies (e.g., up-to-date antivirus or security patches) before accessing the network.\n- **Common settings**: Configure health policies for network access based on system configuration, user state, or other factors.\n\n### Conclusion\n\nThese Group Policies play a fundamental role in maintaining security, compliance, and consistency in a corporate IT environment. They can be applied at various levels—domain, site, or organizational unit (OU)—to tailor the policy settings to specific user groups or devices, ensuring the network remains secure and efficient."}, {"name": "USER MANANGEMENT", "content": "user banainge computers me data security ke liye\nhow to make multiple users in computers- \n1. go to file this pc show more option then manage  and local users and group\n2. or press win x then computer managment  and goes to users\n3. then make users you want \n4. while making user we have four options \n5. user must change password at next login means - jab pehli bar login karenege toh password change k cies dekh sakte hai\n#cmd ban karna ho toh=\n1. administration settings -system-prevent access to the command prompt\n#regedit same as gpedit -\n1. administrative template - system-registry edit\n#end "}];

  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'ADDS/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
  showViewer();
}

window.onload = function() {
  buildSidebar();
  if (!isMobile && NOTES.length > 0) openNote(0);
};
</script>
