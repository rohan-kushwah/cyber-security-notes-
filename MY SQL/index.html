ase Concepts**\n\n### **1. Data Storage Options**\n\nBefore databases became common, data was stored in:\n\n- **Text Files** – Simple but no data validation or search efficiency.  \n    _Example_: `.csv` file used to store student names.\n    \n- **Microsoft Excel** – Good for small datasets and manual calculations.\n    \n- **Microsoft Access** – Early database solution for small desktop applications.\n    \n\n---\n\n### **2. Database Management Systems (DBMS)**\n\nA **Database Management System (DBMS)** is software that helps create, store, and manage data efficiently.\n\n#### **Examples of DBMS**\n\n|DBMS|Common Language|Use Case|\n|---|---|---|\n|MySQL|PHP|Web development|\n|MariaDB|PHP|MySQL alternative|\n|PostgreSQL|Python, PHP|Enterprise-level apps|\n|Microsoft SQL Server|.NET|Windows applications|\n|Oracle RDBMS|Java|Enterprise databases|\n|IBM DB2|Java|Large enterprise systems|\n|MongoDB|JavaScript|NoSQL document-based data|\n|SQLite|Python|Mobile and lightweight apps|\n\n---\n\n### **3. What is a Database?**\n\nA **database** is an organized collection of data stored and managed so it can be easily accessed, managed, and updated.\n\n✅ **Key Features:**\n\n- Stores data in a structured format (tables)\n    \n- Easy to search, retrieve, and modify data\n    \n- Supports data integrity and relationships\n    \n\n📘 **Example:**  \nA school’s database storing:\n\n- Students\n    \n- Courses\n    \n- Fees\n    \n- Results\n    \n\n---\n\n### **4. Types of Databases**\n\n1. **Relational Database (RDBMS)**\n    \n    - Uses **SQL (Structured Query Language)**\n        \n    - Data stored in **tables** (rows and columns)\n        \n    - Examples: MySQL, PostgreSQL, Oracle\n        \n    \n    _Example_: A “Users” table with columns `id`, `name`, `email`.\n    \n2. **NoSQL Database**\n    \n    - Not table-based, document-oriented or key-value based\n        \n    - Used for unstructured or big data\n        \n    - Examples: MongoDB, Firebase\n        \n\n---\n\n### **5. MySQL Overview**\n\n**MySQL** is a popular open-source **RDBMS** widely used with PHP for web development.\n\n✅ **Features:**\n\n- Free and open-source\n    \n- Easy to learn and use\n    \n- Cross-platform (Windows, Linux, macOS)\n    \n- Supports multiple languages (PHP, Python, Node.js)\n    \n- **Fast, reliable, and scalable**\n    \n\n📘 **Real-life Example:**\n\n- WordPress uses MySQL to store users, posts, and settings.\n    \n- E-commerce sites store products, users, and orders in MySQL.\n    \n\n---\n\n### **6. MySQL Data Types (v8.0)**\n\n- **String Types** – `CHAR`, `VARCHAR`, `TEXT`\n    \n- **Numeric Types** – `INT`, `FLOAT`, `DECIMAL`\n    \n- **Date/Time Types** – `DATE`, `TIME`, `DATETIME`, `TIMESTAMP`\n    \n\n📘 **Example:**\n\n`CREATE TABLE users (     id INT AUTO_INCREMENT PRIMARY KEY,     name VARCHAR(50),     age INT,     join_date DATE );`\n\n---\n\n### **7. Database Structure**\n\n|Term|Description|Example|\n|---|---|---|\n|**Database**|A set of tables|`school_db`|\n|**Table**|Set of columns & rows|`students`, `courses`|\n|**Column**|Single data type|`first_name`, `email`|\n|**Row**|A single record|`('Rahul', 'Jain', 'rahul@armourinfosec.com')`|\n|**Field**|Intersection of column & row|`first_name = Rahul`|\n|**Index**|Improves search speed|Index on `email` column|\n|**Foreign Key**|Links one table to another|`student_id` in `results` table|\n\n📘 **Example of Relationship:**\n\n- **students** table linked to **marks** table using `student_id`.\n    \n\n---\n\n### **8. CRUD Operations**\n\nCRUD = Basic database operations:\n\n|Operation|SQL Command|Description|\n|---|---|---|\n|**Create**|`INSERT`|Add new records|\n|**Read**|`SELECT`|Retrieve data|\n|**Update**|`UPDATE`|Modify existing data|\n|**Delete**|`DELETE`|Remove records|\n\n📘 **Example:**\n\n`INSERT INTO users (name, email) VALUES ('Rohan', 'rohan@mail.com'); SELECT * FROM users; UPDATE users SET name='Rohan Sharma' WHERE id=1; DELETE FROM users WHERE id=1;`\n\n---\n\n### **9. MySQL GUI Tools**\n\nGraphical tools to manage MySQL databases:\n\n- **MySQL Workbench** – Official MySQL GUI tool.\n    \n- **phpMyAdmin** – Web-based tool for managing MySQL via browser.\n    \n\n📘 **Real-life Example:**\n\n- Developers use **phpMyAdmin** in XAMPP or WAMP servers to manage website databases visually.\n\n\n"}, {"name": "my sql view index information schemea", "content": " MySQL VIEWs\n\n  \n\nA **VIEW** is a virtual table based on the result of an SQL statement. It does not store data itself but presents data from one or more tables.\n\n  \n\n---\n\n### ✅ Advantages of VIEWs\n\n*   Simplifies **complex queries** and data access.\n\n*   Hides specific **columns** or data for security.\n\n*   Adds an **abstraction layer** to your database.\n\n*   Does **not consume physical space** (no data stored).\n\n*   Provides **access restrictions**: may restrict `INSERT`, `UPDATE`, `DELETE`.\n\n  \n\n---\n\n### ❌ Disadvantages of VIEWs\n\n*   May **decrease performance** on large datasets.\n\n*   **Dependent** on underlying tables.\n\n*   If a **base table is dropped**, the view becomes invalid.\n\n*   Views **load at runtime**, which may be slower.\n\n*   Large views may **consume more memory** due to joins and processing.\n\n  \n\n---\n\n### 📌 Creating a VIEW\n\nTo create a new view:\n\n```sql\n\nCREATE VIEW view_name AS\n\nSELECT columns\n\nFROM table1\n\nJOIN table2 ON table1.col = table2.col;\n\n```\n\n  \n\n#### Example:\n\n```sql\n\nCREATE VIEW user_info AS\n\nSELECT u.id, u.name, u.age, u.gender, u.email,\n\n       course.course_name, city.city_name\n\nFROM users u\n\nJOIN course ON u.course_name = course.course_id\n\nJOIN city ON u.city_name = city.city_id;\n\n```\n\n  \n\n---\n\n### 🔄 Modify a VIEW\n\nTo modify an existing view without dropping it:\n\n```sql\n\nALTER VIEW view_name AS\n\nSELECT ...\n\n```\n\n  \n\n#### Example:\n\n```sql\n\nALTER VIEW user_info AS\n\nSELECT u.id, u.name, u.email,\n\n       course.course_name, city.city_name\n\nFROM users u\n\nJOIN course ON u.course_name = course.course_id\n\nJOIN city ON u.city_name = city.city_id;\n\n```\n\n---\n\n### ▶️ Create or Replace a VIEW\n\nTo create a view or replace it if it already exists:\n\n```sql\n\nCREATE OR REPLACE VIEW view_name\n\nAS\n\nSELECT columns\n\nFROM table_name\n\nINNER JOIN table2_name\n\nON table_name.column1 = table2_name.column1\n\n```\n\n#### Example:\n\n```sql\n\nCREATE OR REPLACE VIEW user_info AS\n\nSELECT u.id, u.name, u.age, u.gender, u.email,\n\n       course.course_name, city.city_name\n\nFROM users u\n\nJOIN course ON u.course_name = course.course_id\n\nJOIN city ON u.city_name = city.city_id;\n\n```\n\n---\n\n### ✏️ Rename a VIEW\n\nTo rename an existing view, use the `RENAME TABLE` syntax:\n\n```sql\n\nRENAME TABLE old_view_name TO new_view_name;\n\n```\n\n#### Example:\n\n```sql\n\nRENAME TABLE user_info TO userinfo;\n\n```\n\n---\n\n### ❌ Drop a VIEW\n\nTo permanently delete a view:\n\n```sql\n\nDROP VIEW view_name;\n\n```\n\n#### Example:\n\n```sql\n\nDROP VIEW userinfo;\n\n```\n\n---\n\n### 📋 Related Commands\n\nTo list all tables and views in the current database:\n\n```sql\n\nSHOW TABLES;\n\n```\n\nTo list only the views:\n\n```sql\n\nSHOW FULL TABLES WHERE Table_type = 'VIEW';\n\n```\n\nTo see the SQL statement that created a specific view:\n\n```sql\n\nSHOW CREATE VIEW view_name;\n\n```\n\n  \n\n---\n\n# MySQL INDEX\n\n  \n\nAn **index** in MySQL is used to quickly look up rows based on the values in one or more columns, improving query performance.\n\n  \n\n---\n\n### ✅ Why Use Indexes?\n\n*   Speeds up `SELECT` queries.\n\n*   Enhances performance for `WHERE`, `JOIN`, `ORDER BY`, and `GROUP BY`.\n\n*   Automatically used for **Primary Keys** and **Unique Keys**.\n\n  \n\n---\n\n### Syntax\n\n#### Create Index\n\n```sql\n\nCREATE INDEX index_name ON table_name(column1, column2);\n\n```\n\n#### Drop Index\n\n```sql\n\nDROP INDEX index_name ON table_name;\n\n```\n\n  \n\n---\n\n### 📌 Example with `student` Table\n\n#### ✅ Step 1: Create Table\n\n```sql\n\nCREATE TABLE student(\n\n  id INT(10) NOT NULL AUTO_INCREMENT,\n\n  name VARCHAR(255) NOT NULL,\n\n  age INT NOT NULL,\n\n  gender VARCHAR(1) NOT NULL,\n\n  email VARCHAR(255) NOT NULL UNIQUE,\n\n  percentage INT(3) NOT NULL,\n\n  PRIMARY KEY(id)\n\n);\n\n```\n\n#### ✅ Step 2: Insert Records\n\n```sql\n\nINSERT INTO student(name, age, gender, email, percentage) VALUES\n\n('Amit', 18, 'M', 'amit@armour.com', 35),\n\n('Ankit', 20, 'M', 'ankit@armour.com', 95),\n\n('Rahul', 23, 'M', 'rahul@armour.com', 32),\n\n('Pankaj', 24, 'M', 'ankaj@armour.com', 90),\n\n('Vishal', 23, 'M', 'vishal@armour.com', 91),\n\n('Ram', 21, 'M', 'ram@armour.com', 15),\n\n('Veer', 20, 'M', 'veer@armour.com', 40),\n\n('Pooja', 21, 'F', 'pooja@armour.com', 145);\n\n```\n\n  \n\n```sql\n\nshow tables;\n\n```\n\n  \n\n```sql\n\nselect * from student;\n\n```\n\n  \n\n---\n\n### 🔎 View Indexes\n\n```sql\n\nSHOW INDEX FROM student;\n\n```\n\nYou will see:\n\n*   `PRIMARY` index on `id`\n\n*   `email` index (automatically created due to `UNIQUE` constraint)\n\n  \n\n---\n\n### ➕ Create a New Index\n\n```sql\n\nCREATE INDEX students_name ON student(name);\n\n```\n\n#### Check:\n\n```sql\n\nSHOW INDEX FROM student;\n\n```\n\nNow you'll see an index named `students_name` on the `name` column.\n\n---\n\n### ❌ Drop Index\n\n```sql\n\nDROP INDEX students_name ON student;\n\n```\n\n#### Confirm:\n\n```sql\n\nSHOW INDEX FROM student;\n\n```\n\nIndex will no longer be listed.\n\n  \n\n---\n\n### 🔐 Notes\n\n*   Indexes take extra disk space.\n\n*   They slightly slow down `INSERT`, `UPDATE`, `DELETE` operations due to maintenance.\n\n*   Indexes do **not** guarantee uniqueness unless explicitly declared with `UNIQUE`.\n\n  \n\n---\n\n---# Information_schema Metadata Queries in MySQL\n\n  \n\nThe `information_schema` database stores metadata about all other databases maintained by the MySQL server.\n\n  \n\n---\n\n## What Is a Schema?\n\n  \n\nA **schema** is a logical container or namespace for database objects such as:\n\n*   Tables\n\n*   Views\n\n*   Indexes\n\n*   Stored Procedures\n\n*   Triggers\n\n*   Functions\n\n*   Events\n\n*   Privileges\n\n  \n\n---\n\n### 📝 Schema vs Database\n\n  \n\nIn **MySQL**, these two terms mean the **same thing**.\n\n  \n\n```sql\n\nCREATE DATABASE armour_db;\n\n```\n\n  \n\n-- is the same as\n\n```sql\n\nCREATE SCHEMA armour_db;\n\n```\n\n  \n\nBoth create a new schema (database) named `armour_db`.\n\n  \n\n---\n\n### 🔎 View All Schemas (Databases)\n\n```sql\n\nSHOW DATABASES;\n\n```\n\n---\n\n### 📂 Select/Use a Schema\n\n```sql\n\nUSE armour_db;\n\n```\n\n---\n\n### 📊 List All Tables in a Schema\n\n```sql\n\nSHOW TABLES;\n\n```\n\nOr using `information_schema`:\n\n```sql\n\nSELECT TABLE_NAME\n\nFROM information_schema.TABLES\n\nWHERE TABLE_SCHEMA = 'armour_db';\n\n```\n\n---\n\n### 📄 See Schema Details\n\nFrom `information_schema.SCHEMATA`:\n\n```sql\n\nSELECT * FROM information_schema.SCHEMATA;\n\n```\n\nThis shows all schemas along with collation, default character set, and other properties.\n\n  \n\n---\n\n### 💡 Example: Check Tables & Columns in a Schema\n\nList all tables in 'armour_db':\n\n```sql\n\nSELECT TABLE_NAME FROM information_schema.TABLES WHERE TABLE_SCHEMA = 'armour_db';\n\n```\n\nList all columns in 'users' table:\n\n```sql\n\nSELECT COLUMN_NAME FROM information_schema.COLUMNS\n\nWHERE TABLE_NAME = 'users' AND TABLE_SCHEMA = 'armour_db';\n\n```\n\n---\n\n### 📚 Show All Databases\n\n```sql\n\nSHOW DATABASES;\n\n```\n\n---\n\n### 📁 Use `information_schema` Database\n\n```sql\n\nUSE information_schema;\n\n```\n\n---\n\n### 📋 List All Tables in `information_schema`\n\n```sql\n\nSHOW TABLES;\n\n```\n\nYou'll see tables like: `TABLES`, `COLUMNS`, `SCHEMATA`, `STATISTICS`, `KEY_COLUMN_USAGE`, etc.\n\n  \n\n### 📊 Explore Tables Metadata\n\n  \n\nTo show all available information about tables:\n\n```sql\n\nSELECT * FROM TABLES;\n\n```\n\n  \n\nTo show only the schema and table name for all tables:\n\n```sql\n\nSELECT TABLE_SCHEMA, TABLE_NAME FROM TABLES;\n\n```\n\n  \n\nTo list all unique schemas (databases) from the `TABLES` metadata:\n\n```sql\n\nSELECT TABLE_SCHEMA FROM TABLES GROUP BY TABLE_SCHEMA;\n\n```\n\n  \n\nTo filter tables by a specific schema, for example, `armour_db`:\n\n```sql\n\nSELECT TABLE_NAME FROM TABLES WHERE TABLE_SCHEMA = 'armour_db';\n\n```\n\nTo filter tables by the `mysql` schema:\n\n```sql\n\nSELECT TABLE_NAME FROM TABLES WHERE TABLE_SCHEMA = 'mysql';\n\n```\n\n---\n\n### 🔎 Explore Columns Metadata\n\n  \n\nTo show all available information about columns:\n\n```sql\n\nSELECT * FROM COLUMNS;\n\n```\n\n  \n\nTo list all unique schemas from the `COLUMNS` metadata:\n\n```sql\n\nSELECT TABLE_SCHEMA FROM COLUMNS GROUP BY TABLE_SCHEMA;\n\n```\n\n  \n\nTo list all tables within the `armour_db` schema:\n\n```sql\n\nSELECT TABLE_NAME FROM COLUMNS WHERE TABLE_SCHEMA = 'armour_db' GROUP BY TABLE_NAME;\n\n```\n\n  \n\nTo list all tables within the `mysql` schema:\n\n```sql\n\nSELECT TABLE_NAME FROM COLUMNS WHERE TABLE_SCHEMA = 'mysql' GROUP BY TABLE_NAME;\n\n```\n\n  \n\nTo list columns of a specific table within a specific schema:\n\n```sql\n\nSELECT COLUMN_NAME FROM COLUMNS\n\nWHERE TABLE_NAME = 'users' AND TABLE_SCHEMA = 'armour_db';\n\n```\n\n  \n\nOr just (if the schema is currently in use):\n\n```sql\n\nSELECT COLUMN_NAME FROM COLUMNS WHERE TABLE_NAME = 'users';\n\n```\n\n  \n\n---\n\n  \n\n### 🔄 Redundant Yet Valid Queries\n\nThese return the same metadata using fully qualified table names:\n\n  \n\nTo list all schemas:\n\n  \n\n```sql\n\nSELECT TABLE_SCHEMA FROM information_schema.TABLES GROUP BY TABLE_SCHEMA;\n\n```\n\n  \n\nTo list tables from the 'armour_db' schema:\n\n  \n\n```sql\n\nSELECT TABLE_NAME FROM information_schema.TABLES WHERE TABLE_SCHEMA = 'armour_db';\n\n```\n\n  \n\nTo list columns from the 'users' table:\n\n  \n\n```sql\n\nSELECT COLUMN_NAME FROM information_schema.COLUMNS WHERE TABLE_NAME = 'users';\n\n```\n\n  \n\n---\n\n  \n\n##  Summary Table for Common Queries\n\n  \n\n| Task | Query |\n\n| :--- | :--- |\n\n| List databases | `SHOW DATABASES;` |\n\n| List tables in a schema | `SELECT TABLE_NAME FROM TABLES WHERE TABLE_SCHEMA='armour_db';` |\n\n| List columns in a table | `SELECT COLUMN_NAME FROM COLUMNS WHERE TABLE_NAME='users' AND TABLE_SCHEMA='armour_db';` |\n\n| List all schemas from `TABLES` | `SELECT TABLE_SCHEMA FROM TABLES GROUP BY TABLE_SCHEMA;` |\n\n| List all tables | `SELECT * FROM TABLES;` |\n\n| List all columns | `SELECT * FROM COLUMNS;` |\n\n  \n\n---\n\n-"}, {"name": "password change of root and remote access", "content": "# 📘 MySQL, MariaDB & PostgreSQL Administration and Configuration Guide\n\n---\n\n## 🧠 Overview\n\n**MySQL**, **MariaDB**, and **PostgreSQL** are the three most popular open-source relational database management systems (RDBMS).  \nThey are used for web apps, enterprise systems, and data analytics.\n\n|Feature|MySQL|MariaDB|PostgreSQL|\n|---|---|---|---|\n|Developer|Oracle Corporation|MariaDB Foundation|PostgreSQL Global Dev Group|\n|License|GPL (Community) / Proprietary|GPL|PostgreSQL License (liberal)|\n|Speed|Fast for read-heavy workloads|Slightly faster with new optimizations|Slightly slower, but more feature-rich|\n|Best For|Web apps (e.g. WordPress, PHP apps)|Drop-in MySQL replacement|Complex data, JSON, analytics|\n|Replication|Master–Slave|Master–Master supported|Streaming replication|\n|JSON Support|Yes|Yes|Excellent (native JSONB type)|\n\n---\n\n## ⚙️ 1. Installation and Service Management\n\n### On Debian/Ubuntu:\n\n`sudo apt update sudo apt install mysql-server mariadb-server postgresql -y`\n\n### On CentOS/RHEL/Fedora:\n\n`sudo dnf install mysql-server mariadb-server postgresql-server -y`\n\n### Start and Enable Service:\n\n`sudo systemctl start mysql sudo systemctl enable mysql sudo systemctl status mysql`\n\n> 🧩 Explanation:\n> \n> - `start`: launches the service now\n>     \n> - `enable`: ensures it starts on boot\n>     \n> - `status`: checks if it’s running\n>     \n\n---\n\n## 💻 2. Accessing the Database Shell\n\n### MySQL / MariaDB:\n\n`sudo mysql -u root -p`\n\n### PostgreSQL:\n\n`sudo -i -u postgres psql`\n\n### Check databases:\n\n`SHOW DATABASES;`\n\nor for PostgreSQL:\n\n`\\l`\n\n---\n\n## 🔐 3. Resetting the Root Password (MySQL / MariaDB)\n\nIf you forget your MySQL root password:\n\n1. Stop the MySQL service:\n    \n    `sudo systemctl stop mysql`\n    \n2. Start MySQL in safe mode:\n    \n    `sudo mysqld_safe --skip-grant-tables &`\n    \n3. Log in without password:\n    \n    `mysql -u root`\n    \n4. Update the password:\n    \n    `FLUSH PRIVILEGES; ALTER USER 'root'@'localhost' IDENTIFIED BY 'newpassword';`\n    \n5. Restart MySQL:\n    \n    `sudo systemctl restart mysql`\n    \n\n> ✅ Explanation: `--skip-grant-tables` allows access without authentication temporarily.\n\n---\n\n## 🌐 4. Enabling Remote Access (MySQL)\n\n1. Edit configuration file:\n    \n    `sudo nano /etc/mysql/mysql.conf.d/mysqld.cnf`\n    \n2. Find the line:\n    \n    `bind-address = 127.0.0.1`\n    \n    Change to:\n    \n    `bind-address = 0.0.0.0`\n    \n3. Save and restart:\n    \n    `sudo systemctl restart mysql`\n    \n4. Allow port 3306 in firewall:\n    \n    `sudo ufw allow 3306`\n    Steps To Create Remote Access For Root\n\n1. Create the user (allow root to connect from any host)\n    \n\n`CREATE USER 'root'@'%' IDENTIFIED BY 'root';`\n\n2. Grant all privileges\n    \n\n`GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;`\n\n3. Apply changes\n    \n\n`FLUSH PRIVILEGES;`\n\n4. Confirm user creation\n    \n\n`SELECT user, host FROM mysql.user;`\n\n**Notes / cautions**\n\n- Run these inside the MySQL client (e.g. `mysql -u root -p`).\n    \n- Allowing `root`@`%` is a serious security risk — it permits root logins from any IP. Prefer creating a less-privileged user for remote access, or restrict host/IPs (e.g. `'root'@'192.168.1.%'`).\n    \n- On MySQL 8+, `CREATE USER ... IDENTIFIED BY 'password'` is correct; if you use other authentication plugins you may need to adjust (e.g. `IDENTIFIED WITH caching_sha2_password BY 'password'`).\n\nrom client side this command-\nmysql -u root -h 192.168.1.80 -p --ssl=false\n\n\n---\n\n## 👥 5. Granting Privileges to Remote Users\n\nLogin to MySQL:\n\n`mysql -u root -p`\n\nThen:\n\n`CREATE USER 'dbuser'@'%' IDENTIFIED BY 'StrongPass123!'; GRANT ALL PRIVILEGES ON *.* TO 'dbuser'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;`\n\n> 💡 `'%'` means any host. Use specific IP for more security (e.g., `'192.168.1.10'`).\n\n---\n\n## 🌍 6. Remote Connection Example\n\nFrom another client:\n\n`mysql -h 192.168.1.100 -u dbuser -p`\n\nPostgreSQL example:\n\n`psql -h 192.168.1.100 -U postgres -d mydb`\n\n---\n\n## 🧾 7. PostgreSQL Remote Access Setup\n\n1. Edit configuration:\n    \n    `sudo nano /etc/postgresql/15/main/postgresql.conf`\n    \n    Find:\n    \n    `listen_addresses = 'localhost'`\n    \n    Change to:\n    \n    `listen_addresses = '*'`\n    \n2. Edit client authentication:\n    \n    `sudo nano /etc/postgresql/15/main/pg_hba.conf`\n    \n    Add line:\n    \n    `host    all             all             0.0.0.0/0               md5`\n    \n3. Restart PostgreSQL:\n    \n    `sudo systemctl restart postgresql`\n    \n\nfrom client side this command-\nmysql -u root -h 192.168.1.80 -p --ssl=false\n\n---\n\n## 🧰 8. Common Problems and Fixes\n\n|Problem|Cause|Solution|\n|---|---|---|\n|Access denied for user|Wrong password / host not allowed|Check `GRANT` and user host|\n|Can’t connect remotely|Bind address / Firewall|Set `bind-address=0.0.0.0`, open port 3306|\n|Root password lost|Misconfigured user|Use `--skip-grant-tables` reset|\n|PostgreSQL connection refused|`pg_hba.conf` or firewall issue|Add `host all all 0.0.0.0/0 md5`|\n\n---\n\n## 🌐 9. Real-Life Example: Hosting Web App Database\n\nA **PHP web application** on one server needs a database hosted on another.\n\n**Web Server (192.168.1.10)**  \n**DB Server (192.168.1.20)**\n\nOn DB Server:\n\n`CREATE DATABASE webapp; CREATE USER 'webuser'@'192.168.1.10' IDENTIFIED BY 'App@123'; GRANT ALL PRIVILEGES ON webapp.* TO 'webuser'@'192.168.1.10'; FLUSH PRIVILEGES;`\n\nIn PHP code:\n\n`<?php $connection = new mysqli(\"192.168.1.20\", \"webuser\", \"App@123\", \"webapp\"); if ($connection->connect_error) {     die(\"Connection failed: \" . $connection->connect_error); } echo \"Connected successfully!\"; ?>`\n\n---\n\n## ⚡ 10. SQL Query Examples\n\n### Create Database and Table\n\n`CREATE DATABASE shopdb; USE shopdb; CREATE TABLE products (   id INT AUTO_INCREMENT PRIMARY KEY,   name VARCHAR(100),   price DECIMAL(10,2) );`\n\n### Insert and Select\n\n`INSERT INTO products (name, price) VALUES ('Laptop', 599.99); SELECT * FROM products;`\n\n### Update and Delete\n\n`UPDATE products SET price = 499.99 WHERE name='Laptop'; DELETE FROM products WHERE id=1;`\n\n---\n\n## 🧩 11. Quick Commands Summary (Cheat Sheet)\n\n### 🔹 MySQL / MariaDB\n\n`sudo systemctl start mysql sudo systemctl restart mysql mysql -u root -p SHOW DATABASES; CREATE DATABASE testdb; CREATE USER 'test'@'localhost' IDENTIFIED BY 'pass'; GRANT ALL PRIVILEGES ON testdb.* TO 'test'@'localhost'; FLUSH PRIVILEGES;`\n\n### 🔹 PostgreSQL\n\n`sudo -i -u postgres psql \\l                     # List databases \\du                    # List users CREATE DATABASE testdb; CREATE USER test WITH PASSWORD 'pass'; GRANT ALL PRIVILEGES ON DATABASE testdb TO test;`\n\n### 🔹 Configuration Files\n\n|Database|Config File Path|\n|---|---|\n|MySQL|`/etc/mysql/mysql.conf.d/mysqld.cnf`|\n|MariaDB|`/etc/my.cnf` or `/etc/mysql/mariadb.conf.d/`|\n|PostgreSQL|`/etc/postgresql/<version>/main/postgresql.conf`|\n\n---\n\n## 🧠 Final Tips\n\n- Always **restart** services after config changes.\n    \n- Use **strong passwords** and **specific IPs** instead of `%`.\n    \n- Keep your MySQL/PostgreSQL **updated** for security patches.\n    \n- For backups:\n    \n    `mysqldump -u root -p mydb > mydb_backup.sql pg_dump -U postgres mydb > mydb_backup.sql`"}, {"name": "using php to access my sql", "content": " Using PHP to Access MySQL\n\n---\n\n  \n\nPHP provides multiple APIs to connect and interact with MySQL databases. Choosing the right one depends on your needs, but `mysqli` and `PDO` are the recommended modern options.\n\n  \n\n> [PHP: Choosing a MySQL API](https://www.php.net/manual/en/mysqlinfo.api.choosing.php)\n\n  \n\n## Available PHP MySQL APIs\n\n---\n\n  \n\n| API | Description | Status |\n\n|---|---|---|\n\n| mysql | Original, deprecated MySQL API | Deprecated |\n\n| mysqli | \"MySQL Improved\" API | Preferred |\n\n| PDO | PHP Data Objects (supports multiple DBs) | Flexible |\n\n  \n\n## CRUD Operations\n\n---\n\nThe basic database operations are known as **CRUD**:\n\n  \n\n*   **Create** – Insert new records ( `INSERT` )\n\n*   **Read** – Retrieve data ( `SELECT` )\n\n*   **Update** – Modify existing records ( `UPDATE` )\n\n*   **Delete** – Remove records ( `DELETE` )\n\n  \n\n## PHP Database Interaction in Five Steps (Using MySQLi)\n\n---\n\n### Step 1: Create a Database Connection\n\n```php\n\n$connection = mysqli_connect(\"localhost\", \"root\", \"password\", \"my_database\");\n\n  \n\n// Check connection\n\nif (mysqli_connect_errno()) {\n\n    die(\"Database connection failed: \" . mysqli_connect_error());\n\n}\n\n```\n\n### Step 2: Perform a Database Query\n\n---\n\n```php\n\n$query = \"SELECT * FROM users\";\n\n$result = mysqli_query($connection, $query);\n\n```\n\n  \n\n### Step 3: Use Returned Data (if any)\n\n---\n\n> Use `mysqli_fetch_row()` or `mysqli_fetch_array()` as alternatives.\n\n  \n\n```php\n\nwhile ($row = mysqli_fetch_assoc($result)) {\n\n    echo \"User: \" . $row[\"username\"] . \"<br />\";\n\n}\n\n```\n\n  \n\n### Step 4: Release Returned Data\n\n---\n\n```php\n\nmysqli_free_result($result);\n\n```\n\n  \n\n### Step 5: Close Database Connection\n\n---\n\n```php\n\nmysqli_close($connection);\n\n```\n\n  \n\n## Common Error Handling\n\n---\n\n```php\n\nif (!$connection) {\n\n    die(\"Connection failed: \" . mysqli_connect_error());\n\n}\n\n```\n\n  \n\n## Summary Cheat Sheet\n\n---\n\n  \n\n| Task                | Function                 |\n\n| ------------------- | ------------------------ |\n\n| Connect to DB       | `mysqli_connect()`       |\n\n| Run a query         | `mysqli_query()`         |\n\n| Fetch result row    | `mysqli_fetch_assoc()`   |\n\n| Free result memory  | `mysqli_free_result()`   |\n\n| Close DB connection | `mysqli_close()`         |\n\n| Check for errors    | `mysqli_connect_error()` |\n\n  \n\n---\n\n---\n\n\n PHP + MySQL: Creating a Database Connection\n\n---\n\nThis guide walks through connecting to a MySQL database using PHP and the MySQLi extension.\n\n  \n\n### Step-by-Step: Database Connection Script\n\n### connection-db.php\n\n  \n\n```php\n\nconnection-db.php\n\n```\n\n  \n\n```php\n\n<?php\n\n// 1. Create a database connection\n\n$dbhost = \"localhost\";\n\n$dbuser = \"root\";\n\n$dbpass = \"root\";\n\n$dbname = \"armour_db\";\n\n  \n\n// Attempt to connect\n\n$connection = mysqli_connect($dbhost, $dbuser, $dbpass, $dbname);\n\n  \n\n// Check connection\n\nif (mysqli_connect_error()) {\n\n    die(\"Database Connection Failed: \" . mysqli_connect_error());\n\n}\n\n?>\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n    <meta charset=\"utf-8\">\n\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n    <title>Connection with DB</title>\n\n</head>\n\n<body>\n\n    <h1>Database connection successful!</h1>\n\n</body>\n\n</html>\n\n<?php\n\n// 5. Close the database connection\n\nmysqli_close($connection);\n\n?>\n\n```\n\n  \n\n### Connection making Detection\n\n  \n\n```php\n\n<?php\n\n// 1. Create a database connection\n\n$dbhost = \"localhost\";\n\n$dbuser = \"root\";\n\n$dbpass = \"root\";\n\n$dbname = \"armour_db\";\n\n  \n\n// Connect to the database\n\n$connection = mysqli_connect($dbhost, $dbuser, $dbpass, $dbname);\n\n  \n\n// Test if connection occurred\n\nif (mysqli_connect_error()) {\n\n  die(\"Database Connection Failed: \" . mysqli_connect_error());\n\n}\n\n?>\n\n```\n\n  \n\n## HTML Output Section\n\n```html\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n    <meta charset=\"utf-8\">\n\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n    <title>Connection with DB</title>\n\n</head>\n\n<body>\n\n    <h1>Connection DB</h1>\n\n</body>\n\n</html>\n\n```\n\n  \n\n## Close the Connection\n\n```php\n\n<?php\n\n// 5. Close the database connection\n\nmysqli_close($connection);\n\n?>\n\n```\n\n  \n\n## Best Practices\n\n---\n\n*   Always check for connection errors using `mysqli_connect_error()`.\n\n*   Use `mysqli_close()` to free up server resources.\n\n*   Avoid hardcoding credentials in production; use environment variables or config files instead.\n\n  \n\n## Test Your Setup\n\n---\n\nTo test:\n\n1.  Ensure your MySQL server is running.\n\n2.  Ensure `armour_db` exists.\n\n3.  Visit the script in your browser: `http://localhost/connection_db.php`\n\n4.  You should see:\n\n    ```\n\n    Connection DB\n\n    ```\n\n  \n\nIf there is a connection error, it will display the error message.\n\n  \n\n---\n\n---\n\n# Retrieving Data from MySQL with PHP (mysqli)\n\n---\n\nThis guide walks through using PHP to connect to a MySQL database, run a SELECT query, retrieve rows, and display the results using `mysqli`.\n\n  \n\n## What You'll Learn\n\n* How to connect to MySQL\n\n* How to run a SELECT query with `mysqli_query()`\n\n* How to retrieve rows using `mysqli_fetch_row()`\n\n* How to release memory using `mysqli_free_result()`\n\n* How to inspect raw data using `var_dump()`\n\n  \n\n## Requirements\n\n---\n\n* MySQL database: `armour_db`\n\n* Table: `student`\n\n* PHP installed (e.g., XAMPP, LAMP stack)\n\n  \n\n## Full Script: retrieving-data.php\n\n  \n\n```php\n\nretrieving-data.php\n\n```\n\n  \n\n```php\n\n<?php\n\n// 1. Create a database connection\n\n$dbhost = \"localhost\";\n\n$dbuser = \"root\";\n\n$dbpass = \"root\";\n\n$dbname = \"armour_db\";\n\n  \n\n$connection = mysqli_connect($dbhost, $dbuser, $dbpass, $dbname);\n\n  \n\n// Check connection\n\nif (mysqli_connect_error()) {\n\n    die(\"Database Connection Failed: \" . mysqli_connect_error());\n\n}\n\n?>\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n    <meta charset=\"utf-8\">\n\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n    <title>Retrieving Data from Database (MySQL)</title>\n\n</head>\n\n<body>\n\n    <h1>Retrieving Data from Database (MySQL)</h1>\n\n<?php\n\n// 2. Perform database query\n\n$query = \"SELECT * FROM student\";\n\n$result = mysqli_query($connection, $query);\n\n  \n\n// Check if query was successful\n\nif (!$result) {\n\n    die(\"Database Query Failed\");\n\n}\n\n  \n\n// 3. Use returned data (if any)\n\nwhile ($row = mysqli_fetch_row($result)) {\n\n    // Output raw row array\n\n    var_dump($row);\n\n    echo \"<hr />\";\n\n}\n\n  \n\n// 4. Release returned data\n\nmysqli_free_result($result);\n\n?>\n\n</body>\n\n</html>\n\n<?php\n\n// 5. Close database connection\n\nmysqli_close($connection);\n\n?>\n\n```\n\n  \n\n## Explanation of Functions\n\n  \n\n| Function | Purpose |\n\n| :--- | :--- |\n\n| `mysqli_connect()` | Connect to the database |\n\n| `mysqli_query()` | Run a SQL query (SELECT) |\n\n| `mysqli_fetch_row()` | Get a row as a numeric array |\n\n| `var_dump()` | Debug-style output showing data types and values |\n\n| `mysqli_free_result()` | Frees memory used by the result |\n\n| `mysqli_close()` | Closes the DB connection |\n\n  \n\n## Sample Output\n\n  \n\n```\n\narray(4) {\n\n  [0]=>\n\n  string(1) \"1\"\n\n  [1]=>\n\n  string(5) \"Alice\"\n\n  [2]=>\n\n  string(5) \"Delhi\"\n\n  [3]=>\n\n  string(3) \"90%\"\n\n}\n\n```\n\nEach array represents one row of data from the `student` table.\n\n  \n\n## Best Practices\n\n---\n\n* Prefer `mysqli_fetch_assoc()` if you want column names as array keys.\n\n* Sanitize input if building dynamic queries.\n\n* Use prepared statements for security with `mysqli_prepare()` or switch to PDO.\n\n  \n\n---\n\n# Working with Retrieved Data in PHP (mysqli)\n\n  \n\nThis tutorial demonstrates how to use different `mysqli_fetch_*` functions to work with data from a MySQL database and present it in raw format, structured output, and HTML tables.\n\n  \n\n## Requirements\n\n*   PHP with mysqli support\n\n*   MySQL database: `rsdb`\n\n*   Tables: `student`, `users`, `course`, `city`\n\n  \n\n### 1. Fetch Data as Indexed Array (mysqli_fetch_row)\n\n---\n\n#### Description\n\n  \n\n*   Returns each row as a numerically indexed array.\n\n*   Columns are accessed using index numbers: `$row[0]`, `$row[1]`, etc.\n\n  \n\n#### Sample Script\n\n```php\n\nwhile ($row = mysqli_fetch_row($result)) {\n\n    var_dump($row);\n\n    echo \"<hr />\";\n\n}\n\n```\n\n  \n\n### 2. Fetch Data as Associative Array (mysqli_fetch_assoc)\n\n---\n\n#### Description\n\n*   Returns each row as an associative array.\n\n*   Columns are accessed using column names: `$row['name']`, `$row['email']`.\n\n  \n\n#### Sample Script (retrieved_data2.php)\n\n```php\n\nwhile ($row = mysqli_fetch_assoc($result)) {\n\n    var_dump($row);\n\n    echo \"<hr />\";\n\n}\n\n```\n\n  \n\n### 3. Fetch Data as Both Indexed and Associative Array (mysqli_fetch_array)\n\n---\n\n#### Description\n\n*   Can fetch as:\n\n    *   `MYSQLI_ASSOC` - Associative only\n\n    *   `MYSQLI_NUM` - Numeric only\n\n    *   `MYSQLI_BOTH` (default) - Both\n\n  \n\n#### Sample Script (retrieved_data3.php)\n\n```php\n\nwhile ($row = mysqli_fetch_array($result, MYSQLI_BOTH)) {\n\n    var_dump($row);\n\n    echo \"<hr />\";\n\n}\n\n```\n\n  \n\n### 4. Access Fields by Column Name (mysqli_fetch_assoc)\n\n---\n\n#### Description\n\n*   Clean and readable data access using column names.\n\n#### Sample Script (retrieved_data4.php)\n\n  \n\n```php\n\nwhile ($row = mysqli_fetch_assoc($result)) {\n\n    echo $row['id'];\n\n    echo $row['name'];\n\n    echo $row['age'];\n\n    echo $row['gender'];\n\n    echo $row['email'];\n\n    echo $row['percentage'];\n\n    echo \"<br />\";\n\n}\n\n```\n\n  \n\n### 5. Displaying Data in HTML Table (retrieved_data5.php)\n\n---\n\n#### Description\n\n*   Embeds PHP inside HTML to display table rows dynamically.\n\n  \n\n#### Sample Script\n\n```html\n\n<table>\n\n    <thead>\n\n        <tr><th>ID</th><th>NAME</th><th>AGE</th><th>GENDER</th><th>EMAIL</th><th>PERCENTAGE</th></tr>\n\n    </thead>\n\n    <tbody>\n\n        <?php\n\n        while ($row = mysqli_fetch_assoc($result)) {\n\n        ?>\n\n        <tr>\n\n            <td><?= $row['id'] ?></td>\n\n            <td><?= $row['name'] ?></td>\n\n            <td><?= $row['age'] ?></td>\n\n            <td><?= $row['gender'] ?></td>\n\n            <td><?= $row['email'] ?></td>\n\n            <td><?= $row['percentage'] ?></td>\n\n        </tr>\n\n        <?php } ?>\n\n    </tbody>\n\n</table>\n\n```\n\n  \n\n### 6. Joining Multiple Tables (retrieved_data6.php)\n\n---\n\n#### Description\n\n*   Uses SQL `JOIN` to pull related data from multiple tables.\n\n  \n\n#### Query:\n\n```sql\n\nSELECT u.id, u.name, u.age, u.gender, u.email,\n\n       co.course_name, ci.city_name\n\nFROM users u\n\nINNER JOIN course co ON u.course_name = co.course_id\n\nINNER JOIN city ci ON u.city_name = ci.city_id;\n\n```\n\n  \n\n#### Sample Table Output Script\n\n```html\n\n<tr>\n\n    <td><?= $row['id'] ?></td>\n\n    <td><?= $row['name'] ?></td>\n\n    <td><?= $row['age'] ?></td>\n\n    <td><?= $row['gender'] ?></td>\n\n    <td><?= $row['email'] ?></td>\n\n    <td><?= $row['course_name'] ?></td>\n\n    <td><?= $row['city_name'] ?></td>\n\n</tr>\n\n```\n\n  \n\n## Summary: Which mysqli_fetch_* to Use?\n\n---\n\n  \n\n| Function | Type of Array | Best For |\n\n| :--- | :--- | :--- |\n\n| `mysqli_fetch_row()` | Numeric | Lightweight iteration |\n\n| `mysqli_fetch_assoc()` | Associative | Readable access by column names |\n\n| `mysqli_fetch_array()` | Both | Flexible, but larger footprint |\n\n  \n\n---\n\n### retrieved-data2.php\n\n  \n\n```php\n\nretrieved-data2.php\n\n```\n\n  \n\n```php\n\n<?php\n\n// 1. Create a database connection\n\n$dbhost = \"localhost\";\n\n$dbuser = \"root\";\n\n$dbpass = \"000000\";\n\n$dbname = \"rsdb\";\n\n  \n\n$connection = mysqli_connect($dbhost, $dbuser, $dbpass, $dbname);\n\n  \n\n// Test if connection occurred\n\nif (mysqli_connect_errno()) {\n\n    die(\"Database Connection Failed: \" . mysqli_connect_error());\n\n}\n\n?>\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n    <meta charset=\"utf-8\">\n\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n    <title>Retrieving Data from Database (MySQL)</title>\n\n</head>\n\n<body>\n\n    <h1>Retrieving Data From Database (MySQL)</h1>\n\n  \n\n<?php\n\n// 2. Perform database query\n\n$query = \"SELECT * FROM student\";\n\n$result = mysqli_query($connection, $query);\n\n  \n\n// Check for query error\n\nif (!$result) {\n\n    die(\"Database Query Failed\");\n\n}\n\n  \n\n// 3. Use returned data (if any)\n\nwhile ($row = mysqli_fetch_assoc($result)) {\n\n    echo \"<pre>\";\n\n    var_dump($row);\n\n    echo \"</pre><hr />\";\n\n}\n\n  \n\n// 4. Release returned data\n\nmysqli_free_result($result);\n\n?>\n\n</body>\n\n</html>\n\n<?php\n\n// 5. Close database connection\n\nmysqli_close($connection);\n\n?>\n\n```\n\n  \n\n---\n\n  \n\n### retrieved-data3.php\n\n  \n\n```php\n\nretrieved-data3.php\n\n```\n\n  \n\n```php\n\n<?php\n\n// 1. Create a database connection\n\n$dbhost = \"localhost\";\n\n$dbuser = \"root\";\n\n$dbpass = \"000000\";\n\n$dbname = \"rsdb\";\n\n  \n\n$connection = mysqli_connect($dbhost, $dbuser, $dbpass, $dbname);\n\n  \n\n// Test if connection occurred\n\nif (mysqli_connect_errno()) {\n\n    die(\"Database Connection Failed: \" . mysqli_connect_error());\n\n}\n\n?>\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n    <meta charset=\"utf-8\">\n\n function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'MY SQL/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
  showViewer();
}

window.onload = function() {
  buildSidebar();
  if (!isMobile && NOTES.length > 0) openNote(0);
};
</script>
</body>
</html>
