<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c10;--surface:#0d1117;--border:#1e2d3d;--accent:#00d9ff;--accent2:#ff3e6c;--accent3:#39ff14;--text:#c9d1d9;--dim:#586069;--yellow:#ffd700;--orange:#ffa500}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,217,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.scanline{position:fixed;top:-100%;left:0;width:100%;height:2px;background:linear-gradient(transparent,rgba(0,217,255,0.1),transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:1}
@keyframes scan{to{top:110%}}

/* TOPBAR */
.topbar{position:relative;z-index:2;background:#0a0e15;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.back-btn{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;text-decoration:none;border:1px solid rgba(0,217,255,0.3);padding:5px 12px;letter-spacing:1px;white-space:nowrap}
.breadcrumb{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.breadcrumb em{color:var(--accent);font-style:normal}

/* HEADER */
.page-header{position:relative;z-index:2;padding:20px 16px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0a0e15,#0d1117)}
.folder-icon{font-size:2rem;display:block;margin-bottom:6px}
.folder-title{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,5vw,1.8rem);color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.folder-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px}
.folder-meta em{color:var(--accent3);font-style:normal}
.search-row{margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);padding:8px 12px}
.search-row::before{content:'⌕';color:var(--accent);font-size:1rem}
.s-input{background:none;border:none;outline:none;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:12px;width:100%;caret-color:var(--accent)}
.s-input::placeholder{color:var(--dim)}

/* DESKTOP: side by side */
.layout{position:relative;z-index:2;display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 160px)}

/* MOBILE: stack vertically */
@media(max-width:768px){
  .layout{display:flex;flex-direction:column}
  .sidebar{
    max-height:none !important;
    height:auto;
    position:relative !important;
    border-right:none;
    border-bottom:1px solid var(--border);
  }
  .sidebar.hidden{display:none}
  .viewer{display:flex;flex-direction:column}
  .viewer.hidden{display:none}
  .mobile-back-btn{display:flex}
  .viewer-content{padding:16px;word-wrap:break-word;overflow-wrap:break-word}
  pre{overflow-x:auto;max-width:100%}
  table{display:block;overflow-x:auto;max-width:100%}
}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:#0a0e15;overflow-y:auto;position:sticky;top:0;max-height:calc(100vh - 110px)}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#1e2d3d}
.sidebar-head{padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:3px;background:#080c10;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

.file-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:flex-start;gap:8px;transition:all .15s;color:var(--dim)}
.file-item:hover{background:rgba(0,217,255,0.05);color:var(--text)}
.file-item.active{background:rgba(0,217,255,0.08);color:var(--accent);border-left:2px solid var(--accent)}
.fi-icon{font-size:10px;margin-top:3px;flex-shrink:0;color:var(--accent2)}
.fi-name{font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.5;text-transform:capitalize;word-break:break-word}

/* MOBILE BACK BUTTON (inside viewer) */
.mobile-back-btn{display:none;align-items:center;gap:8px;padding:10px 14px;background:#080c10;border-bottom:1px solid var(--border);cursor:pointer;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px}
.mobile-back-btn:hover{background:rgba(0,217,255,0.05)}

/* VIEWER */
.viewer{display:flex;flex-direction:column;min-height:300px}
.viewer-bar{background:#080c10;border-bottom:1px solid var(--border);padding:8px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.v-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.vd-r{background:#ff5f56}.vd-y{background:#ffbd2e}.vd-g{background:#27c93f}
.v-path{color:var(--text);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 60px)}
.viewer-content{padding:24px 28px;line-height:1.85;font-size:15px;overflow-y:auto;flex:1;overflow-x:hidden;word-wrap:break-word}
@media(max-width:768px){.viewer-content{padding:14px 16px}}
.placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;text-align:center;padding:20px}

/* MARKDOWN STYLES */
.viewer-content h1{font-family:'Share Tech Mono',monospace;font-size:clamp(1rem,4vw,1.3rem);color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px;margin:24px 0 12px;letter-spacing:2px;word-break:break-word}
.viewer-content h2{font-family:'Share Tech Mono',monospace;font-size:clamp(.9rem,3.5vw,1rem);color:var(--accent3);margin:20px 0 10px;letter-spacing:1px}
.viewer-content h3{font-size:clamp(.85rem,3vw,.95rem);color:var(--yellow);margin:16px 0 8px;font-weight:700}
.viewer-content h4{font-size:.9rem;color:var(--orange);margin:12px 0 6px}
.viewer-content p{margin-bottom:10px;color:var(--text);font-size:clamp(13px,3.5vw,15px);word-wrap:break-word}
.viewer-content code{background:rgba(0,217,255,0.07);color:var(--accent3);padding:2px 6px;border:1px solid rgba(0,217,255,0.15);font-family:'Share Tech Mono',monospace;font-size:11px;border-radius:2px;word-break:break-all}
.viewer-content pre{background:#020509;border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 14px;margin:12px 0;overflow-x:auto;border-radius:2px;max-width:100%}
.viewer-content pre code{background:none;border:none;padding:0;color:var(--accent3);font-size:11px;display:block;white-space:pre;word-break:normal}
.viewer-content ul,.viewer-content ol{padding-left:18px;margin-bottom:10px}
.viewer-content li{margin-bottom:4px;color:var(--text);font-size:clamp(13px,3.5vw,15px)}
.viewer-content li::marker{color:var(--accent)}
.viewer-content strong{color:var(--accent);font-weight:700}
.viewer-content em{color:var(--yellow);font-style:normal}
.viewer-content blockquote{border-left:3px solid var(--accent2);padding:8px 14px;margin:12px 0;color:#aaa;background:rgba(255,62,108,0.04)}
.viewer-content hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.viewer-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;display:block;overflow-x:auto}
.viewer-content th{background:rgba(0,217,255,0.08);color:var(--accent);padding:6px 10px;border:1px solid var(--border);text-align:left;font-family:'Share Tech Mono',monospace;font-size:10px;white-space:nowrap}
.viewer-content td{padding:6px 10px;border:1px solid var(--border);color:var(--text);font-size:12px}
.viewer-content tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.viewer-content a{color:var(--accent);text-decoration:none;border-bottom:1px dashed rgba(0,217,255,0.4);word-break:break-all}
footer{position:relative;z-index:2;border-top:1px solid var(--border);padding:12px 16px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim)}
footer span{color:var(--accent2)}
</style>

<script>
var NOTES = [{"name": "ASN", "content": "# Autonomous System (AS / ASN / IP) Lookup\n---\nAutonomous Systems (AS) are large networks or groups of IP prefixes under the control of a single organization that presents a common routing policy to the internet.\n\n## What Can You Look Up?\n---\n*   **ASN (Autonomous System Number):** A unique number (e.g., AS15169) assigned to each AS.\n*   **AS Name/Organization:** The organization that owns the ASN.\n*   **IP to ASN:** Identify the ASN responsible for a given IP address.\n*   **ASN to IP Range:** View all IP ranges (CIDR blocks) announced by an ASN.\n\n## Online Tools for AS/ASN/IP Lookup\n---\n\n| Tool                     | Description                            | URL                                      |\n| :----------------------- | :------------------------------------- | :--------------------------------------- |\n| bgp.he.net               | Detailed ASN info, prefixes, peers     | https://bgp.he.net/                      |\n| IPinfo                   | IP → ASN, org, country, location       | https://ipinfo.io/                       |\n| CIDR Report              | ASN → prefix list, aggregation         | https://www.cidr-report.org/             |\n| RIPEstat                 | RIPE NCC IP/ASN lookup, graph, history | https://stat.ripe.net/                   |\n| ViewDNS                  | ASN → organization, IP range           | https://viewdns.info/asnlookup/          |\n| UltraTools               | ASN / IP Whois, owner lookup           | https://www.ultratools.com/tools/asninfo |\n| Hurricane Electric Whois | Whois, prefixes, peerings              | https://bgp.he.net/                      |\n| Whois (Linux command)    | Local ASN / IP lookup                  | `whois <IP or ASN>`                      |\n| Team Cymru               | Command-line ASN lookup                | See below                                |\n\n## Command Line ASN/IP Lookup\n---\n### 1. Using whois\n\nDisplays ASN, organization, and contact details.\n\n```\nwhois 8.8.8.8\n```\n\n### 2. Using Team Cymru for IP -> ASN\n\nInstall `whois` if not available:\n```\nsudo apt install whois\n```\n\n**Single IP lookup:**\n```\nwhois -h whois.cymru.com \" -v 8.8.8.8\"\n```\n\n**Bulk lookup (replace with your IP list):**\n```\nwhois -h whois.cymru.com \" -v <your_ip_list>\"\n```\n\n**WHOis lookup ANS**\n```bash\nwhois AS15169\n```\n## Sample Output for 8.8.8.8\n---\n```\n AS   | IP        | BGP Prefix   | CC | Registry | Allocated  | AS Name\n15169 | 8.8.8.8   | 8.8.8.0/24   | US | arin     | 1992-12-01 | GOOGLE - Google LLC, US\n```\n\n---\n---"}, {"name": "CDN", "content": "## Content Delivery Network (CDN)\n\nA Content Delivery Network (CDN) is a geographically distributed network of servers that work together to deliver web content to users more efficiently. By caching static and dynamic content closer to end-users, CDNs enhance website performance, reliability, and security.\n\n---\n### How a CDN Works\n\n*   **Caching Content**\n    CDN servers store copies of static assets (HTML, CSS, JavaScript, images, videos) from the origin server.\n*   **User Request Routing**\n    When a user accesses a website, the DNS system or CDN's routing logic directs the request to the nearest or most optimal CDN edge server.\n*   **Content Delivery**\n    *   If the requested content is cached, the edge server serves it directly.\n    *   If not cached, the edge server retrieves it from the origin server, caches it, and delivers it to the user.\n*   **Dynamic Content Optimization**\n    CDNs can also accelerate dynamic content by optimizing routes, reducing latency, and employing TCP/UDP optimizations.\n\n---\n\n### Key Benefits of a CDN\n\n*   **Improved Performance**\n    Content is served from servers closer to users, reducing load times and improving the user experience.\n*   **Reduced Latency**\n    Minimizes delays caused by long-distance data travel.\n*   **Scalability**\n    Can handle sudden traffic spikes without overwhelming the origin server.\n*   **High Availability & Redundancy**\n    *   Load balancing across multiple edge servers.\n    *   Automatic failover if one server becomes unavailable.\n*   **Security Enhancements**\n    *   DDoS protection and mitigation.\n    *   Web Application Firewall (WAF) integration.\n    *   TLS/SSL encryption for secure data delivery.\n*   **Optimized Content Delivery**\n    *   Image and video optimization (adaptive bitrate streaming, image compression).\n    *   Brotli or gzip compression.\n    *   HTTP/2 and QUIC/HTTP/3 support.\n\n### Common Use Cases\n\n*   **🎮 Video Streaming Platforms**\n    Deliver high-quality, low-buffering streaming experiences worldwide.\n*   **🛒 E-commerce Websites**\n    Improve site speed and reliability during large-scale sales events or promotions.\n*   **🌐 Global SaaS Applications**\n    Ensure low-latency app performance for users across different regions\n*   **📰 News and Media Websites**\n    Handle sudden traffic surges during breaking news events.\n*   **🎮 Online Gaming**\n    Enhance latency-sensitive content delivery for online games and gaming updates.\n\n---\n\n### Popular CDN Providers\n\n*   **⭐ Cloudflare** – Security-focused, global presence, free tier.\n*   **⭐ Amazon CloudFront (AWS)** – Integrated with AWS services, highly customizable.\n*   **⭐ Akamai** – One of the oldest and largest CDNs, enterprise-grade features.\n*   **⭐ Fastly** – Edge computing capabilities and real-time caching.\n\n---\n\n### Additional Considerations\n\n*   **Cache Invalidation:**\n    When content updates, CDNs provide cache purging or invalidation features to refresh outdated assets.\n*   **Analytics and Reporting:**\n    CDNs offer insights into traffic patterns, security threats, and performance metrics.\n*   **Edge Computing:**\n    Some CDNs (like Cloudflare Workers or AWS Lambda@Edge) let you run code at the edge for custom logic and personalization.\n-  A CDN not only boosts website speed but also improves reliability and security while reducing server load. By delivering content closer to users, CDNs play a vital role in today's digital landscape.\n\n```\n[User Request] → [Nearest CDN Edge Server] → [Cached Content] OR [Origin Server]\n```\n\n---\n---# How to Check if a Website is Using a CDN\n\nA website using a **Content Delivery Network (CDN)** often shows signs such as altered DNS records, CDN-specific HTTP headers, or use of CDN provider IP ranges. Here are several ways to check:\n\n---\n#### 1. Use Online Tools\n\n##### CDN Finder Tools\n\n-   https://www.cdnplanet.com/tools/cdnfinder/\n-   https://www.whatsmydns.net/\n\t-   https://www.webpagetest.org/ → Check the \"CDN Provider\" column in the result waterfall.\n\nTest for\n\thttps://www.hotstar.com/\n\n---\n#### 2. Check HTTP Response Headers\n\nUse `curl` or browser developer tools to inspect HTTP headers.\n\n```bash\ncurl -I https://example.com\n```\n\nLook for headers like:\n\n-   `cf-ray`, `cf-cache-status` → Cloudflare\n-   `x-amz-cf-id` → AWS CloudFront\n-   `x-akamai-*`, `akamai-*` → Akamai\n-   `x-cache`, `x-served-by`, `via` → Generic CDN or caching servers\n\n---\n#### 3. Check DNS Records\nCDNs often provide custom CNAME records.\n```bash\nnslookup example.com\n```\n\nOr:\n```bash\ndig example.com\n```\n\nLook for CNAMEs or A records pointing to:\n\n-   `*.cloudflare.net`\n-   `*.akamaiedge.net`\n-   `*.fastly.net`\n-   `*.cdn.cloudflare.net`, `*.edgekey.net`, etc.\n\n---\n#### 4. Analyze IP Address Ownership\n\nGet the IP of the website:\n```bash\nping example.com\n```\n\nThen look up the IP:\n```bash\nwhois <IP-ADDRESS>\n```\n\nIf the IP belongs to known CDN providers like Cloudflare, Akamai, AWS, etc., the site is likely using a CDN.\n\n---\n#### 5. Use Browser Developer Tools\n\n-   Open **Developer Tools** in your browser (usually F12).\n-   Go to the **Network** tab.\n-   Reload the page.\n-   Inspect resource headers and look for CDN clues in the **Response Headers** or **Remote Address** fields.\n\n---\n#### 6. Use BuiltWith or Wappalyzer\n\n-   https://builtwith.com/\n-   https://www.wappalyzer.com/\n\nThese tools can detect CDN usage along with other technologies.\n\n---\n#### 7. CDN Performance checker\n\nCheck CDN performance from all over the world.\t\n-  https://www.uptrends.com/tools/cdn-performance-check\n-  https://www.debugbear.com/test/cdn-performance\n\n---\n### Summary\n\n| Method                   | What to Look For                            |\n| :----------------------- | :------------------------------------------ |\n| **CDN Finder Tools**     | Direct confirmation of CDN usage            |\n| **HTTP Headers**         | CDN-specific headers like `cf-cache-status` |\n| **DNS Records**          | CNAMEs pointing to known CDN domains        |\n| **IP Lookup**            | IP belongs to CDN provider                  |\n| **Browser Dev Tools**    | Network tab shows cached or edge locations  |\n| **BuiltWith/Wappalyzer** | Technology stack info including CDN         |\n\n---\n---"}, {"name": "Domain Name to IP Address Lookup", "content": "# Domain Name to IP Address Lookup\n---\nWhen you want to find the IP address associated with a domain name, you can use various DNS query commands and online tools. Here's a summary of some commonly used commands and websites:\n\n## Command-Line Tools\n---\n### 1. dig (Domain Information Groper)\n\nQuery the A (IPv4) record:\n```\ndig armourinfosec.com\n```\n\nQuery the NS (Name Server) record:\n```\ndig armourinfosec.com ns\n```\n\nQuery the MX (Mail Exchange) record:\n```\ndig armourinfosec.com mx\n```\n\nQuery any record type from a specific DNS server (example for tesla.com):\n```\ndig tesla.com any @a1-12.akam.net\n```\n\n### 2. nslookup\n \n Basic DNS lookup for a domain:\n```\nnslookup armourinfosec.com\n```\n\n### 3. **Bash Command for All Records (Except ANY)**\n\n```bash\ndomain=\"example.com\"\n\nfor type in A AAAA NS SOA MX CNAME DNAME PTR SRV NAPTR TXT SPF HINFO RP DNSKEY RRSIG DS NSEC NSEC3 NSEC3PARAM CDS CDNSKEY CAA APL LOC URI HTTPS SVCB OPENPGPKEY SMIMEA SSHFP TKEY TSIG; do\n    echo \"=== $type ===\"\n    dig +short \"$domain\" $type\n    echo\ndone\n```\n\n---\n## Online DNS Lookup Tools\n---\nHere's a list of web-based tools for performing DNS lookups and checks:\n\n| Tool & Description              | URL                                                             |\n| :------------------------------ | :-------------------------------------------------------------- |\n| Google Dig Tool                 | [Google Dig](https://toolbox.googleapps.com/apps/dig/)          |\n| Google Public DNS Query Tool    | [Google DNS Query](https://dns.google/)                         |\n| ViewDNS DNS Report              | [ViewDNS Report](https://viewdns.info/dnsreport/)               |\n| ViewDNS DNS Records             | [ViewDNS Records](https://viewdns.info/dnsrecord/)              |\n| UltraTools DNS Lookup           | [UltraTools Lookup](https://www.ultratools.com/tools/dnsLookup) |\n| CentralOps.net DNS Lookup Tools | [CentralOps](https://centralops.net/co/)                        |\n| DNS Tools (Swiss-based)         | [DNSTools.ch](https://en.dnstools.ch/dns-nameserver.html)       |\n\n---\n## Summary\n---\n-  `dig` and `nslookup` are great command-line tools to resolve domain names and query specific DNS records.\n- Online tools like ViewDNS, Google DNS Query, UltraTools, and CentralOps offer easy access for DNS lookups if you're not on a terminal.\n\n---\n---"}, {"name": "GHDB tools", "content": "## Google Hacking Database Tools\n---\nThese tools automate **Google Dorking** and enhance reconnaissance using search engines like Google, Bing, Yahoo, and others. They are widely used in **OSINT**, **bug bounty**, and **penetration testing**.\n\n### [pagodo (Passive Google Dork)](https://github.com/opsdisk/pagodo)\n**Description:**\nAutomates the process of querying the [Google Hacking Database (GHDB)](https://www.exploit-db.com/google-hacking-database) using Google search. Useful for identifying sensitive files, directories, or configuration leaks.\n\n**Example Usage:**\n```\npython3 pagodo.py -g dorks.txt -s armourinfosec.com\n```\n*   `-g dorks.txt`: File containing Google dorks\n*   `-s armourinfosec.com`: Target domain\n\n### [theHarvester](https://github.com/laramies/theHarvester)\n---\n**Description:**\nA powerful tool for gathering emails, subdomains, hosts, and employee names using public sources like Google, Bing, Baidu, and more.\n\n**Example: Scan a domain with Google**\n```\ntheHarvester -d armourinfosec.com -l 500 -b google\n```\n\n**Example: Scan Facebook**\n```\ntheHarvester -d facebook.com -l 500 -b google\n```\n*   `-d`: Domain to search\n*   `-l`: Number of results to fetch\n*   `-b`: Search engine backend (`google`, `bing`, `duckduckgo`, etc.)\n\n### [metagoofil](https://github.com/laramies/metagoofil)\n---\n**Description:**\nMetadata harvester to extract usernames, software versions, and more from publicly available documents (PDF, DOCX, PPTX, etc.).\n\n**Example Usage:**\n```\nmetagoofil -d armourinfosec.org -t pdf -n 20 -f report.html -o doc\n```\n*   `-d`: Domain to search\n*   `-l`: Number of Google results to process\n*   `-t`: File type (e.g., pdf, docx, ppt)\n*   `-n`: Number of files to download\n*   `-f`: Output HTML report file\n*   `-o`: Output directory for downloaded documents\n\n### Summary\n---\n\n| Tool           | Purpose                                         | Notes                             |\n| :------------- | :---------------------------------------------- | :-------------------------------- |\n| `pagodo`       | Run GHDB dorks against domains                  | Passive enumeration, customizable |\n| `theHarvester` | Email & subdomain harvesting via search engines | Supports multiple engines         |\n| `metagoofil`   | Metadata extraction from public documents       | Finds usernames, OS info, tools   |\n\n---\n--- \n\n# MAIN TOOL= EXPLOIT-DB GOOGLE DORKS\n\n\n"}, {"name": "IMAGE MATADATA", "content": "# Image Metadata\n***\n## What is Image Metadata?\n\nImage metadata refers to **hidden information** embedded within **image files** that provides details about the image. This metadata is automatically generated by devices like cameras, smartphones, and editing software.\n***\n## Types of Image Metadata\n\n| Metadata Type | Description |\n| :--- | :--- |\n| **EXIF** (Exchangeable Image File Format) | Data from cameras: date, time, GPS location, camera settings (ISO, aperture, shutter speed), device model, etc. |\n| **IPTC** (International Press Telecommunications Council) | Descriptive info like captions, keywords, copyright info, creator, and contact details. Common in news and media. |\n| **XMP** (Extensible Metadata Platform) | A flexible, standardized format used by Adobe products for storing complex metadata, including edits, tags, and rights. |\n| **File System Metadata** | Basic file attributes: filename, size, date created, modified, file permissions. |\n***\n## Common Data Stored in Image Metadata\n\n* Date & time when the photo was taken\n* GPS coordinates (latitude, longitude, altitude)\n* Camera make and model\n* Camera settings (ISO, aperture, shutter speed, focal length)\n* Author, copyright info, and descriptions\n* Software used for editing or exporting\n* Geolocation data (often used in mapping photos)\n***\n## Why Image Metadata Matters?\n\n* **Forensics & OSINT:** Extract GPS data, timestamps, and device info for investigations.\n* **Privacy Risks:** Metadata can unintentionally leak sensitive information (like home address from GPS).\n* **Copyright & Ownership:** Metadata can verify image authorship.\n* **Digital Evidence:** Used in court, cybersecurity, and law enforcement.\n***\n## Raw.pics.io Photo Metadata Viewer\n\n**Description:** View and analyze metadata embedded in photos, including EXIF, IPTC, and XMP data.\n\n**Features:**\n* Displays camera settings (aperture, shutter speed, ISO, etc.).\n* Shows location data if GPS metadata is available.\n* Supports multiple image formats (JPEG, PNG, RAW, etc.).\n\n**Link:** https://raw.pics.io/photo-metadata-viewer\n***\n## Pic2Map\n\n**Description:** Extracts geotagging information from photos and displays the location on an interactive map.\n\n**Features:**\n* Reads GPS metadata from images.\n* Maps photo locations for easy visualization.\n* Useful for travel mapping or digital forensics.\n\n**Link:** https://www.pic2map.com/\n***\n## Use Cases\n\n* Digital forensics\n* OSINT (Open Source Intelligence)\n* Cybersecurity investigations\n* Privacy audits (checking and removing metadata before sharing images)\n***\n## Optional Tools (Recommended)\n\n* **Command-Line:** [exiftool](https://exiftool.org/) — powerful metadata extractor and editor.\n* **Browser Extensions:** Various EXIF viewers available for Chrome, Firefox, and Edge.\n***\n## How to View Image Metadata in Kali Linux\n***\n## Command-Line Tools for Metadata\n\n### 1. ExifTool (Recommended)\n\n**Description:** Most powerful metadata extraction tool.\n\n**Install:**\n```bash\napt update\n```\n```bash\napt install libimage-exiftool-perl\n```\n\n**Usage:**\n```bash\nexiftool image.jpg\n```\n\n**Features:**\n* Displays all metadata (EXIF, IPTC, XMP).\n* Supports various file types (JPG, PNG, PDF, DOCX, etc.).\n\n**Remove Metadata:**\n```bash\nexiftool -all= image.jpg\n```\n\n### 2. Exif (Simple Tool)\n\n**Description:** Simple EXIF metadata extractor (only for JPEG).\n\n**Install:**\n```bash\napt install exif\n```\n\n**Usage:**\n```bash\nexif image.jpg\n```\n\n**Features:**\n* Basic metadata (camera info, timestamps, GPS if present).\n\n**Note:** Only works with `.jpg` or `.jpeg` files.\n\n### 3. Strings (Manual Extraction)\n\n**Description:** Find hidden or embedded text in any file.\n\n**Usage:**\n```bash\nstrings image.jpg | less\n```\n\n**Features:**\n* Reveals readable text, including metadata fragments.\n\n**Note:** Not dedicated to metadata but sometimes helpful.\n***\n## GUI Tools for Metadata\n\n### 4. Metadata Cleaner (MAT2 GUI)\n\n**Description:** A graphical tool to inspect and clean metadata.\n\n**Install:**\n```bash\napt install mat2\n```\n\n**Launch GUI:**\n```bash\nmat2 --gui\n```\n\n**Features:**\n* Shows metadata.\n* Removes metadata from images, PDFs, Office docs, audio, video, etc.\n\n**CLI Usage:**\n```bash\nmat2 image.jpg\n```\n\n**Check Remaining Metadata:**\n```bash\nmat2 --check image.jpg\n```\n***\n## Summary Table\n\n| Tool     | Type    | Install Command                         | Usage Command                | Features                              |\n| :------- | :------ | :-------------------------------------- | :--------------------------- | :------------------------------------ |\n| exiftool | CLI     | sudo apt install libimage-exiftool-perl | exiftool image.jpg           | Full metadata view/edit               |\n| exif     | CLI     | sudo apt install exif                   | exif image.jpg               | Basic JPEG metadata                   |\n| strings  | CLI     | Built-in                                | strings image.jpg \\| less    | Raw text, possible metadata fragments |\n| mat2     | GUI/CLI | sudo apt install mat2                   | mat2 --gui or mat2 image.jpg | View and remove metadata              |\n***\n## Use Cases\n\n* Digital forensics\n* OSINT (Open Source Intelligence)\n* Cybersecurity investigations\n* Privacy protection (removing GPS/location data)\n***\n## Notes\n\n* ExifTool is the most comprehensive tool and highly recommended for both viewing and editing metadata.\n* MAT2 is useful for bulk removal of metadata from various file types.\n* Always inspect files before sharing to protect personal or sensitive information.\n\n---\n---"}, {"name": "IP Address to Location Lookup", "content": "# IP Address to Location Lookup\n---\nWhen you want to determine the geographical location of an IP address, you can use various online tools. These tools use IP geolocation databases to map an IP address to approximate city, region, and country information.\n\n## Online IP Geolocation Tools\n---\nHere's a list of popular online services for finding the location of an IP address:\n\n| Tool & Description         | URL                                               |\n| :------------------------- | :------------------------------------------------ |\n| IPLocation.net             | [IP Location](https://iplocation.net)             |\n| IPLocation.com             | [IPLocation](https://www.iplocation.com)          |\n| KeyCDN IP Geolocation Tool | [KeyCDN Geo Lookup](https://tools.keycdn.com/geo) |\n| IPinfo.io                  | [IPinfo](https://ipinfo.io)                       |\n\n## How It Works\n---\n*   These tools rely on **IP geolocation databases**, which map IP ranges to locations based on data from Regional Internet Registries (RIRs), ISPs, and other sources.\n*   The results can include:\n    *   City\n    *   Region/State\n    *   Country\n    *   Latitude/Longitude\n    *   ISP/Organization\n\n## Use Cases\n---\n*   Determine the location of a suspicious login attempt.\n*   Analyze visitor analytics for websites.\n*   Diagnose geolocation-related issues.\n---\n---"}, {"name": "OSINT resources", "content": "# 🕵️ People Search & OSINT Resources\n***\nThis section includes tools commonly used in Open Source Intelligence (OSINT) investigations for locating information about individuals, domains, images, infrastructure, and online presence.\n\n### 🔍 General People Search Engines\n***\n*   [Pipl⇗](https://pipl.com/)\n\tUS people searching website.\n\tDeep web search engine for finding individuals using names, emails, usernames, or phone numbers.\n    **Use Case:** Uncover online aliases, social media, and public records across the internet.\n\n*   [ZabaSearch⇗](https://www.zabasearch.com/)\n    U.S.-based people search engine focused on public records such as addresses and phone numbers.\n    **Use Case:** Quickly gather background info like phone numbers, age, and addresses.\n\n### 🖼️ Reverse Image Search\n***\n*   [TinEye⇗](https://tineye.com/)\n    Image recognition search tool that can trace the origin and versions of an image across the web.\n    **Use Case:** Identify fake profiles, monitor image reuse, or find the original source of an image.\n\n### 🌐 Global & Regional Search Engines\n***\n*   [Search Engine Colossus⇗](http://www.searchenginecolossus.com/)\n    A curated list of country-specific search engines from around the world.\n    **Use Case:** Perform localized OSINT searches or access restricted/regional results.\n\n### 🛰️ Satellite & Aerial Imagery\n***\n*   [TerraServer⇗](https://www.terraserver.com/)\n    Offers aerial and satellite imagery primarily for U.S. locations, including historical views.\n    **Use Case:** Infrastructure mapping, terrain analysis, and visual validation of locations.\n- Weather forcaste\n  https://zoom.earth/\n### 🧩 Domain & Hosting Intelligence\n***\n*   [Netcraft⇗](https://www.netcraft.com/)\n    Provides tools for web hosting analysis, phishing detection, SSL certificate data, and DNS info.\n    **Use Case:** Enumerate web servers, identify technologies used, or detect hosting patterns.\n*   [Netcraft Site Report Tool⇗](https://sitereport.netcraft.com/)\n    Investigate specific domain details including IP, hosting provider, and server configuration.\n    **Use Case:** Technical reconnaissance of a target domain.\n*   [Netcraft Report for Armour InfoSec⇗](https://sitereport.netcraft.com/?url=armourinfosec.com)\n    Pre-filled report query for the domain: `armourinfosec.com`.\n\n### 🛡️ IP & Threat Intelligence\n***\n*   [VirusTotal IP Lookup - 104.27.180.58⇗](https://www.virustotal.com/gui/ip-address/104.27.180.58/detection)\n    Aggregates security data from antivirus engines and threat intel services about IPs, URLs, and files.\n    **Use Case:** Assess reputation of IPs, check for malware distribution, and examine communications.\n\n### 🧠 Tip: Combine These Tools\n***\nFor more effective OSINT investigations:\n\n▸ Start with [Pipl](https://pipl.com/) or [ZabaSearch](https://www.zabasearch.com/) for identity clues.\n▸ Use [TinEye](https://tineye.com/) to verify profile pictures.\n▸ Pivot to [Netcraft](https://www.netcraft.com/) and [VirusTotal](https://www.virustotal.com/) for infrastructure intel.\n▸ Use [Search Engine Colossus](http://www.searchenginecolossus.com/) for language-specific/localized lookups.\n\n---"}, {"name": "OSINT", "content": "# Open-Source Intelligence (OSINT)\n---\n## 📖 What is OSINT?\n---\nOpen-Source Intelligence (OSINT) is the process of collecting and analyzing publicly available information to produce actionable intelligence. It involves gathering data from open sources like the internet, public records, media, and social platforms.\n\nOSINT is widely used in:\n*   Cybersecurity\n*   Law enforcement\n*   Military intelligence\n*   Business intelligence\n*   Investigative journalism\n*   Threat hunting and cybercrime investigations\n---\n## 🔑 Key Components of OSINT\n---\n### 📁 Sources of OSINT\n*   **Internet:**\n    Websites, blogs, forums, company websites.\n*   **Social Media:**\n    Facebook, Twitter, Instagram, LinkedIn, Telegram, etc.\n*   **Public Records:**\n    Government databases, court filings, company registries.\n*   **News & Media:**\n    News websites, TV, radio broadcasts.\n*   **Academic Databases:**\n    Research papers, patents, scientific journals.\n*   **Geospatial Data:**\n    Satellite imagery, maps (Google Maps, OpenStreetMap), GPS metadata.\n*   **Technical Data:**\n    WHOIS, DNS records, IP information, exposed devices.\n\n### 🔧 Common Techniques\n*   **Web Scraping:**\n    Automating data collection from websites.\n*   **Social Media Monitoring:**\n    Tracking posts, mentions, and user behavior.\n*   **Google Dorking:**\n    Using advanced Google search operators to find sensitive or hidden information.\n*   **Metadata Analysis:**\n    Extracting hidden information from files (e.g., EXIF data in images, PDF metadata).\n*   **Geolocation:**\n    Pinpointing locations based on images, social media posts, or IP addresses.\n*   **Passive Footprinting:**\n    Gathering information without interacting with the target.\n*   **Active Footprinting:**\n    Directly interacting with the target (e.g., DNS queries, port scanning).\n\n### 🧰 Popular OSINT Tools\n\n| Tool | Purpose |\n| :--- | :--- |\n| **Maltego** | Link analysis, relationship mapping |\n| **Shodan** | Search engine for IoT and connected devices |\n| **SpiderFoot** | Automated OSINT framework (IPs, domains, emails) |\n| **Recon-ng** | Reconnaissance framework for web-based OSINT |\n| **TheHarvester** | Finds emails, domains, hosts, and employee names |\n| **Google Dorks** | Advanced Google search queries |\n| **Metagoofil** | Metadata extraction from public documents |\n| **FOCA** | Extract metadata and hidden information from files |\n| **ExifTool** | Metadata analysis for media files |\n| **OSINT Framework** | Categorized directory of OSINT tools |\n\n👉 Visit: [https://osintframework.com/](https://osintframework.com/)\n\n### 🎯 Applications of OSINT\n*   **Cybersecurity:**\n    Identify vulnerabilities, monitor data breaches, threat intelligence.\n*   **Law Enforcement:**\n    Investigate crimes, track fugitives, gather evidence from open sources.\n*   **Corporate Intelligence:**\n    Competitive analysis, fraud detection, background checks.\n*   **Military:**\n    Monitor geopolitical events, adversary movements, situational awareness.\n*   **Journalism:**\n    Investigative reporting, fact-checking, verifying sources.\n\n### ⚖️ Legal and Ethical Considerations\n*   ✅ Use only **publicly accessible information**.\n*   ❌ Do not hack, trespass, or violate privacy laws.\n*   ✅ Follow data protection regulations like GDPR, HIPAA, etc.\n*   ❌ Misuse of OSINT for stalking, harassment, or cybercrime is illegal.\n\n### 🚀 Example OSINT Workflow\n1.  **Footprinting:**\n    Search for domains, IPs, WHOIS, DNS Info.\n2.  **Social Media Scraping:**\n    Collect information from user profiles, posts, locations.\n3.  **Metadata Extraction:**\n    Download public documents or images and extract metadata.\n4.  **Technical Recon:**\n    Use tools like Shodan to find exposed devices.\n5.  **Analysis:**\n    Correlate data to generate insights.\n6.  **Reporting:**\n    Document findings with evidence screenshots, links, and summaries.\n\n---\n---\n# 🔥 Ashley Madison: The Infamous Data Breach Case in OSINT\n\n## 📖 What is Ashley Madison?\n* Ashley Madison is an online dating website launched in **2001**, targeted toward people seeking **extramarital affairs**.\n* Motto: \"**Life is short. Have an affair.**\"\n* Owned by **Avid Life Media** (now **Ruby Life Inc.**).\n\n## 💥 Ashley Madison Data Breach (2015)\n* 📅 **Incident Date:** July - August 2015\n* 🧽 **Attacker Group:** The Impact Team\n* 🧠 **Reason for Attack:**\n    * Protest against Ashley Madison's business practices, especially their \"**Full Delete**\" feature, which charged users to completely erase their data – but the data wasn't actually deleted.\n\n## 🔒 Breach Details\n* ~30 GB of data leaked publicly.\n* **Leaked Data includes:**\n    * Usernames, real names\n    * Email addresses\n    * Password hashes (bcrypt)\n    * Credit card transactions (partial)\n    * Physical addresses\n    * User profile descriptions\n    * Secret sexual preferences and fantasies\n    * Internal company emails\n\n## 🌐 Data Released On:\n* Dark web via .onion sites.\n* Public torrent sites.\n\n## 🎯 OSINT Impact and Usage\n\n### ✔ What OSINT Practitioners Did:\n* **Analyzed leaked data for:**\n    * Correlation with email addresses.\n    * Credential stuffing attacks (reuse of passwords elsewhere).\n    * Investigations in corporate and government environments.\n    * Linking identities to other online accounts.\n\n### ✔ Tools Used:\n* Hash cracking tools (**John the Ripper, hashcat**) to recover passwords.\n* OSINT platforms (e.g., **Dehashed, Have I Been Pwned**).\n* Data correlation tools like **Maltego, Recon-ng**.\n* Email address and domain search to link users to organizations.\n\n## 💣 Consequences of the Breach\n* **Social:**\n    * Blackmail, extortion, doxing.\n    * Multiple suicides were reported linked to exposure.\n* **Legal:**\n    * Class-action lawsuits against the company.\n    * Fines for poor cybersecurity practices.\n* **Corporate:**\n    * CEO Noel Biderman resigned.\n    * Massive reputational damage.\n* **Cybersecurity:**\n    * Became a major case study in **data protection failure**.\n\n## 🔎 OSINT Lessons Learned\n\n| Lesson                                  | Application                                                                 |\n| :-------------------------------------- | :-------------------------------------------------------------------------- |\n| Data breaches can expose private lives  | Threat actors use breached data for extortion                               |\n| Credential reuse is dangerous           | Enables account takeovers across different services                         |\n| Deleted = Really Deleted                | Paid data deletion isn't always effective                                   |\n| Open-Source data is powerful            | Cross-referencing emails, profiles, and leaks for intel                     |\n| Companies must ensure real data privacy | GDPR and data protection laws now enforce stricter rules                    |\n\n## ⚖️ Ethics & Legality in OSINT\n* **Accessing leaked data:**\n    * Often **illegal**, depending on the jurisdiction.\n* **Using leaked data for investigations:**\n    * Ethical if used for cybersecurity awareness, threat intelligence, or academic research – **NOT** for harassment, blackmail, or personal attacks.\n\n## 🔗 Further Research and Tools\n* **Have I Been Pwned:**\n    * Check if your email was part of the breach:\n    * ➡️ https://haveibeenpwned.com/\n* **Dehashed:**\n    * Deep search into leaked credentials.\n    * ➡️ https://www.dehashed.com/\n* **OSINT Framework:**\n    * ➡️ https://osintframework.com/\n\n## 🔥 Conclusion:\nThe Ashley Madison breach remains one of the most notorious incidents in cybersecurity history. It serves as a **critical case study** for OSINT professionals, ethical hackers, and organizations to understand the power and danger of publicly leaked data.\n\n---\n---"}, {"name": "Reverse IP Domain Lookup", "content": "\n---\n\n>THIS IS NOT JUST IP TO DOMAIN LOOKUP, BUT IT IS GETTING ALL DOMAINS RUNNING FROM A SPECIFIC IP ADDRESS.\n\nReverse IP lookup reveals which **domains** are hosted on a specific **IP address**. This is useful in OSINT, pentesting, and infrastructure mapping.\n\n## Use Cases\n*   Discover other domains sharing the same web server\n*   Identify shared hosting or misconfigured virtual hosts\n*   Uncover staging, dev, or internal sites\n*   Pivot to related targets in recon or bug bounty\n\n## Online Tools\n---\n### [YouGetSignal – Reverse IP Lookup](https://www.yougetsignal.com/tools/web-sites-on-web-server/)\n*   Free and simple tool\n*   Lists other domains hosted on the same IP\n*   Useful for shared/VPS hosting scenarios\n\n### [SecurityTrails](https://securitytrails.com/)\n*   Premium-level passive DNS and historical data\n*   Shows domain-IP associations over time\n*   Offers subdomains, WHOIS, and DNS history\n\n## Example Use\n---\n1.  **Find target IP:**\n```bash\ndig +short example.com\n```\n\n2.  **Lookup IP on** [YouGetSignal](https://www.yougetsignal.com/tools/web-sites-on-web-server/) or [SecurityTrails](https://securitytrails.com/).\n\n---\n## Notes\n---\n*   Shared hosting can return **hundreds of domains** per IP\n*   Dedicated IPs may show only one domain\n*   Cloud/CDN providers (like Cloudflare) will show many unrelated domains\n\n## Defensive Tip\n---\n*   Use dedicated IPs or properly configure virtual hosts\n*   Consider CDN/WAF services to mask real IP\n\n---\n---"}, {"name": "Reverse MAIl server lookup", "content": "# Reverse Mail Server Lookup\n---\n\nReverse Mail Server Lookup is used to identify **domains** that share the same **mail (MX) server**. This can be useful in infrastructure mapping, OSINT, and discovering related domains.\n\n## What It Does\n\nGiven a domain's **MX record**, reverse lookup tools reveal other domains using the **same mail server** (e.g., same IP or hostname).\n\n## Use Cases\n*   Discover organizations hosted on the same email infrastructure\n*   Detect multi-tenant or shared email hosting providers\n*   Identify email server misconfigurations or exposure\n*   Expand target surface in reconnaissance\n\n## How to Find MX Records\n---\n### Using `dig`:\n```bash\ndig armourinfosec.com mx\n```\n\n### Using `nslookup`:\n```bash\nnslookup -type=mx armourinfosec.com\n```\n\n## Online Tool\n---\n*   **[ViewDNS - Reverse MX Lookup](https://viewdns.info/reversemx/)**\n    *   Enter an MX hostname or IP\n    *   Returns all domains using that MX server\n    *   Useful for shared email servers (e.g., `mail.l.google.com`, `mail.protection.outlook.com`)\n\n## Example\n---\nIf `armourinfosec.com` uses:\n```\nmx1.hostingprovider.com (IP: 192.0.2.10)\n```\n\nA reverse MX lookup might reveal:\n*   company1.com\n*   marketingagency.org\n*   dev-clientsite.net\n\n## Defense Tips\n---\n*   Use private or dedicated mail infrastructure\n*   Mask internal MX records using email relays or gateways\n*   Restrict unnecessary domain exposure via DNS\n\n---\n---"}, {"name": "Reverse Name Server (NS) Lookup", "content": "# Reverse Name Server (NS) Lookup\n\n## What Is It?\n\nReverse NS Lookup helps identify all domains using a specific Name Server (NS). It's a power move in:\n\n• Reconnaissance  \n• OSINT investigations  \n• Infrastructure mapping  \n• Bug bounty pivoting\n\n## What It Can Reveal\n\n• Other domains hosted with the same provider  \n• Hidden sub-brands, dev/staging environments  \n• Related assets tied to the same DNS infrastructure  \n• Pivot paths in an organization's digital footprint\n\n## How to Find NS Records\n\n### Using `dig`\n\n```\ndig armourinfosec.com ns\n```\n\n### Using `nslookup`\n\n```\nnslookup -type=ns armourinfosec.com\n```\n\n### Example Output\n\n```\nns1.hostingprovider.com\nns2.hostingprovider.com\n```\n\n## Online Reverse NS Lookup Tools\n\n### [ViewDNS Reverse NS Lookup](https://viewdns.info/reversens/)\n\n• Input a name server hostname (e.g., `ns1.hostingprovider.com`)  \n• Get a list of all domains using that NS  \n• Great for shared hosting recon or mapping digital infrastructure\n\n### [SecurityTrails](https://securitytrails.com/)\n\n• Powerful passive DNS database  \n• Shows historical domain – NS relationships  \n• Also includes subdomains, WHOIS, DNS, and tech stack info\n\n### [DNSDumpster](https://dnsdumpster.com/)\n\n• Free passive DNS tool for domain mapping  \n• Can indirectly reveal NS and A/CNAME relationships\n\n## Example Use Case\n\nIf `armourinfosec.com` uses:\n\n```\nNS: ns1.examplehost.com\n```\n\nA reverse NS lookup may reveal domains like:\n\n• `site1.com`  \n• `companybeta.org`  \n• `dev-clientproject.net`\n\nYou've just uncovered sibling infrastructure or hidden environments!\n\n## Blue Team Defense Tips\n\n• Use private or dedicated name servers for sensitive domains\n\n• Avoid generic/shared DNS for critical infrastructure\n\n• Use DNS providers that support obfuscation (e.g., [Cloudflare](https://www.cloudflare.com/))\n\n• Monitor reverse DNS lookups and NS leaks via tools like:\n  - [SecurityTrails Monitor](https://securitytrails.com/)\n  - [Spyse](https://spyse.com/)\n  - [GreyNoise](https://www.greynoise.io/)\n\n----\n----"}, {"name": "Reverse lookup techniques", "content": "# Reverse Lookup Techniques\n\nA comprehensive guide to all reverse lookup methods for reconnaissance and OSINT.\n\n---\n## 1. Reverse IP Lookup\n\n**Purpose**: Find all domains hosted on the same IP address.\n\n### Online Tools\n\n| Tool | URL |\n|:-----|:----|\n| ViewDNS | [https://viewdns.info/reverseip/](https://viewdns.info/reverseip/) |\n| HackerTarget | [https://hackertarget.com/reverse-ip-lookup/](https://hackertarget.com/reverse-ip-lookup/) |\n| SecurityTrails | [https://securitytrails.com/](https://securitytrails.com/) |\n| DNSlytics | [https://dnslytics.com/reverse-ip](https://dnslytics.com/reverse-ip) |\n\n### Commands\n\nGet IP of domain:\n```bash\ndig +short example.com\n```\n\nUsing SecurityTrails API:\n```bash\ncurl -H \"APIKEY: YOUR_KEY\" \"https://api.securitytrails.com/v1/ips/nearby/192.168.1.1\"\n```\n\n---\n\n## 2. Reverse DNS Lookup (PTR)\n\n**Purpose**: Find hostname associated with an IP address.\n\n### Commands\n\nUsing dig:\n```bash\ndig -x 8.8.8.8\n```\n\nUsing host:\n```bash\nhost 8.8.8.8\n```\n\nUsing nslookup:\n```bash\nnslookup 8.8.8.8\n```\n\n### Online Tools\n- [MXToolbox](https://mxtoolbox.com/ReverseLookup.aspx)\n- [DNSChecker](https://dnschecker.org/reverse-dns-lookup.php)\n\n---\n\n## 3. Reverse Mail Server (MX) Lookup\n\n**Purpose**: Find all domains using the same mail server.\n\n### Process\n\nStep 1 - Find MX record:\n```bash\ndig +short example.com mx\n```\n\nStep 2 - Reverse lookup using:\n\n| Tool | URL | Input |\n|:-----|:----|:------|\n| ViewDNS | [https://viewdns.info/reversemx/](https://viewdns.info/reversemx/) | MX hostname |\n| SecurityTrails | [https://securitytrails.com/](https://securitytrails.com/) | Search: `mx:mail.server.com` |\n\n---\n\n## 4. Reverse Name Server (NS) Lookup\n\n**Purpose**: Find all domains using the same nameserver.\n\n### Online Tools\n\n| Tool | URL | Features |\n|:-----|:----|:---------|\n| ViewDNS | [https://viewdns.info/reversens/](https://viewdns.info/reversens/) | Free, no registration |\n| DNSlytics | [https://dnslytics.com/reverse-ns](https://dnslytics.com/reverse-ns) | Detailed analytics |\n| SecurityTrails | [https://securitytrails.com/](https://securitytrails.com/) | Search: `ns:ns1.example.com` |\n\n### Process\n\nFind NS records:\n```bash\ndig +short example.com ns\n```\n\nThen use nameserver in reverse lookup tools above.\n\n---\n\n## 5. Reverse WHOIS Lookup\n\n**Purpose**: Find all domains registered by same entity.\n\n### Search By\n\n- **Email**: Find domains registered with same email\n- **Organization**: Find domains by company name\n- **Name**: Find domains by registrant name\n\n### Tools\n\n| Tool | URL | Search Options |\n|:-----|:----|:---------------|\n| ViewDNS | [https://viewdns.info/reversewhois/](https://viewdns.info/reversewhois/) | Name, email |\n| WhoisXMLAPI | [https://reverse-whois.whoisxmlapi.com/](https://reverse-whois.whoisxmlapi.com/) | Comprehensive |\n| DomainTools | [https://reversewhois.domaintools.com/](https://reversewhois.domaintools.com/) | Professional tool |\n\n---\n\n## 6. Reverse SSL Certificate Lookup\n\n**Purpose**: Find all domains with certificates from same organization.\n\n### Using crt.sh\n\nSearch by organization:\n```\nhttps://crt.sh/?O=Example%20Company\n```\n\nSearch by domain pattern:\n```\nhttps://crt.sh/?q=%.example.com\n```\n\n### Command Line\n\nUsing crt.sh API:\n```bash\ncurl -s \"https://crt.sh/?q=%.example.com&output=json\" | jq -r '.[].name_value' | sort -u\n```\n\n---\n\n## 7. Reverse Analytics Lookup\n\n**Purpose**: Find domains using same Google Analytics, AdSense IDs.\n\n### Tools\n\n| Tool      | URL                                              | Tracks                  |\n| :-------- | :----------------------------------------------- | :---------------------- |\n| AnalyzeID | [https://analyzeid.com/](https://analyzeid.com/) | Multiple tracking codes |\n| DNSlytics | [https://dnslytics.com/](https://dnslytics.com/) | Various identifiers     |\n\n---\n\n## 8. Reverse ASN Lookup\n\n**Purpose**: Find all IP ranges and domains in an AS (Autonomous System).\n\n### Find ASN\n\nUsing whois:\n```bash\nwhois -h whois.radb.net 8.8.8.8\n```\n\n### ASN Lookups\n\n| Tool | URL |\n|:-----|:----|\n| BGPView | [https://bgpview.io/](https://bgpview.io/) |\n| Hurricane Electric | [https://bgp.he.net/](https://bgp.he.net/) |\n| IPinfo | [https://ipinfo.io/](https://ipinfo.io/) |\n\n---\n\n## Automation Commands\n\n### Get all domains on same IP:\n```bash\ncurl -s \"https://api.hackertarget.com/reverseiplookup/?q=192.168.1.1\"\n```\n\n### Get all domains with same nameserver:\n```bash\ncurl -s \"https://api.securitytrails.com/v1/search/list\" -H \"APIKEY: YOUR_KEY\" -H \"Content-Type: application/json\" -d '{\"filter\": {\"ns\": \"ns1.example.com\"}}'\n```\n\n### Find subdomains via SSL:\n```bash\ncurl -s \"https://crt.sh/?q=%.example.com&output=json\" | jq -r '.[].name_value' | sort -u\n```\n\n---\n---"}, {"name": "Spidering and Crawling in Penetration Testing", "content": "# Spidering and Crawling in Penetration Testing\n\nSpidering and crawling are essential techniques in penetration testing, particularly for web applications. These techniques help security testers map the structure of a website, uncover hidden resources, and identify potential attack surfaces.\n\n## Spidering\n\nSpidering is an automated process that traverses a website by following hyperlinks. It aims to build a comprehensive map of the site's structure and identify all accessible endpoints.\n\n### Key Features of Spidering\n\n- **Purpose:** Gather as much information as possible about the website, such as URLs, parameters, and resources.\n    \n- **Tools:** Tools like Burp Suite, OWASP ZAP, and Arachni are commonly used for spidering.\n    \n- **Use Case:** Identify pages that may not be directly linked from the main site, such as admin panels, hidden forms, or backup files.\n    \n\n### Spidering Process\n\n- **Starting Point:** Begin with a seed URL.\n    \n- **Traversal:** Follow all hyperlinks on each page (internal and external).\n    \n- **Data Logging:** Record discovered URLs, query parameters, and any dynamic endpoints for further analysis.\n    \n- **Scope Control:** Configure scope to avoid unnecessary pages (e.g., third-party links or irrelevant domains).\n    \n\n### Common Challenges\n\n- **Dynamic Content:** JavaScript-heavy websites may require specialized tools or headless browsers.\n    \n- **Access Restrictions:** Some areas may be protected by authentication or IP restrictions.\n    \n\n## Crawling\n\nCrawling is a broader process of systematically browsing and indexing content across the internet or within a specific website. In the context of penetration testing, crawling helps identify publicly accessible resources and gain a complete view of the attack surface.\n\n### Key Features of Crawling\n\n- **Purpose:** Build an index of the website's content for analysis and testing.\n    \n- **Tools:** Tools like Burp Suite's crawler, OWASP ZAP, and custom scripts can perform deep crawling.\n    \n- **Use Case:** Primarily used in SEO and digital marketing, but in security testing, it helps identify overlooked files and directories.\n    \n\n### Crawling Process\n\n- **Discovery:** Systematically fetch pages, parse content, and extract links.\n    \n- **Depth and Breadth:** Configure to crawl deep (many levels of links) and broad (across all discovered paths).\n    \n- **Data Collection:** Identify accessible resources, including static and dynamic content.\n    \n\n## Benefits of Spidering and Crawling in Penetration Testing\n\n- **Discovery of Hidden Pages:** Find directories, admin panels, development files, and test environments.\n    \n- **Parameter Enumeration:** Identify query parameters and inputs that could be vulnerable to injection or manipulation.\n    \n- **Content Discovery:** Locate sensitive files (e.g., backups, configuration files, logs) that could reveal valuable information.\n    \n- **Improved Reconnaissance:** Obtain a complete understanding of the application's structure, including entry points for further testing.\n    \n- **Enhanced Attack Surface Mapping:** Map all resources to identify potential security misconfigurations.\n    \n\n## Common Tools for Spidering and Crawling\n\n|Tool|Purpose|Features|\n|---|---|---|\n|Burp Suite|Comprehensive web security testing suite|Integrated spider, active/passive scanning|\n|OWASP ZAP|Open-source web application security scanner|Spidering, scanning, and automated attack options|\n|Arachni|High-performance web application security scanner|Distributed crawling and scanning capabilities|\n|Dirbuster / Dirb / Gobuster|Directory and file brute-forcing tools|Useful for discovering hidden resources|\n\n## Best Practices\n\n- **Set Proper Scope:** Define the target scope to avoid unnecessary or potentially disruptive crawling.\n    \n- **Respect Robots.txt (or Not):** Decide whether to obey robots.txt based on testing needs and ethical considerations.\n    \n- **Use Throttling:** Avoid overloading the target server by setting request rates and delays.\n    \n- **Combine with Manual Testing:** Automated spidering and crawling are powerful but should be complemented with manual exploration to find edge cases.\n\n---\n---"}, {"name": "Traceroute", "content": "# IP Traceroute Tool\n---\n\nTraceroute is a diagnostic tool used to track the path that a packet takes from a source host to a destination IP or domain. It helps identify delays, routing loops, and points of failure in the network.\n\n## How Traceroute Works\n---\n\nTraceroute sends packets with incrementally increasing Time-To-Live (TTL) values. Each router that handles the packet decreases the TTL by 1. When TTL reaches 0, the router returns a “Time Exceeded” message, revealing its IP.\n\n## Common Traceroute Tools\n---\n\n| Tool              | Description                             | Platform       |\n| :---------------- | :-------------------------------------- | :------------- |\n| traceroute        | Default traceroute tool on Linux        | Linux          |\n| tracert           | Traceroute command on Windows           | Windows        |\n| mtr               | Combines traceroute and ping            | Linux          |\n| nmap --traceroute | Traceroute integrated into network scan | Cross-platform |\n| tcptraceroute     | Uses TCP instead of ICMP/UDP            | Linux          |\n| tracepath         | Lightweight alternative to traceroute   | Linux          |\n\n## Example Commands\n---\n### Linux (traceroute)\n```\ntraceroute google.com\n```\n### Windows (tracert)\n```\ntracert google.com\n```\n### MTR (Live route and latency statistics)\n```\nmtr google.com\n```\n### TCP Traceroute (for filtered ICMP)\n```\nsudo tcptraceroute google.com 80\n```\n### Tracepath\n```\ntracepath google.com\n```\n\n## Online Traceroute Tools\n---\n\n| Tool               | URL                                                        |\n| :----------------- | :--------------------------------------------------------- |\n| GRC ShieldsUP!     | https://www.grc.com/shieldsup                             |\n| Ping.eu            | https://ping.eu/traceroute/                               |\n| DNS Checker        | https://dnschecker.org/traceroute                         |\n| T1 Shopper         | https://www.site24x7.com/tools/traceroute.html (alternative) |\n| YouGetSignal       | https://www.yougetsignal.com/tools/visual-tracert/        |\n\n## Sample Output (Linux)\n---\n```\n$ traceroute google.com\n 1  192.168.1.1 (192.168.1.1)     1.123 ms   0.982 ms   1.074 ms\n 2  100.72.96.1 (100.72.96.1)     9.241 ms   9.238 ms   9.230 ms\n 3  172.217.163.110 (172.217.163.110) 25.647 ms  25.648 ms  25.649 ms\n```\n\n## Notes\n---\n*   ICMP/UDP filtering by firewalls can block standard traceroute responses.  \n*   TCP-based traceroute is useful for bypassing ICMP filtering (e.g., via port 80).  \n*   MTR is more dynamic and shows live latency/loss per hop.  \n---\n---"}, {"name": "email spoofing", "content": "# Email Spoofing\n\n***\n### ❓ What is Email Spoofing?\nEmail spoofing is a technique used in cyber attacks to forge the **`From`** address of an email to make it appear as though it came from a **trusted or legitimate** source, even though it did not.\n\n*   🎯 **Goal:** To trick the recipient into opening, trusting, or acting on a fraudulent email (e.g., clicking malicious links, downloading attachments, or disclosing sensitive information).\n\n***\n### 🛠️ How Email Spoofing Works\nSpoofing typically modifies the **`SMTP \"MAIL FROM\"`** or **`\"From\" header`** in an email:\n\n*   SMTP lacks built-in authentication, making it easy for attackers to forge the sender field.\n*   Attackers often use **open mail relays** or **misconfigured MTAs** to send spoofed messages.\n*   Advanced spoofing includes faking **`reply-to`**, **`display name`**, or entire email headers.\n\n***\n### 📄 Example of Spoofed Header\n```\n1 From: \"Bank Support\" <support@bank.com>\n2 Reply-To: hacker@gmail.com\n3 Received: from attacker-server.com (192.0.2.1)\n```\nThe 'From' address looks legit, but the mail actually came from `attacker-server.com`.\n\n***\n### ▲ Risks of Email Spoofing\n*   Phishing attacks\n*   Business Email Compromise (BEC)\n*   Credential theft\n*   Malware distribution\n\n***\n### 🛡️ How to Detect Email Spoofing\n***\n*   Check **`email headers`** for suspicious **`Received:`** lines and IP addresses.\n*   Verify **`SPF`**, **`DKIM`**, and **`DMARC`** records.\n\n***\n### ✅ Preventing Email Spoofing (Defensive Measures)\n***\n\n| Technology | Purpose |\n| :--- | :--- |\n| **SPF (Sender Policy Framework)** | Defines which mail servers are allowed to send on behalf of a domain |\n| **DKIM (DomainKeys Identified Mail)** | Adds digital signature to verify the message content hasn't been altered |\n| **DMARC (Domain-based Message Authentication, Reporting & Conformance)** | Combines SPF & DKIM to enforce policy and report spoofing attempts |\n\n***\n### 🧪 Tools to Analyze Spoofed Emails\n***\n*   [MXToolbox SPF/DKIM Checker](https://mxtoolbox.com/SuperTool.aspx)\n*   [Google Admin Toolbox Messageheader Analyzer](https://toolbox.googleapps.com/apps/messageheader/)\n*   `email-tracer` tools like:\n    *   [Cyber Forensics](https://whatismyipaddress.com/trace-email)\n    *   [IP2Location Email Tracer](https://www.ip2location.com/email-tracer)\n\n### 🛠️ Online Email Spoofing Tools (For Testing & Education Only)\n***\n\n| Tool                                                                      | Description                                                |\n| :------------------------------------------------------------------------ | :--------------------------------------------------------- |\n| [Anonymailer.net](https://anonymailer.net/)                               | Send anonymous or spoofed emails without registration      |\n| [Emkei.cz](https://emkei.cz/)                                             | Popular spoof email web interface with full header control |\n| [SpoofBox Email Preview](https://www.spoofbox.com/en/preview/spoof-email) | Spoof email and SMS testing tools with optional login      |\n\n### 🔎 DMARC Record Checker Tools\n***\nUse these tools to check a domain's DMARC, SPF, and DKIM records and verify email protection settings.\n\n| Tool                                                              | Description                                               |\n| :---------------------------------------------------------------- | :-------------------------------------------------------- |\n| [EasyDMARC Lookup Tool](https://easydmarc.com/tools/dmarc-lookup) | Checks DMARC, SPF, DKIM for any domain                    |\n| [MXToolbox](https://mxtoolbox.com/)                               | Multi-purpose DNS, SMTP, and email authentication checker |\n| [DMARCian Inspector](https://dmarcian.com/dmarc-inspector/)       | Visualizes DMARC records and evaluates alignment          |\n\n### 🧪 Command-Line: Check DMARC/SPF/DKIM TXT Records with `dig`\n***\n\n*   Check TXT records for `armourinfosec.com`\n    ```bash\n    dig -t txt armourinfosec.com\n    ```\n*   Check TXT records for `india.gov.in`\n    ```bash\n    dig -t txt india.gov.in\n    ```\n\nLook for results containing:\n\n*   `v=DMARC1;` for DMARC\n*   `v=spf1` for SPF\n*   `k=rsa; p=...` for DKIM (in selector subdomain)\n\n---\n----"}, {"name": "email tracing basic", "content": "# Email Tracing & Protocols\n\n## What is E-mail?\n\nE-mail (Electronic Mail) allows users to send and receive messages over the internet.\n\n## Three Parts of an Email Address\n\n**Example:** sachin@armourinfosec.com\n\n1. **sachin** - Account name or username\n2. **@** - Separator\n3. **armourinfosec.com** - Domain (could represent company, group, or department)\n\n## Mail User Agent (MUA)\n\nA Mail User Agent (MUA) is software that allows users to send and receive emails.\n\n### MUA Programs:\n\n- Microsoft Outlook\n- Mozilla Thunderbird\n\n### MUA Web-Based Clients:\n\n- Gmail\n- Yahoo Mail\n- Outlook.com\n\n---\n\n# Mail User Agent (MUA) Programs\n\nA Mail User Agent (MUA) is a software application that enables users to compose, send, receive, and manage their email.\n\n## Desktop-Based MUA Programs\n\n|MUA Program|Platform|Description|\n|---|---|---|\n|Microsoft Outlook|Windows, macOS|Feature-rich client, supports Exchange, POP3, IMAP|\n|Mozilla Thunderbird|Windows, macOS, Linux|Free, open-source; supports add-ons and multiple accounts|\n|eM Client|Windows, macOS|Simple UI, calendar integration|\n|Mailbird|Windows|Lightweight, supports third-party apps|\n|Apple Mail|macOS, iOS|Default client for Apple devices|\n|The Bat!|Windows|Advanced filtering and encryption support|\n|Claws Mail|Linux, Windows|Lightweight and fast, focused on performance|\n|Evolution|Linux|GNOME desktop default email client with calendar and tasks|\n\n## Web-Based MUA Clients (FYI)\n\nWhile not installed programs, popular web-based MUAs include:\n\n- Gmail (via browser)\n- Outlook.com\n- Yahoo Mail\n- ProtonMail\n\n---\n\n# Mail Delivery Agent (MDA)\n\nA Mail Delivery Agent (MDA) is a software component responsible for receiving email messages from the Mail Transfer Agent (MTA) and delivering them to the recipient's mailbox.\n\n## MDA Workflow\n\n1. [Sender MUA] → [Sender MTA] → [Recipient MTA] → **[MDA]** → [Recipient Mailbox]\n\n- The MTA routes the email\n- The MDA handles the final delivery to the correct mailbox (e.g., `/var/mail/username` or a maildir)\n\n## Common MDA Protocols\n\n|Protocol|Description|Default Port|Secure Port|\n|---|---|---|---|\n|POP3|Downloads email from server to client and deletes from server|110|995 (SSL/TLS)|\n|IMAP|Accesses email stored on server; syncs across devices|143|993 (SSL/TLS)|\n\n## Popular MDA Software\n\n|MDA Tool|Description|\n|---|---|\n|Procmail|One of the oldest MDAs, supports filtering and mail sorting|\n|Maildrop|Lightweight MDA, used with Courier mail server|\n|Dovecot|Commonly used for IMAP/POP3 and mailbox delivery|\n|Postfix (Local)|Postfix can act as an MDA when configured with `local`|\n|Fetchmail|Technically a remote mail retriever, often used with MDA for local delivery|\n\n## Key Points\n\n- The MDA does not send emails; it only delivers them locally\n- It may perform actions like:\n    - Filtering spam\n    - Sorting into folders\n    - Triggering scripts\n- MDA is often integrated with email servers like Dovecot or Postfix\n\n---\n\n# Mail Transfer Agent (MTA)\n\nA Mail Transfer Agent (MTA) is a software application responsible for sending, receiving, and routing email messages between mail servers.\n\n## What Does an MTA Do?\n\n- Accepts outgoing mail from a Mail User Agent (MUA)\n- Routes email to the destination MTA (or relays it through other MTAs)\n- Hands off messages to a Mail Delivery Agent (MDA) for final delivery\n\n## MTA Workflow\n\n1. [Sender MUA] → **[Sender MTA]** → [Internet] → **[Recipient MTA]** → [MDA] → [Recipient Mailbox]\n\n## Protocol Used\n\n- SMTP (Simple Mail Transfer Protocol)\n\n|Protocol|Purpose|Port (Unencrypted)|Port (Encrypted)|\n|---|---|---|---|\n|SMTP|Sending/relaying mail|25|465 (SSL), 587 (STARTTLS)|\n\n## Popular MTA Software\n\n|MTA Tool|Description|\n|---|---|\n|Postfix|Secure, fast, and popular open-source MTA (Linux default)|\n|Sendmail|One of the earliest MTAs; powerful but complex|\n|Exim|Flexible, often used in cPanel hosting environments|\n|Qmail|Secure, modular design with less complexity|\n|Microsoft Exchange Server|Enterprise-grade mail server with MTA capabilities|\n\n## MTA Security Features\n\n- TLS encryption for secure transmission\n- SPF/DKIM/DMARC validation for sender authenticity\n- Anti-spam and rate-limiting for outgoing/incoming messages\n\n## Key Responsibilities\n\n- Queue and retry failed email delivery attempts\n- Perform DNS lookups for recipient domains\n- Apply routing rules and filters\n- Log all email activity for monitoring\n\n---\n\n# Diagram: Email Flow – MUA → MTA → MDA\n\n```\n┌─────────────┐    ┌─────────────┐    ┌─────────────┐    ┌─────────────┐\n│   Sender's  │ ──→│   Sender's  │ ──→│ Recipient's │ ──→│ Recipient's │\n│     MUA     │    │     MTA     │    │     MTA     │    │     MDA     │\n└─────────────┘    └─────────────┘    └─────────────┘    └─────────────┘\n      (1)             (2) SMTP           (3) SMTP         (4) POP3/IMAP\n Compose & Send   Transfer to Internet  Receive via MX Record  Deliver to Mailbox\n```\n\n## Legend:\n\n1. **MUA** (Mail User Agent): Email client like Outlook or Thunderbird\n2. **MTA** (Mail Transfer Agent): Mail servers like Postfix, Sendmail\n3. **MDA** (Mail Delivery Agent): Handles mailbox delivery using Dovecot, Procmail\n4. **Protocols:**\n    - MUA → MTA: uses SMTP\n    - MTA → MTA: uses SMTP\n    - MTA → MDA: usually local delivery\n    - MDA → MUA (for reading): uses POP3 or IMAP\n\n---\n\n# How to Check MTA Logs\n\n## Postfix Logs (Linux)\n\nPostfix logs are usually located in:\n\n```\n/var/log/mail.log\n```\n\nExample command:\n\n```\nsudo grep postfix /var/log/mail.log\n```\n\nTo filter specific activities (e.g., email sent):\n\n```\nsudo grep \"status=sent\" /var/log/mail.log\n```\n\n## Exim Logs\n\nCommon log files:\n\n- **Main log:** `/var/log/exim/mainlog`\n- **Reject log:** `/var/log/exim/rejectlog`\n- **Panic log:** `/var/log/exim/paniclog`\n\nExample to view latest email deliveries:\n\n```\nsudo tail -f /var/log/exim/mainlog\n```\n\n---\n\n# Simple Mail Transfer Protocol (SMTP)\n\nUsed for sending emails from a client to a server or between servers.\n\n- **Port 25** – Default (non-encrypted)\n- **Port 465 (TCP)** – Secure (SSL/TLS)\n- **Port 587 (TCP)** – Secure (STARTTLS)\n\n# Post Office Protocol v3 (POP3)\n\nUsed for downloading emails from a remote server to a local client.\n\n- **Port 110** – Default (non-encrypted)\n- **Port 995 (TCP)** – Secure (encrypted)\n\n# Internet Message Access Protocol (IMAP)\n\nUsed to access email on a remote server without downloading.\n\n- **Port 143** – Default (non-encrypted)\n- **Port 993 (TCP)** – Secure (encrypted)\n\n---\n\n# What is Email Tracing?\n\nEmail Tracing is the process of monitoring and analyzing email communication to gather information such as:\n\n- Sender's IP address\n- Geographic location of the sender\n- Email service provider used\n- Time and date of sending\n- Mail server hops (via headers)\n\nThis is especially useful in cyber forensics, incident response, and phishing investigations.\n\n# How Email Tracing Works\n\nWhen someone sends an email, each mail server it passes through adds a \"Received\" header. These headers help trace the route the email took.\n\nBy examining the email headers, investigators can:\n\n- Identify the source IP address of the sender\n- Check time stamps of each mail server that handled the message\n- Detect forged headers or spoofing attempts\n\n## Example Email Header (Simplified)\n\n```\nReceived: from unknown (HELO mail.example.com) (192.168.1.10)\n    by mail.yourdomain.com with SMTP; Thu, 1 Jul 2025 10:00:00 +0530\n```\n\n- **192.168.1.10** — IP address of the sender (may vary depending on relay or masking)\n- **mail.example.com** — Hostname used by sender\n- Timestamps show delivery path and delay between servers\n\n---"}, {"name": "email tracing tools", "content": "# Email Tracking Tools\n---\nEmail tracking tools help monitor whether emails were opened, when they were read, and sometimes even where the recipient was located.\n\n### 🔧 Common Email Tracking Tools\n---\n\n| Tool Name            | Description                                                             |\n| :------------------- | :---------------------------------------------------------------------- |\n| **GetNotify**        | Tracks email opens and clicks, provides read location and IP info       |\n| **ReadNotify**       | Notifies when an email is opened, how long it was read, and device info |\n| **PoliteMail**       | Outlook plugin for corporate email analytics and tracking               |\n| **Email Lookup**     | Identifies sender or receiver details from email addresses              |\n| **eMailTrackerPro**  | Analyzes full headers and traces the origin of emails                   |\n| **DidTheyReadIt**    | Sends tracked emails and alerts you when they're opened                 |\n| **WhoReadMe**        | Free tracker that shows open status and IP geolocation                  |\n| **G-Lock Analytics** | Email tracking with detailed engagement stats; supports campaigns       |\n| **MSGTAG**           | Desktop-based tool that adds read receipts to standard email clients    |\n| **Trace Email**      | Investigates email headers to trace the source server/IP                |\n| **Lock Analytics**   | (Possibly part of G-Lock or standalone analytics platform)              |\n\n> 💡 Some tools use invisible pixels or web beacons to track when an email is opened. Be aware of *privacy and ethical considerations* when using tracking tools.\n\nhttp://ww1.email81.com/case/d74156d9fbec4049/zero.jpg\n\n---\n---"}, {"name": "fofa", "content": "# NDA in Penetration Testing\n***\nIn penetration testing (pentest), an NDA (Non-Disclosure Agreement) is a **legal contract** signed between the **client** and the **penetration tester or security company** to protect sensitive information.\n\n## What is an NDA in Pentesting?\n***\nAn **NDA** ensures that:\n*   All **confidential information** shared or discovered during the engagement remains **private**.\n*   The tester does **not disclose, reuse, or share** any protected information.\n*   The client can safely disclose **internal systems, network architecture, credentials, etc.**\n\n## Key Components of a Pentesting NDA\n***\n\n| Section | Description |\n| :--- | :--- |\n| **Definition of Confidential Info** | Specifies what is considered confidential (e.g., IP addresses, credentials). |\n| **Obligations of the Tester** | Tester must protect and not disclose any confidential information. |\n| **Exclusions** | What is **not** confidential (e.g., public data, prior known info). |\n| **Term/Duration** | How long the NDA is valid (e.g., 1–5 years after testing ends). |\n| **Permitted Disclosures** | Allows sharing with authorized personnel under certain conditions. |\n| **Return or Destruction of Info** | Tester must return or destroy data post-engagement. |\n| **Legal Remedies** | Penalties if the NDA is breached. |\n\n---\n### Note:  Digital Signatures for Contracts\n\nFor international or remote contracts, digital signature platforms are commonly used to legally sign documents like NDAs. Websites such as **[DocuSign](https://www.docusign.com/en-in)** and other similar services provide a secure and verifiable way to execute agreements between parties regardless of their physical location.\n\n## Why NDAs Matter in Pentests\n***\n*   ✅ **Builds trust** between tester and client.\n*   🔒 **Protects client data** and internal infrastructure details.\n*   📜 **Ensures legal compliance**, especially in regulated industries (e.g., finance, healthcare).\n*   📋 **Clarifies scope rules** and confidentiality boundaries.\n\n## Who Signs It?\n***\n*   **Client's representative** (e.g., CISO, IT Manager)\n*   **Penetration tester or firm's authorized signatory**\n*   Any **subcontractors** involved (if applicable)\n\n## When is the NDA Signed?\n***\nThe NDA is signed **before**:\n*   Any information is shared.\n*   Rules of engagement (RoE) are discussed.\n*   Statement of Work (SoW) is finalized.\n\n## Summary\n***\nAn NDA in a pentest engagement is a **foundational legal safeguard**. It allows open communication between parties while ensuring that **confidential information remains protected** before, during, and after the test.\n\n---\n---"}, {"name": "githound", "content": "## GitHound – GitHub Recon Tool\n---\n**GitHound** is an advanced tool for hunting sensitive information across GitHub repositories. It searches for credentials, API keys, secrets, and sensitive files that may have been leaked in public repositories.\n\n🔗 [GitHub Repository](https://github.com/tillson/git-hound)\n🔗 [Latest Release v1.7.2](https://github.com/tillson/git-hound/releases/tag/v1.7.2)\n\n---\n### 🛠️ Installation\n---\n\n**1️⃣ Download GitHound Binary**\n\n```bash\nwget https://github.com/tillson/git-hound/releases/download/v1.7.2/git-hound_1.7.2_linux_amd64.tar.gz\n```\n\n**2️⃣ Extract the Archive**\n\n```bash\ntar -xvf git-hound_1.7.2_linux_amd64.tar.gz\n```\n\n**3️⃣ Move Binary to System Path**\n\n```bash\ncp -v git-hound /usr/local/bin/\n```\n\n### ✅ Basic Usage\n---\n**Run GitHound:**\n\n```bash\ngit-hound\n```\n\n**Show Help:**\n\n```bash\ngit-hound -h\n```\n\n### ⚙️ Configure GitHound\n---\n**Download Example Configuration:**\n\n```bash\nwget https://raw.githubusercontent.com/tillson/git-hound/main/config.example.yml -O config.yml\n```\n\n**🔧 `config.yml` Includes:**\n*   Whitelist keywords to reduce false positives\n*   Blacklist domains (exclude your own company's domains)\n*   Regex patterns for secret detection\n\nEdit `config.yml` to fine-tune searches for your needs.\n\n### 🔍 Example Usage\n---\n**Search for leaks related to an organization:**\n\n```bash\ngit-hound --subdomain example.com\n```\n\n**Search using keywords:**\n\n```bash\ngit-hound --dig-keyword \"aws_access_key_id\"\n```\n\n**Combine with config:**\n\n```bash\ngit-hound --config config.yml --dig-keyword \"api_key\"\n```\n\n### 🔥 Features\n---\n*   Regex-based secret searching\n*   Keyword searching\n*   Domain-specific hunting (`--subdomain`)\n*   Supports whitelisting/blacklisting\n*   Fast and efficient scanning\n---\n---"}, {"name": "github recon", "content": "## 🌍 GitHub Recon\n---\n### 🐙 GitHub\n---\n#### 📖 What is GitHub?\nGitHub is a web-based platform for version control and collaboration, built around **Git**, a distributed version control system. GitHub hosts millions of repositories containing open-source and private code, documents, configurations, and data.\n\n#### ⭐ GitHub Provides:\n*   Code repositories\n*   Issue tracking\n*   Documentation (Wikis)\n*   Actions for CI/CD (Automation)\n*   GitHub Pages (Static website hosting)\n*   Collaboration tools for developers\n\n#### 📖 What is GitHub Recon?\n---\nGitHub Recon refers to gathering publicly accessible information from GitHub repositories, which may include:\n\n*   🔑 Secrets (API keys, credentials)\n*   📂 Sensitive files (config files, database dumps)\n*   ☁️ Infrastructure information\n*   📄 Internal documentation\n*   👤 Developer info (emails, usernames)\n\nA key part of OSINT (Open-Source Intelligence), GitHub Recon is used by:\n*   ✅ Penetration testers\n*   ✅ Bug bounty hunters\n*   ✅ Red team operators\n*   ✅ Threat hunters\n\n### 🎯 Why GitHub Recon?\n---\n\n| 🔥 Objective                     | ✅ Benefit                              |\n| -------------------------------- | -------------------------------------- |\n| Find sensitive files             | Configs, credentials, backups          |\n| Discover API keys and tokens     | AWS, Google, Azure, Twilio, etc.       |\n| Identify internal infrastructure | Domains, IPs, databases                |\n| Map developers                   | Emails, usernames, contrib
