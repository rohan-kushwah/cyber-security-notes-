\n- **Shoulder Surfing**: Observing user activity for credentials or data\n\n---\n----\n## Attack Surface Mapping\n----\nAttack surface mapping is the process of identifying and analyzing all possible points of interaction with a target system or organization. This helps security professionals understand the scope of potential vulnerabilities that attackers could exploit.\n\n### Key Components of Attack Surface Mapping\n\n### 1. External Attack Surface\n\nFocuses on everything exposed to the public internet.\n\n- **Public-Facing Applications**: Web apps, APIs, email servers, VPN gateways\n- **Public IP Addresses**: IP ranges associated with the organization\n- **DNS Records**: Subdomains, MX records, and other DNS entries\n- **Cloud Services**: Public cloud resources, storage buckets, and exposed APIs\n- **Third-Party Services**: External dependencies or integrations\n\n### 2. Internal Attack Surface\n\nInvolves assets that may not be directly exposed but could be exploited once an attacker gains internal access.\n\n- **Internal Web Applications**: Intranet portals, admin consoles\n- **Internal Networks**: Network segments, shared drives, internal APIs\n- **User Accounts**: Usernames, group memberships, privilege levels\n- **Internal Services**: Databases, file servers, and messaging services\n\n### 3. Physical Attack Surface\n\nConsiders physical locations and devices.\n\n- **Office Buildings**: Physical access points and security controls\n- **Employee Devices**: Laptops, mobile devices, USB drives\n- **IoT Devices**: Cameras, sensors, and smart devices\n- **Dumpster Diving Risks**: Documents or hardware in the trash\n\n---\n\n## Process of Attack Surface Mapping\n\n1. **Discovery**: Identify all assets (external, internal, physical)\n2. **Enumeration**: Gather detailed information about each asset (e.g., versions, configurations)\n3. **Classification**: Determine the sensitivity and criticality of each asset\n4. **Risk Assessment**: Evaluate potential vulnerabilities and the impact of an attack\n5. **Visualization**: Map out the attack surface using diagrams or tables\n6. **Prioritization**: Focus on the most critical and vulnerable points\n\n---\n\n## Tools and Techniques\n\n- **Network Scanning**: Nmap, Masscan\n- **Web Crawling**: OWASP ZAP, Burp Suite\n- **OSINT**: Recon-ng, Maltego, Shodan\n- **Vulnerability Scanning**: Nessus, OpenVAS\n- **Cloud Tools**: ScoutSuite, CloudMapper\n- **Physical Recon**: Physical walkthroughs and social engineering assessments\n\n---\n\n## Benefits of Attack Surface Mapping\n\n- Provides a clear view of exposure points\n- Enables proactive risk management\n- Informs security testing and vulnerability assessments\n- Enhances incident response and monitoring efforts\n\n---\n---"}, {"name": "reverse ns,mx,ip,openports", "content": "# Reverse IP Domain Lookup\n---\n\n>THIS IS NOT JUST IP TO DOMAIN LOOKUP, BUT IT IS GETTING ALL DOMAINS RUNNING FROM A SPECIFIC IP ADDRESS.\n\nReverse IP lookup reveals which **domains** are hosted on a specific **IP address**. This is useful in OSINT, pentesting, and infrastructure mapping.\n\n## Use Cases\n*   Discover other domains sharing the same web server\n*   Identify shared hosting or misconfigured virtual hosts\n*   Uncover staging, dev, or internal sites\n*   Pivot to related targets in recon or bug bounty\n\n## Online Tools\n---\n### [YouGetSignal – Reverse IP Lookup](https://www.yougetsignal.com/tools/web-sites-on-web-server/)\n*   Free and simple tool\n*   Lists other domains hosted on the same IP\n*   Useful for shared/VPS hosting scenarios\n\n### [SecurityTrails](https://securitytrails.com/)\n*   Premium-level passive DNS and historical data\n*   Shows domain-IP associations over time\n*   Offers subdomains, WHOIS, and DNS history\n\n## Example Use\n---\n1.  **Find target IP:**\n```bash\ndig +short example.com\n```\n\n2.  **Lookup IP on** [YouGetSignal](https://www.yougetsignal.com/tools/web-sites-on-web-server/) or [SecurityTrails](https://securitytrails.com/).\n\n---\n## Notes\n---\n*   Shared hosting can return **hundreds of domains** per IP\n*   Dedicated IPs may show only one domain\n*   Cloud/CDN providers (like Cloudflare) will show many unrelated domains\n\n## Defensive Tip\n---\n*   Use dedicated IPs or properly configure virtual hosts\n*   Consider CDN/WAF services to mask real IP\n\n---\n---\n\n# Reverse Mail Server Lookup\n---\n\nReverse Mail Server Lookup is used to identify **domains** that share the same **mail (MX) server**. This can be useful in infrastructure mapping, OSINT, and discovering related domains.\n\n## What It Does\n\nGiven a domain's **MX record**, reverse lookup tools reveal other domains using the **same mail server** (e.g., same IP or hostname).\n\n## Use Cases\n*   Discover organizations hosted on the same email infrastructure\n*   Detect multi-tenant or shared email hosting providers\n*   Identify email server misconfigurations or exposure\n*   Expand target surface in reconnaissance\n\n## How to Find MX Records\n---\n### Using `dig`:\n```bash\ndig armourinfosec.com mx\n```\n\n### Using `nslookup`:\n```bash\nnslookup -type=mx armourinfosec.com\n```\n\n## Online Tool\n---\n*   **[ViewDNS - Reverse MX Lookup](https://viewdns.info/reversemx/)**\n    *   Enter an MX hostname or IP\n    *   Returns all domains using that MX server\n    *   Useful for shared email servers (e.g., `mail.l.google.com`, `mail.protection.outlook.com`)\n\n## Example\n---\nIf `armourinfosec.com` uses:\n```\nmx1.hostingprovider.com (IP: 192.0.2.10)\n```\n\nA reverse MX lookup might reveal:\n*   company1.com\n*   marketingagency.org\n*   dev-clientsite.net\n\n## Defense Tips\n---\n*   Use private or dedicated mail infrastructure\n*   Mask internal MX records using email relays or gateways\n*   Restrict unnecessary domain exposure via DNS\n\n\n---```\\\n\n\n# Reverse Name Server (NS) Lookup\n\n## What Is It?\n\nReverse NS Lookup helps identify all domains using a specific Name Server (NS). It's a power move in:\n\n• Reconnaissance  \n• OSINT investigations  \n• Infrastructure mapping  \n• Bug bounty pivoting\n\n## What It Can Reveal\n\n• Other domains hosted with the same provider  \n• Hidden sub-brands, dev/staging environments  \n• Related assets tied to the same DNS infrastructure  \n• Pivot paths in an organization's digital footprint\n\n## How to Find NS Records\n\n### Using `dig`\n\n```\ndig armourinfosec.com ns\n```\n\n### Using `nslookup`\n\n```\nnslookup -type=ns armourinfosec.com\n```\n\n### Example Output\n\n```\nns1.hostingprovider.com\nns2.hostingprovider.com\n```\n\n## Online Reverse NS Lookup Tools\n\n### [ViewDNS Reverse NS Lookup](https://viewdns.info/reversens/)\n\n• Input a name server hostname (e.g., `ns1.hostingprovider.com`)  \n• Get a list of all domains using that NS  \n• Great for shared hosting recon or mapping digital infrastructure\n\n### [SecurityTrails](https://securitytrails.com/)\n\n• Powerful passive DNS database  \n• Shows historical domain – NS relationships  \n• Also includes subdomains, WHOIS, DNS, and tech stack info\n\n### [DNSDumpster](https://dnsdumpster.com/)\n\n• Free passive DNS tool for domain mapping  \n• Can indirectly reveal NS and A/CNAME relationships\n\n## Example Use Case\n\nIf `armourinfosec.com` uses:\n\n```\nNS: ns1.examplehost.com\n```\n\nA reverse NS lookup may reveal domains like:\n\n• `site1.com`  \n• `companybeta.org`  \n• `dev-clientproject.net`\n\nYou've just uncovered sibling infrastructure or hidden environments!\n\n## Blue Team Defense Tips\n\n• Use private or dedicated name servers for sensitive domains\n\n• Avoid generic/shared DNS for critical infrastructure\n\n• Use DNS providers that support obfuscation (e.g., [Cloudflare](https://www.cloudflare.com/))\n\n• Monitor reverse DNS lookups and NS leaks via tools like:\n  - [SecurityTrails Monitor](https://securitytrails.com/)\n  - [Spyse](https://spyse.com/)\n  - [GreyNoise](https://www.greynoise.io/)\n\n----\n----\n\n\n# Open Ports Check\n---\n\nAn **open port check** allows you to test if specific **TCP ports** on a target IP or domain are accessible from the internet. This is useful for reconnaissance, troubleshooting, and verifying firewall rules.\n\n## Use Cases\n*   Identify publicly accessible services (SSH, RDP, FTP, HTTP, etc.)\n*   Check firewall or NAT configurations\n*   Discover potentially vulnerable or misconfigured ports\n*   Validate port forwarding and external access\n\n## Online Port Scanning Tools\n---\n*   **[ViewDNS Port Scan](https://viewdns.info/portscan/)**\n    *   Basic TCP port scan from an external location\n    *   Useful for testing exposure of services\n\n*   **[YouGetSignal Open Ports Tool](https://www.yougetsignal.com/tools/open-ports/)**\n    *   Fast and simple port scanner\n    *   Supports checking a single port (e.g., 22, 80, 443)\n    *   Good for quick exposure tests\n\n*   **[DNSChecker Port Scanner](https://dnschecker.org/port-scanner.php)**\n    *   Scans multiple TCP ports across multiple servers\n    *   Useful for verifying port accessibility globally\n\n*   **[PortChecker.co](https://portchecker.co/)**\n    *   Check if a port is open on your IP (client-side)\n    *   Good for testing if a home or office router forwards a port properly\n\n## Common Ports to Test\n---\n\n| Port | Service |\n| :--- | :--- |\n| 21 | FTP |\n| 22 | SSH |\n| 23 | Telnet |\n| 25 | SMTP |\n| 53 | DNS |\n| 80 | HTTP |\n| 110 | POP3 |\n| 143 | IMAP |\n| 443 | HTTPS |\n| 3306 | MySQL |\n| 3389 | RDP (Windows) |\n\n## Defense Tips\n---\n*   Close all unnecessary ports at firewall level\n*   Use **port-knocking** or **VPN** for sensitive remote services\n*   Regularly scan your public IPs for accidental exposure\n*   Monitor logs for unauthorized access attempts\n\n## CLI Alternative\n---\n```bash\nnmap -Pn -p 1-1000 example.com\n```\n\n---\n---"}, {"name": "shodan cli", "content": "## Shodan CLI\n***\nThe **Shodan CLI** is a command-line tool that allows interaction with the Shodan search engine, including searching, downloading, and analyzing results.\n\n### Installation\n```bash\npip install shodan\n```\n\n---\n### CLI Commands\n#### Show Help Menu\n```bash\nshodan -h\n```\n#### Initialize with Your API Key\n```bash\nshodan init YOUR_API_KEY\n```\nExample:\n```bash\nshodan init VwikqRj9RsQ1b1J8qmCKkaRqKHW9QPp\n```\n\n```\nshodan init niomYce15NOwSN7uppGB0EDD7iZD2bZW\n```\n\nThis stores your API key locally for future use.\n\n#### Search for a Term\n```bash\nshodan search QUERY\n```\nExample:\n```bash\nshodan search microsoft iis 6.0\n```\n\n```bash\nshodan search 'title:\"Apache Tomcat/9.0.97\"'\n```\n\n#### Download Results to a File\n```bash\nshodan download FILENAME QUERY\n```\nExample:\n```bash\nshodan download iis6 microsoft iis 6.0\n```\nThis stores raw data in `iis6.json.gz`.\n\n```bash\nshodan download Apache-Tomcat 'title:\"Apache Tomcat/9.0.97\"' --limit 10\n```\nThis stores raw data in `Apache-Tomcat.json.gz`.\n\n#### Convert Downloaded Results to JSON\n```bash\nshodan parse --fields ip_str,port,org,hostnames iis6.json.gz\n```\n\n```bash\nshodan parse --fields ip_str,port,org,hostnames Apache-Tomcat.json.gz\n```\n\nOptional fields:\n*   `ip_str`\n*   `port`\n*   `org`\n*   `hostnames`\n*   `location.city`\n*   `ssl.cert.subject.cn`\n*   `vulns`\n\n## Additional Useful Commands\n***\n#### **Check Your Account Info**\n```bash\nshodan info\n```\n#### **Host Lookup**\n```bash\nshodan host <IP>\n```\nExample:\n```bash\nshodan host 8.8.8.8\n```\n#### **Scan IP/Range (Paid API Plan Required)**\n```bash\nshodan scan submit 192.168.1.1\n```\n#### **Search by Filters**\n```bash\nshodan search \"apache country:IN port:80\"\n```\n\n---\n## Tips\n\n- Use `shodan download` to archive searches for offline parsing.\n- Combine with Linux tools like `jq`, `awk`, `grep` for advanced analysis.\n- Automate recon pipelines using Shodan + Python or Bash scripts.\n- Combine filters: `product:apache port:80 country:IN`\n- Use `has_screenshot:true` for visual RDP/Web UI.\n- Look for known CVEs using `vuln:`\n- Use CIDR or ASN to explore specific networks.\n- Extract domains with `hostname:*example.com`\n---\n---"}, {"name": "shodan recon", "content": "# Shodan Recon\n***\nShodan is a search engine for internet-connected devices. It's widely used in cybersecurity for reconnaissance, identifying exposed systems, services, and potential vulnerabilities.\n\n*   **Website:** [https://www.shodan.io/](https://www.shodan.io/)\n*   **Filter Reference:** [https://www.shodan.io/search/filters](https://www.shodan.io/search/filters)\n\n## How Shodan Works\n***\n### 1. Global Internet Scanning\n\nShodan uses a large network of scanners to connect to every public IPv4 address and tries to interact with open ports. It behaves like a **banner grabber**.\n\nFor example:\n*   It connects to `x.x.x.x:80` and records the HTTP response header.\n*   It connects to `x.x.x.x:21` and records the FTP banner.\n\n### 2. Banner Collection\n\nWhen Shodan connects to a device or service, it retrieves the **service banner** or metadata that the service exposes. This may include:\n\n*   Software name and version (e.g., Apache 2.4.7)\n*   OS type and version\n*   SSL certificate details\n*   Web server headers\n*   Authentication methods\n*   Error messages\n*   Custom titles or messages\n\n### 3. Indexing and Tagging\n\nCollected data is:\n*   Indexed in a search database\n*   Tagged by:\n    *   Port (`port:80`)\n    *   Protocol (`product:\"Apache\"`)\n    *   Organization (`org:\"Google\"`)\n    *   Location (`country:US`)\n    *   Vulnerabilities (using banner signature + known CVEs)\n    *   SSL certificate fields\n    *   Web technologies (`http.component:\"WordPress\"`)\n\n### 4. Vulnerability Matching\n\nShodan cross-references collected banners with known CVEs from:\n*   [National Vulnerability Database (NVD)](https://nvd.nist.gov/)\n*   Internal vulnerability signature sets\n\nIf a match is found, the system flags the service with the corresponding `vuln:CVE-XXXX-XXXX` tag.\n\n### 5. User Interface + API\n\nYou can access all this information via:\n\n*   [Web UI](https://www.shodan.io/)\n*   Shodan CLI\n*   [Shodan API](https://developer.shodan.io/)\n    *   Allows automation and integrations\n    *   Common in red team tools and threat intelligence\n\n### Example of Data for an IP on Port 80\n\n```json\n {\n    \"ip_str\": \"192.0.2.123\",\n    \"port\": 80,\n    \"org\": \"Example ISP\",\n    \"location\": {\n        \"country_name\": \"India\",\n        \"city\": \"Delhi\"\n    },\n    \"http\": {\n        \"title\": \"Apache2 Ubuntu Default Page\",\n        \"server\": \"Apache/2.4.18 (Ubuntu)\"\n    },\n    \"os\": \"Linux\",\n    \"vulns\": [\"CVE-2017-5638\"]\n }\n```\n\n| Stage | Description |\n| :--- | :--- |\n| Scanning | Shodan probes IPs and ports like a port scanner |\n| Banner Grab | It collects response data from open services |\n| Parsing | Banners are parsed for product, version, os, etc. |\n| Indexing | Data is indexed and tagged with location, org, technology |\n| CVE Mapping | Services are matched against known vulnerabilities |\n| Access | Users can search via UI, CLI, or API |\n***\n## Account Setup\n***\n1.  Register on [Shodan](https://www.shodan.io/).\n2.  Visit your profile to obtain your **API Key**.\n\n## Basic Search Usage\n***\n```\napache\n```\n\n```\nftp\n```\n\n```\nwordpress\n```\n\n```\nnginx\n```\n\n```\ncisco ios\n```\n\nUse filters to narrow results:\n\n```\napache port:80 country:US\n```\n***\n## Filters Reference\n***\n**port:** - Search by Open Port\n```\nport:80\n```\n\n```\nport:443\n```\n\n```\nport:22\n```\n\n```\nport:21\n```\n\nExamples:\n```\nport:80 Apache\n```\n\n```\ndevice:webcam port:554\n```\n\n**product:** - Search by Product\n\n```\nproduct:\"apache\"\n```\n\n```\nproduct:\"apache tomcat\"\n```\n\n```\nproduct:\"Remote Desktop Protocol\"\n```\n\n```\nproduct:\"LiteSpeed httpd\"\n```\n\nCombined:\n```\nport:8080 product:\"Apache Tomcat\"\n```\n\n**http.component:** - Web Technologies\n```\nhttp.component:\"wordpress\"\n```\n\n```\nhttp.component:\"PHP\"\n```\n\n```\nhttp.component:\"MySQL\"\n```\n\n```\nhttp.component:\"Yoast SEO\"\n```\n\nWith version or status:\n```\nhttp.component:\"wordpress\" http.status:200\n```\n\n\n```\nhttp.component:\"wordpress\" version:\"6.4.2\"\n```\n\n**asn:** - Filter by ASN\n```\nasn:AS24560\n```\n\nUseful sites:\n*   [https://asnlookup.com](https://asnlookup.com)\n*   [https://hackertarget.com/as-ip-lookup](https://hackertarget.com/as-ip-lookup)\n\n**net:** - IP Range/CIDR\n```\nnet:8.8.8.0/24\n```\n\n```\nnet:103.86.99.0/24\n```\n\n**hostname:** - Filter by Hostname\n```\nhostname:tesla\n```\n\n```\nhostname:*.gov\n```\n\n**os:** - Search by Operating System\n```\nos:\"Windows Server 2012\"\n```\n\n```\nos:\"Ubuntu\" port:22\n```\n\n**country: / city:** - Geo Filter\n```\ncountry:IN\n```\n\n```\ncountry:IN city:Mumbai\n```\n\n**geo:** - Latitude/Longitude\n```\ngeo:\"32.800000, -117.000000\"\n```\n[View on Map](https://www.shodan.io/search/facet?query=geo%3A%2232.800000%2C+-117.000000%22&facet=geo)\n\n**org:** - Organization Filter\n```\norg:google\n```\n\n```\norg:\"HATHWAY CABLE AND DATACOM LIMITED\"\n```\n\n**title:** - Match HTML Title Tag\n```\ntitle:\"Apache Tomcat/9.0.97\"\n```\n\n```\ntitle:armour\n```\n\n**has_screenshot:** - Visual RDP/Web Screenshot\n```\nport:3389 has_screenshot:true\n```\n\n```\nproduct:\"Remote Desktop Protocol\"\n```\n\n**ssl:** - SSL/TLS Info\n```\nssl:\"Yum Brands Inc.\"\n```\n\n```\nssl.cert.subject.cn:\"*.pizzahut.com\"\n```\n\n**vuln:** - Search by CVE\n```\nvuln:CVE-2019-19781 country:DE\n```\n\n```\nvuln:CVE-2024-52318 hostname:*.tesla.cn\n```\n\n**before: / after:** - Time of Index\n```\nafter:\"2024-01-01\"\n```\n\n```\nbefore:\"2025-01-01\"\n```\n\n**device:** - Search Device Types\n```\ndevice:webcam\n```\n\n**tag:** - IoT Classifications\n```\ntag:ics\n```\n\n```\ntag:scada\n```\n\n```\ntag:plc\n```\n\n**hash:** - Match Banner Hash\n```\nhash:-1761231231\n```\n\n---\n## API Usage Sample (Python)\n***\n```python\nimport shodan\n\nAPI_KEY = 'YOUR_API_KEY'\napi = shodan.Shodan(API_KEY)\n\nresults = api.search('apache country:IN')\n\nfor result in results['matches']:\n    print(f\"IP: {result['ip_str']} | Org: {result.get('org')}\")\n```\n\n## Tips for Pentesters\n***\n*   Combine filters: `product:apache port:80 country:IN`\n*   Use `has_screenshot:true` for visual RDP/Web UI\n*   Look for known CVEs using `vuln:`\n*   Use CIDR or ASN to explore specific networks\n*   Extract domains with `hostname:.example.com`\n\n---\n---"}, {"name": "shodan theory", "content": "# Shodan \n---\n## 1. What is Shodan?\n\n- **Shodan** is a specialized search engine, just like Google or Bing, but instead of searching for websites and webpages, it searches for **internet-connected devices and services**.\n    \n- Its name comes from the video game character “SHODAN” (Sentient Hyper-Optimized Data Access Network).\n    \n- Shodan’s purpose is to **index devices that are directly connected to the internet**, such as servers, routers, webcams, industrial control systems (ICS), IoT devices, smart TVs, SCADA systems, and more.\n---\n## 2. What does Shodan do?\n\n- Shodan scans the internet continuously and **collects information from devices listening on public IP addresses**.\n- It gathers details from **service banners** (the metadata that servers return when you connect to them).\n- For example, if you connect to a web server, it might tell you the server type: “Apache 2.4.41 (Ubuntu).”\n- Shodan collects and organizes such banners from millions of IPs worldwide.\n- This allows users to **search for devices by their service, software, version, country, organization, vulnerability, etc.**    \n\n**Examples of what you can find on Shodan:**\n\n- All webcams with no password in a specific country.\n- All routers using outdated firmware.\n- All databases (like MongoDB or Elasticsearch) exposed to the internet without authentication.\n- Power plants, traffic lights, and hospital devices connected without security.    \n\n---\n## 3. How does Shodan work?\n\nShodan works in three main steps:\n\n### (a) Scanning\n\n- Shodan runs its own distributed scanning infrastructure.\n- It scans the entire IPv4 address space (and some IPv6), just like nmap, but on a global scale.\n- It sends probes to various ports (HTTP:80, HTTPS:443, FTP:21, SSH:22, RDP:3389, etc.) to see what service responds.\n\n### (b) Collecting banners\n\n- When a device responds, it usually gives a **banner**, which contains information like:\n    - Software name and version.\n    - Supported features.\n    - Hostname.\n    - Sometimes even configuration details.\n- Shodan stores these banners in its database.\n\n### (c) Indexing and Searching\n\n- Just like Google indexes web pages, Shodan indexes banners.\n- Users can then query the database with keywords, filters, or complex queries.\n- Example search:\n    - `port:21 country:\"IN\"` → All FTP servers in India.\n    - `apache country:\"US\"` → All Apache servers in the US.\n    - `has_screenshot:true` → Devices with web interfaces.\n\n---\n## 4. Who uses Shodan?\n\n- **Cybersecurity researchers:** To discover vulnerable systems on the internet.\n- **Penetration testers / Ethical hackers:** To gather intelligence about a target before testing.\n- **Hackers / Criminals:** To find unsecured devices to exploit (illegal use).\n- **Government agencies:** To monitor critical infrastructure.\n- **Companies:** To see what of their own infrastructure is exposed.    \n\n---\n## 5. Why is Shodan important?\n\n- Unlike Google, which shows only what is _intentionally published_, Shodan reveals **what is accidentally exposed**.\n- Many organizations unknowingly leave sensitive systems open to the internet (databases, cameras, ICS).\n- Attackers can use this to hack, but defenders can use it to **identify and fix exposures before attackers exploit them**.\n- It acts as a **global security monitoring tool**.    \n\n---\n## 6. Where does Shodan apply?\n\n- In **penetration testing** (reconnaissance phase).\n- In **red team operations** (finding attack surfaces).\n- In **blue team monitoring** (checking what assets are exposed).\n- In **OSINT (Open Source Intelligence)** investigations.\n- In **critical infrastructure security** (ICS, SCADA).\n\n---\n## 7. When is Shodan used?\n\n- At the **start of a pentest**, to identify targets.\n- During **security audits**, to verify company exposure.\n- In **incident response**, to check if a compromised system is publicly indexed.\n- By attackers, _before launching scans themselves_, to avoid detection.\n\n---\n## 8. Which features does Shodan provide?\n\n- **Basic search** (by IP, port, service).\n- **Filters**: country, organization, operating system, product, version, etc.\n- **Shodan Maps**: Visualization of exposed systems worldwide.\n- **Exploit integrations**: Maps banners to known CVEs (via ExploitDB / CVE).\n- **Monitoring**: For organizations to keep track of their internet assets.\n- **API**: For developers to integrate Shodan data into security tools.\n\n---\n## 9. Example case studies\n\n- In 2015, researchers used Shodan to discover **tens of thousands of MongoDB databases** exposed without passwords.\n- In 2017, **Hikvision CCTV cameras** vulnerable to remote code execution were found worldwide.\n- In 2020, Shodan revealed thousands of **medical devices** exposed to the internet without encryption.\n\n---\n## 10. Limitations of Shodan\n\n- It only indexes what is visible on **open ports**.\n- It cannot break through authentication or encryption. \n- It does not scan every single port (it chooses popular ones).\n- Some results may be outdated, as IPs change ownership.\n\n---\n\n✅ **Summary:**  \nShodan is the world’s first and most powerful **search engine for internet-connected devices**.  \nIt scans the global internet, collects service banners, indexes them, and allows security professionals (and attackers) to find exposed devices.  \nIt is a double-edged sword: a tool for defenders to protect systems, but also useful for attackers if misused.\n\n---\n---"}, {"name": "website reconaissance", "content": "# Website Reconnaissance\n\nWebsite reconnaissance is the process of gathering publicly available information about a website, its infrastructure, and its online presence. It's typically one of the first steps in penetration testing or ethical hacking, but it's also used in SEO, research, and competitive analysis.\n\n## What is Website Reconnaissance?\n\nWebsite reconnaissance involves collecting information about a target website or web application to understand its structure, technologies, and potential vulnerabilities. The gathered data can help identify weaknesses, or simply provide a detailed picture of the website's digital footprint.\n\n## Why Perform Website Reconnaissance?\n\n- **Security Assessment:** To identify potential entry points or vulnerabilities.\n- **Competitive Analysis:** To understand a competitor's digital presence.\n- **SEO/Marketing:** To analyze site structure, backlinks, and indexed pages.\n- **Compliance and Monitoring:** To ensure compliance with data protection regulations and discover exposed sensitive data.\n\n## Typical Activities\n\n- **Gathering Basic Details:** Such as IP addresses, domain ownership, and SSL certificates.\n- **Collecting Metadata:** Site title, technologies (e.g., frameworks, CMS), and server information.\n- **Finding Exposed Information:** Emails, phone numbers, or hidden directories.\n- **Spidering and Crawling:** Mapping out links and site structure.\n- **Historical Analysis:** Using the Wayback Machine to see how the site looked in the past.\n\n## Key Tools Used\n\n- **Online Recon Tools:** Shodan, Censys, BuiltWith.\n- **Crawlers:** Screaming Frog, XML Sitemaps generators.\n- **Command Line Tools:** wget, HTTrack for mirroring sites.\n- **Archive Tools:** Archive.org, Archive.ph.\n\n---\n\n## 1. Visit Website\n\n- Employee details\n- Location details\n- Addresses\n- Phone numbers\n- Emails\n- Usernames\n\n---\n\n## 2. Find sitemap.html, sitemap.xml, and robots.txt\n\n### `sitemap.html` — User-facing index\nThis is a human-readable page that typically lists the main sections or important links on a website. It's like a \"table of contents\" for visitors, helping them navigate the site.\n\n### `sitemap.xml` — Bot index\nThis is an XML file meant for search engine crawlers (like Googlebot). It lists URLs the site owner wants to have indexed by search engines. It helps search engines find and understand the site's structure, especially for new or updated content.\n\n### `robots.txt` — Restrictions for search engines\nThis is a text file that tells search engine crawlers which parts of the site they should not access or index. It's a way to control crawler behavior for privacy or security reasons.\n\n---\n\n## Example Sitemap URLs\n\n- **India TV sitemap (user-facing HTML)**\n  - https://www.indiatv.in/cms/sitemap.html\n\n- **MCA India sitemap (user-facing HTML)**\n  - https://www.mca.gov.in/MinistryV2/sitemap.html\n\n- **Telangana Transport sitemap (user-facing HTML)**\n  - https://www.transport.telangana.gov.in/html/sitemap.html\n\n- **Online Sitemap Generator**\n  - https://www.xml-sitemaps.com/\n\n---\n\n## 3. Spidering and Crawling\n\nGood question! Let's clarify the difference:\n\n### Spidering\n\nSpidering (or **web spidering**) involves automated scripts or tools that **traverse and map out the links and pages** on a website. It's like sending a robot to click every link it finds, noting what's there and what's linked from it. It's typically used to:\n\n- Identify **internal and external links**\n- Discover **hidden directories** or **unlinked pages**\n- Map out the **site's structure**\n\n### Crawling\n\nCrawling is a broader term that includes spidering. Crawling means **visiting a web page, downloading content, and following links to find new pages**. Search engines (like Googlebot) use crawling to index sites. Reconnaissance tools (like **Screaming Frog** or **Katana**) also crawl to:\n\n- **Download page data**\n- **Analyze metadata** (like page titles, headers, and scripts)\n- **Check for vulnerabilities**\n\nIn a recon context, \"spidering\" and \"crawling\" are often used interchangeably because both involve automated tools scanning through a site's structure. The difference is mostly in nuance — **spidering** emphasizes mapping links, while **crawling** includes downloading and analyzing content.\n\n### Online Tools\n\n- **XML Sitemaps**\n- **ConvertCSV URL Extractor**\n- **Screaming Frog SEO Spider**\n\n### Web Crawling Tools\n\n#### Using Katana\n\n```bash\n# Katana example\nkatana -u https://www.armourinfosec.com\n```\n\n#### Using Dirhunt\n\nInstall dirhunt:\n```bash\npip3 install dirhunt\n```\n\nShow help and usage info:\n```bash\ndirhunt --help\n```\n\nBasic usage:\n```bash\ndirhunt https://www.armourinfosec.com\n```\n\nSave output to file:\n```bash\ndirhunt https://www.armourinfosec.com --to-file /tmp/1.json\n```\n\n---\n## 4. Locally Mirroring the Website — Read Source Code\n\n### Using wget\n\n```bash\nwget -m https://www.armourinfosec.com\n```\n\n### Using HTTrack\n*Note: This is an older tool*\n\nInstall HTTrack\n```bash\napt install httrack\n```\n\nRun HTTrack interactive mirror tool\n```\nhttrack\n```\n\n---\n## 5. Wayback Machine — View Historical Versions\n\n- **[Archive.org](https://archive.org/)** 🔗\n- **[Web Archive](https://web.archive.org/)** 🔗\n- **[Archive.ph](https://archive.ph/)** 🔗\n- **Orkut Archive** (historical, if applicable)\n\n---\n---"}];
var isMobile = window.innerWidth <= 768;

window.addEventListener('resize', function() { isMobile = window.innerWidth <= 768; });

function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('viewer').classList.add('hidden');
}

function showViewer() {
  if (isMobile) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('viewer').classList.remove('hidden');
  }
}

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'Reccon/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
  showViewer();
}

window.onload = function() {
  buildSidebar();
  if (!isMobile && NOTES.length > 0) openNote(0);
};
</script>
