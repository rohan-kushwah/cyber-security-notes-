const NOTES = [{"name": "PHP and my SQL", "content": "\n### **PHP and MySQL in Brief**\n\n#### **1️⃣ PHP (Hypertext Preprocessor)**\n\n- **PHP** is a **server-side scripting language** used for web development.\n- It helps create **dynamic web pages** by processing user input, handling forms, and interacting with databases.\n- PHP code runs on the **server** and sends HTML to the browser.\n\nExample:\n```php\n<?php echo \"Hello, World!\"; ?>\n```\n\n**Common Uses:**\n- ✅ Dynamic websites  \n- ✅ User authentication (login systems)  \n- ✅ File handling (uploads, downloads)  \n- ✅ Interacting with databases (MySQL)  \n\n---\n\n#### **2️⃣ MySQL (Structured Query Language Database)**\n\n- **MySQL** is an **open-source relational database management system (RDBMS)**.\n- It stores, retrieves, and manages data efficiently.\n- Works with **PHP** to store user info, posts, products, etc.\n\nExample Query:\n```sql\nCREATE TABLE users (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    name VARCHAR(100),\n    email VARCHAR(100) UNIQUE\n);\n```\n\n**Common Uses:**\n- ✅ Storing user details (login, profiles)  \n- ✅ Managing product catalogs  \n- ✅ Handling large-scale data efficiently  \n\n---\n\n### **🔗 PHP + MySQL Together**\n\n- PHP processes user requests and **fetches/saves** data in MySQL.\n\nExample: PHP code to get user data from MySQL:\n```php\n<?php\n$conn = new mysqli(\"localhost\", \"username\", \"password\", \"database\");\n$result = $conn->query(\"SELECT * FROM users\");\nwhile ($row = $result->fetch_assoc()) {\n    echo $row['name'];\n}\n?>\n```\n\n**Why Use Them Together?**\n- ✅ **PHP handles logic** (forms, authentication)  \n- ✅ **MySQL stores data** (users, products, transactions)  \n\n---\n\n# ✨ **PHP and MySQL Installation and Configuration** ✨\n\n## 🔹 **PHP Installation and Configuration**\n\n### 📌 **Install Required Repositories**\n```bash\nyum install epel-release yum-utils\nyum repolist all\n```\n\n---\n\n### 🌐 **Add Remi Repository**\n```bash\nyum install http://rpms.remirepo.net/enterprise/remi-release-9.rpm\nyum repolist all\n```\n\n### ⚙️ **Verify and Configure Remi Repository**\n```bash\nrpm -qc remi-release\nrpm -ql remi-release\nvim /etc/yum.repos.d/remi.repo\n```\n\n### 🔎 **Search for Available PHP Versions**\n```bash\nyum search php\nyum info php.x86_64\nyum info php81.x86_64\nyum info php84.x86_64\n```\n\n### 🔧 **Install PHP and Required Extensions**\n```bash\nyum install php php-common.x86_64 php-cli.x86_64 php-gd.x86_64 php-opcache.x86_64 php-curl php-mysqlnd.x86_64 php-xml.x86_64 php-mbstring.x86_64 php-pear php-mbstring php-pecl-http php-session\n```\n\n### ✅ **Verify PHP Installation**\n```bash\nphp -v\n```\n\n### 🔄 **Restart Apache**\n```bash\nsystemctl restart httpd.service\n```\n\n### 📄 **Create `phpinfo.php` for Testing**\n```bash\nvim /var/www/html/phpinfo.php\n```\n\nAdd the following content:\n```php\n<?php\n    phpinfo();\n?>\n```\n\nAccess via:\n```\nhttp://192.168.1.32/phpinfo.php\n```\n\n---\n\n## **MySQL Installation and Configuration**\n\n### 📥 **Download and Install MySQL Repository**\n```bash\nwget https://repo.mysql.com/mysql80-community-release-el7-3.noarch.rpm\nyum install ./mysql84-community-release-el9.1.noarch.rpm\nyum repolist all\n```\n\n### 🔄 **Enable and Disable MySQL Versions**\n```bash\nyum-config-manager --disable mysql57.community\n```\n\n### 🔎 **Search for MySQL Packages**\n```bash\nyum search mysql\n```\n\n### 📌 **Install MySQL Server and Development Packages**\n```bash\n yum install mysql-community-server mysql-community-devel\n```\n\n### 📡 **Check MySQL Service Status**\n```bash\n  systemctl status mysqld.service\\nsystemctl enable mysqld.service\\nnetstat -nltup | grep mysql\n10404  reboot\n```\n\n### 🔄 **Start and Restart MySQL Service**\n```bash\nsystemctl start mysqld.service\nsystemctl restart mysqld.service\nnetstat -nltup | grep mysql\n```\n\n### 🔑 **Retrieve MySQL Root Password**\n```bash\nls -lh /var/log/mysqld.log\ngrep 'temporary password' /var/log/mysqld.log\n```\n\nzl+31?#W5qaw\nExample Output:\n```\nA temporary password is generated for root@localhost: s;r=oAt25UwR\n```\n\n### 🔐 **Secure MySQL Installation**\n```bash\nmysql -u root -p\n```\nEnter the temporary password when prompted.\n```bash\nmysql_secure_installation\n```\n\nExample new password:\n```\np@ssW0rd@1234\\\n```\n\n\n![[Pasted image 20250403155930.png]]\n# gui of![[Pasted image 20250403160104.png]] my sql-\n![[Pasted image 20250403160104.png]]\n\n\n\nphp admin php pe bani ek particular application  hai jise my sql  manage hota hai\n\n ![[Pasted image 20250403160450.png]]\n"}, {"name": "URL rewrite", "content": "k## 🔄 How URL Rewrite Works (In Simple Terms)\n\n**Example:**\n\n### Before Rewrite:\n\n\n\n`http://example.com/index.php?page=products&id=123`\n\n### After Rewrite:\n\n\n\n`http://example.com/products/123`\n\nThe rewritten URL is easier to read and better for SEO. The web server internally maps this clean URL back to the original query string.\n\n---\n\n## ⚙️ Configuration in Linux (Apache using `.htaccess` and `mod_rewrite`)\n\n### Step 1: Enable `mod_rewrite` module\n\n\n`sudo a2enmod rewrite sudo systemctl restart apache2`\n\n### Step 2: Update Apache config to allow `.htaccess`\n\nIn `/etc/apache2/sites-available/000-default.conf`:\n\n\n\n`<Directory /var/www/html>     AllowOverride All </Directory>`\n\n### Step 3: Create `.htaccess` in your site root\n\n\n`RewriteEngine On RewriteRule ^products/([0-9]+)$ index.php?page=products&id=$1 [L]`\n\nThis rule translates:\n\n\n`http://yourdomain.com/products/123 ➡ index.php?page=products&id=123`\n\n\n####\n\n- **Ensure `mod_rewrite` is installed**  \n    It usually comes bundled with `httpd`, but confirm:\n    \n    bash\n    \n    CopyEdit\n    \n    `sudo yum install httpd -y sudo httpd -M | grep rewrite`\n    \n    If you see output like `rewrite_module (shared)`, it’s already loaded.\n    \n- **Manually Enable `mod_rewrite`**  \n    Edit the Apache config or virtual host config (like `/etc/httpd/conf/httpd.conf` or `/etc/httpd/conf.d/your-site.conf`), and make sure these lines exist or are added:\n    \n    apache\n    \n    CopyEdit\n    \n    `LoadModule rewrite_module modules/mod_rewrite.so`\n    \n    Also, in the `<Directory>` block for your site (e.g., `/var/www/html`), allow `.htaccess` overrides:\n    \n    apache\n    \n    CopyEdit\n    \n    `<Directory \"/var/www/html\">     AllowOverride All     Require all granted </Directory>`\n    \n- **Restart Apache**  \n    After editing the configuration:\n    \n    bash\n    \n    CopyEdit\n    \n    `sudo systemctl restart httpd`\n    \n- **Test Rewrite**  \n    Add a `.htaccess` in `/var/www/html` with a simple rule:\n    \n    apache\n    \n    CopyEdit\n    \n    `RewriteEngine On RewriteRule ^test$ test.html`\n    \n    Then create a `test.html` file. Access `http://your-server-ip/test` and see if it works.\n\n---\n\n## ⚙️ Configuration in Windows (IIS using URL Rewrite Module)\n\n### Step 1: Install IIS URL Rewrite Module\n\nDownload from Microsoft:\n\n- https://www.iis.net/downloads/microsoft/url-rewrite\n    \n\n### Step 2: Configure Rule via IIS Manager\n\n1. Open **IIS Manager**\n    \n2. Select your site → open **URL Rewrite**\n    \n3. Add **Inbound Rule** → **Blank Rule**\n    \n4. Configure:\n    \n    - **Pattern**: `^products/([0-9]+)$`\n        \n    - **Action**: Rewrite\n        \n        - **Rewrite URL**: `index.php?page=products&id={R:1}`\n            \n    - Check “Append query string”: **No**\n        \n\n### Alternative: Use `web.config`\n\nCreate or update `web.config` in your site root:\n\n\n\n`<configuration>   <system.webServer>     <rewrite>       <rules>         <rule name=\"CleanProductURL\" stopProcessing=\"true\">           <match url=\"^products/([0-9]+)$\" />           <action type=\"Rewrite\" url=\"index.php?page=products&amp;id={R:1}\" />         </rule>       </rules>     </rewrite>   </system.webServer> </configuration>`\n\n---\n\n## ✅ Real Life Use Cases\n\n- Clean URLs in content management systems (WordPress, Joomla, Laravel)\n    \n- Redirecting old links after site restructuring\n    \n- SEO optimization\n    \n- Masking internal directory structure from users"}, {"name": "WORDPRESS user  roles and Capabalities", "content": "## 🧠 What Are WordPress User Roles and Capabilities?\n\n### ✅ **User Roles**:\n\nWordPress uses a **role-based access control system** to assign different sets of permissions (called _capabilities_) to users.\n\nEach role has a specific set of capabilities.\n\n### ✅ **Capabilities**:\n\nThese are individual permissions such as:\n\n- `edit_posts`\n    \n- `publish_pages`\n    \n- `delete_users`\n    \n- `install_plugins`\n    \n\n---\n\n## 🔑 Default WordPress User Roles\n\n|Role|Description|\n|---|---|\n|**Administrator**|Full access. Can manage the entire site, themes, plugins, users, etc.|\n|**Editor**|Can manage and publish posts and pages (own and others).|\n|**Author**|Can write, edit, and publish only their own posts.|\n|**Contributor**|Can write and edit their own posts but **not publish** them.|\n|**Subscriber**|Can only read content and manage their profile (used for memberships).|\n\n---\n\n## 🔧 How to Manage or Customize Roles\n\n### 🧩 1. **Using Plugins (Easiest)**\n\nInstall **User Role Editor** plugin:\n\nsql\n\nCopyEdit\n\n`Plugins → Add New → Search: \"User Role Editor\" → Install → Activate`\n\nWith it, you can:\n\n- Add new roles\n    \n- Modify capabilities\n    \n- Assign custom roles to users\n    \n\n---\n\n### ⚙️ 2. **Manual (Code-Based) Role & Capability Management**\n\nYou can add roles and capabilities via `functions.php` or a custom plugin.\n\n#### 🔸 Add a Custom Role:\n\nphp\n\nCopyEdit\n\n`add_role(     'project_manager',     'Project Manager',     [         'read' => true,         'edit_posts' => true,         'delete_posts' => false,         'manage_categories' => true,     ] );`\n\n#### 🔸 Add/Remove Capability to a Role:\n\nphp\n\nCopyEdit\n\n`// Add a capability to Editor $role = get_role('editor'); $role->add_cap('edit_theme_options');  // Remove a capability $role->remove_cap('delete_others_posts');`\n\n#### 🔸 Assign a Role to a User:\n\nphp\n\nCopyEdit\n\n`$user = new WP_User($user_id); $user->set_role('editor');`\n\n---\n\n## 📌 Role Hierarchy (Security Best Practices)\n\n- **Administrator**: Never assign to users unless they must manage the whole site.\n    \n- **Editor**: Suitable for content managers.\n    \n- **Author**/**Contributor**: Best for writers or bloggers.\n    \n- **Subscriber**: Minimal access, best for members-only sites.\n    \n\n---\n\n## 🛡 Best Practices\n\n- Keep **admin access limited**\n    \n- Use **custom roles** for fine control\n    \n- Always **back up your site** before altering roles/capabilities programmatically\n    \n\n---\n\nWould you like me to generate code for a specific custom role based on your needs (e.g., limited admin or advanced contributor)?\n"}, {"name": "Word press installation", "content": " WordPress is a **popular content management system (CMS)** used to create and manage websites. It is open-source, free, and highly customizable, making it a favorite choice for bloggers, businesses, and developers.\n\n### **Key Features of WordPress:**\n\n✅ **User-Friendly:** No coding required; easy-to-use interface.  \n✅ **Customizable:** Thousands of themes and plugins for added functionality.  \n✅ **SEO-Friendly:** Built-in features and plugins for better search engine rankings.  \n✅ **Secure & Scalable:** Regular updates and security plugins available.  \n✅ **Community Support:** Large developer and user community for help and guidance.\n\n### **Common Uses of WordPress:**\n\n- **Blogs & News Websites** 📰\n    \n- **Business Websites** 🏢\n    \n- **E-Commerce (WooCommerce)** 🛒\n    \n- **Portfolios & Personal Websites** 🎨\n    \n- **Online Learning (LMS)** 📚\n\n### **WordPress Installation and Configuration**\n\nWordPress is a popular content management system (CMS) used to create and manage websites.\n\n#### **Step 1: Download and Extract WordPress**\n\nDownload the latest version of WordPress from the official website:\n\n\n`wget https://wordpress.org/latest.zip`\n\nExtract the downloaded package:\n\n\n`unzip latest.zip`\n\nMove WordPress files to the Apache web directory:\n\n\n`cp -vr wordpress/ /var/www/html/`\n\nNavigate to the web root directory:\n\n\n`cd /var/www/html/`\n\nSet the correct ownership to allow Apache to manage WordPress files:\n\n\n`chown -Rv apache:apache wordpress/`\n\nNavigate to the WordPress directory:\n\n\n`cd wordpress/`\n\n### **Step 2: Configure Apache for WordPress**\n\nOpen the Apache configuration file for editing:\n\n\n\n`vim /etc/httpd/conf/httpd.conf`\n\nRestart Apache to apply changes:\n\n\n`systemctl restart httpd.service`\n\nRestart firewall services if necessary:\n\n\n`systemctl restart iptables.service`\n\nRestart DNS service if applicable:\n\n\n`systemctl restart named.service`\n\nTest domain resolution to ensure WordPress is accessible:\n\n\n`dig armour.local`\n\n\n![[Pasted image 20250404152121.png]]\nchange karna hai document root me /var/html/wordpress\n\n\n\nphpmyadmin browse karke  jao new database banao phir wordpress browse karke usme dal do\nadmin login ke liye wo -admin\nusername password admin\n# directory browsing--\n\nIN LINUX DIRECTORY BROWWSING BY DEFAULT ENABLE HOTI HAI\n\n## 🗂️ Directory-Listing\n\n### 🔵 Directory Listing\n\n---\n\n### ✅ Change Directory and Create an Empty File\n\nbash\n\nCopyEdit\n\n`cd /var/www/html/wordpress/wp-content/uploads touch index.php`\n\n---\n\n### ❌ Disable Directory Listing for All Directories in Apache\n\n1. **Edit the Apache configuration file:**\n    \n\n\n`vim /etc/httpd/conf/httpd.conf`\n\n\njake us site ki binding me ye  line add kar do\n<Directory /var/www/html/phpmyadmin>\n        options -Indexes\n        \n        </Directory>\n\n2. **Restart the Apache service:**\n    \n\n\n`systemctl restart httpd.service`\n\n3. **Edit the specific site configuration file:**\n    \n\n\n`vim /etc/httpd/conf.d/wp-site.conf`\n\n4. **Restart Apache again:**\n    \n\n\n`systemctl restart httpd.service`\n\nindexing disable hai par file puri location hai toh browse kar sakte hai\n\n\n"}, {"name": "Wordpress pages and block making", "content": "# 🌐 WordPress Sample Pages with Media and Explanation\n\n  \n\nThis guide provides 3 sample pages for WordPress with explanations, YouTube links, and images. These examples can help you understand how to build real-world pages in WordPress using the Gutenberg editor or Elementor.\n\n  \n\n---\n\n  \n\n## 📄 Page 1: About Us\n\n  \n\n### 🎯 Purpose:\n\nTo introduce the company/individual and give an overview of the brand or mission.\n\n  \n\n### ✍️ Sample Content:\n\n  \n\n**Title:** About Us\n\n  \n\n**Content:**\n\n```\n\nWelcome to XYZ Solutions!\n\n  \n\nWe are dedicated to providing innovative web solutions that help businesses grow online. Our team specializes in WordPress development, SEO, and digital marketing.\n\n```\n\n  \n\n**YouTube Embed (Company Overview):**\n\n```\n\n[![Watch Company Overview](https://img.youtube.com/vi/tgbNymZ7vqY/0.jpg)](https://www.youtube.com/watch?v=tgbNymZ7vqY)\n\n```\n\n  \n\n**Image:**\n\n```\n\n![Team Photo](https://via.placeholder.com/600x300?text=Our+Team)\n\n```\n\n  \n\n**How to Add in WordPress:**\n\n1. Go to **Pages > Add New**.\n\n2. Title the page **About Us**.\n\n3. Use **Paragraph**, **Image**, and **Video** blocks.\n\n4. Paste the YouTube link and WordPress will automatically embed it.\n\n5. Click **Publish**.\n\n  \n\n---\n\n  \n\n## 📄 Page 2: Services\n\n  \n\n### 🎯 Purpose:\n\nTo showcase the services or products offered.\n\n  \n\n### ✍️ Sample Content:\n\n  \n\n**Title:** Our Services\n\n  \n\n**Content:**\n\n```\n\nWe offer a wide range of services:\n\n  \n\n- 🔧 WordPress Website Development\n\n- 🧩 Custom Plugin Development\n\n- 🎨 UI/UX Design\n\n- 🚀 SEO Optimization\n\n```\n\n  \n\n**Image:**\n\n```\n\n![Services](https://via.placeholder.com/800x300?text=Our+Services)\n\n```\n\n  \n\n**YouTube Embed (Service Demo):**\n\n```\n\n[![Demo Video](https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg)](https://www.youtube.com/watch?v=dQw4w9WgXcQ)\n\n```\n\n  \n\n**How to Add in WordPress:**\n\n1. Create a new page titled **Our Services**.\n\n2. Use **List**, **Image**, and **Video** blocks.\n\n3. Format services with bullet points and emojis.\n\n4. Click **Publish**.\n\n  \n\n---\n\n  \n\n## 📄 Page 3: Contact Us\n\n  \n\n### 🎯 Purpose:\n\nTo allow visitors to get in touch via form, phone, or location map.\n\n  \n\n### ✍️ Sample Content:\n\n  \n\n**Title:** Contact Us\n\n  \n\n**Content:**\n\n```\n\nWe would love to hear from you!\n\n  \n\n📧 Email: contact@xyzsolutions.com  \n\n📞 Phone: +91-1234567890  \n\n📍 Location: New Delhi, India\n\n```\n\n  \n\n**Image:**\n\n```\n\n![Office](https://via.placeholder.com/600x300?text=Our+Office)\n\n```\n\n  \n\n**Embed Google Map:**\n\nUse the Custom HTML block to add Google Maps embed code:\n\n```html\n\n<!-- iframe removed -->\n\n```\n\n  \n\n**How to Add in WordPress:**\n\n1. Title the page **Contact Us**.\n\n2. Use **Paragraph**, **Image**, and **Custom HTML** blocks.\n\n3. Paste your Google Maps embed code.\n\n4. Use a contact form plugin like WPForms or Contact Form 7.\n\n5. Click **Publish**.\n\n  \n\n---\n\n  \n\n## ✅ Tips for All Pages\n\n  \n\n- Use **Heading blocks** for structure (H2, H3, etc.)\n\n- Use **Media blocks** to embed YouTube or add images\n\n- Ensure pages are added to **Menus** via Appearance > Menus\n\n- Install **Elementor** for more drag-and-drop control\n\n  \n\n---\n\n  \n\n**Happy Building! 🚀**"}, {"name": "installation on wordpress theme", "content": "# WordPress Theme Installation Guide\n\n  \n\n## 🔧 Method 1: Install a WordPress Theme via the Dashboard\n\n  \n\n### ✅ For Free Themes from the WordPress Repository:\n\n  \n\n1. **Log in to your WordPress Admin Dashboard**  \n\n   Go to: `http://yourdomain.com/wp-admin`\n\n  \n\n2. **Navigate to Themes**  \n\n   In the left sidebar: `Appearance` → `Themes`\n\n  \n\n3. **Add New Theme**  \n\n   Click the **“Add New”** button at the top.\n\n  \n\n4. **Search for a Theme**  \n\n   Use the search bar to find a theme (e.g., “Astra”, “OceanWP”).\n\n  \n\n5. **Install and Activate**  \n\n   - Click **Install**\n\n   - Then click **Activate**\n\n  \n\n---\n\n  \n\n### ✅ For Premium or Downloaded Themes (.zip File):\n\n  \n\n1. **Log in to Dashboard**  \n\n   As above, go to `Appearance` → `Themes` → `Add New`\n\n  \n\n2. **Upload Theme**  \n\n   - Click **Upload Theme** (top of the page)\n\n   - Choose your `.zip` file (e.g., `mytheme.zip`)\n\n   - Click **Install Now**\n\n  \n\n3. **Activate the Theme**  \n\n   After installation, click **Activate**\n\n  \n\n---\n\n  \n\n## 💻 Method 2: Install Theme Manually via FTP\n\n  \n\nUse this if your theme fails to upload via the dashboard (e.g., due to file size or server restrictions).\n\n  \n\n### Requirements:\n\n- FTP software (e.g., FileZilla)\n\n- FTP access to your web hosting account\n\n  \n\n### Steps:\n\n  \n\n1. **Extract the Theme ZIP**  \n\n   Unzip the theme on your computer. You’ll get a folder like `mytheme`.\n\n  \n\n2. **Connect to Your Server**  \n\n   Use FTP to connect to your site.\n\n  \n\n3. **Upload the Theme Folder**  \n\n   Navigate to the WordPress theme directory and upload:\n\n  \n\n   ```\n\n   /wp-content/themes/mytheme/\n\n   ```\n\n  \n\n4. **Activate in Dashboard**  \n\n   - Go to WordPress Admin: `Appearance` → `Themes`\n\n   - Find your uploaded theme and click **Activate**\n\n  \n\n---\n\n  \n\n## 📁 Theme Installation Directory\n\n  \n\nWhen manually uploading a WordPress theme via FTP, it must be placed in the following folder:\n\n  \n\n```\n\n/wp-content/themes/\n\n```\n\n  \n\n### 🔍 Full Path Example:\n\n  \n\nIf your WordPress site is in `public_html` or `/var/www/html`, the path might look like:\n\n  \n\n```\n\n/home/username/public_html/wp-content/themes/mytheme/\n\n```\n\nor\n\n```\n\n/var/www/html/wp-content/themes/mytheme/\n\n```\n\n  \n\n### ✅ Required Files:\n\n  \n\nMake sure your theme folder contains at least:\n\n  \n\n- `style.css`\n\n- `index.php`\n\n  \n\nThese are essential for WordPress to detect the theme properly.\n\n  \n\n---\n\n  \n\n## 📌 Additional Tips\n\n  \n\n- After activating a theme, check for **required plugins** or **starter templates** the theme might suggest.\n\n- Customize it under `Appearance` → `Customize`\n\n- Always use a **child theme** if you plan to modify the theme’s code."}, {"name": "migration", "content": "# WordPress Migration Guide\n\n  \n\n## 📌 What is WordPress Migration?\n\n  \n\nWordPress migration is the process of moving a WordPress website from one environment to another. This can include transferring the site between:\n\n  \n\n- Different hosting providers (e.g., from Bluehost to SiteGround)\n\n- Localhost to live server (e.g., from a local development environment to a production website)\n\n- One domain to another (e.g., from oldsite.com to newsite.com)\n\n- HTTP to HTTPS (migrating to a secure version of your site)\n\n  \n\n## ✅ Why WordPress Migration Is Necessary\n\n  \n\n- **Changing Hosting Providers** – faster or more reliable hosting.\n\n- **Going Live from Localhost** – moving a local development site online.\n\n- **Changing Domain Name** – rebranding or better SEO.\n\n- **Creating a Staging Environment** – for testing updates before going live.\n\n- **Cloning a Site** – for testing, development, or backup.\n\n  \n\n## 🔧 Manual WordPress Migration (No Plugin)\n\n  \n\n### Step-by-Step\n\n  \n\n1. **Backup Files:** Use FTP or File Manager to download `public_html`.\n\n2. **Export Database:** Use phpMyAdmin > Export > SQL.\n\n3. **Upload Files to New Host:** Use FTP or File Manager.\n\n4. **Create New Database:** In cPanel > MySQL Databases.\n\n5. **Import Database:** phpMyAdmin > Import `.sql` file.\n\n6. **Edit `wp-config.php`:**\n\n   ```php\n\n   define('DB_NAME', 'new_db_name');\n\n   define('DB_USER', 'new_db_user');\n\n   define('DB_PASSWORD', 'new_db_password');\n\n   define('DB_HOST', 'localhost');\n\n   ```\n\n7. **Update Site URLs in Database (if domain changed):**\n\n   ```sql\n\n   UPDATE wp_options SET option_value = REPLACE(option_value, 'http://oldsite.com', 'https://newsite.com') WHERE option_name IN ('siteurl', 'home');\n\n   UPDATE wp_posts SET post_content = REPLACE(post_content, 'http://oldsite.com', 'https://newsite.com');\n\n   UPDATE wp_posts SET guid = REPLACE(guid, 'http://oldsite.com', 'https://newsite.com');\n\n   UPDATE wp_postmeta SET meta_value = REPLACE(meta_value, 'http://oldsite.com', 'https://newsite.com');\n\n   UPDATE wp_options SET option_value = REPLACE(option_value, 'http://oldsite.com', 'https://newsite.com');\n\n   UPDATE wp_usermeta SET meta_value = REPLACE(meta_value, 'http://oldsite.com', 'https://newsite.com');\n\n   ```\n\n8. **Fix Permalinks:** Settings > Permalinks > Save.\n\n  \n\n## 🤖 Automatic Migration (Plugins & Tools)\n\n  \n\n- **All-in-One WP Migration** – Easy export/import.\n\n- **Duplicator** – Clone and deploy entire site.\n\n- **UpdraftPlus** – Backup and restore (premium feature for migration).\n\n- **WP Migrate Lite** – For database + URL replacement.\n\n- **Host-Specific Tools** – SiteGround, Bluehost, WP Engine, etc.\n\n  \n\n## 🧾 SQL Queries for Domain Migration\n\n  \n\n```sql\n\nUPDATE wp_options SET option_value = REPLACE(option_value, 'http://oldsite.com', 'https://newsite.com') WHERE option_name IN ('siteurl', 'home');\n\nUPDATE wp_posts SET post_content = REPLACE(post_content, 'http://oldsite.com', 'https://newsite.com');\n\nUPDATE wp_posts SET guid = REPLACE(guid, 'http://oldsite.com', 'https://newsite.com');\n\nUPDATE wp_postmeta SET meta_value = REPLACE(meta_value, 'http://oldsite.com', 'https://newsite.com');\n\nUPDATE wp_options SET option_value = REPLACE(option_value, 'http://oldsite.com', 'https://newsite.com');\n\nUPDATE wp_usermeta SET meta_value = REPLACE(meta_value, 'http://oldsite.com', 'https://newsite.com');\n\n```\n\n  \n\n## 🛠 Handling Serialized Data (Use Tools Instead)\n\n  \n\n- **WP-CLI**\n\n  ```bash\n\n  wp search-replace 'http://oldsite.com' 'https://newsite.com' --all-tables\n\n  ```\n\n- **Better Search Replace Plugin**\n\n- **WP Migrate DB / WP Migrate Lite**\n\n  \n\n## 📝 Summary Table\n\n  \n\n| Method                   | Difficulty | Plugin Needed | Best For                     |\n\n|--------------------------|------------|----------------|-------------------------------|\n\n| Manual (FTP + SQL)       | High       | No             | Full control, tech-savvy users |\n\n| All-in-One WP Migration  | Easy       | Yes            | Beginners                     |\n\n| Duplicator               | Medium     | Yes            | Site clones and staging       |\n\n| WP Migrate DB            | Medium     | Yes            | Database-focused migrations   |\n\n| Host Tools               | Very Easy  | Sometimes      | Hassle-free, fast migrations  |"}, {"name": "plugins", "content": "# 🧭 WordPress Plugin Browsing History & Setup Log\n\nThis document tracks the browsing and installation history of the following plugins:\n\n---\nwhaT is plugins\n\n###### \n\n### 🔌 What Is a Plugin in WordPress?\n\nA **plugin** in WordPress is a piece of software that you can add to your WordPress website to extend its functionality or add new features—**without writing any code**.\n\n---\n\n### 🔧 Think of it like this:\n\n> A **WordPress website** is your smartphone.  \n> A **plugin** is like an **app** that adds new capabilities.\n\n---\n\n### ✅ Examples of What Plugins Can Do:\n\n|Feature|Plugin Example|\n|---|---|\n|SEO Optimization|Yoast SEO|\n|Contact Forms|Contact Form 7|\n|Security|Wordfence Security|\n|E-commerce|WooCommerce|\n|Site Backup|UpdraftPlus|\n|Website Migration|All-in-One WP Migration|\n|Login Security|Limit Login Attempts Reloaded|\n\n---\n\n### 📦 How Plugins Work:\n\n- WordPress has a **core system**.\n    \n- Plugins are built using PHP and can **\"hook\"** into this core.\n    \n- They **modify or extend** existing behavior without altering the core code.\n    \n\n---\n\n### 📁 Where Plugins Are Stored:\n\nOn your server, plugins are saved in:\n\nbash\n\nCopyEdit\n\n`/wp-content/plugins/`\n\nEach plugin usually has its own folder with all necessary files.\n\n---\n\n### 🛠️ How to Manage Plugins:\n\n- **Install**: Add new functionality.\n    \n- **Activate**: Turn the plugin on.\n    \n- **Deactivate**: Turn the plugin off (but keep it installed).\n    \n- **Delete**: Remove the plugin files completely.\n    \n\n---\n\n### 🔐 Are Plugins Safe?\n\n- **Yes**, if downloaded from trusted sources like:\n    \n    - https://wordpress.org/plugins/\n        \n    - Reputable developers or marketplaces (e.g., CodeCanyon)\n        \n\n✅ Always:\n\n- Keep plugins **updated**\n    \n- Use only **necessary** plugins\n    \n- Avoid **conflicting** or poorly rated plugins\n\n\n## 1. 🔐 Limit Login Attempts Reloaded\n\n**🔎 Browsed:**  \n[https://wordpress.org/plugins/limit-login-attempts-reloaded/](https://wordpress.org/plugins/limit-login-attempts-reloaded/)\n\n\n**📝 Notes:**  \n- Read about brute-force protection features  \n- Checked last update & active installs  \n- Reviewed 5-star user reviews  \n- Confirmed compatibility with latest WordPress version\n\n**✅ Actions Taken:**\n- Installed via `Plugins > Add New`\n- Activated\n- Configured max retries = 3, lockout = 20 min, notify on lock\n\n\n---\n\n## 2. 🔁 WP Reset\n\n**🔎 Browsed:**  \n[https://wordpress.org/plugins/wp-reset/](https://wordpress.org/plugins/wp-reset/)\n\n**📝 Notes:**  \n- Verified plugin resets WP to factory state  \n- Snapshot feature reviewed  \n- Noted warning: cannot be undone\n\n**✅ Actions Taken:**\n- Installed from dashboard\n- Activated plugin\n- Navigated to `Tools > WP Reset`\n- Created snapshot before reset\n- Executed site reset by typing “reset”\n\n---\n\n## 3. 📦 All-in-One WP Migration\n\n**🔎 Browsed:**  \n[https://wordpress.org/plugins/all-in-one-wp-migration/](https://wordpress.org/plugins/all-in-one-wp-migration/)\n\n**📝 Notes:**  \n- Reviewed export/import file types  \n- Learned about `.wpress` format  \n- Noted extension required for larger backups\n\n**✅ Actions Taken:**\n- Installed via dashboard\n- Exported site to local `.wpress` file\n- Tested import on test WP instance\n\n---\n\n## 4. 🧩 Duplicate Page\n\n**🔎 Browsed:**  \n[https://wordpress.org/plugins/duplicate-page/](https://wordpress.org/plugins/duplicate-page/)\n\n**📝 Notes:**  \n- Verified compatibility with Gutenberg  \n- Read about use with custom post types\n\n**✅ Actions Taken:**\n- Installed and activated\n- Configured: status = Draft, editor = Classic\n- Duplicated pages successfully from list view\n\n---\n\n## 5. 🔐 WPS Hide Login\n\n**🔎 Browsed:**  \n[https://wordpress.org/plugins/wps-hide-login/](https://wordpress.org/plugins/wps-hide-login/)\n\n**📝 Notes:**  \n- Reviewed how it changes login URLs securely  \n- Read FAQ: how to recover if URL forgotten  \n- Confirmed minimal resource usage\n\n**✅ Actions Taken:**\n- Installed and activated\n- Set new login path to `/secureadmin`\n- Verified login functionality at new path\n\n---\n\n## ✅ Summary Log Table\n\n| Plugin                   | Browsed URL                                           | Action Summary                      |\n|--------------------------|--------------------------------------------------------|-------------------------------------|\n| Limit Login Attempts     | wordpress.org/plugins/limit-login-attempts-reloaded/  | Installed, activated, configured    |\n| WP Reset                 | wordpress.org/plugins/wp-reset/                       | Installed, snapshot, reset run      |\n| All-in-One WP Migration  | wordpress.org/plugins/all-in-one-wp-migration/        | Export/import tested                |\n| Duplicate Page           | wordpress.org/plugins/duplicate-page/                 | Duplicated posts and pages          |\n| WPS Hide Login           | wordpress.org/plugins/wps-hide-login/                 | Changed login URL                   |\n\n---\n\n🗒️ *Document created for plugin tracking and training purposes.*\n"}];

function buildSidebar(filter) {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  let count = 0;
  NOTES.forEach(function(note, i) {
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) return;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = '▸';
    var name = document.createElement('span');
    name.className = 'fi-name';
    name.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(name);
    div.addEventListener('click', (function(idx){ return function(){ openNote(idx); }; })(i));
    list.appendChild(div);
    count++;
  });
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

+/g, '</p><p>');
      t = t.replace(/
/g, '<br>');
      result += '<p>' + t + '</p>';
    }
  }
  return result;
}

function openNote(idx) {
  document.querySelectorAll('.file-item').forEach(function(e){ e.classList.remove('active'); });
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block: 'nearest'}); }
  document.getElementById('vPath').textContent = 'WORDPRESS/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
}

// Init on load
buildSidebar();
if (NOTES.length > 0) openNote(0);
</script>
</body>
