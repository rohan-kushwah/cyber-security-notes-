<style>
*{margin:0;padding:0;box-sizing:border-box}

<script>
var NOTES = [{"name": "SCAN TECHNIQUES", "content": "# рҹ•өпёҸ TCP SYN Stealth Scan (`-sS`)\n\n> _\"The ghost of network scanning вҖ” it knocks, but never enters.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP SYN Stealth Scan** is one of the most widely used and effective scanning techniques in penetration testing and network reconnaissance.\n\nIt is called a **half-open scan** because it **never completes** the full TCP three-way handshake.\n\n---\n\n## рҹ”„ How the `-sS` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  SYN    в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ SYN/ACK  Server\nClient  RST    в”Җв”Җв–¶  Server\n```\n\n|Step|Who|Packet|Direction|\n|---|---|---|---|\n|1|Client|`SYN`|вҶ’ Server|\n|2|Server|`SYN/ACK`|вҶ’ Client|\n|3|Client|`RST`|вҶ’ Server|\n\n> Instead of completing with `ACK`, the client sends `RST` to kill the connection immediately.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  SYN      в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST/ACK   Server\n```\n\nThe server responds with `RST/ACK` вҖ” no service is listening.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  SYN  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo reply вҖ” a **firewall or security device** is blocking the request.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ”• **No Full Connection**|Handshake never completes вҶ’ often **not logged** in application logs|\n|рҹ‘» **Stealthier**|Many IDS/firewalls don't log half-open connections as thoroughly|\n|рҹҡҖ **Fast & Efficient**|Can scan **thousands of ports** quickly|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹ”җ **Requires Root/Admin**|Raw packets need **elevated privileges**|\n|рҹ“Ў **RST Packets Detectable**|Frequent resets may be caught by **sophisticated monitors**|\n|рҹҡЁ **Not Fully Undetectable**|Modern IDS/firewalls can log SYN patterns or **rate-limit** SYN packets|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ•өпёҸ **Quiet reconnaissance** where stealth is critical\n- рҹ”“ **Identifying open ports** without triggering firewall alerts or extensive logs\n- рҹ—әпёҸ **Mapping active services** before further penetration testing\n- рҹӣЎпёҸ **Hardened network scanning** where full connect scans would be flagged\n\n---\n\n## рҹ’» Example Nmap Commands\n\n```bash\n# Basic verbose SYN scan (default for root)\nnmap -v 192.168.1.46\n\n# Scan port 23 with verbose output using SYN scan\nnmap -v -sS -p 23 192.168.1.46\n\n# Scan port 80 verbosely using SYN scan\nnmap -v -sS -p 80 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Speed в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  Fast                 в”Ӯ\nв”Ӯ  Stealth в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  High                в”Ӯ\nв”Ӯ  Accuracy в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ  Excellent           в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _This technique balances **speed**, **stealth**, and **accuracy** вҖ” making it the go-to scanning method for many security professionals._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-SYN-Stealth-Scan(-sS)`_\n\n---\n\n---\n\n# рҹ”— TCP Connect Scan (`-sT`)\n\n> _\"The polite knock вҖ” it shakes hands, says hello, then hangs up.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP Connect Scan** is the **default scanning method** used by Nmap when the stealthier SYN scan (`-sS`) is unavailable вҖ” such as when running **without root or administrator privileges**.\n\nUnlike `-sS`, this scan **completes the full TCP three-way handshake** before terminating the connection.\n\n---\n\n## рҹ”„ How the `-sT` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  SYN    в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ SYN/ACK  Server\nClient  ACK    в”Җв”Җв–¶  Server\nClient  RST    в”Җв”Җв–¶  Server\n```\n\n|Step|Who|Packet|Direction|\n|---|---|---|---|\n|1|Client|`SYN`|вҶ’ Server|\n|2|Server|`SYN/ACK`|вҶ’ Client|\n|3|Client|`ACK`|вҶ’ Server|\n|4|Client|`RST`|вҶ’ Server|\n\n> The full handshake is completed before the client resets вҖ” the port is confirmed **open**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  SYN      в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST/ACK   Server\n```\n\nServer responds with `RST/ACK` вҖ” no service listening on that port.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  SYN  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response received вҖ” a **firewall is blocking** the packets.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ”“ **No Special Privileges**|Uses standard OS system calls вҖ” **no root/raw socket access** needed|\n|вң”пёҸ **Reliable**|Completes full connection, so multiple services may respond differently|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹ“Ӣ **Easily Logged**|Firewalls, IDS, and server logs **detect and record** the full connection|\n|рҹҗў **Slower than SYN**|Completing the full handshake adds **overhead** compared to half-open scans|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ–ҘпёҸ Running scans where **elevated privileges are unavailable**\n- рҹ“ў When **stealth is not a priority** and logs are not a concern\n- рҹ”¬ Situations where **service reactions to full vs. half-open connections** is valuable\n\n---\n\n## рҹ’» Example Commands\n\n```bash\n# Verbose TCP Connect scan on port 80\nnmap -v -sT -p 80 192.168.1.46\n\n# Verbose TCP Connect scan on port 23\nnmap -v -sT -p 23 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Speed   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘  Moderate             в”Ӯ\nв”Ӯ  Stealth в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘  Low                  в”Ӯ\nв”Ӯ  Accuracy в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ  Excellent           в”Ӯ\nв”Ӯ  Privilege Required: вңҳ None (uses OS syscalls)      в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _Prioritizes **accessibility and simplicity** over stealth and speed вҖ” a reliable fallback when SYN scans are restricted._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-Connect-Scan(-sT)`_\n\n---\n\n---\n\n# рҹӣЎпёҸ TCP ACK Scan (`-sA`)\n\n> _\"The interrogator вҖ” it asks if the firewall is watching, not whether the door is open.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP ACK Scan** is primarily used to **probe firewall rules** and **map network filtering**. Unlike SYN or Connect scans, it does **not attempt to establish or complete a TCP connection** вҖ” it sends an ACK packet to determine whether ports are **filtered or unfiltered**.\n\n---\n\n## рҹ”„ How the `-sA` Scan Works\n\n### рҹҹў Unfiltered Port (Open or Closed)\n\n```\nClient  ACK  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST   Server\n```\n\n|Step|Who|Packet|Meaning|\n|---|---|---|---|\n|1|Client|`ACK`|вҶ’ Server|\n|2|Server|`RST`|Port is **not filtered** by firewall|\n\n> вҡ пёҸ This response is the **same whether the port is open or closed** вҖ” this scan only indicates **filtering status**, not port state.\n\n---\n\n### рҹ”ҙ Filtered Port\n\n```\nClient  ACK  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo reply вҖ” the packet was **dropped or filtered** by a firewall or similar mechanism.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ”Ҙ **Firewall Detection**|Efficiently identifies which ports are **filtered (blocked) or unfiltered** by firewalls|\n|рҹ‘» **Stealthier**|Does not attempt to open connections, reducing alerts by IDS/IPS|\n|рҹ”“ **Bypasses Some Stateful Firewalls**|Some stateful firewalls block SYN but allow ACK packets, revealing **hidden filtering rules**|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|вқ“ **Cannot Detect Port State**|Does not determine if a port is **open or closed**, only filtered/unfiltered|\n|рҹҡ« **May Be Blocked**|Some firewalls and IPS drop unexpected ACK packets, **limiting effectiveness**|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ”Қ Penetration testing focused on **firewall rule discovery**\n- рҹ—әпёҸ Network mapping and understanding **filtering policies**\n- рҹ”— Often combined with other scans (e.g., SYN `-sS`, Connect `-sT`, Null `-sN`) for comprehensive analysis\n\n---\n\n## рҹ’» Example Command\n\n```bash\nnmap -v -sA -p 23 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Purpose: Firewall/Filter Detection ONLY            в”Ӯ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  High                в”Ӯ\nв”Ӯ  Port State Detection: вңҳ Cannot determine open/closedв”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _Valuable for **stealthy reconnaissance** to understand network perimeter defenses without triggering full connection attempts._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-ACK-Scan(-sA)`_\n\n---\n\n---\n\n# рҹӘҹ TCP Window Scan (`-sW`)\n\n> _\"The window inspector вҖ” reads the size of the gap to know if the door is truly open.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP Window Scan** is an **advanced variation of the ACK scan** that attempts to **differentiate between open and closed ports** by analyzing the **TCP window size value** in the RST packets sent by the target. This enables better accuracy in detecting port states while maintaining stealth.\n\n---\n\n## рҹ”„ How the `-sW` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  ACK  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST (window size вү  0)  Server\n```\n\nIf the **TCP window size** in the RST packet is **nonzero** вҶ’ port is considered **open**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  ACK  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST (window size = 0)  Server\n```\n\nIf the **TCP window size** is **zero** вҶ’ port is considered **closed**.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  ACK  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response received вҖ” packet was **dropped by a firewall**.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ‘» **Stealthier Scan**|Avoids connection initiation, reducing logging and IDS/IPS triggers|\n|рҹ”Ҙ **Firewall Detection**|Can discover actively filtered ports, similar to ACK scan|\n|рҹҺҜ **Better Differentiation**|More reliable than simple ACK scans by using **TCP window size** to distinguish open/closed|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|вҡ пёҸ **Not Always Effective**|Some systems return RST packets with fixed or **non-informative window sizes**|\n|рҹ’» **OS-Dependent**|Works best on targets with **predictable TCP stack behavior**|\n|рҹҡ« **Firewall Interference**|Like ACK scans, can be blocked by firewalls **dropping ACK packets**|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ”Қ Detecting **firewall rules** and which ports are filtered\n- рҹ•өпёҸ Stealthy reconnaissance when **evading logs and alerts** is important\n- рҹ”¬ Advanced port state distinction when **other scans yield inconclusive results**\n\n---\n\n## рҹ’» Example Command\n\n```bash\nnmap -v -sW -p 80 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  High                в”Ӯ\nв”Ӯ  Accuracy в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘  Moderate-High       в”Ӯ\nв”Ӯ  OS Dependency: вҡ пёҸ Varies by target TCP stack       в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _A useful tool for security professionals needing a **stealthier and slightly more reliable** way to analyze port states behind firewalls and detection systems._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-Window-Scan(-sW)`_\n\n---\n\n---\n\n# рҹ‘» TCP Maimon Scan (`-sM`)\n\n> _\"The phantom flag вҖ” exploits what BSD stacks weren't supposed to admit.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP Maimon Scan** is a **lesser-known stealth scan technique** discovered by **Uriel Maimon**. It targets a quirk in certain **TCP/IP stack implementations**, mainly in **BSD-based systems**, by sending `FIN/ACK` packets to the target port.\n\n---\n\n## рҹ”„ How the `-sM` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  FIN/ACK  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nThe server **ignores** the packet. This lack of response indicates the port is either **open or filtered**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  FIN/ACK  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST         Server\n```\n\nThe server responds with `RST` вҖ” port is **closed**.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  FIN/ACK  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response received вҖ” packet was **blocked by a firewall or filtering device**.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ”Ү **Stealthy**|Avoids SYN packets, reducing chance of **IDS/IPS detection**|\n|рҹ”“ **Firewall Evasion**|Can bypass firewalls and filters that **block common SYN scans**|\n|рҹҺҜ **Targets Specific TCP Stack Behavior**|Exploits a quirk in how **BSD-based stacks** handle FIN/ACK packets|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹҺҜ **Limited Scope**|Only effective against systems with **specific TCP/IP stack behaviors** (mostly BSD)|\n|рҹҡ« **Potential Firewall Blocking**|Modern stateful firewalls can **drop FIN/ACK packets**, reducing effectiveness|\n|вҡ пёҸ **Inconsistency**|Some OS treat FIN/ACK packets similarly to FIN packets, causing **varying reliability**|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ•өпёҸ Stealth scanning environments known to use **vulnerable TCP stack implementations**\n- рҹ”“ Evading firewalls that block SYN scans but **allow unusual TCP flag combinations**\n- рҹ”— Complementary scan to **enhance detection coverage** in penetration tests\n\n---\n\n## рҹ’» Example Command\n\n```bash\nnmap -v -sM -p 21 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  High                в”Ӯ\nв”Ӯ  Scope    в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘  Limited (BSD only)  в”Ӯ\nв”Ӯ  Reliability: вҡ пёҸ Varies by target OS                в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _A specialized technique for niche environments where **stealth and evasion are critical**, but its effectiveness depends heavily on the target's TCP/IP stack behavior._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-Maimon-Scan(-sM)`_\n\n---\n\n---\n\n# рҹ“Ў UDP Scan (`-sU`)\n\n> _\"The silent messenger вҖ” sends into the void, reads what echoes back.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **UDP Scan** is used to **detect open UDP ports** on a target system. Unlike TCP's connection-oriented protocol, **UDP is connectionless** вҖ” no handshakes. The scan relies on **responses or lack thereof** to infer the port status.\n\n---\n\n## рҹ”„ How the `-sU` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  UDP PORT 53   в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ UDP PORT 53 Reply  Server\n```\n\nServer replies with a **valid UDP response** вҶ’ port is **open**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  UDP PORT 53  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ ICMP Port Unreachable  Server\n```\n\nServer responds with **ICMP Port Unreachable** (Type 3, Code 3) вҶ’ port is **closed**.\n\n---\n\n### рҹҹЎ Open or Filtered Port\n\n```\nClient  UDP PORT 53  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response вҖ” the port could be **open but silent**, or **filtered by a firewall** dropping packets.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|вҡЎ **Lower Overhead**|UDP is connectionless вҖ” requires **no handshake**, making it lightweight|\n|вҷҫпёҸ **No Connection Limits**|Unlike TCP, it's **not constrained by connection limits**|\n|рҹӘҹ **Useful on Windows Networks**|Many important Windows services run on UDP: **DNS (53), NetBIOS (137), SNMP (161)**|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹ”җ **Requires Privileged Access**|Root or administrator privileges needed to **send raw packets**|\n|рҹҗў **Slow Scans**|Many UDP services do not respond, **significantly slowing scan times**|\n|рҹҡ§ **ICMP Rate Limiting**|Firewalls may limit or block ICMP Unreachable messages, causing **false positives**|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹҢҗ Discovering **UDP-based services** like DNS, DHCP, SNMP, NTP, TFTP\n- рҹ•өпёҸ Scanning for **hidden services** in networks that primarily filter TCP\n- рҹӘҹ Penetration testing **Windows environments** to find services such as NetBIOS and MSRPC\n\n---\n\n## рҹ’» Example Commands\n\n```bash\n# Verbose UDP scan on all common ports\nnmap -v -sU 192.168.1.51\n\n# Verbose UDP scan on port 53 (DNS)\nnmap -v -sU -p 53 192.168.1.51\n```\n\n---\n\n## рҹҢҗ Common UDP Ports to Scan\n\n|Port|Service|\n|---|---|\n|53|DNS|\n|67|DHCP|\n|69|TFTP|\n|123|NTP|\n|135|MSRPC|\n|137|NetBIOS|\n|138|NetBIOS Datagram|\n|161|SNMP|\n|445|SMB|\n|631|IPP|\n|1434|MS SQL Server|\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Speed    в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘  Slow                в”Ӯ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘  Moderate            в”Ӯ\nв”Ӯ  Protocol: UDP (connectionless)                     в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _UDP scanning is **essential for comprehensive network reconnaissance**, especially to find services invisible to TCP scans._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / UDP-Scan(-sU)`_\n\n---\n\n---\n\n# рҹҡ« TCP Null Scan (`-sN`)\n\n> _\"The blank stare вҖ” sends nothing, reads everything from the silence.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP Null Scan** is a stealthy scanning technique that sends **TCP packets with no flags set** (Null packets) to determine whether ports are open, closed, or filtered вҖ” based on the target's responses or lack thereof.\n\n---\n\n## рҹ”„ How the `-sN` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  None (no flags)  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nThe server does **not respond**, compliant with RFC 793. This indicates the port is **open or filtered**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  None (no flags)  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST/ACK              Server\n```\n\nThe server replies with `RST/ACK` вҶ’ port is **closed**.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  None (no flags)  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response вҖ” a **firewall drops the packet**.\n\n> вҡ пёҸ Note: Open and Filtered ports both produce no response вҖ” they cannot be distinguished with this scan alone.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ‘» **Stealthy**|Unlike `-sT` or `-sS`, Null scans do **not trigger many firewall or IDS logs**|\n|рҹ”“ **May Bypass Firewalls**|If a firewall only blocks SYN packets, Null scans **might bypass it**|\n|рҹҗ§ **Effective on Non-Windows Systems**|Most Unix/Linux TCP stacks follow **RFC 793**, making this scan effective there|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹӘҹ **Ineffective on Windows**|Windows treats closed ports differently, marking them as **filtered** вҖ” Null scans unreliable|\n|рҹҡ« **Blocked by Modern Firewalls**|Many contemporary firewalls and IDS **detect and block** Null scans|\n|вқ“ **Ambiguous for Open Ports**|Lack of response can mean either **open or filtered**, making it hard to distinguish conclusively|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ•өпёҸ Evasion of IDS and firewall logging due to the **absence of SYN packets**\n- рҹҗ§ Scanning **Unix/Linux/BSD systems** where RFC 793 compliance is expected\n- рҹ”¬ Testing **firewall rules for SYN packet filtering** while other packets might pass\n\n---\n\n## рҹ’» Example Command\n\n```bash\nnmap -sN -p 23 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ  Very High           в”Ӯ\nв”Ӯ  Flags Sent: вҲ… None                                 в”Ӯ\nв”Ӯ  Open vs Filtered: вҡ пёҸ Indistinguishable             в”Ӯ\nв”Ӯ  Works on Windows: вңҳ No                             в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _A specialized stealth technique best suited for network reconnaissance where **minimal detectability is desired**, primarily against non-Windows targets._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-Null-Scan(-sN)`_\n\n---\n\n---\n\n# рҹҸҒ TCP FIN Scan (`-sF`)\n\n> _\"The final whisper вҖ” sends a farewell packet to a connection that never existed.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP FIN Scan** is a stealthy scanning technique that sends TCP packets with only the **FIN flag set**. It is used to identify open, closed, or filtered ports based on the target's response or lack thereof.\n\n---\n\n## рҹ”„ How the `-sF` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  FIN  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nThe server does **not respond**, following RFC 793 standard behavior вҖ” port is **open or filtered**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  FIN    в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST/ACK  Server\n```\n\nServer replies with `RST/ACK` вҖ” port is **closed**.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  FIN  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response вҖ” a **firewall is blocking** the packet. Port is considered **filtered**.\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ  Very High           в”Ӯ\nв”Ӯ  Flags Sent: FIN only                               в”Ӯ\nв”Ӯ  Open vs Filtered: вҡ пёҸ Indistinguishable             в”Ӯ\nв”Ӯ  Works on Windows: вңҳ No                             в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _Sends a farewell to a session that never began вҖ” exploits RFC 793 behavior to slip past simple packet filters._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-FIN-Scan(-sF)`_\n\n---\n\n---\n\n# рҹҺ„ TCP Xmas Scan (`-sX`)\n\n> _\"The lit-up packet вҖ” every flag blazing like a Christmas tree, dazzling its way past defenses.\"_\n\n---\n\n## вҡЎ What Is It?\n\nThe **TCP Xmas Scan** is a stealthy and advanced scanning technique named for the TCP packets it sends with **FIN, PUSH, and URG flags** set вҖ” which make the packet \"light up\" like a Christmas tree.\n\n---\n\n## рҹ”„ How the `-sX` Scan Works\n\n### рҹҹў Open Port\n\n```\nClient  FIN/PSH/URG  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nThe server sends **no response**, following RFC-compliant behavior вҖ” port is **open or filtered**.\n\n---\n\n### рҹ”ҙ Closed Port\n\n```\nClient  FIN/PSH/URG  в”Җв”Җв–¶  Server\nClient  в—Җв”Җв”Җ RST/ACK         Server\n```\n\nServer responds with `RST/ACK` вҖ” port is **closed**.\n\n---\n\n### рҹҹЎ Filtered Port\n\n```\nClient  FIN/PSH/URG  в”Җв”Җв–¶  Server\n         (no response)\n```\n\nNo response вҖ” likely due to a **firewall dropping the packet**. Port is **filtered**.\n\n---\n\n## вң… Advantages\n\n|Advantage|Description|\n|---|---|\n|рҹ‘» **High Stealth**|Avoids SYN packets, reducing IDS/IPS detection chance|\n|рҹ”“ **Firewall Evasion**|Can bypass firewalls that only filter SYN packets|\n|рҹҗ§ **Effective on Unix/Linux**|Works on systems with RFC-compliant TCP stacks|\n\n---\n\n## вқҢ Disadvantages\n\n|Disadvantage|Description|\n|---|---|\n|рҹӘҹ **Doesn't Work on Windows**|Windows ignores these flags, treating all ports as filtered|\n|рҹҡ« **Blocked by Modern Firewalls**|Many contemporary firewalls and IDS detect and block Xmas scans|\n|вқ“ **Ambiguous Open Ports**|No response can mean **open or filtered** вҖ” interpretation is difficult|\n\n---\n\n## рҹҺҜ Use Cases\n\n- рҹ•өпёҸ Evading **IDS/IPS detection** by avoiding SYN packets\n- рҹҗ§ Scanning **Unix/Linux systems** consistent with RFC behavior\n- рҹ”¬ Testing if firewalls **filter SYN but allow other TCP flags**\n\n---\n\n## рҹ’» Example Command\n\n```bash\nnmap -sX -p 23 192.168.1.46\n```\n\n---\n\n## рҹ§  Summary\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Stealth  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ  Very High           в”Ӯ\nв”Ӯ  Flags Sent: FIN + PSH + URG                        в”Ӯ\nв”Ӯ  Open vs Filtered: вҡ пёҸ Indistinguishable             в”Ӯ\nв”Ӯ  Works on Windows: вңҳ No                             в”Ӯ\nв”Ӯ  Privilege Required: вң” Root/Admin                   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n> _A powerful stealth scanning technique commonly used on Unix-like systems to evade detection, but **modern defenses frequently mitigate** its effectiveness._\n\n---\n\n_рҹ“Ғ Path: `Network-Reconnaissance-Scanning / Nmap / Nmap-Scan-Techniques / TCP-Xmas-Scan(-sX)`_\n\n---\n\n---\n\n## рҹ“Ҡ Nmap Scan Techniques вҖ” Complete Comparison\n\n|Scan|Flag|Flags Sent|Privilege|Stealth|Windows?|Open Port Response|Closed Port Response|Purpose|\n|---|---|---|---|---|---|---|---|---|\n|SYN Stealth|`-sS`|SYN|Root|рҹҹў High|вң… Yes|SYN/ACK|RST/ACK|Default stealth scan|\n|TCP Connect|`-sT`|SYN|None|рҹ”ҙ Low|вң… Yes|SYN/ACKвҶ’ACK|RST/ACK|No-root fallback|\n|TCP ACK|`-sA`|ACK|Root|рҹҹў High|вң… Yes|RST (unfiltered)|RST (unfiltered)|Firewall mapping only|\n|TCP Window|`-sW`|ACK|Root|рҹҹў High|вң… Yes|RST (windowвү 0)|RST (window=0)|Advanced ACK variant|\n|TCP Maimon|`-sM`|FIN/ACK|Root|рҹҹў High|вқҢ No|No response|RST|BSD stack exploit|\n|UDP|`-sU`|UDP|Root|рҹҹЎ Medium|вң… Yes|UDP reply|ICMP Unreachable|UDP service discovery|\n|TCP Null|`-sN`|None (вҲ…)|Root|рҹҹў Very High|вқҢ No|No response|RST/ACK|Stealth / SYN evasion|\n|TCP FIN|`-sF`|FIN|Root|рҹҹў Very High|вқҢ No|No response|RST/ACK|Stealth / SYN evasion|\n|TCP Xmas|`-sX`|FIN+PSH+URG|Root|рҹҹў Very High|вқҢ No|No response|RST/ACK|Stealth / SYN evasion|\n\n---\n\n### рҹҺ„ FIN vs. Null vs. Xmas вҖ” Side-by-Side\n\n| Scan Type    | Flags Sent      | Open Port Response | Closed Port Response | Works on Windows? | Stealth Level |\n| ------------ | --------------- | ------------------ | -------------------- | ----------------- | ------------- |\n| FIN (`-sF`)  | `FIN`           | No response        | RST/ACK              | вқҢ No              | вң… High        |\n| Null (`-sN`) | No flags        | No response        | RST/ACK              | вқҢ No              | вң… High        |\n| Xmas (`-sX`) | `FIN, PSH, URG` | No response        | RST/ACK              | вқҢ No              | вң… High        |\n\n# вҡЎ NMAP вҖ” SCAN TYPES REFERENCE\n\n> _The Complete Field Manual for Network Reconnaissance_\n\n---\n\n```\nв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—\nв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—\nв–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ\nв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•қ\nв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘\nв•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  SCAN TYPES\n```\n\n---\n\n## рҹ“Ў TCP SCAN TYPES\n\n---\n\n### `-sS` вҖ” TCP SYN Scan _(Stealth Scan)_\n\n> **The default and most popular scan**\n\n```\nAttacker          Target\n   |в”Җв”Җ SYN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |в—„в”Җ SYN/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ Port is OPEN\n   |в”Җв”Җ RST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|   вҶҗ Never completes handshake\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Speed**|Fast|\n|**Stealth**|High вҖ” never completes TCP handshake|\n|**Reliability**|High|\n\n**How it works:** Sends a SYN packet. If a SYN/ACK is received, the port is open вҖ” but nmap immediately sends RST to tear down the connection before it fully establishes. Because the 3-way handshake is never completed, many systems won't log the connection.\n\n**Use when:** You want fast, stealthy reconnaissance with minimal footprint on target logs.\n\n---\n\n### `-sT` вҖ” TCP Connect Scan\n\n> **Full connection scan вҖ” no raw packets needed**\n\n```\nAttacker          Target\n   |в”Җв”Җ SYN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |в—„в”Җ SYN/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җ|\n   |в”Җв”Җ ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|   вҶҗ Full handshake COMPLETED\n   |в”Җв”Җ RST/FIN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|   вҶҗ Nmap closes connection\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Does NOT require root|\n|**Speed**|Slower than SYN scan|\n|**Stealth**|Low вҖ” full connection is logged|\n|**Reliability**|High|\n\n**How it works:** Uses the OS's `connect()` syscall to establish a full TCP connection. No raw sockets needed, making it usable by unprivileged users. The downside: the target system fully logs the connection.\n\n**Use when:** You don't have raw socket privileges, or you're scanning through a proxy/NAT that requires full connections.\n\n---\n\n### `-sA` вҖ” TCP ACK Scan\n\n> **Firewall mapping, not port discovery**\n\n```\nAttacker          Target\n   |в”Җв”Җ ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |в—„в”Җ RST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ UNFILTERED (firewall allows)\n   |   (no response)  |   вҶҗ FILTERED (firewall blocks)\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Purpose**|Firewall rule mapping|\n|**Result**|Returns FILTERED or UNFILTERED (not open/closed)|\n\n**How it works:** Sends ACK packets (which belong to an established connection). Stateful firewalls will drop them; stateless firewalls let them through and the target responds with RST. This tells you about firewall rules, **not** whether a port is open.\n\n**Use when:** You want to map firewall rules and determine which ports are filtered vs. unfiltered.\n\n---\n\n### `-sW` вҖ” TCP Window Scan\n\n> **ACK scan variant that exploits TCP window size quirks**\n\n```\nAttacker          Target\n   |в”Җв”Җ ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |в—„в”Җ RST (win > 0) в”Җ|   вҶҗ Interpreted as OPEN\n   |в—„в”Җ RST (win = 0) в”Җ|   вҶҗ Interpreted as CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Reliability**|OS-dependent (works on some BSD/Linux)|\n|**Purpose**|Port state detection via window size|\n\n**How it works:** Similar to ACK scan but examines the TCP window size field in returned RST packets. On certain operating systems, open ports respond with a non-zero window value while closed ports respond with zero. Results are unreliable across different OS implementations.\n\n**Use when:** Targeting specific systems known to exhibit window size differences in RST packets.\n\n---\n\n### `-sM` вҖ” TCP Maimon Scan\n\n> **FIN/ACK probe вҖ” named after Uriel Maimon (1996)**\n\n```\nAttacker          Target\n   |в”Җв”Җ FIN/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |   (no response)   |   вҶҗ OPEN (BSD behavior)\n   |в—„в”Җ RST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Target**|BSD-derived systems|\n|**Reliability**|Low on modern systems|\n\n**How it works:** Sends FIN/ACK packets. On BSD systems, open ports drop the packet silently while closed ports reply with RST. Most modern systems (Linux, Windows) respond with RST regardless of port state, making this scan largely ineffective today.\n\n**Use when:** Targeting older BSD-derived systems or testing firewall behavior against FIN/ACK probes.\n\n---\n\n## рҹ”® STEALTH / EXOTIC TCP SCANS\n\n---\n\n### `-sN` вҖ” TCP Null Scan\n\n> **No flags set at all**\n\n```\nAttacker          Target\n   |в”Җв”Җ [NO FLAGS] в”Җв”Җв”Җв”Җв–ә|\n   |   (no response)   |   вҶҗ OPEN or FILTERED\n   |в—„в”Җ RST/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Stealth**|High вҖ” unusual traffic pattern|\n|**Windows Support**|вқҢ Does not work on Windows|\n\n**How it works:** Sends a TCP packet with zero flags. Per RFC 793, receiving systems should respond with RST if the port is closed and drop the packet if open. Works only on RFC-compliant stacks вҖ” Windows ignores these probes.\n\n---\n\n### `-sF` вҖ” TCP FIN Scan\n\n> **Only the FIN flag is set**\n\n```\nAttacker          Target\n   |в”Җв”Җ FIN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |   (no response)   |   вҶҗ OPEN or FILTERED\n   |в—„в”Җ RST/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Stealth**|High вҖ” mimics connection teardown|\n|**Windows Support**|вқҢ Does not work on Windows|\n\n**How it works:** Sends only a FIN flag вҖ” normally used to close established connections. Closed ports reply with RST; open ports silently drop it. Can bypass some non-stateful firewalls and packet filters.\n\n---\n\n### `-sX` вҖ” TCP Xmas Scan\n\n> **FIN + PSH + URG flags вҖ” \"lit up like a Christmas tree\"**\n\n```\nAttacker          Target\n   |в”Җв”Җ FIN+PSH+URG в”Җв”Җв”Җв–ә|\n   |   (no response)   |   вҶҗ OPEN or FILTERED\n   |в—„в”Җ RST/ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Stealth**|High|\n|**Windows Support**|вқҢ Does not work on Windows|\n\n**How it works:** Sets FIN, PSH, and URG flags simultaneously вҖ” an illegal combination in normal TCP. Behavior follows the same RFC 793 rules as Null and FIN scans. Named \"Xmas\" because the packet looks \"lit up\" with multiple flags.\n\n---\n\n### `--scanflags <flags>` вҖ” Custom TCP Flag Scan\n\n> **Design your own TCP probe**\n\n```bash\n# Examples:\nnmap --scanflags URGACKPSHRSTSYNFIN target   # All flags\nnmap --scanflags SYN target                   # Same as -sS\nnmap --scanflags SYNFIN target                # Custom combo\nnmap --scanflags 0x29 target                  # Hex notation\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Flexibility**|Full control over TCP flags|\n|**Flags Available**|`URG` `ACK` `PSH` `RST` `SYN` `FIN`|\n\n**How it works:** Allows you to manually specify any combination of TCP flags using flag names or hex values. Can be combined with `-sS`, `-sF`, etc. to define the scan base type while overriding the flags. Powerful for custom IDS evasion or protocol research.\n\n**Use when:** You need to craft unusual packets for evasion testing, firewall analysis, or researching specific IDS/IPS signatures.\n\n---\n\n## рҹ•өпёҸ ADVANCED & SPECIAL SCANS\n\n---\n\n### `-sI <zombie host[:probeport]>` вҖ” Idle Scan\n\n\nkisi aur kr behalf pe scan karna matlab jombie kisii ke wash me leke kam karta hai usi tarah\n\nzombie host me apna ya kisis ka bhi host ka ip wo uske behal pe scan karega\n\n\n> **The ultimate stealth scan вҖ” your IP never touches the target**\n\n```\nAttacker         Zombie           Target\n   |в”Җ probe IP ID в”Җв”Җв–ә|\n   |в—„в”Җ IP ID=X в”Җв”Җв”Җв”Җв”Җв”Җ|\n   |                 |в”Җв”Җ SYN (spoofed as zombie) в”Җв”Җв–ә|\n   |                 |в—„в”Җ SYN/ACK (if open) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|\n   |                 |   IP ID increments to X+2\n   |в”Җ probe IP ID в”Җв”Җв–ә|\n   |в—„в”Җ IP ID=X+2 в”Җв”Җв”Җв”Җ|   вҶҗ Port OPEN (ID jumped by 2)\n   |в—„в”Җ IP ID=X+1 в”Җв”Җв”Җв”Җ|   вҶҗ Port CLOSED (ID jumped by 1)\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Stealth**|Maximum вҖ” attacker's IP never seen by target|\n|**Requirement**|Zombie host with predictable IP ID sequence|\n|**Complexity**|High|\n\n**How it works:** Exploits \"dumb\" hosts with incrementing IPID sequences. By probing the zombie before and after spoofed SYN packets are sent to the target, you can infer whether the target port is open based on how much the zombie's IPID counter incremented. Completely hides your identity.\n\n**Use when:** Maximum anonymity is required. Useful in penetration tests where attribution must be avoided or to bypass source-IP-based firewall rules.\n\n```bash\nnmap -sI zombie.host.com:80 target.host.com\n```\n\n---\n\n### `-sY` вҖ” SCTP INIT Scan\n\n> **SCTP equivalent of TCP SYN scan**\n\n```\nAttacker          Target\n   |в”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|\n   |в—„в”Җ INIT-ACK в”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ Port OPEN\n   |в—„в”Җ ABORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ Port CLOSED\n   |в”Җв”Җ ABORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә|   вҶҗ Never completes association\n```\n\n|Property|Detail|\n|---|---|\n|**Protocol**|SCTP (Stream Control Transmission Protocol)|\n|**Privilege**|Requires root/admin|\n|**Stealth**|High вҖ” association never completed|\n|**Use Case**|Telecom / SS7 infrastructure scanning|\n\n**How it works:** SCTP is used in telephony signaling (SS7/SIGTRAN). Sends an INIT chunk вҖ” the SCTP equivalent of a SYN. If INIT-ACK is returned, the port is open. Nmap aborts without completing the 4-way SCTP handshake, similar to how `-sS` works for TCP.\n\n---\n\n### `-sZ` вҖ” SCTP COOKIE-ECHO Scan\n\n> **Stealthier SCTP scan using COOKIE-ECHO chunks**\n\n```\nAttacker          Target\n   |в”Җв”Җ COOKIE-ECHO в”Җв”Җв”Җв–ә|\n   |   (no response)   |   вҶҗ OPEN (packet silently dropped)\n   |в—„в”Җ ABORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ|   вҶҗ CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Protocol**|SCTP|\n|**Privilege**|Requires root/admin|\n|**Stealth**|Higher than INIT scan|\n|**Drawback**|Cannot distinguish open from filtered|\n\n**How it works:** Sends a COOKIE-ECHO chunk (used in the middle of the SCTP handshake). Open ports silently discard it; closed ports send ABORT. More stealthy than INIT scan but less informative since open/filtered look the same.\n\n---\n\n### `-sO` вҖ” IP Protocol Scan\n\n> **Discovers supported IP protocols, not ports**\n\n\nprotocols ko check kasrrega ki work kar rhe hai ki nhi\n\n```\nAttacker          Target\n   |в”Җв”Җ IP proto=1  в”Җв”Җв”Җв–ә|   (ICMP)\n   |в”Җв”Җ IP proto=6  в”Җв”Җв”Җв–ә|   (TCP)\n   |в”Җв”Җ IP proto=17 в”Җв”Җв”Җв–ә|   (UDP)\n   |в”Җв”Җ IP proto=50 в”Җв”Җв”Җв–ә|   (ESP)\n   |в—„в”Җ ICMP proto unreachable |   вҶҗ Protocol NOT supported\n   |   (any response)  |   вҶҗ Protocol SUPPORTED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Scans**|IP protocols (0вҖ“255), not TCP/UDP ports|\n|**Purpose**|Protocol support enumeration|\n\n**How it works:** Iterates through IP protocol numbers (1вҖ“255), sending raw IP packets with various protocol headers. If the target responds at all (even with an ICMP error), that protocol is supported. ICMP \"protocol unreachable\" messages indicate unsupported protocols.\n\n**Use when:** You want to know which IP-level protocols a host supports (ICMP, OSPF, GRE, ESP, etc.) rather than which ports are open.\n\n---\n\n### `-b <FTP relay host>` вҖ” FTP Bounce Scan\n\n\nksisi ftp server ke behalf pe scan karega likhe zombie jaise\n\n> **Uses FTP proxy feature to scan third-party hosts**\n\n```\nAttacker     FTP Server      Target\n   |в”Җ PORT cmd в”Җв”Җв–ә|\n   |              |в”Җв”Җ connect to target:port в”Җв”Җв–ә|\n   |в—„в”Җ 200 OK в”Җв”Җв”Җв”Җ|   вҶҗ Target port OPEN\n   |в—„в”Җ 425 Err в”Җв”Җв”Җ|   вҶҗ Target port CLOSED\n```\n\n|Property|Detail|\n|---|---|\n|**Privilege**|No root required (uses FTP protocol)|\n|**Requirement**|Vulnerable FTP server that allows PORT abuse|\n|**Stealth**|Hides attacker вҖ” FTP server IP hits the target|\n|**Availability**|Rare вҖ” most modern FTP servers disable this|\n\n**How it works:** Exploits the FTP `PORT` command, which was originally designed to allow FTP to connect to a data channel on a different host. By connecting to an FTP server and issuing `PORT` commands pointing at a third-party target, you can use the FTP server as a proxy to scan other systems. The target sees the FTP server's IP, not yours.\n\n**Use when:** You discover a misconfigured FTP server and want to pivot it for scanning. Mostly a legacy technique вҖ” rare in modern environments.\n\n```bash\nnmap -b ftp.vulnerable-server.com target.host.com\n```\n\n---\n\n## рҹҢҗ NON-TCP SCAN TYPES\n\n---\n\n### `-sU` вҖ” UDP Scan\n\n|Property|Detail|\n|---|---|\n|**Privilege**|Requires root/admin|\n|**Speed**|Very slow (rate-limited by ICMP)|\n|**Target**|DNS (53), SNMP (161), DHCP (67/68), NTP (123)|\n\n**How it works:** Sends UDP packets to each port. Open ports may respond with data; closed ports typically send back ICMP port-unreachable messages. Rate limiting by the OS makes this scan slow. Often combined with `-sV` for service detection.\n\n---\n\n### `-sV` вҖ” Version Detection _(not a scan type, but commonly paired)_\n\nProbes open ports to determine service/version information. Often used alongside any scan type:\n\n```bash\nnmap -sS -sV -p 22,80,443 target\n```\n\n---\n\n## рҹ—ӮпёҸ QUICK REFERENCE CHEAT SHEET\n\n|Flag|Scan Type|Requires Root|Stealth|Protocol|\n|---|---|:-:|:-:|---|\n|`-sS`|SYN (Stealth)|вң…|вӯҗвӯҗвӯҗ|TCP|\n|`-sT`|Connect|вқҢ|вӯҗ|TCP|\n|`-sA`|ACK|вң…|вӯҗвӯҗ|TCP|\n|`-sW`|Window|вң…|вӯҗвӯҗ|TCP|\n|`-sM`|Maimon|вң…|вӯҗвӯҗ|TCP|\n|`-sN`|Null|вң…|вӯҗвӯҗвӯҗ|TCP|\n|`-sF`|FIN|вң…|вӯҗвӯҗвӯҗ|TCP|\n|`-sX`|Xmas|вң…|вӯҗвӯҗвӯҗ|TCP|\n|`--scanflags`|Custom Flags|вң…|Varies|TCP|\n|`-sI`|Idle|вң…|вӯҗвӯҗвӯҗвӯҗвӯҗ|TCP|\n|`-sY`|SCTP INIT|вң…|вӯҗвӯҗвӯҗ|SCTP|\n|`-sZ`|SCTP COOKIE-ECHO|вң…|вӯҗвӯҗвӯҗвӯҗ|SCTP|\n|`-sO`|IP Protocol|вң…|вӯҗвӯҗ|IP|\n|`-b`|FTP Bounce|вқҢ|вӯҗвӯҗвӯҗ|FTP/TCP|\n|`-sU`|UDP|вң…|вӯҗвӯҗ|UDP|\n\n---\n\n## вҡ пёҸ LEGAL DISCLAIMER\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  вҡ   USE ONLY ON SYSTEMS YOU OWN OR HAVE EXPLICIT        в”Ӯ\nв”Ӯ     WRITTEN PERMISSION TO TEST.                         в”Ӯ\nв”Ӯ                                                         в”Ӯ\nв”Ӯ     Unauthorized scanning may violate:                  в”Ӯ\nв”Ӯ     вҖў Computer Fraud and Abuse Act (CFAA)               в”Ӯ\nв”Ӯ     вҖў Computer Misuse Act (UK)                          в”Ӯ\nв”Ӯ     вҖў Various local and international laws              в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n_Reference: [nmap.org](https://nmap.org/book/man-port-scanning-techniques.html) В· Gordon \"Fyodor\" Lyon В· Nmap Network Scanning_"}, {"name": "about port closed open and filtered & output", "content": "# рҹ”Қ Nmap Port Scanning & Output\n\n> _A complete reference for network reconnaissance, penetration testing & recon_\n\n---\n\n## рҹҡҰ Port States (TCP SYN Scan)\n\n### вң… Open Port\n\n```\nClient (SYN)    в”Җв”Җв–¶  Server\nClient          в—Җв”Җв”Җ  (SYN/ACK)  Server\nClient (RST)    в”Җв”Җв–¶  Server\n```\n\n- **Meaning:** Application **listens** on port.\n- рҹ’Ў _Tip: RST avoids completing the connection вҶ’ used in half-open scans._\n\n---\n\n### вқҢ Closed Port\n\n```\nClient (SYN)    в”Җв”Җв–¶  Server\nClient          в—Җв”Җв”Җ  (RST/ACK)  Server\n```\n\n- **Meaning:** No service running, but **host is reachable**.\n\n---\n\n### рҹ”’ Filtered Port\n\n```\nClient (SYN)    в”Җв”Җв–¶  Server\n                     (no response)\n```\n\n- **Meaning:** Cannot conclusively classify port as open or closed due to lack of feedback.\n- рҹ’Ў _Tip: Sometimes filtered ports generate ICMP unreachable messages or other error responses, which Nmap can also interpret as filters. Distinguishing between \"filtered\" and \"no response\" can provide clues about network security controls in place._\n\n---\n\n## рҹӣ пёҸ Common Nmap Commands\n\n### рҹ”Һ Basic Scans\n\n|Description|Command|\n|---|---|\n|Simple scan|`nmap 192.168.1.51`|\n|Verbose output|`nmap -v 192.168.1.51`|\n|Max verbosity|`nmap -vvv 192.168.1.51`|\n|Debug mode (internal details)|`nmap -d 192.168.1.36`|\n|Extra debug|`nmap -ddd 192.168.1.235`|\n\n---\n\n### рҹҺҜ Port Selection\n\n| Description                       | Command                                      |\n| --------------------------------- | -------------------------------------------- |\n| Scan top 50 common ports          | `nmap -v 192.168.1.51 --top-ports 50`        |\n| Show only open ports              | `nmap -v 192.168.1.51 --top-ports 50 --open` |\n| Scan FTP port 21 with explanation | `nmap -p 21 192.168.1.35 --reason`           |\n| View packet flow in detail        | `nmap -v 192.168.1.36 -p 80 --packet-trace`  |\n\n---\n\n### рҹ“Ө Output Control\n\n| Description                                     | Command                                                |\n| ----------------------------------------------- | ------------------------------------------------------ |\n| Normal text output                              | `nmap -v 192.168.1.36 -oN windowsserver.nmap`          |\n| XML output                                      | `nmap -v 192.168.1.36 -oX windowsserver.xml`           |\n| Scripting output                                | `nmap -v 192.168.1.36 -oS windowsserver.scri`          |\n| Grep-friendly                                   | `nmap -v 192.168.1.36 -oG windowsserver.grepable`      |\n| All formats at once (`.nmap`, `.xml`, `.gnmap`) | `nmap -v 192.168.1.36 -oA winserver`                   |\n| Append instead of overwrite                     | `nmap 192.168.1.36 -oN winserver.nmap --append-output` |\n\n---\n\n### рҹ”„ Batch & Resume Scans\n\n```bash\nnmap 157.191.64.0/18 -oN n1   # Scan large subnet\nnmap --resume n1               # Resume interrupted scan\n```\n\n---\n\n### рҹ“Ҡ Custom Reports\n\n**Convert XML output into HTML:**\n\n```bash\nxsltproc 1.xml -o 1.html\n```\n\n**Apply bootstrap stylesheet for rich HTML:**\n\n```bash\nnmap -v -sV -A -sC 192.168.1.1/24 \\\n  --stylesheet https://raw.githubusercontent.com/honze-net/nmap-bootstrap-xsl/master/nmap-bootstrap.xsl \\\n  -oX mynetwork.xml\n```\n\n---\n\n### рҹ§№ Parsing with Grep & Sed\n\nExtract open ports from `.gnmap` results:\n\n```bash\negrep -v \"^#|Status: Up\" nmap-out.gnmap \\\n  | cut -d' ' -f4- \\\n  | sed -n -e 's/Ignored.*//p' \\\n  | tr ',' '\\n' \\\n  | egrep -v \"closed|filtered\" \\\n  | sed -e 's/^[ \\t]*//' \\\n  | sort -n | uniq -c | sort -k 1 -r\n```\n\n---\n\n## рҹ’Ў Practical Tips\n\n- Use `--reason` вҶ’ See **why** Nmap marked port as open/closed/filtered.\n- Add `--packet-trace` вҶ’ View every packet Nmap sends/receives.\n- Use `--top-ports` for **quick scans**, `-p-` for **full scans** (all 65,535 ports).\n- Combine with `-sV` (service/version detection) & `-A` (aggressive: OS + traceroute + script scan).\n\n---\n\n## рҹ“Ӣ Quick Reference Table\n\n|Flag|Purpose|\n|---|---|\n|`-v` / `-vvv`|Verbose / Max verbosity|\n|`-d` / `-ddd`|Debug / Extra debug|\n|`-p <port>`|Specific port scan|\n|`--top-ports N`|Top N common ports|\n|`--open`|Show only open ports|\n|`--reason`|Explain port state|\n|`--packet-trace`|Show packet flow|\n|`-oN`|Normal text output|\n|`-oX`|XML output|\n|`-oG`|Grepable output|\n|`-oA`|All formats|\n|`--append-output`|Append to existing file|\n|`--resume <file>`|Resume interrupted scan|\n|`-sV`|Service/version detection|\n|`-A`|Aggressive scan|\n\n---\n\n> рҹӣЎпёҸ _Use responsibly. Always obtain proper authorization before scanning any network._"}, {"name": "headers", "content": "## IP (Internet Protocol) Header Fields and Their Role in Nmap Scans\n\nNmap manipulates key IP header fields to perform various scan types, optimize detection, and evade security controls. Below is a detailed explanation of important IP header fields and how Nmap uses them:\n\n![[Pasted image 20250922111128.png]]\n### IP Header Fields\n\n| IP Header Field                     | Description & Role in Nmap                                                                                                      | Example Nmap Usage                                                           |\n| ----------------------------------- | ------------------------------------------------------------------------------------------------------------------------------- | ---------------------------------------------------------------------------- |\n| **1. Version**                      | IP packet versionвҖ”IPv4 (value 4) by default; IPv6 supported (-6).                                                               | `nmap -6 2001:db8::1` (IPv6 scan)                                            |\n| **2. Header Length (IHL)**          | Length of the IP header in 32-bit words (default 5 = 20 bytes); increases with options.                                         | Modified in raw protocol scans (`-sO`).                                      |\n| **3. Type of Service (ToS) / DSCP** | Quality of Service bits affecting packet handling/routing. Can be customized to influence traffic treatment or evade detection. | `nmap --ip-options '\\x03' 192.168.1.1`                                       |\n| **4. Total Length (Datagram Size)** | Combined header and payload length in bytes. Larger packets may require fragmentation.                                          | Packet fragmentation for firewall evasion with `-f`.                         |\n| **5. Identification**               | 16-bit field to uniquely identify packet fragments for reassembly. Useful in fragmentation evasion or traffic inspection.       | Visible in packet sniffing; manipulation occurs with fragmentation enabled.  |\n| **6. Flags**                        | Control fragmentation; DF (Don't Fragment), MF (More Fragments).                                                                | Fragmented scans with `-f` use these flags to circumvent filters.            |\n| **7. Fragment Offset**              | Position of a fragment's data relative to the original packet.                                                                  | Packet fragmentation can confuse some IDS/firewalls.                         |\n| **8. Time To Live (TTL)**           | Limits packet lifetime (hops). Decremented at each router, preventing routing loops. Used for OS detection and trace route.     | Set TTL to control detection or analyze network hops (`--ttl`).              |\n| **9. Protocol**                     | Specifies upper layer protocol (1=ICMP, 6=TCP, 17=UDP). Used in protocol scans.                                                 | Protocol scan: `nmap -sO 192.168.1.1`                                        |\n| **10. Header Checksum**             | Validates the integrity of the IP header; recalculated with header changes.                                                     | Calculated automatically; no user manipulation.                              |\n| **11. Source Address**              | IP address of the sender. Can be spoofed to conceal scan origin.                                                                | IP spoofing stealth: `nmap -S 192.168.1.100 192.168.1.1`                     |\n| **12. Destination Address**         | IP of the target system(s). Supports single and subnet notation.                                                                | Examples: `nmap 192.168.1.1` or `nmap 192.168.1.0/24`                        |\n| **13. Options**                     | Rare extended features like Record Route, Timestamp. Can increase header sizeвҖ”uncommonly used but supported for advanced scans. | Custom options: `nmap --ip-options '\\x07\\x27\\x08\\x08\\x08\\x08'` `192.168.1.1` |\n#### Additional Details and Usage Patterns\n\n- **Fragmentation for Evasion:**\n  By breaking packets into fragments (`-f`), Nmap attempts to bypass some firewalls and IDS/IPS devices that don't properly inspect fragmented packets. Fragment offset and flags assist this evasion.\n\n- **TTL Manipulation:**\n  Controlling TTL is useful in OS fingerprinting since different operating systems use different initial TTL values. Also aids in evading detection or mimicking traffic from a certain network region.\n\n- **Source IP Spoofing:**\n  Spoofing the source IP helps mask the origin of scans, useful in penetration testing or bypassing access control lists that restrict hosts by IP.\n\n- **Protocol Enumeration (`-sO`):**\n  This IP protocol scan sends raw IP packets with different protocol numbers to discover what protocols the target supports (e.g., TCP, UDP, ICMP, IGMP).\n\n- **Packet Size and Options:**\n  Manipulating the size (total length field) and options enables Nmap to craft unusual or custom packets for fingerprinting or firewall evasion.\n\n#### Summary Table of Nmap IP Header Field Usage\n\n| IP Header Field | How Nmap Uses It | Typical Commands / Options |\n|---|---|---|\n| TTL | OS detection, hop count | `-O`, `--ttl` |\n| Flags & Fragmentation | Firewall/IDS evasion | `-f` |\n| Source Address | IP spoofing | `-S <IP>` |\n| Protocol | Network layer protocol enumeration | `-sO` |\n| Total Length | Fragmentation handling & custom packets | `-f` |\n| Type of Service (ToS) | QoS & traffic shaping | `--ip-options` |\n| Options | Rare header extensions | `--ip-options` |\n\nThese capabilities give Nmap powerful flexibility for scanning, evading defenses, and fingerprinting target systems at the network layer.\n\n---\n# TCP Header Fields & Their Role in Nmap Scans\n\nThe TCP header contains several fields that Nmap manipulates or analyzes to perform various scanning and evasion techniques. Understanding each field, and how Nmap leverages it, is key to understanding both basic and advanced Nmap scans.\n\n| Field | Description & Nmap Usage | Example Nmap Usage |\n| :--- | :--- | :--- |\n| **Source Port** | Port used by the sender. Can be manually set for evasion or bypassing filters. | `nmap --source-port 53 192.168.1.1` |\n| **Destination Port** | Target port(s) on the receiving host. Nmap scans specified ports or ranges. | `nmap -p 22,80,443 192.168.1.1` |\n| **Sequence Number** | Used for ordering TCP segments; analyzed during OS fingerprinting (`-O`). | Passive (OS fingerprinting) |\n| **Acknowledgment Number** | Used in connection establishment (TCP handshake). | Passive (three-way handshake) |\n| **Data Offset** | Specifies the length of the TCP header; increased by options. | Passive |\n| **Reserved** | Unused; reserved for future use. | (not manipulated by Nmap) |\n| **TCP Flags** | Controls connection state; Nmap uses these for various scan types: | |\n| - URG (Urgent) | Marks urgent data; rarely used in scans. | |\n| - ACK (Acknowledgment) | Acknowledges data; used in ACK scans (`-sA`). | `nmap -sA 192.168.1.1` |\n| - PSH (Push) | Push data to application; rarely used. | |\n| - RST (Reset) | Resets connections; used in RST scan replies. | Passive |\n| - SYN (Synchronize) | Starts connections; SYN scans (`-sS`). | `nmap -sS 192.168.1.1` |\n| - FIN (Finish) | Gracefully closes; used in FIN scans (`-sF`). | `nmap -sF 192.168.1.1` |\n| **Window Size** | Indicates buffer size; analyzed for OS detection/fingerprinting. | Passive |\n| **Checksum** | Error-checking; Nmap calculates this automatically for packet integrity. | Automatic |\n| **Urgent Pointer** | Only used if URG flag is set; rarely in scanning. | (rare) |\n| **Options** | Supports features like MSS, Timestamps, or SACK. Nmap allows custom options. | `nmap --tcp-options 02:04:4000 192.168.1.1` |\n\n---\n\n## How Nmap Uses TCP Header Fields\n\n*   **Source Port:**\n    *   You can set the source port manually with `--source-port`. This can help evade firewalls performing special handling on trusted ports (like port 53 for DNS).\n\n*   **Destination Port:**\n    *   Choose single ports or ranges to scan using `-p` e.g., `-p 80,443` or `-p 1-1024`.\n\n*   **Sequence Number:**\n    *   Used by Nmap's OS fingerprinting engine (`-O`) because each OS generates initial Sequence Numbers (ISN) differently.\n\n*   **Flags:**\n    *   Nmap uses many flag combinations for stealth and evasion scans:\n        *   **SYN Scan (`-sS`)**: Sends SYN, waits for SYN-ACK or RST.\n        *   **FIN Scan (`-sF`)**: Sends FIN, useful for bypassing firewalls filtering only SYNs.\n        *   **ACK Scan (`-sA`)**: Used to map firewall rules.\n        *   **Null/Xmas Scans**: Use no flags or a combination (e.g., FIN+URG+PSH).\n\n*   **Window Size:**\n    *   Some OS detection relies on the default TCP window size returned by open ports.\n\n*   **Options:**\n    *   Craft custom TCP packets using `--tcp-options` for advanced evasion or fingerprinting.\n\nNmap takes full advantage of TCP header flexibility, using combinations of fields and flags to provide reliable, stealthy, and informative scanning capabilities across a wide range of network environments.\n\n---\n# UDP Header Fields & Their Role in Nmap Scans\n\nThe User Datagram Protocol (UDP) is a connectionless protocol at the transport layer, known for its speed and simplicity, but lacks reliability mechanisms found in TCP. This affects how Nmap conducts scans and the type of information it gathers.\n\n## UDP Header Fields and Their Functions\n\n| Field | Size (Bits) | Description | Nmap Relevance |\n| :--- | :--- | :--- | :--- |\n| **Source Port** | 16 | Port used by the sender's machine | Can be set via `--source-port` to evade firewalls |\n| **Destination Port** | 16 | Target port on the receiver's machine | Set with `-p`; defines which service is being scanned |\n| **Length** | 16 | Total size of UDP header plus data | Used in fragmentation and evasion techniques |\n| **Checksum** | 16 | Validates integrity of header and data | May be set incorrectly for stealth/evasion |\n\n## How Nmap Uses UDP Header Fields in Scans\n\n*   **Source Port:**\n    *   You can specify the source port when scanning, which can help bypass firewall rules that allow traffic from \"trusted\" ports:\n      ```\n      nmap --source-port 53 -sU 192.168.1.1\n      ```\n    This simulates legitimate DNS traffic.\n\n*   **Destination Port:**\n    *   Nmap targets specific UDP ports or ranges using the `-p` option, such as:\n      ```\n      nmap -sU -p 53,161,500 target.com\n      ```\n    This is commonly used for scanning DNS (53), SNMP (161), or IKE (500).\n\n*   **Length Field:**\n    *   The total length of the header and payload, which is important when crafting fragmented packets. Fragmentation may assist in bypassing certain security products or network controls.\n\n*   **Checksum:**\n    *   Used for error checking, but Nmap might deliberately set incorrect values in rare evasion scenarios.\n\n## Notes on UDP Scanning in Nmap\n\n*   UDP scanning (`-sU`) is typically slower and less reliable than TCP scanning.\n*   UDP is stateless; many services do not respond unless given the exact correct packet, and silent drops (no response) are common.\n*   Nmap may retransmit UDP probes and interpret ICMP error messages (like \"Port Unreachable\") to confirm closed ports.\n\n**Summary:**\nNmap manipulates UDP header fieldsвҖ”source port, destination port, length, and checksumвҖ”primarily for targeted scans, evasion tactics, and to adapt to stateless communication. This enables the discovery of UDP services and vulnerabilities, despite the protocol's inherent limitations and the scanning challenges it presents.\n\n---\n# Internet Control Message Protocol (ICMP) and Its Role in Nmap Scans\n\nICMP operates at the network (layer 3) of the OSI model and is crucial for network diagnostics, error reporting, and controlвҖ”not for data transfer. Nmap uses ICMP extensively to map networks and assess hosts and security devices.\n\n## ICMP Header Fields\n\n| Field | Size (Bits) | Description |\n| :--- | :--- | :--- |\n| **Type** | 8 | Identifies the message kind (e.g., 8 = Echo Request, 0 = Echo Reply) |\n| **Code** | 8 | Extra info for the message type (e.g., reason for Destination Unreachable) |\n| **Checksum** | 16 | Error checking value for header/data integrity |\n| **Rest of Header** | 32 | Varies; can include sequence numbers, identifiers, timestamps, etc. |\n\n## Common ICMP Message Types and Use Cases\n\n| Type | Code | Message | Typical Use Case |\n| :--- | :--- | :--- | :--- |\n| 0 | 0 | Echo Reply | Response to Echo Request (ping reply) |\n| 3 | 0-15 | Destination Unreachable | Reports unreachable target (port/host/network) |\n| 4 | 0 | Source Quench (deprecated) | Request to slow down transmission |\n| 5 | 0-3 | Redirect | Suggests alternate route for packets |\n| 8 | 0 | Echo Request | Tests connectivity (ping sweep) |\n| 11 | 0-1 | Time Exceeded | TTL expired in transit (used in traceroute) |\n| 12 | 0-1 | Parameter Problem | Indicates malformed IP header |\n\n## How Nmap Uses ICMP\n\n*   **Echo Request (8) / Echo Reply (0):**\n    *   Used in Nmap's ping sweeps (`-sn`), allowing rapid discovery of live hosts on a network.\n*   **Destination Unreachable (3):**\n    *   Interpreted by Nmap to help identify filtered or firewalled ports/services when scanningвҖ”if access to a port is blocked, a corresponding ICMP error may be generated.\n*   **Time Exceeded (11):**\n    *   Utilized in traceroute scans (`--traceroute`), helping to map the network path/hop sequence from scanner to target.\n*   **Other Codes/Types:**\n    *   Help Nmap detect network or host issues, recognize route changes, or spot filtering along the scan path.\n\n**Summary:**\nICMP gives Nmap the ability to perform effective network mapping, device discovery, and route analysis, making it an essential protocol for both administrators and security testers. Nmap leverages ICMP message types and header fields strategically to gather information and adapt to different network conditions and protections.\n\n---\n## Protocol Header Fields Manipulation in Nmap\n\n| Protocol | Header Field | Nmap Usage Description |\n| :--- | :--- | :--- |\n| IP | TTL | OS detection and hop counting (-O, --ttl) |\n| | Flags | Fragmentation and stealth scans (-f) |\n| | Source IP | IP spoofing (-S) |\n| | Protocol | IP protocol scan (-sO) |\n| TCP | Flags | Scan types (SYN, FIN, ACK, etc.) (-sS, -sF, -sA) |\n| | Source Port | Spoofing to evade firewalls (--source-port) |\n| | Destination Port | Target ports (-p) |\n| | Options | Custom TCP packet crafting (--tcp-options) |\n| UDP | Source Port | Set source port to bypass filtering (--source-port) |\n| | Destination Port | Target UDP services (-p) |\n| ICMP | Type | Used in ping and traceroute (Types 0, 3, 8, 11) |\n| | Code | Provides additional message info |\n\n---"}, {"name": "host discovery switchess", "content": "# рҹӣ°пёҸ Nmap Host Discovery Switches Guide\n\nHost discovery determines **which hosts are online before scanning ports**.  \nThese switches control **how Nmap discovers active machines on a network**.\n\n---\n\n# рҹ“Ў Host Discovery Options\n\n---\n\n## рҹ”№ `-sL` вҖ” List Scan\n\n### рҹ“– Meaning\n\n`-sL` performs a **List Scan**, which simply lists the target IP addresses **without sending any packets to them**.\n\nвң” Useful for:\n\n- Verifying target ranges\n    \n- Passive reconnaissance\n    \n\n### рҹ’» Command Example\n\nnmap -sL 192.168.1.0/24\n\n### рҹ”Һ What Happens\n\n- No host is scanned\n    \n- Nmap only lists IP addresses and reverse DNS names.\n    \n\n---\n\n## рҹ”№ `-sn` вҖ” Ping Scan (No Port Scan)\n\n### рҹ“– Meaning\n\n`-sn` disables port scanning and performs **host discovery only** to determine which hosts are online.\n\nвң” Useful for:\n\n- Network mapping\n    \n- Finding active devices\n    \n\n### рҹ’» Command Example\n\nnmap -sn 192.168.1.0/24\n\n### рҹ”Һ What Happens\n\nNmap sends discovery probes such as:\n\n- ICMP echo request\n    \n- TCP SYN to port 443\n    \n- TCP ACK to port 80\n    \n\nThen it reports **alive hosts only**.\n\n---\n\n## рҹ”№ `-Pn` вҖ” Skip Host Discovery\n\n### рҹ“– Meaning\n\n`-Pn` tells Nmap to **skip host discovery** and treat all hosts as **online**.\n\nвң” Useful when:\n\n- Firewalls block ping\n    \n- Host discovery fails\n    \n\n### рҹ’» Command Example\n\nnmap -Pn 192.168.1.10\n\n### рҹ”Һ What Happens\n\nNmap:\n\n1. Assumes host is alive\n    \n2. Directly starts **port scanning**\n    \n\n---\n\n## рҹ”№ `-PS` вҖ” TCP SYN Ping\n\n### рҹ“– Meaning\n\nSends a **TCP SYN packet** to specified ports to determine if a host is online.\n\nвң” Useful when ICMP is blocked.\n\n### рҹ’» Command Example\n\nnmap -PS80,443 192.168.1.0/24\n\n### рҹ”Һ What Happens\n\nIf the host replies with:\n\n- SYN/ACK вҶ’ Host is **alive**\n    \n- RST вҶ’ Host is **alive**\n    \n\n---\n\n## рҹ”№ `-PA` вҖ” TCP ACK Ping\n\n### рҹ“– Meaning\n\nSends **TCP ACK packets** to discover hosts through firewalls.\n\n### рҹ’» Command Example\n\nnmap -PA80 192.168.1.0/24\n\n### рҹ”Һ What Happens\n\nHost responds with:\n\n- RST вҶ’ Host is **alive**\n    \n\n---\n\n## рҹ”№ `-PU` вҖ” UDP Ping\n\n### рҹ“– Meaning\n\nSends **UDP packets** to specified ports to check if a host responds.\n\n### рҹ’» Command Example\n\nnmap -PU53 192.168.1.0/24\n\n### рҹ”Һ What Happens\n\nPossible responses:\n\n- ICMP Port Unreachable\n    \n- UDP response\n    \n\nBoth indicate the host is **alive**.\n\n---\n\n## рҹ”№ `-PY` вҖ” SCTP Ping\n\n### рҹ“– Meaning\n\nUses **SCTP INIT packets** for host discovery.\n\nSCTP is used in telecom networks.\n\n### рҹ’» Command Example\n\nnmap -PY80 192.168.1.0/24\n\n---\n\n# рҹҢҗ ICMP Discovery Probes\n\n---\n\n## рҹ”№ `-PE` вҖ” ICMP Echo Request\n\n### рҹ“– Meaning\n\nSends a standard **ping request**.\n\n### рҹ’» Command Example\n\nnmap -PE 192.168.1.0/24\n\nEquivalent to normal:\n\nping\n\n---\n\n## рҹ”№ `-PP` вҖ” ICMP Timestamp Request\n\n### рҹ“– Meaning\n\nRequests **system timestamp** from the host.\n\n### рҹ’» Command Example\n\nnmap -PP 192.168.1.0/24\n\n---\n\n## рҹ”№ `-PM` вҖ” ICMP Netmask Request\n\n### рҹ“– Meaning\n\nRequests the **network mask** of the target system.\n\n### рҹ’» Command Example\n\nnmap -PM 192.168.1.0/24\n\n---\n\n# рҹ”Ң `-PO` вҖ” IP Protocol Ping\n\n### рҹ“– Meaning\n\nSends **IP packets with different protocol numbers** to determine if a host is online.\n\n### рҹ’» Command Example\n\nnmap -PO1,2,4 192.168.1.0/24\n\n### рҹ”Һ Example Protocol Numbers\n\n|Number|Protocol|\n|---|---|\n|1|ICMP|\n|6|TCP|\n|17|UDP|\n\n---\n\n# рҹҢҚ DNS Resolution Options\n\n---\n\n## рҹ”№ `-n` вҖ” No DNS Resolution\n\n### рҹ“– Meaning\n\nPrevents Nmap from resolving hostnames.\n\nвң” Makes scanning **faster**.\n\n### рҹ’» Command Example\n\nnmap -n 192.168.1.0/24\n\n---\n\n## рҹ”№ `-R` вҖ” Always Resolve DNS\n\n### рҹ“– Meaning\n\nForces **reverse DNS resolution** for every target.\n\n### рҹ’» Command Example\n\nnmap -R 192.168.1.0/24\n\n---\n\n## рҹ”№ `--dns-servers`\n\n### рҹ“– Meaning\n\nSpecify **custom DNS servers**.\n\n### рҹ’» Command Example\n\nnmap --dns-servers 8.8.8.8,1.1.1.1 scanme.nmap.org\n\n---\n\n## рҹ”№ `--system-dns`\n\n### рҹ“– Meaning\n\nUse the **operating system DNS resolver** instead of Nmap's internal DNS system.\n\n### рҹ’» Command Example\n\nnmap --system-dns scanme.nmap.org\n\n---\n\n# рҹӣЈпёҸ `--traceroute` вҖ” Network Path Discovery\n\n### рҹ“– Meaning\n\nPerforms a **traceroute** to determine the path packets take to the target host.\n\n### рҹ’» Command Example\n\nnmap --traceroute scanme.nmap.org\n\n### рҹ”Һ Output Shows\n\n- Routers between you and the target\n    \n- Network hops\n    \n- Latency\n    \n\n---\n\n# вҡЎ Example Combined Command\n\nnmap -sn -PE -PS80,443 -PA80 --traceroute 192.168.1.0/24\n\n### вң” This Command Will\n\n- Perform host discovery\n    \n- Use ICMP echo\n    \n- Send TCP SYN to ports 80 and 443\n    \n- Send TCP ACK to port 80\n    \n- Show traceroute to each host\n    \n\n---\n\n# рҹ§  Quick Summary\n\n|Switch|Purpose|\n|---|---|\n|`-sL`|List targets only|\n|`-sn`|Ping scan (no ports)|\n|`-Pn`|Skip host discovery|\n|`-PS`|TCP SYN ping|\n|`-PA`|TCP ACK ping|\n|`-PU`|UDP ping|\n|`-PY`|SCTP ping|\n|`-PE`|ICMP echo ping|\n|`-PP`|ICMP timestamp|\n|`-PM`|ICMP netmask|\n|`-PO`|IP protocol ping|\n|`-n`|Disable DNS resolution|\n|`-R`|Always resolve DNS|\n|`--dns-servers`|Use custom DNS|\n|`--system-dns`|Use OS DNS|\n|`--traceroute`|Show network path|\n\n---\n\nвң… If you want, I can also make a **full 150+ Nmap switches cybersecurity cheatsheet (.md)** used in **penetration testing, bug bounty, and CEH**.\n\n\n\n# host discovery workflow=\n# рҹ“Ў Host Discovery Workflow\n\nExample **multi-step host discovery process**.\n\n### Step 1 вҖ” Basic Ping Scan\n\nnmap -v -n -sn 192.168.1.0/24 -oA my-network\n\nOptions:\n\n|Option|Meaning|\n|---|---|\n|`-v`|Verbose|\n|`-n`|Disable DNS resolution|\n|`-sn`|Ping scan only|\n|`-oA`|Output in all formats|\n\n---\n\n### Step 2 вҖ” TCP SYN Discovery\n\nnmap -v -n -sn -PS21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080 -iL DOWN_HOSTS_FILE_PATH -oA my-network2\n\n`-PS` вҶ’ Sends **TCP SYN packets** to specified ports.\n\n---\n\n### Step 3 вҖ” TCP ACK Discovery\n\nnmap -v -n -sn -PA21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080 -iL DOWN_HOSTS_FILE_PATH -oA my-network3\n\n`-PA` вҶ’ Sends **TCP ACK packets**.\n\n---\n\n### Step 4 вҖ” UDP Discovery\n\nnmap -v -n -sn -PU631,161,137,123,138,1434,445,135,67,53 -iL DOWN_HOSTS_FILE_PATH -oA LIVE_HOSTS_TRY_4\n\n`-PU` вҶ’ Sends **UDP probes**."}, {"name": "host discovery", "content": "# Nmap Host Discovery\n\nHost discovery is the first essential step in network reconnaissance with Nmap. It helps identify live targets before performing more intensive port scans, optimizing scan time and resources. Below is an expanded guide with common and advanced Nmap host discovery techniques, commands, and tips, formatted in Markdown.\n\n---\n### 1. List Scan вҖ“ List Targets Only\n\nLists targets without sending packets, useful for validation or inventory purposes.\n\n```bash\nnmap -v -sL 192.168.1.1/24\n```\n\n- No ping, no port scan, no packets to the target (except DNS lookup).\n- **Expands the target range**  \n    (e.g., 192.168.1.0/24 вҶ’ full list of 256 IPs)\n- **Performs DNS reverse lookups**  \n    If DNS is enabled, it will try:\n    - PTR lookup (reverse DNS)\n    - Resolve hostname if possible\n- **Does NOT send any host discovery or port scan packets.**  \n    No TCP SYN, no ICMP ping, no UDP вҖ” target is not touched.\n\n---\n### 2. Ping Scan вҖ“ Check Which Hosts Are Up (No Port Scan)\n\nUse this to detect live hosts without probing ports.\n- (**\"-sn\"** called **вҖңNo port scanвҖқ** or **вҖң-sPвҖқ** in old versions.)\n- Nmap **checks which hosts are up**, but **does not scan any ports**.\n\nNmap tries one or more of these host-discovery methods:\n\n#  . ICMP Echo (ping)\n# ICMP Timestamp request\n1. ARP request ( If scanning the same LAN, ARP is used automatically and is very reliable.)\n2. TCP probes:\n\tIf ICMP is blocked, it may use:\n TCP SYN to port 443 or 80\n\t- TCP ACK    \n\t- Others depending on OS and permissions\n\n```bash\nnmap -v -sn 192.168.1.1/24\n```\n\n```bash\nnmap -sn 192.168.1.1/24\n```\n\nFilter output to show only live hosts:\n\n```bash\nnmap -sn 192.168.1.1/24 | grep \"scan report\" | cut -f 5 -d \" \" > live_hosts.txt\n```\n```bash\nnmap -n -sn 192.168.1.1/24 | grep \"scan report\" | cut -f 5 -d \" \" > live_hosts.txt\n```\n\nSave output in multiple formats:\n\n```bash\nnmap -v -sn 192.168.1.1/24 -oA /tmp/mynetwork\n```\n\n```bash\ncat /tmp/mynetwork.gnmap | grep -i Up | cut -f 2 -d \" \" > up_hosts.txt\n```\n\n```bash\ncat /tmp/mynetwork.gnmap | grep -i down | cut -f 2 -d \" \" > down_hosts.txt\n```\n\n---\n### 3. Scan Multiple Subnets or Networks\n\nPerform ping scans on different CIDR ranges:\n\n```bash\nnmap -sn 8.8.8.8/24\n```\n```bash\nnmap -sn 27.7.251.0/24\n```\n```bash\nnmap -sn 43.255.154.0/24\n```\n\n---\n### 4. Skip DNS Resolution to Speed Up Scan\n\nAvoid looking up DNS names for faster scanning of large subnets:\n\n```bash\nnmap -sn -n 192.168.1.1/24\n```\n\n---\n### 5. Scan Targets from Input File\n\nPrepare a file (e.g., `ip.txt`) with a list of IP addresses or hostnames:\n\n```\n192.168.1.1\n192.168.1.10\n192.168.1.31\n```\n\nScan hosts from the file:\n\n```bash\nnmap -v -iL ip.txt\n```\n\n---\n### 6. Treat All Hosts as Online (Skip Host Discovery)\n\n- With `-Pn`, Nmap **Skip Host Discovery** and **assumes every target is up**, then directly starts port scanning.\n- Useful when firewall or IDS blocks ping probes:\n\n```bash\nnmap -v -Pn 43.255.154.9\n```\n```bash\nnmap -v -P0 192.168.1.1 # Deprecated synonym for -Pn\n```\n\n---\n### 7. Use Custom Ping Probes on Specific Ports\n\nSend TCP SYN probes (`-PS`) to specified ports:\n```bash\nnmap -v -PS80 armourinfosec.com\n```\n\n```bash\nnmap -v -PS21,22,23,25,80,110,443 43.255.154.9 -sn\n```\n\nSend TCP ACK probes (`-PA`):\n```bash\nnmap -v -PA80 armourinfosec.com\n```\n\nSend UDP probes (`-PU`):\n```bash\nnmap -v -PU53,67,68,69 -iL /tmp/iplist\n```\n\nSend SCTP INIT probes (`-PY`):\n```bash\nnmap -v -PY80 armourinfosec.com\n```\n\nSend ICMP Echo request probes (`-PE`), Timestamp request (`-PP`), or Netmask request (`-PM`):\n```bash\nnmap -v -PE 43.255.154.9\n```\n```bash\nnmap -v -PP 43.255.154.9\n```\n```bash\nnmap -v -PM 43.255.154.9\n```\n\n---\n### 8. Excluding Hosts and Ranges from Scan\n\nExclude IPs or subnets to avoid scanning certain hosts:\n\n```bash\nnmap -v 192.168.1.1/24 --exclude 192.168.1.1-25\n```\n\n```bash\nnmap -v 192.168.1.1/24 --excludefile excluded.txt\n```\n\n```bash\nnmap -v 192.168.1.1/24 --exclude 192.168.1.52-100,250\n```\n\n---\n### 9. Advanced Host Discovery Tips\n\nExtract Top Ports for TCP, UDP, and SCTP from Nmap services list to perform targeted ping scans:\n\n```bash\nawk '$2~/tcp$/' /usr/share/nmap/nmap-services | sort -r -k3 | head -n 20 | awk -F '/tcp' '{print $1}' | awk '{print $2}' | tr '\\n' ','\n```\n\n```bash\nawk '$2~/udp$/' /usr/share/nmap/nmap-services | sort -r -k3 | head -n 20 | awk -F '/udp' '{print $1}' | awk '{print $2}' | tr '\\n' ','\n```\n\n```bash\nawk '$2~/sctp$/' /usr/share/nmap/nmap-services | sort -r -k3 | head -n 100 | awk -F '/sctp' '{print $1}' | awk '{print $2}' | tr '\\n' ','\n```\n\nCombine aggressive ping scans to maximize host discovery under difficult conditions:\n```bash\nnmap -v -sn -PS30,23,443,21,22,25,389,110,445,139,143,53,135,3306,8080 82.196.42.195\n```\n\n---\n## Summary\nNmap host discovery offers a rich suite of options and probes to adapt to any network environment or security context. Whether using simple ICMP pings or sophisticated TCP/UDP/SCTP probes, excluding certain hosts, or working with input files, these techniques improve scan accuracy and efficiency.\n\n---\n---"}, {"name": "knocking protocols", "content": "# Knocking protocols\n\n\"Knocking protocols\" generally refer to **Port Knocking** or **Single Packet Authorization (SPA)**. These are network security mechanisms used to **hide open ports** on a server until a specific sequence of packets (or a single packet in the case of SPA) is received. They act as a **stealth firewall control mechanism** to reduce the attack surface of a system.\n\n---\n\n## 1. What is Port Knocking\n\n- **Definitio
