n:**  \n    Port knocking is a method of externally opening ports on a firewall by generating a connection attempt on a sequence of closed ports.\n    \n- **Purpose:**  \n    It allows administrators to **hide sensitive services** (like SSH or RDP) behind closed ports until an authenticated user performs the correct \"knock sequence.\"\n    \n- **Mechanism:**  \n    The server runs a **knock daemon** that listens passively to connection attempts (or packets) on predefined closed ports. When it detects the correct sequence, it dynamically modifies the firewall to open the hidden port for the requesting IP address.    \n\n---\n## 2. What is Single Packet Authorization (SPA)\n\n- **Definition:**  \n    SPA is a more modern, secure replacement for port knocking that uses a **single encrypted packet** to authenticate and authorize access.\n    \n- **Purpose:**  \n    SPA eliminates the risk of replay attacks and packet sniffing by using encryption and cryptographic authentication.\n    \n- **Mechanism:**  \n    The client sends a specially crafted, encrypted packet to the server. The server verifies it, and if valid, it temporarily opens the requested port.\n\n---\n## 3. Why Knocking Protocols Exist\n\n- **Reduce attack surface:**  \n    They keep ports closed by default, making it harder for attackers to detect running services.\n    \n- **Prevent brute-force attacks:**  \n    By hiding ports (e.g., SSH port 22), attackers cannot attempt password guessing unless they first authenticate via knocking.\n    \n- **Provide \"Security by Concealment\":**  \n    Even if it is not a complete replacement for authentication, it works as an additional protective layer.\n\n---\n## 4. When They Are Used\n\n- On **internet-facing servers** running sensitive services (e.g., SSH, RDP).    \n- In **environments without VPNs**, where administrators still want controlled access.\n- For **temporary or emergency access** to a system.\n- In **hardened systems** where reducing port exposure is critical.\n\n---\n\n## 5. How Knocking Protocols Work Internally\n\n### 5.1 Port Knocking Process\n\n1. **Client sends knock sequence:**\n    - Example: Connect to port `1000`, then `2000`, then `3000`.\n    - These ports are closed and will not respond.\n        \n2. **Daemon monitors packets:**    \n    - A knock daemon (e.g., `knockd`) watches the firewall logs for matching sequences.\n        \n3. **Firewall updates rules:**\n    - If the sequence is correct, it adds a temporary firewall rule to open the hidden service port (e.g., port 22 for SSH) for the client's IP.\n        \n4. **Client connects to service:**\n    - After the firewall opens the port, the client connects normally.\n        \n5. **Port closes automatically:**\n    - After a timeout, the firewall removes the rule and closes the port.\n\n---\n### 5.2 SPA Process\n\n1. **Client crafts encrypted packet:**    \n    - The packet contains authentication data, a timestamp, and the requested action.\n\n2. **Server validates packet:**    \n    - The SPA daemon verifies it using a shared key or public-key cryptography.\n    \n3. **Firewall opens port:**\n    - If valid, the firewall opens the port for the client's IP.\n        \n4. **Access is temporary:**\n    - After a set time, the port closes again.\n\n---\n\n## 6. Advantages and Disadvantages\n\n|Feature|Port Knocking|Single Packet Authorization|\n|---|---|---|\n|Security Level|Moderate (can be sniffed/replayed)|High (encrypted)|\n|Complexity|Low|Moderate|\n|Speed|Slower (multiple packets)|Fast (single packet)|\n|Replay Protection|No|Yes|\n|Ease of Deployment|Simple|Slightly more complex|\n\n---\n\n## 7. Common Tools\n\n- **Port Knocking:**\n    - `knockd` (Linux)\n    - `fwknop` (supports SPA as well)\n        \n- **SPA Tools:**\n    - `fwknop` (Firewall Knock Operator)\n    - Custom iptables/NFTables scripts\n\n---\n## 8. Real-World Example (Port Knocking with knockd)\n\n```bash\n# knockd.conf example\n[options]\n logfile = /var/log/knockd.log\n\n[openSSH]\n sequence    = 1000,2000,3000\n seq_timeout = 15\n command     = /sbin/iptables -A INPUT -s %IP% -p tcp --dport 22 -j ACCEPT\n tcpflags    = syn\n\n[closeSSH]\n sequence    = 3000,2000,1000\n seq_timeout = 15\n command     = /sbin/iptables -D INPUT -s %IP% -p tcp --dport 22 -j ACCEPT\n tcpflags    = syn\n```\n\n---\n---\n### Bypassing and Detecting Knocking Protocols (OSCP-Level)\n\nPort knocking and SPA are **obfuscation-based security controls**. They can be bypassed or detected if an attacker has proper reconnaissance capabilities or is positioned in the right part of the network.\n\n---\n## 1. Reconnaissance Against Knocking Protocols\n\n### 1.1 Detecting Knock Daemons\n\n- **Behavioral detection:**  \n    вҖў Normally, closed ports should respond with **ICMP Port Unreachable** or no response at all.  \n    вҖў If a knock daemon is running, you may see **strange packet behavior** such as immediate temporary access after a specific sequence.\n    \n- **Banner fingerprinting:**  \n    вҖў Tools like `nmap` can be run repeatedly. If a port suddenly becomes open after a specific sequence of connections, it indicates port knocking.\n    \n\n---\n### 1.2 Passive Sniffing\n\n **Man-in-the-middle (MITM):**  \n \n If an attacker is on the same LAN or has access to a compromised host in the path, they can use `tcpdump` or `Wireshark` to sniff knock packets.  \n\nExample:\n\n```bash\ntcpdump -i eth0 port 1000 or port 2000 or port 3000\n```\n\nOnce the sequence is captured, it can be **replayed** to unlock the port.    \n\n---\n### 1.3 Replay Attacks (Port Knocking)\n\n**Why possible:**  \n Port knocking uses a static sequence (e.g., 1000 вҶ’ 2000 вҶ’ 3000).  \n If an attacker sees this once, they can reuse it because it lacks cryptographic authentication.\n\n**How it's done:**\n```bash\nknock 192.168.1.10 1000 2000 3000\n```\n\nThe firewall opens the port for the attackerвҖҷs IP as if they were the legitimate user.    \n\n---\n## 2. Bypassing Port Knocking\n\n### 2.1 Brute Force Enumeration\n\nIf the knock sequence is short (3вҖ“4 ports) and the timeout is long, attackers can attempt brute forcing:\n \n```bash\nfor p1 in {1000..1100}; do\n  for p2 in {2000..2100}; do\n\tfor p3 in {3000..3100}; do\n\t  knock target $p1 $p2 $p3\n\t  nmap -p22 target\n\tdone\n  done\ndone\n```\n\nThis is noisy but sometimes works against poorly configured systems.    \n\n---\n### 2.2 Detecting Firewall Behavior\n\nUse **Nmap timing options**:\n\n```bash\nnmap -p 1-65535 --max-retries 0 target\n```\n\nRepeated scans can show which ports become temporarily open, revealing the knock effect.\n\n---\n## 3. Bypassing SPA\n\nSPA is harder to bypass because it uses **encryption and authentication**, but there are still potential weaknesses:\n\n---\n### 3.1 Credential Theft\n\n- If an attacker compromises the client machine and steals SPA keys (e.g., from `fwknop.conf`), they can craft their own SPA packets.\n---\n### 3.2 Replay with Weak Implementation\n\n- Poorly implemented SPA that lacks **nonce (random token)** or **timestamp verification** can be replayed.\n- Example: If the packet is always the same, an attacker can capture and resend it.    \n\n---\n### 3.3 MITM Injection\n\n- If the attacker controls the network (e.g., a malicious router), they can inject or modify packets if the SPA is not integrity-protected.    \n\n---\n## 4. Advanced Attack Vectors\n\n- **Timing Analysis:**  \n    вҖў If a service suddenly opens after a series of packets, attackers may infer a knock sequence.\n    \n- **Side-Channel Leaks:**  \n    вҖў Sometimes firewall logs or misconfigured daemons leak sequence information via error messages.\n    \n- **Combination with Exploits:**  \n    вҖў If an attacker finds a way to modify firewall rules (via privilege escalation or command injection), knocking becomes irrelevant.    \n\n---\n## 5. Countermeasures Against Bypass\n\n|Threat|Countermeasure|\n|---|---|\n|Replay attacks|Use SPA with encryption and timestamp validation|\n|Sniffing|Use encrypted SPA (fwknop)|\n|Brute-force knocking|Increase sequence length and enforce short timeout|\n|MITM manipulation|Use HMAC or public-key SPA|\n|Log monitoring|Monitor daemon logs and detect unauthorized knocking attempts|\n\n---\n---"}, {"name": "nmap basic commands", "content": "## Nmap Installation Commands\n\n### Commands to install Nmap on various platforms:\n\n**For Debian/Ubuntu-based Linux (APT)**\n\n```\napt install nmap\n```\n\n**For Red Hat/CentOS/Fedora-based Linux (YUM)**\n\n```\nyum install nmap\n```\n\n**For UNIX Platforms (Solaris, FreeBSD, NetBSD, OpenBSD, etc.) вҖ” From Source**\n\n- First, download the latest `nmap-*.tar.bz2` source package from [https://nmap.org/download#source](https://nmap.org/download#source).\n- Then, run the following commands in order to extract, configure, compile, and install Nmap.\n\n```\nbzip2 -dc nmap-*.tar.bz2 | tar xvf -\n```\n\n```\ncd nmap-*\n```\n\n```\n./configure\n```\n\n```\nmake\n```\n\n```\nmake install\n```\n\n---\n**Note:**\n-  Use `sudo` for commands that require administrative privileges.\n- Package managers like `apt` and `yum` will handle dependencies automatically.\n- Building from source is recommended for platforms where pre-compiled binaries are not available or if you need the latest version.\n\n---\n## Common Nmap Commands and Usage Examples\n\n### Checking Nmap Version\n\nTo check the installed Nmap version:\n\n```\nnmap -V\n```\nor\n```\nnmap --version\n```\n### Help and Usage Information\n\nShow Help menu:\n```\nnmap --help\n```\n\nShow shorter help:\n```\nnmap -h\n```\n### Basic Scanning Examples\n\nScan a specific IP address:\n```\nnmap 192.168.1.35\n```\n\nScan by hostname or domain:\n```\nnmap target.com\n```\n\nScan with verbose output for detailed information:\n```\nnmap -v 192.168.1.35\n```\n\nScan the official Nmap test server (authorized for scanning):\n```\nnmap -v scanme.nmap.org\n```\n(Scanme.nmap.org is provided by the Nmap project for testing Nmap scans and learning purposes.)\n\n---\n---"}, {"name": "nmap workflow", "content": "\\# Nmap Scanning Workflow\n\nPerforming an effective Nmap scan involves a structured sequence of phases, moving from broad discovery to deep enumeration. Following this workflow ensures that scans are efficient, accurate, and yield the most valuable information.\n\n## Phase 1: Host Discovery (Ping Sweep)\n\nBefore launching a detailed port scan, the first crucial step is to determine which target hosts are online. This prevents wasting time and resources scanning IP addresses that are not active.\n\n**Nmap's Intelligent Discovery Process:**\n\nNmap is smart about how it discovers hosts based on the network location of the target:\n-   **Local Network (LAN):** For targets on the same subnet, Nmap defaults to sending **ARP requests**. This is extremely fast and reliable, as hosts on a LAN cannot hide from ARP.\n-   **Remote Network (WAN):** For remote targets, Nmap uses a combination of probes to bypass common firewall rules:\n    -   ICMP Echo Request (standard ping)\n    -   TCP SYN packet to port 443\n    -   TCP ACK packet to port 80\n    -   ICMP Timestamp Request\n\nA response to any of these probes confirms the host is online.\n\n---\n**Key Flags & Concepts:**\n-   If a target is configured to block these discovery probes (e.g., a firewall blocking ICMP), a default Nmap scan will report it as \"down\" and stop.\n-   `nmap -Pn target.com`: This flag is essential for these situations. It tells Nmap to **skip the host discovery phase** and treat all specified targets as online. This forces Nmap to proceed directly to port scanning, which is necessary when you know a host is live but it isn't responding to pings.\n---\n## Phase 2: Reverse DNS Resolution\n\nBy default, Nmap performs a **reverse DNS (rDNS) lookup** for each host it discovers. This involves querying a DNS server for a **PTR (Pointer) record**, which maps the target's IP address back to a hostname.\n\nThis step is valuable for reconnaissance, as a hostname can reveal its function (e.g., `mail.company.com` or `dev-server.lan`).\n\n---\n**Key Flags & Concepts:**\n-   If you scan a domain name, Nmap first resolves the domain to an IP, then performs this reverse lookup on the IP to see if it resolves back to a hostname.\n-   `nmap -n target.com`: If you want to speed up your scan and are not interested in hostnames, this flag tells Nmap **not to perform any DNS resolution**.\n---\n## Phase 3: Port Scanning\n\nThis is the core of Nmap's functionality. The goal is to identify which ports are open, closed, or filtered on the target system to discover potentially running services. By default, Nmap performs a **TCP SYN Scan**.\n\n-   **Default Behavior:** Without any port specification (like `-p`), Nmap scans the **1,000 most common TCP ports**. This list is based on extensive research of internet traffic and is far more effective than just scanning ports 1-1000.\n-   **Port States:**\n    -   **Open:** An application is actively accepting connections on this port.\n    -   **Closed:** The port is accessible, but no application is listening on it.\n    -   **Filtered:** A firewall or other network device is blocking access to the port, so Nmap cannot determine if it is open or closed.\n\n---\n## Phase 4: Deep Enumeration\n\nOnce open ports are identified, the next phase is to probe them deeply to understand exactly what is running.\n\n#### **Service and Version Detection (`-sV`)**\nThis is one of Nmap's most powerful features. It sends a series of probes to each open port to determine the exact service (e.g., Apache, Microsoft IIS, OpenSSH) and its version number. This information is critical for vulnerability assessment.\n```bash\nnmap -sV target.com\n```\n\n#### **Operating System Detection (`-O`)**\nNmap can determine the operating system of the target by sending a series of specifically crafted packets and analyzing the subtle differences in the response from the target's TCP/IP network stack. This provides key insights into the target's architecture and potential vulnerabilities.\n```bash\nnmap -O target.com\n```\n\n---\n## Phase 5: Nmap Scripting Engine (NSE)\n\nAs a final, advanced step, Nmap can use its powerful scripting engine to run scripts against the discovered services. These scripts can automate tasks like advanced vulnerability detection, malware discovery, and deeper enumeration.\n\n```bash\n# Run the default set of safe scripts\nnmap -sC target.com\n\n# Run all scripts in the 'vuln' category\nnmap --script=vuln target.com\n```\n\n---\n## Phase 6: Saving the Output\n\nIt is crucial to save scan results for analysis, reporting, and future reference. Nmap supports several highly useful output formats.\n\n**Common Output Commands:**\n\n-   **Normal Output (`-oN`):** Human-readable text format, perfect for quick review.\n```bash\nnmap -oN output.txt target.com\n```\n-   **XML Output (`-oX`):** A structured format that is ideal for importing into other security tools (like Metasploit) or for parsing with custom scripts.\n```bash\nnmap -oX output.xml target.com\n```\n-   **Grepable Output (`-oG`):** A simplified format designed for easy parsing with command-line tools like `grep`, `awk`, and `cut`.\n```bash\nnmap -oG output.gnmap target.com\n```\n-   **All Formats (`-oA`):** The recommended best practice. This saves the output in all three formats simultaneously.\n```bash\nnmap -oA output_prefix target.com\n```\n\n---\n---"}, {"name": "port specification", "content": "# рҹҢҗ Nmap Port Specification and Scan Order\n\n> A quick guide to **understanding Nmap port data**, extracting **top ports**, and using them efficiently in **network reconnaissance**.\n\n---\n\n# рҹ“ҡ Understanding Port Specification in Nmap\n\nNmap reads port and service data from the file:\n\n/usr/share/nmap/nmap-services\n\nEach line in this file contains:\n\n|Field|Description|\n|---|---|\n|Service Name|Example: `http`, `ftp`, `ssh`|\n|Port/Protocol|Example: `80/tcp`, `53/udp`|\n|Open Frequency|Decimal value representing how often the port is found open|\n|Comments|Optional description|\n\nрҹ’Ў **Important:**  \nThe **open-frequency value** helps Nmap determine which ports should be scanned first.\n\n---\n\n# рҹ”Һ Viewing Most Common Ports\n\n### Top TCP ports by frequency\n\nsort -r -k3 /usr/share/nmap/nmap-services | grep tcp | head -n 10\n\nThis command:\n\n1. Sorts ports by frequency\n    \n2. Filters TCP ports\n    \n3. Shows top 10 common ports\n    \n\n---\n\n# вҡҷпёҸ Extract Top TCP Ports for Scanning\n\nGenerate a **comma-separated list of popular ports**.\n\nawk '$2~/tcp$/' /usr/share/nmap/nmap-services | sort -r -k3 | head -n 100 | awk -F '/tcp' '{print $1}' | awk '{print $2}' | tr '\\n' ','\n\nExample output:\n\n80,443,22,21,25,53,110,139,...\n\nYou can directly use this in Nmap:\n\nnmap -p 80,443,22 target\n\n---\n\n# рҹ“Ў Host Discovery Workflow\n\nExample **multi-step host discovery process**.\n\n### Step 1 вҖ” Basic Ping Scan\n\nnmap -v -n -sn 192.168.1.0/24 -oA my-network\n\nOptions:\n\n|Option|Meaning|\n|---|---|\n|`-v`|Verbose|\n|`-n`|Disable DNS resolution|\n|`-sn`|Ping scan only|\n|`-oA`|Output in all formats|\n\n---\n\n### Step 2 вҖ” TCP SYN Discovery\n\nnmap -v -n -sn -PS21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080 -iL DOWN_HOSTS_FILE_PATH -oA my-network2\n\n`-PS` вҶ’ Sends **TCP SYN packets** to specified ports.\n\n---\n\n### Step 3 вҖ” TCP ACK Discovery\n\nnmap -v -n -sn -PA21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080 -iL DOWN_HOSTS_FILE_PATH -oA my-network3\n\n`-PA` вҶ’ Sends **TCP ACK packets**.\n\n---\n\n### Step 4 вҖ” UDP Discovery\n\nnmap -v -n -sn -PU631,161,137,123,138,1434,445,135,67,53 -iL DOWN_HOSTS_FILE_PATH -oA LIVE_HOSTS_TRY_4\n\n`-PU` вҶ’ Sends **UDP probes**.\n\n---\n\n# рҹҺҜ Specifying Ports When Scanning\n\n## Single or Multiple Ports\n\nnmap -p 21,22,25,80,443 192.168.1.35\n\n---\n\n## Port Ranges\n\nnmap -p 1-200 192.168.1.35\n\nMultiple ranges:\n\nnmap -p 1-200,443,5000-5050 192.168.1.35\n\n---\n\n## Scan All Ports\n\nnmap -p 0-65535 192.168.1.235\n\nor\n\nnmap -p- 192.168.1.31\n\n---\n\n## Separate TCP and UDP Ports\n\nnmap -p T:80,443,U:53,161 192.168.1.51\n\n---\n\n## Scan Top Most Common Ports\n\nnmap --top-ports 20 192.168.1.31\n\n---\n\n# рҹҡ« Excluding Ports\n\nSkip specific ports during scanning.\n\nnmap -p- --exclude-ports 9100 192.168.1.105\n\nExample excluding multiple ports:\n\nnmap -p- --exclude-ports 80,83,85 192.168.1.51\n\n\n\n\n# рҹ”Қ Nmap вҖ” Port Specification & Scan Order\n\n> _Precision targeting for network reconnaissance_\n\n---\n\n## рҹ“Ў Scan Both TCP & UDP\n\n```bash\nnmap -sU -sT -p T:80,443,U:53,161   192.168.1.235\nnmap -sZ -p S:80,443                 192.168.1.235\n```\n\n---\n\n## рҹҸҶ Top N Most Common Ports\n\n> Scan only the most frequently exposed ports вҖ” fast and effective.\n\n|Command|Description|\n|---|---|\n|`nmap --top-ports 20 192.168.1.31`|Top 20 ports (any protocol)|\n|`nmap -sT --top-ports 200 192.168.1.235`|Top 200 TCP ports|\n|`nmap -sU --top-ports 20 192.168.1.235`|Top 20 UDP ports|\n\n---\n\n## рҹҡ« Exclude Ports\n\n> Avoid scanning specific ports вҖ” useful when targeting sensitive or noisy services.\n\n```bash\n# Exclude a single noisy port\nnmap -p- --exclude-ports 9100  192.168.1.105\n\n# Exclude multiple ports from a range\nnmap -p 79-99 --exclude-ports 80,83,85  192.168.1.51\n```\n\n---\n\n## рҹҸ·пёҸ Port Name Patterns\n\n> Specify ports by **service name** or with **wildcards** вҖ” no need to remember numbers.\n\n```bash\nnmap -p http,ftp,smb   192.168.1.1     # Named services\nnmap -p '*http'        192.168.1.31    # Wildcard prefix\nnmap -p 'ftp*'         192.168.1.31    # Wildcard suffix\nnmap -p 'ftp*'         192.168.1.235\nnmap -p 'proxy*'       192.168.1.235\nnmap -p '*proxy'       192.168.1.235\n```\n\n---\n\n## рҹ“Ҡ Filtering Ports by Open Frequency\n\n> The `--port-ratio` option filters ports based on their **open-frequency**.\n\n```bash\n# Scan only ports with open-frequency вүҘ 6%\nnmap --port-ratio 0.06   192.168.1.207\n```\n\n> рҹ’Ў **Tip:** Set ratio to `0` or omit to disable filtering and scan **all available ports**.\n\n---\n\n## рҹ–ЁпёҸ Handling Special Ports (e.g., Printers)\n\n> вҡ пёҸ Port **9100** (printer services) is known to \"print\" any payload, causing noise in version detection.\n\n- Nmap **excludes** such ports by default during version detection\n- Override with `--allports` to force-include them\n\n```bash\nnmap -sV --allports   192.168.1.105\n```\n\n---\n\n## рҹ”Җ Combining TCP and UDP Scans on Specific Ports\n\n> Scan both TCP and UDP common service ports simultaneously:\n\n```bash\nnmap -v -sU -sT -p T:80,23,443,21,22,25,U:53,161,137,123   192.168.1.51\n```\n\n---\n\n## рҹ“Ӣ Top Ports Reference Lists\n\n### рҹ”ө Top 20 TCP Ports\n\n```\n80, 443, 23, 21, 22, 25, 3389, 110, 445, 139, ...\n```\n\n### рҹҹ  Top 20 UDP Ports\n\n```\n53, 161, 137, 123, 138, 1434, 445, 135, 67, 139, ...\n```\n\n---\n\n## рҹ—ӮпёҸ Quick Reference Summary\n\n|Feature|Syntax|Example|\n|---|---|---|\n|Range|`-p 1-1024`|`nmap -p 1-1024 host`|\n|Specific|`-p 22,80,443`|`nmap -p 22,80 host`|\n|All ports|`-p-`|`nmap -p- host`|\n|By name|`-p http,ftp`|`nmap -p http host`|\n|Wildcard|`-p 'ftp*'`|`nmap -p 'ftp*' host`|\n|Top N|`--top-ports N`|`nmap --top-ports 100 host`|\n|Exclude|`--exclude-ports`|`nmap -p- --exclude-ports 9100 host`|\n|Ratio filter|`--port-ratio 0.x`|`nmap --port-ratio 0.1 host`|\n\n---\n\n_рҹ“Ғ Part of: `Network-Reconnaissance-Scanning / Nmap / Port-Specification-and-Scan-Order`_\n---\n\n# рҹ’Ў Pro Tips\n\nвң” Use **top ports** when speed matters  \nвң” Use **full scan (`-p-`)** when doing deep recon  \nвң” Combine **TCP + UDP scans** for better coverage  \nвң” Always run **host discovery before full scans**\n\n---\n\n# рҹ“Ғ Recommended Recon Workflow\n\n1пёҸвғЈ Host Discovery  \n   nmap -sn network  \n  \n2пёҸвғЈ Identify live hosts  \n  \n3пёҸвғЈ Fast scan (top ports)  \n   nmap --top-ports 100  \n  \n4пёҸвғЈ Deep scan  \n   nmap -p-  \n  \n5пёҸвғЈ Service detection  \n   nmap -sV"}, {"name": "target specification", "content": "# Target Specification in Nmap\n\nNmap provides versatile options for specifying target hosts or networks to scan, allowing you to define single hosts, multiple hosts, ranges, subnets, and use input files to automate scans. Below is an organized overview with examples showing how to specify targets effectively.\n\n## Single and Multiple Hosts\n\nScan one or multiple hosts/domains by listing them separated by spaces:\n\n```shell\nnmap armourinfosec.com thehackersworld.com\n```\n\n```shell\nnmap 192.168.1.35 192.168.1.1\n```\n\n```shell\nnmap -v 192.168.1.31 192.168.1.1 192.168.1.247\n```\n\n## Using IP Ranges and Subnets\n\nScan all hosts in a subnet by using CIDR notation:\n\n```shell\nnmap 192.168.1.0/24\n```\n\n```shell\nnmap 192.168.56.1/24\n```\n\nScan IP ranges with hyphen-separated numbers:\n```shell\nnmap 192.168.1.1,12,13,14,235\n```\n```shell\nnmap 192.168.1.1-254\n```\n```shell\nnmap 192.168.1.1-51,250-254\n```\n```shell\nnmap -v 192.168.1.1-51,250-254\n```\n```shell\nnmap 192.168.1.1-10,50-60,100,200,240-254\n```\n```shell\nnmap -v 192.168.1.2.1-100\n```\n```shell\nnmap 192.168.1-3.1/24\n```\n```shell\nnmap 192.168.1,2.1/24\n```\nScan multiple specific IPs separated by commas:\n```shell\nnmap 192.168.1.1,5,27,100,207\n```\n```shell\nnmap 192.168.1.1,10,50,60,100,200,244,231,31,61\n```\nScan a restricted range within subnet:\n```shell\nnmap 192.168.1.200-254\n```\n\n## Using Input File for Target List\n\nCreate a text file (e.g., ip.txt) containing target IPs or hostnames:\n```shell\nvim ip.txt\n```\n\nContents of `ip.txt`\n```\n192.168.1.1\n192.168.1.10\n192.168.1.31\n192.168.1.61\n192.168.1.100\n192.168.1.101\n192.168.1.102\n192.168.1.103\n192.168.1.104\n```\n\nScan the list of targets using the -iL option:\n```shell\nnmap -v -iL ip.txt\n```\n\n## Random Hosts Scanning\n\nScan a specified number of random IP addresses on the Internet:\nScans 10 random hosts\n\n```shell\nnmap -v -iR 10\n```\n\n## Excluding Hosts from Scans\n\nExclude specific IPs or ranges from a subnet scan using `--exclude`:\n\n```shell\nnmap -v 192.168.1.1/24 --exclude 192.168.1.1-10\n```\n\n```shell\nnmap -v 192.168.1.1/24 --exclude 192.168.1.1-25\n```\n\n```shell\nnmap -v 192.168.1.1/24 --excludefile ip.txt\n```\n\n```shell\nnmap -v 192.168.1.1/24 --exclude 192.168.1.52-100,250\n```\n\n## Utility for Generating IP Lists\n\nInstall `prips` to generate IP ranges easily:\n\n```shell\napt install prips\n```\n\nUse `prips` to list all IPs in a subnet or range:\n\n```shell\nprips 192.168.1.0/24\n```\n\n```shell\nprips 192.168.1.0/28\n```\n\n```shell\nprips 192.168.1.0/26 | grep 192.168.1.231\n```\n\n## Summary\n\nNmap's target specification capabilities offer a wide range of flexible options from scanning individual IPs, multiple hosts, entire subnets, to using input files and excluding hosts dynamically. This flexibility allows for efficient and precise scanning tailored to varying network sizes and conditions.\n\nUse these target specifications in your scan commands to define exactly which hosts or networks you want to analyze.\n\n---\n---"}, {"name": "tcp three way handshake", "content": "# TCP Three-Way Handshake Process Explained\n\nThe **TCP three-way handshake** is the fundamental mechanism used to establish a reliable TCP connection between a client and a server. It ensures both sides are synchronized and ready to communicate.\n\n![[Pasted image 20251007155318.png]]\n\n## Step 1: SYN (Synchronize) Packet\n\n- The client initiates the connection by sending a TCP packet with the **SYN flag set**.\n- This packet contains an **Initial Sequence Number (ISN)** chosen by the client, which will be used to track the order of data it sends.\n- Purpose: Request to open a connection.\n\n## Step 2: SYN-ACK (Synchronize-Acknowledge) Packet\n\n- The server responds to the client's SYN packet with a TCP packet that has both **SYN and ACK flags set**.\n- The **SYN flag** means the server agrees to establish a connection.\n- The **ACK acknowledges the client's ISN** by setting the acknowledgment number to `client's ISN + 1`.\n- The server also includes its own ISN for the connection.\n\n## Step 3: ACK (Acknowledge) Packet\n\n- The client responds back with a TCP packet with the **ACK flag set**.\n- The acknowledgment number is set to **server's ISN + 1**, acknowledging the server's SYN-ACK.\n- After sending this packet, the connection is established, and both sides can begin data transmission.\n\n## Why Is the Three-Way Handshake Important?\n\n- **Reliability:** Both client and server confirm they are ready to communicate, synchronize their sequence numbers, and establish connection parameters.\n- **Connection Establishment:** Without this handshake, TCP wouldn't reliably ensure both parties are prepared, risking lost or misordered data.\n- **Duplicate Data Prevention:** Sequence and acknowledgment numbers help manage data order, ensuring duplicates are detected and avoided.\n\n## Summary Table\n\n| Step | Packet Type | Flags Set | Purpose |\n|------|-------------|-----------|---------|\n| 1 | SYN | SYN | Client requests connection; sends ISN |\n| 2 | SYN-ACK | SYN + ACK | Server acknowledges client, sends its own ISN |\n| 3 | ACK | ACK | Client acknowledges server's SYN-ACK |\n\nThis handshake underpins TCP's ability to provide a reliable, ordered, connection-oriented communication channel, making it fundamental to network communication and also to many Nmap scanning techniques that analyze or mimic these packet exchanges.\n\n---\n----\n\n# in tcp https use different part after handshape called tls handshake -\n# TLS 1.2 Handshake Process\n\nThe TLS (Transport Layer Security) handshake is a crucial process that establishes a secure, encrypted connection between a client and a server. This handshake involves several steps where both parties agree on protocols, authenticate each other, and generate session keys for encryption. Below is a detailed explanation of the TLS handshake process:\n\n## TLS Handshake Process Steps\n\n1. **Client Hello**\n   - The client sends a \"Client Hello\" message to the server.\n   - This message contains the TLS version supported by the client, a list of supported cipher suites (cryptographic algorithms), and a random value called the **Client Random**.\n\n2. **Server Hello**\n   - The server responds with a \"Server Hello\" message.\n   - This message includes the TLS version the server selected (from the client's list), the cipher suite chosen, and a random value called the **Server Random**.\n   - The server also sends its **digital certificate**, which contains its public key and identity information to authenticate itself.\n\n3. **Server Authentication and Certificate Verification**\n   - The client verifies the server's certificate against trusted Certificate Authorities (CAs) to ensure the server is authentic.\n   - If the server requires client authentication, it also requests the client's certificate.\n\n4. **Client Key Exchange (Pre-Master Secret)**\n   - The client generates a **pre-master secret**, a random number used to create the master secret.\n   - The client encrypts this pre-master secret with the server's public key (from the certificate) and sends it to the server.\n\n5. **Server Decrypts Pre-Master Secret**\n   - The server uses its private key to decrypt the pre-master secret.\n   - Both client and server now have the pre-master secret.\n\n6. **Session Keys Generation**\n   - Using the **Client Random**, **Server Random**, and **pre-master secret**, both parties independently compute the same **master secret**.\n   - From the master secret, symmetric **session keys** are derived for encrypting and decrypting the data.\n\n7. **Change Cipher Spec**\n   - The client sends a \"Change Cipher Spec\" message, indicating that future messages will be encrypted using the negotiated session key.\n\t   - The client then sends a \"Finished\" message encrypted with the session key, proving the handshake's integrity\n\n8. **Server Change Cipher Spec and Finished**\n   - The server sends its own \"Change Cipher Spec\" message and an encrypted \"Finished\" message.\n   - Once the client decrypts and verifies this, the handshake is complete.\n\n9. **Secure Encrypted Communication Begins**\n   - Both parties now exchange data encrypted with the symmetric session keys for confidentiality and integrity.\n\n## Summary Table of TLS Handshake Steps\n\n| Step | Description |\n|------|-------------|\n| 1. Client Hello | Client sends supported TLS version, cipher suites, and Client Random |\n| 2. Server Hello | Server responds with selection and Server Random, sends certificate |\n| 3. Certificate Validation | Client authenticates server's certificate |\n| 4. Client Key Exchange | Client sends encrypted pre-master secret |\n| 5. Server Decrypts Secret | Server decrypts pre-master secret |\n| 6. Session Key Creation | Both create master secret and session keys |\n| 7. Client Change Cipher Spec & Finished | Client signals encryption readiness, sends finished message |\n| 8. Server Change Cipher Spec & Finished | Server signals encryption readiness, sends finished message |\n| 9. Encrypted Communication | Secure data exchange begins |\n\n## Notes\n\n- TLS 1.3 simplifies this process by reducing round trips and eliminating some steps, improving speed and security.\n- The TLS handshake ensures confidentiality, integrity, and authentication between client and server during communication.\n\nThis handshake process is fundamental in securing HTTPS connections, email servers, VPNs, and other systems requiring secure communication over networks.\n\n---\n---\n# TLS 1.3 Handshake Process\n\nThe TLS 1.3 handshake is a significantly improved version of the TLS protocol that establishes a secure, encrypted connection between a client and a server. This handshake is faster, more secure, and simpler than previous versions, requiring only 1 round-trip time (1-RTT) for a full handshake. The protocol removes legacy features and mandates perfect forward secrecy. Below is a detailed explanation of the TLS 1.3 handshake process:\n\n## TLS 1.3 Handshake Process Steps\n\n1. **Client Hello**\n   - The client initiates the handshake by sending a \"Client Hello\" message to the server.\n   - **TLS Version**: The client indicates it supports TLS 1.3 (though for backward compatibility, this field shows TLS 1.2, with the actual version in the \"supported_versions\" extension).\n   - **Client Random**: A 32-byte random value generated by the client, used later in key derivation to ensure uniqueness of the session.\n   - **Cipher Suites**: A list of supported AEAD cipher suites (e.g., TLS_AES_128_GCM_SHA256, TLS_AES_256_GCM_SHA384, TLS_CHACHA20_POLY1305_SHA256).\n   - **Key Shares**: The client preemptively generates ephemeral key pairs for Diffie-Hellman key exchange and includes the public keys for its preferred groups (e.g., x25519, secp256r1). This is crucial for achieving 1-RTT - the client guesses which group the server will choose.\n   - **Supported Groups**: Lists all the elliptic curves or DH groups the client supports.\n   - **Signature Algorithms**: Indicates which signature algorithms the client can verify for certificates.\n   - **Pre-Shared Key (PSK)**: If resuming a previous session, the client includes PSK identities and a PSK key exchange mode. This enables 0-RTT data transmission.\n   - **Early Data**: If using 0-RTT, the client can send encrypted application data immediately with this hello message.\n\n2. **Server Hello**\n   - The server analyzes the Client Hello and responds with its choices.\n   - **TLS Version Confirmation**: Confirms TLS 1.3 in the supported_versions extension.\n   - **Server Random**: A 32-byte random value generated by the server.\n   - **Cipher Suite Selection**: The server selects one cipher suite from the client's list.\n   - **Key Share**: The server selects one of the client's offered groups and provides its own ephemeral public key for that group. If the client didn't offer a key share for the server's preferred group, the server sends a \"HelloRetryRequest\" asking for the correct key share.\n   - **Pre-Shared Key**: If resuming a session, the server selects which PSK to use.\n   \n   **At this point, both parties can calculate the handshake traffic secrets using ECDHE (Elliptic Curve Diffie-Hellman Ephemeral) with the exchanged key shares.**\n\n3. **Server Encrypted Extensions**\n   - **Encryption Begins**: All subsequent handshake messages from the server are encrypted using keys derived from the handshake traffic secret.\n   - **Extensions Include**:\n     - Server Name Indication (SNI) acknowledgment\n     - Application Layer Protocol Negotiation (ALPN) selection (e.g., HTTP/2, HTTP/3)\n     - Maximum fragment length\n     - Other negotiated parameters\n   - These extensions provide additional configuration without exposing it to eavesdroppers.\n\n4. **Server Certificate and Certificate Verify**\n   - **Certificate Message**: \n     - Contains the server's X.509 certificate chain, starting with the server's certificate and including intermediate certificates up to a trusted root.\n     - The certificate includes the server's public key and identity information (domain name, organization).\n     - In TLS 1.3, this is encrypted, providing privacy about which certificate is being used.\n   \n   - **CertificateVerify Message**:\n     - The server creates a digital signature over a hash of all handshake messages up to this point.\n     - This signature is created using the private key corresponding to the public key in the certificate.\n     - The signature proves the server possesses the private key and that the handshake hasn't been tampered with.\n     - The signature covers a special context string \"TLS 1.3, server CertificateVerify\" plus the handshake transcript hash.\n   \n   - **CertificateRequest (Optional)**:\n     - If the server requires client authentication, it sends this message.\n     - Specifies acceptable certificate authorities and signature algorithms for client certificates.\n\n5. **Server Finished**\n   - The server computes a **Finished MAC** (Message Authentication Code) using the handshake traffic secret.\n   - This MAC is computed over a hash of all handshake messages sent and received up to this point.\n   - The Finished message provides key confirmation and binds all handshake messages together.\n   - After sending this, the server can derive the **server application traffic secret** for encrypting application data.\n\n6. **Client Processing and Response**\n   - **Certificate Verification**: The client verifies the server's certificate chain against its trusted root certificates and checks the CertificateVerify signature.\n   - **Handshake Keys Derivation**: The client derives the same handshake traffic secrets to decrypt and verify server messages.\n   \n   **Client Certificate (If Requested)**:\n   - If the server requested client authentication, the client sends:\n     - **Certificate**: The client's certificate chain\n     - **CertificateVerify**: A signature over the handshake transcript using the client's private key\n   \n   - **Application Traffic Secrets**: The client derives both client and server application traffic secrets from the handshake traffic secret and the handshake transcript.\n\n7. **Client Finished**\n   - The client sends its own **Finished MAC** computed over the complete handshake transcript.\n   - This message is encrypted with the handshake traffic secret.\n   - Once sent, the client transitions to using application traffic keys for all subsequent data.\n   - The server verifies this MAC to ensure the handshake completed successfully without tampering.\n\n8. **Application Data Exchange**\n   - Both parties now have matching **application traffic secrets** (separate keys for client-to-server and server-to-client directions).\n   - These keys are used for AEAD (Authenticated Encryption with Associated Data) encryption of all application data.\n   - The handshake is complete, and secure bidirectional communication begins immediately.\n   - **Key Update**: TLS 1.3 supports updating traffic keys during the connection for additional security.\n\n## Key Derivation Process in TLS 1.3\n\n```\n             Client Random + Server Random + ECDHE Shared Secret\n                                    |\n                                    v\n                        Extract вҶ’ Early Secret\n                                    |\n                                    v\n                        Derive вҶ’ Handshake Secret\n                                    |\n                        +-----------+-----------+\n                        |                       |\n                        v                       v\n            Client Handshake Traffic   Server Handshake Traffic\n                   Secret                    Secret\n                        |\n                        v\n                    Master Secret\n                        |\n            +-----------+-----------+\n            |                       |\n            v                       v\n    Client Application         Server Application\n    Traffic Secret             Traffic Secret\n```\n\n## Summary Table of TLS 1.3 Handshake Steps\n\n| Step | Description | Key Elements |\n|------|-------------|--------------|\n| 1. Client Hello | Client initiates with capabilities and key shares | TLS 1.3, cipher suites, Client Random, ECDHE key shares, extensions |\n| 2. Server Hello | Server responds with selections and key share | Cipher selection, Server Random, ECDHE key share, derives handshake keys |\n| 3. [Encrypted] Extensions | Server configuration parameters | SNI, ALPN, other negotiated parameters - all encrypted |\n| 4. [Encrypted] Certificate + Verify | Server authentication | X.509 certificate chain + signature over handshake |\n| 5. [Encrypted] Server Finished | Server's MAC of handshake | HMAC confirming handshake integrity |\n| 6. [Encrypted] Client Certificate | Client authentication if requested | Client certificate + signature (optional) |\n| 7. [Encrypted] Client Finished | Client's MAC of handshake | HMAC confirming handshake integrity |\n| 8. Application Data | Encrypted communication | Bidirectional encrypted data using application traffic keys |\n\n## Notes\n\n- **1-RTT Handshake**: TLS 1.3 completes in one round trip, making it approximately 100-200ms faster than TLS 1.2.\n- **0-RTT Resumption**: For resumed sessions, TLS 1.3 supports 0-RTT data, allowing clients to send encrypted data immediately with the Client Hello, though with some security trade-offs (replay attacks).\n- **Perfect Forward Secrecy**: All TLS 1.3 cipher suites provide PFS through ephemeral Diffie-Hellman, meaning past sessions remain secure even if long-term keys are compromised.\n- **Simplified Cipher Suites**: TLS 1.3 uses only 5 AEAD cipher suites, with key exchange and signature algorithms negotiated separately.\n- **Enhanced Privacy**: Server certificate and all handshake messages after Server Hello are encrypted, hiding certificate details from passive observers.\n- **Removed Legacy Features**: No more RSA key exchange, CBC mode ciphers, compression, renegotiation, or non-AEAD ciphers.\n- **Downgrade Protection**: Special values in Server Random prevent downgrade attacks to older TLS versions.\n\nThis streamlined handshake process is fundamental in securing modern HTTPS connections, providing faster page loads, enhanced security, and better privacy protection for users worldwide.\n\n---\n---"}, {"name": "what is nmap", "content": "# Nmap (Network Mapper)\n---\nNmap (Network Mapper) is a powerful open-source tool for network discovery and security auditing. Here are its primary uses:\n\n*   **Host Discovery:** Identifies active devices and systems on a network.\n*   **Port Scanning:** Detects open ports and associated network services.\n*   **Service & Version Detection:** Determines the software and versions running on open ports, aiding in inventory and vulnerability checks.\n*   **OS Detection:** Identifies the operating system and version used by target devices.\n*   **Vulnerability Scanning:** Finds known security vulnerabilities by probing network services and analyzing responses.\n*   **Firewall & IDS Evasion:** Includes techniques to bypass security controls like firewalls and Intrusion Detection Systems, such as using decoys, fragmenting packets, or manipulating packet headers.\n\nThese features make Nmap invaluable for administrators, security professionals, and auditors seeking to secure and understand their networks.\n\n---\n## What is Nmap?\n\n*   **Purpose:** Nmap is an open-source utility for network discovery and security auditing. It maps networks by discovering hosts and services.\n*   **How it Works:** Sends specially crafted packets to target hosts and analyzes responses to identify hosts, services, operating systems, and firewall types.\n*   **Compatibility:** Runs on Linux, Windows, macOS, BSD, Solaris, etc., with command-line and GUI (Zenmap) interfaces.\n\n---\n## Key Features\n*   Supports advanced techniques including TCP, UDP, ICMP and IP protocol scans.\n*   Handles large network scans and single hosts efficiently.\n*   Includes Nmap Scripting Engine (NSE) for automated vulnerability detection.\n*   Widely used, awarded, and featured in films and publications.\n\n![[Pasted image 20250910140804.png]]\n\n## Nmap Interaction with OSI Model Layers\n---\n### 1. Network Layer in Nmap (Layer 3)\n\nThe Network Layer (Layer 3) of the OSI model manages the movement and routing of packets across networks. Nmap leverages this layer for advanced network discovery and scanning. Here's how Nmap utilizes the network layer:\n\n**IP Packet Handling**\n-   **Raw IP Packets:** Nmap sends raw IP packets to target hosts for scanning and to identify live systems.\n-   **ICMP Echo Requests:** Uses ping sweeps (ICMP) to discover active hosts.\n-   **Fragmented IP Packets:** Can send fragmented packets to help evade detection by firewalls and intrusion detection systems.\n\n**Routing & Reachability**\n-   **Route Selection:** Uses the network layer to determine optimal paths to targets.\n-   **Custom Gateways:** Allows specifying a gateway or source IP with options like `--source-ip` or `--route-dst`.\n\n**Custom IP Packet Manipulation**\n-   **Raw Packet Crafting:** Enables crafting custom IP packets for different scan types (`-sS`, `-sU`, `-sA`).\n-   **TTL Control:** Adjusts packet time-to-live (`--ttl`) to manage hop limits or for advanced probing.\n-   **Packet Fragmentation:** Uses the `-f` option to fragment packets, aiding in security evasion.\n\n**Firewall & IDS Evasion Techniques**\n-   **Decoy Scanning (`-D`):** Sends packets from spoofed addresses to conceal the real source.\n-   **Custom MTU (`--mtu`):** Sets a custom maximum transmission unit to further complicate detection.\n\n**IP Protocol Scan (`-sO`)**\n-   **Protocol Discovery:** Lists all supported network-layer protocols available on a target by sending different types of protocol packets (useful for discovering lesser-known services and VPNs).\n\n**Summary:**\nNmap's network layer capabilities allow it to deftly probe ( chaturai se janch ), enumerate, and bypass network security measures, giving detailed visibility into both topology and host availability while providing multiple methods for stealth and evasion.\n\n**Commands:**\n*   `nmap -f 192.168.1.1` (fragmented packets)\n*   `nmap -sO 192.168.1.1` (protocol scan)\n*   `nmap -S 192.168.1.100 192.168.1.1` (IP spoofing)\n\n---\n### 2. Transport Layer (Layer 4)\n\nThe Transport Layer (Layer 4) is critical for end-to-end communication, reliability, and flow control between devices. Nmap leverages this layer extensively for scanning and analyzing network services and security. Here's how:\n\n### How Nmap Uses the Transport Layer\n\n*   **Port Scanning (TCP & UDP):**\n    *   Nmap's core function at this layer is to check for open ports on a target system over both TCP and UDP.\n\n*   **TCP Scans:**\n    *   **SYN Scan (`-sS`):** Known as a \"half-open\" scan; it sends SYN packets and waits for responses without completing the handshake, making it stealthy.\n    *   **Connect Scan (`-sT`):** Completes the TCP three-way handshake, appearing as a standard connection request.\n    *   **Null Scan (`-sN`):** Sends TCP packets with no flags set to test responses, often used for firewall evasion.\n\n*   **UDP Scans (`-sU`):**\n    *   Probes targets for open UDP ports such as DNS, SNMP, and TFTP.\n    *   Because UDP doesn't guarantee delivery, these scans can be slower and may require retransmissions.\n\n*   **Service Version Detection (`-sV`):**\n    *   After identifying open ports, Nmap interrogates them to determine the exact software and version in use.\n\n*   **TCP Flags & Firewall Evasion:**\n    *   **FIN Scan (`-sF`):** Sends TCP packets with the FIN flag set to probe firewalls and closed ports.\n    *   Different flag combinations (FIN, Null, Xmas, ACK scans) help bypass basic firewall rules and evade detection.\n\n*   **Determining Firewall Rules:**\n    *   Options like `--scan-delay` and `--max-retries` adjust scan speed and packet transmission intervals to avoid triggering IDS/IPS devices or firewall thresholds.\n\n**Summary:**\nNmap's transport layer functionality enables detailed port and service scanning, OS fingerprinting, and stealthy probing, making it invaluable for network security assessments and audits. It combines multiple scanning methods and customizations to provide flexible, reliable, and effective network enumeration.\n\n---\n### Transport Layer Scan Types with Examples\n\n| Scan Type | Protocol | Description | Command Example |\n| :--- | :--- | :--- | :--- |\n| **TCP SYN Scan** | TCP (Half-Open) | Stealth scan, doesn't complete handshake | `nmap -sS 192.168.1.1` |\n| **TCP Connect Scan** | TCP (Full Connection) | Completes full handshake | `nmap -sT 192.168.1.1` |\n| **UDP Scan** | UDP | Checks UDP ports like DNS, SNMP | `nmap -sU -p 53 192.168.1.1` |\n| **Service Version Detection** | TCP/UDP | Identifies software versions running | `nmap -sV 192.168.1.1` |\n| **FIN Scan** | TCP | Sends FIN flag to probe ports | `nmap -sF 192.168.1.1` |\n| **Xmas Scan** | TCP | Sends FIN, PSH, URG flags to probe | `nmap -sX 192.168.1.1` |\n\nThis summary provides you with frequently used Nmap commands for scanning different protocol ports and detecting services with examples you can try on your own network or the authorized test server [scanme.nmap.org].\n\n---\n---\n\n## TCP Three-Way Handshake in Nmap Scans\n\n*   **SYN:** Client initiates connection, sends initial sequence number.\n*   **SYN-ACK:** Server acknowledges and sends its sequence number.\n*   **ACK:** Client acknowledges server's sequence, connection established.\n*   **Importance:** Ensures reliable communication, sequence tracking for data integrity and filtering evasion.\n\n---\n---"}];
var isMobile = window.innerWidth <= 768;

window.addEventListener('resize', function() { isMobile = window.innerWidth <= 768; });

function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('viewer').classList.add('hidden');
}

function showViewer() {
  if (isMobile) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('viewer').classList.remove('hidden');
  }
}

function buildSidebar(filter) {
  var list = document.getElementById('fileList');
  list.innerHTML = '';
  var count = 0;
  for (var i = 0; i < NOTES.length; i++) {
    var note = NOTES[i];
    if (filter && note.name.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var div = document.createElement('div');
    div.className = 'file-item';
    div.id = 'fi-' + i;
    var icon = document.createElement('span');
    icon.className = 'fi-icon';
    icon.textContent = 'в–ё';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'fi-name';
    nameSpan.textContent = note.name;
    div.appendChild(icon);
    div.appendChild(nameSpan);
    (function(idx) {
      div.onclick = function() { openNote(idx); };
    })(i);
    list.appendChild(div);
    count++;
  }
  document.getElementById('visCount').textContent = count;
}

function filterFiles() {
  buildSidebar(document.getElementById('searchInput').value);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderMd(raw) {
  var lines = raw.split('\n');
  var out = '';
  var inCode = false;
  var codeBuffer = '';
  var inList = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^```/)) {
      if (!inCode) {
        if (inList) { out += '</ul>'; inList = false; }
        inCode = true; codeBuffer = '';
      } else {
        inCode = false;
        out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
        codeBuffer = '';
      }
      continue;
    }
    if (inCode) { codeBuffer += (codeBuffer ? '\n' : '') + line; continue; }
    var e = escHtml(line);
    if (e.match(/^#### /)) { if(inList){out+='</ul>';inList=false;} out += '<h4>' + e.slice(5) + '</h4>'; continue; }
    if (e.match(/^### /))  { if(inList){out+='</ul>';inList=false;} out += '<h3>' + e.slice(4) + '</h3>'; continue; }
    if (e.match(/^## /))   { if(inList){out+='</ul>';inList=false;} out += '<h2>' + e.slice(3) + '</h2>'; continue; }
    if (e.match(/^# /))    { if(inList){out+='</ul>';inList=false;} out += '<h1>' + e.slice(2) + '</h1>'; continue; }
    if (e.match(/^---+$/)) { if(inList){out+='</ul>';inList=false;} out += '<hr>'; continue; }
    if (e.match(/^&gt; /)) { if(inList){out+='</ul>';inList=false;} out += '<blockquote>' + inlineFmt(e.slice(5)) + '</blockquote>'; continue; }
    if (e.match(/^[\*\-] /) || e.match(/^\d+\. /)) {
      if (!inList) { out += '<ul>'; inList = true; }
      var txt = e.match(/^[\*\-] /) ? e.slice(2) : e.replace(/^\d+\.\s/,'');
      out += '<li>' + inlineFmt(txt) + '</li>';
      continue;
    }
    if (e.trim() === '') {
      if (inList) { out += '</ul>'; inList = false; }
      out += '<br>';
      continue;
    }
    if (inList) { out += '</ul>'; inList = false; }
    out += '<p>' + inlineFmt(e) + '</p>';
  }
  if (inList) out += '</ul>';
  if (inCode) out += '<pre><code>' + escHtml(codeBuffer) + '</code></pre>';
  return out;
}

function inlineFmt(t) {
  t = t.replace(/`([^`]+)`/g, function(m,c){ return '<code>' + c + '</code>'; });
  t = t.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function openNote(idx) {
  var items = document.querySelectorAll('.file-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.getElementById('fi-' + idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('vPath').textContent = 'nmap/' + NOTES[idx].name;
  var viewer = document.getElementById('viewerContent');
  viewer.innerHTML = renderMd(NOTES[idx].content);
  viewer.scrollTop = 0;
  showViewer();
}

window.onload = function() {
  buildSidebar();
  if (!isMobile && NOTES.length > 0) openNote(0);
};
</script>
